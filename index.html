<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국제무역사 1급 기출문제집</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@700&display=swap');
:root{--navy:#0f2035;--navy2:#1a3050;--gold:#c9a43c;--bg:#f5f2ec;--white:#fff;--green:#1a7a45;--red:#c0392b;--gray:#6b7280;--border:#e2ddd5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
#ls{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#ls h2{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;color:var(--gold)}
#ls p{font-size:13px;color:#8fa3b8}
.lbw{width:200px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.lbf{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#f5e199);border-radius:2px;transition:width .3s}
header{background:var(--navy);border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50}
.hdr{max-width:800px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif KR',serif;font-weight:700;font-size:15px;color:var(--navy);flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700;color:#fff}.hdr p{font-size:11px;color:#8fa3b8;margin-top:1px}
.screen{display:none;max-width:800px;margin:0 auto;padding:20px 14px 60px}.screen.active{display:block}
.hs{margin-bottom:22px}.sl{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ec{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.ec:hover{border-color:var(--gold);transform:translateY(-2px)}.ec.sel{border-color:var(--gold);background:#fdfaf0}
.ey{font-size:10px;font-weight:700;color:var(--gold);background:var(--navy);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:7px}
.en{font-size:18px;font-weight:900;color:var(--navy);font-family:'Noto Serif KR',serif}.es{font-size:11px;color:var(--gray);margin-top:2px}
.fr{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;border:2px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--navy)}
.chip.on{background:var(--navy);color:var(--white);border-color:var(--navy)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.mg{grid-template-columns:1fr}}
.mc{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;text-align:left;font-family:inherit;width:100%}
.mc.on{border-color:var(--navy);background:#f0f5ff}
.mi{font-size:24px;margin-bottom:5px;display:block}.mn{font-size:14px;font-weight:700;color:var(--navy)}.md{font-size:12px;color:var(--gray);margin-top:2px}
.sb{width:100%;padding:15px;background:var(--gold);color:var(--navy);border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px}
.sb:disabled{opacity:.4;cursor:not-allowed}
.qb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.qt{background:var(--navy);color:var(--gold);font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
.qc{font-size:13px;color:var(--gray)}
.tmr{font-size:13px;font-weight:700;color:var(--navy);background:#eef2f7;padding:4px 12px;border-radius:8px}
.tmr.warn{color:var(--red);background:#fdf0ef}
.eb{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-family:inherit;font-size:13px;cursor:pointer;color:var(--gray)}
.pw{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:3px;transition:width .4s}
/* 지문 박스 */
.passage{background:#f8f6ff;border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:keep-all;color:#2d2d4e}
.passage-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.qcard{background:var(--white);border-radius:14px;padding:22px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.qm{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qnb{font-size:12px;font-weight:700;color:var(--white);background:var(--gold);padding:3px 10px;border-radius:20px}
.qsb{font-size:11px;color:var(--gray)}
.qtx{font-size:15px;line-height:1.85;font-weight:500;white-space:pre-wrap;word-break:keep-all}
.ncn{font-size:12px;color:#9b6b00;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:10px}
.chs{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.ch{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:10px;border:2px solid var(--border);background:var(--white);cursor:pointer;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;word-break:keep-all;width:100%}
.ch:hover:not(:disabled){border-color:var(--gold);background:#fffdf5}
.cr{width:26px;height:26px;border-radius:50%;background:#efefef;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px}
.ch.ok{border-color:var(--green);background:#eafaf1}.ch.ok .cr{background:var(--green);color:#fff}
.ch.ng{border-color:var(--red);background:#fdf0ef}.ch.ng .cr{background:var(--red);color:#fff}
.ch:disabled{cursor:default}
.mbs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mb{padding:14px;border-radius:10px;border:2px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;font-size:16px;font-weight:700}
.mb.ok{border-color:var(--green);background:#eafaf1;color:var(--green)}.mb.ng{border-color:var(--red);background:#fdf0ef;color:var(--red)}.mb:disabled{cursor:default}
.fb{display:none;padding:13px 15px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:14px;align-items:center;gap:10px}
.fb.ok{background:#eafaf1;color:var(--green);border:1px solid #a9dfbf;display:flex}
.fb.ng{background:#fdf0ef;color:var(--red);border:1px solid #f5b7b1;display:flex}
.fi{font-size:20px}
.acts{display:flex;gap:9px}
.bm{flex:1;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.bm:disabled{opacity:.4;cursor:not-allowed}
.bs{padding:14px 18px;background:var(--white);color:var(--navy);border:2px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.rh{background:var(--navy);border-radius:16px;padding:28px 22px;color:#fff;text-align:center;margin-bottom:18px}
.rg{font-size:60px;font-weight:900;font-family:'Noto Serif KR',serif;color:var(--gold);line-height:1}
.rgs{font-size:13px;color:#8fa3b8;margin:6px 0 16px}
.rs{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.rst .v{font-size:26px;font-weight:700}.rst .l{font-size:11px;color:#8fa3b8;margin-top:2px}
.rst.ok .v{color:#58d68d}.rst.ng .v{color:#ec7063}.rst.sk .v{color:#f0d48a}
.bd{background:var(--white);border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.bd h4{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.br{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.bn{font-size:13px;font-weight:600;width:68px;flex-shrink:0}
.bb{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.bf{height:100%;background:var(--navy);border-radius:4px;transition:width .6s}
.bsc{font-size:13px;font-weight:700;min-width:56px;text-align:right}
.rvh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rvh h4{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px}
.fbs{display:flex;gap:6px}
.fbt{padding:4px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.fbt.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.rl{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.ri{background:var(--white);border-radius:10px;padding:13px 15px;border-left:4px solid var(--border);cursor:pointer}
.ri.ng{border-left-color:var(--red)}.ri.ok{border-left-color:var(--green)}
.rit{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.rtg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.rtg.ng{background:#fdf0ef;color:var(--red)}.rtg.ok{background:#eafaf1;color:var(--green)}
.rsm{font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ras{display:flex;gap:9px;flex-wrap:wrap}.ras .bm{flex:1;min-width:130px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mbg.open{display:flex}
.mdl{background:var(--white);border-radius:16px;padding:22px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto}
.mdt{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mdtl{font-size:13px;font-weight:700;color:var(--gray)}
.mdc{width:28px;height:28px;border:none;background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:15px;font-family:inherit}
.mqs{font-size:15px;line-height:1.85;margin-bottom:16px;white-space:pre-wrap;word-break:keep-all;font-weight:500}
.mcl{display:flex;flex-direction:column;gap:8px}
.mci{padding:11px 13px;border-radius:8px;font-size:14px;border:1.5px solid var(--border);display:flex;gap:9px;word-break:keep-all}
.mci.ok{background:#eafaf1;border-color:var(--green)}.mci.ng{background:#fdf0ef;border-color:var(--red)}
.mcd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:#ddd}
.mci.ok .mcd{background:var(--green);color:#fff}.mci.ng .mcd{background:var(--red);color:#fff}
.ab{display:inline-block;background:var(--navy);color:var(--gold);font-size:14px;font-weight:700;padding:6px 16px;border-radius:8px}
.mpassage{background:#f8f6ff;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:keep-all;color:#2d2d4e}
</style>
</head>
<body>
<div id="ls"><h2>국제무역사 1급</h2><p>기출문제집 불러오는 중...</p><div class="lbw"><div class="lbf" id="lbf"></div></div></div>
<header><div class="hdr"><div class="logo">무역</div><div><h1>국제무역사 1급 기출문제집</h1><p>55~64회 기출 · 1,200문항 수록</p></div></div></header>
<div id="s-home" class="screen active">

<div class="hs"><div class="sl">과목 선택</div><div class="fr" id="sf"><button class="chip on" data-sec="all">전과목</button><button class="chip" data-sec="무역규범">무역규범</button><button class="chip" data-sec="무역결제">무역결제</button><button class="chip" data-sec="무역계약">무역계약</button><button class="chip" data-sec="무역영어">무역영어</button></div></div>

</div>
<div id="s-quiz" class="screen"><div class="qb"><div style="display:flex;gap:8px;align-items:center"><span class="qt" id="qt"></span><span class="qc" id="qc"></span></div><div style="display:flex;gap:8px;align-items:center"><span class="tmr" id="tmr" style="display:none">60</span><button class="eb" id="eb">나가기</button></div></div><div class="pw"><div class="pf" id="pf" style="width:0%"></div></div><div class="qcard"><div class="qm"><span class="qnb" id="qnb">Q1</span><span class="qsb" id="qsb"></span></div><div id="qpassage"></div><div class="qtx" id="qtx"></div></div><div id="ca"></div><div class="fb" id="fb"><span class="fi"></span><span></span></div><div class="acts"><button class="bs" id="skipb">건너뛰기</button><button class="bm" id="nextb" disabled>다음 문제</button></div></div>
<div id="s-result" class="screen"><div class="rh"><div class="rg" id="rg">0점</div><div class="rgs" id="rgs">수고하셨습니다!</div><div class="rs"><div class="rst ok"><div class="v" id="rok">0</div><div class="l">정답</div></div><div class="rst ng"><div class="v" id="rng">0</div><div class="l">오답</div></div><div class="rst sk"><div class="v" id="rsk">0</div><div class="l">건너뜀</div></div></div></div><div class="bd"><h4>과목별 점수</h4><div id="bdr"></div></div><div><div class="rvh"><h4>문제 복습</h4><div class="fbs"><button class="fbt on" id="fa">전체</button><button class="fbt" id="fn">오답만</button></div></div><div class="rl" id="rl"></div></div><div class="ras"><button class="bs" id="hb">처음으로</button><button class="bm" id="rtb">다시 풀기</button><button class="bm" id="wb" style="background:var(--red)">오답만 풀기</button></div></div>
<div class="mbg" id="mbg"><div class="mdl"><div class="mdt"><span class="mdtl" id="mdtl">문제 보기</span><button class="mdc" id="mdc">✕</button></div><div id="mpassage-wrap"></div><div class="mqs" id="mqs"></div><div class="mcl" id="mcl"></div></div></div>

var _D55=[{"section":"무역규범","num":1,"stem":"1. 우리나라 대외무역법의 규정에 관한 설명으로 잘못된 것은?","choices":["우리나라에서 이행되는 수출입 등 대외무역행위는 기본적으로 대외무역법을 적용한다.","자유롭고 공정한 무역 원칙에 기반한 물품의 수출입은 어떤 경우에도 제한 할 수 없다.","관계 행정기관의 장은 해당 법률에 따른 물품의 수출·수입요령이 그 시행일 전에 공고될 수 있도록 산업통상자원부장관에게 제출하여야 한다.","관계 행정기관에서 타법을 통해 대외무역법의 적용을 배제하거나 물품 등의 수출입을 제한하는 법령 등을 제정하려면 산업통상자원부장관과 협의해야 한 다."],"answer":2},{"section":"무역규범","num":2,"stem":"2. 대외무역법령상 다음 사례에 해당하는 특정거래형태로 올바른 것은? 우리나라의 무역회사 A사가 중국의 B사와 화장품 원료 수입계약을 체결하여 국내 보세구역에 반입한 후, 별도 가공 없이 수출계약을 체결한 미국의 C사 로 수출한 경우","choices":["연계무역","중계무역","외국인도수출","위탁판매수출"],"answer":2},{"section":"무역규범","num":3,"stem":"3. 대외무역법령 및 관세법령상 다음 무역거래 사례에 관한 설명으로 잘못된 것은? A사는 애니메이션 등 콘텐츠 제작 전문기업으로, 국내 대기업 B사에 원화를 받고 납품하고 있고, B사는 A사가 제작한 애니메이션을 전자적 무체물의 형 태로 해외에 수출하고 있다.","choices":["B사는 구매확인서를 전자무역기반사업자에게 온라인으로 신청해 발급할 수 있다.","B사가 소재하는 관할지 세관에 수출신고를 하여야 수출실적으로 인정받을 수 있다.","B사가 구매확인서를 발급해주면 A사는 납품실적을 간접수출실적으로 인정 받을 수 있다.","B사의 수출실적 인정금액은 한국무역협회장이 외국환은행을 통해 입금 확 인한 금액이다."],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에서 규정하고 있는 수출입실적 인정금액에 대한 설명으로 잘못된 것은?","choices":["위탁가공물품을 외국에 판매하는 경우의 판매액","전자적 형태의 무체물 수출의 경우, 한국무역협회장 또는 한국소프트웨어산 업협회장이 외국환은행을 통해 입금 확인한 금액","중계무역에 의한 수출의 경우, 수출금액(FOB)에서 수입금액(CIF)을 공제한 가득액","외국인으로부터 외화를 영수하고 외화획득용 시설기재를 외국인과 임대차계 약을 맺은 국내업체에 인도하는 경우, 외국환은행 입금액"],"answer":1},{"section":"무역규범","num":5,"stem":"5. 대외무역법령에서 전략물자의 수출허가 또는 상황허가의 면제 사유에 해당하지 않는 것은?","choices":["재외공관에서 사용될 공용물품을 수출하는 경우","선박의 수리용 예비부분품 및 부속품 등을 수출하는 경우","항공기의 안전운항을 위하여 긴급 수리용으로 사용되는 부분품 등을 수출하 는 경우","해외에 파견된 우리나라 군대 또는 외교사절 등에 사용될 공용물품을 수출 하는 경우"],"answer":2},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 원산지표시제도에 관한 설명으로 올바른 것은?","choices":["수출물품에 대한 원산지 표시는 수입국 원산지 표시 규정에 따라 원산지를 표시할 수 있다.","원산지 표시 대상으로 지정된 물품은 국내에서 생산된 경우에도 원산지를 표시해야 한다.","수입물품의 원산지 표시는 해당 물품의 최소포장, 용기 등에 원산지를 표시 하는 것을 일반원칙으로 한다.","원산지 표시 방법에 대하여 대외무역법과 수입물품 관련 법령이 상충되는 경우에는 대외무역법을 우선 적용한다."],"answer":1},{"section":"무역규범","num":7,"stem":"7. 대외무역법령에서 규정하고 있는 수입원료를 사용한 국내생산 물품의 원산지 판정기준과 관련하여 올바른 것은?","choices":["냉장멸치를 수입하여 우리나라에서 건조한 멸치는 우리나라를 원산지로 한 다.","소(HS 0102)를 수입하여 우리나라에서 6개월 이상 사육한 경우 우리나라를 원산지로 한다.","돼지(HS 0103)를 수입하여 우리나라에서 1개월 이상 사육한 경우 우리나라를 원산지로 한다.","고추, 마늘, 파, 양파, 생강을 여러 나라에서 수입하여 우리나라에서 다진 양 념은 구성비율이 높은 국가를 원산지로 한다."],"answer":2},{"section":"무역규범","num":8,"stem":"8. 대외무역법령에서 규정하고 있는 구매확인서 관련 설명으로 올바른 것은?","choices":["발급된 구매확인서를 근거로 2차 구매확인서는 발급받을 수 없다.","구매확인서 발급기관은 구매확인서 발급 금액에 대하여 지급을 보증하여야 한다.","구매확인서로 거래한 업체는 부가가치세 면세를 적용받아 계산서 발행이 가 능하다.","구매확인서를 받고 수출용 원재료를 공급하는 경우, 관세환급 대상이다."],"answer":4},{"section":"무역규범","num":9,"stem":"9. 관세법상 관세율표의 해석에 관한 통칙 5호와 관련한 포장재료와 포장용기의 분류원칙에 관한 사례로 올바른 것은?","choices":["종이상자에 담겨 있는 화장품은 화장품으로 분류한다.","은으로 만들어진 용기에 담겨온 녹차는 녹차로 분류한다.","장식용 도자기에 담겨 있는 설탕과자는 설탕과자로 분류한다.","철강으로 만든 용기에 충전된 프로판가스는 프로판가스로 분류한다."],"answer":1},{"section":"무역규범","num":10,"stem":"10. 관세법상 관세징수의 우선 및 내국세 등의 부과·징수에 관한 설명으로 잘못 된 것은?","choices":["납세의무자의 주소지를 관할하는 세무서장은 수입물품에 부과된 내국세의 체납세액을 징수할 수 없다.","관세를 납부해야 하는 물품의 경우 다른 조세, 그 밖의 공과금 및 채권에 우선하여 그 관세를 징수한다.","관세법에 따른 가산세 및 강제징수비의 부과ㆍ징수ㆍ환급 등에 관하여는 관세법 중 관세의 부과ㆍ징수ㆍ환급 등에 관한 규정을 적용한다.","국세징수의 예에 따라 관세를 징수하는 경우 강제징수의 대상이 해당 관세 를 납부해야 하는 물품이 아닌 재산일 때 관세의 우선순위는‘국세기본 법’에 따른 국세와 동일하게 적용한다."],"answer":1},{"section":"무역규범","num":11,"stem":"11. 관세법상 과세물건 확정 시기에 관한 설명이다. 괄호에 들어갈 용어로 올바 른 것은? 관세는 수입신고를 하는 때의 물품의 ( )에 따라 부과한다.","choices":["성질과 가격","가격과 수량","성질과 수량","가격과 중량"],"answer":3},{"section":"무역규범","num":12,"stem":"12. 관세법상 관세의 납세의무자에 대해 올바르게 제시한 것은?","choices":["보세운송물품으로 보세운송 중 분실된 경우: 수입물품의 화주","수입물품을 수입신고 전에 양도한 경우: 해당 물품의 양도인","위탁받은 업체가 대행 수입한 경우: 해당 물품의 수입을 위탁한 자","해외직구한 물품이 특송화물로 수입되는 경우: 물품을 국내로 반입하는 특 송업체"],"answer":3},{"section":"무역규범","num":13,"stem":"13. 관세법상 관세부과의 제척기간에 관한 설명으로 잘못된 것은?","choices":["잠정가격을 신고한 후 확정된 가격을 신고한 경우, 잠정가격을 신고한 날의 다음 날이 관세부과의 제척기간 기산일이다.","부정한 방법으로 관세를 포탈하였거나 환급받은 경우, 관세를 부과할 수 있는 날부터 10년이 지나면 부과할 수 없다.","과다환급 또는 부정환급 등의 사유로 관세를 징수하는 경우, 환급한 날의 다음날이 관세부과의 제척기간 기산일이다.","관세부과의 제척기간이 경과되더라도 관세법에 따른 심사청구에 관한 결정 이 있은 경우, 결정결과에 따라 결정이 확정된 날로부터 1년 이내에 필요한 처분을 할 수 있다."],"answer":1},{"section":"무역규범","num":14,"stem":"14. 관세법상 관세징수권의 소멸시효 중단 사유에 해당하지 않는 것은?","choices":["고발","납부고지","통고처분","체화공매"],"answer":4},{"section":"무역규범","num":15,"stem":"15. 국내 수입자인 ㈜KITA는 중국 수출자인 A사의 측정용 장비를 USD 100,000(FOB 중국 칭다오항)에 수입하였다. 기타 비용이 다음과 같은 경우 측정용 장비의 과세가격은? • 칭다오항까지의 중국 내 운송비용: USD 500 • 칭다오항에서 부산항까지 해상운임: USD 2,000 • 칭다오항에서 부산항까지 해상보험료: USD 1,000 • 부산항에서의 하역비용: USD 300 • 부산항에서 서울까지 보세운송 비용: USD 500","choices":["USD 101,000","USD 103,000","USD 103,500","USD 104,300"],"answer":2},{"section":"무역규범","num":16,"stem":"16. 관세법상 괄호에 들어갈 용어로 올바른 것은? 납세의무자가 세율적용의 착오로 신고납부한 세액이 과다한 것을 납세 후 1년이 경과된 시점에 알게 되었다면 이를 시정하기 위해 과다납부한 세액 의 ( )을 세관장에게 청구할 수 있다.","choices":["정정","경정","환급","수정"],"answer":2},{"section":"무역규범","num":17,"stem":"17. 관세법상 다음 괄호에 들어갈 용어로 알맞은 것은? 정부는 높은 먹거리 물가에 따른 가계부담 완화를 위해 최근 가격이 높아 진 7개 품목에 대해 관세를 인하한다. 정부는 5월 30일 국무총리 주재로 국무회의를 열고 돼지고기, 고등어, 설탕, 조주정, 원당, 주정박, 팜박 등 7 개 농·축·수산물의 관세율을 6월 초부터 0%의 ( )를 적용하기로 했다. (식품외식경제 2023. 5. 31.)","choices":["긴급관세","할당관세","잠정관세","농림축산물에 대한 특별긴급관세"],"answer":2},{"section":"무역규범","num":18,"stem":"18. ㈜KITA는 베트남의 A업체로부터 화장품을 개당 USD 100(CIF 가격)에 1,000 개를 수입하였다. 다음 조건에서 관세법령에 규정된 내용으로 잘못된 것은? (다른 고려사항은 없다) 1. 화장품 관세율 기본세율 WTO협정세율 한-베트남 FTA 세율 한-아세안 FTA 세율 8% 6.5% 0% 0% 2. 기타 사항 - ㈜KITA는 한-베트남 FTA원산지증명서를 구비하고 있다. - 과세환율: USD 1= KRW 1,200","choices":["㈜KITA가 납부할 관세는 0원이다.","수입 시 적용되는 실행관세율은 한-베트남 FTA 세율이다.","㈜KITA가 수입하는 화장품의 거래가격은 KRW 120,000,000이다.","베트남 수출자가 수출 시 FTA원산지증명서를 발행하지 못하면 ㈜KITA는 수입 시 기본세율 8%를 적용받아 관세를 납부하여야 한다."],"answer":4},{"section":"무역규범","num":19,"stem":"19. 다음 사례에서 관세법상 재수출면세 신청에 관한 설명으로 올바른 것은? 한국의 ㈜KITA는 COEX에서 개최되는 유아용품 전시회에 참가하기 위하여 독일의 A사로부터 전시용 유모차를 다음 조건으로 무상 수입하였다. • 수입 수량: 5개 모델별 2대씩 총 10대 • 제품가격: USD 3,000/대당 • 반환 시기: 전시종료 후 2월 이내 • COEX는 보세전시장 특허를 받지 않았다.","choices":["관세 및 부가가치세를 면제받을 수 있다.","보세전시장이 아니므로 관세를 면제받을 수 없다.","관세는 납부하고 부가가치세만 면제받고 재수출 시 관세를 환급받는다.","유아용품 면세규정에 따라 관세만 면제받고 부가가치세는 납부하여야 한다. 티셔츠 5,000장을 수입하면서 관련 세액을 납부하였다."],"answer":1},{"section":"무역규범","num":20,"stem":"20. ㈜KITA는 베트남에서 자사 일반창고에서 물품을 확인하던 중 1,000장의 제품에 하자가 있는 것을 발견하고, 하자 제품만 돌려보내기로 하였다. 이에 대한 설명으로 잘못된 것 은?","choices":["세관장은 ㈜KITA가 납부해야 하는 가산세가 있는 경우 환급하여야 하는 금 액에서 이를 충당할 수 있다.","㈜KITA는 하자 있는 티셔츠 1,000장을 수입한 상태 그대로 돌려보내면 납부 한 세액 중 1,000장에 해당하는 금액을 돌려받을 수 있다.","㈜KITA가 납부한 세액을 돌려받기 위해서는 수입신고 수리일로부터 1년 이 내에 제품이 보관된 장소에서 위약 수출을 하여야 한다.","제품 하자의 정도가 심해서 부득이 수출에 갈음해 폐기해야 하는 경우 수입 신고 수리일로부터 1년 이내에 보세구역에 반입한 후 미리 세관장의 승인 을 받아 폐기하면 폐기된 제품에 해당하는 세액만큼 환급받을 수 있다."],"answer":3},{"section":"무역규범","num":21,"stem":"21. 관세법상 보세구역과 보세운송에 관한 설명으로 잘못된 것은?","choices":["수출신고가 수리된 물품은 외국물품임에도 보세구역이 아닌 장소에 장치할 수 있다.","보세구역에 장치된 외국물품의 전부 또는 일부를 견본품으로 반출할 수 있 으며 이때는 세관장의 허가를 받아야 한다.","외국물품을 보세화물 상태로 부산항 보세창고에서 서울세관 관할 보세창고 로 이동하고자 하는 경우에는 세관장에게 보세운송 신고를 하여야 한다.","보세구역에 장치된 외국물품은 그 현상을 유지하기 위해 필요한 작업이나 포장을 바꾸는 등의 보수작업을 할 수 있으며 이 경우 보세구역 운영인의 승인을 받아야 한다."],"answer":4},{"section":"무역규범","num":22,"stem":"22. 관세법상 수입에 해당하여 관세의 신고 납부대상에 해당하는 것은?","choices":["해외여행자가 귀국 국제선 항공기 안에서 항공사가 제공한 특별식사를 이용 한 경우","해외여행자가 우리나라 국제선 출국면세점에서 구매한 고가의 포도주(USD 400 초과)를 탑승 전 섭취한 경우","해외여행자가 귀국 국제선 항공기 안에서 구매한 시계와 가방(총액 USD 800 초과)을 우리나라로 반입하는 경우","해외여행자가 해외 출국면세점에서 구매한 고가의 주류(USD 400 초과)를 귀 국 국제선 항공기 안에서 일행과 함께 모두 섭취한 경우"],"answer":3},{"section":"무역규범","num":23,"stem":"23. 다음 관세법상 통관 제한에 관한 설명 중 잘못된 것은?","choices":["세관장은 법령에 따라 원산지를 표시하여야 하는 물품이 부정한 방법으로 사실과 다르게 표시된 경우에는 해당 물품의 통관을 허용하지 않을 수 있 다.","세관장은 수출입 신고서의 기재사항에 보완이 필요하거나 물품에 안전성 검 사가 필요한 경우에는 해당 물품의 통관을 보류할 수 있다.","세관장은 위조상표를 붙여 상표권을 침해한 수입물품의 경우에는 위조상표 를 제거한 후 수입통관을 허용한다.","세관장은 수입신고가 수리되어 반출된 물품도 관세법을 위반하거나 국민 보 건 등을 해칠 우려가 있는 경우에는 보세구역으로 반입할 것을 명할 수 있 다."],"answer":3},{"section":"무역규범","num":24,"stem":"24. 관세법상 행정심판제도에 관한 설명으로 올바른 것은?","choices":["이의신청을 거치지 않는 심사청구는 처분이 있는 것을 안 날로부터 90일 이 내 청구하여야 한다.","이의신청인, 심사청구인 또는 심판청구인은 변호사, 관세사, 세무사를 대리 인으로 선임할 수 있다.","이의신청 후 30일 이내 결정통지를 받지 못한 경우에는 결정기간이 지난 날 부터 행정법원에 행정소송을 제기할 수 있다.","이의신청을 거친 후 심사청구를 하려는 경우에는 이의신청에 관한 결정을 통지받은 날로부터 60일 이내 청구를 하여야 한다. 급 급"],"answer":1},{"section":"무역규범","num":25,"stem":"25. 관세환 특례법에서 규정하고 있는 환 대상 원재료에 해당하지 않는 것은?","choices":["해당 수출물품의 포장용품","수입한 상태 그대로 수출한 경우 해당 수출물품","수출물품을 생산하는 공정에 투입되어 소모되는 물품","수출물품 생산용 기계·기구 등의 작동 및 유지를 위한 물품 급 급"],"answer":4},{"section":"무역규범","num":26,"stem":"26. 관세환 특례법상 간이정액환 에 관한 설명으로 잘못된 것은?","choices":["간이정액환급을 받으려는 자는 물품이 수출 등에 제공된 날부터 5년 이내에 세관에 환급 신청을 하여야 한다.","수출물품의 세번부호(HSK)를 잘못 적용하여 간이정액환급액이 50원에서 10 원으로 변경된 경우 기존 환급액 중 세관장은 과다환급금액을 징수할 수 있다.","간이정액환급은 환급일이 속하는 연도의 직전 2년간 매년도 환급실적이 6억 원 이하인 중소기업에 적용되는 환급방법이다. 매년도 환급실적에는 기초원 재료납세증명서 발급실적은 포함하지 않는다.","국내 중소 제조기업인 ㈜KITA가 미국으로 반도체용 여과기(HSK: 8421.99-9031 / 간이정액환급액: 10원)를 FOB 700,000,000원어치 수출을 하 고 간이정액환급을 신청하면 다른 조건이 충족된다면 700,000원을 환급받을 수 있다. 요 방"],"answer":3},{"section":"무역규범","num":27,"stem":"27. 다음 소 량 산정 법에 관한 설명 중 해당 용어가 올바르게 짝지어진 것 은? A. 관세환 급 산출에 가장 기본적 요소이며, 수출물품의 생산·가공·조립·수리· 재생 또는 개조에 드는 원재료의 양으로서 생산과정에서 정상적으로 발생 하는 손모량(損耗量)을 포함한 양을 의미 B. 관세 등의 환급 시 부산물의 가치에 해당하는 관세 등의 금액을 공제한 후 잔액을 환급하는 제도 C. 수출물품 1단위 생산에 사용되는 설계도면상 원재료의 실면적이나 부품내 요 역서상의 실량으로 소 량을 산정하는 방법","choices":["A: 소요량 B: 부산물공제제도 C: 단위실량 산정방법","A: 단위실량 B: 평균세액증명제도 C: 단위설계소요량 산정방법","A: 소요량 B: 평균세액증명제도 C: 단위실량 산정방법","A: 단위실량 B: 부산물공제제도 C: 단위설계소요량 산정방법 혜"],"answer":1},{"section":"무역규범","num":28,"stem":"28. 다음 사례에서 자유무역협정(FTA)관세법령상 특 관세 적용에 관한 설명으 로 올바른 것은? 일본에서 생산되어 미국으로 수출 판매된 제품을 미국에서 우리나라로 수 입하고 있다.","choices":["수입물품은 FTA 특혜관세 적용을 받을 수 없다.","수입물품은 RECP 특혜관세를 적용받을 수 있다.","수입물품은 한-미 FTA 특혜관세를 적용받을 수 있다.","수입물품은 한-일 FTA 특혜관세를 적용받을 수 있다."],"answer":1},{"section":"무역규범","num":29,"stem":"29. 한국의 (주)KITA가 미국에서 일시적으로 수입한 물품 중 자유무역협정(FTA)관 세법상 원산지와 관계없이 관세를 면제받을 수 있는 물품으로 올바른 것 은?","choices":["과세가격 미화 300달러인 상용견품","수출물품을 제조 또는 가공하기 위해 수입하는 부분품","수입신고 수리일부터 2년 이내 다시 수출하기 위해 수입하는 전시를 위한 물품","미국으로 수출하였다가 새로운 물품으로 개조하기 위하여 다시 수입하는 물 품 ‘’ H"],"answer":3},{"section":"무역규범","num":30,"stem":"30. ㈜KITA는 아래 원재료를 사용하여 A 제품( S: 8415.10)을 생산·수출하는 중 소제조업체이다. 다음 설명 중 올바른 것은? •원재료명세서 원재료 세번 원산지 실행 원재료 세번 실행 원산지 관세율 관세율 a 8415.90 중국 FTA 0% c 7322.90 미상 WTO 0% b 8418.61 미국 FTA 0% d 8415.90 미상 국내구매 •㈜KITA는 관세환급특례법에 의한 간이정액환급 적용업체","choices":["FTA 원산지 결정기준이 세번변경기준(CTH)인 경우‘A’제품의 원산지는 한국이다.","FTA 원산지 결정기준이 부가가치기준(BD)인 경우‘A’제품의 원산지는 중 국 또는 미국이다.","㈜KITA가 원재료‘d’를 우리나라 영역 안에서 구매하였다면 원산지를‘한 국’으로 결정하는 것이 원칙이다.","㈜KITA는 수입원재료에 대한 실행관세율이 모두 0%로 관세를 납부하지 않 았음에도 ‘A’제품 수출 시 수출용 원재료 관세환급을 받을 수 있다."],"answer":4},{"section":"무역결제","num":1,"stem":"1. 송금결제 식에 관한 설명으로 잘못된 것은?","choices":["O/A 방식은 선적통지부 사후 송금결제방식이다.","사전송금의 경우 수출자는 신용위험이 없고 수입자는 물품을 인수하여 확 인할 때까지 상업위험이 존재한다.","본지사 간의 수출거래로서 계약 건당 5만 달러를 초과하는 수출대금을 물 품 선적 전에 영수하고자 하는 경우에는 한국은행총재에게 신고해야 한다.","COD 방식은 수입자 입장에서 선적은 확인되지만, 물품의 품질 확인이 어 려우므로 선적 전 검사(PSI)를 하는 것이 위험을 방지할 수 있다. 방"],"answer":4},{"section":"무역결제","num":2,"stem":"2. 송금결제 식에 관한 설명으로 올바른 것은?","choices":["송금결제방식에서 수출자는 대금을 청구하기 위해 수입자를 지급인으로 하는 환어음을 발행해야 한다.","송금결제방식에서 수출자는 선적서류를 수입자가 지정한 은행으로 직접 발송한다.","A/P bond는 사전송금방식의 거래에서 수출자의 위험 관리방안으로 활용된 다.","CAD와 COD 방식은 선적서류 또는 수출물품이 수입자에게 인도되어야만 외화채권이 성립되어 대금결제가 이루어진다."],"answer":4},{"section":"무역결제","num":3,"stem":"3. 추심결제방식에 관한 설명으로 잘못된 것은?","choices":["D/A 방식은 수출자가 기한부 환어음을 발행하고 수입자는 만기일에 대금 을 결제한다는 점에서 Usance L/C와 유사하다.","D/A 방식에서 매수인은 환어음에 대한 지급의 약속으로 서명날인을 함으 로써 선적서류를 인도받아 화물에 대한 소유권을 획득한다.","D/A 거래는 수출자가 상품을 선적한 후 선적서류를 받은 수입국 은행을 통해 대금을 지급받기 때문에 사후송금 결제방식과 달리 수출자의 신용위 험이 존재하지 않는다.","D/A 서류매입은 은행의 여신에 해당하므로 수출대금이 회수되지 않을 경 우 수출자가 D/A 매입대금 전액을 상환하여야 한다."],"answer":3},{"section":"무역결제","num":4,"stem":"4. 추심결제방식에 관한 설명으로 잘못된 것은?","choices":["추심은행은 추심의뢰은행이 송부한 서류를 지급인에게 제시하고 지급받 은 대금을 추심의뢰은행으로 송금하는 역할을 담당하며 대금지급을 확약 하지 않는다.","추심거래에서 추심대금의 결제가 있기 전까지는 화물의 소유권이 추심은 행(collecting bank)에 있다.","추심거래는 URC 522라는 국제규칙을 따르며 선적서류의 송부는 은행을 통해 이루어진다.","신용장결제방식에서 수출자가 발행하는 환어음상의 지급인(drawee)은 은 행으로 표기되나, 추심결제방식에서는 수입자로 표기된다. 성"],"answer":2},{"section":"무역결제","num":5,"stem":"5. 화환신용장 거래의 특 이 거래당사자에게 미 는 치 영향에 관한 설명으로 잘 못된 것은?","choices":["선적된 물품이 계약과 일치하는지 아닌지는 전적으로 개설의뢰인의 책임이 다.","신용장 조건과 일치하는 서류가 제시되면 개설은행에 대금지급 의무가 발생 한다.","개설은행은 제시된 서류가 위·변조 서류로 밝혀지면 UCP 600의 규정에 따 라 수리를 거절할 수 있다.","개설의뢰인이 개설은행으로 지급한 대금이 이미 매입은행으로 송금되었다 면, 향후 물품이 계약과 불일치하더라도 개설의뢰인은 대금을 회수할 수 없 다."],"answer":3},{"section":"무역결제","num":6,"stem":"6. B anker’s usance L/C에 관한 설명으로 올바른 것은?","choices":["매입은행은 usance 기간에 대한 이자를 차감한 금액을 수익자에게 제공 한다.","Usance 기간에 대한 이자는 수익자가 부담한다.","A/C와 D/C는 인수은행이 개설의뢰인에게 부과하는 수수료이다.","신용장에“Usance draft shall be negotiated at usance basis.”와 같은 문 구가 기재된다."],"answer":3},{"section":"무역결제","num":7,"stem":"7. 다음은 우리나라 통지은 행이 받은 신용장의 일부이다. 이 신용장과 관련 하여 잘못된 것은? +10PCT OF TOTAL VALUE(USD 500,000.00) SHALL BE PAID AS ADVANCE PAYMENT AGAINST PRESENTATION OF AN ADVANCE PAYMENT BANK GUARANTEE IN THE SAME AMOUNT IN FAVOR OF NEMO CORPORATION. PAYMENT WILL BE EFFECTED BY US UPON FIRST BENEFICIARY'S ACCEPTANCE AND SUBJECT TO ARRANGEMENT OF FUNDS BY THEM.","choices":["집화용 신용장이라고 하며 영문 명칭은 Packing Credit이다.","수익자는 대금을 청구할 때 운송서류를 제시하지 않아도 된다.","개설의뢰인은 Bank Guarantee를 제시하여야 한다.","원자재 구매자금 등이 필요한 경우, 통상 수출자가 수입자에게 요구할 때 이런 신용장이 개설된다."],"answer":3},{"section":"무역결제","num":8,"stem":"8. 화환신용장 거래에서 선적서류의 인도와 관련하여 올바른 것은?","choices":["Letter of Guarantee 발행 후 향후 내도하는 서류에 하자가 있다면 개설은 행은 대금지급을 거절할 수 있다.","Letter of Guarantee 발행은 수입자에 대한 발행은행의 여신 행위로는 볼 수 없다.","Trust Receipt는 수입자가 발행하며 관련 물품의 소유권은 은행에 있음을 확 인하는 서류이다.","T/R은 일람불 신용장에 의한 수입대금의 무역금융 결제 시에만 활용할 수 있다."],"answer":3},{"section":"무역결제","num":9,"stem":"9. 화환신용장의 양도에 관한 설명으로 올바른 것은?","choices":["분할선적이 허용되는 경우라도 다수의 제2 수익자에게 분할양도 될 수 없다","제1 수익자는 자신의 송장과 환어음을 제2 수익자의 그것과 대체할 권리를 가진다.","제2 수익자는 제3 수익자에게 2차 양도를 할 수 있다.","제1 수익자는 원신용장의 조건 변경에 대해 그 내용의 일부만 수락할 수 있 다."],"answer":2},{"section":"무역결제","num":10,"stem":"10. 신용장 매입( negotiation)에 관한 설명으로 잘못된 것은?","choices":["매입은 매매계약에 근거를 두고 있으나, 매매계약과는 관계가 없다.","신용장에서 요구하는 서류 일체를 지정은행이 매입하여 수익자에게 미리 대 금을 지급하는 것이다.","수익자는 개설은행에 직접 매입을 요청할 수 있다.","신용장의 요구 서류에 따라 매입 시 반드시 환어음을 동반해야 하는 것은 아니다."],"answer":3},{"section":"무역결제","num":11,"stem":"11. 다음 화환신용장 문구의 해석으로 잘못된 것은? Full set of original clean on board Marine Bil of Lading made out to order endorsed in blank marked freight prepaid notify applicant and mentioning this D/C number.","choices":["수익자는 선적선하증권 혹은 본선적재선하증권 원본 3통을 제시하여야 한 다.","선하증권의 수하인에는 개설의뢰인의 명칭을 기재하여야 한다.","선하증권의 뒷면에 양수인을 기재함이 없이 배서하여야 한다.","선하증권에 화환신용장 번호를 기재하여야 한다. 취"],"answer":2},{"section":"무역결제","num":12,"stem":"12. 한국의 수출자 ㈜KITA가 수 한 화환신용장의 일부이다. 다음 중 적격한 서 류의 제시로 볼 수 있는 것은? 46A. D ocuments required + beneficiary’s draft + commercial invoice in 3 copies + quantity certificate issued by qualified surveyor in 1 original + quality certificate issued by qualified surveyor in 1 original","choices":["세관장이 발행한 Tax Invoice","SGS의 서명 없이 letter 용지에 발급된 Quality Certificate","Drawee가 수입자로 작성된 draft","신용장의 수량보다 많은 수량이 표시된 Quality Certificate"],"answer":4},{"section":"무역결제","num":13,"stem":"13. UC P 600에서 규정한 confirmation에 관한 설명으로 올바른 것을 모두 기재 한 것은? 행 행 행 A. 확인은 이 매입은 인 경우, 확인은 은 상환청구권 없이 매입하여야 한다. B. 화환신용장의 조건 변경에 대해 확인은행은 개설은행과 동일한 시점부터 구 속된다. C. 인수신용장의 경우, 인수은행이 확인은행이 되어야 한다. D. 통지은행이 확인은행인 경우, 통지은행은 화환신용장 통지 시점에 확인을 추가하여 수익자에게 통지하여야 한다.","choices":["A","A, C, D","B, C, D","B, D"],"answer":1},{"section":"무역결제","num":14,"stem":"14. 화환신용장 조건 변경에 관한 설명으로 올바른 것은?","choices":["확인은행이 신용장에 관해 확인을 추가한 경우, 향후 이루어지는 조건 변경 에 대하여 확인은행은 확인을 연장함이 없이 통지만을 할 수도 있다.","조건 변경에 대하여 일부만을 수락하는 것은 허용된다.","원신용장을 담보로 개설된 Back to back 신용장의 경우, Master L/C의 모든 조건 변경을 반영하여야 한다.","조건 변경에는 개설은행, 확인은행, 매입은행, 수익자 전원의 합의가 필요하 다."],"answer":1},{"section":"무역결제","num":15,"stem":"15. 신용장의 요구서류 중 상업송장에 관한 설명으로 잘못된 것은?","choices":["별도로 요구하지 않는 경우 서명될 필요는 없다.","상업송장은 개설의뢰인 앞으로 발행되어야 한다.","지정은행이 신용장에서 허용하는 금액을 초과하는 금액에 대하여 결제하거 나 매입하지 않더라도 그러한 상업송장을 수리 거절해야 한다.","신용장상에서 CFR 가액만 명시된 경우, 상업송장에는 FOB 가액, 운임뿐만 아니라 신용장에 없는 영사비용까지 합산하여 CFR 가액을 표시할 수 있다."],"answer":3},{"section":"무역결제","num":16,"stem":"16. 화환신용장 거래 시 보험서류에 관한 내용으로 올바른 것은?","choices":["보험서류의 일자는 선적일보다 늦어서는 안 된다 다만 보험서류에서 부보 . 가 최소한 선적일자 이전에 효력이 발생함을 나타내고 있는 경우에는 그러 하지 아니하다.","신용장에 보험서류 원본 부를 제시하라는 조건이 명시된 경우에도 보험서 1 류가 1부를 초과한 원본으로 발행되었다고 표시된 경우 1부만 제시되어도 된다.","보험서류는 부보금액을 표시해야 하나 반드시 신용장과 동일한 통화로 부보 할 필요는 없다.","보험서류에는 어떠한 제외 문구 (exclusion 에 대한 언급이 표시되어 clause) 서는 안 된다. P 745에서 규정한 항공운송서류에 관한 내용으로 올바른 것은?"],"answer":1},{"section":"무역결제","num":17,"stem":"17. ISBP(국제표준은행관행)에 관한 설명으로 잘못된 것은?","choices":["화환신용장에서 필요 운송서류의 이름으로 “air waybill”, “air consignment note”를 요구하더라도 반드시 그러한 제목을 가져야 하는 것 은 아니며 운송서류가 갖추어야 하는 실체적 요건이 중요하다.","Full set의 원본을 요구하는 경우, 반드시 원본 모두를 제시하여야 한다.","신용장이 수하인을 “to order of shipper”로 요구한 경우, 수하인을 동일 하게 기재하고 신용장에 별도로 명시하지 않더라도 선적인의 배서가 있어 야 한다.","항공운송서류에 출발공항과 도착공항은 IATA 코드를 사용해서는 안 되며 공항명을 완전하게 표시하여야 한다."],"answer":1},{"section":"무역결제","num":18,"stem":"18. 화환신용장에서 제시를 요구하는 환어음에 관한 설명으로 잘못된 것은?","choices":["환어음의 만기에 관하여 일람출급이나 일람 후 정기출급 이외의 만기를 요 구하는 경우, 그 환어음 자체 내에 있는 정보로부터 만기를 산정하는 것이 가능하여야 한다.","환어음에 기재된 숫자 금액과 문자 금액이 상이하다면 문자 금액을 기준으 로 심사해야 한다.","환어음은 수익자에 의하여 발행되고 서명되어야 하며 발행일이 표시되어야 한다.","환어음은 신용장에서 명시된 지급인 앞으로 발행되어야 한다. SWIFT로 개 설되는 신용장의 경우 환어음의 지급인은 “42C: Drafts At ---”항목에 표 시된다."],"answer":4},{"section":"무역결제","num":19,"stem":"19. 다음 문장에서 나 지 머 셋과는 다른 당사자를 지칭하는 것은? O n the instruction of ( A ), we hereby irrevocably undertake to pay ( B ) within three banking business days an amount up to USD 100,000 upon receipt of your first written demand stating that ( C ) has failed to comply with his contract obligation as agreed upon. This guarantee shall be become operative only upon receipt of the Advance Payment on ( D )’s account No. 1234 at KITA BANK, SEOUL SOUTH KOREA. This guarantee is subject to the Uniform Rules for Demand Guarantees, ICC Publication No.758.","choices":["A","B","C","D 페 팅 팩 링"],"answer":2},{"section":"무역결제","num":20,"stem":"20. 포 이 과 수출 터 의 공통된 특징으로 올바른 것은?","choices":["수출자의 신용도보다는 수입자 또는 수입자 거래은행의 신용도에 따라, 수출 자에게 해당 금융을 제공할 것인지를 결정한다.","수출자가 발행한 환어음 또는 약속어음을 활용하여 수출채권을 양도받는다.","Without recourse 조건으로 매입하므로, 수출자에게 재무구조가 개선되는 효 과를 제공한다.","포페이팅/팩터링의 계약 시점부터 수출자의 적격한 서류 제시 및 계약이행에 대해 대금지급을 확약한다."],"answer":1},{"section":"무역결제","num":21,"stem":"21. 수출자가 수입자에게 요구한 사항 중 대금회수 위험관리 방안으로 수출자에 게 별다른 효과가 없는 것은?","choices":["Letter of Guarantee 대신 Standby L/C를 요청하였다.","수입자가 요구한 O/A 결제방식 대신 D/P 결제방식을 요청하였다.","Transferred L/C 대신 Back-to-back L/C를 요청하였다.","Banker’s usance L/C 대신 Sight L/C를 요청하였다. 방"],"answer":4},{"section":"무역결제","num":22,"stem":"22. 송금결제 식과 추심결제방식의 공통점 및 차이점에 관한 내용으로 잘못된 것은?","choices":["송금은 별도의 국제규칙이 존재하지 않지만 추심은 URC 522라는 국제규칙 에 따라서 거래된다.","O/A와 D/A는 대금지급 시기 측면에서 유사하다.","COD와 D/P는 서류인도방식이라는 공통점이 있다.","송금, 추심결제방식 모두 은행의 지급 확약이 없는 거래이다."],"answer":3},{"section":"무역결제","num":23,"stem":"23. 대금결제와 관련된 내용으로 잘못된 것은?","choices":["화환신용장에 “transferable”이라는 문구가 없더라도 대금양도는 할 수 있 다.","Transfered L/C 거래에서는 하나의 신용장만이 관련된다.","대금결제에서 “acceptance”는 인수라는 의미이며 O/A, D/A, Usance L/C에 서만 사용하는 용어이다.","BWT 거래에서 수출자는 수출대금의 회수가 늦어지고 상품이 판매되지 않을 경우에는 손실을 감수해야 한다."],"answer":3},{"section":"무역결제","num":24,"stem":"24. 우리나라의 은 행 간 외환시장에 관한 설명과 거리가 먼 것은?","choices":["환위험 헤지 목적의 외환거래보다 투기 목적의 외환거래의 비중이 더 크 다.","우리나라 은행 간 외환시장에서는 달러화와 원화, 유로화와 원화의 거래만 이루어지고 있다.","외환시장 참가자는 자국 외환시장 영업시간 이후에도 다른 국가, 지역의 외환시장을 통해 24시간 거래를 할 수 있다.","특정한 거래소가 존재하지 않는 장외시장(over-the-counter market)이다."],"answer":2},{"section":"무역결제","num":25,"stem":"25. ㈜대한전자는 보유하고 있는 유로화를 달러화로 환전해 달러화 수입대금을 결제하려고 한다. 국내 여 러 은행이 제시하는 EUR/USD 환율이 아래와 같 다면 ㈜대한전자는 어느 은행에서 어떤 환율로 환전하는 것이 가장 유리한 가? 단, 은행의 수수료는 없다. EUR/USD 은행명 매입 률(bid) 매도율( offer) A은행 1.1450 1.1470 B은행 1.1435 1.1455","choices":["A은행과 1.1450으로 거래","A은행과 1.1470으로 거래","B은행과 1.1435로 거래","B은행과 1.1455로 거래"],"answer":1},{"section":"무역결제","num":26,"stem":"26. 외환시장의 상황이 다음과 같을 때 USD/KRW의 3개월 만기 선물환율은? (단, 1년은 360일, 3개월은 90일로 가정) USD/KRW USD/KRW 현물환율 1,300.00 USD 금리 5.5% (연율) KRW 금리 3.5% (연율)","choices":["1,287.00원","1,293.50원","1,306.50원","1,313.00원 현물환율과 3개월 스왑 레이트는 다음과 같"],"answer":2},{"section":"무역결제","num":27,"stem":"27. 서울 외환시장에서 USD/KRW의 이 고시되고 있다. 이 경우에 스왑 레이트 및 선물환율에 관한 설명으로 잘 못된 것은? USD/KRW 매입 률(bid) 매도율( offer) 현물환율 1,230.00 1,235.00 3개월 스왑 레이트 100 80","choices":["달러화는 선물환율이 디스카운트이고, 원화는 선물환율이 프리미엄이다.","스왑 레이트로 판단할 때 달러화의 금리가 원화의 금리보다 높다.","3개월 선물환율을 산출하면 매입률은 1,231.00, 매도율은 1,235.80이 된다.","스왑 레이트는 두 통화 간의 금리 차이와 결제일까지의 기간을 반영하여 산출된다."],"answer":3},{"section":"무역결제","num":28,"stem":"28. 선물환 거래에 관한 설명으로 잘못된 것은?","choices":["스왑 레이트는 선물환율과 현물환율의 차이를 말한다.","거래일(deal date)은 거래 쌍방이 환율, 거래 규모, 매매의 방향, 결제일 등 의 거래조건에 합의하는 날이다.","신용도를 불문하고 모든 계약에 대해 증거금을 적립한다.","현재 합의한 환율로 미래의 일정 시점에 인수도 할 것을 약속하는 계약을 현재 체결한 후, 일정 기간이 지나서 결제 시점에 이르면 당초 계약조건에 따라 결제가 이루어진다."],"answer":3},{"section":"무역결제","num":29,"stem":"29. 행사가격이 1,250원인 달러 콜옵션의 프리미엄은 40원이다. 현재 USD/KRW 현물환율이 1,230원일 때 이 콜옵션의 상태 및 내재가치와 시 간가치를 각각 올바르게 표시한 것은? 옵션의 상태 내재가치 시간가치 ⓐ 외가격(out of the money) -20원 +60원 ⓑ 등가격(at the money) +20원 +20원 ⓒ 내가격(in the money) 0원 +40원 ⓓ 외가격(out of the money) 0원 +40원","choices":["ⓐ","ⓑ","ⓒ","ⓓ"],"answer":4},{"section":"무역결제","num":30,"stem":"30. 다음의 보기에서 ㈜대한무역이 구사하고 있는 환위험관리 전략은 무 인가? 엇 합판 수출업체인 ㈜대한무역은 해외에서 원목 100만 달러어치를 수입해 국내 에서 합판으로 가공, 생산하여 수출한다. 원목 구매에 따른 수입대금은 3개월 및 6개월 후에 각각 50만 달러씩 지급하는 조건이다. 이에 ㈜대한무역은 수출 로 회수되는 대금의 통화를 수입대금의 통화와 동일한 달러로 하고 수출대금 을 각각 3개월 및 6개월 후에 받을 수 있도록 계약하였다.","choices":["Netting","Portfolio management","Leading and lagging","Matching"],"answer":4},{"section":"무역계약","num":1,"stem":"1. 다음 내용에 맞는 무역계약의 법적 성격으로 올바른 것은? 계약의 성립 에 따라 수출자는 물품인도 의무를 부담하고, 수입자는 대금지 급 의무를 부담하게 된다.","choices":["낙성계약","쌍무계약","유상계약","불요식계약 ncoterms 2020의 분류 및 설명으로 올바른 것은?"],"answer":2},{"section":"무역계약","num":2,"stem":"2. Incoterms 2020의 조건에 관한 설명으로 잘못된 것은?","choices":["FOB 조건은 해상 및 내수로 운송방식에만 사용된다.","CFR 조건은 매도인이 적하보험을 부보해야 한다.","DDP 조건은 매도인이 도착지에서 물품을 양하할 의무가 있다.","EXW 조건은 적출지의 지명을 표기할 필요가 없다. 예"],"answer":1},{"section":"무역계약","num":3,"stem":"3. 다음 시의 수출자와 수입자가 제안하는 I ncoterms 2020 조건을 옳게 설명 한 것은? 우리나라 수출자 A는 미국 수입자 B와 식료품 수출조건을 협의 중이다. 수입 자 B는 수출자 A가 미국 내 목적지 도착까지 모 든 운송비 및 수입통관까지 부담하기를 희망 만 현 한다. 하지 수출자 A는 지 수입통관에 부담을 미국 느껴 내 목적지 도착까지 모 든 운송비에 목적지의 화물 양 하까지 부담하되,직접 수입통관은 수입자 B가 직접 담당해 것을 줄 한다.희망","choices":["수출자 DDP, 수입자 DPU","수출자 DPU, 수입자 DDP","수출자 DAP, 수입자 DDP","수출자 DDP, 수입자 DAP ncoterms 2020의 EXW 조건에 관한 내용으로 잘못된 것은?"],"answer":2},{"section":"무역계약","num":4,"stem":"4. Incoterms 2020의 EXW(공장인도) 조건에 관한 설명으로 잘못된 것은?","choices":["한국에서 화물을 수출할 경우, 국내의 지정장소(공장이나 창고 등)에서 화물 을 수입자에게 인도하면 책임이 종료되는 조건이다.","수출자는 수출통관 절차의 비용을 부담하지는 않지만, 수출통관은 자기 책 임하에 완료해야 한다.","수출에 필요한 운송비를 수입자가 부담한다.","Incoterms 2020의 11개 조건 중 수출자의 의무가 가장 가볍다."],"answer":2},{"section":"무역계약","num":5,"stem":"5. I ncoterms 2020의 역할 및 사용 방법에 관한 설명으로 올바른 것은?","choices":["Incoterms는 최신 version이 적용되는 것이 원칙이므로 “CIF Shanghai”라 고 기재되어 있을 경우 “CIF Shanghai Incoterms 2020”과 동일하게 인정 되고 적용된다.","DPU에서 지정장소는 인도장소이자 목적지이므로 매도인은 그 지점까지 운 송해야 한다. 이런 지정장소를 명확히 하기 위해 “517, Yeongdong-daero, Gangnam-gu, Seoul, Korea, Incoterms 2020”과 같이 주소를 기재하는 것 도 가능하다.","계약 당사자들이 대금지급 장소를 합의하지 않은 경우 이 규칙의 지정장소 는 대금지급 장소 역할을 한다. 또한 이 규칙은 무체물에는 적용되지 않고 유체물 국제매매거래에 적용되며, 지식재산권 관련 사항이 규정되어 있다.","Incoterms 2020은 가격조건, 운송 및 해상보험 관련 사항을 포함하는 포괄 적 계약조건이므로 매도인과 매수인이 계약을 체결하지 않더라도 특정 규 칙의 사용에 합의하면 이 규칙이 매매계약을 대신한다."],"answer":2},{"section":"무역계약","num":6,"stem":"6. Vienna Convention(1980)에서 규정하고 있는 매수인의 계약해제권에 관한 설 명 중 잘못된 것은?","choices":["매수인은 매도인의 본질적 계약위반이 있을 경우 계약을 해제할 수 있다.","매수인이 설정한 계약이행을 위한 추가기간 내에 매도인이 물품인도 의무를 이행하지 않았을 경우 매수인은 계약을 해제할 수 있다.","계약의 해제(avoidance)는 계약의 효력을 계약 성립 시로 소급하여 소멸시키 는 것이며 이미 이행한 부분에 대해서도 반환을 청구할 수 있다.","분할인도의 경우 이미 행한 인도와 장래의 인도가 상호의존관계에서 어느 분할인도의 불이행으로 계약목적의 달성이 불가능할 때라도, 매수인은 향후 이행해야 할 인도분만 계약해제를 주장할 수 있다."],"answer":4},{"section":"무역계약","num":7,"stem":"7. Vienna Convention(1980)에서 규정하는 청약과 승낙에 관한 설명 중 잘못된 것은?","choices":["청약과 승낙은 모두 계약 성립을 목적으로 하고 있으며 효력 발생 시기로 도달주의를 택하고 있다.","청약의 내용 중 일부를 변경한 내용을 담고 있는 의사표시는 그것이 비록 승낙을 의도한 경우라도 승낙으로 취급되지 아니한다. 다만, 예외적으로 변 경사항이 경미한 경우에는 변경된 내용이 포함된 계약의 성립 가능성 역시 규정하고 있다.","1인 또는 그 이상의 불특정인에 대한 계약체결의 제안은 충분히 확정적이 고, 승낙 시 그에 구속된다는 청약자의 의사가 표시되어 있는 경우에 청약 이 된다.","청약에 유효기간(validity)을 기재하는 등 청약의 유효기간 내에는 이를 취소 하지 않을 것임을 명확히 하는 경우, 청약이 피청약자에게 도달하기 전에는 철회가 가능하다"],"answer":3},{"section":"무역계약","num":8,"stem":"8. 계약위반 및 클레임 등에 관한 설명 중 올바르게 기재된 것은? 능 A. 계약서상 분리가 조항이 없다면 계약 해제 시 손해배상청구권은 존속하 지 만 원상회복 의무는 소멸된다. B. 클레임 사유가 발견되면 먼저 클레임 통지서 발송 후 공인된 검사기관으 로부터 물품을 검사받아 요구사항을 기재해 클레임 제기장을 발송하는 것이 일반적인 클레임 처리 절차다. C. 품질 결정을 위해 매도인이 견본을 제공하는 경우 계약서에 “similar to sample”보다는 “same as sample”과 같은 표현을 사용하는 편이 매도인 입장에서 적절하다. D. 불가항력조항에서는 불가항력에 따른 선적지연에 대한 면책을 선언하고 있다. 또한 연장된 선적기간을 설정하는 경우가 있는데, 이런 연장된 기 간 중 선적 시에는 손해배상 의무는 없다.","choices":["A, B","A, C","B, D","C, D 발"],"answer":3},{"section":"무역계약","num":9,"stem":"9. 신규개 품이나 판매 부진 물품을 청약할 때 쓰일 수 있는 청약으로 올바른 것은?","choices":["Offer subject to being unsold","Offer on sale or return","Sub-con offer","Offer without engagement"],"answer":2},{"section":"무역계약","num":10,"stem":"10. 무역계약 조건 가운 데 품질결정 시기에 관한 설명 중 내용이 다른 하나는?","choices":["매도인이 선적 시에 매매계약에서 약정한 품질과 일치하는 물품을 인도하 며, 인도 이후의 변질에 대해 매도인은 면책된다.","매도인은 선적지 소재의 검사기관에서 발행한 품질증명서, 검사증명서를 발 급받아 매수인에게 제공한다.","TQ 조건은 “just as they come”의 뜻을 지닌다.","운송 중 파손에 대해 매도인이 책임을 지는 조건이다. 질"],"answer":4},{"section":"무역계약","num":11,"stem":"11. 무역계약의 품 조건에 관한 설명으로 잘못된 것은?","choices":["FAQ: 동종 생산물 가운데 대체로 중간 정도의 품질에 해당하는 것을 인도 하기로 약정","Sales by sample: 최초에 제공한 sample과 동일한 품질로 인도하기로 약정","USQ: 미국의 공산품 품질기준에 맞게 제작한 제품을 인도하기로 약정","GMQ: 목재류, 냉동어류 등 잠재하자의 가능성이 많은 제품에 적용하는 품 질 조건 민"],"answer":3},{"section":"무역계약","num":12,"stem":"12. 대한 국 A사는 호주 B사로부터 철광석 10톤을 수입하기로 매매계약을 체 결하였다. 다음의 관련 내용 중 잘못된 것은?","choices":["신용장상에 수량조건을 표기할 때 ± 5% tolerance 조항을 합의하지 않았 을 때도 선적 시에 ± 5% 범위에서 선적할 수 있다.","본 계약에 따라 진행되는 선적의 형태는 bulk cargo shipment이다.","화환신용장 거래 시 철광석 거래에는 통상 M/L clause가 적용된다.","철광석 제품의 품질조건에 적당한 것은 sales by specification이다."],"answer":4},{"section":"무역계약","num":13,"stem":"13. 무역계약의 조건 중 선적조건에 대한 설명으로 올바른 것은?","choices":["화환신용장에 선적기간이 “on or about January 20”과 같이 기재된 경 우, 선적기간은 늦어도 1월 20일까지이다.","분할선적이 금지되고 선적항이 부산항으로 명시된 화환신용장상 동일한 선 박에 인천항(1월 20일)과 부산항(1월 30일)에서 각각 선적한 경우, 나중에 선적한 1월 30일이 선적일로 간주되며 이는 분할선적이 아니다.","항공화물운송장의 발행일을 선적일로 취급하므로 발행일과 다른 별도의 비 행일자 부기일은 선적일로 취급하지 않는다.","선적항을 부산으로 규정한 화환신용장에서 인천항부터 부산항까지 A 선박 으로 운송 후 다시 부산항에서 B 선박으로 옮기면 환적에 해당한다."],"answer":2},{"section":"무역계약","num":14,"stem":"14. 다음의 무역계약서 내용을 규정하고 있는 조항은 무 인가? 엇 T his Agreement may be executed in English and in other languages(including Korean). In the event of any difference or inconsistency among different versions of this Agreement, the English version shall prevail over in all respect.","choices":["Entire agreement clause","Assignment clause","Limit of liability clause","Conflict clause"],"answer":4},{"section":"무역계약","num":15,"stem":"15. 다음 무역계약서의 일반조항 중에서 제목이 올바른 것으로 만 기재된 것은? (A) Assignment Neither party may assign or transfer any of its rights or obligations under this Contract or any part thereof without the prior written consent of the other party. (B) Confidentiality T he parties shall keep strictly private and confidential any information relating to this Contract or any transaction or dealings between them pursuant to this Contract. (C) Non-waiver No failure on the part of either party to exercise, and no delay on its part in exercising, any right or remedy under this Contract wil operate as a waiver thereof, nor wil any single or partial exercise of any right or remedy preclude any other or further exercise thereof or the exercise of any other right or remedy. (D) Claims T his Contract supersedes all previous agreements and understandings between the parties with respect to the sale and purchase of Product, and may not be modified except by a written document which expressly states the intention of the parties to modify this Contract, and signed by the duly authorized representatives of the parties.","choices":["A, B, C","A, B, D","A, C, D","B, C, D"],"answer":1},{"section":"무역계약","num":16,"stem":"16. 무역계약의 Liquidated damages에 관한 설명으로 잘못된 것은?","choices":["손해배상액예정조항이라고 한다.","계약 위반인 경우에 지급 혹은 청구할 수 있는 손해배상액을 계약체결 시 미리 약정하는 조항이다.","이 조항을 약정한 경우, 피해당사자는 손해액을 입증하지 않아도 된다.","약정된 금액보다 더 큰 손해가 발생되었음을 입증하는 경우, 약정액보다 더 많은 금액을 청구할 수 있다."],"answer":4},{"section":"무역계약","num":17,"stem":"17. 무역계약의 종류에 관한 설명으로 잘못된 것은?","choices":["개별계약은 최초 거래할 때나 거래가 1회로 종결될 때 주로 사용한다.","중장기연불방식에 의한 수출입 등 거래내용이 복잡할 때 포괄계약이 사 용된다.","포괄계약은 무역거래의 준칙으로서 일반거래조건협정서를 체결하고 포괄 계약서에 정한 방법에 따라 주문과 승낙으로 계약조건을 확정한다.","정형화된 계약조항을 가리켜 GTC라는 용어를 사용한다. 쟁 방"],"answer":2},{"section":"무역계약","num":18,"stem":"18. 무역계약의 분 해결 법 중에서 조정과 중재에 관한 설명으로 올바른 것 은?","choices":["당사자들이 분쟁해결방법으로 중재를 선택하는 경우, 별도 중재합의문을 작 성하더라도 계약서에는 반드시 중재조항을 삽입해 중재합의가 있었음을 명 시하여야 한다.","조정은 선정된 조정관이 제시한 조정안을 양 당사자가 받아들여 조정이 성 립되면 법원의 확정판결과 동일한 효력을 가진다. 양 당사자는 제시된 조정 안을 수용할 의무가 있다.","중재판정은 법원의 확정판결과 동일한 효력을 가진다. 이런 중재판정은 국제협약에 따라 외국에서 강제집행이 보장되므로 대한상사중재원의 중 재판정 역시 어느 국가든지 외국에서 강제집행이 가능하다.","중재합의는 분쟁 발생 전에 할 수 있고 발생 이후라도 합의를 통한 중재 로 분쟁 해결이 가능하다."],"answer":4},{"section":"무역계약","num":19,"stem":"19. 상사중재에 관한 설명으로 올바른 것을 모 두 기재한 것은? 심 므 심 쟁 A. 중재는 단 제이 로 3 제인 소송보다 분 해결 기간이 짧다. B. 중재합의가 있더라도 항상 소송이 가능하다는 것이 장점이다. C. 중재합의는 반드시 사전에 합의해야 하며, 꼭 서면일 필요는 없다. D. 국제물품매매계약에 관한 유엔협약에 의해 외국중재판정의 승인이나 집 행은 보장되고 있어 법원의 확정판결과 중재판정의 효력은 차이가 없다. E. 중재합의의 3요소는 중재지, 중재기관, 준거법이다.","choices":["A, B, D","A, C","A, E","B, C, D, E"],"answer":3},{"section":"무역계약","num":20,"stem":"20. Vienna Convention(1980)을 준거법으로 하여 계약을 체결하는 경우 계약이 성립되는 승낙을 모두 기재한 것은? A. 피청약자가 승낙을 하면서 가급적이면 한국산 재료를 사용해줄 것을 요청 했고, 청약자는 이에 대해 아무런 회신을 하지 않았다. B. 청약서상에 “유효기일 이내에 피청약자의 답이 없으면 승낙으로 간주한다” 고 기재되어 있고 피청약자는 아무런 답을 하지 않았다. C. 피청약자가 승낙을 하면서 결제조건을 Open account 60 days 조건으로 변 경해 달라고 요청했다. D. 피청약자가 청약서의 유효기일을 넘겨서 청약자에게 승낙을 통지했고, 청약 자는 신속하게 피청약자에게 그 늦은 승낙을 받아들인다는 통지를 했다. E. 피청약자가 승낙을 하면서 가격을 USD 80/Box로 낮춰 달라고 요청했고, 청약자는 이에 바로 동의했다.","choices":["A, B, D","B, C, E","A, D, E","B, C, D 행"],"answer":3},{"section":"무역계약","num":21,"stem":"21. 무역계약의 체결 및 이 과 관련된 다음 설명 중 잘못된 것은?","choices":["수입자가 주문과 함께 승낙의 방법을 지정한 경우, 수출자가 그 방법을 이 용하지 않고 임의로 선택한 방법을 사용하여 승낙 의사를 표시했다면 승낙 으로 취급되지 못한다.","OEM 수출 등 다양한 거래에서 상표권 침해 등의 클레임 발생에 대비하여 포함시키는 조항이 infringement clause이다.","수출자의 청약서에 포함된 단가보다 낮게 기재해 승낙서를 발송한 이후 다 시 당초의 단가로 구매하겠다는 취지의 서신을 보낸다면 원칙적으로 계약 은 성립되지 않는다.","DAP 조건의 경우 목적지에 도착한 운송수단에서 물품을 양하할 때 소요되 는 비용을 수출단가에 포함시켜야 한다."],"answer":4},{"section":"무역계약","num":22,"stem":"22. 미국 ABC C orp.가 한국 XYZ Co., Ltd. 앞으로 발행한 청약서이다. 분쟁이 발생할 수 있는 조항을 모두 기재한 것은? H OFFER S EET S eller: ABC Corp. (A) . Buyer: XYZ Co., Ltd. (B) . Quality: To be the same as the sample provided by the Seller Commodity \u0026 Descriptions : Rice (C) . Quantity: 1,000 Tons (D) . Shipping port: New York port, USA Destination: Busan port, Korea (E) . Price: FOB New York port unit price USD 100.00/Ton, Total USD 100,000 (F) . Shipment: Within 60 days after the date of this offer","choices":["A, B, F","B, C, E","C, D, E","C, E, F"],"answer":2},{"section":"무역계약","num":23,"stem":"23. 물류 관련 용어에 관한 설명으로 잘못된 것은?","choices":["R/T: 중량과 용적 중 운임이 높은 쪽이 실제 운임으로 결정되는 톤 단위","Berth term 운임: 선적 및 양하비용을 선주가 부담하는 하역조건","BAF: 운임표시 통화의 가치 하락에 따른 손실을 보전하기 위한 할증료","Detention charge: 화주가 컨테이너 또는 트레일러를 대여받았을 경우 규정 된 기간 내에 반환을 못할 때(앞에 ‘경우’가 나와 교체) 부과되는 벌과금 LL"],"answer":3},{"section":"무역계약","num":24,"stem":"24. C 수출화물의 운송업무 순서로 올바른 것은? 배 A. 화주는 수 한 트 에 화물을 럭 싣고 지정된 CFS에 반입시킨다. 이때 화주 는 반드시 포장명세서를 트럭기사편으로 CFS 담당자에게 전달한다. B. 화주는 포워더에게 선적을 의뢰한다. 선적의뢰 시 선적요청서, 상업송장, 포장명세서 및 수출신고필증 사본 등을 제출한다. C. 컨테이너 문을 닫고 sealing을 한 후 지정된 CY에 입고시킨다. D. 포워더는 결정된 선적일정에 따라 선사에 booking을 하고 혼재를 위한 공 컨테이너 투입을 요청한다. E. CFS에 입고된 화물에 대하여 tally, measuring, weighing 등을 실시하고 컨 테이너 적입표(CLP)에 따라 화물을 적입한다.","choices":["A – B – D – E – C","B – D – A – E – C","C – B - A – D – E","D – E – A – B – C"],"answer":2},{"section":"무역계약","num":25,"stem":"25. 컨테이너 운송에 관한 설명 중 잘못된 것은?","choices":["컨테이너 운송의 FCL 수출절차는 통상 container door, container stuffing, container sealing, deliver at off dock CY or on dock CY, on board 순서로 이루어진다.","CSC 협약이란 컨테이너가 국경을 통과할 때 발생하는 관세 및 통관 문제의 해결을 위해 제정된 컨테이너에 관련된 국제협약이다.","컨테이너는 미국에서 철도운송을 위한 육상운송 용구로 개발되어 발전되었 다.","CFS/CFS는 선적항의 CFS에서 목적항의 CFS까지 컨테이너에 의해서 운송되 는 LCL화물의 가장 기본적인 컨테이너 운송방식이다."],"answer":2},{"section":"무역계약","num":26,"stem":"26. 선하증권에 관한 내용을 설명한 것 중에서 잘못된 것은?","choices":["선하증권은 화물수취증과 운송계약서 및 권리증권으로서의 기능을 갖고 있 다.","Switch B/L은 중계무역을 할 때 통상 발행하는 선하증권으로 물품 공급지 국가에서 발행되었던 원본 선하증권을 구매자가 받은 후 해당 선하증권 원 본을 구매자가 지정한 운송인에게 제출하고 바이어와의 무역계약에 의한 내 용대로 새로 발급받는 선하증권이다.","Letter of Indemnity는 화주가 무사고 선하증권을 발급받고자 할 때 운송사 에 제출하는 서식이다.","선하증권에는 해상위험에 관한 약관은 없다. o Ltd"],"answer":4},{"section":"무역계약","num":2 var _D56=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하는 수출로 인정되는 사례로 올바른 것은?","choices":["인도네시아 자카르타에서 올리브 기름을 구입하여 중국 상하이의 상인에게 무상 으로 인도한 경우","우리나라 국제무역전시장에서 외국인이 한국인에게 외화를 지급하고 식품 견본 을 받아 현장에서 소비한 경우","한국의 A사가 미국 B사와 매매계약을 체결하고 미국 B사 한국지점에 물품을 납 품하고 원화로 대금을 영수한 거래","거주자가 한국 내에 체류 중인 비거주자에게 휴대용 노트북에 저장된 소프트웨 어를 인터넷으로 전송하고 미화 5만 달러를 영수한 경우"],"answer":4},{"section":"무역규범","num":2,"stem":"2. 대외무역법에서 규정한 우리나라의 통상진흥 시책 및 지원에 관한 설명 중 잘못된 것은?","choices":["산업통상자원부장관은 무역‧통상 진흥을 위해 매해 다음 연도의 통상진흥시책을 세우고 전국의 시‧도지사에게 통보한다.","산업통상자원부장관은 기업의 해외 진출 관련 조사 및 종합지원을 위해 대한무 역투자진흥공사(KOTRA)에 해외진출지원센터를 두고 운영한다.","산업통상자원부장관은 우리나라가 체결한 무역에 관한 조약의 이행을 위해 필요 한 때에는 관련 공공기관, 기업 및 단체 등에 필요한 자료의 제출을 요구할 수 있다.","중소기업 제품의 무역거래 활성화를 위해 중소기업자가 전문무역상사를 신청하 는 경우 산업통상자원부장관은 우선 지정하고 해외 판로개척 등에 필요한 사항 을 지원한다."],"answer":4},{"section":"무역규범","num":3,"stem":"3. 대외무역법령에서 규정하고 있는 수출입공고와 통합공고에 관한 설명으로 잘못된 것은?","choices":["수출입공고는 수출 또는 수입의 제한·금지, 승인, 신고, 한정 및 그 절차 등에 관한 사항을 규정한 고시이다.","수출입공고에 따라 수출 및 수입승인을 받은 경우에는 통합공고상에 수출 및 수 입하고자 하는 물품의 수출·수입요령에 따른 요건확인은 면제된다.","통합공고상의 요건확인 물품은 HS에 따라 분류하여 지정함을 원칙으로 한다, 다 만, 무역정책 및 해당 법령의 목적 수행상 필요에 의해 세분류하여 표기할 수 있 다.","통합공고상 1개 물품에 대하여 2개 이상의 법령이 관련되어 요건확인을 받을 것 을 규정하고 있는 경우, 용도 기준으로 된 물품 이외에는 당해 물품에 부과된 2 개 이상의 요건확인을 받아야 한다."],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령상 다음 무역사례의 수출실적 인정금액으로 올바른 것은? 우리나라의 무역상사 A사는 베트남의 B사로부터 냉동식품을 수입하여 국내 보세구 역에 반입한 후, 별도 가공 없이 중국의 C사와 매매계약을 체결한 후 수출하였다.","choices":["수출금액(CIF 가격)에서 수입금액(CIF 가격)을 공제한 가득액","수출금액(CIF 가격)에서 수입금액(FOB 가격)을 공제한 가득액","수출금액(FOB 가격)에서 수입금액(CIF 가격)을 공제한 가득액","수출금액(FOB 가격)에서 수입금액(FOB 가격)을 공제한 가득액"],"answer":3},{"section":"무역규범","num":5,"stem":"5. 대외무역법령에서 규정하고 있는 외화획득에 해당하는 것은?","choices":["한국의 수입자가 해외 전시장을 방문하는 경우","한국의 수입자가 외국에서 물품을 수입하는 경우","한국인으로부터 원화를 받고 국내의 보세지역에 물품 등을 공급하는 경우","한국의 무역거래자가 외국의 수입업자로부터 수수료를 받고 수출을 알선하는 경 우"],"answer":4},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 전략물자의 수출입에 관한 설명으로 잘못된 것 은?","choices":["무역거래자는 전략물자 등의 수출허가, 상황허가, 환적허가, 중개허가에 관한 서 류를 5년간 보관하여야 한다.","전략물자 등을 국내 항만이나 공항을 경유하거나 환적하려는 자는 산업통상자원 부장관이나 관계 행정기관장의 허가를 받아야 한다.","산업통상자원부장관과 관계 행정기관장은 전략물자 등의 이동중지명령 및 이동 중지조치의 기간과 방법에서 국가 간 무허가 수출 등을 막기 위하여 최대한도의 조치를 취해야 한다.","산업통상자원부장관과 관계 행정기관장은 전략물자 등의 무허가 수출 등을 막기 위 하여 긴급하게 그 이동을 제한할 필요가 있으면 적법한 수출이라는 사실이 확인될 때까지 직접 그 이동을 중지시킬 수 있다."],"answer":3},{"section":"무역규범","num":7,"stem":"7. 대외무역법령상 원산지를 특정하기 어려운 중고물품을 수입하는 경우 원산지표시 방법으로 올바른 것은?","choices":["Mixed in 국명","Finished by 국명","Organized in 국명","Imported from 국명"],"answer":4},{"section":"무역규범","num":8,"stem":"8. 대외무역법령상 구매확인서와 내국신용장에 관한 설명으로 올바른 것은?","choices":["내국신용장 또는 구매확인서에 의하여 재화를 공급할 때에는 수출 범위에 해당하 여 부가가치세를 면세 적용한다.","내국신용장이란 한국은행총재가 정하는 바에 따라 외국환은행의 장이 발급하여 국내·국외에서 통용되는 신용장을 말한다.","구매확인서란 외화획득용 원료·기재를 판매하는 사업자가 외국환은행의 장 또는 전자무역기반사업자로부터 발급받아 구매자에게 전달하는 증서를 말한다.","외화획득용 원료·기재의 제조·가공·유통과정이 여러 단계인 경우에는 외국환 은행의 장 또는 전자무역기반사업자는 구매확인서를 단계별로 순차로 발급할 수 있다."],"answer":4},{"section":"무역규범","num":9,"stem":"9. 관세법상 품목분류와 품목분류표에 관한 설명으로 올바른 것은?","choices":["호 아래 5단위 이상은 자국의 실정에 따라 세분류하여 사용할 수 있다.","사전심사 또는 재심사로 품목분류가 결정된 경우의 유효기간은 1년이다.","HS 품목분류표는 물품의 가공도가 높아지는 것에서부터 낮아지는 순서로 분류하 고 있다.","품목분류의 사전심사신청을 할 수 있는 자는 물품을 수출입 하려는 자, 수출할 물 품의 제조자 및 관세사법에 의한 관세사·관세법인·통관취급법인이다."],"answer":4},{"section":"무역규범","num":10,"stem":"10. 관세법령상 아래 사례에 관한 설명으로 올바른 것은? • 수산물(A): 우리나라 선박이 공해상에서 채집하거나 포획한 수산물 • 수산물(B): 중국 선박이 어업허가 없이 우리나라 영해에서 포획한 것을 해양경 찰이 압류한 수산물","choices":["수산물(A), 수산물(B) 모두 수입신고 대상이 아니다.","수산물(A)는 외국물품이고, 수산물(B)는 내국물품이다.","수산물(A)는 관세 면세대상이며, 수산물(B)는 관세 과세대상이다.","원산지표시는 수산물(A)는 “한국산”으로, 수산물(B)는 “중국산”으로 표기해야 한다."],"answer":1},{"section":"무역규범","num":11,"stem":"11. 관세법령상 월별납부제도에 대한 설명으로 잘못된 것은?","choices":["월별납부의 승인을 갱신하려는 자는 관세청장이 정하는 서류를 갖추어 그 유효 기간 만료일 1개월 전까지 신청을 하여야 한다.","납부기한이 동일한 달에 속하는 세액을 월별로 일괄하여 납부하려는 자는 납세 실적 및 수출입실적 관련 서류 등 관세청장이 정하는 서류를 갖추어 세관장에게 승인을 신청하여야 한다.","세관장은 월별납부의 승인을 신청한 자가 관세청장이 정하는 요건을 갖춘 경우, 세액의 월별납부를 승인하여야 한다. 이 경우 승인의 유효기간은 승인일부터 그 후 2년이 되는 날이 속하는 달의 마지막 날까지로 한다.","세관장은 납세의무자가 관세를 납부기한이 지난 날부터 15일 이내에 납부하지 아니하여 월별납부의 승인을 취소한 경우 월별납부의 대상으로 납세 신고된 세 액에 대해서는 30일 이내의 납부기한을 정하여 납부고지해야 한다."],"answer":4},{"section":"무역규범","num":12,"stem":"12. 관세법상 관세의 과세물건, 과세표준, 관세율, 납세의무자에 관한 설명으로 잘못 된 것은?","choices":["과세표준은 수입물품의 가격 또는 수량이다.","과세물건은 수입물품과 수출물품이며, 유체물만 해당한다.","기본세율과 잠정세율은 관세법의 별표 관세율표에 따르되 잠정세율은 기본세율 에 우선하여 적용한다.","수입신고를 한 물품의 원칙적인 납세의무자는 수입화주이나, 수입신고 전에 양도 한 경우에는 그 양수인이 납세의무자이다."],"answer":2},{"section":"무역규범","num":13,"stem":"13. 다음 사례에서 관세법령상 외국물품에 대한 관세 등의 납세의무자로 올바른 것 은? • 무역상사(A)는 ㈜KITA로부터 외국물품 수입을 위탁받았다. • 외국물품에 대한 수입신고는 관세법인(B)에서 진행하기로 하였다. • 수입신고 전 외국물품을 보세창고(C)로 이동하기 위해 보세운송업체(D)가 보세운송 신고 후 보세운송을 진행하였다. • 보세창고(C) 도착 후 확인한 결과, 외국물품이 보세운송 중 분실되었다.","choices":["무역상사(A)","관세법인(B)","보세창고(C)","보세운송업체(D)"],"answer":4},{"section":"무역규범","num":14,"stem":"14. 관세법상 관세의 과세가격 결정 시 보험료의 가산에 관한 설명으로 올바른 것은?","choices":["보험료는 수입물품에 대하여 실제 보험에 부보된 경우에만 과세가격에 가산한다.","수입 시 보험에 가입하지 않았으면 동종·동질물품을 수입할 때 부보하는 통상적 인 보험료를 가산한다.","수입물품과 관련된 보험료는 해상보험료와 우리나라에서 국내운송에 따른 보험료 를 구분하지 않고 모두 과세한다.","수입물품을 항공으로 운송하면서 지급한 보험료가 해상운송과 비교하여 상대적으 로 낮은 경우 해상운송에 따른 보험료로 산정하여 과세한다."],"answer":1},{"section":"무역규범","num":15,"stem":"15. 다음 사례에서 관세법상 과세가격 결정원칙에 따라 산출한 과세가격으로 올바른 것은? • 송품장(Invoice) 가격: CIF USD 30,000 (연불이자 USD 1,500 포함됨) • 수입자가 별도 지급한 중개수수료: USD 3,000","choices":["USD 28,500","USD 30,000","USD 31,500","USD 33,000"],"answer":3},{"section":"무역규범","num":16,"stem":"16. 관세법상 ㈜KITA의 수입물품에 대해 신고납부한 사실이 다음과 같은 경우 ㈜ KITA가 즉시 조치할 수 있는 사항으로 올바른 것은? • 2023년 3월 20일: 수입신고 • 2023년 3월 21일: 세액납부 • 2023년 5월 22일: 별도 지급한 권리사용료를 과세가격에 누락한 사실 확인","choices":["세액정정","세액보정","수정신고","경정청구"],"answer":2},{"section":"무역규범","num":17,"stem":"17. 관세법령상 수입신고수리 전 세액심사 대상 물품이 아닌 것은?","choices":["관세를 월별납부하고자 하는 물품","관세를 체납하고 있는 자가 신고하는 물품(체납액 10만 원)","조약에 의하여 관세 또는 내국세를 감면받고자 하는 물품","납세자의 성실성 등을 참작하여 관세청장이 정하는 기준에 해당하는 불성실신고 인이 신고하는 물품"],"answer":1},{"section":"무역규범","num":18,"stem":"18. 다음 중 관세법령상 가산세 부과 사유에 해당하지 않는 것은?","choices":["법정납부기한까지 납부하지 아니한 관세액을 징수하는 경우","수입신고를 하지 아니하고 수입한 물품에 대하여 관세를 부과·징수하는 경우 (천재지변 등 정당한 사유가 있는 경우는 제외)","수입하거나 반송하려는 물품을 지정장치장 또는 보세창고에 반입하거나 보세 구역이 아닌 장소에 장치한 자가 그 반입일 또는 장치일부터 30일 이내에 신 고하지 아니한 경우","유통이력 신고의 의무가 있는 자가 유통이력을 거짓으로 신고한 경우"],"answer":4},{"section":"무역규범","num":19,"stem":"19. 다음 사례에서 관세법상 수입 시 납부하여야 할 관세액으로 올바른 것은? (각 관 세율 적용에 필요한 요건은 모두 충족함) 수입물품 기본관세율 WTO관세율 덤핑방지관세율 조정관세율 과세가격 (A) (C) (I) (L) 1,000,000원 8% 5% 30% 7%","choices":["50,000원","70,000원","300,000원","350,000원"],"answer":4},{"section":"무역규범","num":20,"stem":"20. 관세법령상 다음 괄호 안에 들어갈 기간으로 올바르게 나열한 것은? • 납세의무자는 신고 납부한 세액 및 수정신고한 세액이 과다한 것을 알게 되었을 때는 최초로 납세신고를 한 날로부터 ( A ) 이내에 신고한 세액의 경정을 세관 장에게 청구할 수 있다. • 세관장은 경정의 청구를 받은 날로부터 ( B ) 이내에 세액을 경정하거나 경정 하여야 할 이유가 없다는 뜻을 그 청구를 한 자에게 통지하여야 한다.","choices":["A: 3년, B: 6개월","A: 5년, B: 6개월","A: 3년, B: 2개월","A: 5년, B: 2개월"],"answer":4},{"section":"무역규범","num":21,"stem":"21. 관세법령상 여행자 휴대품 및 이사물품 등의 감면에 관한 내용으로 잘못된 것은?","choices":["여행자가 여행자 휴대품을 자진 신고하는 경우에는 20만 원을 넘지 아니하는 범 위에서 해당 물품에 부과될 관세의 100분의 15에 상당하는 금액을 경감할 수 있 다.","해외 이사물품 중 별도로 수입하는 물품은 천재지변 등 부득이한 사유가 있는 경우를 제외하고는 입국자가 입국한 날부터 6월 이내 도착한 경우만 이사물품 감면대상이다.","여행자 휴대품의 관세면제 한도는 여행자가 통상적으로 몸에 착용하거나 휴대할 필요성이 있다고 인정되는 물품으로서 각 물품의 과세가격의 합계 기준으로 미 화 800달러 이하이다.","여행자 휴대품의 관세면제 한도와 관계없이 술은 2병까지 관세를 면제할 수 있 다. 단, 19세 이상의 사람이 구매한 것으로 2병 합산하여 용량이 2리터 이하이 고 가격은 미화 400달러 이하인 경우에만 면제된다."],"answer":1},{"section":"무역규범","num":22,"stem":"22. 관세법상 특허보세구역 중 보세공장에 관한 설명으로 잘못된 것은?","choices":["외국물품을 원료로 제조·가공하여 생긴 물품을 외국으로 수출하는 경우 수출신 고가 생략된다.","외국물품을 원료로 제조·가공한 후 생긴 물품을 국내로 반입하는 경우 세관에 수입신고를 하여야 한다.","외국물품을 원료로 하거나 외국물품과 내국물품을 원료로 하여 제조·가공하거나 그 밖에 이와 비슷한 작업을 하는 보세구역이다.","외국물품을 원재료로 하여 항공기에 탑승하거나 탑승 대기하는 승무원 및 승객에 게 제공할 기내식을 제조·가공하는 보세공장을 기내식 보세공장이라 한다."],"answer":1},{"section":"무역규범","num":23,"stem":"23. 다음 외국물품 중 관세법상 보세구역이 아닌 장소에 장치할 수 없는 것은?","choices":["검역물품","압수물품","수출신고가 수리된 물품","지식재산권 침해 우려가 있는 물품"],"answer":4},{"section":"무역규범","num":24,"stem":"24. 관세법령상 심사청구 및 심판청구에 관한 설명으로 올바르게 짝지어진 것은? A. 동일한 처분에 대해서는 심사청구와 심판청구를 중복하여 제기할 수 없다. B. 관세법상 통고처분의 처분에 대해서는 처분의 취소 또는 변경을 요구하는 심사청 구를 할 수 없다. C. 감사원법에 따른 심사청구는 그 처분을 한 것을 안 날부터 또는 처분 통지를 받은 날부터 90일 이내에 하여야 한다. D. 관세법상 규정에 따른 심사청구 또는 심판청구에 대한 처분에 대해서는 이의신청, 심사청구 또는 심판청구를 제기할 수 없다.","choices":["A","B, D","B, C, D","A, B, C, D"],"answer":4},{"section":"무역규범","num":25,"stem":"25. 관세환급특례법상 관세환급 대상 수출에 해당하지 않는 것은?","choices":["주한미군에 외화를 받고 판매한 물품","외국무역선에 선용품으로 공급한 물품","보세공장에서 수출물품을 제조하는 기계에 사용되는 소모용 윤활유의 공급","관세환급 대상 물품을 추심결제 방식에 의해 수출하였으나 그 대금을 회수하지 못한 수출"],"answer":3},{"section":"무역규범","num":26,"stem":"26. 관세환급특례법령상 다음 괄호에 들어갈 용어로 올바르게 짝지어진 것은? 세관장은 수출용 원재료가 내국신용장 등에 의하여 거래된 경우, 관세 등의 환급업무를 효율적으로 수행하기 위하여 제조 가공 후 거래된 수출용 원재료에 대한 납부세액을 증명하는 서류 ( A ) (을)를 발급하거나 수입된 상태 그대로 거래된 수출용 원재료에 대한 납부세액을 증명하는 서류 ( B ) (을)를 발급할 수 있다.","choices":["A: 평균세액증명서 B: 수입신고필증","A: 수입세액분할증명서 B: 평균세액증명서","A: 기초원재료납세증명서 B: 수입세액분할증명서","A: 수입신고필증 B: 기초원재료납세증명서"],"answer":3},{"section":"무역규범","num":27,"stem":"27. 관세환급특례법령상 다음 설명에 해당하는 자율소요량 산정방법은? • 소요량은 수출물품 1단위를 분해하여 실측한 원재료의 종류별 양이다. • 장점은 산정방법이 간단하고, 손모량에 대한 논란이 없다. • 단점은 손모량 부분에 대한 환급을 포기해야 한다. • 전기, 전자제품 조립업체에 적합하다.","choices":["단위실량 산정방법","단위설계소요량 산정방법","수출건별 총소요량 산정방법","일정기간별 단위소요량 산정방법 저 임 출전국 중 현재 우리나라와 FTA가 발효된 국"],"answer":1},{"section":"무역규범","num":28,"stem":"28. 2023년 개최된 항 우 아시안 게 가만 나열한 것은?","choices":["중국, 베트남, 네팔, 캄보디아","일본, 브루나이, 태국, 말레이시아","필리핀, 방글라데시, 싱가포르, 인도","인도네시아, 라오스, 미얀마, 우즈베키스탄 협"],"answer":2},{"section":"무역규범","num":29,"stem":"29. 자유무역 정(FTA)관세법령상 다음 순서대로 우리나라에 수입 판매되는 “벌꿀조 H - ” 제품( SK: 2106.90 9091) 의 원산지에 관한 설명으로 올바른 것은? (1) 중국은 아르 헨티나로부터 천연꿀(HSK: 0409.00-0000)을 수입한다. (2) 중국은 아르헨티나로부터 수입한 천연꿀에 화분 등을 첨가하여 만든 벌꿀조제품 (HSK: 2106.90-9091)을 한국으로 수출한다. (3) 벌꿀조제품은 운송의 편의상 필리핀을 단순 경유하여 한국으로 수입된다. (4) 한국에 도착된 벌꿀조제품은 소매용 소포장한 후 국내에 판매된다.","choices":["해당 물품의 마지막 경유지인 필리핀이 원산지 국가이다.","해당 물품을 벌꿀조제품으로 가공한 중국이 원산지 국가이다.","해당 물품의 재료인 천연꿀을 생산한 아르헨티나가 원산지 국가이다.","해당 물품이 소매 포장되고 최종 소비자에게 판매가 이루어진 한국이 원산지 국 가이다. 협"],"answer":2},{"section":"무역규범","num":30,"stem":"30. 자유무역 정(FTA)관세법상 원산지증명서의 발급 방식에 관한 설명으로 잘못된 것은?","choices":["호주: 발급기관이 발급하거나 수출자 또는 생산자가 자율적으로 서면 혹은 전자적 방식으로 작성ㆍ서명","터키: 수출자가 자율적으로 작성ㆍ서명","미국: 수출자, 생산자 또는 수입자가 자율적으로 서면 혹은 전자적 방식으로 작성","칠레: 발급기관이 발급"],"answer":4},{"section":"무역결제","num":1,"stem":"1. 다음 중 환어음이 요구되지 않는 결제 방식을 모두 기재한 것은? A. D/P B. T/T C. Sight L/C D. 연지급 신용장 E. CAD","choices":["A, B, D","A, D, E","B, C, E","B, D, E"],"answer":4},{"section":"무역결제","num":2,"stem":"2. 송금결제 방식에 관한 설명으로 잘못된 것은?","choices":["송금결제 방식에서 수출자는 선적서류를 수입자에게 직접 발송한다.","송금결제 방식을 상품의 선적일을 기준으로 사전송금, 사후송금 두 가지로 구분 한다면 BWT 방식은 사후송금 방식에 해당한다.","A/P Bond는 사후송금 방식의 거래에서 수입자의 위험관리 방안으로 활용된다.","CAD 방식은 선적서류 인도 후에, COD 방식은 물품의 인도 후에 각각 수출채권 이 성립한다."],"answer":3},{"section":"무역결제","num":3,"stem":"3. 송금결제 방식에 관한 설명으로 올바른 것은?","choices":["CWO 거래에서 수입자는 물품을 인도받기 전에 먼저 대금을 송금하기 때문에 신 용위험을 배제할 수 없다.","O/A 거래는 수출자가 수출품 선적을 완료하고 수입자에게 선적 사실을 통지함과 동시에 채권이 발생하는 선적통지부 사후결제 방식이다.","CAD 거래는 고가 상품이나 색상, 가공방법, 순도 등에 따라서 가격 차이가 현저 하게 드러나는 보석, 귀금속 등 고가품을 사고팔 때 주로 활용된다.","외국환거래법에는 사전지급, 동시지급, 사후지급 중 2가지 이상을 혼합한 결제방 식으로는 거래할 수 없도록 규정하고 있다."],"answer":2},{"section":"무역결제","num":4,"stem":"4. 추심결제 방식에 관한 설명으로 잘못된 것은?","choices":["추심의뢰인은 물품을 선적하고 거래은행에 추심을 의뢰하는 수출자로 drawee 라고도 한다.","D/A 방식은 수출자가 기한부 환어음을 발행하고 수입자는 만기일에 대금을 결제 한다는 점에서 Usance L/C와 유사하다.","D/A 방식에서 수입자는 환어음에 대한 지급의 약속으로 인수(acceptance)를 함으 로써 선적서류를 인도받는다.","추심의뢰은행(remitting bank)은 접수된 서류가 계약 내용과 일치하는지를 확인할 의무가 없다."],"answer":1},{"section":"무역결제","num":5,"stem":"5. 추심결제 방식의 특징에 관한 설명 중 올바른 것으로만 연결된 것은? / A. D A 방식으로 거래할 때 매수인은 인수행위를 통해 선적서류를 인도받은 후 만기일에 수입대금을 추심의뢰은행에 지급하여야 한다. B. O/A는 수입자의 지급지연이 발생하는 경우 은행에 신용기록이 남지 않는다는 측면에서 D/A보다는 수입자에게 유리하다고 볼 수 있다. C. 추심의뢰은행은 추심은행이 송부한 서류를 지급인에게 제시하고 지급받은 대금을 추심은행으로 송금하는 수입국의 은행이다. D. D/P 방식의 거래에서 매수인은 대금 지급을 완료해야만 선적서류를 인도받을 수 있으므로 환어음의 만기일에 대금이 회수되는 D/A 방식보다 매도인에게 유리하다. E. 추심결제 방식과 신용장결제 방식 모두 수출자가 발행하는 환어음상의 지급인은 은행으로 표기되어야 한다.","choices":["A, B","B, C","B, D","D, E"],"answer":3},{"section":"무역결제","num":6,"stem":"6. 화환신용장 결제방식에 관한 설명으로 잘못된 것은?","choices":["개설의뢰인은 신용장의 개설이나 조건 변경에 관하여 지시를 모호하게 함으로 써 발생하는 위험을 부담한다.","신용장을 사용하면 수출자는 대금회수가 보장되며, 수입자는 상품을 반드시 수 취할 수 있다는 보장이 있다.","Sight 조건은 서류와 교환으로 대금을 지급한다는 점에서 송금방식 중 CAD 조 건, 추심방식 중 D/P 조건과 동일하다.","개설은행은 신용장의 필수 부분으로 무역계약서의 사본 혹은 견적송장 등을 포함시키고자 하는 개설의뢰인의 시도를 저지해야 한다."],"answer":2},{"section":"무역결제","num":7,"stem":"7. 신용장의 종류와 관련한 설명으로 잘못된 것은?","choices":["UCP 600에서는 연지급은행으로 지정받은 지정은행이 연지급신용장에 따라 수 익자에게 신용장 대금을 선지급하는 것을 인정하지 않고 있다.","지급신용장(Payment L/C)은 환어음을 요구하지 않는다.","ISP 98이 적용되는 보증신용장은 독립성 원칙과 추상성 원칙이 적용된다.","확인신용장에서 확인은행이 매입하더라도 상환청구권(recourse right)이 없다."],"answer":1},{"section":"무역결제","num":8,"stem":"8. 화환신용장 업무에 관한 설명으로 잘못된 것은?","choices":["조건 변경서에 기재된 기한 내에 거절통보를 하지 않은 수익자는 반드시 조건 변경된 사항과 일치하는 서류를 제시해야 한다.","신용장이 “선하증권 원본 2통 요구 \u0026 원본 1통 수입자 앞 송부”를 규정한다 면, 원본 3통을 제시하면 하자가 된다.","지정은행으로부터 거절통보문(MT 734)을 전달받은 수익자는 유효기간(제시기 간) 내에 하자를 정정해서 다시 제시할 수 있다.","확인은행이 거절 통지의무를 위반하였다면 하자 있는 서류를 거절할 수 없게 된다."],"answer":1},{"section":"무역결제","num":9,"stem":"9. 화환신용장 관 련 수수료에 관한 설명으로 올바른 것은?","choices":["환가료란 외환 매매이익 감소에 따른 보상 성격으로 징수하는 수수료이다.","대체료란 은행이 외화자금 부담에 따르는 이자의 성격으로 수취하는 수수료이 다.","지연이자란 매입 당시에는 예상하지 않은 은행수수료가 해외은행으로부터 추 가로 징수된 경우에 추징하는 수수료이다.","A/D charge란 Banker’s usance 신용장 하에서 인수은행이 인수하고 할인하는 때에 발생하는 금융비용이다."],"answer":4},{"section":"무역결제","num":10,"stem":"10. 수입 업무에 관한 설명으로 올바른 것은?","choices":["수입화물선취보증서는 수출입 지역 간의 항해 일정이 긴 구간에서 주로 사용 한다.","수입화물선취보증서는 선하증권 원본 없이 Surrendered B/L로 화물을 인수할 때 사용한다.","T/R이란 개설은행이 수입화물에 대한 담보권과 소유권을 유지하면서 수입자가 수입대금을 결제하기 전에 수입화물을 처분할 수 있도록 하는 제도이다.","T/R의 수신인은 운송회사이다."],"answer":3},{"section":"무역결제","num":11,"stem":"11. SWIFT로 통지된 화환신용장에 관한 설명 중 잘못된 것은? P Partial Shipments : Prohibited 43 : 45A: Description of Goods and/or Service 1. Invoice in 3 Copies 2. Packing List in 3 Copies 3. Full set of Clean On Board Ocean Bil s of Lading.... 4. Insurance Certificate .....","choices":["43P에 별도의 언급이 없으면 분할선적은 허용된다.","최소한 1부의 송장 원본과 나머지 부수의 사본 제시에 의하여 충족된다.","원본 선하증권 3통을 제시하여야 한다.","Insurance Certificate 대신에 Insurance Policy를 제시하면 서류의 하자가 된다."],"answer":4},{"section":"무역결제","num":12,"stem":"12. UC P 600이 적용되는 화환신용장 관련 규정으로 잘못된 것은?","choices":["신용장이 수출자 발행 원산지증명서(C/O issued by exporter)를 요구한 경우, 세관이 발행한 원산지증명서 역시 수리 가능하다.","항공운송을 요구하면서 환적을 금지한 경우에 환적 사실이 기재된 항공운송서 류는 수리 가능하다.","유효기일보다 서류제시 기간이 앞서는 경우, 수익자는 서류를 유효기일까지 제 시하면 된다.","“수입국 외(外) 은행수수료는 수익자 부담” 조건이 있다면, 상환은행 수수료 는 수익자가 부담한다."],"answer":3},{"section":"무역결제","num":13,"stem":"13. 다음 UC P 600에 규정된 하자 있는 서류에 관한 설명 중 올바른 것으로만 묶인 것은? A. 개설은행은 모든 하자의 내용을 SWIFT를 통하여 통지하여야 한다. B. 개설의뢰인의 하자 용인서가 첨부되어 있다면, 확인은행은 해당 서류를 결제하여야 한다. 절 절 C. 적 한 거 통지서를 보 다면, 개설은행은 냈 언제라도 서류를 반송할 수 있다. D. 개설은행의 지급 거 절 이전에 대금이 지급되었다면, 상환은행은 매입은행에 이자를 청구할 수 있다. E. 하자 사항이 명기되어 확인은행에 도착한 경우, 확인은행은 선적서류를 별도의 심사 없이 개설은행으로 전달할 수 있다.","choices":["A, C, D","B, C, D, E","B, D","C"],"answer":4},{"section":"무역결제","num":14,"stem":"14. 화환신용장에서 다음과 같이 보험서류를 요구하였다. 다음 중 올바른 것은? Marine Insurance Policy for full CIF value plus 10 pct covering institute cargo clause(A), institute war clause(cargo), institute strike, riot and civil commotion clause(cargo).","choices":["Insurance cargo clause(A)는 All Risks 조건과 동일하기 때문에 war clause와 strike riot and civil commotion 조항은 추가 부보하지 않아도 된다.","War clause와 strike riot and civil commotion 조항에 가입하더라도 별도의 추가 보험료는 납부하지 않는다.","Insurance Policy 발행일이 선적일보다 늦더라도 Insurance Policy에 운송서류 발 행일 이전에 효력이 발생함을 나타내고 있는 경우에는 하자가 아니다.","Insurance Policy 원본 2부가 발행된 경우 1부만 제시하면 된다."],"answer":3},{"section":"무역결제","num":15,"stem":"15. ISB P 745의 규정에 따라 작성한 화환신용장의 서류에 관한 설명으로 잘못된 것 은?","choices":["Inspection Certificate: 선적 전의 검사일자를 표시하고, 선적일자 이후에 발행하였 다.","Beneficiary’s Certificate: 발행자로 수익자명을 기재하고, 별도의 서명은 하지 않 았다.","Packing List: 선하증권의 하인에는 포함되어 있지 않은 제조사명을 하인 정보에 추가하였다.","Certificate of Origin: 물품 선적지의 국가명을 기재하지 않았다."],"answer":2},{"section":"무역결제","num":16,"stem":"16. ISB P 745의 규정에 따라 작성한 송장에 관한 설명으로 올바른 것은?","choices":["화환신용장에서 Invoice의 제시를 요구하면서 더 이상의 명시가 없는 경우에, 상 업송장, 세관송장, 영사송장이 제시되어도 된다.","화환신용장에서 Commercial Invoice의 제시를 요구한 경우, 제시된 송장에서 ‘commercial’이라는 단어가 기재되어야 한다.","송장에서는 화환신용장에 명시되지 않은 선지급이나 할인 등에 따른 공제가 표시 되어서는 안 된다.","화환신용장에서 송장에 서명 또는 일자를 표기하라는 조건이 없더라도, 서명이나 일자가 반드시 표시되어야 한다."],"answer":1},{"section":"무역결제","num":17,"stem":"17. 하나의 계약관계에서 다음의 보증서가 모두 발행되었을 경우, 일반적으로 순서상 가장 늦게 발행된 후 그 유효기간이 가장 늦게까지 유지되는 것은?","choices":["Advanced payment bond","Performance bond","Bid bond","Warranty bond"],"answer":4},{"section":"무역결제","num":18,"stem":"18. 거래방식별 금 융비용에 관한 설명으로 올바른 것은?","choices":["제휴방식 국제팩터링의 경우, 수출자는 환가료 외에도 수출팩터 수수료와 수입팩 터 수수료를 부담하게 된다.","화환신용장 거래에서 수출자가 포페이팅을 활용한다면, 단순매입 거래보다 낮은 환가료율로 거래할 수 있다.","Banker’s usance L/C의 개설비용 측면에서 보면, 수입자에게는 Domestic import usance L/C가 Overseas banker’s usance L/C보다 유리하다.","Aval은 기간이 길수록 또는 거래은행의 신용도가 높을수록 비용이 저렴하다."],"answer":1},{"section":"무역결제","num":19,"stem":"19. 송금결제 방식과 위험관리 방안에 관한 설명으로 잘못된 것은?","choices":["CWO 방식으로 수입계약을 체결한 우리나라의 수입업자는 선수금 송금 전에 수 입보험 가능품목임을 확인하고 수입보험 가입 후 선수금을 송금하였다.","CAD 방식으로 수입을 희망하는 우리나라의 수입업자는 ‘PSI’를 하는 것이 위 험관리 방안이 될 수 있다.","O/A nego는 선하증권 원본을 담보로 은행이 외상수출채권을 매입하는 거래이 다.","CAD 방식을 요구하는 해외 수출자에게 COD 방식을 요청하였다."],"answer":3},{"section":"무역결제","num":20,"stem":"20. 무역보험제도에 관한 설명으로 잘못된 것은?","choices":["수출보험이란 수출자가 수출대금의 결제기간 2년 이하의 수출계약을 체결하고 물품을 수출한 후, 수입자 혹은 L/C 거래의 경우 개설은행으로부터 수출대금을 받을 수 없게 된 때에 입게 되는 손실을 보상하는 제도이다.","수출보험은 신용위험과 비상위험 모두를 담보한다.","일반수출, 위탁가공무역, 중계무역, 재판매 거래는 보험 가입대상이다.","수입자용 수입보험은 원유, 가스 등 주요 전략물자의 장기 안정적 확보를 위해 수입기업이 선급금이나 신용장 결제방식 지급조건 수입거래에서 비상위험 또는 신용위험으로 인해 선급금 혹은 신용장 대금을 회수할 수 없게 되었을 때 발생 하는 손실을 보상한다."],"answer":4},{"section":"무역결제","num":21,"stem":"21. 다음 보기","choices":["∼","에 대한 설명으로 올바른 것은? ( ) means the handling by ◯banks of documents, in accordance with ◯ 1 2 instructions received, in order to obtain ◯payment and/or acceptance, deliver 3 ◯documents against payment and/or against acceptance or deliver documents 4 on other terms and conditions.","Banks가 독립적으로 지급을 보증하는 형식의 거래이다.","Instructions에 수출자와 수입자의 이름, 주소를 기재하지 않아도 된다."],"answer":4},{"section":"무역결제","num":22,"stem":"22. 송금결제 방식과 추심결제 방식의 공통점 및 차이점에 관한 설명으로 잘못된 것 은?","choices":["대금 지급의무자가 수입자이다.","은행이 대금지급을 확약하지 않는다.","송금방식의 화물 수하인(consignee)은 수입자이고, 추심방식의 수하인(consignee) 은 은행이다.","CAD와 D/P는 동시지급이며, O/A와 D/A는 외상거래이다."],"answer":3},{"section":"무역결제","num":23,"stem":"23. 우리나라 외환시장과 외환거래에 관한 설명으로 올바른 것은?","choices":["기업은 은행과 외환거래를 할 수 있고, 직접 은행간시장의 중개회사를 통한 거래 는 할 수 없다.","은행들은 외환 중개회사를 통해서 서로 거래해야 하며, 은행 간 직접거래는 할 수 없다.","은행들은 기업이나 고객의 요청을 받은 외환거래만 할 수 있고, 투기적인 목적의 외환거래는 할 수 없다.","정부 당국은 외환 중개회사에 직접 매매 주문을 할 수 있다."],"answer":1},{"section":"무역결제","num":24,"stem":"24. 다음은 각 은행이 제시한 통화별 환율이다. 이에 관한 설명으로 잘못된 것은? 은행명 통화 률 bd 매입 ( i ) ff r 매도율(o e ) A은행 USD /JPY 140 150 B은행 /R USD K W 1,350 1,400 C은행 JPY/ R K W 9.05 9.60 D은행 E R/ U USD 1.0535 1.0575","choices":["A은행은 고객으로부터 140엔을 매입하고 1달러를 매도한다.","B은행은 고객에게 1달러를 매도하고 1,400원을 매입한다.","C은행은 고객으로부터 1엔을 매입하고 9.05원을 매도한다.","D은행은 고객에게 1유로를 매도하고 1.0575달러를 매입한다."],"answer":1},{"section":"무역결제","num":25,"stem":"25. 홍콩의 A은행은 달러/원 역외선물환(NDF) 100만 달러를 뉴욕의 B은행에 다음과 같이 매도하였다. 만기 시 A은행과 B은행의 손익에 따른 현금흐름은 어떻게 되 는가? Ÿ 거래금액: 1,000,000 달러 Ÿ 계약환율: 1,470원 Ÿ 정산환율: 1,500원","choices":["A은행이 B은행에게 2만 달러 지급","B은행이 A은행에게 2만 달러 지급","A은행이 B은행에게 3천만 원 지급","B은행이 A은행에게 3천만 원 지급"],"answer":1},{"section":"무역결제","num":26,"stem":"26. 선물환거래와 통화선물거래의 차이점으로 잘못된 것은?","choices":["선물환거래는 장외거래(Over-the-Counter)인 반면, 통화선물거래는 선물거래소라 는 물리적 장소에서 이루어지는 장내거래이다.","선물환거래는 계약단위, 만기일 등에 제한이 없는 반면, 통화선물거래는 표준화 된 상품을 정형화된 계약조건에 따라 거래한다.","선물환거래는 매일 평가이익 또는 손실을 산출하고 이를 일일정산하지만, 통화선 물거래는 일일정산을 하지 않는다.","선물환거래는 거래 당사자가 거래 상대방에 대한 신용위험을 부담해야 하지만, 통화선물거래는 선물거래소가 신용위험을 보증한다."],"answer":3},{"section":"무역결제","num":27,"stem":"27. 통화 옵션의 프리미엄에 영향을 미치는 여러 요인들에 관한 설명으로 잘못된 것 은?","choices":["만기일까지의 기간이 단축될수록 콜옵션의 프리미엄은 하락한다.","행사가격이 상승할수록 풋옵션의 프리미엄은 하락한다.","현물환율이 상승할수록 콜옵션의 프리미엄은 상승한다.","외환시장의 변동성이 증가할수록 풋옵션의 프리미엄은 상승한다. 션"],"answer":2},{"section":"무역결제","num":28,"stem":"28. ㈜한국무역의 외환 포지 과 환율 변동이 다음과 같을 때, 환율 변동으로 인한 손익은 얼마인가? 환율 변동 전 변동 후 /R USD K W 1,300 1,400 USD/JPY 100 140 예금: 100,000 USD 매출채권: 200,000 선물환 매도: 100,000 포지 션 외상매입금: 3,000,000 JPY 차입금: 9,000,000 선물환 매수: 2,000,000","choices":["1천만 원 손실","2천만 원 이익","3천만 원 손실","5천만 원 이익"],"answer":4},{"section":"무역결제","num":29,"stem":"29. 환리 스크 관리기법에 관한 설명으로 올바른 것은?","choices":["상계는 자금의 유입과 유출을 통화별, 만기별로 일치시킴으로써 외화자금 흐름의 불일치에서 발생할 수 있는 환위험을 원천적으로 제거하는 관리기법이다.","리딩과 래깅은 결제 시기를 조절함으로써 이익을 늘리고 손실을 줄이려는 환위 험 관리기법이다. 이 중 리딩이란 자금의 결제 시기를 최대한 늦추는 것을 뜻한 다.","환변동보험은 만기일 이전에도 조기결제가 가능하다.","역외선물환(NDF)은 만기에 계약 원금을 상호교환하는 거래이다. 프 / NY 환율을 보여주고 있다. 10월 초 환"],"answer":3},{"section":"무역결제","num":30,"stem":"30. 다음 그래 는 2023년 7월 이후의 USD C 율 상황이 앞으로도 유지된다고 가정할 때, 10월 이후의 경제 상황에 대한 타당 한 추론을 <보기>에서 고른 것은? <보기> A. 달러화 대비 위안화 가치는 8월 초에 비해 높은 수준일 것이다. B. 달러화 대비 원화 가치가 하락한다면 한국의 대중국 무역수지는 개선될 것이다. C. USD/JPY 환율이 하락한다면 일본 관광객의 중국 여행경비 부담은 감소할 것이다. D. EUR/USD 환율이 하락한다면 중국의 대유럽 지역 수출경쟁력은 개선될 것이다.","choices":["A, B","A, C","B, C","B, D"],"answer":3},{"section":"무역계약","num":1,"stem":"1. 무역계약의 법적 성격에 관한 설명으로 잘못된 것은?","choices":["무역계약은 불요식계약으로 구두나 서면, 어떠한 방식으로도 체결될 수 있다.","무역계약은 수출자는 물품인도 의무를, 상대방인 수입자는 대금지급 의무를 상 호 부담하는 쌍무계약이다.","일방의 청약과 이에 대한 상대방의 승낙만으로 무역계약이 완전하게 성립된 것 으로 볼 수 없다. 약속된 조건이 이행되는 등의 반대급부가 있어야 성립하는 요 물계약이기 때문이다.","무역계약은 대가적 관계에 있는 계약으로 상호 경제적 가치가 있는 것을 교환 하는 유상계약이다. t rms 2020의 사용에 관한 설명으로 올바른 것은?"],"answer":3},{"section":"무역계약","num":2,"stem":"2. Inco e","choices":["FOB 조건은 해상운송 전용규칙이지만 매매계약 당사자들의 합의에 의하여 항공 운송에도 적용 가능하다. 이 경우 화물이 지정 공항에서 항공기에 적재(on board)되는 시점에 매도인의 위험과 비용이 매수인에게 이전된다.","CIF 조건은 매도인이 물품을 선박에 적재하거나 또는 이미 그렇게 인도된 물 품을 조달해 매수인에게 인도하는 것을 의미한다.","FCA Busan port로 계약을 체결하고 매수인이 해상보험에 가입한 경우, 매수인은 본선에 화물이 적재된 이후의 보험사고에 대해서만 보상받을 수 있다.","EXW Seller’s warehouse로 계약을 체결하면 매도인은 수출통관의 의무는 없으 나 물품을 수취용 차량에 적재할 의무가 있다. t rms 2020의 분류 및 설명으로 잘못된 것은?"],"answer":2},{"section":"무역계약","num":3,"stem":"3. Inco e","choices":["FAS 조건은 지정선적항에서 매수인이 지정한 선박의 선측에 물품이 놓인 때 또 는 이미 그렇게 인도된 물품을 조달한 때 인도하는 것을 의미한다.","FOB 조건은 매도인이 보험계약을 체결할 의무가 없다.","CIF 조건은 항공기 등 복합운송 방식을 취할 경우에도 적하보험을 부보해야 한 다.","DDP 조건은 매도인이 수출입통관을 모두 수행하고 관련 세금도 납부해야 한다. 예시에 맞는 Incoterms 2020의 조건으로 올바른 것은?"],"answer":3},{"section":"무역계약","num":4,"stem":"4. 다음 한국의 수출자 A와 미국의 수입자 B는 스마트폰 3,000대를 인천공항 터미널까지의 배송비와 인천발 항공운송비를 부담하는 조건으로 수출계약을 체결하였다. 그러나 수입자 B가 조건을 변경하여 ICC(A) 조건의 적하보험료도 A가 부담할 것을 추가로 요구하여, A는 결국 수용하기로 했다.","choic 용적 단위: CBM, CFT D. FEU: 40피트 컨테이너의 단위 E. M/L clause: 과부족용인조항 F. L/C 거래 시 bulk cargo, uncountable goods: 10% 과부족을 허용 G. Gross: 12dozen=120pcs","choices":["A, B, C, D","A, B, C, D, E","B, C, E, F","D, E, F, G"],"answer":2},{"section":"무역계약","num":11,"stem":"11. 무역계약의 주요 협상조건 중 선적조건에 관한 설명으로 올바른 것은?","choices":["할부선적에서 어느 할부분의 선적이 이행되지 않은 경우에 그 할부분을 포함해 서 그 이후의 모든 할부분의 선적에 대하여 신용장은 효력을 상실하지 않는다.","선적기간으로 “on or before Nov. 11”과 같이 약정된 경우, 선적기간은 총 5일 간이다.","신용장의 43P(분할선적)란에 아무런 표기가 없다면, 분할선적이 금지된 것으로 본다.","화환신용장거래에서 선적기간으로 “as soon as possible”, “immediately” 등으 로 표시한 경우에 개설은행을 포함한 신용장 관련 은행은 이를 무시한다."],"answer":4},{"section":"무역계약","num":12,"stem":"12. 무역계약의 체결방법에 관한 설명으로 잘못된 것은?","choices":["일반적으로 개별계약은 매수인의 청약요청에 따라 매도인이 청약을 보내면 매수 인이 반대청약을 하며, 반대청약을 받은 매도인이 그에 대해 반대청약을 하는 등 당사자 간에 반대청약이 반복되다가 결국 어느 당사자가 승낙함으로써 계약이 성립된다.","중장기연불방식에 의한 수출입 등 거래내용이 복잡할 경우에는 주로 포괄계약이 사용된다.","동일한 상대방과 거래가 지속적으로 이루어지는 경우, 일반거래조건에 관한 협정 을 체결하여 향후 거래 시 적용될 수 있는 기본원칙을 규정한다.","정형화된 계약조항을 가리켜 일반거래약관이라고 하며, 영문으로는 “General terms \u0026 conditions”라고 표기한다."],"answer":2},{"section":"무역계약","num":13,"stem":"13. 다음 무역계약 중 Entire agreement에 해당하는 것은?","choices":["계약위반의 상대방은 계약위반으로 입은 직접적 손해에 대해서만 배상을 청구 할 수 있을 뿐, 기업 명성 등에 피해가 발생되었다고 주장하면서 완전한 배상을 요구할 수 없다는 조항이다.","무역거래나 기술도입의 과정에서 알게 된 비밀정보는 철저히 보호되어야 하며, 상대방의 비밀정보를 누설하거나 도용해서는 안 된다는 조항이다.","제조되고 판매된 물품이 소비자나 기타 제3자의 신체 또는 재산에 손상과 손해 를 발생시킨 경우에는 그 제조자·수출자·수입자·판매자·유통자·원자재나 부품의 생산자 등 여러 사람에게 배상책임을 물을 수 있으며, 이런 책임을 매도 인과 매수인이 약정하는 조항이다.","계약서가 당사자의 합의를 전부 표시하고 있는 유일한 합의서이며, 그 이외의 내용은 인정할 수 없다는 조항이다."],"answer":4},{"section":"무역계약","num":14,"stem":"14. Hardship clause에 해당하는 것은?","choices":["이 조항에는 단순한 면책규정만 기재되지 않고, 이행기간이 일정기간 동안 연장 되는 규정도 있을 수 있다.","이 조항에 단순히 “Act of God”만을 기재한다면, 홍수나 지진과 같은 자연재 해는 포함되지만, 파업이나 원자재의 부족 등은 포함되지 않는 것으로 해석될 수 있다.","계약 체결 당시에는 예기하지 못했던 경제적 또는 기타 사정의 변경으로 인해 당초 계약대로의 이행이 심히 곤란해져 계약의 본질적 변경이 불가피해진 경우 에 대비하는 조항이다.","불법파업, 전쟁 등의 이유로 계약을 미이행한 경우에 주로 사용되는 조항이다."],"answer":3},{"section":"무역계약","num":15,"stem":"15. 다음 조항에 관한 설명으로 올바른 것은? h uld issuing the letter of credit be delayed for causes for which the Buyer is S o liable, Buyer shall pay the Seller amount equal to [two tenths of one percent(0.2%)] of the amount of relevant letter of credit per each full week as liquidated damages net cash or sight draft within [three days] from receipt of relevant bill from the Seller.","choices":["이 조항에 의하면 계약위반이 매수인의 작위, 부작위를 불문하고 발생하는 경우 매도인은 정해진 손해배상금액을 청구할 수 있다.","Vienna Convention(1980)에서는 과도한 손해배상 청구를 방지하기 위해서 손해 배상금액이 전체 계약금액의 30%를 초과하지 못하도록 규정하고 있다.","클레임 제기자는 손해액을 입증하여야 한다.","약정된 금액이 과도하다면, 신청에 의하여 법원은 합리적인 한도까지 감액할 수 있다."],"answer":4},{"section":"무역계약","num":16,"stem":"16. 무역계약의 불이행과 계약의 해제에 관한 설명으로 잘못된 것은?","choices":["계약의 해제는 계약 중의 분쟁해결조항이나 계약해제의 효과로 발생되는 당사자 의 권리와 의무를 규정한 기타 계약조항에는 영향을 미치지 아니한다.","당사자 일방이 계약을 해제한 때에는 각 당사자는 그 상대방에 대하여 원상회복 의 의무가 있다.","계약의 해제는 그 계약위반이 본질적 계약위반에 해당할 경우에만 이용 가능한 권리구제수단이다.","손해배상청구권은 다른 권리수단과 병행하여 행사할 수 없다."],"answer":4},{"section":"무역계약","num":17,"stem":"17. 다음 계약조항에 따라 매수인의 정상적인 클레임 제기로 인정받을 수 있는 것은? An y claims by the Buyer of whatever nature arising under this Contract shall be made by e-mail within thirty(30) days after arrival of the Goods at the destination. Full particulars of such claims shall be made in writing and forwarded by registered mail to the Sel er along with the survey report of an authorized surveyor within fifteen(15) days after e-mail transmission. A. 목적지에 물품이 도착한 후 매수인은 물품 보관을 위한 창고 수 배 지연으로 물품의 하자를 늦게 발견하여 35일 만에 이메일로 매도인에게 클레임을 통지하였다. B. 매수인은 물품의 하자를 발견하여 공인검사기관에 검사를 의뢰하고, 목적지에 물품이 도착한 후 35일 만에 검사보고서와 클레임 통지서를 국제 등기우편으로 매도인에게 발송하였다. C. 매수인은 물품 도착일로부터 25일 에 이 일로 매도인에게 째 메 클레임을 통지하였고, 물품 도착일로부터 42일째에 검사보고서 및 관련 클레임 서류를 국제 등기우편으로 매도인에게 발송하였다. D. 매수인은 물품 도착일로부터 30일 에 이 일로 매도인에게 째 메 클레임을 통지하였고, 공인검사기관 검사 예약이 늦어져서 이메일을 보낸 날로부터 10일째에 검사보고서 없이 관련 서류를 국제 등기우편으로 매도인에게 발송하였다.","choices":["A, C","B, C","B, D","없음"],"answer":4},{"section":"무역계약","num":18,"stem":"18. Vienna Convention(1980)을 준거법으로 적용하는 무역계약에서 다음과 같은 매도 인의 계약위반에 대하여 매수인이 행사할 수 있는 구제수단을 순서대로 올바 르게 연결한 것은? (분쟁 해결은 중재로 할 것을 합의함) 농업용 요소를 독점 생산해 판매하고 있는 중국의 A사는 수입자인 한국의 B사에 9월 30일까지 요소 1,000M/ton을 인도하기로 하였으나 다른 수출자에 대한 우선 공급을 이유로 B사에 정해진 기간 내에 제품을 인도하지 못하였다. 이 계약위반에 종 대해서 B사는 구제수단을 행사하였으나 최 적으로 중국 A사로부터 계약물품을 공급받지 못하였다. A. 계약대로의 이행청구 B. 손해배상 청구 C. 계약해제 통지 D. 이행기간의 추가 설정 E. 중재합의에 따라 중재 신청","choices":["A–C–B-D-E","A-D-C-B-E","B-C-D-A-E","C-A-B-D-E"],"answer":2},{"section":"무역계약","num":19,"stem":"19. 국제중재 절차와 중재판정의 효력에 관한 설명으로 올바른 것은?","choices":["중재는 당사자 간의 서면 합의를 토대로 진행되므로 중재판정의 패소자는 어떠한 경우에도 판정에 따라야 하며, 그 판정에 불복하여 구제받을 수 있는 수단은 없 다.","중재판정에 의해 확정된 청구권에 대해서 법원의 집행판결을 받을 때 패소자는 최종적으로 이의제기 및 변론을 할 수 있는 기회이므로 확정된 청구권의 부당함 에 대해 이의를 제기하고 집행 연기를 구할 수 있다.","중재신청이 있는 경우 그 피신청인이 중재신청의 내용을 부인하는 것에 그치지 않고 오히려 자신이 손해를 보았으니 이를 배상하라는 등의 적극적 청구를 하는 것을 반대신청이라 한다.","외국 중재판정의 승인 및 집행에 관한 협약인 New York Convention(1958)에 따라 체약국 간의 중재판정은 별도의 집행판결 없이 강제집행을 할 수 있다."],"answer":3},{"section":"무역계약","num":20,"stem":"20. 무역분 쟁 해결수단인 중재에 대한 다음 내용과 관계되는 것은? rb tration clause는 분쟁해결의 방법 중 중재조항으로 중재장소, 중재기관, 준거법 A i 등이 기재된다. 특히 중재조항이 기재된 경우에는 원칙적으로 소송을 통해 분쟁 해결이 불가능하므로 상대방이 소송을 제기할 경우 적절하게 대응해야 한다.","choices":["방소항변","New York Convention(1958)","Vienna Convention(1980)","매매계약서의 준거법"],"answer":1},{"section":"무역계약","num":21,"stem":"21. Vienna Convention(1980)이 적용될 수 있는 계약만을 고른 것은? A. 한국의 A사는 미국 B사의 한국 지점을 계약당사자로 해서 무역계약을 체결하고 미국으로 수출하였다. 물품을 B. 한국의 수출자 A사는 A사의 미국 현지법인과 계약을 체결하고 물품을 수출하였다. C. 한국의 수입자 A사는 미국의 한국 교포인 개인사업자 B와 계약을 체결하고 물 품을 수입하였다. D. 한국의 A사는 미국 B사에 A사의 상표를 사용할 권리를 부여하고 B사로부터 매년 10만 달러의 로열티(royalty)를 받는 계약을 체결하였다. E. 한국의 A사는 LED 모니터를 미국 B사로 수출하고, B사는 그 가격만큼의 컴퓨터 부품을 한국 A사에 수출하는 물품교환을 하였다.","choices":["A, C, D","A, E","B, C","B, D, E"],"answer":3},{"section":"무역계약","num":22,"stem":"22. 다음 무역계약에 대한 설명 중 ( )에 순서대로 들어갈 내용으로 적합한 것 은? 무역계약은 당사자들이 명시적으로 합의한 조건 중 불가항 , 중재, ( 력 ) 등은 므 속 거의 변동이 없는 사항이 로 거래의 신 한 전개 및편의를 위해 ( )를 사 용하기도 한다. 계약서에 명기되지 않은 사항은 대부분 거래 관습에 따르며, 대표 적인 무역거래 관습으로는 ( )가(이) 있다.","choices":["클레임, 특약서, 비엔나협약","클레임, 일반거래약정서, 운송보험","준거법, 특약서, 인코텀즈","준거법, 일반거래약정서, 인코텀즈 프"],"answer":4},{"section":"무역계약","num":23,"stem":"23. 운송 인 라에 관한 설명 중 잘못된 것은?","choices":["선박의 종류에는 일반화물선, 전용선, 겸용선, 특수선이 있다.","항만은 상업항(무역항), 공업항, 어항, 군항, 피난항, 검역항으로 분류한다.","내륙컨테이너기지에서는 항만에서 반드시 이루어져야 할 본선작업과 마샬링을 제외한 전통적인 항만 기능이 수행되고 있다. 또한 항만지역에 위치한 많은 관 련 서비스 시설을 포함하고 있어 내륙항만이라고 불리기도 한다.","항공화물 터미널의 탑재·운반·하역장비로는 transporter, tug car, reach stacker, gantry crane 등이 있다."],"answer":4},{"section":"무역계약","num":24,"stem":"24. 컨테이너 해상 수출화물 운송절차에 관한 내용 중 잘못된 것은?","choices":["Shipping Request, Commercial Invoice, Packing List 등의 서류는 선적 예약 시 필 요하다. 수출신고필증은 선적 예약 시에는 필요하지 않으나 선적 전에 반드시 제 출해야 한다.","CY의 오퍼레이터는 예약명세서(Booking List)를 기초로 수출하주가 아닌 선사의 지시에 따라 빈 컨테이너를 해당 하주와 관련된 컨테이너 기사에게 내어주고 기 기수도증(EIR)을 접수한다.","LCL 화물을 수출하는 하주는 빈 컨테이너에 수출 관련 물품을 적재한 후 컨테이 너 문을 직접 닫고 봉인(sealing)을 한 후 선적항 CY로 컨테이너를 이송시킨다. 이러한 수출은 하주의 책임을 확고히 하고자 선하증권상에 “Shipper’s load \u0026 count, seal”을 표기하여 적재의 책임을 수출하주에게 확인시킨다.","수출하주의 선적통지는 수입자가 수입통관을 적기에 준비하기 위해서 필요하다. 특히 한-일, 한-중과 같은 근거리 거래는 컨테이너선의 해상운송기간이 1~2일 정 도로 짧아서 바로 선적통지가 이루어져야 한다."],"answer":3},{"section":"무역계약","num":25,"stem":"25. S urrendered B/L에 관한 설명 중 잘못된 것은?","choices":["Surrender는 Original B/L의 유통성을 소멸시키는 행위이므로, 수입업자가 Original B/L의 제시 없이 화물을 인도받을 수 있다.","근거리 해상운송에서 송하인이 수하인에게 Original B/L을 보내주어야 하는데, 서 류의 송부기일보다 화물이 목적지에 먼저 도착하는 경우에 사용된다.","수출자는 수입자가 화물을 빨리 인도받는 편의를 제공하기 위해 수출자와 수입 자의 합의로 수출자가 수출국 운송인에게 Surrender를 신청하는 것이 관례이다.","대금결제에 대한 안전도가 높은 신용장 방식에서 주로 사용된다."],"answer":4},{"section":"무역계약","num":26,"stem":"26. 해상운송 클레임과 우리나라 상법상 해상운송인의 책임에 관한 내용 중 올바른 것은?","choices":["해상운송 클레임의 제기 주체는 원칙적으로 Incoterms 2020에 따라 달라지나 통 상 선하증권의 송하인이다.","운송클레임은 화물을 인수하기 전에 통지해야 하며 화물 인수 후에는 클레임을 제기할 수 없다. 만약 운송인이 화물을 인수한 후의 운송클레임을 허락하였다할 지라도 과실 입증 책임은 화물을 인도받은 화주에게 있다.","운송사고에 대한 우리나라 상법상 해상운송인의 책임 중 선박의 숨은 하자는 면 책사유에 해당된다.","선하증권과 관련한 모든 국제규칙의 적용 구간은 선적항에서 도착항까지이다. 테 담 규칙에 관한 설명으로 잘못된 것은?"],"answer":3},{"section":"무역계약","num":27,"stem":"27. 로테르담규칙에 관한 설명으로 잘못된 것은?","choices":["주로 선주의 이익을 대변하던 헤이그-비스비 규칙과 화주의 이익을 대변하던 함 부르크 규칙을 하나로 통일하지 않고 보다 세분화한 것이다.","2008년 7월 3일 미국 뉴욕 연례회의에서 승인되었고, 같은 해 12월 제63차 유엔 총회에서 최종 채택된 후 2009년 9월 23일 서명식이 개최되었다.","주요 내용 중 적용기간 및 구간은 화물의 수령에서 인도까지이다.","수령장소와 인도장소가 서로 다른 국가에 있고, 선적항과 양륙항이 서로 다른 국 가에 있는 운송계약에 적용된다. 다만, 수령 장소, 양륙항, 인도장소 중의 하나가 체약국에 있어야 한다."],"answer":1},{"section":"무역계약","num":28,"stem":"28. 다음 해상보험 용어의 설명 중에서 올바른 것으로만 묶인 것은? p l y holder)란 보험계약의 청약자이다. A. 보험계약자( o ic B. 적하보험은 통상 운송계약에 따라 보험계약자가 결정된다. C. 피보험자(the insured/assured)는 피보험이익의 주체로서의 자격이 있다. D. DAP에서는 수출자가 자신의 판단으로 보험부보를 한다. E. 보험증권은 보험계약의 성립과 그 내용을 증명하기 위하여 보험자가 보험 계약자가 아니라 피보험자에게 교부하는 증권이다. F. 보험의 목적인 subject-matter insured는 보험에 의해서 보호되는 대상을 말 하며 이를 <피보험이익>이라고도 한다. G. 보험금액(insured amount)은 실제로 보험에 가입한 금액을 말하며 보험자가 보험계약상 부담하는 손해배상책임의 최고 한도액이다.","choices":["A, B, C","A, C, D, G","B, E, G","C, D, F, G 징"],"answer":2},{"section":"무역계약","num":29,"stem":"29. 해상보험의 특 에 관한 설명으로 잘못된 것은?","choices":["해상보험은 손해보험의 일종으로 원칙적으로 손해보상계약이다.","보험자가 보상을 한 후 잔존물에 대한 피보험자의 권리와 제3자에 대한 손해배 상청구 권리를 보험자가 대신 행사하도록 하는 보험목적에 관한 보험대위를 인 정하지 않는다.","해상보험은 기평가보험인 보험목적물의 가치를 보험자와 피보험자가 보험계약 체결 시점에 협의로 확정하고, 이를 보험증권에 기재하는 형태의 계약을 통해 보 상금액이 계산되므로 완벽한 개념의 실손 보상은 아니다.","Warranty는 피보험자가 지켜야 할 약속이며 위험에 대해서 중요한 것이든 그렇 지 않은 것이든 중요성 불문의 원칙에 따라 반드시 충족되어야 한다. 피보험자는 최대선의의 원칙에 따라 고지의무를 충실히 이행해야 한다. 그러나 보험자 입장 에서는 불고지, 부실고지 사실을 입증하기 어려우므로 보험증권에 관련 사항을 명시하는데 이를 warranty라고 한다."],"answer":2},{"section":"무역계약","num":30,"stem":"30. 적하보험 클레임 처리와 관련하여 잘못된 것은?","choices":["어떤 보험조건을 이용하든 보험기간 중에 발생한 사고임을 입증할 책임은 피보 험자에게 있다.","피보험자는 현실적으로 발생한 혹은 발생할 화물의 손해를 방지·경감할 의무가 있다.","만일 피보험자가 손해배상청구권 보전의무를 이행치 않아 보험자의 구상권 행사 가 불가능하게 된 경우, 피보험자가 적절히 조치를 취했다면 보험자가 구상받을 수 있었던 금액만큼을 차감하고 보험금을 지급할 수 있다.","하주로서 자기 화물이 공동해손에 관련되었음을 알게 되는 계기는 자신이 공고 한 공동해손선포에 의해서이다."],"answer":4},{"section":"무역영어","num":1,"stem":"1. 다음 청약서의 내용으로 잘못된 것은? Dear Sirs, We are delighted to extend an offer for the following items, as detailed below and in accordance with the specified conditions: s r pt adies 100 pct Polyester Knit Jacket (Style No. 2023F3) De c i ion: L Origin: Republic of Korea Quantity: 500 pcs Unit Price: USD 120.00/pc CIF Auckland port (Incoterms 2020) Amount: USD 60,000.00 Shipment: Within 30 days after receipt of your L/C Payment: Draft at sight under an irrevocable L/C in our favor Packing: Export Standard Carton Packing Remark: Offer subject to our final confirmation We oo l k forward to receiving your valued order for the above offer. a thfully yours, F i","choices":["The unit price includes the cost of carriage and insurance up to the Auckland port","The contract will be concluded immediately upon the buyer’s order","The seller will fulfill his/her delivery obligation when the goods are loaded on board at the departing port","The seller should obtain, at his/her own cost, cargo insurance complying with the cover provided by ICC(C) or any similar clauses"],"answer":2},{"section":"무역영어","num":2,"stem":"2. 다음 교신문의 내용으로 잘못된 것은? De ar Mr. James, Thank you very much for your email dated October 15 with a price list and samples. We are pleased to make our order No.1234 as fol ows. Co mmodity: Ladies 100% polyester golf gloves Quantity: 12,000 pairs Price: USD 260/dozen DPU NEW YORK CY (Incoterms 2020) Shipment: Scheduled for December 2023 Packing: Each pair wrapped in polybag, 1 doz in a box Payment: Draft at 30 days after sight under irrevocable L/C Remark: Original certificate of inspection should be sent by e-mail prior to shipment.","choices":["Before the seller makes the shipment, he/she should send the inspection certificate to the buyer","The price does not include the cost for all import clearance formalities","The seller should deliver the goods up to New York port and unload them","A sight draft will be issued by the seller within 30 days after the shipment. t rms 2020의 FOB 조건에 관한 설명 중 잘못된 것은?"],"answer":4},{"section":"무역영어","num":3,"stem":"3. Inco e","choices":["The seller must provide the buyer, at the buyer’s request, risk and cost, with any information in the possession of the seller that the buyer needs for arranging carriage","The se
