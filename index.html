luctuation","We are pleased to offer you subject to change without further notice","We are pleased to offer you subject to our final confirmation"],"answer":1},{"section":"무역영어","num":5,"stem":"5. 주어진 계약서의 밑줄 친 부분 (B) Unit Price에 포함되는 비용을 모두 고르면? ⓐ custom clearance for export ⓑ custom clearance for import ⓒ international transport ⓓ unloading at New York ⓔ inland transport up to the loading place ⓕ inland transport from New York to the final destination","choices":["ⓐ, ⓒ, ⓓ, ⓔ","ⓑ, ⓓ, ⓕ","ⓑ, ⓒ, ⓓ","ⓒ, ⓓ, ⓔ, ⓕ"],"answer":1},{"section":"무역영어","num":6,"stem":"6. 주어진 서신의 밑줄 친 부분 (C) T/T에 대한 설명으로 올바른 것은?","choices":["The bill of exchange should be drawn on the seller","The seller should present shipping documents to the remitting bank for payment","This payment is used when there is a high level of trust between the seller and the buyer","The collecting bank will refuse to pay if there is any discrepancy in the documents"],"answer":3},{"section":"무역영어","num":7,"stem":"7. 다음 중 국제물품매매계약에 관한 UN 협약(1980)(CISG)의 규정에 따를 때, 유효한 승낙 에 관한 설명으로 적절하지 못한 것은?","choices":["The acceptance becomes effective at the time it is sent to the offeror","The acceptance must be an unconditional assent to the offer","The acceptance must not be withdrawn before it reaches the offeror","The acceptance must be made with the intent to conclude a contract in response to the offer"],"answer":1},{"section":"무역영어","num":8,"stem":"8. 다음 밑줄 친 정형거래조건을 대체하여 사용될 수 있는 조건에 대한 설명으로 옳지 않 은 것은? ∙ Price: USD 65.00/BOX CIP Auckland (Trade terms are subject to Incoterms 2020)","choices":["As under DAP terms, the seller must conclude a contract of carriage to Auckland","As under CPT terms, the risk will be transferred from the seller to the buyer at Auckland","As under CIF terms, the seller should make a contract for insurance to Auckland","As under CPT terms, the seller fulfills delivery obligation by handing over the goods to the first carrier"],"answer":2},{"section":"무역영어","num":9,"stem":"9. 아래 사례에서 최종 합의된 Incoterms 2020 조건으로 적절한 것은? Seller 'A' in Korea and Buyer 'B' in Canada enter into a sales contract for 2,000 smartphones. The trade terms stipulated that the seller should bear all risks, costs, up to Incheon Airport Terminal, and including air freight charges to the destination terminal. The buyer additionally requested that the seller cover the premium cargo insurance. Ultimately, ‘A’ accepted this condition and concluded the export contract.","choices":["FCA","CIP","CPT","DAP"],"answer":2},{"section":"무역영어","num":10,"stem":"10. 다음은 무역계약서의 일부이다. 계약서의 내용으로 옳지 않은 것은? Article 7. Should any specific inspector be designated by the buyer, all additional charges incurred thereby shall be borne by the buyer and shall be added to the invoiced amount. Article 8. All amounts payable by the buyer to the seller, including the purchase price, shall be settled on open account, with payment to be made within 30 days from the date of the invoice. Article 9. If the seller fails to deliver any or all of the products within the time period specified in the Agreement, the buyer shall deduct from the Contract Price, a sum equivalent to [one(1)%] of the price of the delayed products for each week of delay to a maximum deduction of [five(5)%] of the price of the delayed products. Article 10. The buyer shall place an order for not less than the amount of USD 10,000 for each four month period in accordance with the terms and conditions provided.","choices":["If the buyer nominates a specific inspector, the cost for the inspection should be paid by the buyer","Payment should be made within 30 days after the order is placed","The buyer shall receive a 4% reduction in the contract price if the delivery of the goods are delayed by four weeks","The buyer is required to order a minimum of USD 10,000 every four months"],"answer":2},{"section":"무역영어","num":11,"stem":"11. 다음 중 무역계약서상의 조항과 그 내용이 잘못 연결된 것은?","choices":["Non-waiver clause : No failure or delay by either party in exercising any right, power, or remedy under this Agreement shall operate as a waiver thereof, nor shall any single or partial exercise of any such right, power, or remedy preclude any other or further exercise thereof or the exercise of any other right, power, or remedy","Assignment clause : Neither party may assign or transfer any of its rights or obligations under this Agreement without the prior written consent of the other party, and any assignment made without such consent shall be null and void","Infringement : This agreement shall supersede any and all prior agreements, understandings, arrangements, promises, representations, warranties, and/or any contract of any form or nature whatsoever, whether oral or in writing and whether explicit or implicit, their officers, directors, or employees, as to the subject matter hereof","Non-competition clause : During the Terms of Agreement, the Franchisee shall not engage, directly or indirectly, either independently or as an employee, on its behalf or in the name for any other person in a similar business in a Territory where it would compete with a member of the franchised network, including the Franchisor. ∼"],"answer":3},{"section":"무역영어","num":12,"stem":"12 13] 다음 서신을 읽고 질문에 답하시오. [ Dear Sirs, (A) We are pleased to let you know that we have instructed our Gangnam Branch in Seoul to open an irrevocable Letter of Credit for USD 300,000 in (B) your favor. This credit will remain valid until August 31 at (C) our bank, KB Bank. A notification will be sent through (D) Citibank via registered mail in the coming days. To ensure smooth processing of the payment, please attach the following documents to your sight draft when presented through your bank: (E) , and certificates along with the list of weight and/or measurement. Since you quoted us a CIF Busan price, the credit amount will cover your invoice, freight, and insurance costs. We trust that you will fulfill our order(No.2406) for six hundred units of DB400S7B i3-7 computer model, maintaining the   var si=stem.indexOf('\n\n[지문]\n');
  if(si>=0){
    return {question:stem.slice(0,si).trim(), passage:stem.slice(si+6).trim()};
  }
  // 구 형식 호환: [지문]\n{지문}\n\n{문제}
  if(stem.indexOf('[지문]\n')===0){
    var rest=stem.slice(4);
    var sep=rest.indexOf('\n\n');
    if(sep>=0) return {passage:rest.slice(0,sep).trim(),question:rest.slice(sep+2).trim()};
  }
  return {passage:'',question:stem};
}
function cs(s){var p=parseStem(s);return p.question.replace(/^\d+[.\s]\s*/,'').trim()}
function gf(){var q=[];state.se.forEach(function(n){var e=EXAMS[n]||[];if(state.ss!=='all')e=e.filter(function(q){return q.section===state.ss});q=q.concat(e)});if(state.mode==='random')q=shuf(q);return q}
function usb(){var b=g('sb');if(state.mode==='wrong'){b.disabled=!state.wb.length;b.textContent=state.wb.length?'\uc624\ub2f5 '+state.wb.length+'\ubb38\uc81c \ud480\uae30':'\uc624\ub2f5 \uc5c6\uc74c'}else{b.disabled=!state.se.length;b.textContent=state.se.length?gf().length+'\ubb38\uc81c \uc2dc\uc791\ud558\uae30':'\ud68c\ucc28\ub97c \uc120\ud0dd\ud558\uc138\uc694'}}
function sqz(uw){var q=uw?shuf(state.wb.slice()):gf();if(!q.length)return;state.qs=q;state.idx=0;state.res=[];sv('s-quiz');shq()}
function shq(){var q=state.qs[state.idx];if(!q){shr();return}
  state.ans=false;g('qt').textContent=q.section;g('qc').textContent=(state.idx+1)+' / '+state.qs.length;
  g('pf').style.width=((state.idx/state.qs.length)*100)+'%';
  g('qnb').textContent='Q'+q.num;g('qsb').textContent=q.section;
  var parsed=parseStem(q.stem);
  g('qtx').textContent=parsed.question.replace(/^\d+[.\s]\s*/,'').trim();
  var qp=g('qpassage');
  if(parsed.passage){
    qp.innerHTML='<div class="passage-label">지문</div><div class="passage">'+parsed.passage+'</div>';
  }else{qp.innerHTML='';}
  var ca=g('ca');ca.innerHTML='';var hc=q.choices&&q.choices.length>=4;
  if(hc){var w=document.createElement('div');w.className='chs';
    q.choices.forEach(function(ch,i){var btn=document.createElement('button');btn.className='ch';
      btn.innerHTML='<span class="cr">'+LB[i]+'</span><span>'+ch+'</span>';
      btn.addEventListener('click',(function(ii,ww){return function(){pk(ii+1,ww)}})(i,w));w.appendChild(btn)});ca.appendChild(w)
  }else{var nd=document.createElement('div');nd.className='ncn';
    nd.textContent='\u26a0\ufe0f \uc9c0\ubb38/\ud45c \ud3ec\ud568 \ubb38\uc81c \u2014 \uc815\ub2f5 \ubc88\ud638\ub97c \uc9c1\uc811 \uc120\ud0dd\ud558\uc138\uc694.';ca.appendChild(nd);
    var w=document.createElement('div');w.className='mbs';
    LB.forEach(function(l,i){var btn=document.createElement('button');btn.className='mb';btn.textContent=l;
      btn.addEventListener('click',(function(ii,ww){return function(){pkm(ii+1,ww)}})(i,w));w.appendChild(btn)});ca.appendChild(w)}
  g('fb').className='fb';g('nextb').disabled=true;
  g('nextb').textContent=state.idx<state.qs.length-1?'\ub2e4\uc74c \ubb38\uc81c':'\uacb0\uacfc \ubcf4\uae30';
  clearInterval(state.timer);
  if(state.mode==='timed'){state.ts=60;var t=g('tmr');t.style.display='';t.className='tmr';t.textContent='60';
    state.timer=setInterval(function(){state.ts--;t.textContent=state.ts;if(state.ts<=10)t.className='tmr warn';if(state.ts<=0){clearInterval(state.timer);if(!state.ans)ask()}},1000)
  }else g('tmr').style.display='none'}
function pk(n,w){if(state.ans)return;state.ans=true;clearInterval(state.timer);var q=state.qs[state.idx],cor=q.answer,ok=n===cor;
  w.querySelectorAll('.ch').forEach(function(c,i){c.disabled=true;if(i+1===cor)c.classList.add('ok');else if(i+1===n&&!ok)c.classList.add('ng')});dfb(ok,cor);rec(q,n,ok)}
function pkm(n,w){if(state.ans)return;state.ans=true;clearInterval(state.timer);var q=state.qs[state.idx],cor=q.answer,ok=n===cor;
  w.querySelectorAll('.mb').forEach(function(b,i){b.disabled=true;if(i+1===cor)b.classList.add('ok');else if(i+1===n&&!ok)b.classList.add('ng')});dfb(ok,cor);rec(q,n,ok)}
function dfb(ok,cor){var fb=g('fb');fb.className='fb '+(ok?'ok':'ng');
  fb.innerHTML=ok?'<span class="fi">\u2705</span><span>\uc815\ub2f5\uc785\ub2c8\ub2e4!</span>':'<span class="fi">\u274c</span><span>\uc624\ub2f5\uc785\ub2c8\ub2e4. \uc815\ub2f5: <strong>'+LB[cor-1]+'</strong></span>';
  g('nextb').disabled=false}
function rec(q,n,ok){state.res.push({q:q,chosen:n,correct:ok});var k=q.section+'|'+q.num;
  if(!ok){if(!state.wb.find(function(w){return w.section+'|'+w.num===k}))state.wb.push(q)}
  else state.wb=state.wb.filter(function(w){return w.section+'|'+w.num!==k})}
function ask(){state.ans=true;var q=state.qs[state.idx];state.res.push({q:q,chosen:null,correct:false});
  g('ca').querySelectorAll('.ch,.mb').forEach(function(c,i){c.disabled=true;if(i+1===q.answer)c.classList.add('ok')});
  var fb=g('fb');fb.className='fb ng';
  fb.innerHTML='<span class="fi">\u23f0</span><span>\uc2dc\uac04 \ucd08\uacfc! \uc815\ub2f5: <strong>'+LB[(q.answer||1)-1]+'</strong></span>';g('nextb').disabled=false}
function nq(){clearInterval(state.timer);state.idx++;if(state.idx>=state.qs.length)shr();else shq()}
function shr(){clearInterval(state.timer);sv('s-result');
  var res=state.res,n=res.length,ok=res.filter(function(r){return r.correct}).length;
  var ng=res.filter(function(r){return !r.correct&&r.chosen!==null}).length;
  var sk=res.filter(function(r){return r.chosen===null}).length;
  var sc=n>0?Math.round(ok/n*100):0;
  g('rg').textContent=sc+'\uc810';
  g('rgs').textContent=sc>=70?'\ud83c\udf89 \ud569\uaca9\uad8c\uc785\ub2c8\ub2e4!':sc>=50?'\uc870\uae08 \ub354 \ub178\ub825\ud558\uc138\uc694!':'\ub2e4\uc2dc \ud55c\ubc88 \ub3c4\uc804\ud574\ubcf4\uc138\uc694!';
  g('rok').textContent=ok;g('rng').textContent=ng;g('rsk').textContent=sk;
  var rows=g('bdr');rows.innerHTML='';
  ['\ubb34\uc5ed\uaddc\ubc94','\ubb34\uc5ed\uacb0\uc81c','\ubb34\uc5ed\uacc4\uc57d','\ubb34\uc5ed\uc601\uc5b4'].forEach(function(sec){
    var sr=res.filter(function(r){return r.q.section===sec});if(!sr.length)return;
    var sok=sr.filter(function(r){return r.correct}).length,pct=Math.round(sok/sr.length*100);
    var row=document.createElement('div');row.className='br';
    row.innerHTML='<span class="bn">'+sec.replace('\ubb34\uc5ed','')+'</span><div class="bb"><div class="bf" style="width:'+pct+'%"></div></div><span class="bsc">'+sok+'/'+sr.length+'</span>';
    rows.appendChild(row)});
  rvw('all')}
function rvw(fl){var list=g('rl');list.innerHTML='';
  var items=state.res;if(fl==='ng')items=items.filter(function(r){return !r.correct});
  items.forEach(function(r){var div=document.createElement('div');div.className='ri '+(r.correct?'ok':'ng');
    var lbl=r.correct?'\uc815\ub2f5':r.chosen?'\uc624\ub2f5':'\uac74\ub108\ub220';
    div.innerHTML='<div class="rit"><span style="font-size:11px;color:var(--gray)">'+r.q.section+' Q'+r.q.num+'</span><span class="rtg '+(r.correct?'ok':'ng')+'">'+lbl+'</span></div><div class="rsm">'+cs(r.q.stem||'')+'</div>';
    div.addEventListener('click',(function(rr){return function(){opm(rr)}})(r));list.appendChild(div)})}
function opm(r){var q=r.q;g('mdtl').textContent=q.section+' Q'+q.num;
  var parsed=parseStem(q.stem||'');
  var mw=g('mpassage-wrap');
  if(parsed.passage){mw.innerHTML='<div class="mpassage">'+parsed.passage+'</div>';}else{mw.innerHTML='';}
  g('mqs').textContent=parsed.question.replace(/^\d+[.\s]\s*/,'').trim();
  var cl=g('mcl');cl.innerHTML='';
  if(q.choices&&q.choices.length>=4){q.choices.forEach(function(c,i){var div=document.createElement('div');
    div.className='mci'+(i+1===q.answer?' ok':r.chosen===i+1&&!r.correct?' ng':'');
    div.innerHTML='<span class="mcd">'+LB[i]+'</span><span>'+c+'</span>';cl.appendChild(div)})
  }else{var d=document.createElement('div');d.innerHTML='<span class="ab">\uc815\ub2f5: '+LB[(q.answer||1)-1]+'</span>';cl.appendChild(d)}
  g('mbg').classList.add('open')}
function _init(){
  var eg=g('eg');
  META.forEach(function(m){
    var c=document.createElement('button');c.className='ec';c.dataset.num=m.num;
    c.innerHTML='<span class="ey">'+m.year+'</span><div class="en">'+m['\ud68c\ucc28']+'</div><div class="es">'+EXAMS[m.num].length+'\ubb38\ud56d</div>';
    c.addEventListener('click',function(){var i=state.se.indexOf(m.num);if(i>=0){state.se.splice(i,1);c.classList.remove('sel')}else{state.se.push(m.num);c.classList.add('sel')}usb()});
    eg.appendChild(c)});
  document.querySelectorAll('#sf .chip').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('#sf .chip').forEach(function(x){x.classList.remove('on')});c.classList.add('on');state.ss=c.dataset.sec;usb()})});
  document.querySelectorAll('.mc').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('.mc').forEach(function(x){x.classList.remove('on')});c.classList.add('on');state.mode=c.dataset.mode;usb()})});
  g('sb').addEventListener('click',function(){sqz(state.mode==='wrong')});
  g('skipb').addEventListener('click',function(){if(!state.ans)state.res.push({q:state.qs[state.idx],chosen:null,correct:false});state.ans=true;nq()});
  g('nextb').addEventListener('click',function(){if(!state.ans)state.res.push({q:state.qs[state.idx],chosen:null,correct:false});nq()});
  g('eb').addEventListener('click',function(){clearInterval(state.timer);sv('s-home');usb()});
  g('hb').addEventListener('click',function(){sv('s-home');usb()});
  g('rtb').addEventListener('click',function(){sqz(false)});
  g('wb').addEventListener('click',function(){if(state.wb.length){state.mode='wrong';sqz(true)}});
  g('mdc').addEventListener('click',function(){g('mbg').classList.remove('open')});
  g('mbg').addEventListener('click',function(e){if(e.target===g('mbg'))g('mbg').classList.remove('open')});
  g('fa').onclick=function(){document.querySelectorAll('.fbt').forEach(function(b){b.classList.remove('on')});g('fa').classList.add('on');rvw('all')};
  g('fn').onclick=function(){document.querySelectorAll('.fbt').forEach(function(b){b.classList.remove('on')});g('fn').classList.add('on');rvw('ng')};
}
