? “항공기 부분품 관세 면제…3월 13일까지 수입분, 6월 12일까지 환급신청” 항공기 부분품에 대한 관세 면제(관세감면율 '80%→100%')가 올 연말까지 연장됨에 따라, 올해 1월 1일부터 3월 13일까지 해당 물품을 수입한 경우 납부한 관세를 환급 받을 수 있게 된다. [출처] 한국세정신문 (2025.03.17.)","choices":["정부용품 등의 면세","세율불균형물품의 면세","특정물품의 면세","종교용품, 자선용품, 장애인용품 등의 면세"],"answer":2},{"section":"무역규범","num":19,"stem":"19. 해외 온라인 쇼핑몰에서 자가사용 목적으로 수입한 후, 반품 신청을 통해 수입한 상태 그대로 수출하는 물품에 대해 수입 시에 납부한 관세를 돌려받을 수 있다. 다음 중 환 급이 되지 않는 경우는?","choices":["수입신고 수리일로부터 8개월 되는 날에 보세구역에 반입하였다가 다시 수출하는 경 우","수입신고 수리일로부터 5개월이 되는 날에 관세청장이 정하는 바에 따라 세관장의 확 인을 받고 다시 수출하는 경우","수출신고가 생략되는 우편물로서 수출신고가격(FOB가격)이 150만원인 물품을 수입신 고 수리일로부터 5개월이 되는 날에 수출한 후 세관장의 확인을 받은 경우","여행자가 항공기에서 구매한 물품을 입국 시 자진 신고한 뒤 구매한 물품을 환불한 경우"],"answer":1},{"section":"무역규범","num":20,"stem":"20. 다음은 ㈜한국무역의 수출입통관 업무에 관한 내용이다. ㈜한국무역이 수입 통관 시 납부한 관세를 받을 수 있는 환급 방법으로 맞게 짝지어진 것은? A. ㈜한국무역은 베트남에서 전자제품 100개를 수입하였다. 이 중 60개는 국내에 판매 하고 남은 40개는 수입한 상태 그대로 중국으로 수출하였다. B. ㈜한국무역은 12월에 중국에서 수입 통관한 자전거에 일부 하자가 있는 것을 발견하 고 다시 중국으로 수출하기 위해 이듬해 4월에 수입한 상태 그대로 보세구역에 반 입한 후 수출하였다. C. ㈜한국무역이 수입 통관 시에 적용한 관세율이 잘못되어 납부해야 할 관세보다 더 많이 납부한 것을 발견하고 관세환급을 신청하였다.","choices":["A : 원상태환급 B : 위약환급 C : 과오납환급","A : 원상태환급 B : 원상태환급 C : 개별환급","A : 위약환급 B : 위약환급 C : 개별환급","A : 위약환급 B : 원상태환급 C : 과오납환급"],"answer":1},{"section":"무역규범","num":21,"stem":"21. 관세법상 보세구역에 관한 설명으로 잘못된 것은?","choices":["국제무역선에서 물품을 하역하기 전에 외국물품의 일부를 견본품으로 반출하려는 경 우에는 세관장의 허가를 받아야 한다.","보세구역은 지정보세구역ㆍ특허보세구역 및 종합보세구역으로 구분하고, 지정보세구역 은 지정장치장 및 세관검사장으로 구분한다.","지정장치장은 세관장이 통관하려는 물품을 검사하기 위한 장소로서 지정하는 구역이 다. 지정장치장에 반입한 물품은 운영인이 그 보관의 책임을 진다.","보세공장에서는 외국 물품을 원료 또는 재료로 하거나 외국 물품과 내국물품을 원료 또는 재료로 하여 제조·가공하거나 그밖에 이와 비슷한 작업을 할 수 있다."],"answer":3},{"section":"무역규범","num":22,"stem":"22. 관세법령에서 규정하고 있는 우편물 통관에 대한 설명으로 잘못된 것은?","choices":["체신관서가 외국으로 발송한 우편물은 관세법에 따라 적법하게 수출되거나 반송된 것 으로 본다.","우편물이 수출입의 승인을 받은 것이거나 관세법 제226조에 따라 세관장의 확인이 필 요한 것이면 해당 우편물의 수취인이나 발송인은 세관장에게 신고하여야 한다.","우편물에 대한 관세의 납세의무는 해당 우편물이 반송되면 소멸한다.","수출ㆍ수입 또는 반송하려는 우편물(서신도 포함)은 통관우체국을 경유하여야 한다."],"answer":4},{"section":"무역규범","num":23,"stem":"23. 관세법령에서 규정하고 있는 관세행정 구제제도에 대한 설명으로 올바른 것은?","choices":["이의신청을 거친 후 심사청구를 하려는 경우에는 이의신청에 관한 결정을 통지받은 날부터 60일 이내에 하여야 한다.","청구기간이 지났거나 보정기간 내에 보정하지 아니하는 경우의 과세전 적부심사 청구 에 대해서는 심사하지 아니한다는 결정을 한다.","관세청장은 심사청구를 한 처분 외의 처분에 대해서도 그 처분의 일부를 취소 또는 변경할 수 있다.","이의신청의 재결청은 불복방법을 통지할 때, 결정서를 받은 날부터 90일 이내에 행정 소송을 제기할 수 있음을 통지하여야 한다."],"answer":2},{"section":"무역규범","num":24,"stem":"24. 다음은 관세 환급과 관련된 용어에 대한 설명이다. 맞게 짝지어진 것은? A. 수출물품을 생산(가공·조립·수리·재생 또는 개조하는 것을 포함한다)하는 데 드는 원 재료의 양으로서 생산과정에서 정상적으로 발생하는 손모량 포함한 것을 말한다. B. 수출용 원재료가 내국신용장 등에 의하여 거래된 경우, 관세 등의 환급업무를 효율 적으로 수행하기 위하여 제조·가공 후 거래된 수출용 원재료에 대한 납부세액을 증 명하는 서류로 세관장이 발급한다. C. 수입된 상태 그대로 거래된 수출용 원재료에 대한 납부세액을 증명하는 서류로 세관 장이 발급한다.","choices":["A : 소요량 B : 수입세액분할증명서 C : 기초원재료납세증명서","A : 투입량 B : 기초원재료납세증명서 C : 수입세액분할증명서","A : 투입량 B : 수입세액분할증명서 C : 기초원재료납세증명서","A : 소요량 B : 기초원재료납세증명서 C : 수입세액분할증명서"],"answer":4},{"section":"무역규범","num":25,"stem":"25. 다음 수출 물품에 사용된 원재료 중 관세 등 환급 대상에 해당하지 않는 것은?","choices":["생산된 자동차 표면에 색을 입히는 페인트의 점성을 낮추기 위해 사용하는 혼합용제 인 시너(thinner)","반도체를 생산하고 이를 수출하는데 소요된 포장용품","자동차 핸들을 생산하는 공정에 직접 투입되는 기계를 원활하게 작동하는데 소요된 윤활유","베트남에서 생산된 스마트 TV를 수입한 후 그 상태 그대로 수출하는 스마트 TV"],"answer":3},{"section":"무역규범","num":26,"stem":"26. 관세환급특례법령에서 규정하고 있는 관세환급에 관한 설명으로 잘못된 것은?","choices":["관세환급은 개별환급과 간이정액환급이 있으며, 중소기업으로 환급신청일이 속하는 연 도의 직전 2년간 매년 환급실적이 8억원 이하인 업체의 경우 간이정액환급 대상이다.","관세청장은 생산공정이 특수한 수출물품과 중소기업 수출물품에 대한 관세 등의 환급 절차를 간소화하는 데 필요하다고 인정하는 경우에 수출물품별로 정액환급률표를 정 하여 고시할 수 있다.","관세 등을 환급받으려는 자는 환급신청을 하기 전에 소요량 및 간이정액환급액의 적 정 여부를 관세청장에게 미리 심사하여 줄 것을 신청할 수 있다.","주한미군이 시행하는 공사로서 우리나라 안에서 외화를 획득하는 경우에는 관세환급 대상 수출에 포함된다."],"answer":3},{"section":"무역규범","num":27,"stem":"27. 다음 중 수입물품에 대하여 협정관세의 적용을 위해 충족해야 하는 요건을 모두 고른 것은? A. 해당 수입물품이 협정에 따른 협정관세의 적용 대상일 것 B. 원산지 결정기준에 따라 결정된 해당 수입물품의 원산지가 해당 체약상대국일 것 C. 해당 수입물품이 국내에서 최종 소비될 것 D. 해당 수입물품에 대하여 협정관세의 적용 또는 협정관세 사후 적용을 신청할 것 E. 해당 수입물품의 수출국과의 무역수지 균형을 맞출 경우에만 적용될 것","choices":["A, C, E","A, B, D","A, D, E","A, B, C, D"],"answer":2},{"section":"무역규범","num":28,"stem":"28. 자유무역협정(FTA)관세법령상 원산지 결정기준에 대한 설명 중 잘못된 것은?","choices":["원산지로 결정된 경우에도 해당 물품이 생산ㆍ가공 또는 제조된 이후에 원산지가 아 닌 국가에서 선적된 경우에는 그 물품의 원산지로 인정하지 아니한다. 다만, 해당 물 품이 원산지가 아닌 국가의 보세구역에서 운송 목적으로 환적되었거나 일시적으로 보 관되었다고 인정되는 경우에는 그러하지 아니하다.","세번변경기준이란 해당 물품이 2개국 이상에 걸쳐 생산된 경우로서 해당 물품의 품목 번호와 해당 물품의 생산에 사용된 원산지 재료의 품목번호가 일정 단위 이상이 다른 경우 해당 물품을 최종적으로 생산한 국가를 원산지로 인정하는 기준을 말한다.","대체가능물품이란 원산지 물품과 비원산지 물품이 상업적으로 동일한 질과 특성을 가 지고 상호 대체 사용이 가능한 물품(재료 포함)을 말한다.","해당 물품이 2개국 이상에 걸쳐 생산ㆍ가공 또는 제조된 경우에는 실질적 변형기준에 따라 원산지를 결정하며, 부가가치기준, 세번변경기준, 가공공정기준 등이 있다."],"answer":2},{"section":"무역규범","num":29,"stem":"29. 다음 중 해당 체약상대국과의 협정에 따라 원산지증명서의 발급 방식이 잘못된 것은?","choices":["미합중국과의 협정에 따라 수출자, 생산자 또는 수입자가 자율적으로 서면 또는 전자 적 방식으로 작성한 것","튀르키예와의 협정에 따라 수출자가 자율적으로 작성ㆍ서명한 것","호주와의 협정에 따라 수출자 또는 생산자가 자율적으로 서면 또는 전자적 방식으로 작성ㆍ서명한 것","뉴질랜드와의 협정에 따라 수출자 또는 수입자가 자율적으로 작성ㆍ서명한 것"],"answer":4},{"section":"무역규범","num":30,"stem":"30. 자유무역협정(FTA)관세법령상 원산지에 관한 조사에 대한 설명 중 잘못된 것은?","choices":["세관장은 수출입 물품의 원산지 또는 협정관세 적용의 적정 여부 등에 관한 확인이 필요하다고 인정하는 경우에는 수입자, 수출자 또는 생산자, 원산지증빙서류 발급기관 등을 대상으로 필요한 서면조사 또는 현지조사를 할 수 있다.","세관장은 서면조사 또는 현지조사를 마치면 조사 결과와 그에 따른 결정 내용을 협정 에서 달리 정하지 않았으면 조사를 완료한 날로부터 30일 이내에 조사대상자 및 체약 상대국의 관세당국에 서면으로 통지하여야 한다.","세관장은 현지조사를 하려면 조사를 시작하기 60일 전까지 조사대상자에게 통지하여 야 한다. 다만, 국내에 거주하는 수입자, 수출자 또는 생산자 등에 대해서는 조사를 시작하기 30일 전까지 현지조사의 통지를 할 수 있다.","세관장은 협정에서 정한 범위 내에서 원산지 확인을 위해 체약상대국에 증빙서류 검 증을 요청할 수 있다."],"answer":3},{"section":"무역결제","num":1,"stem":"1. 전년도 수출실적이 USD 5,000,000인 ㈜한무상사는 이번에 미국 업체와 USD 30,000 의 수출계약을 체결하고 전액을 사전 송금받았다. 다음 설명 중 올바른 것을 모두 고 른 것은? A. ㈜한무상사는 USD 30,000의 수출대금을 지급받을 때 거래 외국환은행에 지급 등 의 사유와 금액을 입증하는 서류(예: 수출입계약서)를 제출해야 한다. B. ㈜한무상사는 미국 업체로부터 USD 30,000을 사전송금방식으로 수령한 것에 대 해 외국환거래규정에 따른 대응수출을 이행해야 할 의무가 있다. C. ㈜한무상사가 선택한 사전송금방식은 일반적으로 구매자 우위 시장(buyer’s market)에서 발생한다.","choices":["A","B","A, B","A, B, C"],"answer":1},{"section":"무역결제","num":2,"stem":"2. 수출입자가 무역결제를 위해 외국환은행과 체결하는 「외국환거래약정서」에 대한 설명 으로 잘못된 것은?","choices":["외국환거래약정서는 수출, 수입, 내국신용장 발행, 내국신용장 환어음 매입(추심)거래 등을 위해서 외국환 거래자와 은행이 체결하는 기본약정서이다.","외국환거래약정서에 정하는 수입 거래란 신용장 발행, 화환어음의 인도 및 결제, 보증 신용장에 의한 무화환어음의 인도 및 결제 등이다.","외국환거래약정서에서 약정하지 않은 사항은 신용장통일규칙, 추심에 관한 통일규칙 등 국제규칙과 은행의 관련 규정을 따르기로 한다.","외국환거래에 적용하는 환율은 매입(추심) 또는 신용장 개설 등 해당 외국환거래를 신 청한 날의 대고객 매입률 또는 매도율로 한다."],"answer":4},{"section":"무역결제","num":3,"stem":"3. O/A 결제방식과 관련된 설명으로 잘못된 것을 모두 고른 것은? A. 수출자 입장에서 O/A 결제방식은 본지사 간 거래나 신용위험이 높은 해외 고정 거래처와 거래 시 이용해야 결제위험을 줄일 수 있다. B. ‘O/A Nego’는 수출금융의 일종인데, 신용장 매입 관련 수출채권을 거래은행에 매 각하는 금융거래이다. C. 다른 조건이 동일하다면 수입자는 O/A 결제방식보다 T/T in advance 결제방식을 더 선호한다.","choices":["A, B","B, C","A, C","A, B, C"],"answer":4},{"section":"무역결제","num":4,"stem":"4. 은행 실무에서 「선적통지 조건부 사후송금방식 수출거래에 의한 수출대금채권 매입거 래」라고 하는 결제방식은 무엇인가?","choices":["현물상환방식(Cash on delivery)","서류상환방식(Cash against documents)","상호계산(Open account)","보증신용장(Stand-by letter of credit)"],"answer":3},{"section":"무역결제","num":5,"stem":"5. 추심결제방식과 관련된 올바른 설명을 모두 고른 것은? A. D/P 방식은 추심결제방식의 하나로, CAD 방식과 유사한 점이 있다. 그러나 두 방식은 환어음 발행 여부에서 근본적인 차이점이 있다. B. 추심결제방식의 하나인 D/A 방식은 Usance L/C 방식에 비해 수출자에게 대금 회수의 안정성이 떨어진다. C. 실무에서는 추심결제방식을 변형한 ‘D/P Usance’도 활용된다. D. 수출자로부터 추심의 취급을 의뢰받는 은행을 presenting bank라고 한다.","choices":["A, B, C","B, C, D","A, C, D","A, B, C, D"],"answer":1},{"section":"무역결제","num":6,"stem":"6. 추심결제방식에 대한 설명으로 잘못된 것은?","choices":["추심지시서에 D/P인지 D/A인지 명시가 없는 경우에 은행은 D/P로 간주한다.","화환추심에 있어서 추심지시서에 분할지급을 금지하는 문구가 없다면 분할지급은 허 용된다.","추심거래에서 환어음의 어음기한(tenor)이 ‘45 days after sight’인 경우는 D/P 조건 이 아닌 D/A 조건에 해당한다.","D/P 거래에서 수입자가 추심대금을 결제하기 전까지 화물의 소유권은 일반적으로 수 출자가 갖게 된다."],"answer":2},{"section":"무역결제","num":7,"stem":"7. 추심결제를 취급하는 추심의뢰은행, 추심은행 등의 의무와 책임에 관한 설명으로 잘못 된 것은?","choices":["은행은 서류의 형식, 진정성, 법적 효력 등에 대하여 어떠한 의무나 책임을 지지 아니 한다.","추심의뢰은행은 자신이 추심은행을 선택하였으면 전달한 지시가 이행되지 않은 때에 는 그 책임을 부담해야 한다.","은행은 접수된 서류들이 누락되거나 열거된 것과 다른 서류에 대해서 지체없이 추심 지시서를 송부한 당사자에게 통지해야 한다.","은행은 접수된 지시의 설명을 취득하기 위해서 지연이 발생하더라도 책임을 지지 않 는다."],"answer":2},{"section":"무역결제","num":8,"stem":"8. 다음 중 신용장의 효용에 대한 설명으로 가장 부적절한 것은?","choices":["수출자는 신용장을 근거로 무역금융에서 필요한 자금지원을 받을 수 있다.","수출자는 물품을 선적한 후 신용장 조건에 일치하는 서류를 은행에 제시하여 수출 대금을 회수할 수 있다.","기한부 신용장의 수입자는 수입 물품을 먼저 매각하여 판매대금을 가지고 만기일에 결제할 수 있다.","신용장에 선적기일과 유효기일이 명시되어 있으므로 수입자는 계약에서 정한 물품 을 입수할 수 있다는 보장이 있다."],"answer":4},{"section":"무역결제","num":9,"stem":"9. 신용장의 개념과 관계당사자에 대한 설명으로 가장 잘못된 것은?","choices":["신용장이란 수입자가 수출자에 대해서 대금 지급을 보증하는 개설은행의 수익자에 대 한 지급보증서이다.","신용장 거래에서 최소 단위의 기본관계 당사자는 개설은행과 수익자이다. 만약 신용장 에 확인이 추가된 경우라면 확인은행도 기본관계 당사자에 포함될 수 있다.","지정은행(nominated bank)이란 개설은행이 신용장의 사용을 위해서 지정한 매입은행, 지급은행, 인수은행 등을 말한다.","신용장의 근거인 매매계약의 당사자는 매도인(seller)과 매수인(buyer)이며, 이들은 신용 장 거래에서 각각 수익자(beneficiary)와 개설의뢰인(applicant)이 된다."],"answer":1},{"section":"무역결제","num":10,"stem":"10. 다음과 같은 상황에서 활용하기에 가장 적절한 신용장의 종류는? ∙ 수출자는 상품생산에 필요한 원자재 구매에 필요한 자금을 확보하기 위해 사전송 금방식과 신용장 결제를 혼합하고자 한다. ∙ 수입자는 선급금 지급에 따른 위험을 피하기 위해 신용장만으로 결제하고자 한다.","choices":["Revolving Credit","Packing Credit","Escrow Credit","Bid Standby Credit"],"answer":2},{"section":"무역결제","num":11,"stem":"11. 수출자가 거래은행으로부터 거절 통지문(MT734)을 받았을 때, 여러 사정을 고려해 서 취할 태도 중 가장 부적절한 것은?","choices":["신용장 유효기간과 서류 제시기간 내에 하자를 정정하여 다시 제시한다.","개설은행이 제5은행영업일 후에 거절통지가 되었음을 근거로 신용장 대금 지급을 요청한다.","거절 통지문에 서류 보관 중이라고 기재 후 다시 서류를 반송했음을 근거로 신용장 대금 지급을 요청한다.","신용장 결제방식에서 추심결제방식으로의 전환을 시도한다."],"answer":3},{"section":"무역결제","num":12,"stem":"12. 신용장의 개설 및 절차에 관한 내용으로 잘못된 것은??","choices":["신용장은 “Irrevocable”이라는 표시가 없더라도 취소불능신용장으로 본다.","신용장에 “Shipment is subject to our further instruction”이라는 문구는 수익자에게 불리하므로 수익자는 해당 문구를 변경(amend)을 요청하는 것이 좋다.","신용장에 사용방법으로 매입, 지급, 연지급, 인수신용장 중에 하나를 명시하지 않았다 면 매입신용장으로 본다.","신용장에 “Surrendered B/L acceptable”이라고 기재됐다면 개설은행은 수입화물에 대한 담보권 확보가 어렵다."],"answer":3},{"section":"무역결제","num":13,"stem":"13. 화환신용장의 서류심사에서 서류의 수리 요건에 관한 설명으로 잘못된 것은?","choices":["선하증권에 선장의 대리인이 서명할 때, 반드시 선장의 이름과 함께 대리인 자신의 이 름을 기재해야 한다.","신용장이 항공운송을 요구하면서 환적을 금지하고 있는 경우라도 환적사실이 기재된 항공운송 서류는 수리될 수 있다.","신용장이 피보험자를 지정하지 않았다면, 보험서류에 피보험자로 개설은행, 개설의뢰 인을 기재할 수 있다.","신용장에서 보험서류 원본 1통과 사본 1통을 요구한 경우, 보험서류에 원본이 2부 발 행되었다고 기재되었다면, 원본 2통과 사본 1통을 제시해야 수리될 수 있다."],"answer":1},{"section":"무역결제","num":14,"stem":"14. 다음 중 신용장 서류심사 기준에 관한 내용으로 가장 옳은 것은?","choices":["상업송장의 발행일이 신용장 개설일보다 앞서면 수리 거절된다.","보험서류의 발행일이 운송서류의 선적일보다 늦으면 원칙적으로 수리 거절된다.","선하증권에 선장의 대리인이 서명하는 경우, 선장의 이름이 없으면 수리 거절된다.","신용장이 수출자 발행 원산지증명서를 요구한 경우, 상공회의소 발행 원산지증명서 는 수리 거절된다."],"answer":2},{"section":"무역결제","num":15,"stem":"15. SWIFT 신용장 「47A. Additional conditions」의 기재 내용에 대한 설명으로 잘못된 것 은? + 3 PERCENT MORE OR LESS IN QUANTITY AND AMOUNT ALLOWED. + AT THE TIME OF NEGOTIATION, THE NEGOTIATING BANK WILL PAY YOU THE AMOUNT OF THE DRAFT LESS REIMBURSING BANK'S CHARGES. + A FEE OF USD 50.00, PLUS ALL RELATED CHARGES WILL BE DEDUCTED FROM THE REIMBURSEMENT CLAIM FOR EACH PRESENTATION OF DISCREPANT DOCUMENTS UNDER THIS DOCUMENTARY CREDIT. + DOCUMENTS MUST BE PRESENTED WITHIN 7 DAYS AFTER THE DATE OF SHIPMENT BUT WITHIN THE VALIDITY OF THIS CREDIT.","choices":["신용장 금액과 수량은 3%의 범위에서 과부족이 허용된다.","매입은행은 어음대금에서 미입금 수수료 등을 공제하고 수익자에게 지급한다.","신용장 서류 매입에서 하자가 있을 때마다 USD 50의 하자 수수료와 관련 수수료가 대 금에서 공제된다.","서류는 신용장의 유효기일과 관계없이 선적일자 후 7일 이내 제시되면 된다."],"answer":4},{"section":"무역결제","num":16,"stem":"16. 신용장에서 다르게 정하지 않았다면, 신용장통일규칙에 따라서 해석되는 사항 중 잘못 된 것은?","choices":["“To”, “until”, “till”이라는 단어가 선적 기간을 결정하기 위해서 사용될 때, 언 급된 일자를 포함한다.","“Before”, “after”라는 단어가 선적 기간을 결정하기 위해서 사용될 때, 언급된 일 자를 제외한다.","“From”과 “after”라는 단어가 만기일을 결정하기 위하여 사용될 때, 언급된 일자 를 포함한다.","“On or about”은 어떤 사건의 명시된 일자의 이전 5일부터 이후 5일까지 총 11일간 을 말한다."],"answer":3},{"section":"무역결제","num":17,"stem":"17. 다음 중 화환신용장의 확인에 대한 설명으로 올바른 것을 모두 고른 것은? A. 원신용장이 확인신용장이라면, 양도된 신용장도 확인신용장이다. B. 확인은행은 신용장 금액의 일부에 대해서만 확인을 추가할 수 있다. C. 통지와 함께 확인을 요청받은 통지은행은 확인 여부를 결정한 후 신용장을 통지 하여야 한다. D. 확인은행이 매입한다면, 상환청구권 행사 없이 매입하여야 한다. E. 수익자 국가 내에서 발생한 확인수수료는 수익자가 부담한다.","choices":["A, B, C","B, C, E","A, B, D","C, D, E"],"answer":3},{"section":"무역결제","num":18,"stem":"18. 서류심사에 관한 국제표준은행관행(ISBP)에 따라서 신용장에 사용되는 환어음에 관한 내용으로 잘못된 것은?","choices":["신용장 결제에 사용하는 환어음은 개설의뢰인을 지급인으로 발행해서는 안 된다.","환어음에 표시되는 통화는 신용장의 통화와 일치해야 한다.","환어음의 금액은 상업송장의 금액과 일치시켜야 한다.","만일 환어음에 기재된 숫자금액과 문자금액이 상이하면 문자금액을 기준으로 심사해 야 한다."],"answer":3},{"section":"무역결제","num":19,"stem":"19. 다음 중 ISBP에 규정한 상업송장에 대한 설명으로 잘못된 것은?","choices":["신용장에 명시되어 있지 않다면, 물품의 단가는 기재하지 않아도 된다.","신용장에 요구되지 않더라도, 발행인과 발행인의 서명은 반드시 표시되어야 한다.","신용장에 표시되어 있지 않더라도, 매매계약서상에 기재된 선지급금이 표시될 수 있다.","신용장에서 요구된 총 부수를 충족하였다면, 포장명세서와 하나의 서류로 작성되어도 무방하다."],"answer":2},{"section":"무역결제","num":20,"stem":"20. 국제거래에서 채무자의 의무이행을 담보하기 위해 사용되는 Clean L/C에 관한 설명으 로 잘못된 것은?","choices":["Clean L/C란 무화환신용장으로서, 은행 실무에서는 Standby L/C(보증신용장)와 Bank guarantee(은행 보증서)가 혼용되어 사용된다.","Clean L/C의 장점은 부당 청구(unfair calling)의 가능성이 없고, 단점은 수출입 대금결 제에 사용될 수 없고, 금융보증용과 이행보증용으로 용도가 제한된다는 점이다.","Standby L/C에서 개설은행의 채무는 기본계약 관계가 성립하면 개시된다.","Standby L/C의 근거 규정은 ISP 98이지만, 적용할 수 있는 범위 안에서 UCP 600도 적 용될 수 있다."],"answer":2},{"section":"무역결제","num":21,"stem":"21. 다음 중 팩터링과 포페이팅에 대한 공통된 설명으로 올바른 것을 모두 고른 것은? A. 무신용장 방식에서만 활용되는 대금결제 위험관리 방안이다. B. 수출자가 활용하는 금융거래로, 수입자가 별도로 체결할 계약은 없다. C. 수입자의 대금결제 만기일은 기초거래의 만기일과 동일하다. D. 수입자가 물품의 하자를 이유로 대금 지급을 거절하는 경우, 수출자는 대금을 상 환하여야 한다. E. 수출자는 추가적인 수수료를 부담할 뿐 별도의 담보를 제공하지 않는다.","choices":["B, C, E","A, B, D","C, E","모두"],"answer":3},{"section":"무역결제","num":22,"stem":"22. 국내에서만 사용되는 내국신용장(Local L/C)에 대한 설명으로 잘못된 것은?","choices":["내국신용장(Local L/C)은 외국환은행이 대금 지급을 확약하는 국내에서 사용되는 신용 장이다. 반면, 구매확인서는 은행의 지급 확약이 없는 단순한 구매 사실 확인서이다.","내국신용장의 거래대상 물품은 수출용 원자재 및 물품의 구매에 한정되지만, 구매확인 서는 외화획득용 물품 구매에도 발급할 수 있다.","내국신용장은 사전 발급만 가능하지만, 구매확인서는 부가가치세 신고 기간 내에서는 사후 발급도 가능하다.","내국신용장의 매입은행은 일반 수출신용장과 마찬가지로 반드시 존재해야 하는 필수 관계당사자이다."],"answer":4},{"section":"무역결제","num":23,"stem":"23. 다음이 설명하는 외국환은행이 부과하는 외국환 수수료를 무엇이라 하는가? A. 외국환의 매매를 수반하지 않고 외국환의 수취 또는 지급이 이루어질 때 외국환은 행이 외환 거래자에게 부과하는 수수료다. B. 해외송금 시 대금을 외국환 계정에서 지급하거나, 내도한 매입대금을 외국환 계정에 입금할 때 외국환 매매에 따른 이익이 발생하지 않기 때문에 이러한 기대이익 상실 에 대해 부과되는 수수료다. C. 원화의 개재 없이 단순한 외국환 자체로 지급 또는 영수하거나 외국환 계정을 활용 할 때 외국환은행이 외환 매매익을 취득할 수 없어서 이를 보전하기 위하여 부과한 다.","choices":["Exchange commission","Commission in lieu of exchange","Negotiation charge","Less charge"],"answer":2},{"section":"무역결제","num":24,"stem":"24. 외환거래의 내용 및 외환거래에 속하는 거래사례에 대한 설명으로 잘못된 것은?","choices":["외환거래는 외환의 매매계약 후 외환의 인수도와 결제가 실행되는 시점에 따라 현물 환거래와 선물환거래로 구분된다.","수출기업인 ㈜을화무역은 달러화로 표시된 수출신용장을 은행에서 네고(nego)하여 원 화 예금계좌에 입금하였다.","㈜을화상사는 호주 현지 사무소 운영비로 맥쿼리은행으로부터 100만 호주달러(AUD)를 3년간 차입하였다.","㈜을화통상의 장그래 부장은 일본 출장을 가기 위해 신한은행에서 100만 엔(JPY)을 환 전하였다."],"answer":3},{"section":"무역결제","num":25,"stem":"25. 환율에 관한 기술 내용 중에서 잘못된 것은?","choices":["환율의 상승은 외국통화의 가치가 높아지는 것으로 자국 통화의 대외가치가 하락하는 것을 의미한다.","직접표시환율은 외국통화 한 단위와 교환되는 자국통화의 금액으로 표시하는 것을 의 미하며, 한국을 비롯한 다수의 국가에서 사용하는 방식이다. 일부 국가에서는 자국통 화 한 단위와 교환되는 외국통화의 금액으로 나타내는 간접표시환율을 사용하기도 한 다.","현물환거래는 계약일로부터 통상 제2영업일 이내에 외환의 인수도와 대금의 결제가 이루어지는 거래를 말한다.","우리나라는 외국과 통상마찰을 줄이기 위해서 현재 시장평균환율제도를 시행하고 있 으며, 그동안 일일 환율변동제한폭도 지속하여 확대해 왔다."],"answer":4},{"section":"무역결제","num":26,"stem":"26. 다음은 2025년 3월 중 서울 외환시장의 USD/KRW 현물환율, 스왑레이 트, 선물환율 을 나타낸 것이다. 여기서 스왑레이트가 마이너스(-)로 산출되면서 선물환율은 현물 환율보다 낮은 수준으로 거래되고 있음을 알 수 있다. 그 이유를 가장 적절하게 설 명한 것은? USD/KRW 스왑레이트 환율 구분 매입률 매도율 매입률 매도율 현물환 0 0 1,452.70 1,454.10 1개월 선물환 -340 -150 1,449.30 1,452.60 3개월 선물환 -940 -460 1,443.30 1,449.50","choices":["현물환 시장에서 달러의 공급이 늘어나고 있기 때문이다.","선물환 시장에서 달러 매수가 급증하고 있기 때문이다.","원화 금리가 달러 금리보다 낮기 때문이다.","향후 달러 현물환율이 상승할 것으로 예상되기 때문이다."],"answer":3},{"section":"무역결제","num":27,"stem":"27. 다음은 우리나라에서 거래되고 있는 달러(USD) 통화선물의 특징이다. 올바른 것을 모두 고른 것은? A. 오직 한국거래소(KRX)를 통해서만 거래되는 장내거래이다. B. 환위험관리(헤지) 목적의 거래만 가능하고 투기거래는 허용되지 않는다. C. 거래하는 사람들은 상대방에 대한 신용위험을 부담해야 한다. D. 거래단위와 만기 결제일은 상대방이 동의하면 자유롭게 결정할 수 있다.","choices":["A","B, C","A, C","B, D 험 동 험"],"answer":1},{"section":"무역결제","num":28,"stem":"28. 다음 중 한국무역보 공사에서 취급하는 수출기업의 일반형 환변 보 에 대한 설명으 로 가장 적절하지 않은 것은?","choices":["신용도가 낮거나 금액이 적어서 은행과의 선물환거래가 힘든 중소기업의 환리스크 관 리를 위해 개발되었다.","결제환율은 미래의 환율을 미리 확정하는 환율로 계약 당시의 현물환율과 스왑레이트 를 감안하여 결정된다.","만기에 보장환율이 결제환율보다 높으면, 수출기업은 보장환율과 결제환율의 차이를 보험금으로 수령한다.","만기에 결제환율이 보장환율보다 높으면, 수출기업은 보장환율과 결제환율의 차이를 한국무역보험공사에 지불해야 한다."],"answer":2},{"section":"무역결제","num":29,"stem":"29. 다음 한국의 ㈜을화 패션이 사용하고 있는 환리스크 관리기법은 무엇인가? A. ㈜을화패션은 국내에서 원단을 베트남 공장으로 보내 의류를 만들어 국내로 들여와 판매하고 있다. B. 국내 본사는 베트남 현지 공장에 총 USD 1,200,000상당의 원단을 3차례에 걸쳐 공 급했다. C. 베트남 공장으로부터 총 USD 2,100,000상당의 의류를 4차례에 걸쳐 납품받았다. D. 본사와 현지 공장은 매번 결제하지 않고 USD 900,000을 한 번에 송금하기로 했다. E. 이 회사는 환전과 송금수수료를 줄이고 환노출을 USD 900,000으로 줄일 수 있었다.","choices":["매칭(matching)","상계(netting)","리딩과 래깅(leading and lagging)","자산․부채관리(asset-liability management) 주"],"answer":2},{"section":"무역결제","num":30,"stem":"30. ( )한국무역은 다음과 같은 조건으로 3개월 만기 달러 콜옵션(유럽식)을 매도하였다. 3 개월 이후 옵션 만기일에 USD/KRW 현물환율이 1,490원으로 결정되었다면, 옵션 프리 미엄을 고려할 때 결과적으로 이 회사가 달러를 매도한 환율은 얼마인가? (환율표시에 서 앞의 통화가 기준통화) 구분 환율, 프리미엄 USD/KRW 현물환율 1,490 행사가격 1,450 옵션 프리미엄 달러당 30원","choices":["1,450","1,470","1,480","1,490"],"answer":3},{"section":"무역계약","num":1,"stem":"1. 국제거래의 기 본인 계약자유의 원칙을 국제상사계약원칙의 근거로 설명한 것 중에 서 잘못된 것은?","choices":["당사자는 자유로이 계약을 체결하고, 계약의 상대방을 선택할 자유가 있다.","당사자가 계약의 내용을 결정하는데 강행규정에 의한 제한은 고려하지 아니한다.","계약이나 진술, 그 밖의 어떠한 행위가 특정한 방식(form)으로 행해지거나 증명될 것을 요구하지 않는다.","유효하게 체결된 계약은 양 당사자를 구속하지만, 계약조건, 당사자 합의 또는 국제 상사계약원칙에 따라서 유효하게 성립된 계약의 변경이나 종료도 가능하다."],"answer":2},{"section":"무역계약","num":2,"stem":"2. Incote rms 2020의 조건에 관한 설명으로 잘못된 것은?","choices":["DAT(터미널인도조건)를 DPU(도착지양하인도조건)로 변경하였다.","CIF는 ICC(A) 조건으로 부보 수준을 강화하였고, CIP는 ICC(C) 조건을 유지하였다.","FCA와 D 조건에서 운송의무 및 비용 조항에 보안 관련 요건을 포함시켰다.","FCA에서 당사자의 합의로 본선적재 표시가 있는 선하증권을 요구할 수 있도록 하 였다."],"answer":2},{"section":"무역계약","num":3,"stem":"3. Incote rms 2020의 조건별 기준에 관한 설명 중 잘못된 것은? 기준 위험의 분기점 비용의 분기점 조건 수출통관 의무 항공운송 (Seller→Buyer) (Seller→Buyer) 매도인 작업장 매도인 작업장","choices":["EXW 매수인 사용 가능 구내 구내 매수인이 지정한 수출지에서","FCA 매도인 사용 가능 운송인에게 인도 운송인에게 인도 지정선적항 지정선적항","CFR 매도인 사용 불가 본선 적재 본선 적재 수입국 내 수입국 내","DDP 목적지점 반입 매수인 사용 가능 목적지점 반입 (관세 불포함)"],"answer":4},{"section":"무역계약","num":4,"stem":"4. Vienna Convention(1980)의 적용 범위에 관한 설명으로 잘못된 것은?","choices":["해당 협약의 적용 여부를 결정하는 데에 당사자나 계약의 민사적·상사적 성격을 고려해야 한다.","당사자는 협약의 적용을 배제할 수 있다.","매매된 물품의 소유권에 관하여 계약이 미치는 효력에는 관련이 없다.","물품으로 인하여 발생한 사람의 상해에 대한 매도인의 책임에는 적용되지 않는다."],"answer":1},{"section":"무역계약","num":5,"stem":"5. Vienna Convention(1980)에서 규정한 본질적 계약위반에 관한 설명으로 올바른 것은?","choices":["위반 당사자가 계약위반의 결과를 예견하지 못했더라도 실질적 손실이 있는 경우에 는 본질적인 위반이다.","분할선적을 허용한 계약에서 특정 분할분의 의무 불이행이 그 분할 부분의 본질적 계약위반에 해당한다면 전체 계약에 대해서 해제할 수 있다.","이행기일 이전에도 상대방의 본질적 계약위반이 명백한 경우에는 계약을 해제할 수 있다.","매수인에게 위험이 이전되었다면 매도인이 본질적 계약위반을 한 경우라도 권리구 제의 행사를 할 수 없다. G N"],"answer":3},{"section":"무역계약","num":6,"stem":"6. 국제계약 관련 규칙인 CIS 와 U IDROIT 원칙에 대한 설명 중에서 잘못된 것은?","choices":["CISG는 1980년에 UNCITRAL(UN국제거래법위원회)이 제정한 국제물품매매계약에 관 한 협약(국제조약)이다. UNIDROIT 원칙은 1994년에 UNIDROIT(국제사법통일협회)가 제정한 국제상사계약을 위한 원칙이다.","CISG는 국제법으로서 제정 이후 개정되지 못하였지만, UNIDROIT 원칙은 각국의 학 자들이 만든 원칙으로 지금까지 여러 번 개정되는 유연성을 보였다.","국제계약을 체결하는 당사자는 준거법(governing law)으로 CISG를 선택할 수 있지 만, UNIDROIT 원칙은 선택할 수 없다.","CISG는 국제물품매매에만 사용될 수 있지만, UNIDROIT 원칙은 물품 및 서비스의 거래를 포함한 대부분 국제상사계약에 사용될 수 있다."],"answer":3},{"section":"무역계약","num":7,"stem":"7. 무역계약의 법 률적 성격에 관한 설명으로 잘못된 것은?","choices":["무역계약은 매매 당사자의 합의 외에 소유권 이전 등과 같은 법률적 사실이 있어야 성립된다.","무역계약은 매매 당사자 쌍방이 각각의 계약상 의무를 부담한다.","무역계약은 형식에 상관없이 의사를 전달함으로써 계약을 성립할 수 있다.","무역계약은 매매 당사자가 상호 간에 대가적 관계에 있는 급부를 할 것을 목적으로 성립된다. ff r"],"answer":1},{"section":"무역계약","num":8,"stem":"8. 다음 중 청약(o e )에 대한 설명으로 올바른 것으로만 짝지어진 것은? A. 청약은 유효기간의 설정이나 철회 불가 의사 등 구속력의 유무에 따라 확정청약 과 불확정청약으로 구분될 수도 있다. B. 확정청약은 피청약자가 청약의 유효기간 내에 승낙하면 계약이 성립된다. C. 불확정청약은 청약 자체에 구속력이 없으므로 상대방의 승낙에 따라 계약이 성립 된다. D. 청약은 거절, 취소, 당사자의 사망, 단순한 추가 청약의 발송에 의해 소멸된다.","choices":["A, B","B, C","C, D","A, D r ff r"],"answer":1},{"section":"무역계약","num":9,"stem":"9. 청약자가 구두 청약(o al o e )으로 상대방에게 승 낙은 반드시 서면(in writing)으로 하 라고 했지만 피청약자가 구두(oral)로 승낙한 경우, 이에 대한 해석으로 옳은 것은?","choices":["구두 승낙도 승낙(acceptance)으로 인정되어 계약이 성립된다.","구두 승낙은 새로운 청약(counter offer)으로 인정되지 않는다.","구두 승낙은 청약의 거절로 인정되지 않는다.","구두 승낙은 승낙의 거절과 새로운 청약(counter offer)으로 인정된다. G N"],"answer":4},{"section":"무역계약","num":10,"stem":"10. CIS 와 U IDROIT 원칙을 기준으로 국제상사계약의 성립에 대한 설명 중 잘못된 것은?","choices":["계약은 청약에 대한 승낙에 의하거나, 합의를 보여주기에 충분한 당사자의 행위로 체결될 수 있다.","상시 거래관계에 있는 당사자가 「일정 기한까지 응답하지 않으면 승낙으로 간주한 다」는 청약을 받고, 기한 내에 아무런 응답을 하지 않으면 승낙한 것으로 본다.","청약의 효력은 의사표시가 상대방에게 도달한 때 발생한다는 점에서 CISG와 UNIDROIT는 동일하다.","청약은 계약을 성립하기에 충분하게 확정적이고, 상대방이 승낙하면 그에 구속된다 는 청약자의 의사표시가 있어야 한다."],"answer":2},{"section":"무역계약","num":11,"stem":"11. 특수한 거래형태의 수출입에 대한 설명으로 잘못된 것은?","choices":["외국인도수출은 물품이 외국에서 외국으로 이동하는 1건의 수출거래이고, 중계무역 은 반드시 물품을 국내로 반입하는 수입과 제3국으로 수출하는 2건의 거래로 구성 된다.","중계무역과 중개무역은 중간에 개입한 자의 자격이 계약관계에서의 본인인지 아닌 지에 따라 구분된다.","구상무역은 하나의 계약서로 거래가 이루어지고, 대응 수입 의무를 제3국에 전가할 수 있다.","대응구매는 수출과 수입이 별도의 계약서로 거래가 이루어지고, 대응 수입 의무를 제3국에 전가할 수 있다."],"answer":1},{"section":"무역계약","num":12,"stem":"12. 무역계약의 기 본조건 중 수량측정단위(개수)에 관한 설명이 잘못된 것은?","choices":["dozen = 12 pieces","gross dozen = 12 dozen = 12×12 pieces","small gross = 12 dozen = 12×10 pieces","great gross = 12×12×12 pieces"],"answer":3},{"section":"무역계약","num":13,"stem":"13. 다음 중 견본매매(sales by sample)에 관한 설명으로 올바른 것은?","choices":["Original sample은 수출자가 운송인의 검사를 거친 후, clean B/L을 수취하여 수입자 에게 제공하는 견본이다.","Buyer’s sample은 수출자가 품질확인을 위해 수입자에게 보내는 견본이다.","Counter sample은 견본을 수령한 자가 색상·규격 등 original sample의 일부 또는 전부를 수정하여 제시하는 견본이다.","Duplicate sample은 임상시험이나 연구 목적으로만 사용되는 의약품이나 동물용 의 료기기를 위한 견본이다."],"answer":3},{"section":"무역계약","num":14,"stem":"14. 무역계약의 주요 조건에 대한 설명으로 잘못된 것은?","choices":["“Packing shall be in export standard packing”이라 할 때 포장의 견고성에 대한 의무는 매도인에게 부과된다.","Approximate Quantity 조건은 D/P나 D/A 등과 같은 추심결제방식에서 수량의 10% 의 과부족을 기본으로 인정한다.","컨테이너 복합운송은 일반적으로 Berth term이 적용되므로 선적과 양하 비용이 별 도로 발생하지 않는다.","계약체결의 당사자로서 책임 소재를 분명히 하기 위해서 “Privity of contract” 또 는 “Principal to principal basis”를 약정한다."],"answer":2},{"section":"무역계약","num":15,"stem":"15. 다음 중 무역계약과 관련된 내용에 대한 설명으로 올바른 것은?","choices":["비밀유지계약(Non-Disclosure Agreement)은 본 협상에 앞서 체결되며, 협상이 결렬 되면 동 계약서에 설정된 기간과 상관없이 효력이 소멸된다.","의향서(LOI)는 계약체결 또는 협상 전 단계에서 일방이 계약체결을 위한 적극적인 관심을 보이는 의사표시에 불과하므로 LOI의 구체적인 내용과 상관없이 법적인 구 속력은 없다.","계약서의 표제(Title)는 계약 내용 전체를 대표하는 용어가 사용되므로 계약 내용과 일치하는 용어를 사용하여야 한다. 만약 표제를 계약 내용과 다르게 기재하거나 기 재하지 않으면 그 계약서는 무효가 될 수 있다.","포괄계약은 반복 거래를 전제로 일반거래조건을 미리 정해두는 계약이며, 이후 개 별 거래는 해당 조건에 따라 청약과 승낙을 통해 확정된다."],"answer":4},{"section":"무역계약","num":16,"stem":"16. 무역계약 체결에 사용되는 서식( o f rm)에 대한 설명 중에서 가장 올바른 것은?","choices":["MOU(양해각서)라는 명칭을 사용하고 있다면, 공식적인 계약체결 이전단계의 서식이 므로 내용과 상관없이 법적 문서로서 구속력이 없다.","Master contract(포괄계약서)를 가지고 해당 건의 물량, 가격 등을 확정하는 청약서 나 주문서 없이도 바로 수출입을 할 수 있다.","견적송장(Proforma Invoice)을 사용했다면 계약이 주요 조건을 제시하고, 상대방이 이를 승낙 했더라도 계약서로서 효력은 없다.","무역계약의 약식 형태로서 매도인이 작성하는 청약서(Offer sheet)와 매수인이 작성 하는 구매주문서(Order sheet)가 사용된다. gr m General Terms Conditions of Business)의"],"answer":4},{"section":"무역계약","num":17,"stem":"17. 다음은 일반거래조건약정서(A ee ent on 한 조항이다. 해당 조항과 관련이 깊은 내용은? Title to the product sold by the seller shall transfer to the buyer only upon the seller’s receipt of full payment as specified in this agreement or the applicable individual contracts.","choices":["Delivery of Goods","Transfer of risk","Payment of Proceeds","Title of Product"],"answer":4},{"section":"무역계약","num":18,"stem":"18. 다음의 상황에 대 비하기 위해서 매도인이 취할 수 있는 계약조항 및 대응방안으로 올바른 것을 모두 고른 것은? 1. COMMODITY: 1 SET OF CONCRETE BOOM PUMP 2. PRICE : USD 300,000.00 3. PAYMENT : D/A 120 DAYS 4. 분쟁 내용:","choices":["매수인이 선적서류를 인수했으나, 계약 당시 매도인이 시세보다 가격을 높게 책정하였음을 이유로 대금결제 지연","계약 당시에는 수입국가의 건설경기가 좋았지만 현재는 악화되어 매수인은 원 래 수입가격으로는 판매가 거의 불가능 5. 매수인의 요구: 계약금액의 30% 할인 6. 매도인의 주장: 계약금액의 10% 할인 수용 A. NON-WAIVER CLAUSE B. LIMIT OF LIABILITY CLAUSE C. CREDIT INQUIRY D. K-SURE에 수출보험 가입 E. L/C PAYMENT F. 수입국 MARKET RESEARCH","B, C, D, E","A, C, E, F"],"answer":3},{"section":"무역계약","num":19,"stem":"19. 상사중재에 관한 설명으로 올바른 것은?","choices":["유효한 중재계약은 법원에 소송을 제기할 수 없는 직소 금지의 효력이 있다. 다만, 중재계약의 무효, 효력상실, 이행불능의 경우에는 소송의 제기가 가능하다.","중재조항이 포함된 계약서의 주요 부분이 어떠한 사유로 무효가 된 경우에는 중재 조항도 무효가 된다.","상사중재는 전문가에 의한 판단, 단심제, 신속한 분쟁해결, 중재절차의 공개, 외국에 서의 강제집행 가능, 저렴한 비용 등을 특징으로 한다.","중재합의가 유효하게 성립하려면 중재조항에 중재지, 중재기관, 중재인, 중재 사용 언어가 반드시 포함되어야 한다."],"answer":1},{"section":"무역계약","num":20,"stem":"20. 다음 중 매도인 ‘Y’의 계약위반에 대해서 매수인 ‘X’가 취할 수 있는 구제수단으로 잘못된 것은? (Vienna Convention 1980을 준거법으로 한다.) A. 매수인 ‘X’는 과일 통조림 제조를 위해서 미국의 매도인 ‘Y’와 오렌지 수입 계약을 체결하였다. B. ‘X’는 제품을 인수한 후, 일부 오렌지가 계약 품질에 미치지 못하는 불량품임을 확 인하였다. C. 이에 ‘X’는 ‘Y’에게 클레임을 제기하고 적절한 조치를 요구하였다.","choices":["대체품 인도 청구","대금감액 청구","이행기간 연장","하자보완 청구"],"answer":1},{"section":"무역계약","num":21,"stem":"21. 다음 중 청약자 ‘X’와 피청약자 ‘Y’의 무역계약 협상에 대한 설명으로 올바른 것은? V v ( ienna Con ention 1980을 적용하기로 한다.) A. 5월 1일: X는 Y에게 모니터 100개, UNIT PRICE USD 100, 계약체결일로부터 60일 이내에 선적, 청약일로부터 15일 이내에 승낙하는 조건으로 청약 B. 5월 20일: Y는 X에게 모니터 200개, UNIT PRICE USD 80, 계약체결일로부터 30일 이내에 선적조건으로 승낙 C. 5월 21일: X는 Y에게 모니터 200개, UNIT PRICE USD 100, 계약체결일로부터 60 일 이내에 선적, 5월 31일까지 승낙하는 조건 D. 5월 31일: Y는 X에게 USD 16,000 전신송금 완료","choices":["5월 20일에 Y가 X의 5월 1일자 청약에 대해서 승낙하면서 계약이 성립되었고, 계약 금액은 5월 31일에 전신송금 되었다.","5월 1일에 X가 보낸 청약은 확정청약인데 5월 21일 X가 발송한 청약서의 조건은 수량이 200개로 변경되어 있다. 따라서 5월 21일자 X의 청약은 무효이므로 Y가 유 효기간 이내에 승낙하더라도 계약은 성립되지 않는다.","5월 1일 X가 발송한 청약에 대해 5월 20일자 Y의 승낙은 무효이고, X의 5월 21일 청약에 대해서 Y가 5월 31일에 USD 16,000을 전신송금하였으므로 계약은 성립되지 않는다.","5월 21일에 X가 보낸 청약에 대해서 Y가 5월 31일에 전체 계약금액의 일부 금액인 USD 16,000을 전신으로 송금하였으므로 5월 31일에 계약이 성립되었다."],"answer":3},{"section":"무역계약","num":22,"stem":"22. 우리나라 무역거래자가 금액 기준으로 상대적으로 사용이 가장 많은 정형거래조건 과 세관에서 수출입 통계를 집계하는 기준으로 사용되는 정형거래조건은? 상대적 사용이 많은 조건 무역통계 집계 기준 (순서는 상관없음) 수출통계 수입통계","choices":["FOB CIF FOB CIF","FCA CPT FCA CPT","CFR CIF CIF FOB","EXW DAP EXW DDP"],"answer":1},{"section":"무역계약","num":23,"stem":"23. 무역계약의 이행을 위해서 제3자와의 종속계약이 필요한 무역조건에 관한 내용으 로 잘못된 것은?","choices":["결제조건에서 당사자는 결제 위험을 고려하여 결제수단, 결제시기, 결제통화를 결정 하고, 위험도에 따라 가격조건을 연동하여 결정한다.","보험조건에서 위험에 대한 손해 발생 가능성과 관련하여 보험조건, 보험부보 통화, 보험금 청구지 등을 결정한다.","인도조건에서 운임과 부대비의 절감, 운송기간과 안전성, 업무처리 편의성 등을 고 려하여 운송계약 체결 당사자, 운송방식, 분할선적, 환적 등을 결정한다.","수량조건에서 중량화물에 대한 단위를 도량형의 혼선을 피하려고 metric ton으로 결정한다."],"answer":4},{"section":"무역계약","num":24,"stem":"24. 선하증권 작성요령에 관한 설명 중 잘못된 것은?","choices":["Freight Payable at은 출발지에서 운임을 내는 조건의 수출일 때, 송화인이 운임을 지급하는 장소를 기재한다.","Notify Party는 신용장 개설의뢰인 또는 수입자가 지정하는 대리인이 기재된다. 신 용장에는‘Notify Accountee’라고 기재된다.","Freight and Charge는 화물 운송에 따른 제반 비용의 명세로서 운송인이 기재하지 만, 운송 실무에서는 기재하지 않는 경우도 많다.","Place of Delivery는 운송인이 책임지고 화물을 수하인에게 인도해야 하는 장소이 며, Final Destination은 화물의 최종 목적지로 그 지역까지 운임이 계상되어 있지 않으면 단지 참고사항에 불과하다."],"answer":1},{"section":"무역계약","num":25,"stem":"25. 국제 운송서류에 관련한 내용을 표현한 것 중 잘못된 것은?","choices":["Multimodal Transport B/L, Combined Transport B/L, Intermodal Transport B/L은 모 두 복합운송증권으로 분류된다.","Bill of Lading for Ocean shipment or Multimodal Transport로 표기된 운송서류는 해 상운송과 복합운송 서비스를 제공하는 운송인이 발급하는 선하증권이다.","Air Waybill에는 House Air Waybill과 Master Air Waybill이 있는데 각각 항공화물운 송 주선업자와 항공사 대리점이 발행한다.","선하증권은 일반적으로 유가증권이며 유통성이 있으나, 복합운송증권은 통상 유가 증권이 아니며 유통성이 제한되는 국제운송서류이다."],"answer":4},{"section":"무역계약","num":26,"stem":"26. 정기선 해상 운송의 할증료 또는 부대요금에 대한 설명으로 잘못된 것은?","choices":["지체료(detention charge)는 화주가 컨테이너 또는 트레일러를 무료 사용기간(free time) 내에 반환하지 못할 경우 부과되는 부대비용이다.","터미널화물처리비(THC)는 수출화물은 CY 입고부터 본선 선측까지, 수입화물은 본선 선측에서 CY 출고까지 부과하는 부대비용이다.","통화할증료(CAF)는 미 달러화에 대한 원화 환율이 상승할 경우, 해상운임에 대한 선사의 손실을 보전하기 위해 부과되는 할증료다.","유류할증료(BAF)는 선박의 주 연료인 벙커유의 가격이 상승할 경우, 선사의 손실을 보전하기 위해 부과하는 할증료다."],"answer":3},{"section":"무역계약","num":27,"stem":"27. 운송 클레임에 관한 해결 내용 중 가장 바람직한 것은?","choices":["운송사고가 발생하면 화주는 우선적으로 운송인에게 지급한 해상운임과 항공운임을 반환할 것을 서면으로 요청한다.","선사나 항공사 등 운송인과 보험회사 모두가 클레임 청구에 대해서 보상에 대한 책 임을 각서로 답하지 않으면, 화주는 지체 없이 변호사를 선임하여 클레임 청구자의 손해산정금액과 변호사 비용을 청구한다.","운송사고가 발생하면 화주는 우선 사고를 낸 운송당사자에게 서면으로 손해배상을 청구하고 운임의 지급 여부와 관계없이 운임은 입금해야 한다. 이에 운송인은 보험 회사에 보험금 청구를 할 수 있는 제반 서류 일체를 피보험자에게 제공한다.","손해배상 청구자는 손해배상청구액에서 아직 지급하지 못한 운임이 있다면 그 금액 만큼 제하고 운송인에게 청구하면 된다."],"answer":3},{"section":"무역계약","num":28,"stem":"28. 적하보 험의 일반적인 내용 중 올바른 내용만으로 구성된 것은? A. 상법에서 해상보험의 정의는 “해상보험계약의 보험자는 해상사업에 관한 사고로 인하여 생길 손해를 보상할 책임이 있다”라고 규정하고 있다. B. 적하보험의 경우 보험자의 책임 판단과 보험금 지급까지의 사항은 개별보험회사의 규정에 따른다. C. 해상보험계약은 손해보험의 일종으로, 원칙적으로 손해보상계약이다. D. 항공으로 운송되는 화물의 경우에도 적하보험에 가입해야 하고, 이 경우 협회항공 화물약관이 사용된다. E. 보험계약자의 고지의무는 보험증권 발급 이후라도 보험자에게 서면으로 제출하면 고지의무는 충족한다.","choices":["A, B, D","A, D. E","B, C, E","A, C, D 열거책임주의를 택하고 있다. 다음 중 담보범위와 관"],"answer":4},{"section":"무역계약","num":29,"stem":"29. ICC(W.A)와 ICC(F.P.A)는 모두 련하여 ICC(W.A)에서는 보상하지만, ICC(F.P.A)에서는 보상하지 않는 손해는?","choices":["좌초, 침몰, 대화재가 발생한 경우의 단독해손","선적, 환적, 양하 중의 매 포장 단위당의 전손","악천후에 의한 해수 손","화재, 폭발, 충돌, 접촉 및 피난항에서의 양하로 인한 손해"],"answer":3},{"section":"무역계약","num":30,"stem":"30. 화물 별 대표 사고 유형에 대한 처리내용 중 잘못된 것은?","choices":["섬유류는 특별한 사고 없이 화물 자체 혹은 포장재에 있던 수분으로 인한 한유(汗 濡)가 발생하였다면, SWEAT 특약이 없으면 보상되지 않는다.","곡물 및 사료는 부족손의 경우에 A/R 또는 A조건에서도 부족손에 대한 추가 담보 가 없으면 보상되지 않는다.","유리 및 요업제품은 파손 위험을 보상받고자 한다면 A/R 또는 A조건이라도 특약을 별도로 가입해야 하며, 보험자가 허락한 경우에만 보상받을 수 있다.","컨테이너화물은 화물이 선창과 갑판 모두에 적재될 것을 고려하여 보험요율을 산정 하고 있다."],"answer":4},{"section":"무역영어","num":1,"stem":"1. 다음 중 청약의 종류가 나 머지와 다른 하나는?","choices":["We offer the goods at USD 5.00 per piece CIF Long Beach, CA, USA subject to market fluctuation","You may keep the item for one week. If you decide to purchase it, please send us USD 500.00. If not, you may return it without any obligation on your part","We would like to make the following offer provided we receive your acceptance by April 20, 2025","We make the following offer to you on a first-come, first-served basis subject to the terms and conditions below"],"answer":3},{"section":"무역영어","num":2,"stem":"Items: Men’s cotton socks\n Price: USD 4.20/dozen CIF LA\n Quantity: 500 dozen\n Payment: by a sight L/C in your favor\n Shipment: within 10 days after issuance of L/C\n\n2. 이 서신에 대한 설명 중 잘못된 것은?\n\n[지문]\nWe are pleased to make you the following offer, provided that your reply reaches\n us by June 20, 2025.\n\n Items: Men’s cotton socks\n Price: USD 4.20/dozen CIF LA\n Quantity: 500 dozen\n Payment: by a sight L/C in your favor\n Shipment: within 10 days after issuance of L/C","choices":["This letter sufficiently fulfills the definite requirement for an offer under the United Nation Convention on Contract for International Sale of Goods(1980)","The offeror is indicating an intention to be bound if the offeree accepts the offer","This is a revocable offer","The offeror is a buyer"],"answer":3},{"section":"무역영어","num":3,"stem":"Items: Men’s cotton socks\n Price: USD 4.20/dozen CIF LA\n Quantity: 500 dozen\n Payment: by a sight L/C in your favor\n Shipment: within 10 days after issuance of L/C\n\n3. 위 서신에 대한 답신으로 승낙서에 들어갈 내용으로 올바른 것은?\n\n[지문]\nWe are pleased to make you the following offer, provided that your reply reaches\n us by June 20, 2025.\n\n Items: Men’s cotton socks\n Price: USD 4.20/dozen CIF LA\n Quantity: 500 dozen\n Payment: by a sight L/C in your favor\n Shipment: within 10 days after issuance of L/C","choices":["The goods will be shipped provided that full payment is made in advance","We can accept your offer on the condition that all shipping costs are borne by you","The shipment will be made as soon as the L/C is issued","We can quote you USD 4.20/dozen CIF LA for a minimum order of 1,000 dozen"],"answer":3},{"section":"무역영어","num":4,"stem":"· Description : Ladies’ Polyester Knit Jacket (Style No. 2025NF)\n  · Unit Price : USD 120.00/pc CIF Shanghai port (Incoterms 2020)\n  · Quantity   : 500 pcs\n  · Payment    : Draft at sight under an irrevocable L/C in our favor\n  · Shipment : within 30 days after receipt of L/C\n  · Validity   : April 20, 2025\n\n                      N\n\n4. 위 서신의 내용을 U 국제물품매매법(CIS G 1980), Incoterms 2020 등 국제무역규칙에 따라 해석할 때 잘못된 설명은?\n\n[지문]\nWe are pleased to offer the following article under the terms and conditions\n described below.\n\n  · Description : Ladies’ Polyester Knit Jacket (Style No. 2025NF)\n  · Unit Price : USD 120.00/pc CIF Shanghai port (Incoterms 2020)\n  · Quantity   : 500 pcs\n  · Payment    : Draft at sight under an irrevocable L/C in our favor\n  · Shipment : within 30 days after receipt of L/C\n  · Validity   : April 20, 2025\n\n                      N","choices":["This offer becomes effective when it reaches the buyer","The seller fulfills his delivery obligation by placing the goods on board at Shanghai port","The seller should hand over the shipping documents to the buyer through the issuing bank","If the buyer accepts this offer on April 21, 2025, the acceptance is considered to be a new offer"],"answer":2},{"section":"무역영어","num":5,"stem":"5. 주어진 서신의 조건상 가격에 포함되는 항목을 모두 기재한 것은? (A) inland transport in the seller’s country (B) unloading charge at destination (C) customs clearance for import (D) maritime transport (E) loading charges for inland transport in the seller’s country (F) insurance for maritime transport\n\n[지문]\nWe are pleased to offer the following article under the terms and conditions\n described below.\n\n  · Description : Ladies’ Polyester Knit Jacket (Style No. 2025NF)\n  · Unit Price : USD 120.00/pc CIF Shanghai port (Incoterms 2020)\n  · Quantity   : 500 pcs\n  · Payment    : Draft at sight under an irrevocable L/C in our favor\n  · Shipment : within 30 days after receipt of L/C\n  · Validity   : April 20, 2025\n\n                      N","choices":["(A), (B)","(A), (D), (E)","(A), (D), (E), (F)","(D), (E), (F)"],"answer":3},{"section":"무역영어","num":6,"stem":"6. 국제물품매매계약에 관한 U 협약(CIS N G 1980)의 적용이 제외되는 매매의 형태만 고 른 것은? A. Sales by auction B. Sales of small craft C. Sales of equipment for ships D. Sales of shares and investment securities E. Sales of gas","choices":["A, B, D","C, D, E","B, C, D","A, D, E"],"answer":1},{"section":"무역영어","num":7,"stem":"7. Incote rms 2020의 정형거래조건 중 나머지 거래조건과 다른 하나는?","choices":["This term may be used for any mode or modes of transport","The buyer should make a contract for international transportation","The risk is transferred from the seller to the buyer when the goods are loaded on the vessel","The seller is not obliged to procure insurance to cover the buyer’s risk"],"answer":1},{"section":"무역영어","num":8,"stem":"8. 다음 중 Incote rms 2020의 DPU 조건에 관한 내용으로 잘못된 것은?","choices":["The seller should ensure that unloading at the named place can be arranged","If the buyer fails to organize import clearance, the goods will be held up at a port or inland terminal in the destination country and the buyer bears all associated risks","If a specific point for delivery is not agreed or is not determined by practice, the seller may select the point at the named place of destination that best suits its purpose","The buyer must pay the costs of those checking operations (such as checking quality, measuring, weighing, and counting) that are necessary for the purpose of delivering the goods"],"answer":4},{"section":"무역영어","num":9,"stem":"9. 위 계약서 내용으로 올바른 것을 모두 고르면? (A) The seller is required to procure insurance for the goods from Busan Port to New York Port. (B) The seller may choose the port of shipment. (C) The contract provides particulars to be included in the shipping mark. (D) The seller is required to draw a time draft on the issuing bank and submit it with all documents required in the L/C. (E) The seller should make the shipment within 60 days after the offeree’s acceptance becomes effective.\n\n[지문]\n· Article: 100% Nylon Fabrics 22-inch length (NB-2)\n · Price: USD 2.00/yd\n · Delivery: CFR New York, USA\n · Quantity: 500 yards\n · Payment: By an irrevocable sight L/C\n · Shipment: within 60 days after conclusion of the contract\n · Shipping port: Busan, Korea\n\n                                 <General Agreement>\n · Quotations and Offers: Unless otherwise specified, all quotations and offers\n  submitted by either party to this Agreement shall be in USD on a CIF New\n  York basis.\n · Packing: Proper export wooden cases shall be used for packing, each case\n  bearing the mark IBC with port mark, running case numbers, and the country\n  of origin.\n · Shipment: All goods sold in accordance with this Agreement shall be shipped\n  within the stipulated time. Unless expressly agreed upon, the port of shipment\n  shall be decided by the Seller.\n · Trade Terms: The trade terms under this agreement shall be governed and\n      interpreted under the provisions of the latest Incoterms 2020.","choices":["(A), (C)","(B), (D), (E)","(C), (E)","(C), (D), (E)"],"answer":3},{"section":"무역영어","num":10,"stem":"10. 위 계약의 조건에 따라 매도인이 매수인에게 제시해야 하는 운송서류로 올바른 것 은?\n\n[지문]\n<General Agreement>\n · Quotations and Offers: Unless otherwise specified, all quotations and offers\n  submitted by either party to this Agreement shall be in USD on a CIF New\n  York basis.\n · Packing: Proper export wooden cases shall be used for packing, each case\n  bearing the mark IBC with port mark, running case numbers, and the country\n  of origin.\n · Shipment: All goods sold in accordance with this Agreement shall be shipped\n  within the stipulated time. Unless expressly agreed upon, the port of shipment\n  shall be decided by the Seller.\n · Trade Terms: The trade terms under this agreement shall be governed and\n      interpreted under the provisions of the latest Incoterms 2020.","choices":["The first original copy of all the negotiable bills of lading issued and marked freight payable at destination","A full set of negotiable bills of lading issued and marked freight payable at destination","The first original copy of all the negotiable bills of lading issued and marked freight prepaid","A full set of negotiable bills of lading issued and marked freight prepaid"],"answer":4},{"section":"무역영어","num":11,"stem":"11. 다음은 어 떤 조항의 내용인가? This agreement shall supersede any and all prior agreements, understandings, arrangement, promises, representations, warranties and/or contracts of any kind or nature whatsoever, whether oral or written, and whether expressed or implied, by or between the parties or their officers, directors, or employees, with respect to the subject matter hereof.","choices":["Non-waiver","Entire agreement","Infringement","Consideration"],"answer":2},{"section":"무역영어","num":12,"stem":"12. 다음은 계약서의 일부이다. 그 내용으로 옳지 않은 것은? · Quantity: An order shall be accepted so long as the quantity exceeds 1,000 KGS, subject to a variation of plus or minus three percent at the Seller’s option. · Payment: Draft(s) shall be drawn at sight, documents attached, for the full invoice amount under an irrevocable credit which shall be established within 10 days after conclusion of the contract. Business against D/P draft without L/C should be subject to the Seller’s previous consent in each case. · Shipment: The Seller shall not be responsible for any delay in shipment due to the Buyer’s failure to provide a timely documentary credit. The Seller shall not be responsible for any damages incurred by the Buyer due to the delayed arrival of the ship designated by the Buyer beyond the prearranged date of shipment.","choices":["The delivery by the seller of 1,030 KGS of the contract goods does not constitute a breach of contract","The buyer may choose to make the payment either by letter of credit or by documentary collection","The seller shall not be liable for late shipment caused by the buyer’s delay in issuance of L/C","The buyer should make a contract of carriage for the delivery of the goods"],"answer":2},{"section":"무역영어","num":13,"stem":"13. 다음 환어음의 밑줄 친 부분(A～D)에 대한 설명으로 잘못된 것은? BILL OF EXCHANGE NO. 220204PU JUNE 10, 2024 MEXICO FOR USD 10,000.― AT 60 DAYS AFTER B/L DATE OF THE FIRST BILL OF EXCHANGE (SECOND OF THE SAME TENOR AND DATE BEING UNPAID) PAY TO (A) WOORI BANK OR ORDER THE SUM OF US DOLLARS TEN THOUSAND ONLY VALUE RECEIVED AND CHARGE THE SAME TO THE ACCOUNT OF (B) HOLLY TRADE CO., LTD. DRAWN UNDER THE HSBC BANK, SEOUL, KOREA L/C NO: U-10428-01 DATED MAY 17, 2024 TO: (C) THE HSBC BANK, SAMSUNG-RO 3GA, GANGNAM-GU, SEOUL, KOREA (D) CONNIE’S FARMER","choices":["(A) It is the payee and the negotiating bank that is usually designated as the payee under a negotiation L/C","(B) It is the applicant who is obliged to pay when shipping documents are presented","(C) It is the negotiating bank that examines the shipping documents presented by the seller and negotiates the draft if the documents comply with the terms of the L/C","(D) It is the party who orders the drawee to pay a specified sum of money to the payee"],"answer":3},{"section":"무역영어","num":14,"stem":"14. 다음 서신의 밑줄 친 New York City Bank, Singapore의 역할로 올바른 것을 모두 고른 것은? Dear Mr. Jennings, We would like to inform you that the Bank of America of LA has opened an irrevocable letter of credit in your favor for the amount of USD 180,000. The credit will be confirmed and advised by the New York City Bank, Singapore, and they will honor your draft drawn at 60 days after sight. We hope that there will be no delays in shipment and that you pay close attention to the packing of the goods. Thank you. (A) confirming bank (B) advising bank (C) accepting bank (D) paying bank (E) negotiating bank (F) issuing bank","choices":["(A), (B), (C)","(A), (B), (C), (D)","(A), (B), (C), (D), (E)","(A), (B), (C), (D), (E), (F)"],"answer":1},{"section":"무역영어","num":15,"stem":"15. 다음 신용장의 밑줄 친 서류(A)와 (B)의 수리 요건에 모두 해당되는 것은? · currency code amount : USD 10,000.00 · available with by : ANY BANK BY NEGOTIATION · (A) drafts at : AT SIGHT · documents required - (B) COMMERCIAL INVOICE IN DUPLICATE - PACKING LIST IN TRIPLICATE ※ This documentary credit is subject to the Uniform Customs and Practice for Documentary Credit(2007 Revision, ICC Publication No.600).","choices":["They should all be originals","They should be issued by or drawn by the beneficiary","They should be issued to or drawn on the applicant","They should be dated and signed"],"answer":2},{"section":"무역영어","num":16,"stem":"ABC TRADING CO. LTD.                                                             7383KR547806\n\n16. 위 서류에 대한 설명 중 옳지 않은 것은?\n\n[지문]\nSEA WAYBILL                                  ABC SHIPPING LINE\n SHIPPER / EXPORTER                                DOCUMENT NUMBER                WAYBILL NUMBER\n\n ABC TRADING CO. LTD.                                                             7383KR547806","choices":["This document is used in transactions where financial instruments such as a letter of credit are not used and third parties are not involved","This document is negotiable and its rights can be transferred through endorsement","As the consignee is named in this document, only the named consignee is entitled to receive the goods","This document is a simple receipt for the goods and the original document is not required to be presented upon delivery of the goods"],"answer":2},{"section":"무역영어","num":17,"stem":"ABC TRADING CO. LTD.                                                             7383KR547806\n\n17. 위 서류의 밑줄 친 부분(A)을 무엇이라 하는가?\n\n[지문]\nSEA WAYBILL                                  ABC SHIPPING LINE\n SHIPPER / EXPORTER                                DOCUMENT NUMBER                WAYBILL NUMBER\n\n ABC TRADING CO. LTD.                                                             7383KR547806","choices":["On Board Notation","Shipment Mark","More or Less Clause","Unknown Clause"],"answer":4},{"section":"무역영어","num":18,"stem":"18. 다음 중 해상보 험에 관한 설명으로 잘못된 것은?","choices":["Where the subject-matter insured is destroyed, or so damaged as to cease to be a thing of the kind insured, or where the assured is irretrievably deprived thereof, there is a constructive total loss","Salvage charges mean the charges recoverable under maritime law by a salvor independently of contract","A valued policy is a policy which specifies the agreed value of the subject-matter insured","A particular average loss is a partial loss of the subject-matter insured, caused by a peril insured against, but not amounting to a general average loss"],"answer":1},{"section":"무역영어","num":19,"stem":"19. 다음 서신의 밑줄 친 (A)에 들어갈 가장 적절한 문장은? Dear Mr. Park: (A) . Unfortunately, we are not able to meet the price that you have suggested for our speaker system, Model DD-9920. Please understand that we would very much like to help you in this matter but we have already cut the price down to the absolute minimum. As an excellent substitute for the article, we would like to recommend our Model DD-9910 which is very similar to Model DD-9920 in quality but at a lower price. We are ready to offer you a special discount of 5% on our Model DD-9910 to help you introduce it to the market. That would lower the price to USD 118.75 per unit. We truly hope you will take advantage of this offer, which we will gladly honor until the 30th of July. Very truly yours,","choices":["Thank you for sending us your offer and samples of the digital speaker system DD-9920","We have received your letter requesting a price reduction for our offer","We would like to thank you for your initial order for our speakers and warmly welcome you as one of our valued customers","We, as the Seller, hereby confirm that we have sold to you, as the Buyer, the following goods under the terms and conditions as stated below and on the reverse side hereof"],"answer":2},{"section":"무역영어","num":20,"stem":"20. 다음 중 주어진 문장의 영작이 올바른 것은?","choices":["귀사가 10월 30일 전에 선적을 보증한다면 100다스의 시험주문을 할 용의가 있습니 다. → We are willing to place a trial order of 100 dozen if you guarantee shipment on or about October 30","당사의 통상 결제조건은 지급인도조건 또는 사전송금방식이지만 이번 경우에는 인 수도조건을 수락할 용의가 있습니다. → Although our usual terms are documents against payment or deferred T/T, we are willing to accept documents against acceptance terms in this case","당사 선적 담당 직원의 실수로 상이한 물품이 선적되었음을 알리게 되어 유감입니 다. → We regret to inform you that substandard quality has been shipped due to a mistake by our shipping clerk","각 도자기는 두꺼운 종이로 개별 포장하여 짚으로 채운 다음 일련번호 No. 1-50으 로 표시한 나무상자에 넣어 선적해 주십시오. → Each piece of chinaware is to be individually wrapped in thick paper, packed in straw, and shipped in wooden crates marked No. 1 to 50"],"answer":4},{"section":"무역영어","num":21,"stem":"21. 다음 서신에서 언급된 다른 서신(밑줄 부분)의 내용으로 가장 적절한 것은? Dear Sir(s), We are writing to you about Order No. VC58391, for the supply of 60 dynamos(Artex model 55). Although we have been in contact with you on several occasions, most recently by the letter dated June 9th, to inquire about the delivery of these dynamos, we have not received any reply from you. We understand that you agreed to deliver these dynamos on June 3rd. However, we have not yet received them. It is essential that we deliver this consignment to our Greek customers on time. This is an initial order from them, and it would give us an opportunity of starting a business in the Greek market. Our deadline for delivery is June 28th. If we do not receive the dynamos within the next five days, our customers will cancel the order. We would like to make it clear that we are still awaiting your delivery, and if any loss occurs from this delay, we will take legal action. Yours faithfully,","choices":["We have decided to cancel Order No. VC58391 as we no longer require the dynamos. Please confirm the cancellation at your earliest convenience","Since the dynamos have arrived earlier than expected, we would like to place an additional order for the same model. Please let us know the availability","As previously agreed, the dynamos were supposed to be delivered on June 3rd. Please confirm whether they have been dispatched","Thank you for your prompt response regarding the shipment of the dynamos. We appreciate your confirmation that they have already been dispatched"],"answer":3},{"section":"무역영어","num":22,"stem":"22. 위 서신의 목적으로 가장 적절한 것은?\n\n[지문]\nDear Mrs. Lee,\n  We received your letter of July 7th reminding us that the payment for your June\n statement is overdue. We were under the impression that payment was not due\n until the end of August, at which time we would have had no difficulty settling\n your account. However, it appears we misunderstood your payment terms.\n  In these circumstances, we would be grateful if you could allow us to defer\n payment for a few more weeks. Our current difficulty is purely temporary. Before\n the end of the month, payments are due to us from a number of our regular\n customers, who are notably prompt payers.\n  We very much regret having to make this request, but we hope you will be able\n to grant it.\n Yours very truly,","choices":["To notify that the payment had already been settled","To apologize for a delay in the delivery","To request an extension of a payment deadline","To request immediate payment for a previously placed order"],"answer":3},{"section":"무역영어","num":23,"stem":"23. 위 서신 이전에 매도인이 송부한 서신의 내용으로 적절하지 않은 것은?\n\n[지문]\nDear Mrs. Lee,\n  We received your letter of July 7th reminding us that the payment for your June\n statement is overdue. We were under the impression that payment was not due\n until the end of August, at which time we would have had no difficulty settling\n your account. However, it appears we misunderstood your payment terms.\n  In these circumstances, we would be grateful if you could allow us to defer\n payment for a few more weeks. Our current difficulty is purely temporary. Before\n the end of the month, payments are due to us from a number of our regular\n customers, who are notably prompt payers.\n  We very much regret having to make this request, but we hope you will be able\n to grant it.\n Yours very truly,","choices":["Considering the circumstances you have outlined and your history of prompt payments, we are pleased to grant you an extension until the end of the August","We are writing to remind you that your payment for the May statement is now overdue","If you have already sent the payment, please disregard this reminder","We understand that delays can occur, but we must emphasize the importance of timely payments"],"answer":1},{"section":"무역영어","num":24,"stem":"24. 위 서신에 대한 설명으로 옳지 않은 것은?\n\n[지문]\nDear Sir or Madam,\n  We are writing from Seoul, South Korea, and would greatly appreciate receiving\n your latest catalog and price list for your range of bicycles, particularly models for\n men, women, and children.\n  As the leading bicycle retailer in Seoul, where cycling is increasingly popular for\n both commuting and leisure, we have observed a growing demand for quality\n bicycles in the South Korean market. We believe your products would be a\n valuable addition to our inventory.\n  If your bicycles meet our quality standards and are competitively priced for the\n South Korean market, we anticipate placing regular and substantial orders.\n  To   maintain       our    competitive   pricing   and   support   our   business   growth,\n                       (A)                                    . We are prepared to commit\n to a mutually agreed-upon annual minimum order quantity, tailored to the specific\n demands of the South Korean market.\n  We look forward to your prompt response and the possibility of establishing a\n successful business relationship in South Korea.\n  Yours faithfully,","choices":["The writer has a plan to place regular and large orders","The letter is intended to accept the offer of the bicycles","The letter requests a current bicycle catalog and price list","The writer highlights their position as a leading bicycle retailer in Seoul"],"answer":2},{"section":"무역영어","num":25,"stem":"25. 위 서신의 밑줄 친 부분 (A)에 들어갈 가장 적절한 문장은?\n\n[지문]\nDear Sir or Madam,\n  We are writing from Seoul, South Korea, and would greatly appreciate receiving\n your latest catalog and price list for your range of bicycles, particularly models for\n men, women, and children.\n  As the leading bicycle retailer in Seoul, where cycling is increasingly popular for\n both commuting and leisure, we have observed a growing demand for quality\n bicycles in the South Korean market. We believe your products would be a\n valuable addition to our inventory.\n  If your bicycles meet our quality standards and are competitively priced for the\n South Korean market, we anticipate placing regular and substantial orders.\n  To   maintain       our    competitive   pricing   and   support   our   business   growth,\n                       (A)                                    . We are prepared to commit\n to a mutually agreed-upon annual minimum order quantity, tailored to the specific\n demands of the South Korean market.\n  We look forward to your prompt response and the possibility of establishing a\n successful business relationship in South Korea.\n  Yours faithfully,","choices":["Could you please send us one sample of each model: men's, women's, and children's?","We are confident you will be pleased with the quality of the bicycle","We would be grateful if you could indicate whether you offer special discounts for bulk orders or long-term partnerships","We believe that strategic investment in our company will not only yield significant returns but also solidify a long-term, mutually beneficial partnership"],"answer":3},{"section":"무역영어","num":26,"stem":"26. 다음 서신의 내용을 논리 전개에 따라 가장 잘 나열한 것은? Dear Mr. Williams, Upon the arrival of the S.S. Rola at Busan port on March 10th, it was immediately apparent that Case No. 12, containing the radio receivers, had sustained significant damage, with one side of the case visibly split. A thorough inspection, conducted by a local insurance surveyor in the presence of your shipping company's agents, revealed the extent of the damage. (A) We demand immediate compensation for the loss of the eight damaged radio receivers. (B) We are attaching the surveyor's detailed report and the shipping agents' signed statement, both of which irrefutably document the damage incurred during transit. (C) We hold your company fully responsible for the damages to these goods. (D) The case, invoiced as containing 24 radio receivers, suffered severe damage to eight units, rendering them unusable. Failure to address this matter promptly will necessitate further action to recover our losses. Yours truly,","choices":["(B)-(C)-(D)-(A)","(B)-(A)-(C)-(D)","(D)-(A)-(C)-(B)","(D)-(B)-(C)-(A)"],"answer":4},{"section":"무역영어","num":27,"stem":"27. 다음 서신에서 밑줄 친 (A)-(D) 중 문맥상 가장 어색한 것은? Dear Mr. Wang, (A) We inform you that Korea First Bank, Seoul has issued an irrevocable credit No. PP3012 for USD 550,000 in your favor covering the shipment of the goods under Sales Contract No. SC398 today. (B) We have reviewed the L/C and noticed a discrepancy. It currently states \"freight prepaid,\" while our agreement was based on FOB terms. (C) As you know, FOB indicates that the buyer is responsible for the ocean freight, meaning the L/C should specify \"freight collect.\" (D) Could you please arrange for your bank to amend the L/C to reflect \"freight collect\" instead of \"freight prepaid\"? To ensure timely shipment, we need to receive the amendment notice by the end of this week. Thank you for your prompt attention to this matter. Sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":1},{"section":"무역영어","num":28,"stem":"28. 다음 중 주어진 문장의 영작으로 적절하지 않은 것은?","choices":["이번 달 동안에만 당사의 모든 제품에 대하여 20% 할인해 주는 특별오퍼를 제공해 드립니다. ⇒ We are pleased to make a special offer of 20% discount on all our products for this month only","원자재의 가격이 꾸준히 상승하고 있어 다음 달에는 가격이 확실히 인상될 것입니 다. ⇒ The price of products has been steadily rising, so we are sure it will increase further next month","귀사의 메모리칩에 대한 오퍼를 받아들일 수 없습니다. 귀사가 언급한 가격보다 훨 씬 낮은 가격으로 다른 경로를 통해 같은 품질의 물품을 제공받고 있습니다. ⇒ We are not in a position to accept your offer of memory chips. We are obtaining the same quality through another channel at a price far below what you quoted","납품일 변경을 하고 싶습니다. 귀사께서 납품기간을 단축해주시면 귀사의 제안을 받아드릴 수 있습니다. ⇒ We would like to request a revision in the delivery date. We will accept your offer if you can shorten the delivery period"],"answer":2},{"section":"무역영어","num":29,"stem":"29. 대화의 순서가 가장 자연스럽게 연결된 것은?\n\n[지문]\n· Your new dairy product is performing very well in the market.\n · (A) What’s your selling strategy? How did you promote and distribute it?\n · (B) Thanks. They are aggressively promoting and selling our dairy product.\n · (C) Actually, we contracted with one of the largest retail stores in France.\n · (D) Yeah. I’m very surprised by its sales performance over the last few months.\n · (E) Wow, congratulations!","choices":["(D) - (B) - (E) - (A) - (C)","(D) - (A) - (C) - (E) - (B)","(C) - (E) - (B) - (A) - (D)","(C) - (A) - (D) - (B) - (E)"],"answer":2},{"section":"무역영어","num":30,"stem":"30. 위 대화의 주제로 가장 적절한 것은?\n\n[지문]\n· Your new dairy product is performing very well in the market.\n · (A) What’s your selling strategy? How did you promote and distribute it?\n · (B) Thanks. They are aggressively promoting and selling our dairy product.\n · (C) Actually, we contracted with one of the largest retail stores in France.\n · (D) Yeah. I’m very surprised by its sales performance over the last few months.\n · (E) Wow, congratulations!","choices":["Discussing target customers","Launching a new product","Talking about distribution channels","Negotiating pricing strategy"],"answer":3}];
var _D63=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령상 규정하고 있는 ‘물품 등’의 정의에 관한 설명으로 잘못된 것은?","choices":["물품 등에는 무역거래에서 사용되는 신용장, 우편환, 대통령령으로 정하는 환어음 등이 포함된다.","물품 등에는 출판업과 영상·오디오 기록물 제작 및 배급업이 포함된다.","물품 등에는 국내의 법령 또는 대한민국이 당사자인 조약에 따라 보호되는 특허 권·상표권·프로그램저작권 등이 포함된다.","물품 등에는 부호·문자·음성·음향·이미지·영상 등을 디지털 방식으로 제작하 거나 처리한 자료 또는 정보 등이 포함된다."],"answer":1},{"section":"무역규범","num":2,"stem":"2. 우리나라의 대외무역법령에서 수출입승인사항의 변경신고 대상에 해당하지 않는 것은?","choices":["원산지","승인 조건","도착항(수출입의 경우 모두 해당)","수출입 물품 등의 용도(수출입승인 용도가 지정된 경우에만 해당)"],"answer":3},{"section":"무역규범","num":3,"stem":"3. 우리나라의 대외무역법령에서 규정하고 있는 특정거래형태의 수출입에 관한 설명이다. 다음 각 괄호 ( )에 들어갈 용어로 올바른 것은? A. 위탁판매수출이란 물품 등을 ( A )으로 수출하여 해당 물품이 판매된 범위 안에 서 대금을 결제하는 계약에 의한 수출을 말한다. B. 위탁가공무역이란 ( B )을 지급하는 조건으로 외국에서 가공할 원료의 전부 또는 일부를 거래 상대방에게 수출하거나 외국에서 조달하여 이를 가공한 후 가공물 품 등을 수입하거나 외국으로 인도하는 수출입을 말한다. C. 임대수출이란 임대 계약에 의하여 물품 등을 수출하여 일정 기간 후 다시 수입 하거나 그 기간이 만료 전 또는 만료 후 해당 물품 등의 ( C )을 이전하는 수출 을 말한다. D. 외국인수수입이란 수입대금은 국내에서 지급되지만, 수입물품 등은 ( D )에서 인 수하거나 제공받는 수입을 말한다. ( A ) ( B ) ( C ) ( D )","choices":["유환 가득액 사용권 외국","유환 가공임 소유권 국내","무환 가득액 사용권 국내","무환 가공임 소유권 외국"],"answer":4},{"section":"무역규범","num":4,"stem":"4. 대외무역법령상 외화획득용 원료ㆍ기재의 수입 등에 대한 설명 중 올바른 것은?","choices":["외화획득용 원료의 수량은 외화획득을 위한 물품 등의 1단위를 생산하기 위하여 제공 되는 외화획득용 원료의 표준 소요량을 말한다.","외화획득용 원료를 수입한 자가 직접 외화획득의 이행을 하는 경우, 외화획득 이행기 간은 수입통관일 또는 공급일로부터 1년이다.","외화획득 이행의무자의 책임이 없는 사유로 외화획득의 이행을 할 수 없게 된 경우에 는 외화획득용 원료ㆍ기재의 사후관리를 하지 아니할 수 있다.","외화가득율이 30% 이상인 군납용 물품 등을 생산하는 데 소요되는 원료는 외화획득용 원료로 인정된다."],"answer":4},{"section":"무역규범","num":5,"stem":"5. 다음 중 대외무역법령에서 규정하고 있는 전략물자의 수출 허가 등의 제한이 필요한 기 술에 해당하는 것은?","choices":["해외 원자력시설에서의 검사 등을 통한 기술","일반에 공개된 기술","기초과학연구에 관한 기술","특허 출원에 필요한 최소한의 기술"],"answer":1},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하는 전략물자의 수출입에 대한 설명으로 잘못된 것은?","choices":["산업통상자원부 장관은 상황허가 신청을 받은 경우에 조건부로 허가할 수 있다.","「방위사업법」에 따라 허가를 받은 방위산업물자 및 국방과학기술이 전략물자에 해 당하는 경우에도 대외무역법상 수출허가를 받아야 한다.","산업통상자원부장관이 정하여 고시하는 기술을 수출하려는 경우에는 허가의 유효기간 을 달리 정할 수 있다.","전략물자 해당 여부를 확인하고자 하는 자는 해당 물품 등에 대하여 전문기관에 판정 을 신청할 수 있다."],"answer":2},{"section":"무역규범","num":7,"stem":"7. 대외무역법령에서 규정하는 정부 간 수출계약에 대한 설명으로 잘못된 것은?","choices":["정부 간 수출계약과 관련하여 정부는 어떠한 경우에도 경제적 이익을 갖지 아니하고, 경제적 책임 및 손실을 부담하지 아니한다.","정부 간 수출계약 전담기관은 대한무역투자진흥공사이며, 전담기관은 정부 간 수출계 약과 관련하여 당사자의 역할을 수행한다.","국내 기업은 정부 간 수출계약이 체결된 경우 그 계약 내용을 성실히 이행하여야 하 며, 국내 기업은 보증ㆍ보험의 제공 등 계약 이행 보증 조치를 취하여야 한다.","정부 간 수출계약이란 외국 정부의 요청이 있는 경우에 전담기관이 국내 기업을 대신 하거나 함께 당사자가 되어 방위산업 물품 등을 유상으로 수출하기 위하여 외국 정부 와 체결하는 수출계약을 말한다."],"answer":4},{"section":"무역규범","num":8,"stem":"8. 우리나라의 대외무역법령에서 규정하고 있는 원산지판정기준에 관한 설명 중 올바른 것 은?","choices":["공구는 기계 등과 함께 수입되어 동시에 판매되더라도 해당 기계와 별개로 구분하여 원산지를 판정해야 한다.","포장용품과 내용품을 각각 별개로 구분하여 수입신고 하도록 규정된 경우에는 포장용 품의 원산지는 내용품의 원산지와 구분하여 결정한다.","촬영된 영화용 필름은 그 영화가 촬영된 나라를 원산지로 한다.","전자적 형태의 무체물은 그것을 제작하거나 처리한 나라를 원산지로 본다."],"answer":2},{"section":"무역규범","num":9,"stem":"9. 대외무역법령상 수출입의 질서 유지에 관한 설명으로 올바른 것은?","choices":["무역거래자는 환차익을 목적으로 물품 등의 수출 또는 수입가격을 조작하여서는 아 니 된다.","산업통상자원부장관은 수출입과 관련하여 분쟁이 발생한 경우 관련된 진술 또는 서 류의 제출을 요구할 수는 있으나 분쟁을 조정할 수는 없다.","산업통상자원부장관은 우리나라 또는 교역상대국의 관련 법령에 위반되는 경우, 물 품 등의 가격, 수량, 품질 등에 관하여 필요한 조정을 명할 수 있다.","선적 전 검사와 관련하여 수출자와 선적 전 검사기관 간에 분쟁이 발생하였을 경우 분쟁의 중재를 담당할 기관으로 대한상공회의소를 지정할 수 있다."],"answer":3},{"section":"무역규범","num":10,"stem":"10. 대외무역법령에서 규정하는 내국신용장과 구매확인서에 관한 설명으로 올바른 것은?","choices":["외국환은행의 장 또는 전자무역 기반 사업자는 외화획득용원료·기재 구매확인서를 전자무역 문서로 발급하고 신청한 자에게 발급 사실을 알릴 때 승인번호, 개설 및 통 지일자, 발신기관 전자서명 등 최소한의 사항만 알릴 수 있다.","구매확인서를 발급받으려는 자가 전산 설비를 갖추지 못하였거나 기타 부득이한 사유 로 전자문서를 작성하지 못하는 때에는 외국환은행의 장에게 위탁하여 신청할 수 있 다.","내국신용장이란 기획재정부장관이 정하는 바에 따라 지정거래 외국환은행의 장이 발 급하여 국내에서 통용되는 신용장을 말한다.","한국무역협회 또는 전자무역 기반 사업자는 발급된 구매확인서에 의하여 2차 구매확 인서를 발급할 수 있으며, 외화획득용 원료·기재의 제조·가공·유통(완제품 유통 제 외)과정이 여러 단계인 경우에는 각 단계별로 순차로 발급할 수 있다."],"answer":1},{"section":"무역규범","num":11,"stem":"11. 다음 내용 중 잘못된 것은? ∙ 품목번호 : 3304.99.1000 / 기초화장용 제품류 (Skin care cosmetics) ∙ 원산지 : 원산지표시대상(Y) ∙ 관세 : 기본관세(A) : 8% / WTO협정관세(C) : 6.5% ∙ FTA협정 : EU(FEU1) 0% / 중국(FCN1) 0% / 미국(FUS1) 0% ∙ 감면·환급 : 간이정액환급액(10원)","choices":["HS Code는 6자리까지 국제적으로 표준화되어 있다. 대한민국은 10자리를 사용하고 있 으며, 8자리 또는 9자리를 사용하는 국가도 있다.","기초화장용 제품류는 33류, 3304호, 3304.99 소호에 분류되고 있다.","HS Code는 원산지 표시부터 관세율, FTA 협정, 감면 및 환급, 내국세 정보 등 다양한 정보를 가지고 있다. 정확한 HS Code 확인을 위해 관세청에 심사를 요청하는 제도를 품목분류 사전심사제도라고 한다.","HS Code의 법적 구속력을 갖는 3대 구성요소는 첫째 통칙, 둘째 주(note), 셋째 부 (section)와 류(chapter)의 표제 용어이다."],"answer":4},{"section":"무역규범","num":12,"stem":"12. 다음은 관세법상 용어의 정의이다. 괄호 안에 들어갈 단어로 맞게 짝지어진 것은? 가. 외국물품을 우리나라에서 소비 또는 사용하는 것은 ( )이다. 나. 국내에 도착한 외국물품이 수입통관 절차를 거치지 아니하고 다시 외국으로 반출되 는 것을 ( )이라고 한다. 다. 우리나라의 선박 등이 공해에서 채집하거나 포획한 수산물은 ( )물품이다. 라. 인천항에 페리로 입항한 물품이 부산항으로 운송되어 컨테이너선으로 옮겨 실어 출 항하는 것은 ( )이다. 가 나 다 라","choices":["수입 수출 외국 환적","사용신고 반송 외국 복합환적","사용신고 수출 내국 환적","수입 반송 내국 복합환적"],"answer":4},{"section":"무역규범","num":13,"stem":"13. 관세법상 기간과 기한에 대한 설명으로 잘못된 것은?","choices":["관세법에 따른 기간을 계산할 때 수입신고 수리 전 반출승인을 받은 경우에는 반출일 을 수입신고의 수리일로 본다.","관세법에 따른 기한이 공휴일인 경우에는 그 다음 날을 기한으로 한다.","세관장은 천재지변으로 인해 관세법에 따른 청구를 정해진 기한까지 할 수 없다고 인 정되는 경우, 1년을 넘지 않는 범위에서 기한을 연장할 수 있다.","납부고지를 한 경우, 관세의 납부기한은 납부고지를 받은 날부터 15일 이내이다."],"answer":1},{"section":"무역규범","num":14,"stem":"14. 다음 예시에서 ㈜KITA의 수입 시 과세물건 수량 및 관세율로 옳은 것은? - 24.11.03. : ㈜KITA는 독일업체와 자동차부품(A) 100,000개 수입 계약 체결 - 24.12.05. : 독일업체가 계약 물품 선적 - 25.01.01. : 법령 개정 및 시행 (자동차부품(A)의 관세율이 기존 8%에서 10%로 인상) - 25.01.04. : 부산항 창고 물품 반입, 일부 부품(100개) 미선적 확인 - 25.01.08. : ㈜KITA 수입신고","choices":["과세물건 : 100,000개 관세율 : 10%","과세물건 : 100,000개 관세율 : 8%","과세물건 : 99,900개 관세율 : 10%","과세물건 : 99,900개 관세율 : 8%"],"answer":3},{"section":"무역규범","num":15,"stem":"15. 다음 각각의 경우에 납세의무자가 올바르게 짝지어진 것은? 가. ㈜KITA는 국내 A사로부터 수입 대행을 위탁받아 수입신고를 하였다. 나. ㈜KITA는 베트남에서 수입한 물품을 수입신고 3일 전에 국내 B사에 B/L 양수도 거래를 통해서 양도하였다. 다. ㈜KITA는 한국의 운송사 C사를 통해, 영국에서 출발하여 싱가포르를 거쳐 대한민국 에 도착한 물품을 수입신고 하였다. 가 나 다","choices":["㈜KITA ㈜KITA ㈜KITA","A사 B사 ㈜KITA","㈜KITA ㈜KITA C사","A사 B사 C사"],"answer":2},{"section":"무역규범","num":16,"stem":"16. 다음 중 납세의무의 소멸 등과 관련하여 올바른 것을 모두 고른 것은? A. 관세를 부과할 수 있는 기간에 관세가 부과되지 아니하고 그 기간이 만료된 때에는 납세의무가 소멸한다. B. 부정한 방법으로 관세를 포탈하였거나 환급 또는 감면받은 경우에는 관세를 부과할 수 있는 날부터 10년이 지나면 부과할 수 없다. C. 납세자가 잘못 납부하거나 초과하여 납부한 금액, 또는 그 밖의 관세 환급청구권은 그 권리를 행사할 수 있는 날부터 5년 이내에 행사하지 않으면 소멸시효가 완성된 다. D. 관세징수권의 소멸시효는 납부고지, 부과취소, 관세충당, 통고처분, 교부청구의 사유로 중단된다.","choices":["A, B, C","A, B, D","A, C, D","B, C, D"],"answer":1},{"section":"무역규범","num":17,"stem":"17. 다음 수입물품의 과세가격을 합리적인 기준에 따라 결정하는데 기초로 사용할 수 없는 가격은 어느 것인가?","choices":["임차수입물품 : 동일 또는 유사물품의 국내 수출 시 공개된 가격자료에 따른 가격","중고물품 : 관련 법령에 따른 감정기관의 감정가격","여행자휴대품 : 외국에서 통상적으로 거래되는 가격으로서 객관적으로 조사된 가격","수입신고 전 변질된 물품 : 제3국으로 수출하는 가격에서 보험 보상액을 뺀 가격"],"answer":4},{"section":"무역규범","num":18,"stem":"18. 관세법령상 세액의 확정 및 정정에 대한 설명으로 올바른 것은?","choices":["세관장은 납세신고를 받으면 수입신고서에 기재된 사항과 관세법상 확인사항 등을 심 사하고, 신고한 세액에 대하여 관세 채권 확보가 곤란한 경우에는 수입신고 수리한 후 즉시 세액심사를 한다.","관세를 체납하고 있는 자가 신고하는 물품이라도, 체납액이 10만 원 미만인 경우에는 수입신고 수리 전에 세액심사를 하지 아니한다.","세관장은 경정 청구를 받은 날부터 30일 이내에 세액을 경정하거나, 경정할 이유가 없 다는 뜻을 청구인에게 통지하여야 한다.","납세의무자는 신고한 세액을 납부하기 전에 과부족이 있음을 알게 된 경우, 그 세액을 보정할 수 있다. 이 경우 보정 신청 다음 날까지 관세를 납부하여야 한다."],"answer":2},{"section":"무역규범","num":19,"stem":"19. 관세법에서 규정하는 관세율의 종류에 대한 설명으로 잘못된 것은?","choices":["긴급관세는 해당 국내 산업의 보호 필요성, 국제통상관계 등을 검토하여 부과 여부와 그 내용을 결정하고, 부과한 경우 기획재정부장관은 긴급관세부과의 부정적 효과에 대 한 무역보상방법에 관하여 협의를 할 수 있다.","수입가격이 급등한 물품 또는 이를 원재료로 한 제품의 국내가격을 안정시키기 위하 여 필요한 경우에는 조정관세를 부과할 수 있다.","관세 양허율이 국내외 가격 차보다 낮은 농림축산물의 수입이 급증한 경우, 해당 농림 축산물에 대해 특별긴급관세를 부과할 수 있다.","관세 또는 무역에 관한 국제협정이나 양자 간의 협정 등에 규정된 우리나라의 권익을 부인하거나 제한하는 경우에는 보복관세를 부과할 수 있다."],"answer":2},{"section":"무역규범","num":20,"stem":"20. 국내 수입자 B는 중국의 수출자 A로부터 공작기계 1대를 CIF 조건으로 수입하면서, 물 품 대금으로 USD 1,000을 지급하였다. A는 운송인과 운송 및 보험계약을 체결하고 해상 운임 및 보험료로 USD 100을 지급하였다. B가 수입통관 시 납부할 관세는? (단, 관세율 8%, 부가세 10%, 과세환율 1,000원/USD, 그 외의 사항은 고려하지 않는다.)","choices":["80,000원","188,000원","88,000원","169,200원"],"answer":1},{"section":"무역규범","num":21,"stem":"21. 다음 중 관세법령상 용도세율의 적용에 대한 설명이 잘못된 것은?","choices":["용도에 따라 세율을 다르게 정하는 물품을 세율이 낮은 용도에 사용하여 해당 물품에 그 낮은 세율의 적용을 받으려는 자는 세관장에게 신청하여야 한다.","미리 세관장으로부터 해당 용도로만 사용할 것을 승인받은 경우에는 용도세율 적용의 신청을 생략할 수 있다.","용도세율이 적용된 물품은 그 수입신고의 수리일부터 3년의 범위에서 해당 용도 외의 다른 용도에 사용하거나 양도할 수 없다. 다만, 미리 세관장의 승인을 받은 경우에는 그러하지 아니하다.","용도세율이 적용된 물품을 해당 용도 외의 다른 용도에 사용하려는 자에게 양도한 경 우에는 그 양수인으로부터 즉시 관세를 징수한다."],"answer":4},{"section":"무역규범","num":22,"stem":"22. 수입신고가 수리된 물품이 계약 내용과 다르고, 신고 당시의 성질이나 형태가 변경되 지 아니한 경우에 관세를 환급할 수 있는 것을 모두 고르시오. A. 보세구역에 외국으로부터 수입된 해당 물품을 수입신고 수리일부터 1년 이내에 반입 하였다가 다시 수출한 경우 B. 자유무역지역 중 관세청장이 수출물품을 일정기간 보관하기 위하여 필요하다고 인정 하여 고시하는 장소에 외국으로부터 수입된 해당 물품을 수입신고 수리일부터 1년 이내에 반입하였다가 다시 수출한 경우 C. 통관우체국에 외국으로부터 수입된 해당 물품을 수입신고 수리일부터 1년 이내에 반 입하였다가 다시 수출한 경우 D. 보세공장에서 생산된 물품을 수입신고 수리일부터 1년 이내에 보세공장에 해당 물품 을 다시 반입한 경우","choices":["A, B, C, D","A, B","A, B, C","A, B, D"],"answer":1},{"section":"무역규범","num":23,"stem":"23. 관세법상 보세화물의 관리와 관련하여 올바른 것을 모두 고른 것은? A. 국제무역선에서 물품을 하역하기 전까지는 세관장의 승인 없이 외국 물품의 일부 를 견본품으로 반출할 수 있다. B. 보세구역에 장치된 물품의 원형을 변경하거나 해체ㆍ절단 등의 작업을 하려는 자 는 세관장의 허가를 받아 해당 작업을 할 수 있다. C. 수입될 물품의 보수작업의 재료로 외국물품도 사용할 수 있다. D. 세관공무원은 보세구역에 반입된 물품 또는 국제무역선에 적재된 물품에 대하여 검사상 필요하면 그 물품의 일부를 견본품으로 채취할 수 있다. E. 지정장치장에 반입한 물품은 화주 또는 반입자가 그 보관의 책임을 진다.","choices":["A, B, C","A, D, E","B, C, D","B, D, E"],"answer":4},{"section":"무역규범","num":24,"stem":"24. 관세법상 수입신고의 처리에 관한 설명으로 잘못된 것은?","choices":["세관장은 수입신고가 적법하게 이루어졌을 때에는 이를 지체없이 수리하고 신고인 에게 신고필증을 발급하여야 한다.","수입신고 물품은 원칙적으로 신고가 수리되기 전에는 운송수단, 관세통로, 하역통로 로부터 반출하여서는 아니 된다.","세관장은 수입신고서의 기재사항 중 일부가 경미하게 미비되고, 신고 수리 후 보완 이 가능하다고 인정되는 경우에는 수리 후 이를 보완하게 할 수 있다.","수입신고 물품이 관세법에 규정된 장치 장소에서 반출된 경우, 정당한 이유가 있는 때에 한하여 이를 취하할 수 있다."],"answer":4},{"section":"무역규범","num":25,"stem":"25. 관세법상 수입신고에 대한 내용으로 잘못된 것은?","choices":["수입하는 물품을 보세창고에 반입한 자는 반입일로부터 30일 이내에 수입신고를 하 여야 한다.","관세법 제241조에 따른 수입신고는 화주 또는 관세사 등의 명의로 하여야 한다.","외국통화로 표시된 가격을 내국통화로 환산하는 경우에 관세법 제17조에 따른 날이 속하는 주의 전주의 외국환매도율을 평균하여 관세청장이 과세환율을 정한다.","수입하려는 물품의 신속한 통관이 필요할 때에는 대통령령으로 정하는 바에 따라 해당 물품을 적재한 선박 또는 항공기가 입항하기 전에 수입신고를 할 수 있다."],"answer":3},{"section":"무역규범","num":26,"stem":"26. 다음 ( ) 안에 들어갈 용어로 올바른 것은? A. 관세청장은 단일 수출용원재료에 의하여 둘 이상의 제품이 동시에 생산되는 등 생 산공정이 특수한 수출물품과 중소기업 수출물품에 대한 관세 등의 환급 절차를 간 소화하기 위하여 필요하다고 인정하는 경우에는 대통령령으로 정하는 바에 따라 수 출용원재료에 대한 관세 등의 평균 환급액 또는 평균 납부세액 등을 기초로 수출물 품별로 ( )를 정하여 고시할 수 있다. B. ( )에 정하여진 금액은 해당 물품을 생산하는 데 드는 수출용원재료를 수입 한 때에 납부하는 관세 등으로 보아 환급한다. C. ( )를 적용받을 수 있는 자는 대통령령으로 정하는 바에 따라 관세청장에게 ( )를 정하여 고시할 것을 요청할 수 있다.","choices":["정액환급률표","환급세액표","소요량기준표","평균납부세액표"],"answer":1},{"section":"무역규범","num":27,"stem":"27. 수출용원재료에 대한 관세 등 환급에 관한 특례법령상 수출용원재료에 대한 관세 등의 환급업무에 관한 설명으로 올바른 것은?","choices":["평균세액증명서는 수출용 원재료를 구매하는 자의 신청에 의하여 그가 매월 수입한 수출용 원재료의 품목별 물량과 단위당 평균세액을 증명하는 서류를 말한다.","기초원재료납세증명서는 구매확인서에 의해 거래된 경우에 한해 수입된 상태 그대 로 거래된 수출용원재료에 대한 납부세액을 증명하는 서류를 말한다.","평균세액증명서는 세관장과 관세청장이 정하는 기준에 해당되는 수출용 원재료를 구매한 자 또는 해당 구매자로부터 위임받은 관세사가 발행할 수 있다.","수입세액분할증명서는 세관장과 관세청장이 정하는 기준에 해당되는 내국신용장 등 에 의하여 물품을 공급한 자 또는 해당 공급한 자의 위임받은 관세사가 발행할 수 있다."],"answer":4},{"section":"무역규범","num":28,"stem":"28. 다음 중 자유무역협정(FTA)관세법령상 협정관세 사후 적용신청에 관한 설명으로 잘못 된 것은? ∙ ㈜KITA는 2025년 2월 5일 베트남에서 제조된 화장품을 수입 신고하였으며, 관세를 납부한 후 해당 물품은 2025년 2월 7일에 수입신고가 수리되었다. ∙ 그러나 회사는 수입신고 시 FTA 협정관세 적용신청을 하지 않았고, 이후 해당 사실을 인지하여 2025년 5월 30일에 세관에 협정관세 사후 적용을 신청하였다. ∙ ㈜KITA는 해당 물품이 한-베트남 FTA 적용 대상에 해당한다는 점과 원산지 정보가 전자적으로 교환되었음을 근거로 하여 원산지증명서 원본 제출을 생략하려 하였다.","choices":["㈜KITA는 2025년 2월 5일 수입 신고일로부터 1년 이내에 사후 적용을 신청하였으므로 신청 요건을 충족한다.","전자적 정보 교환 대상국이라 하더라도 세관장이 요청하는 경우에는 원산지증명서의 제출을 요구할 수 있다.","협정관세 적용을 신청한 ㈜KITA는 이미 납부한 세액의 경정 청구를 할 수 있다.","경정 청구를 받은 경우 세관장은 그 청구를 받은 날부터 2개월 이내에 협정관세의 적용 및 세액의 경정 여부를 ㈜KITA에게 통지하여야 한다."],"answer":1},{"section":"무역규범","num":29,"stem":"29. 다음 중 자유무역협정(FTA)관세법령에서 규정하고 있는 FTA 원산지결정기준에 관한 설명으로 올바른 것을 모두 고른 것은? A. 완전생산기준은 해당 물품이 2개국 이상에 걸쳐 생산된 경우 최종 생산·가공을 수행 한 국가를 원산지로 인정하는 기준이다. B. 세번변경기준은 해당 물품의 품목번호와 그 생산에 사용된 원산지 재료의 품목번호 가 일정 단위 이상 다른 경우, 해당 물품을 최종적으로 생산한 국가를 원산지로 인 정하는 기준이다. 이 기준은 둘 이상의 국가에서 생산된 경우에 적용될 수 있다. C. 부가가치기준은 일정 수준 이상의 부가가치를 창출한 국가를 원산지로 인정하는 것으로 이는 둘 이상의 국가에서 생산된 경우에 적용될 수 있다. D. 해당 물품이 원산지국에서 생산되었더라도 원산지가 아닌 국가를 경유하여 운송되거 나 원산지가 아닌 국가에서 선적된 경우에는 원산지로 인정받을 수 없다. 단, 보세구 역에서 일시적으로 보관된 경우는 예외이다.","choices":["A, B","A, C","B, D","C, D"],"answer":4},{"section":"무역규범","num":30,"stem":"30. 자유무역협정(FTA)관세법령상 원산지증명서의 유효기간이 다른 것은?","choices":["칠레와의 협정","캐나다와의 협정","뉴질랜드와의 협정","이스라엘과의 협정"],"answer":4},{"section":"무역결제","num":1,"stem":"1. 외국환거래법과 관련된 설명 중에서 잘못된 것은?","choices":["외국환거래법은 외국환에 대한 거래행위인 지급과 영수 등에 관한 법이다.","거주성의 판단은 국적과 관련하여 한국인은 거주자, 외국인은 비거주자이다.","국내에 있는 외국 정부의 공관에 근무하는 외국인은 비거주자이다.","외국환거래의 관리는 Negative system(원칙적 자유-예외적 규제) 방식으로 한다."],"answer":2},{"section":"무역결제","num":2,"stem":"2. 다음 중 O/A 결제방식에 대한 설명으로 올바른 것을 모두 고른 것은? A. 수출자는 자신이 발행한 환어음에 ‘AVAL’을 표기하여 대금 회수의 위험을 회피할 수 있다. B. 수출자는 O/A NEGO를 활용하여 외상매출채권을 매각하여 조기에 현금화할 수 있다. C. 수출자가 물품의 선적을 완료한 시점에 수출채권이 발생한다. D. 수입자는 물품을 인도받고 품질을 확인한 후에 대금을 결제할 수도 있다. E. 수입자는 만기일에 매입은행으로 물품 대금을 송금하여야 한다.","choices":["A, B, C","A, C, D","B, D, E","C, D, E"],"answer":3},{"section":"무역결제","num":3,"stem":"3. 다음 중 송금결제방식의 특징에 대한 설명으로 올바른 것은?","choices":["환어음을 사용하기 때문에 어음법이 적용된다.","한국의 결제통계에서 가장 많이 사용되는 방식으로 관련한 국제규칙이 있다.","신용장방식에 비해서 수출자의 대금 미회수 위험이 낮으므로 은행수수료도 낮다.","송금방식은 주로 전신송금을 사용하기 때문에 T/T라고 줄여 부르기도 한다."],"answer":4},{"section":"무역결제","num":4,"stem":"4. 다음 중 송금결제방식의 종류와 지급 시기에 대한 설명으로 잘못된 것은?","choices":["CAD, COD, D/P, Sight L/C는 물품 또는 서류의 상환으로 대금이 지급되는 면에서 동 시 결제방식으로 분류할 수 있다.","Open Account는 수출자가 선적을 이행하고 물품이 수입국에 도착한 이후에 대금을 청 구하기 때문에 「물품 도착 조건부 사후송금 결제방식」의 형태이다.","CAD, COD 방식은 동시지급방식으로 분류할 수 있지만, 선적 후 결제가 이루어진다는 측면에서 사후지급방식의 의미도 지닌다.","CAD, COD 방식은 선적서류나 물품이 수입자 또는 수입자의 대리인에게 인도된 후 대 금결제가 이루어진다."],"answer":2},{"section":"무역결제","num":5,"stem":"5. 다음 중 추심거래에 관련된 은행에 대한 설명으로 올바른 것을 모두 고르시오. A. 환어음의 지급인은 결제은행 또는 지급은행이 되어야 한다. B. 추심은행은 제시된 서류가 추심지시서와 외관상 일치하는지를 확인하여야 한다. C. 추심은행은 추심된 자금을 수취한 후 5영업일 이내에 추심의뢰은행에게 지급하여야 한다. D. 추심의뢰은행은 수출자가 제시한 선적서류를 심사하지 않아도 된다. E. 수출자는 추심지시서를 작성하여 추심은행에게 직접 제시하여야 한다.","choices":["A, E","B, D","B, C, D","A, C"],"answer":2},{"section":"무역결제","num":6,"stem":"6. 다음 중 환어음에 대한 설명으로 잘못된 것은?","choices":["환어음은 요식증권으로서 일정한 형식을 갖추어야 유효하다.","환어음의 본질은 제3자에 대한 금전의 지급 위탁증권이다.","환어음은 주로 국제거래에서 사용되지만, 국내 거래에서 사용될 수도 있다.","환어음의 발행인과 지급인은 L/C의 경우에는 모두 개설은행, D/P의 경우에는 모두 수 입상이다."],"answer":4},{"section":"무역결제","num":7,"stem":"7. 신용장에 대한 설명 중 올바른 것은?","choices":["신용장에 그 기초가 되는 계약에 대한 명시적 언급이 있다면 개설은행은 그 계약 내 용에 구속된다.","화환신용장 거래에서 매입은행은 서류 심사와 함께 그 서류와 관련된 물품에 대한 심 사를 동시에 할 의무가 있다.","구매자 위주의 시장에서는 일반적으로 신용장 방식보다는 송금방식이 선호된다.","수입자는 화환신용장 거래에서 원하는 품질의 물품이 도착하지 않는다면 대금을 거절 할 권한을 갖고 있다."],"answer":3},{"section":"무역결제","num":8,"stem":"8. 신용장의 종류와 관련된 설명으로 잘못된 것은?","choices":["연지급신용장에서는 환어음이 요구되지 않는다.","인수신용장에서 개설은행은 개설의뢰인을 지급인으로 하는 환어음이 사용되도록 개설 해서는 안 된다.","지급신용장은 일람출급으로 사용되고, 기한부로는 사용되지 않는다.","클린신용장은 화환신용장에 비해 부당 청구의 가능성이 훨씬 낮다."],"answer":4},{"section":"무역결제","num":9,"stem":"9. SWIFT 신용장의 41A(available with... by... )에 명시되어야 하는 신용장 유형을 모두 고 르시오. A. negotiation E. deferred payment B. transferable F. irrevocable C. confirm G. reimburse D. acceptance H. payment","choices":["A, D, E, H","B, C, F, G","A, C, D, H","A, B, D, H"],"answer":1},{"section":"무역결제","num":10,"stem":"10. 기한부 신용장인 Shipper’s Usance L/C와 Banker’s Usance L/C에 대한 설명이 잘못된 것은? Usance Shipper’s Usance Banker’s Usance 기준","choices":["외상기간 이자 부담 수출상 수입상","환어음 지급인 개설은행 개설은행 / 해외 인수은행","환어음 만기 표시 기한부 기한부","환가료 산출 기간 기한부 기간 기한부 기간"],"answer":4},{"section":"무역결제","num":11,"stem":"11. 신용장 실무와 관련된 설명으로 잘못된 것을 모두 고른 것은? A. 확인은행은 조건변경서를 통지한 시점부터 그에 대한 취소 불가능한 결제 (honour) 또는 매입 의무를 부담한다. B. 수입신용장 개설을 신청할 때 국내의 수입업체는 거래은행과 외국환거래약정을 체결하고, 보험증권도 반드시 제출해야 한다. C. 수익자 입장에서 ‘Inspection Certificate issued and signed by applicant’라는 신 용장 조건은 독소조항에 해당하므로, 해당 조건의 삭제를 요구하는 것이 바람직 하다.","choices":["A, B","B, C","C, A","A, B, C"],"answer":1},{"section":"무역결제","num":12,"stem":"12. SWIFT로 국내 통지은행을 통해 수익자에게 통지된 다음 수출신용장 조건에 대한 설명 으로 올바른 것은? 31D(DATE AND PLACE OF EXPIRY) : 251030 AT OUR COUNTER 41D(AVAILABLE WITH...BY) : ISSUING BANK BY PAYMENT 43P(PARTIAL SHIPMENTS) : NOT ALLOWED 43T(TRANSSHIPMENT) : ALLOWED 44C(LATEST DATE OF SHIPMENT) : 251020 48(PERIOD FOR PRESENTATION) : ALL DOCUMENT(S) MUST BE PRESENTED WITHIN 10 DAYS AFTER DATE OF SHIPMENT BUT WITHIN CREDIT VALIDITY","choices":["이 신용장 조건에서는 유효기일인 2025년 10월 30일까지 수출국 은행에 서류가 제시 되어야 한다.","이 신용장 조건에서는 매입(negotiation)이 허용되지 않는다.","이 신용장 조건에서는 환적이 허용되지 않는다.","이 신용장에서는 최종선적일을 2025년 10월 30일로 정하고 있다."],"answer":2},{"section":"무역결제","num":13,"stem":"13. 화환신용장을 발행한 개설은행의 의무에 관한 설명 중 잘못된 것은?","choices":["개설은행은 신용장 조건에 일치하는 서류제시에 대해 결제 또는 매입하고, 서류를 송부한 지정은행에 신용장 대금을 상환할 의무를 부담한다.","신용장에 의한 개설은행의 결제의무는 통지은행이 신용장을 수익자에 통지하는 시 점부터 발생한다.","개설은행의 의무는 수익자의 동의 없이는 취소 또는 변경될 수 없다.","개설은행의 지정은행에 대한 상환약정은 개설은행의 수익자에 대한 약정으로부터 독립적이다."],"answer":2},{"section":"무역결제","num":14,"stem":"14. 한국의 중계상 A는 베트남에 신용장을 양도하여 자동차 부품을 조달해 미국에 수출할 계획이다. 중계상 A가 은행에 신용장 양도를 요청하고 베트남 공급자는 양도된 신용장 조건에 따라 요구서류를 양도은행에 제출하였다. 제2 수익자인 베트남 공급처가 양도 은행에 제시한 서류 중에서 제1 수익자인 중계상이 교체하여 개설은행에 제출할 수 있 는 서류는 무엇인가?","choices":["송장과 환어음","송장과 선하증권","송장과 포장명세서","송장과 원산지증명서"],"answer":1},{"section":"무역결제","num":15,"stem":"15. 화환신용장에서 요구한 다음의 서류 중 발행자의 서명이 없어도 되는 서류는?","choices":["Commercial Invoice","Bill of Lading","Insurance Policy","Inspection Certificate"],"answer":1},{"section":"무역결제","num":16,"stem":"16. 화환신용장의 조건은 다음과 같다. 화환신용장에서 요구한 원산지증명서에 대한 설명 중 잘못된 것은? Form of Documentary Credit: IRREVOCABLE Documents Required: + COMMERCIAL INVOICE + OCEAN BILL OF LADING MADE OUT TO ORDER OF ISSUING BANK + PACKING LIST + CERTIFICATE OF ORIGIN","choices":["원산지증명서는 서명되어야 한다.","원산지증명서의 수하인을 개설의뢰인으로 기재해도 된다.","상공회의소에서 발행한 원산지증명서만 수리된다.","원산지증명서는 수출업자나 송하인이 수익자가 아닌 경우 복수의 서류에서 상이한 송장번호, 송장일자 및 선적경로로 표기될 수 있다."],"answer":3},{"section":"무역결제","num":17,"stem":"17. 보증신용장(Standby L/C)과 은행보증서(Demand Guarantee)에 대한 설명으로 잘못된 것 은?","choices":["양자는 기본계약과는 별개인 독립성의 원칙이 적용되어 독립된 지급 의무를 진다.","보증신용장은 외형상 신용장 형식을 따르며, 관련 국제규칙으로 ISP 98과 UCP 600이 적용된다.","은행보증서는 보증서 형식으로 발행되며, 관련 국제규칙으로 URDG 758이 적용된다.","실무에서 보증신용장은 주로 호주계 은행이 발행하고, 은행보증서는 주로 아시아계 은 행이 선호한다."],"answer":4},{"section":"무역결제","num":18,"stem":"18. 수출팩토링에 대한 설명으로 적절하지 않은 것은?","choices":["수출팩토링은 수출팩터의 신용을 바탕으로 이루어지는 신용장거래로서, 수출팩터가 수 입상의 신용에 따라 수출채권 매입 여부를 결정한다.","한국에서 상환청구권 없는(without recourse) 팩토링을 취급하는 실적은 한국수출입은 행이 가장 많다.","수출팩토링은 수출자가 수출채권을 금융기관에 매각하여 자금을 조기에 회수하는 방 식이다.","팩토링 수수료는 수출자가 부담하고, 수출자는 수수료를 수출 원가에 반영한다."],"answer":1},{"section":"무역결제","num":19,"stem":"19. 결제의 위험도 차원에서 일반적으로 결제방식과 시기가 수입자에게 유리한 순으로 나 열된 것은? A. COD(Cash on Delivery) B. Payment in advance by T/T C. D/A(Documents against Acceptance) D. O/A(Open Account) E. At sight L/C","choices":["B → D → A → C → E","E → C → D → A → B","D → A → C → E → B","A → B → E → C → D"],"answer":3},{"section":"무역결제","num":20,"stem":"20. 다음 각 상황에서 위험관리에 활용할 수 있는 수단의 연결이 가장 부적절한 것은?","choices":["수입자의 상품 입수 관련 위험관리 → 선적전 검사(Pre-shipment Inspection)","수출자의 선적불이행 관련 위험관리 → Performance Bond","수입자의 선지급 관련 위험관리 → Revolving credit","수출자의 외상 수출(O/A 30 days) 대금회수 관련 위험관리 → 무역보험"],"answer":3},{"section":"무역결제","num":21,"stem":"21. 다음 상황에 대한 해설로 가장 적절한 것은? A. ㈜한국무역은 라오스에 소재하는 제조기업과 임가공을 위한 계약을 체결하였다. B. 임가공에 필요한 핵심 부품을 국내에서 구매하여 원상태로 라오스로 수출했다. C. 임가공에 필요한 원자재를 중국에서 구매하여 라오스에서 납품받았다. D. 가공된 완성품을 라오스에서 미국에 소재하는 기업에 판매하였다.","choices":["B – 국내 구매를 위해 내국신용장을 이용하면 부가세 영세율을 적용받을 수 있다.","C – 원자재 수입용 신용장의 수익자와 요구서류인 송장의 화주가 다르면 하자 서류 가 된다.","D - 완성품을 라오스에서 미국으로 직접 운송하면 수출실적을 인정받을 수 없다.","D – 미국기업과의 거래에 신용장을 사용한다면, 신용장에 “stale B/L acceptable” 이라는 조건을 포함시켜야 한다."],"answer":1},{"section":"무역결제","num":22,"stem":"22. 각 보기 중 밑줄 친 당사자가 수출입거래의 위험을 회피하기 위해 취한 방안으로 가장 부적절한 것은?","choices":["선지급 조건을 피하는 수입자에게 수출자는 선급금 환수용 보증서 제공을 조건으로 선지급 조건을 수용하도록 협상한다.","COD조건 대신에 신용장 결제를 요구하는 수출자에게 수입자는 수출자가 발행한 선 적전 검사증명서를 신용장 조건에 포함하여 수출자의 사기 가능성을 억제한다.","기계류 수입 거래에서 수출자에게 수입자는 하자담보를 위해 ISP 98이 적용되는 warranty standby L/C를 요구한다.","CAD조건을 요구하는 수출자에게 수입자는 COD 30days 조건으로 변경을 요구한다."],"answer":2},{"section":"무역결제","num":23,"stem":"23. 외국환은행 대고 객 매매율에서 당발송금, 타발추심, 수입신용장 결제 등의 거래에 적용 되는 환율은?","choices":["T/T selling rate","Cash selling rate","T/T buying rate","T/C buying rate 선"],"answer":1},{"section":"무역결제","num":24,"stem":"24. 다음 중 통화 물(Currency Futures)거래에 대한 설명으로 잘못된 것은?","choices":["헤지 목적의 거래보다는 차익을 노리는 투기 목적의 거래가 훨씬 많다.","특정한 거래소 장내에서 다수 대 다수의 거래가 이루어진다.","납부해야 할 증거금은 참가자의 신용도에 따라 차등 적용된다.","원활한 거래 체결을 위하여 거래단위(계약) 규모와 결제일이 표준화되어 있다."],"answer":3},{"section":"무역결제","num":25,"stem":"25. 다음은현재 외환시장의 상황을 나타낸 것이다. 이때 USD/KRW 통화옵션의 프리미 엄에 대한 설명으로 옳지 않은 것은? (환율 표시에서 앞의 통화가 기준통화) USD/KRW 현물환율 1,350원 만기 3개월 선물환율 1,349원 만기 3개월 옵션 내재 변동성 15% 만기 3개월 행사가 1,345원 달러 풋옵션 프리미엄 달러당 10원","choices":["행사가 1,345원인 달러 풋옵션은 외가격(Out-of-the-money) 옵션이다.","행사가 1,345원인 달러 풋옵션의 시간가치는 4원이다.","USD/KRW 현물환율이 1,340원으로 하락하면, 행사가 1,345원인 달러 풋옵션의 프리 미엄은 증가한다.","만기 3개월 옵션의 내재변동성이 20%로 상승하면 행사가 1,345원인 달러 풋옵션의 프리미엄은 증가한다. 언론 뉴스가 전해졌을 때, 외환시장에 미치는 영향과 가장 거리가 먼 것"],"answer":2},{"section":"무역결제","num":26,"stem":"26. 다음과 같은 은? (환율표시에서 앞의 통화가 기준통화) ∙ 미국의 중앙은행(FRB)은 금리 인하를 예상하던 시장의 기대와는 정반대로 기존 2.5%였던 달러의 기준 금리를 1.0% 포인트나 인상하기로 하여 금융시장에 큰 충 격을 안겼다. ∙ 반면, 한국은행은 원화 기준 금리를 5% 수준으로 유지하기로 하였고, 일본도 엔화 기준 금리는 변동이 없다고 발표했다.","choices":["USD/KRW 현물환율이 상승한다.","우리나라에 투자되었던 달러 자금이 미국으로 유출된다.","USD/KRW 선물환율에서 스왑 포인트가 증가한다.","미 달러에 대한 일본 엔화의 가치가 평가절하된다."],"answer":3},{"section":"무역결제","num":27,"stem":"27. 수출상품을 선적할 당시(회계상 거래 인식 시점)의 환율이 1,400원/달러였고, 이후 수출 대금을 수취하여 원화로 환전할 당시의 환율이 1,360원/달러였다. 이 경우 발생하는 환 리스크는 어떤 것인가?","choices":["환리스크가 없다.","환산 환리스크가 있다.","영업 환리스크가 있다.","거래 환리스크가 있다."],"answer":4},{"section":"무역결제","num":28,"stem":"28. B기업은 금일 외화예금 잔고는 5백만 달러이고, 내일 2백만 달러 수입결제가 예정되어 있다. 이 경우에 B기업의 환리스크 크기는 얼마인가?","choices":["환리스크 없음","2백만 달러 숏 포지션","3백만 달러 롱 포지션","5백만 달러 롱 포지션"],"answer":3},{"section":"무역결제","num":29,"stem":"29. 선물환거래와 한국거래소에서 거래되는 미국달러 선물의 상품명세 및 그 활용 등에 대 한 다음 설명 중 잘못된 것은?","choices":["두 거래를 활용하는 기업은 거래하는 방법 등에서는 차이가 있지만 거의 같은 헤지 결과를 달성할 수 있다.","한국거래소에서 거래되는 미국달러 선물의 거래단위는 USD 100,000이다.","미국달러 선물을 활용하는 경우 증거금을 적립해야 하므로 신용도가 우수한 기업들은 주로 선물환거래를 많이 활용한다.","은행이 대고객 선물환거래를 하기 이전에 그 거래가 실수요와 관련됨을 확인하여야 한다."],"answer":2},{"section":"무역결제","num":30,"stem":"30. 숏 포지션이 있는 A기업이 헤지 목적으로 향후 달러/원 환율이 큰 폭으로 상승할 것으 로 예상하면서 비용은 옵션 프리미엄 수준으로 제한하려고 할 때, 선물환거래의 대안이 될 수 있는 옵션 전략은 무엇인가?","choices":["콜옵션 매입","콜옵션 매도","풋옵션 매입","풋옵션 매도"],"answer":1},{"section":"무역계약
