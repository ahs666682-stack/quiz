cceptance. As you may recall from our initial contact last February, you expressed (D) openness to reviewing payment terms after establishing a firm trading association. Additionally, we plan to place another order within the month. If you agree to the proposed payment terms, kindly confirm your acceptance at your earliest convenience. Thank you for your continued cooperation. We look forward to a mutually beneficial long-term partnership. Sincerely yours,","choices":["(A)-(B)-(C)-(D)","(B)-(C)-(A)-(D)","(C)-(A)-(B)-(D)","(D)-(C)-(A)-(B)"],"answer":4},{"section":"무역영어","num":26,"stem":"26. 위 서신의 밑줄 친 부분(A∼D) 중 문맥상 가장 어색한 것은?\n\n[지문]\nWe have received The Hanvit Bank Letter of Credit No. 23568 for your Order No. 160.\n We appreciate the clarity and completeness of the document, except for one point\n regarding insurance coverage.\n  (A)  As per our agreement, CIF quotes are based on ICC(B) terms, and any additional\n clauses are the buyer's responsibility.\n                                       (B)    This means that ICC(A), War Risk, and S/R \u0026\n C.C Risks are the buyer's responsibility.\n  (C)  As agreed, you should arrange for marine insurance on the consignments.    (D)  While\n we are wil ing to cover the cost difference between ICC(B) and ICC(A) this time, we kindly\n request that future sales notes clearly state: any insurance coverage beyond ICC(B) wil be\n charged to the buyer. This simple notation wil ensure alignment with our understanding and\n avoid any potential discrepancies in future shipments.\n Sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":3},{"section":"무역영어","num":27,"stem":"27. 위 서신에 대한 답장의 내용으로 적절하지 않은 것은?\n\n[지문]\nWe have received The Hanvit Bank Letter of Credit No. 23568 for your Order No. 160.\n We appreciate the clarity and completeness of the document, except for one point\n regarding insurance coverage.\n  (A)  As per our agreement, CIF quotes are based on ICC(B) terms, and any additional\n clauses are the buyer's responsibility.\n                                       (B)    This means that ICC(A), War Risk, and S/R \u0026\n C.C Risks are the buyer's responsibility.\n  (C)  As agreed, you should arrange for marine insurance on the consignments.    (D)  While\n we are wil ing to cover the cost difference between ICC(B) and ICC(A) this time, we kindly\n request that future sales notes clearly state: any insurance coverage beyond ICC(B) wil be\n charged to the buyer. This simple notation wil ensure alignment with our understanding and\n avoid any potential discrepancies in future shipments.\n Sincerely,","choices":["In accordance with your request, we will add the following note to our sales contract in the future: “Insurance is based on ICC(B) terms, and any additional insurance is the buyer's responsibility.”","As per your request, we will soon amend the insurance coverage part of the Letter of Credit","We appreciate your willingness to cover the extra cost for ICC(A) coverage","We anticipate that this note will help avoid any potential discrepancies in future shipments"],"answer":2},{"section":"무역영어","num":28,"stem":"28. 다음 중 주어진 문장의 영작이 올바르지 않은 것은?","choices":["최근 시장 상황을 고려하면, 귀사가 제안한 가격으로는 당사의 경쟁력을 유지하 기 어렵습니다. ⇒ Given the current market conditions, we find it challenging to maintain competitiveness with the price proposed by your company","비록 당사가 가능한 한 귀사의 조건을 맞추려고 하지만 해상운송과 동일한 가격 으로 물품을 항공편으로 보낼 수 없습니다. ⇒ While we endeavor to accommodate your terms as much as possible, sending your order by air at the same price as by sea is not feasible for us","귀사가 원하는 가격에 비슷한 품질의 제품을 대체품으로 제시합니다. ⇒ We are offering a substitute product of similar quality to the product you ordered at the price you desire","귀사의 주문량이 최소 주문량 1,000개보다 많지 않아서 당사는 추가적인 가격할 인을 해줄 수 없습니다. ⇒ Even if you increase the order to the minimum of 1,000 units, we are unable to offer additional discounts"],"answer":4},{"section":"무역영어","num":29,"stem":"Yours sincerely,\n\n29. 이 서신의 목적은 무 인가? 엇\n\n[지문]\nDe ra Mr. Lee:\n T hank you for your letter of 5 January. Enclosed you will find details of our sailings\n from Hong Kong to Tilbury for the end of this month and the beginning of next.\n You wil see that the first available vessel we have will be the MV Orient, which wil\n accept cargo from 3 February to 7 February, when she sails. She is due in Tilbury\n on 3 March.\n Our freight rate for crated consignment is $191.00(one hundred ninety-one dollars) per\n ton, and we have attached our shipping instructions to the enclosed itinerary.\n\n Yours sincerely,","choices":["To request a change in the sailing schedule","To advise delayed shipment and following measures","To enquire about the sailing schedule and freight","To provide information about the sailing schedule and freight"],"answer":4},{"section":"무역영어","num":30,"stem":"Yours sincerely,\n\n30. 주어진 서신 이전에 Mr. Lee가 보낸 서신의 내용으로 가장 적절한 것은?\n\n[지문]\nDe ra Mr. Lee:\n T hank you for your letter of 5 January. Enclosed you will find details of our sailings\n from Hong Kong to Tilbury for the end of this month and the beginning of next.\n You wil see that the first available vessel we have will be the MV Orient, which wil\n accept cargo from 3 February to 7 February, when she sails. She is due in Tilbury\n on 3 March.\n Our freight rate for crated consignment is $191.00(one hundred ninety-one dollars) per\n ton, and we have attached our shipping instructions to the enclosed itinerary.\n\n Yours sincerely,","choices":["Could you please inform us about the vessels available to reach London before the end of next month and provide us with your freight rates?","Our list of tariffs shows that charges are calculated by cubic meter or cubic kilogram, with substantial rebates offered for regular shipments","Could you please check this matter? If there are any problems, please let me know so that I can make inquiries here","We have contacted the shipping company and discovered out that they are on strike. The goods are still on board"],"answer":1}];
var _D58=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하고 있는 ‘수출’의 정의에 관한 설명으로 잘못된 것은?","choices":["매매, 교환, 임대차, 증여 등에 따라 국내에서 외국으로 물품이 이동하는 것은 수 출이다.","관세법에 따른 보세판매장에서 내국인에게 국내에서 생산된 홍삼 제품을 판매하 는 것은 수출이다.","무환으로 수출된 해당 물품의 판매량에 따라 대금이 결제되는 계약에 의한 행위 는 수출이다.","거주자가 비거주자에게 정보통신망을 통한 전송으로 전자적 형태의 무체물을 인 도하는 것은 수출이다."],"answer":2},{"section":"무역규범","num":2,"stem":"2. 대외무역법령상 전문무역상사의 역할, 지정 기준 및 지원 사항에 관한 설명으로 잘못된 것은?","choices":["전문무역상사는 신시장 개척, 신제품 발굴 및 중소기업·중견기업의 수출 확대 를 통해 국가의 무역 경쟁력 강화에 기여하는 역할을 한다.","전문무역상사의 지정 조건은 전년도 수출실적 또는 직전 3개 연도의 연평균 수출실적이 미화 100만 달러 이상, 수출실적에서 중소기업·중견기업의 생산품 비율이 100분의 20 이상의 범위에서 산업통상자원부장관이 정해 고시하는 비 율 이상이다.","전문무역상사는 정부의 무역 정책에 따라 운영되며, 정부로부터 다양한 지원을 받을 수 있다.","전문무역상사는 특정한 품목의 수출독점권을 부여받는다."],"answer":4},{"section":"무역규범","num":3,"stem":"3. 다음 무역 사례에서 대외무역법령에 규정된 거래형태로 올바르게 연결된 것은? 가. 우리나라 기업 A는 국내에서 직접 개발한 제품을 베트남에 소재한 기업 B에게 생산을 위탁하고 원재료 일부도 공급 중이다. A는 생산품 전량을 미국에 수출하 고 있다. 나. 우리나라 기업 C는 베트남에서 식자재를 수입해 미국으로 수출하고 수출금 (FOB)에서 수입금액(CIF)을 공제한 가득액을 수출실적으로 인정받는다. 식자재는 우리나라 보세구역에 반입된 후 미국으로 운송된다.","choices":["가: 위탁판매수출 나: 중개무역","가: 위탁가공무역 나: 중계무역","가: 위탁가공무역 나: 외국인도수출","가: 위탁판매수출 나: 외국인수수입"],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에 따른 수출입 제한에 관한 설명으로 잘못된 것은?","choices":["전략물자 수출입통제 협의회는 전략물자 등의 수출입통제가 필요한 경우 관세청 장에 게 조사를 요청할 수 있다.","특정 상품을 수출입 제한할 때 품목별 수량·금액·규격·수출지역을 한정할 수 있다.","수출입 제한은 국제법규상 의무이행과 교역상대국과 경제협력 증진을 위해 필요 하다.","모든 수출입 상품은 산업통상자원부장관의 승인을 받아야 한다."],"answer":4},{"section":"무역규범","num":5,"stem":"5. 대외무역법령상 전략물자의 수출허가 또는 상황허가에 관한 설명으로 잘못된 것 은?","choices":["국내기업이 전략물자로 판정된 물품을 해외에서 조달해 국내 통관 없이 현지에 서 바로 러시아로 수출하는 경우, 전략물자 수출허가 대상이 아니다.","관련 행정기관장은 전략물자의 상황허가 판정을 신청한 물품에 대하여 15일 이 내에 판정해 결과를 신청인에게 알려야 한다.","항공기의 안전운항을 위해 긴급 수리용으로 사용되는 부분품 등을 수출하는 경 우, 전략물자의 수출허가 또는 상황허가를 면제한다.","전략물자 또는 상황허가 판정의 유효기간은 2년이다."],"answer":1},{"section":"무역규범","num":6,"stem":"6. 우리나라에서 판매되는 수입 남성 청바지(HS 6203.42-1000)의 다음 사례에서 대외 무역법령상 원산지 국가는? • 청바지를 디자인한 국가: 한국 • 면사로 면직물을 제조한 국가: 중국 • 면직물 원단을 재단, 봉제한 국가: 베트남 • 청바지를 포장한 국가: 태국","choices":["한국","중국","베트남","태국"],"answer":3},{"section":"무역규범","num":7,"stem":"7. 대외무역법령상 수입수량 제한조치에 관한 설명으로 올바른 것은?","choices":["수입수량 제한조치는 조치 시행일 180일 전부터 수입되는 물품에 소급 적용할 수 있다.","산업통상자원부장관이 수입수량 제한조치의 내용을 변경하거나 적용기간을 연 장하는 경우, 변경되는 조치 내용은 최초의 조치 내용보다 강화되어야 한다.","산업통상자원부장관은 기준수량 이상으로 수입수량 제한조치를 하는 경우, 해 당 산업의 심각한 피해 방지나 구제가 어렵다고 명백하게 인정될 때에는 기준 수량 미만으로 수입수량을 제한할 수 있다.","수입수량을 제한하는 경우, 해당 수량은 최근 대표적인 3년간의 수입량을 연평 균수입량으로 환산한 수량 이상으로 해야 한다. 최근 대표 연도를 정할 때 통 상적인 수입량보다 수입량이 급증하거나 급감한 연도도 포함한다."],"answer":3},{"section":"무역규범","num":8,"stem":"8. 대외무역법령에서 규정하고 있는 구매확인서에 관한 설명으로 올바른 것은?","choices":["외국환은행의 장은 이미 발급된 구매확인서로 2차 구매확인서를 발급할 수 없 다.","외화획득용 원료·기재의 제조·가공·유통과정이 여러 단계인 경우에는 최종 단계에서만 구매확인서를 발급할 수 있다.","외국환은행의 장은 외화획득용 원료·기재 구매확인서의 발급 사실을 신청자 에게 통지할 때 승인번호 등 최대한 모든 사항을 알려야 한다.","외화획득용 원료·기재의 내용 변경 등으로 이미 발급받은 구매확인서와 내용 이 달라져 신청자가 재발급을 요청하는 경우, 외국환은행의 장은 신규 구매확 인서를 발급할 수 있다."],"answer":4},{"section":"무역규범","num":9,"stem":"9. 관세법령상 품목분류 사전심사에 관한 설명으로 잘못된 것은?","choices":["품목분류 사전심사의 결과를 통지받은 자는 재심사를 신청할 수 없다.","물품을 수출입하려는 자는 수출입신고 전에 관세청장에게 품목분류 사전심사를 신청할 수 있다.","관세청장은 품목분류를 심사한 물품에 적용될 품목분류와 품명, 용도, 규격, 기타 필요한 사항을 고시 또는 공표해야 한다.","관세청장은 품목분류 사전심사를 위해 해당 물품에 대한 구성재료의 물리적·화 학적 분석이 필요한 경우, 사전심사 신청자에게 수수료를 징수할 수 있다."],"answer":1},{"section":"무역규범","num":10,"stem":"10. 관세법령상 용어의 설명으로 잘못된 것은?","choices":["우리나라에 있는 내국물품을 외국으로 반출할 때 수출통관을 하며 관세는 부과 되지 않는다.","부산항에 도착한 수입식품이 식품위생법상 기준 및 규격에 부적합해 수입통관 없이 다시 외국으로 반출될 때 반송통관을 한다.","외국물품을 우리나라에서 소비 또는 사용하는 것을 수입이라 한다. 다만 여행자 가 휴대품을 운송수단에서 소비하는 것은 수입으로 보지 않는다.","중국에서 미국으로 수출하기 위해 중국에서 선적된 화물이 부산항에 입항 후 미 국으로 출항하는 선박에 환적된 경우, 세관에 반송통관을 해야 한다."],"answer":4},{"section":"무역규범","num":11,"stem":"11. 관세법 및 자유무역협정(FTA)관세법상 ‘법 적용의 원칙’에 관한 설명으로 잘못된 것은?","choices":["납세자가 납세 의무를 이행할 때와 세관공무원이 해당 직무를 수행할 때 신의에 따라 성실하게 해야 한다.","자유무역협정(FTA)관세법 또는 관세법이 협정과 상충되는 경우, FTA관세법 혹은 관세법을 우선해 적용한다.","자유무역협정(FTA)관세법은 관세법에 우선해 적용한다. 다만, FTA관세법에서 정 하지 않은 사항은 관세법을 적용한다.","관세법령의 제·개정, 과세관청의 새로운 해석이나 처리지침이 변경된 때 해당 효력 발생 전에 종결된 과세요건 사실에 대한 소급과세를 금지하고 있다."],"answer":2},{"section":"무역규범","num":12,"stem":"12. 국내 소재 독일계 다국적기업 A사는 본사로부터 해당 법인이 사용할 승용자동차 (배기량 2,500cc, 정원 5명)를 무상으로 수입했다. 이 경우 세관장이 A사에 부과할 수 있는 조세가 아닌 것은?","choices":["교육세","자동차세","개별소비세","부가가치세"],"answer":2},{"section":"무역규범","num":13,"stem":"13. 관세법령상 과세물건 및 적용법령에 관한 설명으로 잘못된 것은?","choices":["수입물품에는 관세를 부과한다.","관세는 수입신고 수리 당시의 법령에 따라 부과한다.","외국물품이 도난된 경우에 도난 당시의 법령에 따라 관세를 부과한다.","건강기능식품을 우편물로 수입하는 경우에 수입신고 당시의 법령에 따라 관세를 부 과한다."],"answer":2},{"section":"무역규범","num":14,"stem":"14. 아래 법조문은 관세법령에서 정하는 납세의무자에 관한 규정 중 일부이다. “대통 령령으로 정하는 상업서류”에 해당하지 않는 것은? 관세법 제19조(납세의무자)","choices":["다음 각호의 어느 하나에 해당하는 자는 관세의 납세의무자가 된다. 1. 나. 수입을 위탁받아 수입업체가 대행 수입한 물품이 아닌 경우: 대통령령으로 정하는 상업서류에 적힌 물품수신인","송품장","선하증권","포장명세서"],"answer":3},{"section":"무역규범","num":15,"stem":"15. 관세법령상 관세징수권의 소멸시효가 중단되는 사유에 해당하지 않는 것은?","choices":["압류","고발","납부독촉","심사청구 제기"],"answer":4},{"section":"무역규범","num":16,"stem":"16. 다음 상황에서 관세법령상 납부해야 하는 합계 세액으로 올바른 것은? 수입물품 가격(FOB) 국제운송 비용 우리나라에 도착한 후 발생하는 수입물품 조립비용(물품가격에 포함) 관세율 부가가치세 5,000,000원 500,000원 500,000원 10% 10%","choices":["1,000,000원","1,050,000원","1,100,000원","1,200,000원"],"answer":2},{"section":"무역규범","num":17,"stem":"17. 관세법령상 세액의 확정에 관한 설명으로 잘못된 것은?","choices":["세관장은 세액의 보정을 통지하는 경우에 보정통지서를 교부해야 한다.","경정청구를 하려는 자는 경정청구서를 세관장에게 제출해야 한다.","납세신고를 받은 세관장이 수입신고 수리 전에 납세신고 내용을 심사해야 하는 것이 원칙이다.","납세의무자는 보정신청 세액의 과다를 알게 되었을 때 최초로 납세 신고한 날부 터 5년 안에 신고한 세액의 경정을 세관장에게 청구할 수 있다."],"answer":3},{"section":"무역규범","num":18,"stem":"18. 관세법령상 수입물품 과세에서 적용되는 “징수금액의 최저한”에 관한 설명으로 올바른 것은?","choices":["징수금액의 최저한은 관세액이 1만 원 미만인 경우이다.","징수금액의 최저한은 휴대품이나 탁송품의 과세에는 적용되지 않는다.","징수금액의 최저한이 적용되는 물품은 기본세율에 해당하는 것에 한한다.","징수금액의 최저한에 해당되어 관세를 징수하지 않게 된 경우, 당해 물품의 수 입신고 수리일을 그 납부일로 본다."],"answer":4},{"section":"무역규범","num":19,"stem":"19. 다음 상황에서 괄호에 들어갈 관세법령상 관세로 올바른 것은? 원활한 물자 수급 또는 산업의 경쟁력 강화를 위해 수입을 촉진할 필요가 있거나 최근 작황 부진 등으로 가격 오름세가 지속하고 있는 과일류의 공급 부족을 해소하 고 서민 생활물가를 안정시키기 위해 체리, 키위 등 5개 품목에 대해 2024년 4월 5일부터 2024년 6월 30일까지 0%부터 10%까지의 ( )를 적용하려는 것임 (대통령령 제34390호, 2024. 4. 4. 개정 이유 인용)","choices":["조정관세","편익관세","할당관세","국제협력관세"],"answer":3},{"section":"무역규범","num":20,"stem":"20. 다음 사례에서 관세법령상 납부해야 하는 관세로 올바른 것은? 과세가격 세율 기본관세율 WTO협정세율 덤핑방지관세율 10,000,000원 8% 3% 12%","choices":["300,000원","1,200,000원","1,500,000원","2,000,000원"],"answer":3},{"section":"무역규범","num":21,"stem":"21. 다음 중 관세법령에서 규정한 재수입면세 적용이 가능한 것은?","choices":["A사는 미국 업체와 전기자동차용 부품의 수출계약을 맺고 반복 사용이 가능한 특수제작 용기에 부품을 담아 수출 후 용기만 재수입하기로 했다.","B사는 베트남 업체와 임대차계약을 체결하고 반도체 제조용 장비(내용연수 10년) 를 3년 전에 수출했다. 올해 계약 기간이 만료되어 해당 제품을 재수입하기로 했 다.","C사는 한·중 FTA 관세율 0%를 적용받은 수입원자재로 신발을 생산한 후 중국 으로 수출했다. 판매되지 않은 재고품은 수출 후 3년이 지나 반품을 받기로 했 다.","D사는 중국에 납품한 화장품에 운송 중 하자가 발생하자 수출 후 6개월 만에 재 수입하기로 했다. D사는 화장품 수출 후 1개월이 지난 시점에 관세환급특례법상 관세환급을 받았다."],"answer":1},{"section":"무역규범","num":22,"stem":"22. 관세법상 보세구역에 관한 설명으로 잘못된 것은?","choices":["보세구역에 장치된 물품은 세관장 승인을 받아 그 성질이 변하지 않는 범위에서 포장을 변경하는 작업을 할 수 있다.","보세구역에 물품을 반입·반출하려는 자는 세관장에게 신고해야 하며, 관련 자료 는 신고 수리일로부터 2년 동안 보관해야 한다.","보세구역에 장치된 외국물품이 폐기되어 관세를 징수하는 경우, 보세구역에 장치 한 때의 물품 성질과 수량에 따라 부과한다.","보세구역은 지정보세구역, 특허보세구역, 종합보세구역으로 구분된다. 특허보세구 역은 보세창고, 보세공장, 보세전시장, 보세건설장, 보세판매장으로 나뉜다."],"answer":3},{"section":"무역규범","num":23,"stem":"23. 최근 해외직구가 활성화되면서 지식재산권 침해도 증가하고 있다. 관세법령상 보 호되는 지식재산권으로 맞게 짝지어진 것은? A. 상표법에 따라 설정등록된 상표권 B. 저작권법에 따른 저작권과 저작인접권 C. 정보재산권법에 따른 영업비밀보호권 D. 특허법에 따라 설정등록된 특허권 E. 산업저작권법에 따라 설정등록된 소프트웨어권","choices":["A, B, D","B, C, D","A, C, E","C, D, E"],"answer":1},{"section":"무역규범","num":24,"stem":"24. 납세자의 권리 보호를 위한 관세법상 심사와 심판에 관한 내용으로 올바른 것은?","choices":["모든 심사청구와 심판청구에 앞서 이의신청을 할 수 있다.","관세법상 통고처분에 대해서는 처분의 취소 또는 변경을 청구할 수 없다.","납세자는 관세청장의 심사청구 처분에 대해 국세심판원장에게 심판청구를 제기 할 수 있다.","감사원법에 의한 심사청구는 해당 처분된 것을 인지한 날(처분 통지를 받았을 때 는 그 통지를 받은 날)로부터 60일 안에 해야 한다."],"answer":2},{"section":"무역규범","num":25,"stem":"25. 관세환급특례법에서 규정하고 있는 환급대상 원재료에 해당하지 않는 것은?","choices":["수출물품의 포장용 상자","수입한 묘목을 성장시켜 서양란을 수출했을 때 묘목","변성 에틸알코올을 생산하는 공정에 투입되는 초산에틸","벌크 상태로 수입된 선글라스를 분할 포장해 원상태로 수출한 선글라스"],"answer":2},{"section":"무역규범","num":26,"stem":"26. 관세환급특례법상 개별환급 방법으로 관세 등을 환급 신청할 때 원재료에 대한 납부세액 증명서류가 아닌 것은?","choices":["수입신고필증","수입세액분할증명서","소요량계산서","기초원재료납세증명서"],"answer":3},{"section":"무역규범","num":27,"stem":"27. 관세환급특례법상 수출용 원재료의 관세환급에 관한 거래내용으로 괄호에 들어갈 용어로 올바른 것은? • A사는 베트남에서 원단을 직접 수입하고 관세 등을 납부했다. • A사는 수입한 원단을 추가 가공 없이 B사에 납품했다. • B사는 원단을 사용해 바지를 생산하고 수출했다. • B사는 관세환급과 관련해 A사에 구매확인서를 보냈다. 이에 A사는 B사에 ( ) 를 제공했다.","choices":["평균세액증명서","수입세액분할증명서","기초원재료납세증명서","환급대상 수출물품 반입확인서"],"answer":2},{"section":"무역규범","num":28,"stem":"28. 자유무역협정(FTA)관세법령상 용어의 정의로 올바른 것은?","choices":["완전생산기준은 해당 물품을 수출한 국가를 원산지로 인정하는 것이다.","세번변경기준은 제품이 2개국 이상에 걸쳐 생산됐을 때 해당 물품의 통합품목분 류표상 품목번호와 해당 물품의 생산에 사용된 원산지 재료의 품목번호가 일정 단위 이상이 다른 경우, 해당 물품을 최초로 생산한 국가를 원산지로 인정하는 것이다.","원산지포괄증명은 장기간에 동일 수입자로부터 수입신고되는 모든 물품에 대해 각 협정에서 정하는 기간 동안 최초의 원산지증명서를 반복해 사용하는 것이다.","부가가치기준은 해당 물품이 2개국 이상에 걸쳐 생산된 경우, 해당 물품에 대해 일정 수준 이상의 부가가치를 창출한 국가를 원산지로 인정하는 것이다."],"answer":4},{"section":"무역규범","num":29,"stem":"29. 다음 상황에서 자유무역협정(FTA)관세법령상 협정관세 사후적용 신청에 관한 설 명으로 잘못된 것은? (주)KITA는 중국에서 아이스크림 제조기(HSK: 8418.69-2010)를 수입했다. 해당 물품의 수입신고 수리일은 2023년 11월 12일이며, 현재 날짜는 2024년 5월 25일이다. (주)KITA는 협정관세 사후적용의 신청과 이미 납부한 세액의 경정을 청구하려 한다.","choices":["해당 물품의 수입신고 수리일부터 현재 날짜까지 6개월이 경과했으므로 (주)KITA 는 협정관세 사후적용을 신청할 수 없다.","세관장은 전자적 교환으로 원산지증명서를 제출하지 않는 (주)KITA에 해당 물품 의 원산지증명서 확인이 필요한 경우에 제출을 요구할 수 있다.","수출국으로부터 해당 물품의 원산지증명서에 포함된 정보가 전자적으로 교환된 경우, (주)KITA는 원산지증빙서류 중 원산지증명서를 제출하지 않을 수 있다.","(주)KITA로부터 해당 물품에 대해 이미 납부한 세액의 경정청구를 받은 세관장은 청구일로부터 2개월 안에 협정관세의 적용 및 세액의 경정 여부를 청구인에게 통지해야 한다."],"answer":1},{"section":"무역규범","num":30,"stem":"30. 자유무역협정(FTA) 관세법령상 원산지인증수출자에 관한 설명으로 잘못된 것은?","choices":["수출물품에 관한 원산지증명능력 등 요건을 충족하는 수출자는 업체별 또는 품 목별 원산지인증수출자로 인증받을 수 있다.","원산지인증수출자가 거짓이나 그 밖의 부정한 방법으로 인증받은 경우, 관세청장 또는 세관장은 해당 인증을 취소해야 한다.","업체별 인증수출자는 원산지증명서 작성 대장을 비치·관리하고 원산지관리 전 담자를 지정·운영해야 하지만, 품목별 인증수출자는 예외로 한다.","원산지인증 수출자는 협정이 정하는 범위에서 해당 물품에 대해 자율적으로 원 산지를 증명할 수 있으며, 원산지증명에 관해 간소한 절차를 적용받을 수 있다."],"answer":3},{"section":"무역결제","num":1,"stem":"1. 송금결제 방식에 관한 설명으로 올바른 것은?","choices":["송금결제 방식에서 수출자는 선적서류를 수입자가 지정한 은행으로 직접 발송한 다.","O/A 방식에서 대금결제는 선적일을 기준으로 계약 당시에 정한 일정 기간 후에 수출자가 지정한 은행 계좌로 수입자가 송금하는 형태로 진행된다.","송금결제 방식에서 수출자는 대금을 받기 위해 수입자를 지급인으로 하는 환어 음을 발행해야 한다.","서류와 상환으로 대금이 지급된다는 점에서 CAD 방식은 D/A, Sight L/C와 마찬 가지로 동시지급 방식으로 분류할 수 있다."],"answer":2},{"section":"무역결제","num":2,"stem":"2. 송금결제 방식의 위험에 관한 설명 중 올바른 것으로만 묶인 것은? A. 수출자는 선적서류를 직접 수입자에게 송부하는 대신 은행을 통해 보내도록 강제할 수 있어 서류 분실의 위험을 줄일 수 있다. B. 선지급 방식 대신 사후송금 방식으로 계약해 수입자는 대금회수 위험을 줄일 수 있다. C. 수입자는 COD 방식을 이용해 물품의 품질을 파악하기 어려운 위험성을 줄일 수 있다. D. CAD 방식에서 수출자는 선적을 완료한 상태에서 수입자가 서류인수를 거절함으 로써 이미 발송한 물품을 회수해야 하는 위험을 부담할 수도 있다.","choices":["A, B","B, C","B, C, D","C, D"],"answer":3},{"section":"무역결제","num":3,"stem":"3. O/A결제 방식에 관한 설명으로 잘못된 것은?","choices":["본지사 간이나 신용도가 높은 고정거래처 등 대금회수 위험이 비교적 낮은 때 에만 제한적으로 이용하는 것이 수출자의 위험을 줄일 수 있다.","선적통지 결제방식 거래에서는 수출자가 수입자의 사업 능력과 성실성을 믿어 야만 거래의 성립이 가능하다.","수출자와 수입자가 O/A 방식에 합의한다면 수출자는 신용장 방식 거래보다 수 입자에게 더 높은 물품 대금을 제시할 가능성이 크다.","O/A nego는 수입국 은행의 신용승낙 후 신용장이나 선하증권 등에 의해 담보 되지 않는 순수한 외상수출채권을 매입하는 거래이다."],"answer":4},{"section":"무역결제","num":4,"stem":"4. 추심결제 방식에 관한 올바른 설명으로만 묶인 것은? A. D/A 방식에서 수출자는 일람불 환어음을 발행하고 수입자는 만기일에 대금을 결제 한다. B. 추심 거래에서 환어음의 지급인(drawee)은 수입자로 표시되어야 한다. C. 화환추심의 경우, 추심지시서에 명시가 없더라도 지급지의 법률에 의해 허용되는 범위 및 조건에 따라 분할지급을 할 수 있다. D. 추심 거래에서 서류 송부는 은행을 통해 이루어진다.","choices":["A, B","B, C, D","B, D","C, D"],"answer":3},{"section":"무역결제","num":5,"stem":"5. 추심결제 방식의 특징에 관한 설명으로 잘못된 것은?","choices":["신용장 방식보다 미결제 위험이 크다.","수출자 입장에서 물품을 상실할 위험 측면에서 볼 때 D/P 방식과 D/A 방식의 위 험은 동일하다.","D/P 방식에서 수입자는 서류와 상환해 대금을 지급하고 물품을 인도받게 되는데, 물품에 하자가 있는 경우 손해를 입게 될 가능성이 있다.","D/A 방식에서 수입자는 추심은행에 서류의 인수 의사표시를 하고 서류를 인도받 아 물품을 통관한다."],"answer":2},{"section":"무역결제","num":6,"stem":"6. 화환신용장에 관한 설명 중 잘못된 것은?","choices":["Sight 환어음을 요구하는 매입신용장과 Banker’s usance L/C에서 수출자가 부 담하는 환가료는 같다.","상환방식신용장(Reimbursement L/C)에 별도 규정이 없으면 개설은행이 상환은 행의 수수료를 부담한다.","개설은행은 제시가 일치하지 않는다고 판단할 때, 독자적으로 매입은행에 waiver 의사를 표시할 수 있다.","Back to back L/C에는 2개의 신용장이 개입되며, Transferable 신용장에는 1개 의 신용장이 개입된다."],"answer":3},{"section":"무역결제","num":7,"stem":"7. 다음은 우리나라 통지은행이 받은 신용장의 일부이다. 이 신용장의 종류는 무엇인 가? +10PCT OF TOTAL VALUE(EUR500,000.00) SHALL BE PAID AS ADVANCE PAYMENT AGAINST PRESENTATION OF AN ADVANCE PAYMENT BANK GUARANTEE IN THE SAME AMOUNT IN FAVOR OF DB INTERNATIONAL FEZ PAYMENT WILL BE EFFECTED BY US UPON FIRST BENEFICIARY'S ACCEPTANCE AND SUBJECT TO ARRANGEMENT OF FUNDS BY THEM.","choices":["Standby Credit","Back to Back Credit","Revolving Credit","Packing Credit"],"answer":4},{"section":"무역결제","num":8,"stem":"8. 화환신용장 확인에 관한 설명으로 올바른 것은?","choices":["확인은 취소가능신용장에 대해 개설은행 외에 제3은행이 추가적인 일람지급, 연지급, 인수, 매입을 확약하는 것을 의미한다.","확인을 요청받은 은행은 개설은행의 신용상태가 불확실하면 확인 요청을 거절 할 수 있다.","확인은 확인은행의 책임 및 의무가 개설은행과 연계되는 행위이다.","확인은 지급 또는 인수를 확약하거나 수익자가 발행한 환어음 혹은 서류를 ‘상환청구권(recourse)’ 행사조건으로 매입할 것을 확약하는 행위이다."],"answer":2},{"section":"무역결제","num":9,"stem":"9. 화환신용장의 양도 및 대금 양도에 관한 설명으로 잘못된 것은?","choices":["신용장이 양도 가능하다고 기재되어 있지 않으면 신용장 대금을 양도할 수 없 다.","신용장을 양도할 때 발생한 관련 수수료는 제1 수익자의 부담이다.","신용장의 금액, 단가, 유효기일, 최종선적일은 일부 또는 전부 감액되거나 단 축될 수 있다.","원신용장에 확인이 추가되었다면, 양도된 신용장도 확인이 추가된 신용장이다."],"answer":1},{"section":"무역결제","num":10,"stem":"10. 화환신용장 거래에서 상업송장의 수리요건에 관한 설명으로 올바른 것은?","choices":["수익자를 포함해 누구나 발행할 수 있다.","신용장에서 요구한 경우가 아니면 서명이나 발행일자가 없어도 수리 가능하다.","신용장에는 기재되지 않은 선지급 금액을 표기하면 수리 거절된다.","물품명세는 신용장의 명세와 충돌되지 않는 수준으로 일반적인 용어로 기재해 도 수리 가능하다."],"answer":2},{"section":"무역결제","num":11,"stem":"11. 화환신용장 거래에서 운송서류의 수리요건에 관한 설명으로 올바른 것은?","choices":["신용장이 B/L을 요구했을 때, 복합운송증권(MTD)은 수리 거절된다.","신용장이 Charter party B/L을 요구했을 때, 포워더가 선장의 대리인 자격으로 서명한 용선계약 선하증권은 수리 거절된다.","항공운송서류는 항상 원본 전통을 제시해야 한다.","신용장이 B/L을 요구했을 때, “The goods may be loaded on deck.” 표기가 있는 선하증권은 수리 가능하다."],"answer":4},{"section":"무역결제","num":12,"stem":"12. 화환신용장의 조건이 다음과 같은 경우 올바른 설명은? 43P : Partial shipment : Not allowed 43T : Transhipment : Not allowed 44E : Port of loading / Airport of departure : Incheon, Korea 44F : Port of Discharge / Airport of destination : Bangkok, Thailand 46A : Document Required + Full set of clean on board ocean bills of lading made out to order of COEX BANK marked \"Freight Prepaid\" and notify \"applicant\"","choices":["물품이 컨테이너에 선적되었고 환적될 것이라고 기재된 선하증권은 수리될 수 없다.","선하증권의 수하인에는 applicant의 명칭을 기재하면 된다.","“Clean on board bills of lading”이라고 신용장에서 요구했기 때문에 선하증 권에 반드시 “Clean”이란 단어를 기재해야 한다.","선하증권 notify란에는 화환신용장에 기재된 applicant의 명칭을 기재해야 한다."],"answer":4},{"section":"무역결제","num":13,"stem":"13. 다음 화환신용장 부분의 설명 중에서 잘못된 것은? 46A Documents Required + Marine Insurance Policy or Certificate in negotiable form. Endorsed in blank for CIF value plus 10 percent covering Institute Cargo Clause(A/R) including from warehouse to warehouse, Institute war clause(cargo) and S.R.C.C and showing claims payable at destination in the currency of this documentary credit.","choices":["보험증권 혹은 보험증명서를 제시해도 서류상의 불일치가 되지 않는다.","수익자는 보험서류에 배서를 하지 않아야 한다.","가격조건이 CIF 조건이지만 개설의뢰인의 창고까지 확장된 보험에 가입해야 한다.","CIF 금액에 10%를 추가해 전쟁과 파업을 보상하는 특약에 가입해야 한다."],"answer":2},{"section":"무역결제","num":14,"stem":"14. UCP 600에서 규정한 항공운송서류에 관한 내용 중 잘못된 것은?","choices":["환적이 될 것이라거나 환적될 수 있다고 표시하는 항공운송서류는 비록 신용장 이 환적을 금지하더라도 수리될 수 있다.","신용장이 full set를 규정하더라도 수하인용 원본을 제시해야 한다.","항공운송서류에 발행일을 표시해야 한다.","신용장에 기재된 출발공항과 도착공항을 표시해야 한다."],"answer":2},{"section":"무역결제","num":15,"stem":"15. UCP 600과 ISBP 745에 근거해 적격한 제시로 볼 수 있는 서류를 모두 기재한 것은? A. 선적 부기상에 표시된 실제 선적일 이전에 발행된 Air Waybill B. 컨테이너 화물을 환적해 각각의 운송인들이 발행한 복수의 Ocean B/L C. 신용장에서 하인으로 요구하는 정보에 추가되는 정보가 통상적인 ‘하인’이라는 인식을 넘어선 포장명세서 D. 양륙항과 그 국가를 표시하지 않은 Charter Party B/L E. 배달업체의 서명 없이 바코드만 표시된 Courier Receipt","choices":["A, C, E","A, D, E","B, C, D","C, D, E"],"answer":1},{"section":"무역결제","num":16,"stem":"16. 보증신용장과 은행보증서에 관한 내용으로 올바른 것은?","choices":["보증신용장은 화환신용장의 한 형태이고, 은행보증서는 무화환신용장의 한 형태이 다.","보증신용장과 은행보증서는 보증의 용도는 동일하나, 적용하는 규칙이 서로 다르 다.","보증신용장은 은행보증서와는 달리 간접보증의 구조로만 발급할 수 있다.","보증신용장이 은행보증서보다 다양한 내용의 보증이 가능하다."],"answer":2},{"section":"무역결제","num":17,"stem":"17. 포페이팅과 수출팩터링의 공통된 특징으로 잘못된 것은?","choices":["수입자 거래은행의 Aval이 요구된다.","결제 기간에 따라 관련된 금융비용이 달라질 수 있다.","포페이터와 수출팩터의 계약당사자는 수출자이다.","Without recourse로 진행이 가능하다."],"answer":1},{"section":"무역결제","num":18,"stem":"18. 대금결제 위험관리 및 대금결제 방식에 관한 설명으로 올바른 것은?","choices":["한국무역보험공사의 수입보험은 수입자가 선급금을 지급하는 거래나 화환신용장 거래 만 가입할 수 있으며 중계무역은 제외된다. 주요자원 및 관세법에 규정된 시설재 중 일 부는 수입보험 가입대상이다.","한국무역보험공사의 수출보험은 대금 미회수 위험을 담보하기 위한 보험이며, 신용위험 뿐만 아니라 비상위험도 보상 대상에 해당된다.","D/A 거래에서 추심은행이 추심의뢰은행에 발송한 인수통보(Advice of Acceptance)는 만 기가 도래하면 추심은행 자신이 지급을 확약하겠다는 의사표시이다.","신용장 개설은행이 해외 소재 자신의 환거래은행을 인수은행으로 지정하고 지정은행이 일람불신용장과 동일하게 신용장 대금을 지급하도록 하는 신용장을 내국수입유전스라 고 한다."],"answer":2},{"section":"무역결제","num":19,"stem":"19. 한국무역보험공사에서 제공하는 단기수출보험(선적 후)에 관한 설명으로 잘못된 것은","choices":["수출자가 수출대금의 결제기간 2년 이하의 수출계약을 체결하고 물품을 수출한 후, 수입자로부터 수출대금을 받을 수 없게 되었을 때 입게 되는 손실은 보상된 다.","수출자가 수출대금의 결제기간 2년 이하의 수출계약을 맺고 물품을 수출한 후, 신 용장 개설은행으로부터 수출대금을 받을 수 없게 된 때에 입게 되는 손실은 보상 대상이다.","결제기간 2년 이내 계약으로 수출자가 해외지사 등(현지법인 포함)에 물품을 수출 하고, 그 해외지사 등이 당해 물품을 현지나 제3국에 재판매하는 거래는 보상되 지 않는다.","결제 기간 2년 이내의 위탁가공무역, 중계무역은 보상 대상이다."],"answer":3},{"section":"무역결제","num":20,"stem":"20. 대금결제 관련 비용 및 위험관리 방안으로 잘못된 것은?","choices":["수입자는 물품의 품질이 거래의 중요 요건이라고 판단해 CAD 거래 대신 COD 거 래를 제안했다.","고위험 국가와의 거래가 많은 수출자는 무역보험공사의 포괄보험을 가입했다.","국내에서 양도된 신용장 거래를 제안받은 수출물품 공급자는 구매확인서 거래로 변경하자고 요청했다.","수출자는 기한부 신용장의 포페이팅을 진행하면서 신용장 매입을 위한 지정은행 에 포페이팅을 요청했다."],"answer":3},{"section":"무역결제","num":21,"stem":"21. Aval과 가장 관계가 깊은 결제방식은 무엇인가?","choices":["O/A","D/A","Sight L/C","Banker’s usance L/C"],"answer":2},{"section":"무역결제","num":22,"stem":"22. 대금결제 관련 용어의 설명으로 잘못된 것은?","choices":["T/R이란 운송서류 도착 전에 수입자가 먼저 도착한 수입 물품을 인도받음에 따 라 발생하는 모든 문제를 발행은행이 책임지는 제도이다.","Factoring은 무신용장 방식의 O/A, D/A와 같은 외상거래에서 수출자가 활용할 수 있는 금융기법이다.","Domestic import usance의 경우 인수금융이 국내에서 발생하므로 인수수수료와 할인료가 해외로 유출되지 않는다.","Periodic interest란 은행이 외화자금 부담에 따르는 이자의 성격으로 수취하는 수 수료이다."],"answer":1},{"section":"무역결제","num":23,"stem":"23. K사는 미국 수입자로부터 수출대금을 미화로 받아 원화로 환전하고자 한다. 은행의 고시 환율표가 아래와 같다면 K사가 적용받는 환율은? 통화 현찰 송금 외화수표 파실 때 매매 기준율 사실 때 파실 때 전신환 매도율 전신환 환율 환율 매입률 미국 USD 1,403.94 1,355.66 1,393.30 1,366,30 1,363.56 1,379.80","choices":["1,355.66","1,393.30","1,366.30","1,363.56"],"answer":3},{"section":"무역결제","num":24,"stem":"24. USD/KRW 환율은 상승하고 있고 USD/JPY 환율은 하락하고 있다. 외환시장이 이 런 상황일 때 다음 설명 중 잘못된 것은?","choices":["JPY/KRW 환율은 상승한다.","국내 수출기업들이 일본 수출기업들보다 가격경쟁력이 상승한다.","수입대금을 엔화로 결제하는 국내 기업은 환차익이 발생한다.","엔화 포지션이 long position인 기업은 이익을 얻는다."],"answer":3},{"section":"무역결제","num":25,"stem":"25. 원화의 달러에 대한 현물환율과 6개월 선물환율이 다음과 같다. 이때 달러의 금 리가 연 2.0%라면 원화의 금리(연이율)와 가장 가까운 것은? (단, 환율은 유럽식 으로 표기한다) 현물환율 1,200.00 6개월 선물환율 1,212.00 달러화 금리 연 2.0%","choices":["1.0%","2.0%","3.0%","4.0%"],"answer":4},{"section":"무역결제","num":26,"stem":"26. 싱가포르의 A은행은 USD/KRW 역외선물환(NDF) 100만 달러를 홍콩의 B은행으 로부터 다음과 같이 매입했다. 만기 시 A은행과 B은행의 손익에 따른 현금흐름 은 어떻게 되는가? Ÿ 거래금액: 1,000,000달러 Ÿ 계약환율: 1,274원 Ÿ 정산환율: 1,300원","choices":["A은행이 B은행에 2만 달러 지급","A은행이 B은행에 2,600만 원 지급","B은행이 A은행에 2만 달러 지급","B은행이 A은행에 2,600만 원 지급"],"answer":3},{"section":"무역결제","num":27,"stem":"27. 통화선물거래에 대한 설명으로 잘못된 것은?","choices":["선물거래소에 정해진 증거금만 납부하면 신용도에 상관없이 거래할 수 있다.","매매 상대방과 합의하면 결제일과 계약단위를 자유롭게 정할 수 있다.","일반적으로 선물환거래보다 수수료가 저렴하다.","일일정산(mark-to-market) 절차에 따라 매일 선물 포지션의 손익을 정산한다."],"answer":2},{"section":"무역결제","num":28,"stem":"28. ㈜한국무역은 3개월 뒤 달러로 수취할 예정인 기계 수출대금의 환위험 헤지전략 을 검토하고 있다. 외환시장의 현재 상황과 3개월 후 상황이 각각 다음과 같다면, ㈜한국무역이 어떤 거래를 선택했을 때 가장 유리한가? 단, 옵션 프리미엄도 고 려한다. 시점 구분 환율 및 프리미엄 현재 상황 USD/KRW 현물환율 1,300 3개월 선물환율 1,290 달러 콜옵션(행사가 1,330원) 달러당 15원 달러 풋옵션(행사가 1,330원) 달러당 30원 3개월 후 상황 USD/KRW 현물환율 1,280","choices":["선물환으로 달러 매도","현재는 아무런 거래를 하지 않고 3개월 후 현물환으로 달러 매도","달러 콜옵션(행사가 1,330원) 매도","달러 풋옵션(행사가 1,330원) 매입"],"answer":4},{"section":"무역결제","num":29,"stem":"29. 다음은 ㈜한국무역의 사업보고서 중 일부이다. 이 회사가 환위험 관리를 위해 활 용하고 있는 내부적 환위험 관리기법은? 우리 회사는 계약금으로 받은 달러를 원화로 환전하지 않고 보유하고 있다가 원자재 구매대금으로 사용하고 있습니다. 또한 원자재 수입대금 결제시기에 맞춰 완제품 수 출대금을 신속하게 회수할 수 있도록 노력하고 있습니다.","choices":["매칭(matching)","네팅(netting)","래깅(lagging)","포트폴리오 전략(portfolio management)"],"answer":1},{"section":"무역결제","num":30,"stem":"30. 환변동보험에 관한 설명으로 잘못된 것은?","choices":["환변동보험에 가입하는 경우, 기업은 거래은행에서 선물환율로 지급 또는 영수한 다.","수출계약이 변경되거나 수출대금이 조기 입금되는 등 외화자금 흐름이 바뀔 경 우, 혹은 기업의 필요에 따라 만기일 이전에도 조기결제가 가능하다.","계약이행과 관련해 증거금 또는 담보 제공 등 절차가 생략되며 보험료를 지급하 는 것 외에는 추가 비용이 전혀 들지 않는다.","보장환율은 한국무역보험공사가 수출입 기업에 대해 미래의 환율을 미리 확정짓 는 환율이다."],"answer":1},{"section":"무역계약","num":1,"stem":"1. 무역계약의 법원(source of law)에 관한 설명으로 올바른 것을 모두 기재한 것은? A. 무역계약에서는 국제상관습이 당사자 간의 약정보다 우선적으로 적용된다. B. 국제매매에 수반된 매도인과 매수인의 의무를 정형화해 무역거래에 활용되는 조건들 을 정형무역거래조건이라고 한다. C. 무역계약에 관한 국제법은 Vienna Convention과 같은 상관습법의 성격을 지닌 것과 Incoterms 2020 등 조약의 성격을 갖는 것으로 구분된다. D. 계약당사자 사이의 약정에 따라 당사자 일방이 속한 국가의 국내법도 계약의 준거법 이 될 수 있다.","choices":["A, B","B, C","B, D","C, D"],"answer":3},{"section":"무역계약","num":2,"stem":"2. 무역계약의 성립에 관한 설명 중 잘못된 것은?","choices":["수입자의 주문서(Order Sheet)에 대해 수출자가 단가변동조건을 승낙한 후 수입 자가 신용장을 개설, 통지한 경우 계약의 성립이 인정된다.","견적송장(Proforma Invoice) 혹은 견적서의 경우, 계약 체결에 충분할 정도로 기 재 내용이 구체적이라고 해도 해당 명칭으로 인해 계약은 성립되지 않는다.","의사표시의 방법인 구두, 문서 등 어떠한 방식에 의해서도 당사자 간 의사의 합 치만 있다면, 계약은 성립될 수 있다.","의사표시는 행동에 의해서도 가능하므로 대금 지급이나 물품 선적 등의 행동이 있는 경우, 청약에 대한 적극적 승낙으로 해석해 계약 성립을 인정할 수 있다."],"answer":2},{"section":"무역계약","num":3,"stem":"3. Incoterms 2020의 EXW 조건으로 잘못된 것은?","choices":["매도인은 물품의 수출통관을 수행할 필요가 없다.","물품의 인도장소인 지정장소는 매도인의 영업장 구내일 수도 있고 아닐 수도 있 다.","물품의 인도는 수입자의 집화용 차량에 물품이 적재된 때이다.","어떠한 단일 또는 복수의 운송방식인지를 불문하고 사용할 수 있다."],"answer":3},{"section":"무역계약","num":4,"stem":"4. Incoterms 2020에 관한 설명으로 올바른 것은?","choices":["DPU, DAP, DDP 조건에서 물품의 인도는 수입국에서 종료되므로 매도인은 반드 시 적하보험에 가입해야 한다.","DDP 조건에서 매도인은 물품을 도착 운송수단에서 양하한 상태로 인도한다.","위험분기점과 비용분기점이 다른 조건은 CFR, CIF, CPT, CIP의 네 가지이다.","C 조건에서 적하보험의 계약자와 피보험자는 모두 같은 당사자이다."],"answer":3},{"section":"무역계약","num":5,"stem":"5. Incoterms 2020의 CIF 조건을 적용한 다음의 무역 사례에서 판매자의 위험부담이 종료되는 시점은 언제인가? 한국 A사는 브라질 B사에 전자제품을 판매하는 계약을 체결했다. A사는 상품을 선적하고 운송비를 지급한 뒤 보험에 가입했다.","choices":["상품이 한국의 항구에서 선박에 적재될 때","상품이 브라질의 목적지 항구에 도착할 때","상품이 최종 목적지에 도착할 때","상품이 A사가 지정한 운송인에게 인도될 때"],"answer":1},{"section":"무역계약","num":6,"stem":"6. 다음 사례와 관련해 Vienna Convention(1980)에서 규정한 무역계약의 해제에 관한 설명으로 잘못된 것은? 한국의 A사는 미국의 B사와 체결한 수출계약 조건에 따라 제품 선적 전 선금 지급 을 요구했으나, B사는 선적기일을 넘겼음에도 선금을 지급하지 않았다. A사는 B사의 미지급을 중대한 계약 위반으로 간주해 본 수출계약의 해제에 관한 법률 검토를 시 작했다.","choices":["선금 미지급이 중대한 계약 위반으로 인정될 경우 A사는 계약을 해제할 수 있다.","계약 해제의 효력은 항상 자동으로 발생한다.","계약의 해제는 당사자 간의 합의에 따라 이루어질 수 있다.","A사는 계약 해제 후 발생한 손해에 대해 배상을 요구할 수 있다."],"answer":2},{"section":"무역계약","num":7,"stem":"7. Vienna Convention(1980)에서 규정하고 있는 구제수단 중 수출자의 계약 위반에 대 해 수입자가 행사 가능한 구제수단이 아닌 것은?","choices":["대체품인도청구권","하자보완청구권","손해배상청구권","물품명세확정권"],"answer":4},{"section":"무역계약","num":8,"stem":"8. 매도인 A와 매수인 B 사이의 국제물품 거래 중 Vienna Convention(1980)이 적용될 수 있는 사례는?","choices":["개인용, 가족용 또는 가정용으로 구입했지만, 매도인이 계약 체결 전이나 체결할 때 물품이 해당 용도로 구입된 사실을 알지 못했던 경우","경매에 의한 매매, 강제집행 또는 기타 법률의 수권에 의한 매매","주식, 지분, 투자증권, 유통증권 또는 통화의 매매","선박, 공기부양정(hovercraft) 또는 항공기의 매매"],"answer":1},{"section":"무역계약","num":9,"stem":"9. 무역계약의 법률적 성격 중 잘못된 것은?","choices":["무역계약은 특별한 형식 없이 구두나 행위 또는 서명에 의해서도 성립된다.","무역계약의 성립에 따라 당사자들은 상호 채무를 부담하게 된다. 즉, 매도인의 물품인도 의무에 대해 매수인은 대금지급 의무를 가진다.","수입자는 대금의 지급을 약속하는 한편 수출자는 이에 응하여 물품의 인도를 약 속한다는 점에서 무역계약은 무상계약과 반대되는 유상계약적 성격을 갖는다.","무역계약은 당사자 사이의 청약과 승낙의 합의만으로 성립되는 쌍무계약이다."],"answer":4},{"section":"무역계약","num":10,"stem":"10. Vienna Convention(1980)이 적용되는 청약과 승낙에 관한 설명으로 잘못된 것은?","choices":["청약은 특정한 1인에게만 행해져야 하며 다수의 특정한 자를 상대로 하는 계약 체결의 제의는 청약으로 볼 수 없다.","청약하는 경우 거래목적물, 수량, 가격은 반드시 정해져야만 내용이 충분히 확정 적이라고 할 수 있다. 이 3가지 이외의 내용은 정해져 있지 않더라도 청약이 될 수 있다.","주문하지도 않은 물품을 보내면서 반송하지 않으면 승낙으로 인정하겠다는 청약 에 대해 피청약자가 침묵하거나 반송하지 않더라도 승낙이 되지 않는다.","관행적으로 청약에 대한 승낙의 의사표시 없이 피청약자가 물품의 발송, 대금 지 급 등 청약의 조건을 이행하는 경우, 이런 행위만으로 승낙의 효력이 발생할 수 있다."],"answer":1},{"section":"무역계약","num":11,"stem":"11. 청약서 내용 중 “Offer subject to being unsold”는 어떤 의미인가?","choices":["피청약자의 승낙만으로는 계약이 성립되지 않고 청약자의 최종 확인이 있어야 매매계약이 성립되는 것","Offer와 함께 제품을 발송해 거래 상대방이 이를 점검해본 후에 구매의사가 있으 면 대금을 지급하고, 그렇지 않으면 반품토록 하는 것","Offer가 승낙되었어도 그 당시에 제품의 재고가 있어야 계약이 성립되는 것","팔리지 않는 재고품을 매우 저렴하게 팔겠다는 의미가 있는 청약"],"answer":3},{"section":"무역계약","num":12,"stem":"12. 청약의 효력소멸에 관한 설명으로 올바른 것은?","choices":["청약조건 중 분쟁 해결을 위해 일부 조건을 바꿔 승낙하는 것은 실질적인 변경 으로 볼 수 없으므로 청약의 효력은 소멸하지 않는다.","청약조건에 이의를 제기하기 위해서는 구두로 제시하고, 조건 변경을 위해서는 서면신청 절차를 거쳐야 청약의 효력이 유지된다.","청약에 대해 가격, 수량 등의 조건을 변경해 승낙하더라도 기존 청약의 효력은 유지되므로 수출업자는 기존 청약에 적합한 물품을 선적해야 한다.","청약이 취소 불능일 경우에도, 청약에 대한 거절통지서가 청약자에게 도달한 때 에는 해당 청약은 효력을 상실한다."],"answer":4},{"section":"무역계약","num":13,"stem":"13. 냉동 어류의 무역계약 체결을 위해 고려해야 할 사항 중에 옳은 것으로만 묶인 것은?","choices":["A, B","A, C, D","B, C, D","A, B, C, D"],"answer":1},{"section":"무역계약","num":14,"stem":"14. 무역 운송 중 상품 품질의 변질에 대한 책임과 관련해 책임 소재가 다른 조건은?","choices":["Tale Quale Term","곡물류 거래","선적품질조건","수출자가 운송 도중의 변질을 책임지는 조건 A. 물품의 품질조건은 도착지에서 검사할 때 이상이 없는 물품을 제공하기로 약정할 수 있다. B. 적하보험 가입 시 화물의 특수성을 고려해 특별약관으로 냉동기관약관에 가입할 수 있다. C. 물품의 중량은 kg, pound, ton, yard 등으로 표기해 계약을 체결할 수 있다. D. 선적지의 최종 검사 당시를 품질결정시기로 보는 경우, 원산지증명서를 제공하면 운송 중 변질이 일어나도 수출자는 면책될 수 있다."],"answer":4},{"section":"무역계약","num":15,"stem":"15. 무역계약의 포장조건에 관해 상호 협상할 때 고려사항이 아닌 것은?","choices":["포장단위","Packing Credit","Shipping Mark","포장 재질"],"answer":2},{"section":"무역계약","num":16,"stem":"16. 무역계약의 선적조건과 결제조건에 관한 설명 중 올바른 것은?","choices":["화환신용장이 환적을 금지하고 화환신용장에 선적항이 부산항으로 기재된 경우, 인천에서 선적된 화물을 부산항에서 환적했다면 선박으로 운송했기 때문에 환적 으로 간주한다.","CAD는 Cash against Document의 준말로 Document against Acceptance의 약자인 D/A와 동일하게 환어음을 포함한 서류와 대금을 맞교환하는 조건이다.","분할선적이 금지된 화환신용장하에서도 선적일이 다른 2개 이상의 선하증권이 제시되었을 때 수리되는 경우가 있다. 해당 조건은 선박명, 항해번호, 목적항이 동일한 경우이다.","무역계약 시 대금 지급 조건은 한 가지 방법으로만 약정해야 하며 T/T와 L/C, Sight와 Usance L/C 등 두 가지 이상의 방법으로 혼합해 약정할 수는 없다."],"answer":3},{"section":"무역계약","num":17,"stem":"17. 무역계약에 관한 설명 중 잘못된 것으로만 묶인 것은? A. 개별계약은 동일한 상대방과 동일한 품목을 반복적으로 거래할 때 주로 체결된다. B. 포괄계약은 중장기 연불방식의 수출입 등 거래내용이 복잡할 때 주로 사용된다. C. 일반거래조건은 미리 작성된 정형화된 계약조건을 말하며, 통상 계약서상 표제로 ‘General terms \u0026 conditions’라고 쓴다. D. 계약을 위한 청약 단계에서는 일반적으로 수량, 단가, 납기 등의 조항 외에 품질결정 시기, 계약위반에 대한 통지기한, 손해배상액 산정방법 등 모든 사항을 기재해 이를 상대방이 승낙하면 바로 계약서에 명시될 수 있도록 해야 한다. E. MOU나 LOI라는 제목의 합의서라도 그 내용에 따라서는 당사자들에게 법적 구속력 이 있을 수 있다.","choices":["A, B, D","A, C, E","B, C, D","B, D, E"],"answer":1},{"section":"무역계약","num":18,"stem":"18. 다음 일반거래조건약정서(Agreement on General Terms Conditions of Business)와 관련이 깊은 계약조건은? If any one or more of the provisions in this contract shall be declared invalid, illegal or unenforceable in any respect under any governing law, by any arbitration or by court of competent jurisdiction, the validity, legality, and enforceability of the remaining provisions contained herein shall not in any way be affected or impaired.","choices":["Infringement clause","Severability clause","Liquidated damages clause","Non-waiver clause"],"answer":2},{"section":"무역계약","num":19,"stem":"19. 마켓클레임에 관한 설명으로 올바른 것을 모두 기재한 것은? A. 마켓클레임은 매수인의 고의적 클레임이므로 매도인은 대응하지 않고 무시하는 것이 최선의 방안이다. B. 매도인은 계약 체결 전 매수인의 신용을 조회하고, 견본거래에서 견본용어를 정확히 사용함으로써 어느 정도 피해 예방이 가능하다. C. 견본거래에서 매도인은 매수인에게 제공한 것과 동일한 품질의 견본을 반드시 보관 해 매수인이 계약물품과 견본의 품질 불일치로 제기하는 클레임에 대비해야 한다. D. 견본조건은 비규격품보다 초정밀 완전규격품 거래에서 품질 관련 마켓클레임이 자주 발생할 수 있어 매도인은 반드시 “as per the sample”과 같은 표현을 써야 한다. E. 클레임 조항에 공인검사기관의 검사증명서 등 증명자료를 명시해 매수인이 클레임을 제기할 때 이를 제시토록 규정한다.","choices":["A, B, E","A, C, E","B, C, D","B, C, E"],"answer":4},{"section":"무역계약","num":20,"stem":"20. 상사중재에 관한 설명으로 올바른 것은?","choices":["중재합의의 실효성 확보를 위해서는 중재지, 중재기관, 준거법, 중재인이 중재조 항 속에 포함되어 있어야 한다.","중재합의가 있다 하더라도 중재와는 별도로 상대방이 법원에 소송을 제기할 경 우, 법원은 이를 각하할 수 없다.","상사중재의 주요한 특징은 전문가에 의한 판단, 단심제, 신속한 분쟁해결, 중재절 차의 공개, 외국에서의 강제집행 가능, 저렴한 비용을 들 수 있다.","중재합의의 형식적 성립요건은 서면주의이다. 즉, 중재계약은 구두로는 불가능하 고 반드시 문서에 의해야 한다."],"answer":4},{"section":"무역계약","num":21,"stem":"21. 무역계약의 이행 및 분쟁의 해결에 관한 설명 중 잘못된 것은?","choices":["매수인이 물품을 인수한 당시와 실질적으로 동등한 상태로 그 물품을 반환할 수 없게 된 경우, 매수인의 대체품인도청구권은 상실되나 계약해제권은 상실되지 않 는다.","UCP 600이 적용되는 화환신용장상에서 분할선적 금지의 문구가 없다면, 분할선 적은 허용된다.","Vienna Convention(1980)에서는 청약과 승낙의 효력 발생시기에 대해 사용한 운 송수단을 구분하지 않고 모두 도달주의를 택하고 있다.","신용장 금액이나 신용장에서 표시된 수량 또는 단가와 관련해 사용된 \"about” 혹은 \"approximately”라는 단어는 해당 금액, 수량, 단가의 10%를 초과하지 않 는 범위 안에서 과부족을 허용하는 것으로 해석된다."],"answer":1},{"section":"무역계약","num":22,"stem":"22. 다음 상황에서 매수인의 클레임을 예방하고 대응하기 위한 매도인의 위험관리방 안으로 옳은 것을 모두 기재한 것은? 가. 의류 수출 초보기업인 A사는 자신보다 우월한 위치에 있는 B사와 매매계약을 체결했 다. B사는 다른 수출자들의 조건을 열거하면서 더 좋은 조건으로 물품을 공급하지 않 을 경우, 계약을 체결할 수 없다며 강압적 태도를 보였다. A사는 O/A 90 Days 등 중요 한 계약조건을 B사에 유리하게 제안했다. 나. A사는 거래목적물, 수량, 가격 등 아주 기초적인 조건만 기재된 청약서를 이메일로 발 송했고, 이에 B사는 청약서와 동일한 내용의 Purchase Order를 이메일로 보냈다. 다. A사는 정상적으로 의류를 납품했으나 B사는 만기일에 결제하지 않았다. 라. A사의 결제독촉에 대해 B사는 납품된 물품이 주문한 제품과 색상, 크기 등에서 하자 가 있다며 대금지급을 거절했다. A. 청약서 및 승낙서에 매도인과 매수인의 합의서명 B. 신용조회를 하고 필요한 경우 수출보험 가입 C. 계약서에 비밀유지조항과 완전합의조항 기재 D. 계약서에 품질조항과 클레임조항 기재 E. 중재 등 분쟁해결방안에 대한 구두 또는 서면합의","choices":["A, B, E","A, B, C","B, D","B, E"],"answer":3},{"section":"무역계약","num":23,"stem":"23. Surrendered B/L에 관한 설명 중 잘못된 것은?","choices":["‘Surrender’란 송하인이 원본 선하증권을 받을 권리를 포기한다는 의미이다.","운송기간이 짧은 구간에서 주로 사용하며, 원본 선하증권 없이 “Surrendered” 가 기재된 선하증권 사본 제시만으로 D/O를 발급받을 수 있다.","무신용장 거래에서 주로 사용한다.","원본 선하증권이 발급된 이후에는 어떠한 경우라도 Surrendered B/L을 발급받을 수 없다."],"answer":4},{"section":"무역계약","num":24,"stem":"24. 다음 중 ( ) 안에 적합한 내용이 순서대로 나열된 것은? ( )은(는) 해상 운송계약의 증빙서류이자 화물의 수령증으로서 기명식으로 발 행되며 도착지에서 물품의 신속한 인도를 위해 원본 서류의 제시가 필요 없는 비유통성 서류이다. ( )은(는) 신용장 거래에서 화물이 목적지에 먼저 도착하고 원본 B/L이 늦게 도착하는 경우, 개설은행과 수입업자가 연대 서명해 발행하는 것으로, 이를 선박회사에 제출하면 수입자는 원본 선하증권의 제시 없이 D/O를 발급받을 수 있다.","choices":["Non-negotiable B/L, T/R","Sea Waybill, Surrendered B/L","L/I, Non-negotiable B/L","Sea Waybill, L/G"],"answer":4},{"section":"무역계약","num":25,"stem":"25. 선하증권의 종류별 내용을 설명한 것 중 잘못된 것은?","choices":["운송인은 수출자가 제공하는 L/G만 있으면, 추후 화물의 하자 및 기타 운송서류 의 불일치로 인한 책임에서 면제된다.","삼국간무역에서 선적지에서 발행한 선하증권의 원본을 모두 회수하고 새로운 선 하증권을 발행받는 경우, Switch B/L이라고 한다.","해상운송에서 발행하는 포워더 B/L은 House B/L, 항공운송의 경우는 House Air Waybill이라 한다.","Third party B/L은 수출입거래의 매매당사자가 아닌 제3자가 B/L상의 송하인이 되 는 경우의 B/L을 의미하며, 제3자 선하증권이라 한다."],"answer":1},{"section":"무역계약","num":26,"stem":"26. 해상운송 물류비용에 관한 내용 중 올바른 것은?","choices":["해상운임은 항공운송과 동일하게 세계국제물류협회(FIATA)에서 결정해 선사별로 tariff를 작성, 각 국가의 국제물류협회에 통보하고 있다.","해상운임은 산정 기준에 따라 Berth term, FIO, FI, FO 등으로 분류된다.","부정기선 운임은 운송 시기 및 기간에 따라 spot운임, 선물운임, 연속항해운임, 장기계약운임 등으로 나뉜다.","부정기선 운임에서 dead freight는 화물의 개수, 중량, 용적에 관계 없이 항해 또 는 선복을 기준으로 일괄계산하는 운임이다."],"answer":3},{"section":"무역계약","num":27,"stem":"27. 적하보험 계약과 Incoterms 2020 규칙 중 올바른 것을 모두 기재한 것은? A. Incoterms 2020에 보험 가입에 관해 따로 규정이 없고 매도인과 매수인 간에 보험 가입에 대한 별도 약정이 없다면, 운송 중 멸실이나 훼손 위험을 부담해야 하는 주체가 자신의 이름으로 계약을 체결할 수 있다. B. Cost \u0026 Freight 조건에서 매도인이 자신의 판단하에 가입한다. C. Carriage Insurance Paid To 조건에서 Incoterms 2020에 따라 매도인이 보험에 가 입해야 한다. D. 보험계약자나 피보험자를 영어로는 모두 ‘the Assured or the Insured’라고 한다. E. Free Carrier 조건에서 매수인이 보험에 반드시 가입해야 한다.","choices":["A, B, D","A, C, D","B, C","D, E"],"answer":2},{"section":"무역계약","num":28,"stem":"28. ICC(A)-1/1/82에서 규정하고 있는 면책위험 중 잘못된 것은?","choices":["고의성이 없는 도착 지연과 관련된 손실","원자핵 무기에 의한 멸실","화재 또는 폭발로 인한 재산상 손해","물품 고유의 하자 및 성질에 의한 경제적 손해"],"answer":3},{"section":"무역계약","num":29,"stem":"29. 해상보험에서 적하보험 부가조건에 해당하지 않는 것은?","choices":["Theft, Pilferage and Non-delivery","Rain \u0026 Fresh Water Damage","Contact with Oil \u0026 Other Cargo","Refrigerating machinery clause"],"answer":4},{"section":"무역계약","num":30,"stem":"30. 운송클레임에 관한 설명 중 잘못된 것은?","choices":["운송클레임은 운송인이 운송계약의 전부를 불이행할 때 발생하는 운송화물의 손 상, 멸실, 지연 등에 대해 하주가 운송인에게 배상을 청구하는 것이다.","통상 수입지에서 선하증권으로 화물을 인수하는 수하인이 클레임을 제기하지만, 수하인이 적하보험에 가입한 경우 수하인의 배상청구권을 대위(subrogation) 받은 보험회사가 클레임을 제기하기도 한다.","운송클레임은 항공운송보다는 주로 해상운송 구간에서 많이 발생한다.","운송클레임 해결을 위해 필요한 서류는 손해배상청구서, 송장, Survey Report, 운 송서류 사본 등이다."],"answer":1},{"section":"무역영어","num":1,"stem":"다음 중 청약의 종류가 다른 하나는?","choices":["We would like to make an offer subject to the availability of the goods when the order is received","We are pleased to make an offer for the goods below stated according to market fluctuation","We have the pleasure of making an offer for the following goods without engagement","We are offering you the following terms and conditions, and it is effective until the end of July"],"answer":4},{"section":"무역영어","num":2,"stem":"2. 서신의 내용에 관한 설명으로 올바른 것은?","choices":["The seller will send the products until July 31, 2024 after the issuance of L/C","The payment will be made in 30 days after the presentation of shipping documents","This offer should be accepted no later than July 2024 for a valid conclusion of the contract","The seller can procure an insurance on ICC(C) for the insured amount of USD220,000"],"answer":3},{"section":"무역영어","num":3,"stem":"3. 피청약자의 대응청약에 들어갈 내용으로 적절하지 않은 것은?","choices":["If you make the shipment within 2 weeks after you receive the letter of credit, your offer will be competitive","We will be able to work on this business if you can decrease your price by 15% each, which is not competitive here","Instead of a sight L/C, we are pretty much interested in doing business by an usance L/C this time","We request you to draw a sight draft on the issuing bank"],"answer":4},{"section":"무역영어","num":4,"stem":"4. 다음은 CISG(1980) 제14조 규정의 일부이다. 밑줄 친 부분의 충족 여부를 판단하 기 위해 주어진 청약서 (A)∼(D) 중에서 참고해야 하는 것은? Article 14. (1) A proposal for concluding a contract addressed to one or more specific persons constitutes an offer if it is sufficiently definite and indicates the intention of the offeror to be bound in case of acceptance. Dear Mr. Lee: Thank you for your fax of July 4. (A) We are pleased to offer the articles mentioned below as per the conditions and details described hereunder: Article: Blue jeans(Item No. 101) Quantity: 1,000pcs Price: US$35/pc, CIF New York (B) Shipment: During September 2024 Payment: Draft at sight under an Irrevocable L/C (C) Validity: July 31, 2024. (D) In view of the recent rush of orders from Europe for this article, we would advise you to make a purchase soon. We look forward to your favorable reply by fax. Yours sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":3},{"section":"무역영어","num":5,"stem":"5. CISG(1980)의 규정에 근거해 유효한 계약이 성립되는 사례를 모두 기재한 것은? A. A statement made by the offeree indicating assent to an offer without engagement B. A conduct of the offeree indicating assent to a firm offer C. A positive reply to an invitation to an offer expressing an intention of agreement for terms D. A reply to an offer which purports to an acceptance containing immaterial modification terms","choices":["A","B, C","B, D","D"],"answer":3},{"section":"무역영어","num":6,"stem":"6. 주문서의 내용 중 밑줄 친 부분(A)에 관한 설명이 잘못된 것은? Goods: Ladies Leather Jacket (Style No. 1518PM) Price: USD625.000 (A) DPU Incheon CY Quantity: 2,500pcs Packing: Hanging container Shipment: By March 30, 2023 Payment: Under an irrevocable sight L/C","choices":["The seller’s responsibility and risk extend into Incheon port up until the shipment is unloaded","The seller should pay for unloading and take all responsibility for charges after unloading, including demurrage charges at Incheon CY","The seller should arrange for someone to handle the goods for unloading at Incheon port","The seller should pay the costs of necessary checking operations that are for loading the goods"],"answer":2},{"section":"무역영어","num":7,"stem":"다음 중 빈칸(A～C)에 들어갈 정형거래조건이 올바르게 짝지어진 것은?","choices":["A: EXW  B: CPT  C: DAP","A: FCA  B: CPT  C: DDP","A: FOB  B: CFR  C: DPU","A: EXW  B: FCA  C: DPU"],"answer":1},{"section":"무역영어","num":8,"stem":"8. 다음은 무역계약의 어떤 문제를 설명하고 있는가? When the parties exchange printed forms that differ on certain terms, the question arises of which form prevails, the seller's or the buyer's? The CISG rules that a buyer's acceptance that differs materially(e.g., on a key point such as price, quantity, or delivery date) from the seller's offer amounts to a rejection and counter-offer, which the seller must expressly accept. If the buyer's acceptance only differs on points that are not material, then the acceptance is deemed to form a valid contract unless the seller objects. Ultimately, the easiest option is to try always to be the one who \"fires the last shot\".","choices":["Battle of the forms","Remunerative contract","Transfer of property","Bilateral contract A B C"],"answer":1},{"section":"무역영어","num":9,"stem":"9. 다음 무역계약서 내용 중 올바른 것은? Origin: Republic of Korea Packing: Export Standard Packing Shipment: Until April 25, 2024 Payment: By an irrevocable at 60 days after sight L/C in our favor Remark: Minimum order requirement – 1,000pcs above per item Description Quantity Unit Price Amount Make-up Base 30gr Mascara 5ml 1,000pcs 1,000pcs CIP New York USD10.00 USD10.00 USD10,000.00 USD10,000.00 * The latest version of Incoterms will be applied.","choices":["According to UCP 600, a usance bill of exchange should be drawn on the applicant","According to UCP 600, the shipping document issued on April 25, 2024 will not be accepted","A full set of negotiable bills of lading should be issued and marked freight payable at destination","The quality and quantity of the goods will be examined and confirmed when the goods are handed over to the first carrier"],"answer":4},{"section":"무역영어","num":10,"stem":"10. 일반거래조건협정서의 내용에 관한 설명으로 올바른 것은? Article 7. Inspection Should any specific inspector be designated by the Buyer, all additional charges incurred thereby shall be borne by the Buyer and shall be added to the invoice amount. Article 8. Payment Payment of the price and of any other sums due by the buyer to the seller shall be on open account and time of payment shall be 30 days from the date of invoice. Article 9. Claims Any claim by the Buyer of whatever nature arising under this Sales Contract shall be made by e-mail within 10 days after arrival of the Goods at the destination. Full particulars of such claim shall be made in writing, and forwarded by registered mail to the Seller within 15 days after e-mailing.","choices":["When the Buyer nominates a specific inspector, the cost incurred for inspection should be paid by the Buyer","Any claim regarding the quality of the goods should be made within 10 days after the Buyer discovers any defect in quality","The Buyer should pay within 30 days after the order is placed","When the Buyer makes a claim for defect of the goods, he/she informs it to the seller by either e-mail or register ct, even if any reference whatsoever to it is included in the credit. Consequently, the undertaking of a bank to honour, to negotiate or to fulfil any other obligation under the credit is not subject to claims or defences by the applicant resulting from its relationships with the issuing bank or the beneficiary.","choices":["Principle of independence","Principle of abstraction","Principle of strict compliance","Principle of substantial compliance"],"answer":1},{"section":"무역영어","num":15,"stem":"15. 화환신용장(A∼C)의 종류를 올바르게 짝지은 것은? A: This credit intends to assist the exporter in the production or procurement of the goods contracted. The credit is payable at a time prior to the shipment of the goods and against a document other than a transport document. B: This credit involves two letters of credit used together to finance a transaction. The first letter of credit serves as a collateral one for the second letter of credit. These credits are usually used in a transaction involving an intermediary between the buyer and seller. C: This credit is a commercial one that provides that the beneficiary will be paid, not at the time the beneficiary makes a complying presentation, but at a later, specified, maturity date. A B C","choices":["Reimbursement L/C Stand-by L/C Transferable L/C","Packing L/C Back-to-back L/C Deferred payment L/C","Local L/C Revolving L/C Acceptance L/C","Advance payment L/C Usance L/C Confirmed L/C"],"answer":2},{"section":"무역영어","num":16,"stem":"16. 추심결제 방식의 거래당사자에 관한 설명 중 빈칸(A～C)에 들어갈 당사자의 명칭 으로 올바르게 짝지은 것은? ( A ) is also called as the drawer because he issues the bill of exchange. ( B ) is the bank which receives the documents from ( A ), on which basis the payment can be demanded, and this bank is instructed by the seller that those documents are released to the buyer on the condition that the buyer pays or accepts the bill of exchange. ( C ) is the bank in the country of the buyer, which acts as the agent of ( B ) and receives the money from the buyer after the documents are handed over to the buyer and then transfers the money to the seller via ( B ). A B C","choices":["The principal The remitting bank The collecting bank","The applicant The collecting bank The remitting bank","The principal The collecting bank The remitting bank","The applicant The remitting bank The collecting bank"],"answer":1},{"section":"무역영어","num":17,"stem":"17. 국제결제에 관한 설명이 올바른 것은?","choices":["In documentary collection, the collecting bank is obligated to guarantee payment and handle collection instructions or subsequent related instructions","Open account is a very low-risk option for sellers, as the buyer’s bank assumes liability to pay if their customer fails or is unable to pay when payment is due","Under demand guarantee, the guarantor must pay on first demand by the beneficiary and there is no need to prove that the applicant has actually defaulted on a contractual obligation","In Korea, factoring without recourse is preferred to factoring with recourse because factors hesitate to assume the credit risk of customers. Accordingly, the factor may claim the amount of unpaid receivables from its client"],"answer":3},{"section":"무역영어","num":18,"stem":"18. 무역운송에 관한 설명으로 잘못된 것은?","choices":["House B/L is a non-negotiable document and is accepted in a similar manner as any other B/L","Dispatch on more than one aircraft is a partial shipment, even if each aircraft leaves on the same day for the same destination","In the demise charter, the charterer hires a vessel whereby no administration or technical maintenance is included as part of the agreement and pays for all operating expenses","Dead freight is an amount a shipper needs to pay, when the shipper does not utilize the space he or she has reserved on a truck or a vessel"],"answer":1},{"section":"무역영어","num":19,"stem":"19. 적하보험에 관한 설명으로 빈칸(A∼D)에 들어갈 당사자 명칭이 올바르게 짝지 어진 것은? ( A ) is a company who, through a contractual agreement, undertakes to compensate specified losses, liability, o livery. (C) But, \nthe previously revised offer is the best price we can offer at present since the high \nquality of our goods cannot be maintained at lower prices.\n(D) In fact, our revised price is closely calculated, and we shall not be able to make \nany further price reduction in spite of our eagerness to do business with you.\nWe trust you will accept it without delay.\nYours very truly,","choices":["(A)","(B)","(C)","(D)"],"answer":2},{"section":"무역영어","num":29,"stem":"29. 위 서신에 대해 승낙을 의도하는 회신에 들어갈 문장으로 적절하지 않은 것은?\n\n[지문]\nDear Mr. Jin,\nWe have the pleasure of acknowledging your letter of May 21, 2023, requesting us \nto quote the most favorable price on Anion Lamps.\n(A) We regret that our prices were not low enough to meet your requirements. (B) \nUnfortunately, we are unable to quote you any more, as we have no stock of the\ngoods referred to, neither can we tell you how soon we can make delivery. (C) But, \nthe previously revised offer is the best price we can offer at present since the high \nquality of our goods cannot be maintained at lower prices.\n(D) In fact, our revised price is closely calculated, and we shall not be able to make \nany further price reduction in spite of our eagerness to do business with you.\nWe trust you will accept it without delay.\nYours very truly,","choices":["In view of the price ruling in this market, your price is rather stiff, and your competitors are offering lower prices than yours","We accept and confirm your counter offer of May 24, 2023 to realize the first transaction with you","We will instruct our bank to issue a letter of credit","It would give us great pleasure to do business with you at this time"],"answer":1},{"section":"무역영어","num":30,"stem":"30. 다음 문장을 영작한 것 중 잘못된 것은?","choices":["우리의 검사에 따르면 제품의 손상은 적절치 못한 포장 때문이며, 다음 주문에서 는 개선이 되어야 할 것입니다. ⇒ According to our inspection, the damage to the item was caused by improper packaging and should be addressed in the next order","CIF 조건이기에 우리가 보험료를 부담하지만 물품이 선박에 var _D59=[{"section":"무역규범","num":1,"stem":"1. 송금결제 방식에 대한 설명으로 올바른 것은?","choices":["수출자 입장에서 수출대금을 지급받지 못할 위험이 있는 O/A 방식의 경우, 한국무역 보험공사의 수출보험에 가입함으로써 위험에 대응할 수 있다.","CAD 방식에서 수출자의 수출채권이 성립하는 시점은 물품 선적 후 선적통지를 하는 시점이다.","BWT 방식은 사전송금 방식에 해당한다.","사전송금 방식의 거래에서 수출자는 수입자에게 Advance Payment Guarantee의 발행 을 요구해 상업위험을 관리할 수 있다."],"answer":3},{"section":"무역규범","num":2,"stem":"2. O/A 방식의 특징에 관한 설명으로 잘못된 것은?","choices":["O/A 방식 거래는 신용장 방식 거래에 비해 은행수수료가 저렴하다는 장점이 있다.","수출자는 수입자 거래은행과 O/A nego를 통해 수출대금을 조기에 회수한다.","수출자 입장에서 O/A 방식 거래가 신용장 방식 거래에 비해 신용위험이 일반적으로 더 크다.","O/A 방식 거래에는 신용장통일규칙이나 추심에 관한 통일규칙과 같이 적용할 수 있는 국제규칙이 없다."],"answer":2},{"section":"무역규범","num":3,"stem":"3. 대외무역법령상 수출입 승인의 면제 대상에 해당하지 않는 것은?","choices":["긴급히 처리해야 하는 물품 등으로서 정상적인 수출입 절차를 밟아 수출․수입하기에 적합하지 않은 물품","항공 관련 품목의 안전관리에 관한 사항의 이행을 위해 필요하다고 인정된 물품","주된 사업 목적을 달성하기 위해 부수적으로 수출․수입하는 물품","해외이주자가 해외 이주를 위해 반출하는 원자재, 시설재 및 장비로서 외교부 장관이"],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령상 수출실적의 인정범위, 인정금액, 인정시점 등에 관한 설명으로 올바른 것은?","choices":["북한으로의 유상이 아닌 무상반출도 수출실적 인정범위에 해당한다.","중계무역은 수출금액(CIF 가격)에서 수입금액(FOB 가격)을 공제한 가득액을 수출실적 의 인정금액으로 한다.","수출통관이 이루어지지 않는 용역 또는 전자적 형태의 무체물의 수출실적 인정시점은 외국환은행 입금일이다.","수출신고필증에 재반입조건이 기재된 해외건설공사에 직접 사용되는 원료․기재, 공사 용 장비 또는 기계류의 수출은 수출실적의 인정범위에 해당한다."],"answer":3},{"section":"무역규범","num":5,"stem":"5. 대외무역법령상 외화획득의 범위에 해당하는 것은?","choices":["외국인으로부터 원화(KRW)를 받고 국내의 보세지역에 물품을 공급하는 경우","외국인과 임대차계약을 맺은 국내업체에 외화획득용 시설·기재를 인도하면서 외국 인으로부터 원화(KRW)를 받는 경우","정부투자기관이 외국으로부터 받은 차관자금에 의한 국제경쟁입찰에 따라 국내에서 결제통화의 종류를 불문하고 유상으로 물품을 공급하는 경우","절충교역거래의 보완거래로서 무상으로 국내에서 제조된 물품 등을 국가기관에 공급"],"answer":3},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에 따른 전략물자의 수출입에 관한 설명으로 올바른 것은?","choices":["전략물자에 해당하지 않아도 대량파괴무기와 그 운반수단인 미사일, 재래식 무기의 제 조․개발․사용 또는 보관 등의 용도로 전용 가능성이 큰 물품 등을 수출하려는 자는 해 당 물품의 수입자에게 대량파괴무기의 제조․개발 용도로 전용할 의도가 있음을 알았을 경우, 산업통상자원부 장관의 허가를 받아야 한다.","전략물자 판정에 관한 서류의 보관기간은 10년이다.","전략물자의 수출허가, 상황허가, 경유 또는 환적허가, 중개허가의 유효기간은 5년이다.","국제수출통제체제에서 정하는 물품의 제조․개발 또는 사용 등에 관한 기술로서 산업 통상자원부 장관이 관계 행정기관의 장과 협의해 고시하는 기술은 일반에 공개되거 나 기초과학연구에 관한 기술일지라도 수출허가를 받아야 한다."],"answer":1},{"section":"무역규범","num":7,"stem":"7. 대외무역법령상 수출입 물품의 원산지 표시 방법과 원칙에 관한 설명으로 잘못된 것은?","choices":["원산지 표시는 한글․한문 또는 영문으로 최종 구매자가 쉽게 판독할 수 있는 활자체로 해당 물품에 해야 한다.","수입한 물품을 국내에서 단순가공해 수출하는 경우에 원산지를 “한국산”으로 표시 해도 된다.","무역거래자 또는 물품 등의 판매업자는 원산지를 거짓으로 표시하거나 원산지를 오인 하게 만드는 표시를 하는 행위, 원산지 표시 대상 물품에 원산지 표시를 하지 않는 행 위를 해서는 안 된다.","산업통상자원부 장관 또는 시․도지사는 원산지 표시 규정을 위반한 자에게 판매중지, 원상복구, 원산지 표시 등 대통령령으로 정하는 시정조치를 명할 수 있다."],"answer":2},{"section":"무역규범","num":8,"stem":"8. 대외무역법령상 원산지의 표시 등에 관한 설명으로 올바르지 못한 것은?","choices":["원산지규정의 3대 요소는 원산지 판정, 원산지 확인, 원산지 표시이다. 이 중에서 원산 지 표시는 대외무역법에 관세법 및 다른 법령에 비해서 자세하게 규정되어 있다.","원산지 표시는 “원산지: 국명”, “국명 산(産)”, “Made in 국명”, “Made by 제조자의 회사 명, 주소, 국명” 등으로 표시할 수 있다.","원산지 표시 위반에 대해 위반행위의 종류와 정도에 따라서 징역형, 벌금, 과징금, 표 시위반자의 공표 등의 벌칙을 받을 수 있다.","원산지 표시제도는 소비자뿐만 아니라 생산자를 보호하기 위한 제도이므로 모든 수입 물품과 수출물품 자체에 원산지를 표시해야 한다."],"answer":4},{"section":"무역규범","num":9,"stem":"9. 대외무역법령상 수입수량 제한조치에 관한 설명으로 잘못된 것은?","choices":["수입 급증에 따른 국내 산업의 피해를 구제하기 위한 세이프가드(safeguard)조치의 일 환으로 수입수량 제한조치를 대외무역법에서 규정하고 있다.","산업통상자원부 장관이 수입수량을 제한하는 경우, 제한 수량은 최근의 대표적인 3년 간의 수입량을 연평균수입량으로 환산한 수량 이상으로 해야 한다.","정부는 수입수량 제한조치를 시행하기 위해 이해 당사국과 해당 조치의 부정적 효과 에 대한 적절한 무역보상을 놓고 협의해서는 안 된다.","수입수량 제한조치는 조치 시행일 이후 수입되는 물품에만 적용한다."],"answer":3},{"section":"무역규범","num":10,"stem":"10. 대외무역법령상 구매확인서의 발급에 관한 설명으로 올바른 것은?","choices":["구매확인서를 발급한 후 신청 첨부서류의 외화획득용 원료․기재의 내용 변경 등으로 이미 발급받은 구매확인서와 내용이 상이한 경우에는 재발급할 수 없다.","구매확인서 발급자는 발급된 구매확인서를 근거로 2차 구매확인서를 발급할 수 있으 며, 외화획득용 원료․기재의 제조․가공․유통 과정이 여러 단계일 경우에는 단 한 차례만 발급할 수 있다.","국내에서 외화획득용 원료․기재를 구매하려는 자나 구매한 자는 한국은행 총재 또는 전자무역기반사업자에게 구매확인서의 발급을 신청할 수 있다.","구매확인서를 발급받으려는 자가 전산설비를 갖추지 못했거나 기타 부득이한 사유로 전자문서를 작성하지 못하는 때에는 전자무역기반사업자에게 신청을 위탁할 수 있다."],"answer":4},{"section":"무역규범","num":11,"stem":"11. 관세법령 및 협정에서 규정하고 있는 품목분류체계 및 심사신청에 관한 설명으로 올바 른 것은?","choices":["HS코드는 HS협약에 의해 수출입 물품에 부여되는 상품분류 코드로서 국제적으로 4단 위 소호까지는 공통적으로 사용한다. 5단위부터는 각국에서 세분해 사용할 수 있는데 우리나라는 현재 8단위(HSK)로 운용 중이다.","수출입신고 전에 대통령령으로 정하는 서류를 갖추어 관세청장에게 해당 물품에 적용 될 별표 관세율표 또는 품목분류표상 품목분류의 사전심사를 신청할 수 있다.","HS 품목분류의 법적 구속력이 있는 것은 통칙뿐이며 주의 규정, 호와 소호의 용어는 권고사항이다.","품목분류 사전심사를 신청받은 관세청장은 해당 물품에 적용될 품목분류를 심사해 대통령령으로 정하는 기간 안에 신청인에게 결과를 통지해야 한다. 결과통지를 받 은 신청인은 재심사를 신청할 수 없다."],"answer":2},{"section":"무역규범","num":12,"stem":"12. 관세법상 내국물품에 대한 개념으로 올바른 것을 모두 고른 것은? A. 우리나라에 있는 물품으로서 외국 물품이 아닌 것 B. 우리나라의 선박 등이 공해에서 채집하거나 포획한 수산물 등 C. 입항 전 수입 신고되었지만, 수리 전 물품 D. 수입신고 수리 전 반출승인을 받아 반출된 물품 E. 수입신고 전 즉시반출신고를 하고 반출된 물품","choices":["A, B","B, C, E","A, B, D, E","A, D, E"],"answer":3},{"section":"무역규범","num":13,"stem":"13. 관세법령상 신고서류의 작성 및 보관, 보관기간에 관한 내용으로 잘못된 것은?","choices":["수입신고필증 및 수입물품 가격결정에 관한 자료는 수입신고 수리일부터 5년 동안 보 관해야 한다.","지식재산권 거래에 관련된 계약서 또는 이에 갈음하는 서류는 해당 신고 수리일부터 3년 동안 보관해야 한다.","수출신고필증 및 반송신고필증은 해당 신고의 수리일부터 3년 동안 보관해야 한다.","장부 및 증거서류를 작성‧보관해야 하는 자는 해당 장부와 증거서류의 전부 또는 일부 를 정보처리시스템을 이용해 작성할 수 있다."],"answer":2},{"section":"무역규범","num":14,"stem":"14. ㈜KITA는 신속한 통관을 위해 ‘입항 전 수입신고’를 했다. 다음 중 관세법령상 해당 물 품에 적용되는 관세율이 확정되는 시기로 올바른 것은?","choices":["해당 물품이 선적되어 우리나라로 출발한 때","관세청에 적하목록을 제출한 때","납세의무자가 입항 전 수입신고를 한 때","해당 물품이 우리나라에 도착한 후 입항 전 수입신고가 수리된 때"],"answer":3},{"section":"무역규범","num":15,"stem":"15. 관세법상 납세의무의 소멸 사유에 해당하는 것을 모두 고른 것은? A. 관세 납부 B. 관세징수권의 소멸시효 완성 C. 납부고지 D. 통고처분 E. 관세부과 취소","choices":["A, C, E","A, B, E","B, D","C, D"],"answer":2},{"section":"무역규범","num":16,"stem":"16. 관세법상 과세가격의 결정을 위해 구매자가 실제로 지급했거나 지급해야 할 가격에서 공제되지 않고 가산해야 하는 금액은 어느 것인가? (단, 모든 금액은 객관적이고 수량 화할 수 있는 자료에 근거한다)","choices":["수입항까지의 운임‧보험료","해당 물품의 수입 후 건설, 설치, 조립, 정비, 유지 또는 기술지원에 필요한 비용","우리나라에서 해당 수입물품에 부과된 관세 등의 세금과 그 밖의 공과금","연불조건의 수입에서 해당 수입물품에 대한 연불이자"],"answer":1},{"section":"무역규범","num":17,"stem":"17. 관세법상 신고납부한 세액의 보정, 수정, 경정에 관한 설명으로 잘못된 것은?","choices":["납세의무자가 신고납부한 세액이 부족하다는 것을 알게 되었을 경우, 신고납부한 날부 터 6개월 안에 해당 세액의 보정을 세관장에게 신청할 수 있다.","납세의무자가 부족한 세액에 대한 보정을 신청하거나 수정 신고한 경우, 해당 신청 또 는 신고한 날의 다음날까지 해당 관세를 납부해야 한다.","납세의무자는 신고납부한 세액의 과다를 알게 되었을 경우, 최초로 납세신고를 한 날 부터 5년 안에 신고한 세액의 경정을 세관장에게 청구할 수 있다.","세관장은 경정 청구를 받은 날부터 3년 안에 세액을 경정하거나 경정해야 할 이유가 없다는 뜻을 청구한 자에게 통지해야 한다."],"answer":4},{"section":"무역규범","num":18,"stem":"18. 관세법상 조정관세를 부과할 수 있는 경우로 올바른 것을 모두 고른 것은? A. 수입 가격이 급등한 물품 또는 이를 원재료로 한 제품의 국내 가격을 안정시키기 위해 필요한 경우 B. 공중도덕 보호, 인간·동물·식물의 생명 및 건강 보호, 환경보전, 한정된 천연자원 보존 및 국제평화와 안전보장 등을 위해 필요한 경우 C. 유사물품 간에 현저히 불균형한 세율을 시정할 필요가 있는 경우 D. 농림축수산물 등 국제경쟁력이 취약한 물품의 수입 증가로 국내시장이 교란되거 나 산업기반이 붕괴될 우려가 있어 이를 시정하거나 방지할 필요가 있는 경우 E. 원활한 물자 수급 또는 산업의 경쟁력 강화를 위해 특정 물품의 수입을 촉진할 필 요가 있는 경우","choices":["A, B","B, D","C, D","D, E"],"answer":2},{"section":"무역규범","num":19,"stem":"19. ㈜KITA가 수입하는 물품의 과세가격(CIF 가격)은 2,000,000원이고, 관세율 적용에 필요 한 요건은 모두 충족되었다고 가정할 때, ㈜KITA가 납부해야 할 관세액은? A. 덤핑방지관세율: 15% B. 기본관세율: 8% C. FTA관세율: 2% D. 조정관세율: 5%","choices":["600,000원","340,000원","300,000원","40,000원"],"answer":2},{"section":"무역규범","num":20,"stem":"20. ㈜KITA는 미국 A사와 수입 계약을 체결하고, 견본(과세가격 미화 175달러)을 무상으로 받기로 했다. ㈜KITA의 견본에 대한 수입통관 방법 중에서 가장 정확한 설명은?","choices":["미국 A사가 보내는 견본은 무상거래이기 때문에 수입신고를 할 필요가 없다.","미국 A사의 발송 견본은 비록 무상이지만 수입신고를 해야 한다. 다만, 무상이므로 신 고가격은 미화 10달러 이내의 소액으로 한다.","미국 A사가 보내는 견본은 비록 무상이지만 과세가격 미화 175달러로 정확하게 수입 신고를 해야 한다. 다만, 무상이므로 관세율은 0%로 관세를 납부하지 않는다.","미국 A사의 발송 견본은 비록 무상이지만 과세가격인 미화 175달러로 정확하게 신고 해야 하며, 소액물품 등의 면세를 적용받아 관세가 면제된다."],"answer":4},{"section":"무역규범","num":21,"stem":"21. ㈜KITA는 베트남 A사로부터 물품을 수입해 국내 자사 창고에서 검수하는 과정에서 계 약 내용과 다르게 품질이 현저히 떨어짐을 확인했다. 이에 대해 ㈜KITA가 취할 수 있 는 통관 및 관세환급 방법에 관한 설명으로 잘못된 것은? (물품은 수입신고 당시의 성 질과 형태가 변경되지 않았다)","choices":["㈜KITA는 보세구역에 수입물품 전량을 반입했다가 다시 수출한 뒤 수입 시 납부한 관 세 전부를 환급받았다.","㈜KITA는 전수 검수 결과, 일부 물품만 계약 내용과 다른 것을 확인해 일부 물품만 보세구역에 반입한 후 다시 수출했다. 환급세액 산출에 지장이 없어 일부 수출물품에 해당하는 관세를 환급받았다.","㈜KITA는 물품이 계약 내용과 다름을 항의하고, 해당 물품을 전량 폐기하고 새로운 물품을 받기로 베트남 A사와 합의했다. 이에 ㈜KITA는 보세구역에 물품을 반입한 뒤 미리 세관장의 승인을 받아 폐기한 후 관세 전부를 환급받았다.","물품을 폐기할 때는 보세구역에 반입 기한 제한이 없지만, 나머지는 수입신고 수리일 로부터 2년 이내에 보세구역에 반입한 뒤 수출해야 관세를 환급받을 수 있다."],"answer":4},{"section":"무역규범","num":22,"stem":"22. 관세법령상 보세구역 중에서 영업용이 아닌 국가가 직접 운영하는 지정보세구역으로만 짝지어진 것은? A. 보세창고 B. 지정장치장 C. 보세전시장 D. 세관검사장 E. 종합보세구역 F. 특허보세구역 G. 보세공장 H. 보세판매장","choices":["A, G","C, H","B, D","E, F"],"answer":3},{"section":"무역규범","num":23,"stem":"23. 보세구역에서 할 수 있는 업무에 관한 설명으로 잘못된 것은?","choices":["보세구역에 장치된 물품은 그 현상을 유지하기 위해 필요한 보수작업과 그 성질을 변 하지 않게 하는 범위에서 포장을 바꾸거나 구분․분할․합병을 할 수 있다. 보수작업을 하려는 자는 세관장의 승인을 받아야 한다.","보세구역 장치 물품은 그 원형을 변경하거나 해체․절단 등의 작업을 할 수 있다. 이런 작업을 하려는 자는 세관장의 허가를 받아야 한다.","보세구역 장치 물품은 부패․손상되거나 그 밖의 사유로 인해 폐기할 수 있다. 이런 폐 기 작업을 하려는 자는 세관장의 허가나 승인 없이 할 수 있다.","보세구역에 장치된 외국물품의 전부 또는 일부를 견본품으로 반출할 수 있다. 견본품 을 반출하려는 자는 세관장의 허가를 받아야 한다."],"answer":3},{"section":"무역규범","num":24,"stem":"24. 관세법령상 수출입통관에 관한 설명으로 올바른 것은?","choices":["우편물(서신 제외)은 관세법 제226조에 따라 세관장의 확인이 필요한 물품이라 하더라 도 수입신고가 생략된다.","입항 전 수입신고가 수리된 물품은 해당 물품을 적재한 선박이나 항공기가 입항하기 전까지는 외국물품이다.","수출․수입신고는 화주 또는 관세사 등의 명의로 해야 한다. 다만, 수출신고의 경우에는 화주에게 해당 수출물품을 제조해 공급한 자의 명의로 할 수 있다.","체신관서가 외국으로 발송한 우편물은 관세법에 따라 적법하게 수출된 것으로 간주하 지 않는다."],"answer":3},{"section":"무역규범","num":25,"stem":"25. 관세법상 납세자의 권리 불복절차에 관한 설명으로 잘못된 것은?","choices":["관세법 규정에 따른 통고처분은 관세법상 행정심판제도의 불복청구의 대상이 아니다.","관세청장은 심사청구의 내용이 보정할 수 있다고 인정되면 20일 이내의 기간을 정해 심사청구인에게 해당 사항의 보정을 요구할 수 있다.","심사청구를 거친 처분에 대한 행정소송은 해당 결정을 받은 날로부터 20일 안에 제기 해야 한다.","세관장은 부족한 세액을 징수하려는 경우, 미리 납세의무자에게 그 내용을 서면으로 통지해야 한다. 납세의무자는 해당 통지를 받은 날부터 30일 안에 기획재정부령으로 정하는 세관장에게 통지 내용의 적법성에 대한 ‘과세전적부심사’를 청구할 수 있다."],"answer":3},{"section":"무역규범","num":26,"stem":"26. 수출용 원재료에 대한 관세 등 환급에 관한 특례법상 수출용 원재료의 관세환급에 관 한 설명으로 잘못된 것은?","choices":["해외구매자와의 수출계약을 위해 무상으로 송부하는 견본용 물품의 수출도 환급대상 수출에 해당한다.","세관장은 물품이 수출 등에 제공된 경우, 수출신고 수리일로부터 소급해 1년 이내에 수입된 해당 물품의 수출용 원재료에 대한 관세 등을 환급한다.","환급신청자는 수출물품에 대한 원재료의 소요량을 계산한 소요량계산서를 작성하고, 그 소요량계산서에 따라 환급금을 산출한다.","수출된 물품이 계약조건과 서로 달라서 반품된 물품을 대체하기 위한 물품의 수출도 환급대상 수출에 해당한다."],"answer":2},{"section":"무역규범","num":27,"stem":"27. 수출용 원재료에 대한 관세 등 환급에 관한 특례법상 개별환급에 대한 설명으로 잘못 된 것은?","choices":["개별환급의 구비서류 및 환급금 계산이 복잡하여 이를 보완하기 위해 평균세액증명제 도를 운영하고 있다.","개별환급방식으로 환급금을 산출하기 위해서는 소요량계산서를 작성해 수출물품의 제 조에 소요된 원재료의 품명, 규격, 수량을 확인해야 한다.","환급금의 지급에 제한받는 수출용 원재료는 긴급관세, 할당관세, 계절관세를 적용한 물품뿐이다.","개별환급업체는 모든 수출물품에 대해 개별환급방법으로 신청해야 한다."],"answer":3},{"section":"무역규범","num":28,"stem":"28. 다음은 관세환급특례법상 수출용 원재료의 관세환급 중 ‘국내 거래 증명서류’에 관한 내용이다. 괄호에 들어갈 용어로 올바르게 짝지어진 것은? Ÿ A사는 베트남에서 신발끈을 직접 수입하고 관세 등을 납부했다. Ÿ A사는 수입한 신발끈을 추가가공 없이 B사에 납품했다. Ÿ C사는 인도에서 원피를 직접 수입하고 관세 등을 납부했다. Ÿ C사는 수입한 원피로 가죽 갑피를 생산해 B사에 납품했다. Ÿ B사는 A사가 납품한 신발끈과 C사가 납품한 가죽 갑피 및 다른 회사에서 납품받은 물품으로 신발을 생산해 중국으로 수출했다. Ÿ B사는 수출통관 시 환급 신청인을 수출자로 했고, A사와 C사에 각각 구매확인서를 제공했다. Ÿ B사는 관세환급 신청을 위해 A사에 ( ㉮ ), C사에 ( ㉯ )을/를 요청했다. ㉮ ㉯","choices":["수입신고필증 평균세액증명서","수입세액분할증명서(수입분증) 기초원재료납세증명서(기납증)","수입신고필증 기초원재료납세증명서(기납증)","수입세액분할증명서(수입분증) 평균세액증명서"],"answer":2},{"section":"무역규범","num":29,"stem":"29. FTA관세법(자유무역협정의 이행을 위한 관세법의 특례에 관한 법률)상 용어의 정의가 올바른 것은?","choices":["“체약상대국”이란 우리나라와 자유무역협정을 체결한 국가만을 말하고, 국가연합·경 제공동체 또는 독립된 관세영역 등은 제외한다.","“원산지”란 관세의 부과․징수 및 감면, 수출입물품의 통관 등을 할 때 협정에서 정하는 기준에 따라 물품의 포장‧단순경유‧수리 등이 이루어진 것으로 보는 국가를 말한다.","“원산지증빙서류”란 우리나라와 체약상대국 간의 수출입물품의 원산지를 증명하는 서 류와 그 밖에 원산지 확인을 위해 필요한 서류․정보 등을 말한다.","“협정관세”란 협정에 따라 체약상대국을 원산지로 하는 수입물품에 대해 관세를 추가 하거나 세율을 연차적으로 인상해 부과해야 할 관세를 말한다."],"answer":3},{"section":"무역규범","num":30,"stem":"30. 자유무역협정과 FTA관세법에서 규정하고 있는 원산지 결정기준에 관한 설명으로 올바 른 것은?","choices":["둘 이상의 국가에 걸쳐 여러 나라의 원산지 재료로 제조한 물품에 대해서는 실질적 변형기준인 가공공정기준을 우선하여 적용해야 한다.","원산지로 결정된 경우에도 해당 물품이 생산․가공 또는 제조된 후에 원산지가 아닌 국 가를 경유해 운송되거나, 원산지가 아닌 국가에서 선적된 경우에는 원칙적으로 해당 물품의 원산지로 인정하지 않는다.","세번변경기준에서 CTH란 투입된 원산지 재료에 대한 HS 8단위와 수출제품 HS 8단위 가 변경될 것을 요구하는 기준이다.","단순 가공으로 세번이 변경된 경우에는 “류”변경기준인 CC기준(HS 2단위)을 충족하면 원산지 상품으로 인정한다."],"answer":2},{"section":"무역결제","num":1,"stem":"1. 무역계약의 법적 성격에 관한 설명으로 올바르게 짝지어진 것은? A. 양 당사자가 계약상의 의무를 부담하는 계약 B. 계약의 당사자가 서로 대가적 의미(급부)가 있는 출연을 하는 계약 C. 당사자의 의사 합치, 즉 합의만으로 성립하는 계약 D. 서면 또는 일정한 양식을 필요로 하지 않는 계약 A B C D","choices":["쌍무계약 유상계약 불요식계약 낙성계약","쌍무계약 유상계약 낙성계약 불요식계약","유상계약 낙성계약 쌍무계약 불요식계약","낙성계약 쌍무계약 불요식계약 유상계약"],"answer":1},{"section":"무역결제","num":2,"stem":"2. Incoterms 2020의 사용에 관한 설명으로 올바른 것은?","choices":["FCA는 매도인이 지정장소에서 매수인이 지정한 운송인에게 물품을 인도했을 때 위험 이 이전되므로 수취선하증권(Received B/L)의 발행만 가능하다.","CIP와 CIF는 모두 별도의 합의가 없다면 매도인은 최소 부보 조건인 ICC(C) 범위에서 부보해야 한다.","DAP는 매도인이 물품을 지정목적지에서 도착 운송수단에서 양하한 상태로, DPU는 매 도인이 물품을 지정목적지에서 도착 운송수단에 실어둔 채 양하 준비된 상태로 매수 인의 처분하에 두거나 그렇게 인도된 물품을 조달함으로써 인도한다.","D규칙의 경우 매도인은 제3자 운송인과 운송계약을 체결하지 않고 자신의 운송수단으 로도 운송할 수 있다."],"answer":2},{"section":"무역결제","num":3,"stem":"3. 다음 결제방식 중에서 결제위험을 기준으로 수출자에게 유리한 순서대로 나열된 것은? (제일 유리한 방식이 첫 번째에 위치) A. 30 days after sight L/C B. Payment in advance by T/T C. Sight L/C D. D/P at sight E. COD F. Open account","choices":["B → C → A → D → E → F","B → C → A → E → F → D","C → A → B → D → E → F","F → D → E → C → A → B"],"answer":1},{"section":"무역결제","num":4,"stem":"4. 추심결제 방식에 관한 설명으로 올바른 것은?","choices":["추심거래에서 추심은행(collecting bank)은 수출자에게 대금지급을 확약한다.","모든 추심거래에는 URC 522이라는 국제규칙이 자동으로 적용된다.","D/A 방식은 어음의 만기일 측면에서 볼 때 기한부신용장 방식보다는 일람불신용장 방 식에 더 가깝다.","추심지시서(Collection Instruction)에는 추심의 방식이 D/A인지 D/P인지 명시해야 하고, 만약 이런 명시가 없는 경우에는 D/P인 것으로 간주한다."],"answer":4},{"section":"무역결제","num":5,"stem":"5. 추심결제를 취급하는 은행의 의무와 책임에 관한 설명으로 잘못된 것은?","choices":["은행은 추심 또는 어떠한 추심지시서를 취급해야 할 의무를 부담하지 않는다.","은행은 자신이 전달한 지시가 이행되지 않은 경우에도 아무런 책임을 부담하지 않는 다.","추심은행은 제시된 서류들이 추심지시서에 열거된 것들과 외관상 일치하는지의 여부 와 함께 내용도 심사할 의무가 있다.","추심은행은 부정확한 주소가 제공된 결과로 발생하는 어떠한 지연에 대해서도 책임을 지지 않는다."],"answer":3},{"section":"무역결제","num":6,"stem":"6. 화환신용장 거래의 기본원칙에 관한 설명 중 옳지 않은 것은?","choices":["신용장 방식은 수출자의 대금 회수에 관한 위험을 낮춰주지만, 수입자의 물품 입수 를 보장하지는 못한다.","수입자는 신용장 요구서류로 ‘선적 전 검사증명서’를 포함해 수출자의 사기 가능성 을 억제할 수 있다.","신용장은 보증서(Letter of Guarantee or Suretyship)가 아니며, 환어음이나 수표와 같은 무조건의 지급 약속문서이다.","신용장통일규칙에는 사기에 관한 규정은 없으며, 법원의 지급 금지명령(injunction) 은 신용장의 본질을 훼손하는 것으로 볼 수 있다."],"answer":3},{"section":"무역결제","num":7,"stem":"7. 화환신용장에 관한 설명 중 옳은 것은?","choices":["연지급신용장은 환어음이 개입되지 않지만, 수익자는 만기 전 할인을 통해 자금을 미리 취득할 수도 있다.","송금 방식 shipper’s usance L/C의 경우, 매입은행은 상환은행의 상환수수료를 미입 금 수수료(less charge)라는 이름으로 수익자에게 청구하게 된다.","선대신용장은 동일 업체와 동일한 물품을 반복적으로 거래할 때, 매번 거래마다 드 는 신용장 개설 수수료, 시간 등의 절약을 위해 활용된다.","기탁신용장은 구상무역에서 주로 사용되는 것으로, ‘대응수입신용장’을 개설하는 때 에만 해당 L/C가 유효하다는 조건이 있는 것을 의미한다."],"answer":1},{"section":"무역결제","num":8,"stem":"8. 일람불 확인신용장에 관한 설명으로 올바른 것은? A. 확인수수료의 산정 기간은 신용장 개설일자부터 유효기일까지이다. B. 확인은 수익자가 개설은행의 신용을 보완하기 위해 개설은행의 동의 없이 추가하면 신용장통일규칙에 따라 확인은행으로 인정받을 수 있다. C. 신용장의 확인은 신용장 금액 또는 기간의 일부에도 할 수 있다. D. 확인은행은 확인 후 신용장 조건이 변경되면 추가로 확인하거나 거절할 수 있다. E. 매입신용장에서 환어음을 매입한 확인은행은 개설은행이 최종 지급을 거절할지라도 수익자에 대해 상환청구권을 행사할 수 없다.","choices":["A, B, D","A, C, D","B, C, E","C, D, E"],"answer":4},{"section":"무역결제","num":9,"stem":"9. 신용장의 양도와 대금양도(assignment of proceeds)에 관한 설명으로 올바른 것은?","choices":["신용장의 양도는 L/C에 “transferable”이라는 단어가 반드시 있어야 하며, 대금양도는 L/C에 단어 “transferable”이 없어도 양도할 수 있다.","양도가능신용장은 제2의 수익자가 제3 또는 제4의 수익자에게 차례로 양도할 수 있다.","양도가능신용장은 원신용장 조건과 일치해야 하므로 보험 부보 비율의 증가는 불가능 하다.","분할청구 또는 분할선적이 허용되더라도 신용장은 두 사람 이상의 제2 수익자에게 분 할양도될 수 없다."],"answer":1},{"section":"무역결제","num":10,"stem":"10. 화환신용장 거래에서 각종 서류의 수리 요건에 관한 설명으로 잘못된 것은?","choices":["선하증권에 선장의 대리인이 서명할 때 선장의 이름을 기재하지 않더라도 대리인 자신의 이름을 기재해야 한다.","신용장이 항공운송을 요구하면서 환적을 금지하고 있는 경우라도 환적사실이 기재 된 항공운송 서류는 수리할 수 있다.","신용장이 피보험자를 지정하지 않았다면, 보험서류에 피보험자로 개설은행, 개설의 뢰인, 수익자를 포함한 누구나 기재할 수 있다.","신용장에서 보험서류 원본 1통과 사본 1통을 요구한 경우, 보험서류에 원본이 2부 발행되었다고 기재되었다면 원본 2통과 사본 1통을 제시해야 수리할 수 있다."],"answer":3},{"section":"무역결제","num":11,"stem":"11. SWIFT 화환신용장에서 요구하는 서류 조건에 관한 설명으로 잘못된 것은? FULL SET OF CLEAN ON BOARD MARINE BILLS OF LADING MADE OUT TO THE ORDER OF ABC BANK MARKED FREIGHT PREPAID AND NOTIFY ACCOUNTEE.","choices":["하자 없는 선하증권을 요구하지만, 반드시 \"CLEAN”이라는 단어가 들어갈 필요는 없 다.","선하증권의 수하인(consignee)에 \"TO ORDER”라고만 기재하면 된다.","선하증권 전통을 요구하는 것이며, 통상 3부가 발행되므로 3부를 제시해야 한다.","운임은 선불이므로 CFR, CIF, CPT, CIP 등의 계약조건임을 알 수 있다."],"answer":2},{"section":"무역결제","num":12,"stem":"12. 하자 있는 선적서류의 매입방법에 관한 설명 중 신용장의 유효기간이 충분한 경우, 가 장 안전한 처리방식은 어느 것인가?","choices":["개설은행이 지급을 거절하면 수출자가 책임진다는 각서를 제출하고 매입","신용장의 조건을 하자 있는 서류와 일치하도록 변경한 후 매입","매입은행이 추심한 후 대금이 입금되었을 때 지급","매입은행이 하자 있는 서류를 개설은행의 승인을 위해 발송"],"answer":2},{"section":"무역결제","num":13,"stem":"13. 다음 내용이 설명하고 있는 결제에 사용되는 서류는 무엇인가? A. 수입 화물이 도착했지만, 선하증권 원본이 없는 경우에 사용된다. B. 수입자의 요청에 따라 개설은행이 운송인 앞으로 발행한다. C. 해당 서류가 발행되면 개설의뢰인의 클레임 제기 권한은 제한된다. D. 수입자가 이 서류를 운송인에게 제시해 물품을 수령할 수 있다.","choices":["Aval(approval)","T/R(Trust Receipt)","L/G(Letter of Guarantee)","Surrender B/L"],"answer":3},{"section":"무역결제","num":14,"stem":"14. SWIFT 신용장의 각 항목에 관한 해설로 올바른 것은?","choices":["[42C Draft at: 90 days from B/L date]로 기재된 경우, B/L date를 포함하지 않으며, B/L date는 선적일을 가리킨다.","[43P Partial shipment: allowed]로 기재된 경우, 분할선적이 허용되므로 수익자는 반 드시 분할해야 하며 전체 수량을 1회에 선적할 수는 없다.","[48 Period for Presentation: 15 days from B/L date]로 기재된 경우, B/L date를 포 함하며 B/L date는 선적일을 가리킨다.","[49 Confirmation Instructions: CONFIRM]으로 기재된 경우, 통지은행은 반드시 확인 을 추가해야 하며 확인을 추가하지 않은 채 신용장을 통지할 수는 없다."],"answer":1},{"section":"무역결제","num":15,"stem":"15. SWIFT로 통지된 화환신용장에 관한 설명으로 잘못된 것은? 43P: Partial Shipments : Allowed 41D: available with/by : ABC Bank by Negotiation 46A: documents required : + Signed commercial Invoice in Quintuplicate + Full set of Clean On Board Ocean Bills of Lading.... 49: confirmation instructions : WITHOUT","choices":["분할선적은 허용된다.","수익자가 대금을 받기 위한 은행이 ABC은행으로 지정된 지급신용장이다.","반드시 서명된 상업송장 5부와 원본 선하증권 원본 전부를 제시해야 한다.","확인에 대한 지시는 없으므로 무확인신용장이다."],"answer":2},{"section":"무역결제","num":16,"stem":"16. UCP 600이 적용되는 화환신용장에 관한 내용으로 올바른 것은? A. 화환신용장에서 원본 서류를 요청한 경우, 반드시 원본 “ORIGINAL” 표기가 있는 서류 가 제시되어야 한다. B. 개설은행이 서류상 불일치로 지급을 거절하기로 했다면, 서류 제시일의 다음날로부터 5영업일 이내에 해당 내용을 제시은행에 통보해야 한다. C. 화환신용장에서 별도 선적기한을 지정하지 않은 경우, 화환신용장의 개설일자 이전의 선적서류도 수리될 수 있다. D. 선적일에 관해 “prompt”, “on or about” 등의 모호한 표현이 사용되었다면, 그 단어 들은 무시해도 된다. E. “Negotiation”은 일치하는 제시에 대해 지정은행이 만기일 이전에 대금을 지급하며 환 어음을 매수하는 것으로 항상 환어음이 제시되어야 한다.","choices":["A, B","C, D, E","B, C","B, C, E"],"answer":3},{"section":"무역결제","num":17,"stem":"17. UCP 600에서 규정한 내용으로 잘못된 것은?","choices":["신용장은 취소 여부에 대한 표시가 없더라도 취소가 불가능하다.","신용장은 일람지급, 연지급, 인수 또는 매입 중 하나의 이용 방법이 명시되지 않으면 무효이다.","신용장은 이용할 수 있는 은행이 지정되지 않으면 모든 은행에서 이용할 수 있다. 그 러나 이용 은행이 지정되었다면 개설은행에서는 이용할 수 없다.","제시는 신용장에 의해 이루어지는 개설은행 또는 지정은행에 대한 서류의 인도 혹은 인도된 서류 자체를 의미한다."],"answer":3},{"section":"무역결제","num":18,"stem":"18. UCP 600에서 정의되지 않은 표현에 관한 ISBP의 내용 중 잘못된 것은?","choices":["선적서류(shipping documents)는 선하증권, 해상화물운송장, 항공화물운송장 등 운송 과 관련된 서류만을 말한다.","기간 경과 운송서류 수리가능(stale documents acceptable)은 신용장의 유효기일 이 전에 제시되는 것을 전제로 서류가 선적일 후 달력상 21일 후에도 제시될 수 있다 는 의미이다.","제3자 서류 수리 가능(third party documents acceptable)은 환어음을 제외하고, 신용 장이나 UCP 600에서 발행인이 명기되지 않은 모든 서류는 수익자 이외의 기명된 자연인이나 실체에 의해 발행될 수 있음을 의미한다.","수출국(exporting country)은 수익자의 주소가 있는 국가, 물품의 원산지국, 운송인이 물품을 수령한 국가, 물품 선적국 또는 물품 발송국 중의 어느 하나를 의미한다."],"answer":1},{"section":"무역결제","num":19,"stem":"19. ISBP 등 국제규칙에 근거한 환어음의 설명으로 올바른 것은?","choices":["기한부 환어음의 만기 산정을 위해서는 반드시 선적일자가 표시되어야 한다.","환어음의 숫자 금액과 문자 금액은 서로 일치해야 하지만, 서로 다를 경우 문자 금액 을 기준으로 환어음을 심사한다.","만기를 정하기 위해 사용된 전치사 “from”은 명시된 일자를 포함하고, “after”는 명시 된 일자를 제외한다.","만기일이 휴일이면 상환은 이전 은행영업일에 이루어져야 한다."],"answer":2},{"section":"무역결제","num":20,"stem":"20. Standby L/C에 관한 설명으로 잘못된 것은?","choices":["Standby L/C는 지급보증 대상은행이 특정인에게 금융지원, 채무보증 등을 해줄 수 있 도록 개설하는 화환신용장이다.","수출입과 관련된 보증에는 수출선수금 환급보증, 현지금융 담보보증, 수출계약 이행보 증 등이 있다.","Standby L/C의 장점은 이행보증용과 금융보증용 등으로 사용되는 용도의 다양성이다. 반면에 단점은 부당청구(unfair calling)의 가능성이 있다는 것이다.","명시적 언급이 있다면 Standby L/C에도 ISP 98과 UCP 600이 적용될 수 있다."],"answer":1},{"section":"무역결제","num":21,"stem":"21. 다음 결제조건 가운데 포페이팅으로 활용이 가능한 것은?","choices":["CAD at 60 days after sight","O/A at 30 days","D/P at 90 days from B/L date","D/A at 60 days after sight (Aval 추가 조건)"],"answer":4},{"section":"무역결제","num":22,"stem":"22. 팩터링 방식의 수출입에 관한 설명으로 잘못된 것은?","choices":["팩터링 거래에서 수출자가 선적 후 선적서류를 수출팩터에게 양도하면, 수출팩터는 서 류 확인 후 수출자에게 전도금융을 제공하고 관련 수수료를 수출자에게 청구한다.","팩터링은 팩터의 소구권(recourse right) 여부에 따라서 소구권이 있는 팩터링과 없는 팩터링으로 구분된다.","포페이팅은 ICC에서 제정한 국제규칙(URF 800)이 있는 반면에, 팩터링은 아직 국제규 칙이 제정되어 있지 않다.","국제팩터링은 기한부 결제방식인 신용장과 추심 거래에서 팩터가 수출자로부터 외상 매출채권을 매입하는 국제금융기법의 일종이다."],"answer":4},{"section":"무역결제","num":23,"stem":"23. 결제에 관한 국제규칙 가운데 신용장과 관련된 규칙만으로 짝지어진 것은?","choices":["UCP 600 － ISBP 821 － ISP 98 － eUCP","UCP 600 － URC 522 － URR 525 － URBPO 750","ISP 98 － URC 522 － ISBP 821 － UCC","ISP 98 － URBPO 750 － URF 800 － UCC"],"answer":1},{"section":"무역결제","num":24,"stem":"24. 한국무역(주)은 유로화로 수입대금을 지급한다. 이 회사의 외환 담당자는 보유하고 있 던 미 달러화를 유로화로 환전하기 위해 은행에 문의했다. 각 은행이 제시한 EUR/USD 환율이 다음과 같다면, 이 회사는 어떤 환율로 거래하는 것이 가장 좋은가? (단, 은행의 수수료는 없음. 환율표시에서 앞에 있는 것이 기준통화) EUR/USD Spot 매입(bid) 매도(offer) A은행 1.2350 1.2380 B은행 1.2360 1.2390","choices":["A은행의 1.2350","B은행의 1.2360","A은행의 1.2380","B은행의 1.2390"],"answer":3},{"section":"무역결제","num":25,"stem":"25. 우리나라의 은행 간 외환시장의 특징에 관한 설명으로 잘못된 것은?","choices":["평일 오전 9시부터 다음날 새벽 2시까지 개장되며 주말과 공휴일에는 열리지 않는다.","달러/원 거래와 위안/원 거래만 이루어지고 있으며, 달러/엔, 유로/달러 등의 거래는 이 루어지지 않는다.","기업의 수출입 거래나 자본 거래 등에 따른 실수요 거래도 있으나, 환차익을 노리는 투기 거래의 비중이 실수요 거래보다 더 크다.","외국환은행, 중앙은행, 외환브로커가 참여하고 있으며 각 기업은 외환브로커를 통해 간접적으로 은행 간 시장에 참여한다."],"answer":4},{"section":"무역결제","num":26,"stem":"26. 외환시장의 환율과 금융시장의 금리가 각각 다음과 같다. 이때 GBP/USD의 선물환율을 간편식으로 산출한다면, GBP/USD의 6개월 선물환율과 가장 가까운 것은? (환율표시에 서 앞에 있는 것이 기준통화) GBP/USD 현물환율 1.50 GBP 6개월 금리 연률 9% USD 6개월 금리 연률 5%","choices":["1.41","1.47","1.53","1.56"],"answer":2},{"section":"무역결제","num":27,"stem":"27. 한국정유(주)는 수입대금을 달러로 지불한다. 이 회사가 3개월 후 지급 예정인 수입대 금의 환율 상승 위험을 보기의 방안으로 각각 헤지했다면, 3개월 후 현물환율이 1,380 원이 되었을 때 가장 유리한 결과를 낳는 것은?","choices":["선물환으로 달러 매입, 선물환율 1,390원","행사가 1,370원의 콜옵션 매입, 프리미엄 달러당 30원","행사가 1,390원의 풋옵션 매도, 프리미엄 달러당 20원","아무런 행동도 취하지 않다가 3개월 후 당시 현물환율로 결제"],"answer":3},{"section":"무역결제","num":28,"stem":"28. 환리스크 관리의 내부적 기법에 관한 설명으로 올바른 것을 모두 고른 것은? A. 리딩(leading)은 외화자금의 결제시기를 최대한 앞당기는 것을 말하며, 래깅(lagging) 은 외화자금의 결제시기를 최대한 늦추는 것이다. B. 향후 환율의 강세가 예상되는 통화를 지급해야 할 때 래깅 전략을 사용하는 것이 바람직하다. C. 네팅(netting)은 일정 기간 발생하는 채권과 채무를 개별적으로 결제하지 않고, 서로 상계한 차액만을 결제함으로써 비용 절감과 리스크를 줄이는 방법이다. D. 가격정책(price policy)은 수출입 가격을 수시로 조정하거나 거래통화를 조정해 환리 스크에 대응하는 방법이다.","choices":["A, C","A, C, D","C, D","B, C, D"],"answer":2},{"section":"무역결제","num":29,"stem":"29. 환리스크 관리의 외부적 기법에 관한 설명 중 잘못된 것은?","choices":["통화선물은 특정한 거래소에서 이루어지는 불특정 다수와의 거래이며, 선물환은 장외 시장에서 당사자 간의 1대1 거래이다.","통화스왑은 장래 특정 시점 또는 기간의 환리스크를 회피하기 위해 보유한 금융자산 또는 부채의 통화를 다른 통화로 변경하는 방법이다.","통화선물은 상대방과의 합의에 따라 계약 단위나 결제일을 자유롭게 정할 수 있지만, 선물환은 계약 단위나 결제일이 사전에 표준화되어 있다.","통화옵션은 통화를 장래의 특정 일자 또는 기간에 정해진 행사가격으로 매입 혹은 매 도할 수 있는 권리이다."],"answer":3},{"section":"무역결제","num":30,"stem":"30. 다음 신문기사의 제목에서 외환시장에 알려질 경우, 달러/원 환율의 상승을 초래할 뉴 스로 잘못된 것은?","choices":["“미국의 FRB, 달러 기준금리를 연내 2, 3차례 추가 인상할 방침 밝혀”","“국내 주식시장에서 외국인 투자자들의 주식매도, 향후에도 급증할 전망”","“한국의 7월 중 경상수지, 예상보다 크게 악화된 150억 달러 적자로 반전”","“반도체 및 자동차 수출 호조로 하반기 수출목표 2배 이상 초과 달성은 무난할 듯”"],"answer":4},{"section":"무역계약","num":1,"stem":"1. 다음 offer의 내용상 밑줄 친 (A)～(D) 중에서 내용이 부적절한 것은? We are pleased to offer the article(s) mentioned below as per the conditions and details described as follows. Item No. Description Unit Quantity Unit Price Amount NB-1 NB-3 100% Nylon Fabrics 19” length 24” length yd yd 500 500 US$1.00 US$2.00 US$500.00 US$1,000.00 (A) Delivery Term: CFR Busan, Korea (B) Shipment : Within 1 month after receipt of order Destination : New York, USA Inspection : Maker’s inspection shall be final (C) Payment : By an irrevocable sight L/C in favor of us (D) Validity : By July 31, 2023 We look forward to your valued order for the above offer. Yours faithfully,","choices":["(A)","(B)","(C)","(D)"],"answer":2},{"section":"무역계약","num":2,"stem":"2. 다음 offer에 관한 내용 중 올바른 것으로만 짝지어진 것은? Dear Sirs, We are pleased to make the below offer: Description : Duster (Model No. ASD-12) Quantity : 2,000 pcs Price : US$12.00/pc CIP Nhasa Shiva sea port in India (subject to Incoterms 2020) Shipment : Within 30 days after an order Payment : By an irrevocable L/C at sight in our favor (subject to UCP 600) Validity : By the end of October, 2023 (A) The seller should dispatch the goods by October 31, 2023 for the performance of the contract. (B) The seller should procure insurance for ICC(C) if this offer is accepted. (C) The seller may present a full set of negotiable bills of lading issued and marked freight payable at destination if this offer is accepted. (D) The seller may determine the shipping port unless otherwise agreed. (E) This is a firm offer which makes the offeror to be bound if it is validly accepted.","choices":["(A), (C)","(B), (D)","(C), (D)","(D), (E)"],"answer":4},{"section":"무역계약","num":3,"stem":"3. Incoterms 2020의 일부 조건을 아래 표의 기준으로 요약한 것 중에서 잘못된 것은? 기준 조건 위험이전 비용분기점 운송방식 수출통관 해상보험","choices":["EXW 수출국 지정 인도장소 모든 운송 수입자 의무 없음","CIF 지정 선적항(본선) 지정 목적항 해상 운송 수출자 수출자 ICC(C) 조건","FCA 수출국 지정 인도장소 모든 운송 수출자 의무 없음","DAP 도착지 운송수단에서 양하 모든 운송 수입자 수출자 ICC(A) 조건"],"answer":4},{"section":"무역계약","num":4,"stem":"4. Incoterms 2020의 분류 및 설명으로 잘못된 것은?","choices":["해상 및 내수로 운송방식에만 사용되어야 하는 조건은 FAS, FOB, CFR, CIF이다.","매도인이 적하보험을 부보해야 하는 조건은 CIP 및 CIF이다.","Incoterms 2020에서 F규칙은 매수인이 운송계약을 체결해야 하는 조건이다.","본선인도 조건인 FOB, CFR, CIF 조건의 위험 분기점은 본선 난간(ship’s rail)이다."],"answer":4},{"section":"무역계약","num":5,"stem":"5. Vienna Convention(1980)이 적용되는 범위에 관한 설명으로 잘못된 것은?","choices":["국제사법 규칙에 따라 체약국법이 적용되는 경우, 영업소가 서로 다른 국가에 있는 당 사자 간의 물품매매계약에 적용된다.","선박, 항공기의 매매에는 적용되지 않는다.","물품을 주문한 당사자가 그 제조 또는 생산에 필요한 재료의 중요한 부분을 공급하는 경우는 매매계약으로 보지 않는다.","물품을 공급하는 당사자의 의무의 주된 부분이 노무 그 밖의 서비스 공급이 있는 계 약에도 적용된다."],"answer":4},{"section":"무역계약","num":6,"stem":"6. Vienna Convention(1980)에서 매수인의 계약위반에 대한 매도인의 구제수단을 설명한 것 중에서 올바르게 짝지은 것은? A. 다른 구제수단과 병행해 행사할 수 있는 대표적인 구제수단이다. B. 의무불이행이 근본적인 계약위반에 해당하거나, 추가 기간 내에 매수인이 의무를 이 행하지 않을 때 사용할 수 있는 가장 강력한 구제수단이다. C. 매수인이 매도인의 요청을 받은 후 상당 기간 내에 해당 명세를 확정하지 않으면, 매 도인은 매수인의 요구사항을 참작해 스스로 물품의 명세를 확정할 수 있다. A B C","choices":["계약이행청구권 손해배상청구권 계약해제권","대체물인도청구권 추가기간지정권 손해배상청구권","추가기간지정권 물품명세확정권 대체물인도청구권","손해배상청구권 계약해제권 물품명세확정권"],"answer":4},{"section":"무역계약","num":7,"stem":"7. 다음 중 무역계약의 조건에 관한 설명으로 잘못된 것은?","choices":["견본매매를 할 때“Quality to be as per sample”과 같이 완곡한 표현을 사용하는 것 이 수출자 입장에서 유리하다.","UCP 600은 살물(bulk cargo)의 경우 명시적인 과부족 용인 약관이 없더라도 5%의 과 부족을 허용하고 있다.","포장의 견고성에 대한 의무는 매매계약 조건에도 불구하고 매도인에게 부과된다.","UCP 600은 선적일을 실제 선적일이 아닌 서류발행일을 기준으로 한다."],"answer":4},{"section":"무역계약","num":8,"stem":"8. 무역계약의 본질과 특성에 관한 설명으로 잘못된 것은?","choices":["무역계약의 특수성은 당사자 간 주계약인 매매계약을 이행하기 위해 운송계약, 보험계 약, 결제계약 등 종속계약이 따른다는 점이다.","무역계약의 해석은 강행규정이 있으면 최우선 적용되고, 이어서 명시조건인 계약조건, 묵시조건인 관습법, CISG 등 준거법 순서로 적용된다.","매도인(seller)은 거래단계별로 결제에서는 beneficiary(수익자), drawer(발행인), 운송에 서는 consignee(수하인), ship owner(화주) 등의 명칭으로 부른다.","무역계약은 국제물품매매계약(Contract for the International Sale of Goods)을 말하는 것으로서 국내계약과 다르게 양 당사자가 다른 국가(법역)에 위치해야 한다."],"answer":3},{"section":"무역계약","num":9,"stem":"9. 국제물품매매계약의 성립요건으로서 청약과 승낙에 관한 설명 중 올바른 것을 모두 고 른 것은? A. 계약성립의 가장 중요한 요소는 계약당사자 간 의사표시의 합치이다. B. 청약은 특정인 앞으로 유효기간을 정해서 충분한 내용으로 조건을 제시하는 확정적 인 의사표시이다. C. 의사표시의 효력 발생 시기에 대해 대부분의 입법례는 청약은 발신주의, 승낙은 도 달주의를 택하고 있다. D. 서식의 표제에 ”offer“라는 단어가 사용되어야 청약으로 간주되기 때문에 어떠한 경 우도 Proforma Invoice는 청약으로 간주되지 않는다. E. 조건부 승낙은 청약의 거절이며 또 다른 청약인 반대청약(counter offer)이다.","choices":["A, C, D","A, B, E","B, C, D","B, D, E"],"answer":2},{"section":"무역계약","num":10,"stem":"10. 다음 무역계약 체결 절차에 사용되는 서식 및 내용 중에서 일반적인 계약체결 절차에 따를 때 올바른 순서대로 나열된 것은? A. Circular Letter B. Business Proposal C. Sales Contract D. Buyer List / Seller List E. Offer Sheet / Order Sheet F. Inquiry G. Acceptance / Acknowledgement","choices":["B → A → F → C → D → E→ G","D → A → F → B → E → G → C","D → F → B → E → G → A → C","F → A → B → G → E → C → D"],"answer":2},{"section":"무역계약","num":11,"stem":"11. 1차 산물은 규격이 통일되지 않아 무역계약상 품질 결정에 많은 어려움이 있다. 다음 거래 물품과 품질 결정 기준에 관한 설명 중 올바른 것을 모두 고른 것은? A. 원면, 생사는 USQ(Usual Standard Quality) 거래가 적합하다. B. 목재류, 냉동 어류는 GMQ(Good Merchantable Quality) 거래가 적합하다. C. 곡물류, 과일류는 FAQ(Fair Average Quality) 거래가 적합하다. D. 인삼, 오징어는 Sales by Sample 거래가 적합하다.","choices":["A, B","B, C","A, B, C","A, B, D"],"answer":3},{"section":"무역계약","num":12,"stem":"12. 선적조건과 관련된 신용장 거래에 관한 설명으로 잘못된 것은?","choices":["할부선적의 경우 수입자가 판매계획과 능력, 시황 등을 고려해 수차례에 걸쳐 물품공급 을 요청할 수 있으며, 수출자는 할부 물량별로 지정한 선적기간 내에 선적해야 한다.","할부선적은 어느 할부한 부분에 대한 선적을 위반했더라도 당해 선적분을 제외한 장래 의 모든 할부한 부분에 대해서는 신용장을 사용할 수 있다.","분할선적은 수출자의 수출품 생산용 원자재의 재고 상황 등을 고려해 사용될 수 있으 며, 계약 물품을 여러 차례 나누어 운송한다.","신용장에 금지표시(prohibited/not allowed)가 없으면 분할선적이 가능하다."],"answer":2},{"section":"무역계약","num":13,"stem":"13. 무역계약의 포장조건에서 화인(shipping mark)에 관한 설명으로 올바른 것을 모두 고른 것은? A. 주화인(main mark)은 다른 화물과의 식별을 위해 특정한 기호(symbol)를 표시하 고, 그 안에 수입자의 상호 등을 약자로 표시한다. B. 주의표시(care mark)는 화물 취급상 주의할 점을 외장의 측면에 한다. 예를 들어 화물이 물에 젖지 않도록 지시하는 마크 등을 표시한다. C. 도착항(port mark)은 화물이 잘못된 곳으로 운송되는 것을 막기 위해 선택적으로 표시하며, 복수 항로의 경우는 “New York via Seattle”과 같이 표시한다. D. NM(No Mark) cargo는 선적항과 상자 번호가 없는 무인화물로서 화물이 수출화주 에게 회수되지 못해 손해를 입힐 수 있다.","choices":["A, B","A, B, D","B, C, D","A, B, C, D"],"answer":1},{"section":"무역계약","num":14,"stem":"14. 다음 무역거래 조건 중 청약이나 주문에서 반드시 약정해야 하는 기본 무역조건으로서 중요도가 상대적으로 낮은 것은?","choices":["Unit price: US$1.90/pc FCA COEX, Incoterms 2020","Commodity \u0026 Descriptions: Automobile Tubes","Quantity: 6,000pcs","Origin: Republic of Korea"],"answer":4},{"section":"무역계약","num":15,"stem":"15. 무역계약상 주요 조건의 약정과 해석 등에 관한 설명으로 잘못된 것은?","choices":["품질조건의 점검매매(sale by inspection)에서 매수인이 거래물품을 수입지의 소재지에 서 실제로 점검해 품질을 결정하는 방법에는 BWT 거래와 COD 거래 등이 있다.","수량조건의 중량을 표시하는 중량톤은 Metric ton(M/T)으로 약정해야 1,000kg(2,204lbs) 으로 해석되며, 총중량, 순중량 등도 구분해 표시하는 것이 바람직하다.","결제조건 결정에서 매도인이 우위에 있으므로 대부분 경우에 “사전송금 → L/C → D/P․ D/A→O/A 방식” 순으로 매도인에게 유리하게 결정되는 것이 거래관행이다.","가격조건은 “Price: US$125.75/set FCA Seoul Coex warehouse, Incoterms 2020”과 같 이 거래통화, 수량단위, 무역거래조건, 비용의 분기점, Incoterms 버전 등을 표시하는 것이 바람직하다."],"answer":3},{"section":"무역계약","num":16,"stem":"16. 무역계약서의 체결 방식 중 정식계약 방식에 관한 설명으로 잘못된 것은?","choices":["개별계약 방식은 거래할 때마다 구체적인 거래조건을 합의하는 방식으로 최초 거래나 1 회로 종결되는 거래에 사용된다.","포괄계약 방식은 동일한 상대방과 유사한 내용으로 거래가 반복적으로 이루어지는 경우, 일반거래조건에 관한 협정을 체결해 기본원칙을 규정하는 방식이다.","포괄계약서는 전면사항과 이면사항으로 구성되어 품질, 수량, 가격, 선적, 결제 등 주 요 조건을 구체적으로 규정하기 때문에 해당 건의 무역거래에 바로 이용할 수 있다.","일반거래조건은 특정 종류의 거래에 적용하기 위해 미리 작성된 정형화된 계약조건을 가 리키며, 계약서 표제로 “General terms \u0026 conditions”라고 쓰는 경우가 많다."],"answer":3},{"section":"무역계약","num":17,"stem":"17. 소송 이외의 클레임 해결방법인 대체 분쟁 해결수단(ADR)에 관한 설명으로 잘못된 것 은?","choices":["Intercession: 공정한 제3자가 일방 당사자 또는 쌍방의 의뢰에 따라 분쟁사건에 개
