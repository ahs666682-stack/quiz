입 하여 해결을 위해 조언하는 것으로 알선이라 한다.","Conciliation: 당사자 쌍방이 합의해 제3자를 조정인으로 선임하고, 그가 제시하는 조정 안에 동의함으로써 분쟁을 해결하는 방법이다. 조정은 중재절차 개시 전에 진행될 수 있는 분쟁해결 방법의 하나다.","Arbitration: 공정한 제3자를 중재인으로 선임하고, 중재인의 판정에 복종함으로써 클레 임을 해결하는 방법이다. 중재는 1회의 판정으로 종결되며 중재에 의뢰한 사건은 소송 에 의해 다룰 수 없다.","Waiver of claim: 당사자들이 자주적인 교섭을 통해 합의점을 발견함으로써 분쟁을 원 만하게 해결하는 방법이다. 계약서에 당사자가 서로 양보할 것, 분쟁을 종료할 것, 그 뜻을 약정할 것 등 3가지 요건이 필요하다."],"answer":4},{"section":"무역계약","num":18,"stem":"18. 무역계약에서 중재에 관한 설명으로 잘못된 것은?","choices":["사전 중재합의는 계약당사자들이 계약서에 다른 조항과 함께 중재조항을 포함해 계약 체결과 동시에 중재합의까지 완성하는 것이 일반적이다.","중재계약은 중재지, 중재기관, 준거법이 포함되어야 한다. 특히 중재지는 중재장소가 있는 곳이므로 중재지가 “Seoul, Korea”인 경우 중재장소도 “Seoul, Korea”로 일치 해야 한다.","중재조항의 중재기관 명칭은 정확히 기재되어야 한다. 중재기관이 명확하지 않은 경 우, 일방이 중재를 신청하더라도 상대방이 해당 중재기관의 관할을 부인하면 중재 진 행에 중대한 차질이 발생할 수도 있다.","중재판정은 법원의 확정판결과 동일한 효력이 있고 New York Convention(1958)의 체 약국일 때 외국에서도 중재판정의 승인 및 집행이 보장된다. 그러나 중재판정은 재판 판결과 같이 그 자체로서 집행력이 없으므로 패소자의 국가에서 강제집행을 허용하는 법원의 집행판결로 적법함을 선고받아야 한다."],"answer":2},{"section":"무역계약","num":19,"stem":"19. 다음 상황에 적합한 Incoterms 2020의 조건을 모두 올바르게 고른 것은? A. 한국의 매수인이 중국의 매도인으로부터 포장기계를 수입하는 계약을 체결 B. 중량화물(heavy weight cargo)이므로 매도인이 매수인과 합의한 수입국 공장까지 화 물 파손의 위험, 운임 및 기타 비용을 부담해 운송하는 조건으로 진행 C. 수입통관 및 관세는 매수인이 부담 D. 해상적하보험은 매도인이 부담","choices":["CFR, CIF, CIP","CIP, CIF, DAP, DPU","CPT, CIP, DAP, DPU","DAP, DPU"],"answer":4},{"section":"무역계약","num":20,"stem":"20. 다음 운송서류에 기재된 선적일 중에서 계약위반이 되는 것을 모두 고른 것은? - 무역계약서의 최종선적일은 모두 8월 31일로 동일함 A. 발행일이 9월 1일이고 선적일(on board date)이 8월 30일로 기재된 선하증권 B. 발행일이 8월 30일이고 본선적재 부기일(on board notation)이 9월 1일로 기재된 선하증권 C. 운송인의 화물 수취일이 8월 30일, 발행일이 8월 31일, 본선적재 부기일이 9월 1일 로 기재된 선하증권 D. 특정 비행일자 부기일이 8월 31일, 발행일이 9월 1일로 기재된 항공화물운송장","choices":["A, D","A, B, D","B, C","B, C, D"],"answer":3},{"section":"무역계약","num":21,"stem":"21. 다음 국제법규 및 규칙 중에서 국제물품매매계약과 관련된 것으로만 짝지어진 것은?","choices":["Vienna Convention － UCP 600 － URC 522","Incoterms 2020 － ICC(2009) － URBPO 750","Incoterms 2020 － CISG － New York Convention","Vienna Convention － Hamburg Rules － Rotterdam Rules"],"answer":3},{"section":"무역계약","num":22,"stem":"22. 다음 상황을 고려해 수출자 A가 취해야 할 사전 또는 사후의 위험관리방안 중에서 올 바른 것을 모두 고른 것은?. 가. 자동차 부품 생산업체인 A는 미국 바이어 B와 수출계약을 체결했다. 나. B가 매수인으로서 계약상 우위에 있기에 결제조건을 O/A 90 days로 합의했다. 다. 별도 계약서를 작성하지 않고 품명, 수량, 가격, 결제, 선적조건 등 기본사항만을 기 재한 P/I(Proforma Invoice)로 진행하고 기타 협의가 필요한 사항은 구두로 합의했 다. 라. A는 정상적으로 납품했으나, B는 만기일까지 결제하지 않았다. 마. B는 A가 납품한 제품의 하자로 동 제품을 사용해 제작한 완성품도 하자품이 되어서 거래처로부터 손해배상 청구를 받았다고 밝혔다. 이에 B는 오히려 A에게 손해배상 을 청구할 수 있다고 주장했다. 바. 결국 A는 B로부터 대금을 받지 않는 조건으로 합의하고 거래를 마무리 지었다. A. 신용조회 및 수출보험 가입 B. 계약서 작성 시 품질조건을 명확하게 규정 C. P/I를 근거로 중재 신청 D. 공인검사기관 지정 E. 분쟁해결 방법을 서면으로 합의","choices":["A, B, C, E","A, B, C, D, E","A, B, D, E","A, B, E"],"answer":3},{"section":"무역계약","num":23,"stem":"23. 국제물류 실무에 관한 설명 중 잘못된 것은?","choices":["국제물류는 국내물류보다 확대된 영역으로 무역 중심의 생산과 소비가 2개국 이상에 걸쳐 이루어지는 경우, 생산 및 소비의 시간적 공간적 차이를 극복하기 위해 재화를 대상으로 하는 물리적 국제경제 활동이다.","제3자 물류는 외부의 전문 물류업체와 계약을 맺고 물류 업무를 위탁(outsourcing)하는 것이다.","국제물류는 국민경제적 측면에서 수출입물품의 최적 유통과 물류비 절감이 가능해 경 제발전과 물가안정에 이바지하고 있다.","최근 홍해 사태로 인해 수에즈 운하 통행이 어려워지면서 수출입업체들이 대부분 항 공운송으로 전환함에 따라 항공운임만 폭등하고 있다."],"answer":4},{"section":"무역계약","num":24,"stem":"24. 무역운송 및 운임에 관한 설명 중 잘못된 것은?","choices":["Box rate: 화물의 종류나 중량에 관계없이 컨테이너당 정한 운임","BAF: 유가 인상으로 인한 손실을 방지하기 위해 부과되는 유류할증료","Detention charge: 화주가 컨테이너 또는 트레일러를 대여받아 규정된 기간 내에 반환 하지 못해 부과되는 벌과금","CBM: FCL cargo에 대해 컨테이너당 부과하는 운임단위"],"answer":4},{"section":"무역계약","num":25,"stem":"25. 선하증권과 해상화물운송장에 관한 내용 중 잘못된 것은?","choices":["선하증권은 화물수취증, 운송계약의 증빙, 권리증권의 기능을 한다.","컨테이너 운송에서 선하증권에 부지약관의 내용인 “shipper’s load \u0026 count”나 “said by shipper to contain” 또는 비슷한 효력을 갖는 문언이 포함된 운송서류는 수리된다.","Sea Waybill도 Surrender B/L과 마찬가지로 원본 없이 화물을 찾을 수 있는 서류이다.","Sea Waybill은 Master Sea Waybill만 발행될 수 있고 House Sea Waybill은 불가능하다."],"answer":4},{"section":"무역계약","num":26,"stem":"26. 선하증권에 반드시 기재해야 하는 법정 기재 사항이 아닌 것은?","choices":["B/L No: 화물의 처리와 서류 취급의 편의를 위해 기재한다. 통상 선적항과 양륙항의 알파벳 첫머리 글자를 이용하고 번호는 일련번호로 쓴다.","Ocean Vessel: 선적한 화물에 대한 권리의 특정성을 부여하기 위해 화물을 수송하는 선박명은 기재한다.","Consignee: T/T 방식에서는 수입자의 상호 및 주소가 기재되지만, 신용장 방식에서는 L/C에 표시된 문구에 따라 주로 지시식(to order)으로 기재된다.","Port of Discharge: 양륙항이 기재되지 않으면 화물을 인도할 곳이 없게 되기 때문에 선적항과 함께 화물의 양륙항 및 국명을 기재한다."],"answer":1},{"section":"무역계약","num":27,"stem":"27. 해상 정기선 컨테이너 해상운임에 관한 내용으로 잘못된 것은?","choices":["컨테이너 운임은 해상운임과 컨테이너 처리비용 등의 부대비용이 추가되어 부과된다.","기본운임 중에서 선불운임은 수입자가 선적지에서 운임을 선지급하는 것으로 CIF, CFR 조건 등에 활용되며, 선사는 B/L 발급 시 운임을 징수한다.","THC는 CY 등 터미널에서 화물을 처리할 때 소요되는 비용을 말하며 선사들이 해상운 임과 분리해 징수하고 있다.","해상운임에 대해 운송인과 수출입 화주 사이에 인식의 차이가 있으므로 운송계약을 체결할 때 기본운임 외에 추가되는 부대운임을 면밀하게 살펴야 한다."],"answer":2},{"section":"무역계약","num":28,"stem":"28. 해상보험의 정의와 관련 계약의 설명 중 올바른 내용들로만 묶인 것은? A. 영국해상보험법에는 “해상보험계약은 보험자가 피보험자에 대해 계약에 따라 합의 한 방법과 범위 내에서 해상손해, 즉 해상사업에 수반되는 손해를 보상할 것을 인 수하는 계약”이라고 정의하고 있다. B. 해상보험은 18세기 후반에 미국에서 처음 시작되었다. C. 해상보험을 보험기간에 따라 구분하면 기간보험, 항해보험, 혼합보험 등이 있다. D. 보험계약자는 보험계약과 관련해 확정 통지를 하면서 필요할 경우, 확정 통지한 목적물에 관한 보험가입증명서를 보험자로부터 발급받을 수 있다. E. 선명 미확정보험은 보험증권상에 “to be declared”로 표기되며 포괄보험에 속한다.","choices":["A, B, D","A, D, E","A, B, C","A, C, D"],"answer":4},{"section":"무역계약","num":29,"stem":"29. 해상보험증권 구약관과 신약관의 보험조건을 설명한 내용 중 잘못된 것은?","choices":["FPA 조건의 담보위험은 화재, 강도, 투하, 폭발 등으로 인한 손해에 보상할 수 있다.","All Risks 조건에서 FPA와 WA 조건의 담보위험 일체와 구약관 면책위험은 제외하고 특약으로 보험자가 수락하면 담보위험으로 처리될 수 있는 전쟁, 파업, 폭동, 내란 등 이 있다.","ICC(A)는 구약관의 All Risks 조건의 담보위험과 동일하며, 보상범위가 신․구약관의 6개 보험조건 중에 가장 넓다.","ICC(B) 조건은 ICC(C)보다는 보상범위가 넓으나 구약관의 All Risks보다는 보상범위가 좁다."],"answer":3},{"section":"무역계약","num":30,"stem":"30. 해상보험에 대한 설명으로 올바른 것을 모두 고른 것은? A. Incoterms 2020에서 CIF 조건은 별도 합의가 없다면 매도인이 매수인을 위해 ICC(A) 또는 ICC(A/R) 110%로 부보해야 한다. B. 구약관은 S.G.Policy와 특별약관 ICC(FPA, WA, A/R) 조건을 말하며, 신약관은 1982년 에 제정된 ICC(A, B, C) 조건을 말한다. C. 구약관에서 담보 범위가 넓은 것에서 좁은 순으로 표시하면 ICC(FPA) → ICC(WA) → ICC(A/R)이다. D. WA 3%란 손실액이 3% 미만인 경우는 보상하지 않고, WAIOP는 손실액의 다과에 관계없이 보상하는 WA의 특약사항이다. E. 보험료(insurance premium)는 보험자의 위험부담에 대해 보험계약자가 지급하는 보 수를 말한다. F. 보험금(claim amount)은 담보위험으로 피보험자가 입은 재산상의 손해에 대해 보험 자가 지급하는 보상금이다.","choices":["A, B, C, D","A, B, D, F","B, D, E, F","B, C, D, E"],"answer":3},{"section":"무역영어","num":1,"stem":"1. PIL-DONG, JUNG-KU, SEOUL, KOREA QUEENMARY SHIPPING LINE Consignee B/L No. ; But 1004 TO ORDER OF XYZ BANK Notify Party ABC IMPORT CORP. P.O.BOX 1, BOSTON, USA Place of Receipt BUSAN port, KOREA Port of Loading BUSAN port, KOREA Ocean Vessel WONIS JIN Voyage No. 1234E Port of Discharge Seattle port, USA Place of Delivery Chicago, USA Final Destination Flag Freight prepaid at BUSAN PORT Freight payable at Place and Date of Issue May 21, 2024, Seoul Total prepaid in No. of original B/L Signature Laden on board vessel May 21, 2024 ABC Shipping Co. Ltd. as agent for a carrier, QUEENMARY SHIPPING LINE, Ltd.","choices":["Received B/L Order B/L Ocean B/L","Shipped B/L Named B/L Ocean B/L","On board B/L Order B/L Multimodal transport B/L","Received for shipment B/L Named B/L Combined transport B/L"],"answer":1},{"section":"무역영어","num":2,"stem":"2. 다음 offer에 관한 내용 중 올바른 것으로만 짝지어진 것은? Dear Sirs, We are pleased to make the below offer: Description : Duster (Model No. ASD-12) Quantity : 2,000 pcs Price : US$12.00/pc CIP Nhasa Shiva sea port in India (subject to Incoterms 2020) Shipment : Within 30 days after an order Payment : By an irrevocable L/C at sight in our favor (subject to UCP 600) Validity : By the end of October, 2023 (A) The seller should dispatch the goods by October 31, 2023 for the performance of the contract. (B) The seller should procure insurance for ICC(C) if this offer is accepted. (C) The seller may present a full set of negotiable bills of lading issued and marked freight payable at destination if this offer is accepted. (D) The seller may determine the shipping port unless otherwise agreed. (E) This is a firm offer which makes the offeror to be bound if it is validly accepted.","choices":["(A), (C)","(B), (D)","(C), (D)","(D), (E)"],"answer":4},{"section":"무역영어","num":3,"stem":"3. 다음 주문서의 내용 중에서 잘못된 것은? Dear Mr. Jennings, Thank you very much for your letter of March 12 with a price list and samples. We are pleased to make our order (No. ABC-123) as below. Products : strapped casual sandals for women (Catalog No. WXE-34) Quantity : 2,000 pairs Unit Price : USD25.00/pair CIP New York (subject to Incoterms 2020) Total Amount: USD50,000.00 Payment : Draft at 30 days after sight under irrevocable L/C Shipment : By April 30, 2023 Insurance : ICC(B) to be effected by the seller Packing : 20 pairs in a carton box We have instructed our bank to issue a letter of credit for the amount of this order. You will soon hear from Woori Bank in your country.","choices":["The quality of the goods will be determined when the goods are handed over to the first carrier at a departing place","The seller should procure an insurance for maximum coverage from the departing place to the arriving place","An irrevocable acceptance L/C will be issued","The seller will be advised of issuance of L/C by Woori Bank"],"answer":2},{"section":"무역영어","num":4,"stem":"4. Incoterms 2020이 규정하고 있는 내용만으로 짝지어진 것은? A. the place of delivery for fulfillment of delivery obligation B. validity of the contract for carriage C. the point where the risk is transferred from the seller to the buyer D. the place where the insurance becomes effective E. the point when the contract for sales of goods becomes valid","choices":["A, C","B, C","A, C, D","B, C, D, E"],"answer":1},{"section":"무역영어","num":5,"stem":"5. 다음 서신으로 유추할 수 있는 수출자와 수입자 간의 Incoterms 2020상 정형거래조건에 관한 매매계약 내용으로 잘못된 것은? Dear Sir/Madam, Please quote for collection from our company, in Austin, U.S.A. and delivery to Incheon port, the arriving port. Our goods are: - 15 rice cookers, 220∼230V - 20 dressing table assembly kits, packed in wooden boxes - 20 stool chairs, W31×D31×H46(cm) The dressing table assembly kits and stool chairs are protected against knocks by wooden boxes and the invoiced value of the goods is US$4,000. The freight will be paid by our customer once the goods are delivered at the arriving port.","choices":["FCA term may be used in a contract between the seller and the buyer","The buyer will pay for the carriage from Austin, U.S.A. to the arriving place","The seller will pay for carriage up to Austin, U.S.A","The delivery of goods to the buyer takes place at Incheon port"],"answer":4},{"section":"무역영어","num":6,"stem":"6. Incoterms 2020의 각 조건에서 매도인의 의무에 관한 설명으로 잘못된 것은?","choices":["FCA: The seller fulfills delivery obligation when the goods are loaded on the means of transport arranged by the buyer at the seller’s premises","CPT: The seller must provide the buyer, at the buyer’s request, with information in the possession of the seller that the buyer needs for obtaining insurance","DAP: The seller must deliver the goods by placing them at the disposal of the buyer on the arriving means of transport ready for unloading at the named place of destination","DDP: The seller should clear the goods and pay any cost or duty for import but not for export"],"answer":4},{"section":"무역영어","num":7,"stem":"7. 다음 서신의 밑줄 친 (A), (B)에 들어갈 내용이 올바르게 짝지어진 것은? KITA Co., Ltd. 513, Yeongdong-daero, Gangnam-gu, Seoul, Republic of Korea Order Sheet July 1, 2024. Baby \u0026 Children Inc. 27, Penrose Avenue, Cherrybrook, NSW, 2126, Australia. We would like to order the following goods subject to the terms and conditions given below. Item : Baby Climber Quantity : 1,500pcs Shipment : Within 30 days after receipt of your L/C Payment : By an irrevocable L/C in favour of (A) and draft at 60 days after sight Price : USD150.00 CIF (B) Yours very truly, (A) (B)","choices":["KITA Co., Ltd. port of Incheon","Baby \u0026 Children Inc. port of Sydney","KITA Co., Ltd. port of Sydney","Baby \u0026 Children Inc. port of Incheon"],"answer":4},{"section":"무역영어","num":8,"stem":"8. 다음은 무역계약상 어떤 조항에 관한 내용인가? During the Terms of Agreement, the Franchisee shall not engage, directly or indirectly, either independently or as an employee, on its behalf or in the name for any other person in a similar business in a Territory where it would compete with a member of the franchised network, including the Franchisor.","choices":["Territorial exclusivity clause","Non-competition clause","Guarantee clause","Technical assistance clause"],"answer":2},{"section":"무역영어","num":9,"stem":"9. 다음은 국제물품매매계약서의 일부분이다. 계약서의 내용으로 잘못된 것은? Art. 2 Characteristics of the goods 2.1 It is agreed that any information relating to the goods and their use, such as weight, dimension, capacities, colors and other data contained in catalogs shall not take effect as terms of the contract unless expressly referred to in the contract. 2.2 Unless otherwise agreed, the buyer does not acquire any property rights in software, drawings, etc. which may have been made available to him. 2.3 It is agreed that the goods are suitable for the purpose for which they are intended by their very nature or which is evident from the contract of sale. 2.4 If express reference is made in the contract of sale to technique, safety, quality or other regulations and documents clearly designated in the agreement, even if not attached to the contract, the seller shall be deemed to have knowledge of these.","choices":["If both contracting parties do not agree expressly in the contract any information contained in catalogs is not considered as terms of the contract","The seller does not need to provide the buyer with property rights of drawings which are available to the buyer","The seller should provide the goods conforming to the purpose which is clearly intended in the contract","When the seller expressly refers to any other document clearly designated in the contract, if it is not attached to the contract it will be considered that the seller does not have its knowledge"],"answer":4},{"section":"무역영어","num":10,"stem":"10. 다음 무역계약서상 밑줄 친 조항(clause) (A～C)의 제목이 올바르게 짝지어진 것은? (A) : Should the occurrence of events not contemplated by the parties fundamentally alter the equilibrium of the present contract, thereby placing an excessive burden on one of the parties in the performance of its contractual obligations, that party may proceed as follows: (B) : In the event of avoidance of this contract or rejection of the goods, the seller shall be entitled to resell or otherwise dispose of the goods to third parties, regardless of trademarks, designs, patents, copyrights, utility models etc., associated with the goods. The buyer shall not raise any objection to such disposition. (C) : If the issuance of the letter of credit is delayed due to causes for which the buyer is liable, the buyer shall pay the seller an amount equivalent to three-tenths of one percent (0.3%) of the amount of the relevant letter of credit for each full week of delay. (A) (B) (C)","choices":["Force majeure Secrecy Claim resolution","Delayed performance Escalator Infringement","Hardship Product release Liquidated damages","Entire Infringement Delayed performance"],"answer":3},{"section":"무역영어","num":11,"stem":"11. 다음 국제물품매매계약서의 내용 중에서 잘못된 것은? 11.1 Unless otherwise agreed, the buyer shall examine the goods as soon as possible after their arrival at destination and shall notify the seller in writing of any lack of conformity of the goods within 15 days from the date when the buyer discovers or ought to have discovered the lack of conformity. ............. 13.1 A party is not liable for a failure to perform any of his obligations in so far as he proves: (a) that the failure was due to an impediment beyond his control, and (b) that he could not reasonably be expected to have taken into account the impediment and its effects upon his ability to perform at the time of the conclusion of the Contract, and (c) that he could not reasonably have avoided or overcome it or its effects.","choices":["별도 합의가 없는 한, 매수인은 물품이 목적지에 도착한 후 15일 이내에 물품의 하자를 매도인에게 통지해야 한다","계약위반 당사자의 면책을 위해서는 계약을 위반한 당사자가 계약 의무를 이행할 수 없게 된 사유(장애)를 계약 체결 시 합리적으로 고려할 수 없었음을 입증해야 한다","계약위반 당사자의 면책을 위해서 계약위반 당사자가 장애나 장애로 인한 결과를 극 복하는 것이 불가능했음을 입증해야 한다","계약위반 당사자의 면책을 위해서 계약위반 당사자가 계약 불이행이 본인의 통제를 벗어난 불가항력적 사유로 인한 것임을 입증해야 한다"],"answer":1},{"section":"무역영어","num":12,"stem":"12. 다음 신용장에 따라 발행된 용선계약부 선하증권상 출발항과 도착항의 기재가 올 바르게 된 것을 모두 고른 것은? MT700 Issue of a Documentary Credit 44E Port of Loading : Korean Port 44F Port of Discharge : Chinese Port 46A Documents Required + Full set of clean on board charter party B/L ...... Port of Loading Port of Discharge A Incheon port Chinese port B Busan port in Korea Shanghai port in China C Korean port Chinese port D Korean port Shanghai port","choices":["A, B","B","B, D","C, D"],"answer":1},{"section":"무역영어","num":13,"stem":"13. 화환신용장의 조건이 아래와 같을 때 올바른 설명은? MT700 Issue of a Documentary Credit 31D Expiry date and place: 10th, April 2023 in our country 41D Available with ... by : Issuing bank ...by Payment 46A Documents required: + Inspection Certificate issued by official inspector + Certificate of Origin issued by beneficiary","choices":["The beneficiary must present an inspection certificate issued and signed by an inspection company working solely in the importing country","If the beneficiary presents required documents to seller’s bank within expiry date of the credit, the issuing bank cannot refuse to accept this document on the basis of expiration even if the issuing bank received this documents after 10th April","The issuing bank cannot refuse to accept an inspection certificate issued by any party including beneficiary","The issuing bank may accept a certificate of origin issued by chamber of commerce in exporting country"],"answer":4},{"section":"무역영어","num":14,"stem":"14. 다음 서신에서 밑줄 친 (A)～(D)에 해당하는 당사자로 잘못된 것은? Dear Mr. Kevin, (A) We have arranged with (B) Barclays Bank for an irrevocable Letter of Credit in your favor for US$56,000. (C) You will receive the L/C through (D) KEB Hana Bank in your city within 10 days.","choices":["(A) We – applicant","(B) Barclays Bank – issuing bank","(C) You – beneficiary","(D) KEB Hana Bank – paying bank"],"answer":4},{"section":"무역영어","num":15,"stem":"15. 다음 서신을 바탕으로 올바른 내용으로만 짝지어진 것은? Dear Sirs, Thank you for Sales Contract No. AS-32. We found all the particulars to be correct. We have instructed the National Bank of Dubai to issue an irrevocable L/C for USD35,000 in your favor and this will remain valid until June 20, 2023. This credit will be confirmed by the advising bank, KEB Hana Bank in Seoul and they will accept your draft drawn on them at 60 days after sight for the amount of your invoice. Of course, we believe that you will execute our order in accordance with the terms in the L/C. Very truly yours, (A) A confirmed L/C is issued. (B) The seller should draw a sight draft. (C) The amount of the draft should be the same as that of the invoice. (D) This order is effective by June 20, 2023. (E) KEB Hana Bank is a paying bank.","choices":["(A), (C)","(B), (D)","(C), (E)","(D), (A)"],"answer":1},{"section":"무역영어","num":16,"stem":"16. 다음 대금결제에 관한 설명 중 밑줄 친 (A), (B)에 들어갈 용어가 올바른 것은? (A) means the handling by banks of documents in accordance with instructions received, in order to deliver documents against payment and/or against acceptance. (B) is an act of a payee, drawee, endorser or holder of a bill, check, or other negotiable instrument, in writing his name upon the bank of the same, with or without further or qualifying words, whereby the property in the same is assigned and transferred to another. (A) (B)","choices":["Collection Endorsement","Honor Negotiation","Remmittance Endorsement","Factoring Negotiation"],"answer":1},{"section":"무역영어","num":17,"stem":"17. 국제운송에 관한 용어의 설명으로 잘못된 것은?","choices":["Letter of Indemnity(L/I): A document which the bank indemnifies the carrier against the implications of claims that may arise from the issue of a clean B/L when the goods were not loaded in accordance with the description in the B/L","Lay days are the number of days permitted in a charter party for loading and discharging of a cargo from a ship","Charter party designates freight room of a ship for a specific period or journey. If a ship is chartered without a crew, this is a bareboat charter","Full Container Load(FCL) shipments: A container does not need to be loaded and unloaded together with other shippers’consignments at the CFS"],"answer":1},{"section":"무역영어","num":18,"stem":"다음 운송서류의 성격(종류)을 올바르게 짝지은 것은?","choices":["Received B/L  Order B/L  Ocean B/L","Shipped B/L  Named B/L  Ocean B/L","On board B/L  Order B/L  Multimodal transport B/L","Received for shipment B/L  Named B/L  Combined transport B/L"],"answer":3},{"section":"무역영어","num":19,"stem":"19. 다음은 어떤 서류에 대한 설명인가? This is a document commonly used in international trade to allow a carrier to release goods to a consignee who is not yet in possession of the original bill of lading. This assures the carrier that he/she will not suffer from any financial loss by having released the goods to the consignee in the absence of the original bill of lading. This document allows for smoother and more flexible operations in situations where the original bill of lading is delayed or lost.","choices":["Letter of Indemnity","Sea Waybill","Mate’s Receipt","Letter of Guarantee"],"answer":4},{"section":"무역영어","num":20,"stem":"20. 다음 보험증권의 밑줄 친 (A)～(D) 중 내용이 잘못된 것은? (A) Assured(s), etc Certificate No. 002A9965SD Ref. No. Invoice No. DS-17350 L/C No. IOMP270 (B) Claim, if any, payable at: GELLATLY MARINE SERVICE 845 Seventh Avenue New York 10017, USA (C) ( ) USD65,120.00 (D) USD59,200×110% Survey should be approved by: THE SAME AS ABOVEConditions INSTITUTE CARGO CLAUSES(A)1982","choices":["(A) It shows who has an insurable interest in the subject matter insured","(B) It shows the place where the claim amount is paid","(C) The claim amount is usually written here","(D) This is the face value of the invoice"],"answer":3},{"section":"무역영어","num":21,"stem":"21. 다음 서신의 내용과 일치하는 것은? Dear Sirs, Three hundred bales of wool goods per M/S ‘ARIA’ reached us, but we regret to inform you that their quality is inferior to the samples though the bales themselves show no trace of damage. Before we wrote this letter, we filed our claim about the inferior quality to the Busan General Agent of the President Lines, New York, as we believed this was due to rough handling of the bales. However, an investigation by a licensed INTECO surveyor has revealed that the deterioration is attributable to the coarse raw wool. For further details, please refer to the enclosed surveyor’s report. Accordingly, we are compelled to make a claim on the matter and to ask you to make up for the deterioration, amounting to US$4,800 specified in the surveyor’s report. Your prompt settlement of this claim will be appreciated. Faithfully yours,","choices":["During transportation, the packaging was damaged, so the quality of goods is not up to that of the samples","The report written by the INTECO surveyor will be sent upon request","This letter is sent to the Busan General Agent of the President Lines for claims regarding the quality of wool product","The writer is claiming compensation for depreciation amounting to US$4,800"],"answer":4},{"section":"무역영어","num":22,"stem":"22. 위 서신의 밑줄 친 (A)에 들어가기에 적절하지 않은 것은?\n\n[지문]\nDear Sir:\nWe would like to express our sincere regret for your complaint of August 10, that \nwe have not yet been able to execute your order No. 381. (A) . However, we have been doing everything possible in our power to deliver the \ngoods within a week, and are now arranging for shipment.\nWe assure you that we will take every precaution against such trouble arising in \nthe future.\nYours faithfully,","choices":["After careful investigation, it must have been caused by unskilled packing on our part, and it resulted in the delivery of the wrong consignment","It appears that it will be impossible to deliver the goods within the date stipulated on account of manufacturer’s labor shortage","We have contacted the shipping company and found out that they are on strike and the goods are still on board","Unfortunately, due to unexpected circumstances, there was a delay in production. Consequently, the delivery will be late"],"answer":1},{"section":"무역영어","num":23,"stem":"23. 위 비즈니스 메일의 제목으로 적절한 것은?\n\n[지문]\nDear Sir:\nWe would like to express our sincere regret for your complaint of August 10, that \nwe have not yet been able to execute your order No. 381. (A) . However, we have been doing everything possible in our power to deliver the \ngoods within a week, and are now arranging for shipment.\nWe assure you that we will take every precaution against such trouble arising in \nthe future.\nYours faithfully,","choices":["Claim in quality","Re: Advice of shipment","Apologies for non-performance","Shipment enquiry"],"answer":3},{"section":"무역영어","num":24,"stem":"24. 위 서신에 대한 설명으로 올바른 것은?\n\n[지문]\nDear Sirs, \nWe're pleased to let you know that we have instructed our Gangnam Branch in \nSeoul to open an irrevocable Letter of Credit for US$300,000 in your favor. This \ncredit will remain valid until August 31 at our bank, KB Bank. A notification will be \nsent through Citibank via registered mail in the coming days.\nTo ensure smooth processing of the payment, please attach the following \ndocuments to your sight draft when presented through your bank: Full sets of Bill \nof Lading, three commercial invoices, one insurance policy, three packing lists, and \ncertificates along with the list of weight and/or measurement. \nSince you quoted us a CIF Busan price, the credit amount will cover your \ninvoice, freight, and insurance costs.\nWe trust that you will fulfill our order(No.2406) for six hundred units of your \nDB400S7B i3-7 computer model, maintaining the excellent service we have come \nto expect. \nYours truly,","choices":["This letter serves as a reminder about issuance of L/C for the buyer","According to the contract, the risk of the goods is transferred from the seller to the buyer after on board","The writer is inquiring about the possibility of adjustment of L/C amount","To ensure timely delivery, the order needs to be placed by August 31st"],"answer":2},{"section":"무역영어","num":25,"stem":"25. 위 서신에 대한 답장 내용으로 적절하지 않은 것은?\n\n[지문]\nDear Sirs, \nWe're pleased to let you know that we have instructed our Gangnam Branch in \nSeoul to open an irrevocable Letter of Credit for US$300,000 in your favor. This \ncredit will remain valid until August 31 at our bank, KB Bank. A notification will be \nsent through Citibank via registered mail in the coming days.\nTo ensure smooth processing of the payment, please attach the following \ndocuments to your sight draft when presented through your bank: Full sets of Bill \nof Lading, three commercial invoices, one insurance policy, three packing lists, and \ncertificates along with the list of weight and/or measurement. \nSince you quoted us a CIF Busan price, the credit amount will cover your \ninvoice, freight, and insurance costs.\nWe trust that you will fulfill our order(No.2406) for six hundred units of your \nDB400S7B i3-7 computer model, maintaining the excellent service we have come \nto expect. \nYours truly,","choices":["Citibank has just notified us that they have received a Letter of Credit(No. HN-701) for your order(No. 2406)","We plan to ship your order on the 21st of this month aboard the M.V. \"Sun Star”","Unfortunately, a discrepancy between the L/C and our contract regarding the port of shipment is causing us some difficulty in fulfilling your order","We haven't received any reply from you regarding L/C for your order(No.2406) yet, despite our several previous inquiries. Could you please respond to our request?"],"answer":4},{"section":"무역영어","num":26,"stem":"26. 위 서신의 목적으로 가장 적절한 것은?\n\n[지문]\nDear Mr. Chang\nWe're writing to follow up on your email regarding Order No. 156. In the email, \nyou mentioned airmailing our special neckties via American Airlines on December \n10, with an estimated arrival a week before Christmas.\nUnfortunately, the shipment only arrived yesterday, three weeks behind schedule. \nWe didn't receive any follow-up email explaining about the delay.\nAs you may recall, we emphasized the importance of receiving the goods by \nDecember 20th at the latest to ensure they were available for Christmas sales. \nDue to the delay, we now have excessive stock. (A) We would appreciate it if you could explain the reason for the delay and let us \nknow if you are open to our proposal.\nSincerely,","choices":["Report of damaged goods","Request for extended payment terms","Request for substitute products","Claim on delay in shipment"],"answer":4},{"section":"무역영어","num":27,"stem":"27. 위 서신의 밑줄 친 (A)에 들어가기에 가장 적절한 문장은?\n\n[지문]\nDear Mr. Chang\nWe're writing to follow up on your email regarding Order No. 156. In the email, \nyou mentioned airmailing our special neckties via American Airlines on December \n10, with an estimated arrival a week before Christmas.\nUnfortunately, the shipment only arrived yesterday, three weeks behind schedule. \nWe didn't receive any follow-up email explaining about the delay.\nAs you may recall, we emphasized the importance of receiving the goods by \nDecember 20th at the latest to ensure they were available for Christmas sales. \nDue to the delay, we now have excessive stock. (A) We would appreciate it if you could explain the reason for the delay and let us \nknow if you are open to our proposal.\nSincerely,","choices":["Considering these circumstances, we propose accepting the shipment with a 20% price reduction","The enclosed survey report indicates the damage was likely caused by inadequate packaging","We kindly request that you reship the replacement items at your earliest convenience and at no additional cost to us","We are unsure of the cause at this time but have initiated an immediate investigation with our shipping partner to determine the reason for the issue"],"answer":1},{"section":"무역영어","num":28,"stem":"28. 다음 서신의 내용을 논리 전개에 따라 가장 잘 배열한 것은? Dear Mr. Lee, (A) While we were impressed with the samples, unfortunately, your current prices are not competitive with other offers we've received. (B) This lower price would allow you to capitalize on the growing market for wet sheets. (C) Thank you for your email on March 30 offering 5,000 wet sheets for sweaty skin at US$7.50 per piece CIF Bangkok. (D) Our goal is to work with you for the majority of this business; however to do so, we require a more competitive price of approximately US$5.50 per piece. We'd appreciate a prompt response to let us know if this revised price is possible. Thank you for your time and consideration. Sincerely,","choices":["(C) － (D) －(A) － (B)","(A) － (C) －(D) － (B)","(C) － (A) －(D) － (B)","(C) － (D) －(B) － (A)"],"answer":3},{"section":"무역영어","num":29,"stem":"29. 다음 서신의 밑줄 (A)～(D) 중에서 문맥상 가장 어색한 것은? To whom it may concern: This letter confirms the shipment of your order No. 56 for Color Television Sets model AB201. The shipment departed on August 30 aboard the M.V. \"Kumgang-ho.\" (A) While we originally planned to use a different vessel, a last-minute cancellation necessitated this change. Fortunately, the \"Kumgang-ho\" sailed on the same day as originally planned, ensuring no delay in your order. (B) We are indeed very sorry to have troubled you so much due to the unexpected delay. (C) We've enclosed copies of the following shipping documents for your reference: Invoice(3copies), Certificate of Origin(1copy), Bill of Lading(1copy), Packing List(1copy), Insurance Policy(1copy), and Inspection Certificate(1copy). We trust that the order will arrive in good condition. (D) Please accept our draft upon presentation. We look forward to doing business with you in the future. Sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":2},{"section":"무역영어","num":30,"stem":"30. 다음 주어진 문장을 영작한 것 중에서 적절하지 않은 것은?","choices":["당사는 선적서류를 오늘 받았고 귀사의 일람불 환어음은 개설은행을 통해 지급되었습니 다. ⇒ We have received the shipping documents today and your sight draft was duly honored by the L/C issuing bank","포장을 뜯자마자 당사는 물품의 색상이 샘플의 색상과 같지 않음을 발견했습니다. ⇒ Upon unpacking the goods, we found that the colors of the goods are not the same as those of the sample","당사는 이 클레임이 대한상사중재원의 중재규정에 의해 해결되기를 바랍니다. ⇒ We hope that this claim will be settled in accordance with the arbitration rules of the Korean Commercial Arbitration Board","이 물품을 당사가 반송해야 하는지 또는 20퍼센트 할인해서 판매할 수 있도록 할 것인지 알려주십시오. ⇒ Please let us know if you want us to replace the goods or let us sell them at a discount of 20 percent"],"answer":4}];
var _D60=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하고 있는 수출입의 정의가 잘못된 것은?","choices":["사용대차(使用貸借), 증여 등 무상거래라도 국내에서 외국으로 물품이 이동하는 것은 수출이다.","보세판매장에서 외국인에게 국내에서 수리 또는 개조된 물품을 매도하는 것은 수출이 아니다.","외국에서 외국으로 유상 인수하는 물품 중에서 산업통상자원부 장관이 정해 고시하는 기준에 해당하는 것은 수입이다.","거주자가 비거주자에게 산업통상자원부 장관이 정해 고시하는 방법으로 대통령령으로 정하는 용역을 제공하는 것은 수출이다."],"answer":2},{"section":"무역규범","num":2,"stem":"2. 대외무역법상 무역 관련 시설에 해당하지 않는 것은?","choices":["일정 기준을 충족하는 무역견본품을 전시할 수 있는 시설과 기준 인원을 수용할 수 있는 회의실을 갖춘 무역전시장","무역전문인력을 양성할 수 있는 시설로 일정 규모를 갖춘 무역연수원","회의용 시설로서 연면적과 최대 수용인원에서 일정 규모를 갖춘 컨벤션센터","문화체육관광부 장관의 추천에 의해 산업통상자원부 장관이 지정한 외화획득 및 관광 진흥에 기여도가 높은 관광시설"],"answer":4},{"section":"무역규범","num":3,"stem":"3. 대외무역법령상 다음 설명에 해당하는 특정 거래형태로 올바르게 연결된 것은? A. 가공임을 지급하는 조건으로 외국에서 가공할 원료의 전부 또는 일부를 거래 상대방 에게 수출하거나 해외에서 조달해 가공한 후 가공물품 등을 수입하거나 외국으로 인 도하는 수출입 B. 수출할 것을 목적으로 물품 등을 수입해 보세구역 및 자유무역지역 이외의 국내에 반입하지 않고 수출하는 무역 C. 수출대금은 국내에서 영수하지만 국내에서 통관되지 않은 수출물품 등을 외국으로 인도하거나 제공하는 수출","choices":["A. 위탁가공무역 B. 중계무역 C. 외국인도수출","A. 위탁가공무역 B. 연계무역 C. 임대수출","A. 수탁가공무역 B. 중개무역 C. 외국인도수출","A. 수탁가공무역 B. 연계무역 C. 위탁판매수출"],"answer":1},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에서 규정하고 있는 수출‧수입실적의 인정 범위에 대한 설명으로 올바른 것은?","choices":["대북한 유상 반출실적은 수출실적에서 제외한다.","해외건설공사에 직접 사용되는 원료ㆍ기재, 공사용 장비 또는 기계류를 수출한 후 재 반입을 하는 경우는 수출실적으로 인정된다.","산업통상자원부 장관이 지정하는 생산자의 수출물품 포장용 골판지상자의 공급은 수 출실적으로 인정된다.","외국인으로부터 대금을 영수하고 외화획득용 시설기재를 외국인과 임대차계약을 맺은 국내업체에 인도하는 경우는 수출실적으로 인정되지 않는다."],"answer":3},{"section":"무역규범","num":5,"stem":"5. 대외무역법령상 외화획득용 원료‧기재의 수입자는 부득이한 사유로 당초 목적 외의 용 도로 사용하려면 승인을 받아야 한다. 당초 목적 외의 용도로 사용할 수 있는 부득이한 사유로 올바른 것을 모두 고른 것은? A. 제품 생산을 수탁한 공장의 도산 등으로 인해 생산이 지연되는 경우 B. 화재나 천재지변에 따라 외화획득 이행이 불가능하게 된 경우 C. 해당 품목이 수입승인 대상에서 제외되어 수입에 대응하는 외화획득을 이행할 필 요가 없는 경우 D. 수입된 원료가 형질이 변해 외화획득 이행물품의 생산에 사용할 수 없게 된 경우 E. 외화획득용 원료·기재로 생산된 물품 등의 제조에 고도의 기술이 필요해 외화획득 이행에 앞서 시험제품을 생산할 필요가 있는 경우","choices":["A, B, E","B, C, D","B, D, E","C, D, E"],"answer":3},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 원산지 표시에 관한 설명으로 잘못된 것은?","choices":["원산지를 특정하기 어려운 물품으로, 중고물품의 경우에는 “Imported from 국명”으 로 원산지를 표시할 수 있다.","진열용 견본품이나 개인이 자가소비용으로 수입하는 물품으로서 세관장이 타당하다고 인정하는 물품일 경우, 원산지를 표시하지 않을 수 있다.","밀봉된 의약품과 같이 상거래 관행상 최종구매자에게 포장, 용기에 봉인되어 판매되는 수입물품은 해당 물품의 최소포장, 용기 등에 원산지를 표시할 수 있다.","원산지 표시 대상 물품은 “국명 산(産)”, “국명 제(製)”, “Product of 국명”, “Made by 물품 제조자의 회사명, 주소, 국명” 등으로 원산지를 표시할 수 있다."],"answer":2},{"section":"무역규범","num":7,"stem":"7. 대외무역법령상 수입수량 제한조치에 관한 설명으로 올바른 것은?","choices":["수입수량 제한조치는 조치 시행일 3년 전부터 수입된 물품부터 적용하며, 적용기간은 4년을 넘어서는 안 된다.","산업통상자원부 장관이 수입수량을 제한하는 경우 제한수량은 ‘기준 수량’ 미만으 로 해야 하며, 해당 산업의 심각한 피해를 방지하거나 구제하기 어렵다고 명백히 인 정될 때만 기준 수량 이상으로 제한할 수 있다.","산업통상자원부 장관은 시행 중인 수입수량 제한조치에 대해 무역위원회가 조치내용 변경이나 적용기간 연장을 건의하면 건의 접수일부터 1개월 안에 결정하고 결과를 통 보해야 한다.","수입수량 제한조치의 적용기간을 연장하는 때에는 해당 조치의 적용기간과 덤핑방지 관세 또는 상계관세의 부과기간 및 연장기간을 전부 합산한 기간이 8년을 넘어서는 안 된다."],"answer":3},{"section":"무역규범","num":8,"stem":"8. 내국신용장과 구매확인서에 관한 설명으로 올바른 것을 모두 고른 것은? A. 내국신용장은 산업통상자원부 장관이 정하는 바에 따라 외국환은행의 장이 발급 해 국내에서 통용되는 신용장이다. B. 구매확인서를 발급받으려는 자가 전산 설비를 갖추지 못했거나 기타 부득이한 사 유로 전자문서를 작성하지 못하는 때에는 외국환은행의 장에게 위탁해 신청할 수 있다. C. 국내에서 외화획득용 원료·기재를 구매하려는 자는 한국은행 총재 또는 전자무역 기반사업자에게 구매확인서 발급을 신청할 수 있다. D. 외국환은행의 장 또는 전자무역 기반사업자는 외화획득용 원료·기재 구매확인서를 전자무역문서로 발급하고 신청자에게 해당 사실을 통보할 때 승인번호, 개설 및 통지일자, 발신기관 전자서명 등 최소한의 사항만 알릴 수 있다. E. 외국환은행의 장 또는 전자무역 기반사업자는 2차 구매확인서를 발급할 수 있으 며, 외화획득용 원료·기재의 제조·가공·유통(완제품의 유통 포함)과정이 여러 단계 인 경우에는 각 단계별로 순차로 발급할 수 있다.","choices":["A, D","C, D","B, E","D, E"],"answer":4},{"section":"무역규범","num":9,"stem":"9. 관세법령상 품목분류체계 및 품목분류사전심사 신청에 관한 설명으로 올바른 것은?","choices":["법적인 목적상 품목분류는 부(部)·류(類)·절(節)의 표제, 각 호(號)의 용어와 관련 부 나 류의 주(註)에 따라 결정한다.","HS 품목분류의 법적 구속력이 있는 것은 통칙, 주의 규정과 호와 소호의 용어이다. 이 중 호(heading)는 류(chapter)에 속한 전체 물품을 각각 6단위의 번호로 나눈 것이다.","HS 품목분류표의 분류체계는 부, 류, 호, 소호로 세분되며, 10단위 코드인 HSK는 우리 나라 관세통계통합품목분류표에서 추가 세분류한 것이다.","품목분류사전심사 신청을 받은 관세청장은 신청 접수일부터 30일 안에 해당 물품에 적용될 품목분류를 심사해 신청인에게 통지해야 한다. 통지를 받은 자는 통지일로 부터 60일 이내에 재심사를 신청할 수 있다."],"answer":3},{"section":"무역규범","num":10,"stem":"10. 관세법상 용어의 정의 중에서 올바른 것은?","choices":["복합환적은 동일한 세관의 관할 구역에서 입국 또는 입항하는 운송수단에서 출국 혹 은 출항하는 운송수단으로 물품을 옮겨 싣는 것을 말한다.","입항 전 수입신고가 된 물품은 내국물품으로 간주한다.","탁송품은 상업서류, 견본품, 자가사용물품 등을 국제무역선(기) 또는 국경출입차량을 이용한 물품의 송달을 업으로 하는 자(물품을 휴대해 반출입하는 것을 업으로 하는 자 를 포함)에게 위탁해 국내에 반입하거나 외국으로 반출하는 물품이다.","우리나라와 FTA를 체결한 국가의 선박으로 공해상에서 채집 또는 포획한 수산물을 국 내에 반입하는 것은 관세법상 수입이다."],"answer":4},{"section":"무역규범","num":11,"stem":"11. 관세법상 기간 및 기한의 계산에 관한 내용으로 잘못된 것은?","choices":["관세법상 기간을 계산할 때 수입신고 수리 전 반출승인을 받은 경우, 반출일을 수입신 고의 수리일로 본다.","기한이 토요일 및 일요일인 경우에 그 다음날을 기한으로 한다.","기간의 계산은 관세법에 특별한 규정이 있는 것을 제외하고는 ‘민법’에 따른다.","국가관세종합정보시스템, 연계정보통신망 또는 전산처리설비가 대통령령으로 정하는 장애로 가동이 정지돼 관세법에 따른 기한까지 관련 신고, 신청, 승인, 허가, 수리, 교 부 등을 할 수 없게 되는 경우에 장애가 복구된 날의 다음날을 기한으로 한다."],"answer":1},{"section":"무역규범","num":12,"stem":"12. 다음 조건에서 관세법령상 과세물건 및 적용법령 등에 관한 설명으로 올바른 것은? Ÿ 2023년 11월 26일: 한국의 ㈜KITA와 영국 A사는 물품 B의 매매계약 체결 (계약수량: 1,000대, 계약 체결 당시 물품 B의 관세율 8%) Ÿ 2024년 1월 1일: 관세법 개정으로 관세율 변경, 물품 B의 관세율 6.5% Ÿ 2024년 2월 26일: 해당 물품 인천항 도착 Ÿ 2024년 3월 2일: 계약물품 중 20대는 운송 중 분실된 것으로 확인 Ÿ 2024년 3월 15일: ㈜KITA는 수량 ○○○대에 대해 수입신고 Ÿ 2024년 3월 17일: 수입신고 수리되어 보세구역에서 물품 반출 Ÿ 2024년 4월 7일: ㈜KITA의 창고 입고 후 보관 중 10대는 도난당함","choices":["해당 물품의 과세물건 수량은 1,000대이고, 적용 관세율은 8%이다.","관세는 수입신고 수리 당시의 법령에 따라 부과하므로 적용 관세율은 6.5%이다.","도난 또는 분실된 물품의 과세물건의 확정시기는 도난되거나 분실된 때이므로, 과세물 건의 수량은 970대이다.","㈜KITA는 980대에 대해 수입신고를 진행했으며, 적용관세율은 6.5%이다."],"answer":4},{"section":"무역규범","num":13,"stem":"13 관세법령상 납세의무자에 관한 내용으로 잘못된 것은?","choices":["수입신고를 한 물품인 경우, 수입신고하는 때의 화주가 관세의 납세의무자이다.","화주가 불분명한 경우로서 수입신고 전에 수입물품을 양도하면 양도인이 관세의 납세 의무자가 된다.","수입신고 수리 전에 수입으로 보는 물품을 소비 및 사용하는 경우, 소비자 또는 사용 자가 관세의 납세의무자가 된다.","우편으로 수입되는 물품의 경우, 관세의 납세의무자는 수취인이다."],"answer":2},{"section":"무역규범","num":14,"stem":"14. 관세법상 납세의무의 소멸에 관한 내용으로 잘못된 것은?","choices":["관세를 납부한 경우에는 관세의 납부의무가 소멸된다.","부정한 방법으로 관세를 포탈했거나 환급 또는 감면받은 경우를 제외하고는 관세를 부과할 수 있는 날부터 5년이 지나면 부과할 수 없다.","관세징수권의 소멸시효는 관세의 분할납부기간 중에는 진행되지 않는다.","5억 원 이상의 관세에 대한 징수권은 행사할 수 있는 날부터 5년 내 행사하지 않으면 소멸된다."],"answer":4},{"section":"무역규범","num":15,"stem":"15. 다음 상황에서 설명하고 있는 수입물품 과세가격의 공제요소로 올바른 것은? Ÿ 최근 물류 지연으로 선박의 국내 도착 후 대기시간이 길어지면서 예기치 못한 체 선료 발생이 증가하는 추세이며 과세대상 체선료도 늘고 있다. Ÿ 관세청은 국내 입항 후 발생하는 체선료 등이 수입물품 과세가격에 포함되지 않 도록 관련 고시를 개정, 2023년 2월 1일부터 시행 중이다. Ÿ 개정 전에는 우리나라에 입항하는 시점이 수입항 부두에 접안하는 시점으로 해석 됐지만, 개정 후에는 하역준비 완료 통지시점으로 명확히 규정함으로써 체선료가 수입물품 과세가격에 포함되지 않도록 했다.","choices":["수입 후에 하는 해당 수입물품의 건설, 설치, 조립, 정비, 유지 또는 기술지원에 필요 한 비용","수입항 도착 후 해당 수입물품의 운송에 필요한 운임·보험료, 기타 운송과 관련된 비용","우리나라에서 해당 수입물품에 부과된 관세 등의 세금과 기타 공과금","연불조건(延拂條件)의 수입인 경우에 해당 수입물품에 대한 연불이자"],"answer":2},{"section":"무역규범","num":16,"stem":"16. 관세법상 세액의 확정 및 ‘징수금액의 최저한’에 관한 설명으로 올바른 것은?","choices":["납세의무자는 신고납부한 세액의 부족이나 세액산출의 기초가 되는 과세가격 또는 품 목분류 등의 오류를 알게 됐을 때 신고납부한 날부터 2년 안에 해당 세액의 보정을 세관장에게 신청할 수 있다.","세관장은 경정청구를 받은 날로부터 6개월 이내에 세액을 경정하거나 경정해야 할 이 유가 없다는 뜻을 청구인에게 통지해야 한다.","세관장은 납세의무자가 납부해야 하는 관세액이 1만 원 미만인 경우, 징수하지 않으며 징수금액의 최저한은 휴대품이나 탁송품의 과세에도 적용된다.","납세의무자는 납세신고한 세액의 납부 전에 세액의 과부족(過不足)을 알게 됐을 때 납 세신고한 세액을 정정할 수 있다. 이 경우 납부기한은 당초 납부기한으로 한다."],"answer":4},{"section":"무역규범","num":17,"stem":"17. 다음 괄호 안에 들어갈 관세로 올바른 것은? Ÿ A국은 B국산 철강 제품에 대한 값싼 전기요금이 사실상 정부보조금에 해당하는 만큼 B국산 철강 제품에 ( )를 부과한다고 최종 결정했다. Ÿ 이에 B국은 해당 결정에 대해 국제재판소 제소 등을 통해 전기요금 보조금 쟁점 을 적극 방어해 나갈 계획이라고 밝혔다.","choices":["덤핑방지관세","보복관세","상계관세","긴급관세"],"answer":3},{"section":"무역규범","num":18,"stem":"18. 다음 상황에서 납부해야 하는 관세로 올바른 것은? (단, 모든 가격은 객관적이고 수량 화할 수 있는 자료에 근거하는 것으로 가정한다) Ÿ 수입물품 가격: 10,000,000원 Ÿ 수입물품 가격에 포함되지 않은 우리나라에 도착할 때까지 발생한 해상운임: 2,000,000원 Ÿ 구매자가 부담하는 중개료: 300,000원 Ÿ 수입물품 가격에 포함되지 않은 우리나라에 도착한 후 발생한 내국 운송료: 500,000원 Ÿ 기본관세율: 8%","choices":["944,000원","984,000원","1,004,000원","1,044,000원"],"answer":2},{"section":"무역규범","num":19,"stem":"19. 다음 기사의 내용 중 ( ) 안에 들어갈 용어로 올바른 것은? Ÿ 수입 항공기 부품에 대한 관세 면제 조치가 2024년 말로 일몰되면서 2025년부터 매 년 20%p씩 관세 감면율이 줄어 2029년부터는 관세 감면 혜택이 모두 사라진다. Ÿ 항공기 부품의 관세 면제 조치내용은 관세법 제89조( )에 들어 있다. <출처: 조선비즈(2024. 9. 2.)>","choices":["학술연구용품의 감면","특성물품의 면세","환경오염방지물품 등에 대한 감면","세율불균형물품의 면세"],"answer":4},{"section":"무역규범","num":20,"stem":"20. 관세법상 납세의무자가 납부한 관세를 돌려받을 수 있는 제도에 관한 설명 중 잘못된 것은?","choices":["수입신고가 수리된 물품이 계약 내용과 다르고 수입신고 당시의 성질이나 형태가 변 경되지 않은 상태에서 수입신고 수리일부터 1년 이내 보세구역에 반입하면 관세를 환 급할 수 있다.","수입신고가 수리된 개인의 자가사용물품이 수입한 상태 그대로 수입신고 수리일로부 터 6개월 이내에 보세구역에 반입됐다가 다시 수출되는 경우 관세를 환급할 수 있다.","납세의무자가 신고납부한 세액이 과다한 사실을 알았을 경우, 수입신고 수리일부터 3 년 이내에 신고 세액의 경정을 세관장에게 청구할 수 있다.","세관장은 납세의무자가 관세 등을 초과해 납부한 금액을 청구하면 지체없이 이를 관 세환급금으로 결정하고 30일 안에 환급해야 한다."],"answer":3},{"section":"무역규범","num":21,"stem":"21. 관세법령상 보세구역의 장치 및 화물관리에 관한 설명으로 올바른 것은?","choices":["보세구역에 장치된 외국 물품의 전부 또는 일부를 견본품으로 반출하려는 자는 해당 보세구역의 운영인이나 화물관리인의 허가를 받아야 한다. 국제무역선에서 물품 하역 전에 외국 물품의 일부를 견본품으로 반출하려는 경우에도 마찬가지다.","보세구역이 아닌 장소에 장치하려는 자는 세관장의 허가를 받아야 한다. 이 때 세관장 은 외국 물품에 대해 그 물품의 관세에 상당하는 담보의 제공, 필요한 시설의 설치 등 을 명할 수 있다.","부패·손상되거나 기타 사유로 보세구역에 장치된 물품을 폐기하려는 자는 세관장의 승인을 받아 폐기할 수 있으나, 보세구역에 장치된 물품의 경우에 원형을 변경하거나 해체·절단 등의 작업을 할 수 없다.","보세구역에 장치된 물품의 현상 유지를 위해 필요한 보수작업과 일정한 범위에서 포 장을 바꾸거나 구분·분할·합병을 하거나 기타 유사한 보수작업은 할 수 있다. 이 경 우 외국 물품은 수입될 물품의 보수작업의 재료로 사용될 수 있다."],"answer":2},{"section":"무역규범","num":22,"stem":"22. 다음 통관에 관한 설명 중 잘못된 것은?","choices":["상표권·저작권·특허권 등 관세법에서 정하는 지식재산권을 침해하는 물품은 수출하 거나 수입할 수 없다.","수입할 때 법령상 허가·승인·표시 등을 갖출 필요가 있는 물품의 경우, 수입통관이 완료된 후 각 법령의 중앙행정기관의 장에게 반드시 해당 조건이 충족된 사실을 증명 해야 한다.","세관장은 안전성 검사에서 불법·불량·유해 물품으로 확인된 경우, 해당 물품의 통관 을 보류할 수 있다.","세관장은 법령에 따라 원산지를 표시해야 하는 물품에 관련 표시가 없는 경우, 해당 물품의 통관을 허용해서는 안 된다. 다만, 해당 위반사항이 경미한 경우에는 이를 보 완·정정하도록 한 후 통관을 허용할 수 있다."],"answer":2},{"section":"무역규범","num":23,"stem":"23. 관세법령상 관세행정구제제도에 관한 설명으로 올바른 것을 모두 고른 것은? A. 수입물품에 부과하는 내국세 등의 환급에 관한 세관장의 처분에 불복하는 자는 심사청구 및 심판청구를 할 수 없다. B. 해당 처분에 대해 당사자가 이의신청·심사청구 또는 심판청구를 하면 해당 처분의 집행은 정지된다. C. 관세청장은 심사청구의 내용이나 절차가 보정될 수 있다고 인정되는 경우, 20일 이내의 기간을 정해 해당 사항의 보정을 요구할 수 있다. 다만, 보정할 사항이 경 미한 경우에는 직권으로 보정할 수 있다. D. 동일한 처분에 대하여 심사청구와 심판청구를 중복해 제기할 수 없다. E. 행정소송은 심사청구나 심판청구에 따른 결정을 통지받은 날부터 90일 이내에 제 기해야 한다.","choices":["A, C, D","B, C, D","B, D, E","C, D, E"],"answer":4},{"section":"무역규범","num":24,"stem":"24. ㈜KITA는 수입 원재료를 이용해 국내에서 의류를 제조‧수출하는 회사이다. 다음 중 관 세환급특례법에 따라 관세환급을 신청한 경우에 해당하는 것을 모두 고른 것은? A. ㈜KITA는 관세를 납부하고 프랑스에서 원단을 수입했으나, 당초 요구했던 품질에 미흡한 원단임이 확인돼 다시 프랑스로 수출하고 관세환급을 신청했다. B. ㈜KITA는 미국에서 원단을 수입해 관세를 납부한 후, 수입한 상태 그대로 일본에 유상 수출하고 관세환급을 신청했다. C. ㈜KITA은 미국에서 원단, 실, 단추 등을 수입한 후 의류를 제조했다. 이들 의류를 영국에 유상으로 수출하고, 수입 시 납부한 관세의 환급을 신청했다. D. ㈜KITA는 베트남에서 원단 수입 시 관세(10%)를 납부하고 수입통관을 한 후, FTA 사후 협정세율(0%)을 적용하기 위해 관세환급을 신청했다.","choices":["A, C","B, C","B, D","C, D"],"answer":2},{"section":"무역규범","num":25,"stem":"25. 관세환급특례법상 관세 등을 환급 신청할 때 필요한 서류에 관한 설명으로 잘못된 것 은?","choices":["개별환급에 필요한 증명서류에는 수입세액분할증명서, 소요량계산서, 원산지증명서 등 이 있다.","수입된 원재료를 국내에서 제조, 가공 후 납품할 때 수출용 원재료에 대해 납부한 관 세액을 증명하는 서류는 기초원재료납세증명서이다.","세관장은 내국신용장 등에 의해 물품을 공급한 자에게 관계 법령에서 정하는 바에 따 라 기초원재료납세증명서 또는 수입세액분할증명서를 발급하게 할 수 있다.","세관장은 관세 등의 환급이 제한되는 물품의 경우, 환급이 제한된 세액을 공제하고 기 초원재료납세증명서 등을 발급해야 한다."],"answer":1},{"section":"무역규범","num":26,"stem":"26. 다음 관세환급특례법상 설명에 해당하는 소요량 산정 방법은? Ÿ 소요량은 제조사양서상의 원재료 중 환급을 받으려는 원재료의 종류별 양으로 산정 한다. Ÿ 소요량의 적용기간은 소요량이 변경되기 전까지 생산된 수출물품의 소요량 계산에 적용한다. Ÿ 비료, 염료, 페인트 등 화학제품류 생산업체에 적합하다.","choices":["단위실량 산정방법","수출건별 등 총소요량 산정방법","위탁건별 총소요량 산정방법","단위설계소요량 산정방법"],"answer":4},{"section":"무역규범","num":27,"stem":"27. 관세환급특례법상 소요량 산정방법과 관련된 설명으로 잘못된 것은?","choices":["소요원재료의 등급이 다른 이유 등으로 소요량이 불안정한 농·수·축·임산물을 원 재료로 생산되는 수출물품은 수출건별 등 총소요량 산정방법 또는 위탁건별 총소요량 산정방법으로 소요량을 산정해야 한다.","소요량은 수출물품 생산에 쓰이는 원재료의 양을 말하며, 생산과정에서 정상적으로 발 생되는 손모량도 여기에 포함된다.","시제품 생산단계로 손모율이 불안정한 수출물품은 일정기간별 단위소요량 산정방법 또는 1회계연도 단위소요량 산정방법으로 소요량을 산정해야 한다.","관세환급특례법상 소요량 산정방법 중 소요량 산출은 용이하나 수출물품 제조에 소요 된 실제소요량보다 적게 산출되는 소요량은 단위실량 산정방법이다."],"answer":3},{"section":"무역규범","num":28,"stem":"28. 자유무역협정(FTA)관세법령상 협정관세의 적용에 관한 설명으로 잘못된 것은?","choices":["협정관세를 적용받으려는 자는 수입신고 수리 전까지 대통령령으로 정하는 바에 따라 세관장에게 협정관세의 적용을 신청해야 한다.","협정관세의 세율이 관세법에 따른 적용세율과 같거나 높은 경우에는 관세법에 따른 적용세율을 우선해 적용한다.","수입신고 수리 전까지 협정관세의 적용신청을 하지 못한 수입자는 해당 물품의 수입 신고일부터 1년 안에 대통령령으로 정하는 바에 따라 협정관세의 적용을 신청할 수 있다.","세관장은 협정관세의 적용신청을 받은 경우에는 수입신고를 수리한 후에 심사한다. 다 만, 관세 채권을 확보하기가 곤란하거나 수입신고 수리 후 원산지 및 협정관세 적용의 적정 여부를 심사하는 것이 부적당하다고 인정해 기획재정부령으로 정하는 물품은 수 입신고 수리 전에 심사한다."],"answer":3},{"section":"무역규범","num":29,"stem":"29. FTA관세법상 원산지 결정기준에 관한 설명으로 올바르지 못한 것은?","choices":["해당 물품의 전부를 생산·가공 또는 제조한 국가를 원산지로 한다.","‘세번변경기준’은 해당 물품이 2개국 이상에 걸쳐 생산된 경우로서 해당 물품의 품 목번호와 물품의 생산에 사용된 원산지 재료의 품목번호가 일정 단위 이상 다를 때, 해당 물품의 최종 생산국을 원산지로 인정하는 기준이다.","‘부가가치기준’은 해당 물품이 2개국 이상에 걸쳐 생산된 경우, 해당 물품에 대해 일정 수준 이상의 부가가치를 창출한 국가를 원산지로 인정하는 기준이다.","해당 물품이 생산·가공 또는 제조된 후에 원산지가 아닌 국가를 경유해 운송되거나 원산지가 아닌 국가에서 선적된 경우, 해당 물품의 원산지로 인정하지 않는다. 다만, 해당 물품이 원산지가 아닌 국가의 보세구역에서 운송 목적으로 환적됐거나 일시적으 로 보관됐다고 인정되는 경우에는 그렇지 않다."],"answer":2},{"section":"무역규범","num":30,"stem":"30. FTA관세법상 원산지증명서에 관한 설명으로 올바른 것은?","choices":["한-중 FTA협약의 원산지증명서는 중국과의 협정에 따라 수출자 또는 생산자가 자율적 으로 작성하고 서명한 것이어야 한다.","FTA관세법령상 미합중국과의 협정의 원산지증명서 유효기간은 발급일로부터 1년이다.","수입자·수출자 및 생산자는 원산지증빙서류를 2년의 범위에서 대통령령으로 정하는 기간 동안 보관해야 한다.","원산지증명서의 기재사항은 협정에서 다르게 규정하는 경우를 제외하고는 영문으로 작성돼야 한다."],"answer":4},{"section":"무역결제","num":1,"stem":"1. 외국환거래에 관한 일반적인 설명으로 잘못된 것은?","choices":["환(exchange)은 금융기관의 중개를 통한 지급위탁의 방법으로 결제하는 것이다.","외국환거래의 특징은 환율 문제의 발생, 대차 관계의 발생, 이자 요소의 개입, 국가 간 국제수지의 발생 등이다.","무역과 관련된 외환거래에서 전신환매도율이 적용되는 경우는 당발송금, 타발추심, 수 입신용장 결제 등이다.","외국환의 발생 원인 중에서 경상거래는 해외직접투자와 서비스거래, 자본거래는 대부 나 차관거래 등이다."],"answer":4},{"section":"무역결제","num":2,"stem":"2. 송금 방식 거래에 관한 설명으로 잘못된 것은?","choices":["건당 미화 100만 달러의 수출대금을 사전송금 방식으로 영수한 국내기업 ㈜KB상사는 외국환거래규정에 따라 대응수출을 하거나 해당 대금을 반환해야 한다.","직접 물품 품질의 확인이 중요한 귀금속을 수입하는 국내 수입기업 ㈜한무상사는 다 른 조건이 동일하다면 CAD 방식 거래보다 COD 방식 거래를 이용하는 것이 유리하다.","CAD 거래는 수출자가 물품을 선적한 후 자신이 발행한 환어음과 선적서류를 수입자 에게 제시해 대금을 결제받는 방식으로 ‘유럽식 D/P’라고도 한다.","수출자인 ㈜한역상사가 기존 사후송금 방식 거래를 사전송금 방식 거래로 변경한다면 해외 수입자의 신용위험을 더 효과적으로 관리할 수 있다."],"answer":3},{"section":"무역결제","num":3,"stem":"3. O/A 결제 방식에 관한 설명으로 올바른 것은?","choices":["O/A 방식에서 수출자가 물품을 수입국에 소재하는 수출자의 지사에 송부하면 수입자 는 현물상환 방식으로 즉시 송금해야 한다.","O/A 결제 방식으로 거래하는 수출자는 O/A Nego라는 일종의 수출금융을 제공받을 수 도 있다.","다른 조건이 동일하다면, O/A 결제 방식으로 거래하는 수출자는 일람불신용장 결제 방식으로 거래하는 경우보다 더 낮은 가격으로 계약하려 할 가능성이 크다.","다른 조건이 동일하다면, 수출자는 CWO 방식에 비해 O/A 방식을 더 선호하게 된다."],"answer":2},{"section":"무역결제","num":4,"stem":"4. 다음 중 수출자가 기한부 환어음을 발행하고, 수입자가 환어음을 인수(acceptance)하는 결제 방식은?","choices":["T/T","COD","D/P","D/A"],"answer":4},{"section":"무역결제","num":5,"stem":"5. 대금교환 방식(COD, CAD)에 대한 설명으로 잘못된 것은?","choices":["COD, CAD는 물품 또는 선적서류의 인도와 동시에 수출대금을 결제하는 방식이다. 수 출자가 선적을 먼저 진행하고 송금받기 때문에 사후송금 방식으로 구분할 수 있다.","COD는 수출자가 물품을 수입지에 있는 자신의 대리인에게 보내고, 수입자가 물품의 품질 등을 검사한 후 물품과 대금을 교환하는 방식으로 직접 물품을 검사하기 전에는 품질을 파악하기 어려운 경우에 활용된다.","CAD는 수출자가 선적 후 선적서류를 수출국에 있는 수입자의 대리인에게 제시하거나 수입자에게 직접 송부하고, 서류와 상환해 대금을 받는 방식이다.","CAD는 현물상환 방식으로서 가장 부합하는 정형거래조건은 DDP(관세지급 인도) 조건 이다."],"answer":4},{"section":"무역결제","num":6,"stem":"6. 추심결제 방식에 대한 설명으로 올바른 것은?","choices":["추심의뢰은행은 외국의 법률과 관행에 따라 부과되는 모든 의무와 책임을 최종적으로 부담해야 하며, 이로 인해 발생한 다른 은행의 비용과 손실에 대해서도 최종적으로 보 상해야 한다.","화환추심(documentary collection)에서 ‘분할지급’은 추심지시서에 명시가 없더라도 허용된다.","추심지시서(collection instruction)에 추심의 방식이 D/A인지 D/P인지 명시되지 않았다 면 D/A인 것으로 간주된다.","환어음의 지급인(drawee)은 은행이 아닌 수입자로 표시돼야 한다."],"answer":4},{"section":"무역결제","num":7,"stem":"7. 신용장 거래의 기본원칙에 관한 설명으로 올바른 것은?","choices":["개설의뢰인이 개설은행의 도움 없이 수입품을 회수했다면, 개설은행은 하자 있는 서류를 거절할 수 없다.","개설은행이 신용장 대금을 매입은행에 상환한 후 법원이 injunction을 발급했다면, 개설은행은 injunction을 근거로 상환자금의 반환을 청구할 수 없다.","신용장을 이용하면 수출자는 credit risk를 낮출 수 있고, 수입자는 commercial risk 를 제거하는 효과를 얻을 수 있다.","UCP 600은 신용장 거래의 기본원칙으로 한계성을 규정하고 있다."],"answer":2},{"section":"무역결제","num":8,"stem":"8. 국제결제 시스템인 SWIFT에 관한 설명으로 잘못된 것은?","choices":["SWIFT는 전 세계적으로 통용되는 금융기관 간 금융정보 통신망으로 한국은 1992년부 터 도입해 대부분의 외국과의 자금 이체 및 금융 메시지 교환 등이 SWIFT를 통해 이 루어진다.","BIC(Business/Bank Bank Identifier Code)는 SWIFT에 가입한 은행 등 금융기관에 부여 된 고유번호이다.","중국은 2015년부터 위안화의 안정성과 효율성을 높이기 위해 SWIFT를 사용하지 않고, 위안화의 국제결제 시스템인 CIPS로 대체해 사용 중이다.","SWIFT에서 MT는 정형화된 Message Type으로서 MT200~210(은행 간 자금 이체), MT100~112(고객 송금), MT700~754(신용장) 등과 같이 구분해 사용되고 있다."],"answer":3},{"section":"무역결제","num":9,"stem":"9. 화환신용장에 관한 설명으로 올바른 것은?","choices":["수출자가 신용장 조건변경서를 전달받은 후 통지은행에 별도 통보 없이 수출계약을 실행했다면, 신용장의 조건 변경에 동의한 것으로 해석한다.","신용장 금액 중 10%에 대해 선급을 허용하고 있는 신용장을 받은 수출자가 선급금 을 청구하지 않으면 해당 신용장은 모두 무효가 되어 사용할 수 없게 된다.","신용장에 “transferable” 표기가 없더라도 신용장 대금의 양도는 가능하다.","수출신용장을 근거로 내국신용장이 개설된 경우, 수출신용장의 조건 변경이 유효하 려면 내국신용장 수익자의 동의가 필요하다."],"answer":3},{"section":"무역결제","num":10,"stem":"10. 신용장의 개설 및 절차에 관한 내용으로 잘못된 것은?","choices":["신용장은 “irrevocable”이라는 표시가 없더라도 취소 불능이지만, 일반적으로 SWIFT 신용장 40A(form of documentary credit)에는 “irrevocable”이라는 문구가 표시된다.","신용장의 “Shipment is subject to our further instruction”이라는 문구는 수익자에게 불리한 독소조항이므로 수익자는 삭제하는 조건변경을 하는 것이 좋다.","신용장에 사용방법으로 매입, 지급, 연지급, 인수신용장 중에 하나를 명시하지 않았다 면 매입신용장으로 간주해 진행한다.","신용장에 “Surrendered B/L acceptable”이라고 기재됐다면 개설은행은 수입화물에 대한 담보권 확보가 어렵다."],"answer":3},{"section":"무역결제","num":11,"stem":"11. 신용장 요구서류의 수리 요건에 관한 설명으로 잘못된 것은?","choices":["선하증권 발행 시 서명한 대리인(갑)과 선하증권 정정 후 인증(authentication) 시에 서명한 대리인(을)이 다른 경우에는 수리 거절의 근거가 된다.","신용장 통화가 미 달러화(US$)인 경우, [수익자 주소 – 대한민국의 주소, 금액 – 달 러화($)]로 표기한 송장은 수리 거절된다.","신용장에서 상업회의소가 발행한 원산지증명서를 요구하는 경우, 세관이 발행한 원 산지증명서를 제시하더라도 수리 가능하다.","신용장이 항공운송서류 원본 전통을 요구하는 경우, 수익자가 원본 1부(제3 원본)를 제시하더라도 수리 가능하다."],"answer":1},{"section":"무역결제","num":12,"stem":"12. SWIFT 신용장의 각 항목(field)에 관한 해설로 가장 올바른 것은?","choices":["[41D Available with 한솔은행 by negotiation]으로 기재된 경우에 수출자는 서류를 개설은행에 직접 제시할 수 없고 반드시 한솔은행을 경유해 제시해야 한다.","[48 Period for Presentation: ____ ]로 되어 있고, Forwarder’s Cargo Receipt(FCR) 를 요구한다면, 수익자는 서류를 신용장 유효기간 내에 제시하면 된다.","수출국 상업회의소 발행 원산지증명서(C/O issued by chamber of commerce in exporting country)를 요구했다면, 반드시 수익자 소재국 상업회의소가 발행한 것을 제시해야 한다.","[46A Documents Required: Signed Commercial Invoice]로 기재된 경우, 상업송장에 반드시 수기로 서명해야 한다."],"answer":2},{"section":"무역결제","num":13,"stem":"13. SWIFT 신용장 46A(Documents Required)에 다음과 같이 명기됐다면, 관련 설명으로 잘못 된 것은? FULL SET ORIGINAL CLEAN ON BOARD MARINE BILLS OF LADING MADE OUT TO THE ORDER OF XYZ BANK, MARKED \"FREIGHT PREPAID\" AND NOTIFY APPLICANT WITH FULL ADDRESS AND MENTIONING THIS DC NO.","choices":["물품이 본선에 적재됐음을 나타내는 본선적재 선하증권을 요구한다.","수하인란에 TO THE ORDER OF XYZ BANK가 표시된 지시식 선하증권을 요구한다.","운임선불조건으로 수익자가 선하증권을 발급받기 위해서는 운송인에게 운임을 지불해 야 한다.","개설의뢰인의 주소와 화환신용장 번호가 기재된 선하증권 원본 1통을 제시하면 된다."],"answer":4},{"section":"무역결제","num":14,"stem":"14. 다음 신용장통일규칙 조항이 의미하는 설명으로 올바른 것은? The fact that a credit is not stated to be transferable shall not affect the right of the beneficiary to assign any proceeds to which it may be or may become entitled under the credit, in accordance with the provisions of applicable law. This article relates only to the assignment of proceeds and not to the assignment of the right to perform under the credit.","choices":["신용장에 관한 권리와 의무를 양도하는 양도가능신용장에 관한 조항이다.","네고서류 등 신용장에 따른 의무를 이행해야 하는 자는 제2 수익자인 양수인이고, 대 금을 받을 수 있는 권리를 가지는 자도 제2 수익자인 양수인이다.","Proceed(대금) 양도를 위해서는 신용장에 “양도 가능(transferable)”이라는 문구가 반 드시 있어야 하는 것은 아니다.","신용장에 별도의 명시가 없는 한 양도는 1회에 한하며, 양도는 특별히 지정된 은행만 취급할 수 있다."],"answer":3},{"section":"무역결제","num":15,"stem":"15. 신용장 결제에 사용되는 환어음에 관한 내용으로 잘못된 것은?","choices":["환어음은 신용장에 명시된 지급인 앞으로 신용장의 통화와 일치시켜 발행해야 한다.","신용장상 어음조건이 “30 days after shipment date”와 “30 days from shipment date”인 경우 두 조건의 만기일은 동일하다.","환어음은 수익자를 포함해 매입은행 등 대금 지급을 청구하는 자가 발행해야 하며, 서 명과 발행일의 표시는 없어도 된다.","만일 환어음에 기재된 숫자금액과 문자금액이 상이하면 문자금액을 기준으로 심사해 야 한다."],"answer":3},{"section":"무역결제","num":16,"stem":"16. 다음 UCP 600과 ISBP 745가 적용되는 화환신용장에 관한 해석 중 모두 올바른 것으 로만 짝지어진 것은? A. 지정은행에서 매입이 가능한 신용장의 경우, 환어음은 해당 지정은행을 지급인으로 해 발행돼야 한다. B. 비서류적 조건이라 하더라도 비서류적 조건 사이에 정보의 저촉이 있어서는 안 된다. C. 신용장에서 별다른 명시가 없다면, 상업송장의 금액과 보험서류의 부보금액은 신용장 에 표시된 통화와 동일하게 표기돼야 한다. D. 수익자가 발행한 중량명세서라면 다른 서류에 나타난 송장번호, 운송항로와 상이하게 기재돼 있어도 된다. E. 원산지증명서에 표시된 송하인과 운송서류에 나타난 송하인이 상이해도 된다.","choices":["A, B","C, D, E","A, C, D","B, C, E"],"answer":4},{"section":"무역결제","num":17,"stem":"17. ISBP 745의 규정에 따라 작성된 서류에 관한 설명으로 잘못된 것은?","choices":["Commercial Invoice를 요구했다면 Invoice도 수리 가능하다.","Packing List에 컨테이너 번호를 기재했다면 컨테이너 봉인번호도 기재돼야 한다.","Quality Certificate상에 기재된 수량은 운송서류에 기재된 수량과 상이할 수 있다.","Beneficiary’s Certificate에는 발행일자는 없어도 되지만, 반드시 서명이 있어야 한다."],"answer":2},{"section":"무역결제","num":18,"stem":"18. Standby L/C와 청구보증서(Demand Guarantee)에 관한 설명으로 잘못된 것은?","choices":["Standby L/C와 청구보증서는 보증용으로 사용되기 때문에 주채무에 대한 부종성과 추 상성을 특성으로 한다.","개설은행의 보증채무 발생 시점은 기본적인 계약관계가 성립하는 때이다. 한편 화환신 용장은 수익자가 정당한 서류를 제시해 지급을 요청하는 때에 채무가 발생한다.","장점은 이행보증 및 금융보증 등 용도의 다양성이며, 단점은 기본 계약상 의무가 이행 되지 않았다는 수익자의 진술서만 있으면 되는 부당청구의 우려이다.","국제규칙으로 Standby L/C는 ISP 98과 UCP 600이 적용되며, 청구보증서는 URDG 758 이 적용된다."],"answer":1},{"section":"무역결제","num":19,"stem":"19. 보증서에 관한 설명으로 올바른 것은?","choices":["계약이행보증서의 경우에 보증서의 금액은 계약금액으로, 보증서의 기간은 계약기간으 로 명시해 발급된다.","입찰보증서의 경우, 보증서의 유효기간은 입찰 결과 발표일까지이다.","현지금융보증서의 경우, 보증서 기간이 만료되면 해당 기간을 연장하는 경우가 많다.","선수금환급보증서의 경우, 보증서 유효기간 내에 화환신용장이 개설돼야 한다."],"answer":3},{"section":"무역결제","num":20,"stem":"20. Factoring과 Forfaiting 거래의 비교에서 잘못된 것으로만 짝지어진 것은? 비교 Factoring Forfaiting A 금액 일반적으로 소액 비교적 거액 B 외상기간 단기(1년 이내) 장기(2~10년) C 소구권 Without Recourse With / Without Recourse D 금리 제한 없음 고정금리로만 할인 E 지급근거 Factor의 사용승인 수입자은행의 지급보증(Aval) F 거래방식 Usance 환어음, 약속어음 사후송금 방식 G 대상채권 현재 및 미래 발생할 매출채권 개별로 확정된 매출채권 H 국제규칙 URF 800 없음 I 취급은행 수출입은행, 기업은행 등 일부 외국계 은행, 대부분 외국환은행","choices":["A, C, E","B, F, I","C, F, H","D, G, H"],"answer":3},{"section":"무역결제","num":21,"stem":"21. 수출업자가 활용할 수 있는 주요 무역보험에 관한 설명 중 잘못된 것은?","choices":["환변동보험은 수출입을 통해 외화를 획득 또는 지급하는 과정에서 발생할 수 있는 환 차손익을 제거, 미리 외화 금액을 원화로 확정해 환율변동에 따른 위험을 헤지(hedge) 한다.","수출신용보증(선적후)은 중소·중견기업이 수출물품을 제조, 가공하거나 조달할 수 있 도록 금융기관에서 필요한 자금을 대출받을 때 한국무역보험공사가 연대 보증한다.","단기수출보험(단체보험)은 지방자치단체 등 지원기관 또는 협회 등 단체가 보험계약 절차를 진행해 일괄 보험계약을 체결하고, 수출자는 단체보험의 피보험자로서 수출대 금 미회수 위험 발생 시 최대 미화 10만 달러(지자체별 상이)까지 보상받는다.","단기수출보험(포페이팅)은 은행이 포페이팅 수출금융 취급 후 신용장 개설은행으로부 터 만기에 수출대금을 회수하지 못해 입게 되는 손실을 보상한다."],"answer":2},{"section":"무역결제","num":22,"stem":"22. 내국신용장의 개념, 개설조건, 관계당사자 등에 관한 설명으로 잘못된 것은?","choices":["내국신용장은 무역금융을 활용하려는 업체가 과거 수출실적 또는 Master L/C 등 융자 대상 증빙을 근거로 신청할 수 있는 국내용 신용장이다.","내국신용장 표시통화는 원화, 외화, 개설일 매매기준율로 환산한 외화 금액을 부기한 원화 중 하나이어야 한다.","수익자는 거래 대상 물품을 국내에서 생산(가공)할 능력을 보유한 제조업체만 해당한 다.","서류 제시기간은 물품수령증명서 발급일로부터 5영업일 이내이다. 단, 개설의뢰인과 수혜자의 소재지가 원격지이면 7영업일로 연장된다."],"answer":3},{"section":"무역결제","num":23,"stem":"23. 국제금융시장에서 자국 통화와 미국 달러화의 환율을 미국식(American term)으로 표시 하는 국가가 아닌 것은?","choices":["영국","스웨덴","그리스","핀란드"],"answer":2},{"section":"무역결제","num":24,"stem":"24. 다음 국제금융시장에서 USD/KRW, USD/JPY의 환율을 나타낸 표에서 6개월 전 환율과 현재 환율에 관한 설명으로 잘못된 것은? (환율표시에서 앞의 것이 기준통화) 구분 6개월 전 현재 USD/KRW 1400.00 1200.00 USD/JPY 140.00 130.00","choices":["6개월 전과 비교할 때 미 달러화는 원화에 대해 평가절하됐다.","6개월 전과 비교할 때 일본 엔화는 미 달러화에 대해 평가절상됐다.","6개월 전과 비교할 때 미국으로 수출해 달러를 수령하는 한국업체는 가격경쟁력이 약 화됐다.","6개월 전과 비교할 때 일본으로 여행하는 한국의 관광객은 원화로 지불하는 여행경비 의 부담이 증가했다."],"answer":4},{"section":"무역결제","num":25,"stem":"25. 외환시장에서 USD/KRW의 현물환율과 간편식으로 산출한 6개월 선물환율이 다음과 같 % 다. 단기금융시장에서 USD의 6개월 금리가 연율 3 로 거래된다면 KRW의 6개월 금리 와 가장 가 까운 것은? (환율표시에서 앞의 것이 기준통화) USD/KRW 현물환율 1400 USD/KRW 6개월 선물환율 1414 USD 6개월 금리 연율 3%","choices":["연율 5%","연율 4%","연율 2%","연율 1%"],"answer":1},{"section":"무역결제","num":26,"stem":"26. 우리나라의 환율제도 및 환율 등에 관한 설명으로 올바른 것은?","choices":["한국의 환율제도는 외환의 수요와 공급으로 환율이 결정되며, 변동제한폭 없이 외국환 은행이 자유롭게 환율을 고시하는 자유변동환율제를 택하고 있다.","뉴스에서 환율이 올랐다고 표현하는 것은 미 달러화를 기준으로 원화 가치가 올랐다 는 것을 의미한다.","외국환은행이 매일 1회차로 고시하는 환율은 통화별로 가중치를 부여한 복수통화바스 켓 환율이다.","당발 송금환이란 국내 수입자가 외국환을 전신환(T/T)으로 매입해 외국의 수출자에게 보내는 매입환(buying exchange)을 말한다. 떤 환위험에 관한 설명인가? (환율표시에서 앞의 것이 기준통화)"],"answer":1},{"section":"무역결제","num":27,"stem":"27. 다음은 어 (주)한국축산은 국산 사료로 한우를 길러 거래처인 국내 백화점에 납품하고 원화로 대금을 수령한다. 이 회사는 수입은 전혀 하지 않으며 쇠고기의 수출 또한 없다. 외 화표시 부채도 없고, 해외 현지법인도 없다. 그런데 이 회사는 최근 급속한 USD/KRW 환율 하락으로 고전하고 있다. 왜냐하면 환율 영향으로 미국산 등 수입 쇠고기 가격이 인하되면서 한우의 가격경쟁력이 약화 되고 있기 때문이다.","choices":["거래 환위험","영업 환위험","무역 환위험","환산 환위험"],"answer":2},{"section":"무역결제","num":28,"stem":"28. 외환 수요가 많은 수입업체가 선택할 수 있는 환위험 관리방법 중에서 가장 바람직한 것 은?","choices":["리딩(leading)으로 일정 기간의 외환포지션을 산출한 후, 통화선물 매도거래를 통해 환 위험을 헤지(hedge)한다.","매칭(matching)으로 일정 기간의 외환포지션을 산출한 후, 선물환 매입거래를 통해 환 위험을 헤지한다.","상계(netting)로 일정 기간의 외환포지션을 산출한 후, 통화 풋옵션 매입거래를 통해 환위험을 헤지한다.","포트폴리오(portfolio)로 일정 기간의 외환포지션을 산출한 후, 통화 콜옵션 매도거래를 통해 환위험을 헤지한다. 크"],"answer":2},{"section":"무역결제","num":29,"stem":"29. 다음 중 환리스 의 내부적 관리기법이 아닌 것은?","choices":["한국에 본사가 있는 ㈜K물산은 미국 현지법인과의 채권과 채무에서 같은 금액을 소멸 시키고 차액만을 결제했다.","한국전자㈜는 일본에서 전자부품을 수입하면서 수입대금을 엔화로 지급하는데, 엔화 환율 상승이 예상돼 상승하기 전에 수입대금을 서둘러 지급했다.","㈜영돈축산은 국내에서 수요가 적은 돼지고기 부위를 가공해 수출하면서 환율 하락이 우려되어 한국무역보험공사의 환변동보험에 가입했다.","푸른산목재㈜는 인도네시아 원목을 수입, 합판으로 가공해 중국에 수출하면서 수출대 금 수취시기와 수입대금 지출시기를 일치시켰다."],"answer":3},{"section":"무역결제","num":30,"stem":"30. 다음에서 설명하는 환리스 크 외부적 관리기법은 무엇인가? ∙ 불특정 다수가 참여하는 시장에서 거래가 이뤄지기 때문에 거래이행의 보장이 확실하 다. ∙ 환율변동 위험을 제거하기 위한 수단으로 사용할 수 있으며, 변동에 따른 수익을 목 적으로 하는 투기적 거래도 있다. ∙ 모든 계약에 증거금이 필요하며, 많은 경우 만기 이전에 청산이 이루어지기 때문에 현물 시세의 변동상황에 따라 적절하게 대응할 수 있다. ∙ 거래통화, 거래금액, 가격, 계약단위, 만기일 등이 표준화돼 있다. ∙ 특정 통화를 미래의 일정 시점에 매입(call option) 또는 매도(put option)하기로 약정 하는 방법으로 사용된다.","choices":["선물환","통화선물","통화옵션","포트폴리오"],"answer":2},{"section":"무역계약","num":1,"stem":"1. 무역계 의 준거법(go erning la )에 관한 설명으로 잘못된 것은?","choices":["계약당사자 간의 약정에 따라 일방 당사자가 속한 국가의 국내법이 계약의 준거법이 되기도 한다.","당사자 간 합의는 최우선으로, 국제무역계약법의 강행규정보다도 우선 적용된다.","준거법에 대한 당사자 간의 합의가 없는 경우는 법정지(法庭地)의 법원이 국제사법에 따라 준거법을 결정한다.","Incoterms와 UCP 600은 국제통일규칙이며, 적용을 명시적으로 의도한 경우에만 적용 된다."],"answer":2},{"section":"무역계약","num":2,"stem":"2. Incoterms 2020에 관한 설명으로 올바른 것은?","choices":["EXW에서 매도인은 지정 인도장소에서 물품을 수취용 차량에 적재한 상태로 매수인의 처분하에 둠으로써 인도한다.","FCA에서 매도인은 수입을 위하거나 제3국 통과를 위한 통관을 할 의무가 있다.","CPT에서 매도인은 운송계약상 지정목적지에서 양하비용이 발생한 경우, 당사자 간 합 의가 없으면 이 비용을 매수인으로부터 별도로 상환받을 권리가 없다.","DDP에서 매도인은 물품을 지정목적지에서 도착운송수단으로부터 양하해 매수인의 처 분하에 두거나 그렇게 인도된 물품을 조달함으로써 인도해야 한다. 약"],"answer":3},{"section":"무역계약","num":3,"stem":"3. 한국의 무역업자가 미국의 무역업자와 무역계 을 체결할 때 사용에 주의해야 할 무역 조건으로서 Incoterms 2020의 FOB 조건과 유사한 ‘미국식 FOB’는 어 느 것인가?","choices":["FOB(named inland carrier at named inland point of departure)","FOB vessel(named port of shipment)","FOB(named inland carrier at named inland point of exportation)","FOB(named inland point in the country of importation)"],"answer":2},{"section":"무역계약","num":4,"stem":"4. 무역거래에서 Incoterms의 사용에 관한 실무상 유의 으로 올바르지 못한 것은? 점","choices":["무역실무에서 Incoterms는 가격조건으로 사용되지만, 전적으로 가격조건만을 의미하는 것은 아니며, 운송‧보험‧통관 등의 복합조건을 의미한다.","Incoterms 2020 규칙 자체는 매매계약이 아니므로 매매계약에 편입될 때 비로소 계약 의 일부가 된다. 특히 인코텀즈의 버전(예: Incoterms 2020)을 명기하는 것이 중요하다.","Incoterms에서 거래조건 의미의 통일을 위해 변형(variants)을 금지하기 때문에 Incoterms 2020의 11개 조건 이외의 변형된 조건을 사용할 수 없다.","Incoterms는 의무, 위험, 비용 등에 대해 언제 어디에서 매도인으로부터 매수인에게 이 전되고 할당되는지를 규정하고 있다."],"answer":3},{"section":"무역계약","num":5,"stem":"Vienna Convention(1980)과 Incoterms 2020의 관계에 관한 설명 중 잘못된 것은? 5.","choices":["Vienna Convention은 국제물품매매계약에서 청약과 승낙, 청약과 승낙의 취소, 철회, 효 력 발생시기 및 계약의 성립 시점 등을 규정하고 있다.","Incoterms와 Vienna Convention은 국제물품매매에서 당사자의 권리와 의무를 다루고 있 다는 점에서는 공통의 역할을 수행한다.","Incoterms는 매도인과 매수인의 의무와 함께 당사자가 의무를 위반했을 때 상대방은 어떻게 구제권을 행사할 수 있는지에 대해 규정하고 있다.","계약서에서 Incoterms 2020을 적용한다고 약정했다면 관습인 Incoterms가 법률인 Vienna Convention에 우선해 적용된다."],"answer":3},{"section":"무역계약","num":6,"stem":"6. Vienna Convention(1980) 규정상 본질적 계약위반의 효과에 관한 설명으로 잘못된 것은?","choices":["매도인의 의무 불이행이 본질적 계약위반이고, 이 사실을 매수인이 매도인에게 합리적 인 기간 안에 통지한 경우라면 매수인은 대체품 인도를 청구할 수 있다.","물품의 일부 불일치가 계약 전체의 본질적 위반인 경우, 매수인은 계약 전체를 해제할 수 있다.","계약의 이행기일 전에 당사자 일방이 본질적 계약위반을 할 것이 명백한 경우에 상대 방은 계약을 해제할 수 있다.","매도인이 본질적 계약위반을 한 경우라도 매수인에게 위험이 이전되었다면 권리 구제 의 행사를 할 수 없다."],"answer":4},{"section":"무역계약","num":7,"stem":"7. Vienna Convention(1980)에서 규정하고 있는 계약해제에 관한 설명으로 올바른 것은?","choices":["계약해제를 위한 일정한 요건이 충족되면 당사자의 별도 의사표시가 없더라도 자동으 로 계약은 해제된다.","계약해제는 기존의 계약상 의무뿐만 아니라 이미 발생한 모든 손해배상 의무로부터 양 당사자를 면하게 한다.","계약의 전부 또는 일부를 이행한 이후에는 당사자 일방은 상대방에게 해당 계약에서 이미 공급했거나 지급한 것에 대한 반환 청구 권리를 상실한다.","매수인이 지정한 추가기간 안에 매도인이 물품을 인도하지 않거나, 해당 기간 내 의무 를 이행하지 않겠다고 명백히 밝힌 때 매수인은 계약을 해제할 수 있다. 약"],"answer":4},{"section":"무역계약","num":8,"stem":"8. 무역계 의 특성에 관한 설명으로 잘못된 것은?","choices":["무역계약은 일정한 채권, 채무 관계의 발생을 목적으로 복수의 당사자 사이에 서로 다 른 의사표시를 합치시킴으로써 성립하는 법률행위를 말한다.","국제물품매매의 경우 상이한 국가에 속하는 거래 당사자를 구속하는 통일법이 존재하 지 않으므로 정형화된 국제상관습에 준해 계약을 체결, 이행해야 한다.","서류에 의한 상징적 인도가 대부분인 무역거래에서 서류가 물품을 대신하므로 서류의 중요성이 크다.","무역계약의 대상에 불특정물이나 미래의 물품인 선물거래는 포함되지 않는다."],"answer":4},{"section":"무역계약","num":9,"stem":"9. Vienna Convention(1980)의 청약과 승낙에 관한 설명 중 올바른 것은?","choices":["청약은 특정인 앞으로 행해져야 한다. 청약자의 명확한 의사가 없는 불특정 다수에 대 한 의사표시는 청약의 유인으로 간주된다.","청약의 효력이 발생한 이후에는 청약자는 어떠한 경우에도 청약을 철회 및 취소할 수 없다.","피청약자의 침묵에 대해 청약자가 계약이 성립된 것으로 간주하고 물품을 발송하면 피청약자는 이를 받아야 한다.","확정청약은 청약서상에 유효기간이 반드시 설정돼야 하고, “확정(firm)” 또는 “취소 불능(irrevocable)”이라는 표현이 있어야만 한다. 약"],"answer":1},{"section":"무역계약","num":10,"stem":"10. 조건부 청 에 관한 설명으로 잘못된 것은?","choices":["재고 잔류 조건부 청약(offer subject to being unsold)은 확정청약으로 추가 생산계획에 따라 성수기에 필요한 물품을 미리 확보해 판매하려고 할 때 활용된다.","반품 허용 조건부 청약(offer on sale or return)은 청약과 함께 물품을 송부하고, 피청 약자가 판매하며 미판매분을 반품하는 조건을 포함한다.","점검매매 조건부 청약(offer on approval)은 청약과 함께 견본 등을 피청약자에게 송부 해 점검하고, 구매의사에 따라 대금을 지급하거나 반품을 허용하는 내용을 포함한다.","최종 확인 조건부 청약(sub-con offer)은 피청약자의 승낙 이후에 청약자의 최종 확인 이 필요한 경우에 활용된다. 별 약 방식과 포괄계약 방식에 관한 설명으로 올바른 것은?"],"answer":1},{"section":"무역계약","num":11,"stem":"11. 개별계약과 포괄계약에 관한 설명으로 잘못된 것은?","choices":["포괄계약 방식은 중장기연불 방식에 의한 수출입 등 거래내용이 복잡할 때 주로 사용 된다.","건별로 번번이 체결하는 포괄매매계약에서는 일방 당사자가 해당 시점의 반대청약을 승낙함으로써 계약이 성립된다.","지속적인 거래에서는 일정 기간 내의 모든 매매계약 조건을 약정하는 일반거래조건협 정서를 체결하고, 이를 근거로 매수인의 주문이 있을 때마다 매도인이 물품을 인도하 는 형태를 취한다.","개별계약 방식은 특정품목을 거래할 때마다 매번 구체적인 거래조건에 합의하는 방식 으로 최초 거래나 1회로 끝나지 않고 지속되는 거래에 사용된다. 엇"],"answer":3},{"section":"무역계약","num":12,"stem":"12. 다음에서 설명하는 수출입 거래형태는 무 인가? • 사전에 무역계약을 체결하지 않은 상태에서 수입국 내 관리인에게 물품을 무환으로 반출한다. • 국제물류 촉진을 위해 보세창고에 장치가 필요한 물품으로서 세관장이 인정하는 물품 의 경우, 비축에 필요한 기간만큼 장치할 수 있다. • 매수인이 구매를 결정하면 매도인이 상업송장, B/L 등 선적서류를 발행하고, 이를 근 거로 대금결제와 수입통관이 가능하다. • 매수자 입장에서는 현물 확인 후 구매하므로 비용 절감, 납기 단축 등이 장점이다. • 반입된 물품이 판매되지 않으면 매도인에게 반송이 가능하다.","choices":["BWT 방식 수출입","연계무역 방식 수출입","임대차 방식 수출입","남북교역 방식 수출입 약"],"answer":1},{"section":"무역계약","num":13,"stem":"13. 무역계 의 수량조건 중 용적에 관한 설명으로 올바른 것을 모두 고른 것은? A. CBM(Cubic Meter)=m2이다. B. 액체는 Liter, Barrel, Gallon 등의 단위를 사용한다. C. 가로 1ｍ, 세로 1ｍ, 높이 1ｍ인 화물의 용적은 1CBM이다. D. CBM은 일반적으로 CFS charge 부대비용 산출과 FCL 해상운임 계산에 활용된다.","choices":["A, B","B, C","C, D","A, D 약 질"],"answer":2},{"section":"무역계약","num":14,"stem":"14. 무역계 의 품 결정기준 가 운데 상표를 활용해 약정할 수 있는 설명으로 올바른 것 은?","choices":["봉제완구 등의 비규격품은 상표를 기준으로 품질을 결정하고 약정할 수 있다.","곡물 등 1차 산물은 선적 시 내용물의 결함을 확인할 수 없으므로 상표를 기준으로 품 질을 결정하고 약정할 수 있다.","Rolex(손목시계)처럼 전 세계적으로 알려져 견본 제공이 불필요한 경우에는 상표로 거 래대상물의 규격을 약정할 수 있다.","KS, JIS, ISO 등 국가·공인기관이 설정한 요건을 충족한 물품은 상표를 기준으로 품질 을 결정하고 약정할 수 있다. 약"],"answer":3},{"section":"무역계약","num":15,"stem":"15. 다음 무역계 서의 일부 조건에 관한 설명으로 잘못된 것은? Marine Insurance: All shipments shall be covered on All Risks or ICC(A) including War Risks and S.R.C.C. for the invoice amount plus 10 percent by the Seller. All Policies shall be made out in U.S. Dollar and claims payable in New York.","choices":["모든 선적분은 ICC(A/R) 또는 ICC(A)에 추가해 전쟁 및 동맹파업에 부보해야 한다.","보험가액은 상업송장 금액의 110%이어야 하며, 보험증권에는 미국 달러화로 표시해야 한다.","보험계약의 체결과 보험료의 부담자는 매도인으로 무역거래 조건이 CIF 또는 CIP라는 것을 알 수 있다.","보험계약의 체결지가 불분명하지만, 보험금 청구지는 뉴욕이다. 약"],"answer":2},{"section":"무역계약","num":16,"stem":"16. 무역계 상 수량조건에 관한 설명으로 올바른 것은?","choices":["신용장 결제 방식으로 살화물(bulk cargo) 거래를 할 때 계약서의 수량 과부족 조건이 ±3%로 규정되어 있더라도 신용장에서 기본적으로 ±5%가 허용되므로 범위가 큰 쪽 인 신용장의 과부족 조건이 적용된다.","계약서에 과부족 범위를 명시적으로 합의한 경우에도, 개수로 수량을 표시할 수 있는 물품은 과부족 조항이 적용되지 않으므로 수출자는 계약수량과 동일하게 물품을 인도 해야 한다.","신용장의 중량 앞에 “about” 또는 “approximately”를 사용하는 경우, ±10%의 과 부족이 허용되지만 신용장 금액 앞에는 해당 단어를 쓸 수 없으므로 기본적으로 ±5% 의 과부족만 허용된다.","매수인이 인수한 물품에 과부족 범위 이내의 과부족이 있으면 매도인은 해당 수량에 대한 금액을 결제할 때 정산해야 한다. 약"],"answer":4},{"section":"무역계약","num":17,"stem":"17. 다음은 무역계 의 기본조건은 아 지만, 정식계 서에니 약 포함해 문제가 발생할 때 적용할 수 있는 유용한 조건들에 관한 설명이다. 잘못된 것은?","choices":["Entire agreement는 해당 계약서가 당사자의 합의를 전부 표시하고 있는 유일한 합의 서이며, 그 이외의 내용은 인정할 수 없다는 완전합의조항이다.","Limitation of liability clause는 계약위반에 따른 직접적 손해만 배상을 청구할 수 있을 뿐이고, 기업 명성 등에 입은 피해를 주장하며 완전한 배상을 요구할 수 없다는 책임 제한조항이다.","Severability clause는 계약 내용의 일부가 어떠한 사유로 실효 또는 무효가 되더라도 문제의 조항이 아닌 것들은 유효하다는 분리가능조항이다.","Hardship clause는 상대방의 계약불이행에 대비하여 청구할 손해배상액을 미리 계약서 에 명시해 약정된 금액까지만 청구할 수 있다는 손해배상액 예정조항이다."],"answer":4},{"section":"무역계약","num":18,"stem":"18. 다음에서 설명하는 클레임은 무엇인가? • 평소에는 클레임 대상이 안 되지만 시장 상황이 나빠진 경우에 경미한 과실을 빌미 로 제기하는 사례가 많다. • 계약 체결 후 시세 하락으로 손해가 예상될 때 매수인이 제기하는 경우가 있다. • 당사자가 상당한 주의를 기울여도 사전에 방지할 수 없는 경우도 있다. • 부당한 클레임이지만 때에 따라 정당한 클레임과 구분이 어렵다. • 이러한 클레임 예방을 위해 거래 전 철저한 신용조사가 필요하다.","choices":["Avoidable claim","Market claim","Contractual claim","Claim for monetary compensation"],"answer":2},{"section":"무역계약","num":19,"stem":"19. 무역분 쟁 해결에 관한 설명으로 잘못된 것을 모두 고른 것은? A. 중재합의를 한 경우 조정으로 진행해서는 안 되며, 중재로 분쟁을 해결해야 한다. B. 양 당사자가 조정을 선택한 경우, 구속력이 있는 조정안에 따라야 한다. C. 계약서에 중재조항이 있는 경우, 서면 중재합의로 인정되며 중재 개시 전이나 중재 종료 후 일방에 의한 소송 제기는 불가능하다. D. Vienna Convention(1980)의 체약국들은 체약국 간 사법협정 체결과 상관없이 소송으 로 분쟁을 해결하는 경우, 해당 판결은 외국에서 승인 및 집행이 보장된다. E. New York Convention(1958)의 체약국이 아닌 국가와 중재로 분쟁을 해결하는 경우, 중재판정은 외국에서 강제집행이 제한될 수 있다. F. 중재합의는 반드시 서면으로 해야 하며 구두합의, 전보, 팩스에 의한 중재합의는 무 효가 된다.","choices":["A, C, D, E","B, C, D, E","B, D, E, F","A, B, D, F 쟁 해결수단(dispute resolution)에 관한 설명 중 잘못된 것은?"],"answer":4},{"section":"무역계약","num":20,"stem":"20. 분쟁해결방법에 관한 설명으로 잘못된 것은?","choices":["중재는 사인인 제3자를 중재인으로 선정해 중재인의 결정에 따라 당사자끼리 합의해 분쟁을 해결하는 제도이며, 국내 상설 법정 중재기관은 대한상사중재원이다.","소송과 중재를 위해서는 당사자 사이에 소송 또는 중재에 대한 합의가 있어야 한다.","중재는 절차의 비공개 원칙이 있으므로 소송에 비해 기업의 영업비밀이 보호되고, 기 업 신용도의 하락을 방지할 수 있다.","중재판정은 국내적 효력 외에 뉴욕협약에 가입한 체약국 사이에 외국 중재판정의 상 호 승인 및 강제집행도 보장된다."],"answer":2},{"section":"무역계약","num":21,"stem":"21. Incoterms 2020에서 규정하고 있는 개 별 조건별 사용 방법으로 가장 올바른 것은?","choices":["화물 인도장소인 매도인의 공장에서 매수인이 지정한 운송인의 트럭에 매도인의 책임 으로 화물을 적재하려는 경우, ‘EXW loaded’ 규칙을 사용한다.","매도인이 운송비를 부담하지만 수입국의 항만 적체가 심해 demurrage 등 추가 물류비 발생이 예상되는 경우, 매도인은 해당 비용을 매수인이 부담하는 CPT 또는 CIP 규칙 으로 계약을 체결하는 것이 유리하다.","‘FCA 수출국 port’로 계약을 체결한 경우, 운송인의 지시에 따라 지정된 수출국 항 구에 화물을 입고한 후 본선 적재 전 화물에 발생한 화재에 대해서 매도인이 책임져 야 한다.","‘FOB Incheon airport’로 계약을 체결한 경우, 지정된 항공기에 선적되기 전에 발생 하는 모든 위험과 비용은 매도인이 부담해야 한다."],"answer":2},{"section":"무역계약","num":22,"stem":"22. Vienna Convention(1980)이 준거법으로 적용될 수 있는 계약이 아닌 것은?","choices":["한국 본사와 미국 지사(현지법인) 간 자동차부품의 거래 계약","일본 법인과 한국 개인사업자 간 섬유제품의 수출입 계약","가족용으로 해외 온라인 사이트를 통한 태블릿PC 구매 계약","한국의 매도인이 중국 매수인에게 유상으로 견본을 제공하는 계약 약"],"answer":3},{"section":"무역계약","num":23,"stem":"23. 무역계 을 체결할 때 고려해야 할 결제조건에 관한 설명으로 잘못된 것은?","choices":["결제조건에서는 결제시기, 결제방법, 결제수단, 결제통화 등을 매도인과 매수인이 유불 리를 따져서 정하게 된다.","결제계약은 매매계약의 한 부분인 결제조건을 실행하기 위해 매도인과 매수인이 은행 등 제3자와 체결하는 종속계약이다.","매도인은 결제조건이 불리하면 가격조건에 반영하고, 위험을 회피하는 헤지(hedge) 수 단으로 수출보험, factoring, forfaiting 등을 고려해야 한다.","결제위험 관점에서 매도인에게는 CWO > O/A > L/C > D/P > D/A 순으로 유리하다. 운"],"answer":4},{"section":"무역계약","num":24,"stem":"24. 해상 송에 사용되는 컨테이너에 관한 설명으로 잘못된 것은?","choices":["20feet 컨테이너 1개를 1TEU라고 하며, 1TEU에 적재되는 용적은 최대 33CBM, 평균 25CBM이다.","컨테이너 문의 오른쪽 위에 표시되는 tare는 빈 컨테이너 자체의 무게, payload는 컨테 이너 안에 실을 수 있는 화물의 무게, max gross는 tare weight와 payload를 합한 총무 게를 의미한다.","컨테이너의 장점을 최대로 이용한 컨테이너 운송 방식은 선적항의 CFS에서 목적항의 CFS까지 운송하는 FCL/FCL 방식이다.","표준 컨테이너 규격을 초과하는 중량화물 또는 장척화물 등을 선적하기 위해서는 open top container, flat rack container, side open container 등을 사용한다. 륙컨테이너기지에 관한 설명 중 잘못된 것은?"],"answer":3},{"section":"무역계약","num":25,"stem":"25. 항만과 내","choices":["항만은 해륙운송의 중계지로서 육상운송된 화물의 원활한 선적과 양하를 위한 시설을 갖추고 산업활동이 이루어지고 있는 장소를 의미한다.","우리나라의 항만은 사용목적상 외국과의 무역 및 국내 상거래를 주로 하는 상업항을 비롯해 공업항, 어항, 피난항, 검역항으로 분류된다.","컨테이너 터미널의 하역장비로는 갠트리 크레인, 트랜스퍼 크레인, 스트래들 캐리어, 리치 스태커, 포크리프트 등이 있다.","우리나라 최초의 내륙컨테이너기지는 양산ICD로 부산 시내의 교통난 완화와 컨테이너 의 내륙유통구조 개선을 위해 2000년 4월에 개장됐다. 운"],"answer":4},{"section":"무역계약","num":26,"stem":"26. 국제해상 송에 사용되는 운송서류의 비교로 잘못된 것은? 비교 Bill of Lading Sea Waybill ․ 화물수취증 ․ 화물수취증 A 운송서류의 기능 ․ 운송계약의 증거 ․ 운송계약의 증거 ․ 화물 권리증권 적정히 배서된 운송서류 소 B 정당한 수하인 계약에서 지정된 수하인 지인 화물인도 시 원본 C 원본 상환 필요 원본 상환 불필요 상환 여부 D 수하인 기재 방식 지시식 또는 기명식 기명식","choices":["A","B","C","D 운"],"answer":2},{"section":"무역계약","num":27,"stem":"27. 수출입 송 물류비용에 관한 내용 중 올바른 것은?","choices":["컨테이너 육상요금 중 20ft 컨테이너 운임은 40피트 운임의 50%이며, 45피트 운임은 40피트 운임의 125%를 적용하고 있다.","해상운임을 선내 하역비 부담에 따라 분류한 Berth term, FIO, FI, FO운임 중에서 수 출입화주에게 가장 불리하게 적용되는 것은 FIO운임이다.","특정 국가의 수출 항공화물을 목적지까지 운송할 때 소요되는 항공운임은 노선별로 구분돼 IATA 인가를 받아 공식 발효된다.","수출입통관 수수료는 관세사가 화주로부터 위임받아 통관업무를 수행한 대가로 받는 요금이다. 2024년 9월 현재 수출통관의 경우 FOB 가격의 0.15%, 수입통관은 CIF 가격 의 0.2%로서 최저 27,000원에서 최고 950,000원이다."],"answer":3},{"section":"무역계약","num":28,"stem":"28. 해상보험에 대한 설명 중에서 잘못된 것은?","choices":["해상보험계약은 보험자가 피보험자에게 계약에 따라 합의한 방법과 범위 안에서 해상 손해의 보상을 약속하는 계약이다.","해상보험에는 운송수단인 선박 자체를 보험의 목적물로 하는 선박보험도 포함된다.","보험계약자는 보험료 산정에 영향을 미치는 중요사항에 대해서 보험계약 체결 전까지 고지해야 한다.","보험자의 책임은 당사자 간에 다른 약정이 없으면 최초의 보험료를 지급받은 때로부 터 개시된다."],"answer":4},{"section":"무역계약","num":29,"stem":"29. 해상보험 조건에 관한 설명으로 잘못된 것은?","choices":["ICC(FPA) 조건은 분손부담보약관을 말하는 것으로 전손, 공동해손, 특정분손을 담보범 위로 한다.","ICC(WA 3%) 조건은 면책비율(3%)을 초과하는 손해가 나면 전체를 보상하고, 면책비율 이하의 손해가 나면 보상하지 않는다는 소손해 면책조건이다.","ICC(WAIOP) 조건은 면책비율을 적용하지 않고 손해율과 상관없이 작은 분손이라도 보 험자가 보상해주는 조건이다.","해상보험에서 보험자의 담보위험과 보상범위는 A/R > WAIOP > WA 3% > FPA > TLO 순으로 크다. 별 대표적인 사고의 유형 가운데 보상받을 수 있는 손해가 아닌 것은?"],"answer":1},{"section":"무역계약","num":30,"stem":"30. 화물별 손해 유형에 관한 설명으로 잘못된 것은?","choices":["섬유류 – 컨테이너 내부에 발생한 한습(sweat)에 의한 수침손","곡물류 및 사료 – 부족손(shortage) 혹은 한습손과 열손(heating)","금속류 – 녹손(rust) 및 부족손","의약품 – 지연"],"answer":4},{"section":"무역영어","num":1,"stem":"1. 다음은 무역거래의 당사자들이 계 체결 이전 및 과정에 상호교환하는 서신 내용의 일 부이다. 이를 당사자 간 서신교환의 흐름에 따라 올바른 순서대로 나열한 것은? (A) We are not in a position to accept your offer of travel bags on these terms. We are sourcing the same quality through another channel at a price well below your quoted price. We trust that you will make every effort to revise your prices. (B) Thank you for your inquiry of October 21, 2024 and we are pleased to offer you firm the following goods, subject to your reply reaching us on or before November 8, 2024. (C) Your name and address were given through the Greater New York Chamber of Commerce as one of the well-known importers handling various travel bags and we are writing to you with a keen desire to open an account with you. (D) We are pleased to accept your offer as specified in our Purchase Note enclosed with this correspondence. We are deeply pleased that the first contract between our two firms was agreed upon so quickly, and we ask that you thoroughly review the material as this transaction is important to both of us.","choices":["(C) – (B) – (D) – (A)","(C) – (B) – (A) – (D)","(B) – (C) – (A) – (D)","(B) – (D) – (C) - (A)"],"answer":2},{"section":"무역영어","num":2,"stem":"2. 다음 중 counter offer의 내용으로 가장 적절한 것은?","choices":["In response to your offer in the e-mail dated April 20, 2024, we accept the terms as suggested","We are pleased to offer you the following conditions subject to market fluctuation","After reviewing the terms and conditions you proposed, we are very glad to accept your offer, except for the shipment period","Upon considering your terms, we would like to accept your offer and hope that the goods will be shipped without delay. 문"],"answer":3},{"section":"무역영어","num":3,"stem":"3. 다음 주 서에 대한 내용으로 올바른 것은? We are pleased to place the following order with you. Ÿ Item: Ladies 100% Polyester Golf Gloves (Cat No. WA1002) Ÿ Quantity: 1,000 dozen Ÿ Price: USD250/dozen DPU New York port CY Ÿ Shipment: During December 2023 Ÿ Packing: Each piece wrapped in polybag, 1 doz in a box Ÿ Payment: At sight under Irrevocable L/C Ÿ Remark: Certificate of Inspection \u0026 Shipment Samples to be sent by airmail prior to shipment. We will instruct our bank to issue upon receipt of your shipment sample.","choices":["The seller should draw an usance draft on the issuing bank","The issuing bank will issue an L/C after the seller makes a shipment","The seller should deliver the goods ready for loading at New York port CY","The seller may procure insurance up to New York port to cover his/her own risk"],"answer":4},{"section":"무역영어","num":4,"stem":"4. Incoterms 2020의 각 조건에서 인도에 대한 설명으로 잘못된 것은?","choices":["In EXW, delivery occurs when the seller loads the goods on the collecting vehicle arranged by the buyer at the named place","In FCA, if the named place is not the seller’s premises, delivery occurs when the goods, having been loaded on the seller’s means of transport, reach the named place","In CIP, delivery occurs when the seller hands over the goods to the carrier contracted by the seller","In DDP, delivery occurs when the goods, which are cleared for import, are placed at the buyer’s disposal at the named place of destination"],"answer":1},{"section":"무역영어","num":5,"stem":"5. 다음 국제물품매매계 서의 약 밑줄 친 부분에 해당되는 비용은 어느 것인가? Art. 4 PRICE The price indicated in the contract includes any costs which are at the Seller’s charge according to this contract. However, should the Seller bear any costs which, according to this contract, are for the Buyer’s account, such sum shall not be considered as have been included in the price.","choices":["Loading cost under FOB","Loading cost under CFR","Unloading cost under CFR","Unloading cost under DPU"],"answer":3},{"section":"무역영어","num":6,"stem":"6. 다음 CISG(1980)의 내용 중 올바른 것은?","choices":["Even after the offeree dispatches the acceptance, an offer may be revoked if the revocation reaches the offeree before the acceptance becomes effective","A reply to an offer which purports to be an acceptance but contains the terms of offer which are partially accepted constitutes an acceptance and concludes a contract","A reply to an offer purports to be an acceptance but contains different terms which are not material concludes a contract unless the offeror objects to the discrepancy or dispatches a notice to that effect","A reply to an offer which purports to be an acceptance but contains additions, limitations or other modifications is an invitation to make an offer. 약"],"answer":3},{"section":"무역영어","num":7,"stem":"7. 다음 계 과 관련된 매도인과 매수인의 의무 중 올바른 것은? PURCHASE NOTE We are pleased to purchase the following goods on the terms and conditions stated below. Goods: RICE Price: USD7.00/bag FOB BUSAN Quantity: 6,000kg Packing: 30kg in a sound bag Shipment: During March 2024 Payment: Draft at 30 days under an irrevocable L/C This contract is subject to the application and interpretation of Incoterms 2020 and UCP 600.","choices":["The buyer should nominate the vessel on which the seller could load the goods at Busan port","The seller should procure an insurance for the goods up to Busan port","The seller should draw a sight draft and present shipping document to the negotiating bank for payment","The buyer should make a contract for insurance for the goods from Busan port to the place of destination. 약"],"answer":1},{"section":"무역영어","num":8,"stem":"8. 다음 계 서의 내용에 따르면 품 결정방법은 무 인가? 질 엇 Goods: Goods in business, their unit to be quoted, and their mode of packing shall be stated in the order sheet attached. The Seller shall supply the Buyer with samples free of charge, and the quality of the goods to be shipped should be equal to the sample on which an order is given at the time of arrival. Prices: Unless otherwise specified, prices shall be quoted in USD on FOB Busan basis. Payment: The draft shall be drawn under an irrevocable credit at sight, documents attached, for the full invoice amount.","choices":["Sale by sample","Sale by description","Sale by standard","Sale by grade 약"],"answer":1},{"section":"무역영어","num":9,"stem":"9. 다음 중 계 서의 내용으로 올바른 것은? Description: Automobile Tube Price: USD3.43 CIP Auckland, 50,000 units (USD171,500 total) Shipment: Within two months after receipt of the order Shipping port: Busan, Korea Destination: Auckland, New Zealand Payment: 60 days draft under D/A","choices":["The quality of the goods will be determined when the goods arrive in Auckland, New Zealand","The price of the goods includes the cost of carriage and insurance up to Auckland","The seller shall bear the risk of loss of or damage to the goods until the goods reach Auckland","For payment, the issuing bank will open an irrevocable L/C in favor of the seller"],"answer":2},{"section":"무역영어","num":10,"stem":"10. 다음 계 약 내용에 따른 계약조항이 올바르게 짝지어진 것은? The seller shall not be responsible for non-performance or late performance of all or part of the contract due to orders, regulations, and/or ordinances (A) by the government, act of God, war, blockade, insurrection, mobilization or due to :2},{"section":"무역영어","num":18,"stem":"18. AWB의 특성에 관한 설명으로 잘못된 것은?","choices":["The AWB serves as a conclusive evidence of the contract between the shipper and the carrier for transporting the goods to the consignee under specified terms and conditions","The AWB acts as a receipt for the shipper, confirming that the airline has accepted the goods for transport","The AWB does not serve as a document of title to the goods being transported","It is generally treated as conclusive evidence of the contract in cases where the AWB has been transferred to a third party in good faith"],"answer":4},{"section":"무역영어","num":19,"stem":"19. 다음은 영국해상보험법(MIA)에 규정된 추정전손에 대한 내용이다. 빈칸(A～C)에 들어갈 용어들이 올바르게 짝지어진 것은? Where there is a constructive total loss ( A ) may either treat the loss as a partial loss, or abandon the subject-matter insured to ( B ) and treat the loss as if it were ( C ). A B C","choices":["the insurer the insured a general average loss","the insured the insurer an actual total loss","the insurer the insured a particular charge loss","the insured the insurer a particular average loss"],"answer":2},{"section":"무역영어","num":20,"stem":"20. 위 서신의 목적으로 가장 적절한 것은?\n\n[지문]\nThe Greater New York Chamber of Commerce recommended your firm as a\nreputable importer of travel bags. We are writing to express our interest in\nestablishing a business relationship with you.\nAs shown in our enclosed catalog, we have been exporting travel bags from\nKorea for over three decades. Our direct connections with top-tier manufacturers in\nKorea allow us to offer the lowest market prices and the best possible terms.\nWe prefer to conduct business using letters of credit. Prices are quoted FOB\nBusan in U.S. dollars, but we can also provide CIF or delivery prices to any port\nin your country if needed.\nIf you are interested in our travel bags, please let us know the terms under which\nyou would be willing to do business.\nWe look forward to receiving a trial order from you.\n\nSincerely,","ch
