","num":1,"stem":"1. 무역계약에 대한 설명으로 잘못된 것은?","choices":["무역계약은 국제물품매매계약으로서 매도인 관점에서는 수출계약이다.","무역계약은 당사자가 서로 다른 국가에 영업소를 두고 체결하는 국제계약이다.","무역계약은 클레임 예방을 고려해 매도인과 매수인이 서면으로 체결해야만 유효하다.","무역계약의 특수성은 매매계약 이행을 위해 제3자와의 종속계약이 수반된다는 점이다. 석"],"answer":3},{"section":"무역계약","num":2,"stem":"2. 무역계약의 해 순서와 관련하여 (A)와 (B)에 들어갈 내용으로 올바른 것은? ∙ 국제무역계약 체결에서 거래조건을 모두 명시하는 것은 현실적으로 불가능하다. ∙ 계약서에서 약정한 조건 외에도 공백이 존재할 수 있으므로, 이를 보완하기 위해 국제적으로 인정된 ( A )이 적용된다. ∙ 그러나 ( A )으로도 계약의 모든 공백을 메우는 것은 불가능하기 때문에 명시적 또는 묵시적으로 정해지지 않은 부분의 해석을 위해 당사자 간에 합의한 ( B ) 을 기준으로 해석하는 것이 일반적이다. (A) (B)","choices":["정형거래조건 중재조항","중재조항 거래관습","거래관습 정형거래조건 조항","거래관습 준거법 률"],"answer":4},{"section":"무역계약","num":3,"stem":"다음 조건으로 체결되는 무역계약의 법적 특성을 모두 고른 것은? (1.물품:3D프린터용 소프트웨어 2.수량:1EA 3.가격:USD100,000 4.결제:T/T 30일 5.인도:이메일 전송)","choices":["A, C","B, D, E","A, C, E, F","B, C, D, E, F"],"answer":3},{"section":"무역계약","num":4,"stem":"Incoterms 2020의 조건들을 기준에 따라 분류한 것이 옳은 것만으로 짝지어진 것은?","choices":["A, B, C","A, C, D","B, D, E","C, D, E"],"answer":2},{"section":"무역계약","num":5,"stem":"컨테이너운송의 경우에 Incoterms 2020 사용 등에 관한 설명으로 잘못된 것은?","choices":["컨테이너를 이용한 운송의 경우에는 절대 FOB 조건을 사용할 수 없다.","컨테이너를 이용한 운송의 경우에는 매도인이 물품을 본선에 인도하는 것이 곤란하므로, CY 또는 CFS에서 운송인에게 인도하는 것이 편리하다.","컨테이너를 이용한 운송의 경우에는 FCA, CPT, CIP 조건 사용을 권장한다.","매도인의 위험 이전은 FCA 조건이 FOB 조건보다 먼저 발생한다."],"answer":1},{"section":"무역계약","num":6,"stem":"6. 별도의 계약서 없이 상기 조건이 기재된 매도인의 ‘PROFORMA INVOICE’를 계약서로 대체하기로 구두 합의 A. 유상계약 B. 편무계약 C. 낙성계약 D. 요물계약 E. 불요식계약 F. 쌍무계약","choices":["A, C","B, D, E","A, C, E, F","B, C, D, E, F o 4. Inc terms 2020의 조건들을 기준에 따라 분류한 것이 옳은 것만으로 짝지어진 것은? A. 해상 및 내수로 운송 방식에만 사용되는 조건 : FAS, FOB, CFR, CIF B. 매도인이 주운임(main freight)을 부담하는 조건 : EXW, FCA, FAS, DAP, DPU, DDP C. 위험의 분기점과 비용의 분기점이 다른 조건 : CFR, CIF, CPT, CIP D. 적출지(수출지)의 지명이 표기되어야 하는 조건 : EXW, FCA, FAS, FOB E. 매도인이 도착지에서 물품을 양하(unloading)할 의무가 있는 조건 : DAP, DDP"],"answer":3},{"section":"무역계약","num":7,"stem":"7. Inc terms 2020과 CISG의 관계에 관한 설명으로 잘못된 것은?","choices":["Incoterms 2020은 매매계약 당사자의 권리와 의무에 중점을 두고, CISG는 매매계약 당 사자의 계약위반에 대한 권리구제에 중점을 두고 있으므로 상호 독립적 관계에 있다.","Incoterms 2020은 법률이 아닌 관습이지만, 유엔협약인 CISG보다 우선할 수 있다.","계약의 성립에 관해서는 CISG가 Incoterms 2020에 우선한다.","Incoterms 2020이 물품의 인도에 관하여 CISG보다 구체적 규정을 두고 있다."],"answer":1},{"section":"무역계약","num":8,"stem":"8. 계약의 성립 시기에 대해 CISG와 UNIDROIT 국제상사계약원칙을 가장 잘 설명한 것은?","choices":["CISG는 승낙이 도달한 시점, UNIDROIT는 발송한 시점을 기준으로 계약이 성립한다.","CISG는 승낙이 발송한 시점, UNIDROIT는 도달한 시점을 기준으로 계약이 성립한다.","CISG와 UNIDROIT는 모두 승낙이 도달한 시점을 기준으로 계약이 성립한다.","CISG와 UNIDROIT는 모두 승낙이 발송한 시점을 기준으로 계약이 성립한다. 칙 N R 칙"],"answer":3},{"section":"무역계약","num":9,"stem":"9. 계약에 적용되는 규 으로서 U ID OIT 국제상사계약원 에 관한 설명으로 잘못된 것 은?","choices":["계약에서 지정된 법의 일반원칙이나 상인법 등을 구현하는 규범으로서 UNIDROIT의 적용이 가능하다.","당사자에 의한 준거법의 선택이 없는 경우에 UNIDROIT의 적용이 가능하다.","국내법을 해석하고 보충하는 수단으로는 UNIDROIT를 적용할 수 없다.","국제적 통일법 문서를 해석하고 보충하는 수단으로서 UNIDROIT의 적용이 가능하다."],"answer":3},{"section":"무역계약","num":10,"stem":"10. 국제 상거래 계약에서 일반적으로 인정되는 계약의 기 원 본 칙 중에서 잘못된 것은?","choices":["계약자유의 원칙(Freedom of Contract): 당사자는 서로 합의하여 계약의 형식, 내용 등 을 자유롭게 정할 수 있다.","계약 준수의 원칙(Pacta sunt servanda): 체결된 계약은 반드시 이행되어야 한다.","신의성실의 원칙(Principle of Good Faith): 계약의 해석과 이행에서 상대방의 이익을 합리적으로 고려하면서 성실하게 행동해야 한다.","작성자 유리의 원칙(Contra Proferentem Rule): 계약서나 문서의 내용이 모호할 경우에 는 문서 작성자 입장을 고려하여 유리하게 해석한다."],"answer":4},{"section":"무역계약","num":11,"stem":"11. 다음 ( )안에 들어갈 조건부 청약으로 올바르게 짝지어진 것은? ∙ ( A )은 매수 희망자의 승낙이 도착했을 때 물품이 판매되지 않고 재고가 있는 경우에만 계약이 성립된다는 것을 조건으로 하는 청약이다. ∙ ( B )은 오퍼와 함께 현품을 보내서 상대방이 사용해 보아 만족할 것을 조건으로 하는 청약이다. ∙ ( C )은 발행되어도 구속력이 없어 상대방이 승낙하더라도 계약이 성립되지 않고, 다시 청약자의 최종 수락이 있어야만 계약이 성립되는 청약이다. (A) (B) (C)","choices":["최종확인조건부청약 승인조건부청약 선착순판매조건부청약","최종확인조건부청약 선착순판매조건부청약 승인조건부청약","선착순판매조건부청약 최종확인조건부청약 승인조건부청약","선착순판매조건부청약 승인조건부청약 최종확인조건부청약"],"answer":4},{"section":"무역계약","num":12,"stem":"12. BWT(보세구역 인도조건)에 관한 다음 설명 중 잘못된 것은?","choices":["수출자는 자신의 책임하에 수입국 내의 관리인을 지정하고 물품을 수입국 내 보세창 고에 반입시킨다.","물품은 수출국에서 유환(有換)으로 반출된 후, 수입국 현지에서 물품 구매 계약이 체 결되어 판매된다.","거래선을 발굴하여 매매계약이 성립되기 전까지는 수입자가 정해지지 않은 상태에서 거래가 진행된다.","보세구역 내에서 판매되지 않은 물품은 반송이 가능하다."],"answer":2},{"section":"무역계약","num":13,"stem":"13. 국제비즈니스 계약으로서 대리점계약과 판매점계약에 대한 설명으로 잘못된 것은?","choices":["기업은 해외 진출을 위한 수출의 한 형태로 국제판매점계약과 국제대리점계약을 고려 할 수 있다.","국제판매점은 본인으로부터 수수료를 취하고, 국제대리점은 매매차익을 취하는 방식이 라는 점에서 차이가 존재한다.","국제대리점은 외국의 본인(수출상) 명의로 계약을 체결하면서 대리인 역할을 한다.","국제판매점은 외국의 본인(수출상)으로부터 물품을 구매하여 자신의 이름으로 제3자에 게 판매한다."],"answer":2},{"section":"무역계약","num":14,"stem":"14. 다음 ( )안에 들어갈 품질조건이 올바르게 짝지어진 것은? ∙ ( A ): 주로 농수산물의 선물매매에 이용되는 조건으로, 선적 시 선적 장소에서 당해 계절의 상품들의 ( A ) 품질로 간주된다. ∙ ( B ): 목재, 냉동 어류 등의 거래에 이용되는 조건으로, 견본 이용이 곤란하거나 외관상 제품 내부의 품질을 알 수 없는 물품에 주로 사용된다. ∙ ( C ): 주로 원사 거래에 이용되는 조건으로, 공인검사기관 또는 공인표준기준에 의하여 ( C ) 품질을 표준품으로 결정하는 조건이다. (A) (B) (C)","choices":["판매적격품질조건 평균중등품질조건 보통품질조건","판매적격품질조건 보통품질조건 평균중등품질조건","평균중등품질조건 판매적격품질조건 보통품질조건","평균중등품질조건 보통품질조건 판매적격품질조건"],"answer":3},{"section":"무역계약","num":15,"stem":"15. 무역계약의 수량조건 및 선적조건에 관한 다음 설명 중 잘못된 것은?","choices":["신용장방식에서 살물(bulk cargo)은 명시적인 과부족용인약관이 없더라도 5%의 과부족 이 허용된다.","송금, 추심방식은 과부족이 발생할 수 있는 물품에 대해 수출자가 계약서에 과부족용 인 조항을 명시하지 않고 과부족이 발생하는 경우 계약위반이 될 수 있다.","컨테이너 복합운송의 경우에는 일반적으로 Berth Term이 적용되므로 화주가 선적·양 하의 비용을 모두 부담해야 한다.","신용장방식에서 선적일의 증명은 운송서류에 발행일만 있는 경우는 발행일, 선적일이 별도로 있는 경우는 선적일을 기준으로 한다."],"answer":3},{"section":"무역계약","num":16,"stem":"16. 무역계약에서 포장조건(Terms of Packing)을 정할 때 고려해야 할 요소가 아닌 것은?","choices":["포장비용 부담의 주체","수출입 국가의 운송 및 포장재에 대한 규제사항","FCL 또는 LCL cargo에 따른 화인의 표시 방법","물품 가격 등 수입자의 관세와 내국세 신고에 필요한 사항"],"answer":4},{"section":"무역계약","num":17,"stem":"17. 무역계약의 선적조건(Terms of Shipment)에 관한 설명으로 올바른 것은?","choices":["신용장 거래에서 선적이 시급하면 immediate shipment, prompt shipment, as soon as possible shipment 등 즉시선적조건을 약정하는 것이 좋다.","신용장에 환적을 금지하는 규정이 있다면, 환적 예정 선하증권은 물품이 선하증권에 의해 트레일러 또는 컨테이너선에 선적되었음이 증명되는 경우라도 절대 수리될 수 없다.","선적지연의 원인이 매도인이 통제할 수 없는 불가항력이라면 매도인이 면책된다. 그러 나 매매계약에서 불가항력 사유, 면책사항이 포함한 불가항력조항을 설정하여 두는 것이 권장된다.","신용장에서 선적 기간을 정할 때 사용되는 to, until, from, between 등의 전치사는 언 급된 일자 및 일자들을 제외한다. 별"],"answer":3},{"section":"무역계약","num":18,"stem":"18. 개 계약서의 이면사항이나 포괄계약서의 한 조항으로 약정하는 「Hardship Clause」 에 대하여 잘 설명하고 있는 것은?","choices":["이 조항은 제조되고 판매된 물품이 소비자나 제3자의 신체 또는 재산에 손상과 손해 를 끼쳤을 경우 제조자, 무역업자, 유통업자, 원자재 생산자 등에게 배상책임을 물을 수 있는 책임에 대하여 매도인과 매수인이 약정하는 내용이다.","이 조항에 단순히 “Act of God”만을 기재한다면, 홍수나 지진과 같은 자연재해는 포 함되지만, 파업이나 원자재의 부족 등은 포함되지 않는 것으로 해석될 수 있다.","이 조항은 계약체결 시에 예상치 못했던 경제적 또는 기타 사정의 변경으로 인해 계 약대로의 이행이 심히 곤란해져 계약의 본질적 변경이 불가피해진 경우를 대비하는 것이다.","이 조항은 본 계약서가 당사자의 합의를 전부 표시하고 있는 유일한 합의서이며, 그 이외의 내용은 인정할 수 없다는 내용이다."],"answer":3},{"section":"무역계약","num":19,"stem":"19. 매도인의 계약위반에 따른 매수인의 구제 수단에 관한 설명으로 잘못된 것은?","choices":["계약해제권은 매도인이 계약을 근본적이고 본질적으로 위반한 경우에 행사할 수 있 다.","하자보완청구권은 물품에 계약과 일치하지 않는 하자가 있는 경우, 그 보완을 매수 인이 청구할 수 있는 권리이다.","대체품인도청구권은 부적합 물품의 하자 통지와 함께 합리적인 기간 내에 대체품의 인도를 청구할 수 있는 권리이다.","물품명세확정권은 물품이 계약과 일치하지 않는 경우, 매수인이 물품의 명세를 스스 로 확정할 수 있는 권리이다."],"answer":4},{"section":"무역계약","num":20,"stem":"20. 다음 중 소송과 중재에 대한 설명으로 올바른 것은?","choices":["소송은 당사자가 처분할 수 있는 사법의 분쟁만을 대상으로 한다.","소송은 중재에 비해 비용이 상대적으로 저렴하고 강제집행면에서 유리하다.","중재는 복잡한 절차와 삼심제도를 특징으로 하므로 소송에 비해 오래 걸린다.","중재는 비공개주의를 원칙으로 하므로, 기업 또는 개인의 비밀이 보장되어 소송에 비해 대외신용도의 침해 우려가 적다."],"answer":4},{"section":"무역계약","num":21,"stem":"21. 무역계약에 관한 설명으로 올바른 것은?","choices":["계약의 주요 내용을 포함하고 있는 견적송장(Proforma Invoice)은 청약의 유인이기 때문에 이에 대한 승낙만으로는 절대 계약이 성립되지 않는다.","수입자 입장에서는 무역계약의 선적일은 무조건 빠를수록 유리하다.","클레임 제기기간은 당사자 간에 약정이 있으면 해당 기간 안에 제기하면 되지만, CISG에서는 약정이 없는 경우에도 제척기간 2년을 넘길 수 없다.","중재판정은 법원의 확정판결과 동일한 효력을 지니며, 뉴욕협약을 통해 모든 국가 에서 외국중재판정의 승인 및 집행을 보장받는다."],"answer":3},{"section":"무역계약","num":22,"stem":"22. 다음이 설명하는 국제 민간 무역기관은? A. Incoterms, UCP 등 다양한 국제무역규칙을 제정ㆍ개정한다. B. 국제중재법원을 운영하고, 국제중재규칙을 통해 상거래 분쟁을 해결한다. C. 무역에 사용하는 분야별 국제표준계약서를 제공한다. D. 국제기업 행동강령 등을 통해 지속 가능한 무역환경을 조성한다. E. 무역실무 관련 교육과 자료를 출판ㆍ보급한다.","choices":["국제무역센터 (ITC: International Trade Centre)","세계무역기구 (WTO: World Trade Organization)","국제상업회의소 (ICC: International Chamber of Commerce)","국제무역법위원회 (UNCITRAL: UN Commission on International Trade Law)"],"answer":3},{"section":"무역계약","num":23,"stem":"23. 무역계약에서 주계약과 종속계약에 관한 설명으로 잘못된 것은?","choices":["CIP 조건은 수출자가 반드시 적하보험을 부보해야 하므로, 제시되는 가격에는 보험 료가 포함되어야 한다.","대표적인 종속계약인 운송계약, 보험계약, 결제계약을 체결하는 당사자는 반드시 Incoterms 조건에 따라 결정된다.","무역계약의 이행을 위한 종속계약으로서, 운송계약과 보험계약은 물품인도를 위해, 결제계약은 대금지급을 위해 체결된다.","수출자가 운임 또는 보험료를 할인 등으로 저렴하게 이용할 수 있는 경우, Incoterms의 F-조건보다는 C-조건을 활용하는 것이 가격 경쟁력 차원에서 유리할 수 있다. 문"],"answer":2},{"section":"무역계약","num":24,"stem":"24. 다음 지 에서 설명하는 복합운송의 경로는 무엇인가? 아시아 국가의 항만에서 파나마운하를 경유하여 북미 동해안 항구(예: 뉴욕항)까지 해상운송하고, 그곳에서 철도로 환적하여 내륙의 주요 지점까지 운송하는 방식이다.","choices":["MLB(Mini-Land Bridge)","IPI(Interior Point Intermodal)","OCP(Overland Common Point)","RIPI(Reversed Interior Point Intermodal)"],"answer":4},{"section":"무역계약","num":25,"stem":"25. 다음 중 정기 선 컨테이너 화물의 부대비용에 관한 설명으로 잘못된 것은?","choices":["Demurrage : 항해용선계약에서 허용된 정박기간을 초과한 일수에 대해 용선자가 선주 에게 지불하기로 약정한 금액","Terminal Handling Charge : 수출화물은 컨테이너가 CY에 입고된 순간부터 본선의 선 측까지, 수입화물은 본선의 선측에서 CY 게이트를 통과하기까지 화물의 이동에 수반 되는 비용","Detention Charge : 화주가 컨테이너 또는 트레일러를 대여받은 후 정해진 시간(free time) 내에 반환하지 못할 경우 운송인에게 지불해야 하는 벌금 성격의 비용","CFS Charge : CFS에서 LCL화물의 혼재, 적입, 적출, 분류작업에 수반되는 비용 프"],"answer":1},{"section":"무역계약","num":26,"stem":"26. 무역운송 인 라 설명 중 잘못된 내용인 것은?","choices":["컨테이너선은 초창기에 정기항로에 취항할 일반화물선을 전용선으로 했으므로 선형에 의한 분류, 하역 장비 장착에 의한 분류, 하역방식에 의한 분류 등으로 구분한다.","항만은 해륙 운송의 중계지로 육상 운송된 화물의 원활한 선적과 양하를 위한 시설을 갖추고 산업활동이 이루어지고 있는 장소를 의미한다.","내륙컨테이너기지는 항만 또는 공항이 아닌 내륙기지로서 컨테이너 집화, 통관, 컨테 이너 수리, 화물주선, 재고관리, 포장, 내륙운송 등의 업무를 처리할 수 있다.","공항은 항공기 운항의 중심지로서 여객과 화물의 기지로 운영되고 있으며, 항공화물 터미널의 하역 장비에는 Gantry Crane, Transporter, Dolly, Rich Stacker, Straddle Carrier 등이 있다."],"answer":4},{"section":"무역계약","num":27,"stem":"27. 피보험자의 의무 내용에 대한 설명 중에서 올바른 내용들로 짝지어진 것은? A. 고지의무는 보험계약을 체결하기 위한 교섭 중 또는 계약 성립 이전에 이행되어야 한다. B. 고지의무의 이행은 보험계약자가 관련 서류를 보험자에게 직접 제출하는 형태로만 이루어진다. C. 보험사고의 위험을 감소시키는 사항은 고지하지 않아도 고지의무 위반이 되지 않는 다. D. 워런티를 위반하면, 보험자는 그 시점부터 보상책임을 면하게 된다. E. 보험증권 원본을 갖고 있으면 보험료를 지불한 것으로 인정되어 무조건 보상을 받 을 수 있다.","choices":["A, B, D","A, D. E","A, B, C","A, C, D"],"answer":4},{"section":"무역계약","num":28,"stem":"28. 보험 클레임의 처리에 관한 내용 중에서 올바르지 않은 것은?","choices":["화물에 손해가 발생하였을 때는 지체 없이 손상 화물의 양하지 또는 그 인접 지역의 보험사 본지점 또는 대리점에 통지하여 손해 사정 절차를 받는 것이 필요하다.","피보험자는 현실적으로 발생한 혹은 발생할 화물의 손해를 방지, 경감할 의무가 있다.","피보험자가 취해야 할 조치 중에 사고에 대한 책임이 있는 당사자에게 손해배상청구 권의 보전 및 행사가 있다.","손해통지의무와 손해방지의무, 구상권 보전의무는 공동해손이 발생한 경우에만 행하는 피보험자의 보험클레임 처리 행위이다. 년 협회적하약관(ICC 2009) 운송약관 상 보험자의 책임이 개시되는 시점으로 올바"],"answer":4},{"section":"무역계약","num":29,"stem":"29. 2009 른 것은?","choices":["보험목적물이 운송의 개시를 위해 보험증권 상 명시된 장소의 창고 혹은 보관장소를 떠날 때","보험목적물이 운송의 개시를 위해 보험증권 상 명시된 장소의 창고 혹은 보관장소에 서 운송수단에 적재된 때","보험목적물이 운송의 개시를 위해 운송차량 혹은 운송용구에 적재할 목적으로 보험증 권 상 명시된 장소의 창고 혹은 보관장소에서 처음 이동할 때","보험목적물이 선박에 적재된 때 손"],"answer":3},{"section":"무역계약","num":30,"stem":"30. 다음 중 해상 해의 보상에 관한 설명으로 올바른 것은?","choices":["구조료(salvage charge)는 구조계약과 관계없이 임의로 구조한 자에게 구조의 성공 여 부와 관계없이 지급된다.","손해방지비용은 물적손해 등에 대한 보상액과 손해방지 비용의 합계가 보험금액을 초 과하는 경우에도 보상한다.","특별비용은 단독해손에 포함된다.","추정전손이 있는 경우 현실전손과 같이 전손에 해당하는 보험금을 청구하기 위해서는 보험목적물을 보험자에게 대위하여야 한다."],"answer":2},{"section":"무역영어","num":1,"stem":"1. 다음은 어 떤 청약(offer)에 해당하는가? Regarding your e-mail of June 20, 2025, please be informed that we are not in a position to accept your offer of silk handkerchiefs under the terms you proposed. It is likely that we will be able to procure the same product at a significantly lower price through another channel. We would appreciate it if you could consider revising your quotation, as we are keen to continue doing business with you.","choices":["Firm offer","Original offer","Free offer","Counter offer"],"answer":4},{"section":"무역영어","num":2,"stem":"2. 서신의 내용상 밑줄 친 (A)에 들어갈 적절한 문장은?\n\n[지문]\nThank you for your order of September 1 for 20 units of Portable Radio Set\n A102, 10 units of Cassette Tape Recorder B84, and 10 units of Microphone C59.\n   We have Portable Radio Set A102 and Cassette Tape Recorder B84 in stock,\n unfortunately Microphone C59 is out of stock.        (A)                         .\n   Our new model C60 has recently been launched, and we are seeing wide\n popularity. We would like you to consider this model instead of C59.\n   The other two items will be shipped to you as soon as possible.\n   Your prompt reply by email regarding C60 would be appreciated.\n\n Yours very truly,","choices":["This article is no longer manufactured because it has become outdated","We will make every effort to fill your order so that the goods will be shipped in time","As our factory is at present fully occupied with orders, we regret to decline your order","We are sorry that we have not been able to serve you this time, but as soon as conditions return to normal, we will contact you"],"answer":1},{"section":"무역영어","num":3,"stem":"3. 위 서신의 표제로 적절하지 않은 것은?\n\n[지문]\nThank you for your order of September 1 for 20 units of Portable Radio Set\n A102, 10 units of Cassette Tape Recorder B84, and 10 units of Microphone C59.\n   We have Portable Radio Set A102 and Cassette Tape Recorder B84 in stock,\n unfortunately Microphone C59 is out of stock.        (A)                         .\n   Our new model C60 has recently been launched, and we are seeing wide\n popularity. We would like you to consider this model instead of C59.\n   The other two items will be shipped to you as soon as possible.\n   Your prompt reply by email regarding C60 would be appreciated.\n\n Yours very truly,","choices":["Response to Order","Recommendation of a Substitute","Decline of Order","Confirmation of Contract"],"answer":4},{"section":"무역영어","num":4,"stem":"We thank you for your inquiry of April 12, 2025, and we take much pleasure in\n offering you the following, subject to your reply received at the end of July 2025.\n\n  ∙ Commodity : Blueberry Powder\n  ∙ Quantity    : 10,000 KG\n  ∙ Price       : USD 25.00/kg CIP New York, USA\n  ∙ Shipment    : Within 30 days after receipt of your L/C\n  ∙ Payment     : Confirmed L/C at sight in our favor\n\n We look forwarding to furthering our partnership.\n\n Very truly yours,\n\n4. 위 서신의 밑줄 친 부분을 대체하기에 가장 적절한 것은?\n\n[지문]\nDear Sirs,\n\n We thank you for your inquiry of April 12, 2025, and we take much pleasure in\n offering you the following, subject to your reply received at the end of July 2025.\n\n  ∙ Commodity : Blueberry Powder\n  ∙ Quantity    : 10,000 KG\n  ∙ Price       : USD 25.00/kg CIP New York, USA\n  ∙ Shipment    : Within 30 days after receipt of your L/C\n  ∙ Payment     : Confirmed L/C at sight in our favor\n\n We look forwarding to furthering our partnership.\n\n Very truly yours,","choices":["we would like to make an offer subject to the availability of stock when the order is made","we are pleased to offer you the goods below, subject to market fluctuation","it is our pleasure to make an offer that is valid","we are making an offer on sale or return"],"answer":3},{"section":"무역영어","num":5,"stem":"We thank you for your inquiry of April 12, 2025, and we take much pleasure in\n offering you the following, subject to your reply received at the end of July 2025.\n\n  ∙ Commodity : Blueberry Powder\n  ∙ Quantity    : 10,000 KG\n  ∙ Price       : USD 25.00/kg CIP New York, USA\n  ∙ Shipment    : Within 30 days after receipt of your L/C\n  ∙ Payment     : Confirmed L/C at sight in our favor\n\n We look forwarding to furthering our partnership.\n\n Very truly yours,\n\n5. 다음 중 위 서신의 내용에 대한 설명으로 잘못된 것은?\n\n[지문]\nDear Sirs,\n\n We thank you for your inquiry of April 12, 2025, and we take much pleasure in\n offering you the following, subject to your reply received at the end of July 2025.\n\n  ∙ Commodity : Blueberry Powder\n  ∙ Quantity    : 10,000 KG\n  ∙ Price       : USD 25.00/kg CIP New York, USA\n  ∙ Shipment    : Within 30 days after receipt of your L/C\n  ∙ Payment     : Confirmed L/C at sight in our favor\n\n We look forwarding to furthering our partnership.\n\n Very truly yours,","choices":["USD 25.00/kg includes costs for transportation and insurance to New York, USA","A sight draft will be drawn to the issuing bank for payment under the L/C","This is a firm offer proposing terms and conditions, which are effective until July 31, 2025","The shipment will be made within 30 days after payment is made under the L/C. N"],"answer":4},{"section":"무역영어","num":6,"stem":"6. 국제물품매매계약에 관한 U 협약(CISG 1980)상 아래 예시의 밑줄 친 (A)에 들어갈 청약의 효 력 소멸 사유는? On May 1, Seller delivered to Buyer an offer that stated: “I will hold this offer open until June 1.” On May 7, Buyer delivered to Seller the following: “I cannot accept your offer since the price is too high,” but on May 10, Buyer delivered to Seller the following: “I hereby accept your offer of May 1.” Seller immediately informed Buyer that this “acceptance” was not effective because of the earlier (A) : Buyer replied that this was not true because Seller has promised to hold the offer open until June 1.","choices":["Withdrawal","Validity","Rejection","Revocation N"],"answer":3},{"section":"무역영어","num":7,"stem":"7. 다음은 국제물품매매계약에 관한 U 협약(CISG 1980)의 일부이다. 공 란 (A), (B), (C) 에 들어가기에 가장 적절한 내용으로 짝지어진 것은? The Convention governs only the ( A ) of the contract of sale and the rights and obligations of the seller and the buyer arising from such a contract. In particular, except as otherwise expressly provided in this Convention, it is not concerned with: (i) the ( B ) of the contract or of any of its provisions or of any usage; (ii) the ( C ) which the contract may have on the property in the goods sold. A B C","choices":["effect application validity","validity formation effect","conclusion formation validity","formation validity effect o P"],"answer":4},{"section":"무역영어","num":8,"stem":"8. Inc terms 2020의 D U 규 칙에서 매도인의 의무가 아닌 것은?","choices":["The seller must enter into relevant contracts of carriage with the various carriers up to the named place","The seller must pay for unloading charges at the place of destination","The seller must bear import duty and taxes","The seller must bear the cost of delivery up to the agreed destination"],"answer":3},{"section":"무역영어","num":9,"stem":"9. 다음 서신의 내용으로 유추할 수 있는 매매계약 내용으로 잘못된 것은? Dear Sirs, On behalf of our customer, we would like to request a freight quotation for collection from Yangsan ICD, Korea and delivery to Auckland port, the arriving port. Our goods are: ∙ 20 dressing table assembly kits, packed in wooden boxes ∙ 20 stool chairs, W31xD31xH46 (cm) The dressing table assembly kits and stool chairs are protected against knocks by wooden boxes and the invoice value of the goods is USD 5,000. The freight will be paid by our customer once the goods are delivered at the arriving port. Very truly yours,","choices":["FCA term may be used in a contract between the seller and the buyer","The seller fulfills his/her delivery obligation when the goods are handed over to the carrier at Yangsan ICD","The seller will procure an insurance to Auckland port","The costs for transportation to Yangsan ICD are included in USD 5,000"],"answer":3},{"section":"무역영어","num":10,"stem":"10. 다음은 계약서 내용의 일부이다. 어 떤 조항의 내용인가? Should the opening of the letter of credit be delayed due to reasons for which the Buyer is responsible, the Buyer shall pay to the Seller an amount equivalent to three-tenths of one percent (0.3%) of the contract value.","choices":["Liquidated damage clause","Entire agreement clause","Non-waiver clause","Frustration clause"],"answer":1},{"section":"무역영어","num":11,"stem":"11. 다음은 무역계약서 내용의 일부이다. 조건에 대한 일반적인 설명으로 잘못된 것은? ∙ Description: Duster (Model No.ASE-23) ∙ Quantity : 2,000 pieces ∙ Price : USD 12.00/pcs CIP New York (subject to Incoterms 2020) ∙ Shipment : within 30 days after an order ∙ Payment : By an irrevocable L/C at sight (subject to UCP 600)","choices":["A negotiable bill of lading marked freight prepaid should be issued","A usance bill of exchange should be drawn on the buyer","The seller has a contractual obligation to procure insurance with maximum coverage to New York","The risk of the goods will be transferred when the goods are handed over to the first carrier"],"answer":2},{"section":"무역영어","num":12,"stem":"12. 다음은 무역계약서의 일부이다. 계약서의 내용으로 틀린 것은? This Agreement shall become effective on the date it is signed by both parties and shall remain in force for a period of three (3) years. No later than six (6) months prior to the expiration of this term, the parties shall engage in discussions regarding the renewal of the Agreement. If both parties mutually agree to renew, the Agreement shall be extended for an additional three (3) years, either under the same terms and conditions or as amended by mutual consent. If no agreement on renewal is reached, this Agreement shall automatically terminate upon the conclusion of the initial three (3) year period.","choices":["This contract becomes effective from when both parties sign the contract","This contract may be extended if both parties agree to do so six months before the contract terminates","The terms and conditions of this contract may be revised upon its renewal for an additional three-year period","In the absence of an agreement to the contrary, this contract will be renewed for another three years"],"answer":4},{"section":"무역영어","num":13,"stem":"13. 위 신용장에 대한 설명으로 잘못된 것은?\n\n[지문]\n40A: FORM OF DOCUMENTARY CREDIT:              IRREVOCABLE\n 31D: DATE AND PLACE OF EXPIRY: 15 SEP 2025 KOREA\n 50: APPLICANT: SIAM TINPLATE CO., LTD.\n 59: BENEFICIARY: POSCO INTERNATIONAL CO., LTD.\n 32B: CURRENCY CODE, AMOUNT: USD 3,800,000\n 39A: PERCENTAGE CREDIT AMOUNT TOLERANCE: 10/10\n 41A: AVAILABLE WITH...BY...: ANY BANK BY NEGOTIATION\n 43P: PARTIAL SHIPMENTS: ALLOWED\n 44A: PLACE OF TAKING IN CHARGE / RECEIPT：ANY PORT OF KOREA\n 44B: PLACE OF FINAL DESTINATION: LAEM CHABANG , THAILAND\n 44C: LATEST DATE OF SHIPMENT: 30 AUG 2025\n 45B: DESCRIPTION OF GOODS AND/OR SERVICES\n      BLACK PLATE FOR TIN PLATE\n      CFR LAEM CHABANG, THAILAND.\n 46A: DOCUMENTS REQUIRED\n     +SIGNED COMMERCIAL INVOICE IN 3 COPIES\n     +FULL SET (3/3) ORIGINAL CLEAN ON BOARD OCEAN BILLS OF LADING\n      MADE OUT TO ORDER OF KITA BANK, MARKED 'FREIGHT PREPAID'\n      AND NOTIFY APPLICANT\n     +PACKING LIST IN 3 COPIES\n     +CERTIFICATE OF ORIGIN ISSUED BY CHAMBER OF COMMERCE","choices":["This is an irrevocable and negotiable letter of credit and allows partial shipments","The seller may choose a shipping port in Korea","The seller could not invoice for USD 4,000,000 under this L/C","The seller is responsible for arranging the vessel and paying the freight"],"answer":3},{"section":"무역영어","num":14,"stem":"14. 위 신용장 조건에 따라 수익자가 제시한 서류 중 수리가 능 한 서류제시에 해당하 는 것은?\n\n[지문]\n40A: FORM OF DOCUMENTARY CREDIT:              IRREVOCABLE\n 31D: DATE AND PLACE OF EXPIRY: 15 SEP 2025 KOREA\n 50: APPLICANT: SIAM TINPLATE CO., LTD.\n 59: BENEFICIARY: POSCO INTERNATIONAL CO., LTD.\n 32B: CURRENCY CODE, AMOUNT: USD 3,800,000\n 39A: PERCENTAGE CREDIT AMOUNT TOLERANCE: 10/10\n 41A: AVAILABLE WITH...BY...: ANY BANK BY NEGOTIATION\n 43P: PARTIAL SHIPMENTS: ALLOWED\n 44A: PLACE OF TAKING IN CHARGE / RECEIPT：ANY PORT OF KOREA\n 44B: PLACE OF FINAL DESTINATION: LAEM CHABANG , THAILAND\n 44C: LATEST DATE OF SHIPMENT: 30 AUG 2025\n 45B: DESCRIPTION OF GOODS AND/OR SERVICES\n      BLACK PLATE FOR TIN PLATE\n      CFR LAEM CHABANG, THAILAND.\n 46A: DOCUMENTS REQUIRED\n     +SIGNED COMMERCIAL INVOICE IN 3 COPIES\n     +FULL SET (3/3) ORIGINAL CLEAN ON BOARD OCEAN BILLS OF LADING\n      MADE OUT TO ORDER OF KITA BANK, MARKED 'FREIGHT PREPAID'\n      AND NOTIFY APPLICANT\n     +PACKING LIST IN 3 COPIES\n     +CERTIFICATE OF ORIGIN ISSUED BY CHAMBER OF COMMERCE","choices":["Commercial invoices and certificate of origin, both issued by the seller","A Bill of Lading stating that the freight is prepaid to Laem Chabang, Thailand","A Bill of Lading stating the consignee is Siam Tinplate Co., Ltd., and the consignor is POSCO INTERNATIONAL CO., LTD","A Bill of Lading issued on September 12th, 2025, at Busan, Korea"],"answer":2},{"section":"무역영어","num":15,"stem":"15. 다음은 어 떤 신용장에 대한 설명인가? This credit refers to a credit instrument, that is issued or drawn without requiring any supporting documents other than the financial document itself, like bill of exchange. Therefore, under this credit, no shipping documents are attached because it is not conditioned upon the presentation of any documents proving shipment or delivery.","choices":["Back-to-back credit","Red clause credit","Revolving credit","Clean credit"],"answer":4},{"section":"무역영어","num":16,"stem":"16. 매입신용장 하에서 발행이 되는 환어음의 밑줄 친 부분(A~D)에 해당하는 당사자가 올바르게 짝지어진 것은? AT XXXXX SIGHT OF THE FIRST BILL OF EXCHANGE (SECOND OF THE SAME TENOR AND DATE BEING UNPAID) PAY TO (A) OR ORDER THE SUM OF US DOLLARS FIFTY EIGHT THOUSAND SEVEN HUNDREDS ONLY VALUE RECEIVED AND CHARGE THE SAME TO ACCOUNT OF (B) DRAWN UNDER BANK OF AMERICA, SEATTLE, U.S. L/C NO.: LC-8935-23-100 DATED 2025.04.03. TO: (C) (D) G.D.HONG, President (A) (B) (C) (D)","choices":["issuing bank buyer negotiating bank seller","confirming bank seller issuing bank buyer","negotiating bank buyer issuing bank seller","paying bank seller negotiating bank buyer"],"answer":3},{"section":"무역영어","num":17,"stem":"17. 다음 서신의 내용상 계약 당사자 간에 합의한 결제방식은? We are pleased to inform you that the order(No.ABZ-12) has been loaded onto the MV Arirang, which sails tomorrow and is due in Jakarta on 3 May, 2025. The shipping documents have been handed over to Seoul Bank with our draft drawn on you for USD 300,000.00 at 90 days after sight. Seoul Bank will forward the documents to HSBC, who may advise you for collection by next week. Also, we have sent the certificate of test that you asked for. However, we wonder if this is for reselling purposes. We should point out that your customers would only be covered by the warranty provided that the goods are not modified in any way.","choices":["L/C (Letter of Credit)","D/P (Documents against Payment)","D/A (Documents against Acceptance)","T/T (Telegraphic Transfer)"],"answer":3},{"section":"무역영어","num":18,"stem":"18. 다음 서신의 내용상 공 란 (A)에 들어갈 가장 적절한 용어는? Dear Mr. Smith, Upon receiving your letter dated on September 18, which enclosed Invoice No.W-562, I was surprised to find that you had included a draft for USD 23,600.00 requesting my (A) to clear my account with you. In all our previous transactions, I have consistently settled my accounts promptly via banker’s draft, and at no point have you raised any objections to this payment method. Therefore, I see no reason to change the system that has worked well for both of us. Unless there are specific reasons for this change, I regret to inform you that I cannot accept your draft. Accordingly, I am returning it with this letter. Unless I hear otherwise from you, I will assume that you agree to continue with our previous arrangement, and I will settle the outstanding amount punctually by banker’s draft when payment is due at the end of next month. Sincerely,","choices":["endorsement","collection","acceptance","acknowledgment"],"answer":3},{"section":"무역영어","num":19,"stem":"19. 다음 공 란 (A)와 (B)에 들어갈 적절한 서류끼리 연결된 것은? A ( A ) is a document which evidences a contract of carriage by sea and the taking over or loading of the goods by the carrier, and by which the carrier undertakes to deliver the goods against surrender of the documents. A ( B ) is a document commonly used in international trade to allow a carrier to release goods to the consignee who is not yet in possession of the original ( A ). A ( B ) assures the carrier that he/she will not suffer from any financial loss by having released the goods to a consignee in the absence of the ( A ). A B","choices":["Letter of Guarantee Seaway Bill","Bill of Lading Letter of Guarantee","Bill of Lading Letter of Indemnity","Seaway Bill Bill of Lading"],"answer":2},{"section":"무역영어","num":20,"stem":"20. 다음의 컨테이너 운송 관련 비용에 대한 설명 중 옳은 내용만 고른 것은? A. Bunker Adjustment Factor is a surcharge to cover fluctuations in the price of currency. B. Heavy Lift Surcharge is a surcharge fee imposed for cargo that exceeds weight limitations. C. Wharfage is the fee charged for the use of the wharf facilities. D. CFS Charge is a fee for consolidation, deconsolidation, and other activities performed in a container freight station, and it is particularly charged for full container load shipments. E. Terminal Handling Charges are the fees charged for the storage and positioning of containers in the port area. F. Detention Charges are fees levied against shippers for holding onto a container for less than the agreed free time.","choices":["A, B, C","A, B, D","B, C, E","C, E, F"],"answer":3},{"section":"무역영어","num":21,"stem":"21. 다음은 영국해상보험법(MIA)의 보험계약 성립에 관한 내용의 일부이다. 공란 (A)에 들어갈 올바른 용어는? A contract of marine insurance is deemed to be concluded when the proposal of the assured is accepted by the ( A ), whether the policy be then issued or not; and, for the purpose of showing when the proposal was accepted, reference may be made to the slip or covering note or other customary of the contract.","choices":["insurer","policy holder","insured","agent"],"answer":1},{"section":"무역영어","num":22,"stem":"22. 위 서신의 목적으로 가장 적절한 것은 무엇인가?\n\n[지문]\nDear Mark,\n  We're very sorry to hear that one of the glassware cases from your invoice dated\n the 10th of this month arrived broken.\n  Since we packed the goods in our usual way, we believe the damage was\n caused by rough handling from the shipping company. Also, because the goods\n were sold on FOB Busan, we are not responsible for this breakage in transit.\n  Nonetheless, we will immediately contact ABC Marine Insurance Co., Inc. to\n negotiate a resolution on your behalf.\n Yours truly,","choices":["To acknowledge its carelessness and propose to dispatch substitute items","To apologize for improper packaging and offer a refund for damaged goods","To let the recipient know that he/she is responsible for the damaged shipment","To explain who is responsible for breakage in transit and what action will be taken"],"answer":4},{"section":"무역영어","num":23,"stem":"23. 위 서신 이전에 매수인이 송부한 서신의 내용으로 적절하지 않은 것은?\n\n[지문]\nDear Mark,\n  We're very sorry to hear that one of the glassware cases from your invoice dated\n the 10th of this month arrived broken.\n  Since we packed the goods in our usual way, we believe the damage was\n caused by rough handling from the shipping company. Also, because the goods\n were sold on FOB Busan, we are not responsible for this breakage in transit.\n  Nonetheless, we will immediately contact ABC Marine Insurance Co., Inc. to\n negotiate a resolution on your behalf.\n Yours truly,","choices":["As these goods are unusable, we are formally lodging a claim for this breakage","We received the recent order for glassware today, and regret to inform you that upon inspection, we discovered significant breakage in one of the cases","We regretfully inform you that the goods ordered on July 20 have not been delivered to us","We have attached photographs of the damaged items and the packaging for your review"],"answer":3},{"section":"무역영어","num":24,"stem":"24. 위 서신에 대한 내용으로 잘못된 것은?\n\n[지문]\nDear Andrew,\n  We are very pleased to learn from our friend, Mr. Kim Sung-Kon, who recently\n returned from your city, that you are highly interested in Korean electronic goods.\n As Mr. Kim may have already informed you, we maintain strong business\n relationships   with   several   leading    manufacturers       in     Korea    and     enjoy     a\n well-established reputation for exporting our products to European markets.\n  Our   enclosed    catalog   provides      an   overview   of    our       product    lines.    The\n accompanying price list quotes prices on a CIF European port basis for a\n minimum order of 3,000 sets. However,                                (A)                 .\n Regarding payment, our company policy require all transactions to be conducted\n via an irrevocable Letter of Credit (L/C).\n Yours truly,","choices":["The price list enclosed quotes prices on a CIF basis for any order of less than 3,000 sets","It specifies that the selling prices include insurance to the port of arrival","It is an introductory letter sent by a seller to a potential new client","The seller become aware of the recipient's interest in Korean electronic goods through Mr. Kim Sung-Kon"],"answer":1},{"section":"무역영어","num":25,"stem":"25. 위 서신의 밑줄 친 (A)에 들어갈 적절한 문장은?\n\n[지문]\nDear Andrew,\n  We are very pleased to learn from our friend, Mr. Kim Sung-Kon, who recently\n returned from your city, that you are highly interested in Korean electronic goods.\n As Mr. Kim may have already informed you, we maintain strong business\n relationships   with   several   leading    manufacturers       in     Korea    and     enjoy     a\n well-established reputation for exporting our products to European markets.\n  Our   enclosed    catalog   provides      an   overview   of    our       product    lines.    The\n accompanying price list quotes prices on a CIF European port basis for a\n minimum order of 3,000 sets. However,                                (A)                 .\n Regarding payment, our company policy require all transactions to be conducted\n via an irrevocable Letter of Credit (L/C).\n Yours truly,","choices":["could you please send us one sample of model HD-0023?","we are prepared to offer an 8% discount on your initial trial order","we would be grateful if you could offer special discounts for bulk orders or long-term partnerships","we accept payment via direct bank transfer for your convenience"],"answer":2},{"section":"무역영어","num":26,"stem":"26. 다음 밑줄 친 부분(A~D)을 논리 전개에 따라 가장 잘 나열한 것은? Dear Mr. Barnes, Regarding Order No. 1029/36, please note that it was shipped on May 22, 2025, aboard the SS Samanda, which is expected to arrive in Dover on June 3. As per your request, we have already notified your agent, Rod Ericson, to arrange for the consignment's onward delivery to you. (A) These documents include the shipped clean bill of lading (No. 482619), invoice (No. EH2811), and insurance certificate (AR 109 1123). (B) In the meantime, we've enclosed a catalog of our new models. (C) We are confident you'll be very pleased with the machines and that they will find a strong market in your country. (D) Once you have accepted our bill, the relevant documents will be released by our bank's agents, Bonanza Bank Ltd. at High Street, Dover. We believe you'll be particularly interested in the machines featured on pages 69-73. We look forward to hearing from you again soon. Yours truly,","choices":["(C)-(A)-(B)-(D)","(C)-(D)-(B)-(A)","(D)-(A)-(C)-(B)","(D)-(C)-(A)-(B)"],"answer":3},{"section":"무역영어","num":27,"stem":"27. 다음 서신에서 밑줄 친 부분(A~D) 중 문맥상 가장 어색한 것은? Dear Mr. Merton, We are writing in response to the bill received today for goods shipped via the S.S. \"Ambassador,\" which we are unable to accept. As per our prior agreement, these goods were sent to us on consignment. (A) The delayed delivery of the consignment has resulted in significant commercial detriment. (B) We did not provide authorization for you to draw on us for this shipment. (C) Additionally, we have not yet found buyers for these goods at the invoiced price, and they remain in our inventory. (D) It appears there has been an error in billing given the consignment terms. We will continue our efforts to sell the goods, though we anticipate having to offer them at prices lower than those stated. Please find the unaccepted draft returned with this letter. We request your review and correction of this billing error. Sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":1},{"section":"무역영어","num":28,"stem":"28. 다음 중 주어진 문장을 영작한 것 중 그 내용이 잘못된 것은?","choices":["조만간 상품들을 선적할 것이므로 신용장을 빠른 시일 내에 개설해주실 것을 요청 합니다. ⇒ We will soon be ready for shipment of the goods and, therefore, ask you to open a letter of credit as soon as possible to enable us to effect the shipment on time","귀사를 수익자로 미화 18만불 상당의 취소불능신용장을 LA의 Bank of America측에 서 개설하였음을 통보합니다. ⇒ We would like to notify you that the Bank of America in LA has opened an irrevocable letter of credit in your favor for the amount of USD 180,000","귀사의 신용장 No. 7의 유효기간을 5월 15일까지 연장해 주실 것을 요청합니다. ⇒ We request that your L/C No. 7 be amended, extending its validity to May 15","신용장을 검토한 결과, 운송료가 착불조건인데, FOB 조건이므로 운송료를 선불로 수정해 주시기 바랍니다 ⇒ After reviewing the letter of credit, we noted that the freight is indicated as prepaid. Since the shipment is under FOB terms, we kindly request that you amend it to collect"],"answer":4},{"section":"무역영어","num":29,"stem":"29. 이 메일의 밑줄 친 부분을 대체하기에 그 의미가 다른 문장은?\n\n[지문]\nWe are writing in response to your email dated April 10th inquiring about Jason\n Co. which had furnished us as a reference to you.\n      At this time we are sorry to say that our transactions with this firm have been\n so     small     and    infrequent   that   we   do   not   feel   justified   in   making   any\n recommendations regarding their financial standing and creditworthiness one way\n or the other.\n      Once again, we regret that we could not provide you with any concrete\n information that may encourage you to commence doing business with them.\n      If you feel we may be of further assistance, please do not hesitate to ask.\n\n      Sincerely yours,","choices":["We are sorry that we cannot give you sufficient information regarding the credit standing of the firm","We would advise you to proceed with caution in your dealing with the firm in question","We regret our inability to inform you of anything concerning the firm mentioned","As our relationship with the firm is limited, it would be advisable for you to instruct an inquiry agency to investigate the matter"],"answer":2},{"section":"무역영어","num":30,"stem":"30. 위 비즈니스에서 활용된 신용조회처는 무엇인가?\n\n[지문]\nWe are writing in response to your email dated April 10th inquiring about Jason\n Co. which had furnished us as a reference to you.\n      At this time we are sorry to say that our transactions with this firm have been\n so     small     and    infrequent   that   we   do   not   feel   justified   in   making   any\n recommendations regarding their financial standing and creditworthiness one way\n or the other.\n      Once again, we regret that we could not provide you with any concrete\n information that may encourage you to commence doing business with them.\n      If you feel we may be of further assistance, please do not hesitate to ask.\n\n      Sincerely yours,","choices":["Bank Reference","Credit Rating Company","Trade Reference","Consulate Inquiry"],"answer":3}];
var _D64=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하는 용어에 관한 설명으로 올바른 것은?","choices":["외국인도수출이란 수출대금을 해외에서 영수하고, 국내에서 통관된 수출 물품 등을 외 국으로 인도하거나 제공하는 수출을 말한다.","보세판매장에서 외국인에게 국내에서 생산(재생ㆍ개조하는 것 포함)된 물품을 매도하 는 것은 수출에 해당한다.","임대수출이란 임대(사용대차를 제외)계약에 의하여 물품 등을 수출하여 일정기간 후 다시 수입하거나 그 기간의 만료 전 또는 만료 후 해당 물품 등의 소유권을 이전하는 수출을 말한다.","무역에는 대통령령으로 정하는 용역의 수출과 수입이 포함되며, 「부가가치세법 시행 령」 제3조에 따른 용역(출판업과 영상ㆍ오디오 기록물 제작 및 배급업 제외)이 해당 한다."],"answer":2},{"section":"무역규범","num":2,"stem":"2. 다음 중 우리나라의 대외무역법령에서 규정하고 있는 무역의 진흥을 위한 조치와 전문무역상사의 지정 및 지원에 관한 설명 중에서 올바른 것을 모두 고른 것은? A. 무역의 진흥을 위한 지원 대상이 되는 시설은 무역전문인력 양성을 위한 연면적 이 2천 제곱미터 이상이고 최대수용 인원이 500명 이상인 무역연수원이 해당된다. B. 대통령은 무역의 진흥을 위하여 필요하다고 인정되면 대통령령으로 정하는 바에 따라 해당하는 자에게 필요한 지원을 할 수 있다. C. 전문무역상사의 지정기준 중 하나로서, 전년도 수출실적 또는 직전 4개 연도의 연 평균 수출실적이 미화 100만달러 이상의 범위에서 산업통상자원부장관이 정하여 고시하는 금액 이상이어야 한다. D. 전문무역상사의 지정기준 중 하나로서, 수출실적 중 다른 중소기업이나 중견기업 이 생산한 물품 등의 수출실적 비율이 100분의 20 이상의 범위에서 산업통상자원 부장관이 정하여 고시하는 비율 이상이어야 한다.","choices":["A, C","A, D","B, C","B, D"],"answer":2},{"section":"무역규범","num":3,"stem":"3. 우리나라의 대외무역법령에서 규정하고 있는 수출입의 제한 및 수출입승인 물품 등 에 관한 설명으로 잘못된 것은?","choices":["수출입승인 유효기간은 1년 이내 또는 20년의 범위에서 유효기간을 단축 또는 초과 하여 설정할 수 있다.","수출입승인 물품 등이란 수출입공고에서 정한 물품 등으로 중계무역 물품, 외국인 수입 물품, 외국인도수출 물품, 선용품을 포함한다.","하나의 수출 또는 수입에 대하여 둘 이상의 승인을 받아야 하는 경우 각각의 승인 은 서로 독립적으로 받아야 한다.","산업통상자원부장관은 항공 관련 품목의 안전관리가 필요한 경우, 해당 물품의 수 출입을 제한하거나 금지할 수 있다."],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에서 규정하는 수출입실적에 대한 설명 중 잘못된 것은?","choices":["북한으로의 유상반출 실적을 포함하여 유상으로 거래되는 수출은 수출실적 인정범위 에 해당한다.","전자적 형태의 무체물 수출의 수출실적 인정금액은 한국무역협회장 또는 한국소프트 웨어산업협회장이 외국환은행을 통해 확인한 입금금액이다.","수입실적 인정금액은 수입통관액(FOB가격 기준)이다. 다만, 외국인수수입과 용역 또는 전자적 형태의 무체물의 수입은 외국환은행의 지급액이다.","외화를 받고 외항 선박에 내국 선박용품을 공급하는 경우, 수출실적 인정시점은 선박 용품 등 관리에 관한 고시에 따른 적재허가서에 기재된 허가일자이다."],"answer":3},{"section":"무역규범","num":5,"stem":"5. 우리나라의 대외무역관리규정에서 규정하고 있는 외화획득의 이행기간에 관한 설명 중 잘못된 것은?","choices":["외화획득 이행의무자는 외화획득용 원료의 수입신고 수리일로부터 2년 이내에 외화 획득의 이행을 하여야 한다.","국내 공급(양도 포함)의 경우에는 공급일로부터 1년 이내에 외화획득의 이행을 하여 야 한다.","외화획득 물품의 선적기일이 2년 이상인 경우에는 그 기일까지의 기간에 외화획득 의 이행을 하여야 한다.","수출이 완료된 기계류(HS 84류부터 90류까지의 품목)의 하자 및 유지보수용 원료 등의 외화획득의 이행기간은 5년 이내로 한다."],"answer":4},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 전략물자의 수출과 관련된 내용으로 올바른 것은?","choices":["수출허가를 받지 아니하고 전략물자를 수출신고한 자에게 5년 이내의 범위에서 일정 기간 동안 전략물자 등의 전부 또는 일부의 수출을 제한할 수 있다.","물품 등을 수출하려는 자는 전략물자인지 또는 상황허가 대상 물품 등인지를 스스로 판정할 수 없다.","수출허가의 유효기간은 1년이며, 상황허가의 유효기간은 2년이다.","선박 또는 항공기의 안전 운항을 위하여 긴급 수리용으로 사용될 기계, 기구 또는 부 분품 등을 수출하는 경우에는 전략물자의 수출허가를 면제할 수 있다."],"answer":4},{"section":"무역규범","num":7,"stem":"7. 다음 중 대외무역법령에서 규정하고 있는 정부 간 수출계약의 절차에 해당하지 않 는 것은?","choices":["방위산업 물자의 구매 의사에 관한 법에 따른 전담기관의 확인","국내 기업의 정부 간 수출계약 이행 능력에 관한 평가 및 추천","전담기관과 국내 기업의 정부 간 수출계약 이행에 관한 약정 체결","국내 기업이 함께 계약의 당사자가 되어 체결하는 경우를 포함한 전담기관과 외국 정부 간 수출계약의 체결"],"answer":1},{"section":"무역규범","num":8,"stem":"8. 대외무역법령에서 규정하고 있는 원산지 표시 방법에 관한 설명 중 올바른 것은?","choices":["실질적 변형을 일으키는 제조 공정에 투입되는 부품을 수입한 후 실수요자에게 직 접 공급하는 경우, 해당 물품에 원산지를 표시하여야 한다.","수입된 물품이 단순 가공 활동을 거쳐 원산지 표시가 손상된 경우, 단순가공이 이 루어진 국가를 원산지로 표시하여야 한다.","무역거래자 또는 판매업자는 수입물품 등에 표시된 원산지를 변경할 수 있다.","수출물품에 대한 수입국의 원산지 표시 규정이 우리나라 규정과 다를 경우, 수입국 규정에 따라 원산지를 표시할 수 있다."],"answer":4},{"section":"무역규범","num":9,"stem":"9. 다음 중 대외무역법령에서 규정하고 있는 수입수량 제한조치에 대한 설명으로 올바 른 것은?","choices":["특정 물품의 수입 증가로 인하여 같은 종류의 물품 또는 직접적인 경쟁 관계에 있는 물품을 생산하는 국내산업이 실질적 피해 등이 있음이 무역위원회 조사를 통해 확인 되면 시행할 수 있다.","산업통상자원부장관은 수입수량 제한조치를 하는 경우, 제한되는 수입수량을 각 국가 별로 할당할 수 있다.","수입수량 제한조치는 조치 시행일 이전에 수입된 물품에도 적용할 수 있다.","수입수량을 제한하는 경우 그 제한 수량은 최근의 3년간의 대표적인 수입량을 연평균 수입량으로 환산한 수량(기준 수량) 이하로 하여야 한다."],"answer":2},{"section":"무역규범","num":10,"stem":"10. 대외무역법상 조정을 명하는 경우 고려해야 할 사항으로 올바른 것을 모두 고르시오. A. 물품 등의 수출·수입의 질서 유지를 위한 목적에 필요한 정도를 넘지 아니할 것 B. 다른 무역거래자의 권익을 부당하게 침해하거나 차별하지 아니할 것 C. 교역상대국과의 경제협력 증진에 기여할 것 D. 수출기반의 안정, 새로운 상품의 개발 또는 새로운 해외시장의 개척에 기여할 것","choices":["A, B","A, B, D","C, D","A, C, D"],"answer":2},{"section":"무역규범","num":11,"stem":"11. 다음 중 대외무역법령에서 규정하고 있는 구매확인서에 관한 설명으로 잘못된 것은?","choices":["외화획득용 원료·기재의 제조·가공·유통(완제품의 유통은 제외)과정이 여러 단계인 경우, 각 단계별로 순차적으로 구매확인서를 발급할 수 있다.","외국환은행의 장 또는 전자무역기반사업자는 발급된 구매확인서를 근거로 2차 구매확 인서를 발급할 수 있다.","구매확인서를 발급받으려는 자가 전산 설비를 갖추지 못한 때에는 전자무역기반사업 자에게 위탁하여 신청할 수 있다.","산업통상자원부장관은 구매확인서를 발급받은 자에 대하여 외화획득용 원료·기재의 구매 여부를 사후 관리하여야 한다."],"answer":1},{"section":"무역규범","num":12,"stem":"12. 다음 괄호 안의 용어로 올바르게 짝지어진 것은? A. ㈜KITA는 유럽에서 국내로 반입한 수입식품에 대해 식약처의 요건을 충족하지 못 해 다시 해외로 반출하면서 ( )통관을 하였다. B. 우리나라 선박이 태평양에서 잡은 참치는 ( )물품이다. C. ㈜KITA는 세관으로부터 관세의 과세표준과 세액을 결정 또는 경정하기 위하여 방 문 또는 서면으로 납세자의 장부 등을 조사하는 ( )조사 통지를 받았다. D. ㈜KITA는 중국에서 생산한 의류를 인천항으로 반입한 후 보세 상태로 인천공항을 통해 항공기로 영국으로 반출하였다. 이를 ( )환적이라고 한다.","choices":["A : 수출, B : 내국, C : 세관, D : 복합","A : 수출, B : 외국, C : 세관, D : 이중","A : 반송, B : 내국, C : 관세, D : 복합","A : 반송, B : 외국, C : 관세, D : 이중"],"answer":3},{"section":"무역규범","num":13,"stem":"13. 관세법상 기간과 기한에 대한 설명으로 잘못된 것은?","choices":["관세청장이 정하는 사유로 국가관세종합정보시스템, 연계정보통신망 또는 전산처리설 비의 가동이 정지되어 법에 따른 신고·신청·승인·허가·수리·교부·통지·통고· 납부 등을 기한까지 할 수 없게 된 때에는 해당 국가관세종합정보시스템, 연계정보통 신망 또는 전산처리설비의 장애가 복구된 날의 다음 날을 기한으로 한다.","세관장은 천재지변으로 기한 내 신고, 납부 또는 징수 등을 할 수 없다고 인정되는 경 우, 5년을 넘지 않는 범위에서 그 기한을 연장할 수 있다.","수입신고 전 즉시반출신고를 한 경우 관세의 납부기한은 수입신고일부터 15일 이내이 다.","월별납부 승인의 유효기간은 승인일부터 2년이 되는 날이 속하는 달의 말일까지로 한 다."],"answer":2},{"section":"무역규범","num":14,"stem":"14. 다음 관세법상 과세요건 및 과세시점 등에 관한 설명으로 잘못된 것은?","choices":["관세법상 과세의 4대 요건은 과세물건, 과세표준, 관세율, 납세의무자이다.","과세물건은 유체물인 수입물품이다. 다만, 특허권이나 상표권 등 무형권리가 물품가 격에 포함되어 수입되었을 때에는 과세대상에 포함될 수 있다.","관세는 수입신고를 하는 때의 물품의 성질과 수량에 따라 부과한다. 단, 입항전 신 고의 경우에는 물품이 수출국에서 출항할 때의 성질과 수량에 따라 부과한다.","관세율은 수입신고일의 세율을 적용하므로 수입신고일이 관세율 인하일 이후인 경 우, 인하된 세율을 적용한다."],"answer":3},{"section":"무역규범","num":15,"stem":"15. 다음 중 수입신고 시 납세의무자로 올바르게 짝지어진 것은? A. ㈜KITA는 미국의 A사와 물품 수입 계약을 체결하였다. 그러나 수입절차를 잘 몰 라 수입대행업체인 ㈜한국무역에 물품 수입을 위탁하였고 ㈜한국무역은 이를 대 행 수입하였다. B. ㈜KITA는 유럽에서 수입 계약을 체결한 후 운송 중인 물품을 국내에 도착하기 전 에 B/L 양도 계약을 통해서 물품을 ㈜한국무역에 양도하였다. C. ㈜KITA는 중국에서 반입한 물품을 ㈜한국무역이 운영하는 보세창고에 보관하던 중, 수입신고 전에 모든 물건이 분실된 것을 확인하였다.","choices":["A : ㈜KITA B : ㈜KITA C : ㈜KITA","A : ㈜KITA B : ㈜한국무역 C : ㈜한국무역","A : ㈜한국무역 B : ㈜한국무역 C : ㈜한국무역","A : ㈜한국무역 B : ㈜한국무역 C : ㈜KITA"],"answer":2},{"section":"무역규범","num":16,"stem":"16. 다음 중 관세법령상 관세부과의 제척기간에 관한 설명으로 잘못된 것은?","choices":["관세부과의 제척기간이 경과되더라도, 관세법에 따른 심사청구에 관한 결정이 있은 경 우, 그 결정일로부터 1년 이내에 필요한 처분을 할 수 있다.","과다환급 또는 부정환급 등의 사유로 관세를 징수하는 경우, 제척기간의 기산일은 환 급한 날의 다음 날이다.","관련 결정 또는 판결에 따라 명의대여 사실이 확인된 경우, 당초의 부과처분을 취소하 고 그 결정 또는 판결이 확정된 날부터 1년 이내에 실제로 사업을 경영한 자에게 경 정이나 필요한 처분을 할 수 있다.","수입신고를 하지 아니하고 수입한 경우, 관세를 부과할 수 있는 날부터 10년이 지나면 부과할 수 없다."],"answer":4},{"section":"무역규범","num":17,"stem":"17. 다음 중 관세법 제33조의 국내판매가격을 기초로 한 과세가격 결정방법에서 공제 요소에 관한 설명으로 잘못된 것은?","choices":["수입항까지의 운임․보험료 및 그 밖의 관련 비용은 공제 요소에 해당하며, 실제 발생 한 비용을 공제한다.","국내 판매와 관련하여 통상적으로 지급하였거나 지급하기로 합의된 수수료 또는 동종․ 동류의 수입물품이 국내에서 판매되는 때에 통상적으로 부가되는 이윤 및 일반경비는 공제 요소에 해당한다.","해당 물품의 수입 및 국내 판매와 관련하여 납부한 공과금은 공제 요소에 포함된다.","과세가격을 결정함에 있어서 수입 시 납부한 관세는 공제 요소에 해당한다."],"answer":1},{"section":"무역규범","num":18,"stem":"18. 납세의무자가 가격신고를 할 때 신고하여야 할 가격이 확정되지 아니한 경우로서 잠정가격으로 가격신고를 할 수 있는 경우로 잘못된 것은?","choices":["과세가격 결정방법의 사전심사를 신청한 경우","거래관행상 거래가 성립된 때부터 일정 기간이 지난 후에 가격이 정하여지는 물 품(기획재정부령으로 정하는 것으로 한정)으로서 수입신고일 현재 그 가격이 정하 여지지 아니한 경우","관세법 제33조(4방법)에 따라 과세가격을 결정하기 위한 이윤 및 일반경비 산출 등에 오랜 시간이 소요되는 경우","물품을 수입하려는 자가 수입신고를 하기 전에 관세청장에게 품목분류를 미리 심 사하여 줄 것을 신청하는 경우"],"answer":4},{"section":"무역규범","num":19,"stem":"19. 다음 중 관세법상 가산세를 부과하는 경우가 아닌 것은?","choices":["관세청장이 정하는 물품을 보세구역 반입일로부터 30일 이내에 수입신고하지 않은 경우","납세의무자가 부정한 행위로 과소신고한 후, 보정기간 내에 세액에 대한 보정을 신청 하는 경우","재수출면세를 적용받은 물품을 지정기간 내에 재수출하지 않은 경우","수입신고 수리 전 반출물품에 대해 반출승인을 받은 후 10일 이내에 담보를 제공하지 아니한 경우"],"answer":4},{"section":"무역규범","num":20,"stem":"20. 관세법상 관세율의 종류 및 적용에 관한 설명으로 올바른 것은?","choices":["기본세율과 잠정세율은 별표 관세율표에 따르되 기본세율을 잠정세율에 우선하여 적 용한다.","수입물품에 적용되는 관세율은 기본세율과 잠정세율 두 가지뿐이다.","덤핑방지관세의 부과와 잠정조치는 각각의 조치일 이후 수입되는 물품에 적용된다. 다 만, 잠정조치가 적용된 물품에 대하여 국제협약에서 달리 정하는 경우에는 그 물품에 도 덤핑방지관세를 부과할 수 있다.","긴급관세의 부과 여부 및 그 내용은 무역위원회의 건의가 접수된 날부터 1년 이내에 결정하여야 한다. 다만, 주요 이해당사국과 긴급관세의 협의기간은 이에 포함되지 아 니한다."],"answer":3},{"section":"무역규범","num":21,"stem":"21. 다음 중 관세법상 기획재정부령으로 정하는 관세가 면제되는 재수입 물품을 모두 고른 것은? A. 박람회, 전시회, 품평회 등 이에 준하는 행사에 사용된 물품 B. 해외에서 수리된 물품 C. 수출 후 결함이 발견되어 다시 수입하는 물품 D. 수출물품을 해외에서 설치하기 위해 사용하는 장비","choices":["A, B","A, B, D","A, C, D","A, B, C, D"],"answer":3},{"section":"무역규범","num":22,"stem":"22. 다음 중 관세법상 경정청구에 대한 설명이 올바른 것은?","choices":["납세의무자는 신고납부한 세액이 과다한 경우, 최초로 납세신고일부터 1년 이내에 세 액의 경정을 세관장에게 청구할 수 있다.","세관장은 경정청구를 받은 날부터 1개월 이내에 세액을 경정하거나, 경정하여야 할 이 유가 없다는 뜻을 통지하여야 한다.","경정청구 후 1개월 이내에 통지를 받지 못한 경우에는 그 1개월이 되는 날의 다음 날 부터 이의신청, 심사청구, 심판청구 또는 감사원법에 따른 심사청구를 할 수 있다.","청구기한이 이미 경과하였더라도, 해당 신고 건에 대한 판결이나 결정 등으로 세액이 다르다는 것을 안 날부터 2개월 이내에는 경정청구를 할 수 있다."],"answer":4},{"section":"무역규범","num":23,"stem":"23. 다음 중 관세법상 보세공장에서의 보세작업을 위하여 반입되는 원재료에 해당하지 않는 것은?","choices":["해당 보세공장에서 생산하는 제품에 물리적 또는 화학적으로 결합되는 물품","해당 보세공장에서 생산하는 제품의 제조ㆍ가공 과정에서 소모되는 물품","해당 보세공장에서 수리ㆍ조립ㆍ검사ㆍ포장 등의 작업에 직접 투입되는 물품","보세공장에서 사용할 생산공정에 필수적인 기계"],"answer":4},{"section":"무역규범","num":24,"stem":"24. 다음 중 관세법령상 물품의 수출입신고 및 검사절차에 대한 설명으로 잘못된 것 은?","choices":["국민보건, 사회안전 또는 국제무역질서 준수 등을 위해 수출관리가 필요한 물품은 관 세청장이 정하는 장소에 반입한 후 수출신고를 하게 할 수 있다.","세관공무원의 적법한 물품검사로 인하여 발생한 손실에 대하여는 화물관리운영인이 손실을 입은 자에게 보상하여야 한다.","세관장은 관세청장이 정하는 바에 따라 검사를 받을 물품의 전부 또는 일부를 세관검 사장에 반입하여 검사할 수 있다.","입항전수입신고는 당해 물품을 적재한 선박 또는 항공기가 그 물품을 적재한 항구 또 는 공항에서 출항하여 우리나라에 입항하기 5일전(항공기의 경우 1일전)부터 할 수 있 다."],"answer":2},{"section":"무역규범","num":25,"stem":"25. 관세법상 납세자의 권리 및 불복절차에 관한 설명으로 잘못된 것은?","choices":["세관공무원은 특정한 분야만을 조사할 필요가 있는 등 대통령령으로 정하는 경우를 제외하고는 통합조사를 원칙으로 한다.","세관공무원은 적정하고 공평한 과세를 실현하고 통관의 적법성을 보장하기 위하여 필 요한 최소한의 범위에서 관세조사를 하여야 하며 다른 목적을 위하여 조사권을 남용 하여서는 안 된다.","세관공무원은 이미 조사받은 자의 거래상대방을 조사할 필요가 있는 경우라도, 해당 사안에 대하여는 다시 조사할 수 없다.","수입물품에 부과되는 내국세 등의 부과, 징수, 감면, 환급 등에 관한 세관장의 처분에 불복하는 자는 이의신청·심사청구 또는 심판청구를 할 수 있다."],"answer":3},{"section":"무역규범","num":26,"stem":"26. 다음 중 관세환급특례법상 관세환급 대상 수출에 해당하는 것을 모두 고른 것은? A. 우리나라 안에 주류하는 주한미군에 대한 물품을 판매하여 외화를 획득하는 행위 B. 주한미군이 시행하는 공사를 수행하여 외화를 획득하는 행위 C. 우리나라와 외국 간을 왕래하는 선박 또는 항공기에 선용품ㆍ기용품으로 사용되 는 물품을 공급하는 행위 D. 관세법에 따라 수출신고가 수리된 유상수출 E. 계약조건 불일치로 반품된 물품을 대체하기 위한 무상수출","choices":["A, B, D","A, B, D, E","A, B, C, D","A, B, C, D, E"],"answer":4},{"section":"무역규범","num":27,"stem":"27. 다음 중 수출용 원재료에 대한 관세 등 환급에 관한 특례법(관세환급특례법)의 내 용으로 올바른 것은?","choices":["환급 대상은 내수 및 수출용 원재료에 대한 관세, 임시수입부가세, 개별소비세, 주세, 교통ㆍ에너지ㆍ환경세, 농어촌특별세 및 교육세이다.","수입한 상태 그대로 수출한 경우는 환급 대상에 해당하지 않는다.","관세 등의 환급신청은 수출자 또는 생산자 중에서 수출신고필증에 환급신청인으로 기 재된 자가 하여야 한다.","수출용원재료에 대한 관세 등을 환급받을 수 있는 수출에는 무상수출은 해당되지 않 는다."],"answer":3},{"section":"무역규범","num":28,"stem":"28. 다음 중 자유무역협정(FTA)관세법령상 협정관세의 적용신청 등에 관한 설명으로 잘 못된 것은?","choices":["협정관세를 적용받으려는 수입자는 원칙적으로 수입신고 수리 전까지 세관장에게 협정관세 적용을 신청하여야 한다.","협정관세의 적용을 신청할 때 수입자는 원산지증빙서류를 갖추고 있어야 하며, 세 관장이 요구하면 제출하여야 한다. 다만, 세관장은 대통령령으로 정하는 물품에 대 해서는 관세 탈루의 우려가 있는 경우를 제외하고는 원산지증빙서류 제출을 요구할 수 없다.","세관장은 수입자가 요구받은 원산지증빙서류를 제출하지 아니하거나 수입자가 제출 한 원산지증빙서류만으로 해당 물품의 원산지를 인정하기가 곤란한 경우에는 수입 신고 수리일로부터 2년 이내에 사후적용 신청을 하게 할 수 있다.","세관장은 협정관세의 적용신청을 받은 경우 원칙적으로 수입신고를 수리한 후에 심 사하지만, 필요시 수리하기 전에 심사할 수 있다."],"answer":3},{"section":"무역규범","num":29,"stem":"29. 다음 중 자유무역협정(FTA)관세법령상 원산지결정기준에 관한 설명으로 올바른 것 을 모두 고른 것은? A. 해당 물품의 전부를 생산ㆍ가공 또는 제조한 국가는 그 물품의 원산지로 한다. B. 둘 이상의 국가에서 생산·가공·제조된 경우, 해당 물품에 일정 수준 이상의 부가가 치를 창출한 국가는 원산지로 인정된다. C. 원산지 물품이 제3국을 경유하여 운송된 경우에는 어떠한 사유로도 원산지로 인 정되지 않는다. D. 협정에서 직접운송요건을 별도로 정한 경우에는 그 협정에서 정하는 바에 따른다.","choices":["A, B","A, B, D","A, C, D","A, B, C, D"],"answer":2},{"section":"무역규범","num":30,"stem":"30. 다음 중 우리나라의 자유무역협정의 이행을 위한 관세법의 특례에 관한 법률(FTA 관세법) 내용에 대한 설명 중 틀린 것은?","choices":["FTA관세법은 관세법 및 자유무역협정에 우선하여 적용한다. 다만 FTA관세법에서 정 하지 아니한 사항은 관세법에 따른다.","FTA관세법은 우리나라가 체결한 자유무역협정의 이행을 위하여 관세법의 특례에 관 한 사항과 체약상대국과의 관세행정 협조에 필요한 사항을 규정하고 있다.","한도수량 내 협정관세율이 적용되도록 양허된 물품 중 기획재정부령으로 정하는 물품 에 대해서는 그 수량을 선착순으로 배정한다.","미합중국의 경우 긴급관세조치 대상은 섬유 관련 물품과 자동차로 한정하고 있다."],"answer":1},{"section":"무역결제","num":1,"stem":"1. 다음 중 수출입대금 결제방법과 외국환거래법에 대한 설명으로 잘못된 것은?","choices":["외국환거래법은 결제방법에 대하여 별도의 허가가 요구되는 경우만을 정하고, 나머지 는 자유롭게 거래할 수 있도록 Negative List System 방식으로 관리한다.","수출입자는 외국환거래법의 ‘통화 지정제도’에 따라서 외국환은행에서 대고객 전신 환 매매율이 고시되는 40개 통화만 결제통화로 선택해야 한다.","수출입대금은 외국환거래법상 원칙적으로 송장금액 전액을 지급 또는 영수해야 한다.","거주자는 건당 미화 50만 달러 이상에 대한 대외채권 회수 의무가 폐지되어 강제성은 없어졌지만, 자신의 이익을 위해 회수해야 한다."],"answer":2},{"section":"무역결제","num":2,"stem":"2. 다음 중 송금결제방식에 대한 설명으로 올바른 것을 모두 고른 것은? A. 송금결제방식은 추심결제방식과 혼합하여 활용될 수 있다. B. BWT 거래는 사전송금방식으로 진행된다. C. O/A 거래는 선적완료 사실을 수입자에게 통보하는 시점에 매출채권이 발생한다. D. O/A NEGO 시 은행에 제시하는 모든 선적서류는 사본으로 제시할 수 있다. E. CAD 거래는 수출자에게 신용위험만 존재하고, 비상위험은 발생하지 않는다.","choices":["A, B, C","A, C, D","B, D, E","C, D, E"],"answer":2},{"section":"무역결제","num":3,"stem":"3. 다음은 특정 결제방식의 특징을 설명한 것이다. 이에 해당하는 결제방식은 무엇인가? A. 수출상이 환어음을 발행하는 어음거래로서 어음법의 적용을 받는다. B. 수출상은 은행을 통해 금융서류와 상업서류를 송부한다. C. 수입상은 은행을 통해 수입대금을 지급한다. D. 본 결제방식은 ICC에서 제정한 통일규칙이 존재한다. E. 수입자의 신용에 바탕을 둔 거래로서, 수출상이 결제위험을 감수한다.","choices":["Letter of Credit","Remittance","Export Factoring","Collection"],"answer":4},{"section":"무역결제","num":4,"stem":"4. 다음 중 추심결제방식에서의 환어음에 대한 내용으로 잘못된 것은?","choices":["제시은행은 환어음의 인수 형식이 명확하게 기재되어 있는지 확인하여야 한다.","환어음의 지급인이 자금을 결제하면, 추심은행은 추심의뢰은행으로 지체 없이 지급하여 야 한다.","추심에는 금융서류로서 환어음이 반드시 제시되어야 하는 것은 아니다.","환어음에는 추심은행의 명칭이 반드시 기재되어야 한다."],"answer":4},{"section":"무역결제","num":5,"stem":"5. 다음 중 URC 522가 적용되는 추심결제방식에서 추심은행이 검토해야 할 사항으로 올 바른 것을 모두 고른 것은? A. 추심지시서에 기재된 서류의 부수대로 제시되었는가? B. 계약서에서 요구된 선적서류가 모두 제시되었는가? C. 환어음, 상업송장, 추심지시서의 금액이 서로 일치하는가? D. 환어음의 인수 방법이 계약서와 동일하게 작성되었는가?","choices":["A","A, B, C","A, B, C, D","없음"],"answer":1},{"section":"무역결제","num":6,"stem":"6. 신용장 거래와 관련된 설명 중 올바른 것은?","choices":["개설은행은 서류 및 물품에 대한 심사 의무가 있다.","매입은행은 자신이 매입한 서류의 형식, 충분성, 정확성에 대한 책임을 부담한다.","수입자는 물품의 품질을 완전히 보장받지 못한다.","수출자는 신용장 조건과 일치하는 물품의 제시에 의해 대금의 회수를 보장받는다."],"answer":3},{"section":"무역결제","num":7,"stem":"7. 다음이 설명하는 신용장거래의 기본원칙은 무엇인가? A. 개설은행의 지급 의무는 신용장 조건 및 서류심사에 국한된다. B. 은행은 서류가 일치하면 지급해야 한다는 원칙의 예외로서 사기적 제시(fraud presentation)에 대하여 법원에 지급 금지명령을 청구할 수 있다. C. 물품이 계약과 다르더라도 은행은 이를 심사하거나 거절할 권한이 없고, 매수인 이 별도의 클레임을 제기하여 대응해야 한다. D. 매수인은 은행에 지급거절을 직접 요구하기 어려울 수 있다. E. UCP 600에 직접 명시한 조항은 없지만, 해석상 일반적으로 인정된다.","choices":["독립성의 원칙","한계성의 원칙","추상성의 원칙","엄격일치의 원칙"],"answer":2},{"section":"무역결제","num":8,"stem":"8. 신용장의 종류와 관련된 설명으로 잘못된 것은?","choices":["수익자가 선적 전에 ‘beneficiary’s certificate’를 제시하여 대금의 일정 금액을 미 리 받을 수 있는 신용장은 ‘installment shipment credit’이다.","‘Red clause credit’은 수출자가 신용장방식으로 원자재 구입에 필요한 대금의 사전 제공을 수입자에게 요구하는 경우에 사용될 수 있다.","‘Clean credit’에서는 운송서류의 제시가 요구되지 않는다.","‘Deferred payment credit’은 일람출급신용장이 아닌 기한부신용장이다."],"answer":1},{"section":"무역결제","num":9,"stem":"9. 다음 중 신용장 실무와 관련된 설명으로 올바른 것을 모두 고른 것은? A. 개설은행은 수익자가 부담하기로 한 통지수수료가 지급되지 않았으면, 통지은행 에 이를 지급할 의무가 있다. B. 개설은행은 개설의뢰인의 동의 없이 신용장 조건과 불일치한 화환어음에 대해 지급을 거절할 수 없다. C. UCP 600이 적용되는 신용장에 irrevocable이라는 문구가 없다면, 그 신용장은 취소 가능 신용장이 된다.","choices":["A","B","B, C","A. B. C"],"answer":1},{"section":"무역결제","num":10,"stem":"10. 다음 중 신용장 개설 실무에 관한 설명으로 잘못된 것은?","choices":["수입신용장 개설은 은행이 제3자에 대한 지급을 확약하는 여신 행위이므로, 은행은 수 입자의 여신한도 내 또는 신용장 금액만큼의 담보를 요구한다.","수입상은 필요한 경우에 수출입공고, 통합공고상 수입승인, 요건확인 등을 사전에 받 고, 신용장을 개설하기 전에 은행과 외국환거래약정을 체결해야 한다.","수출자가 네고 서류로 보험서류를 제시하기 때문에, 개설은행은 신용장 개설 시 수입 자에게 어떠한 경우라도 보험증권이나 보험증명서를 요구하지 않는다.","개설은행은 수입상이 제출한 화환신용장개설신청서를 근거로 작성한 확인용(checking) 신용장에 대하여 수입상의 확인을 받고 신용장을 개설한다."],"answer":3},{"section":"무역결제","num":11,"stem":"11. 국내에서 개설되어 베트남에서 통지되는 다음 수입신용장 조건에 대한 설명으로 잘못 된 것은? 41D(AVAILABLE WITH...BY) : ANY BANK BY NEGOTIATION 43P(PARTIAL SHIPMENTS) : ALLOWED 43T(TRANSSHIPMENT) : NOT ALLOWED 46A(DOCUMENTS REQUIRED) : + AIRWAY BILLS CONSIGNED TO KITA BANK SEOUL MARKED FREIGHT PREPAID AND NOTIFY APPLICANT 71B(CHARGES) : ALL BANKING CHARGES OUTSIDE OF KOREA AND REIMBURSEMENT CHARGES ARE FOR ACCOUNT OF BENEFICIARY","choices":["신용장 조건상 베트남에 소재하는 모든 은행에서 매입이 가능한 매입신용장이다.","신용장 조건상 분할선적이 허용된다.","신용장 조건상 항공운송 운임은 수입자가 아닌 수출자가 부담한다.","신용장 조건상 환가료와 통지수수료는 수익자가 아닌 개설의뢰인이 부담한다."],"answer":4},{"section":"무역결제","num":12,"stem":"12. 다음은 은행이 지급거절 사유로 삼을 수 있는 SWIFT 신용장의 독소조항 예시이다. 실 무적인 관점에서 수익자에게 불리하지 않은 조항은 어느 것인가?","choices":["Inspection Certificate must be issued by Buyer’s nominated agency only.","B/L must state that goods are in brand new, first class quality.","Draft to be drawn on Issuing Bank, not on applicant.","Invoice must state:“We certify that goods are of 100% prime quality and manufactured in 2025.”"],"answer":3},{"section":"무역결제","num":13,"stem":"13. 다음은 신용장통일규칙(UCP 600)에 관한 설명이다. 이 중 잘못된 내용은?","choices":["신용장은 이용 가능한 은행을 명시하여야 하며, 그렇지 않으면 어떤 은행에서도 이 용할 수 있다. 지정은행에서 이용할 수 있는 신용장은 또한 개설은행에서 이용할 수 있다.","신용장은 제시를 위한 유효기일을 명시하여야 한다. 결제 및 매입을 위하여 명시된 유효기일은 제시를 위한 유효기일로 간주된다.","은행과 수익자를 포함한 신용장의 모든 당사자는 서류만으로 거래한다.","신용장은 그 본질적으로 그 기초가 되는 매매계약 또는 기타 계약과는 별개의 거래 이다."],"answer":3},{"section":"무역결제","num":14,"stem":"14. UCP 600을 근거하여 신용장 관련 은행의 의무에 대한 설명으로 옳지 않은 것은?","choices":["개설은행(issuing bank)은 신용장을 개설한 후에는 단독으로 취소할 수 없으며, 서류가 신용장 조건에 일치하면 대금을 지급할 최종적 의무가 있다.","통지은행(advising bank)은 확인은행을 겸하지 않는 한 신용장의 진정성을 확인하여 통 지하지만, 대금 지급에 대한 의무는 없다.","확인은행(confirming bank)은 서류가 일치하면 수익자에게 직접 지급할 의무가 있으며, 수익자는 개설은행 또는 확인은행을 상대로 지급을 요청할 수 있다.","지정된 매입은행(negotiating/nominated bank)은 신용장 조건에 일치하는 서류를 매입 할 의무가 있다."],"answer":4},{"section":"무역결제","num":15,"stem":"15. 신용장에서 요구한 서류의 언어에 관한 설명 중 잘못된 것은?","choices":["영어로 발행한 신용장이 서류의 언어를 명시하지 않은 경우, 포장명세서는 영어 이 외의 언어로 작성되어도 무방하다.","신용장에서 2개 이상의 언어를 허용하면 확인은행은 허용된 언어의 수를 제한할 수 없으며, 서류 내 모든 언어에 대하여 일치 여부를 심사해야 한다.","신용장에서 영어로 서류의 작성을 요구하여도 은행은 영어 이외의 다른 언어로 삽 입된 정보는 검토하지 않는다.","신용장에서 제출 서류의 언어를 지정하는 경우 신용장 또는 UCP 600에서 요구하는 정보는 같은 언어로 되어 있어야 한다."],"answer":2},{"section":"무역결제","num":16,"stem":"16. 다음 중 신용장에서 요구하는 상업송장에 관한 서류심사 기준으로 올바른 것은?","choices":["수익자가 발행한 송장은 서명 없이도 유효하다. 단, 신용장에서 서명을 요구하였으면 반드시 서명해야 한다.","송장의 요구가 있으면 반드시 \"Commercial Invoice”라는 제목이어야 하며, 특히 Proforma Invoice(견적송장)는 인정되지 않는다.","상업송장의 물품 명세는 신용장의 명세보다 간략하게 기재하거나 일반화하여 기재해 도 된다.","상업송장에서 기재된 단가의 통화는 신용장의 통화와 달라도 된다."],"answer":1},{"section":"무역결제","num":17,"stem":"17. 다음은 신용장에서 요구한 통지처 기재에 대한 지시이다. 다음 중 올바른 설명은? 40A: Form of Documentary Credit: IRREVOCABLE 50 : Applicant ERIC EUROPA S.A. CL DE ENMEDIO 20 265440 CALA DEL MORAL (LA) SPAIN 46A : Documents Required: + OCEAN BILL OF LADING NOTIFY TO APPLICANT","choices":["선하증권의 통지처에 개설의뢰인의 이름만 기재해도 된다.","선하증권의 통지처에 반드시 개설의뢰인의 주소를 기재해야 한다.","선하증권의 통지처에는 신용장에서 요구한 통지처 이외의 추가적인 통지처를 기재 해서는 안 된다.","선하증권의 통지처에 기재된 개설의뢰인의 주소는 신용장에 있는 개설의뢰인의 주 소와 달라도 된다."],"answer":1},{"section":"무역결제","num":18,"stem":"18. URDG 758이 적용되는 은행보증서에 만기일이나 만료사건에 대한 지시가 없다. 은 행보증서는 언제 만료되는가?","choices":["은행보증서 발행일로부터 1년 경과 후","은행보증서 발행일로부터 3년 경과 후","은행보증서 발행일로부터 5년 경과 후","은행보증서는 만료되지 않는다."],"answer":2},{"section":"무역결제","num":19,"stem":"19. 보증신용장(Standby L/C) 또는 청구보증서(Demand Guarantee)를 사용하는 유형 중에서 계약체결 전 단계에서 활용되는 것은?","choices":["선수금환급보증(Advance Payment Guarantee)","유지보수보증(Maintenance Guarantee)","이행보증(Performance Guarantee)","입찰보증(Bid Bond)"],"answer":4},{"section":"무역결제","num":20,"stem":"20. 다음 중 대금결제에 관한 설명으로 가장 적절한 것은?","choices":["O.A 30 days 조건의 수출계약을 체결한 수출자는 선적 직후 거래은행에 O.A. nego 를 신청해서 수출대금을 조기 회수했다.","D/P 조건의 수출계약을 체결한 수출자는 선적 직후 수입자로부터 Aval을 입수하여 포페이팅을 통해 수출대금을 조기 회수했다.","연지급신용장을 받은 수출자는 선적 후 usance 환어음을 발행하여 지정은행에 매입 을 의뢰함으로써 수출대금을 조기 회수했다.","Shipper’s Usance 신용장 개설을 신청한 수입자는 이자를 먼저 지급하고, 원금을 만기에 결제하기로 했다."],"answer":1},{"section":"무역결제","num":21,"stem":"21. 다음은 기한부 신용장 중에서 Banker’s Usance에 대한 설명이다. 잘못된 것은?","choices":["기한부 신용장에서 만기까지의 이자를 수입자가 부담하는 방식으로 수출자에게 유리 하다.","SWIFT L/C에서 사용되는 문구는 다음과 같다. “Drafts at 30 days after B/L date, drawn on Issuing Bank.”/“Interest for the usance period is for account of Beneficiary.”","수출자는 은행에 어음을 매입/인수를 의뢰하면, 은행은 수출대금을 바로 지급하는 일 람불 신용장처럼 사용된다.","기한부 신용장 중에서 Banker’s Usance가 Seller’s Usance보다 많이 사용된다."],"answer":2},{"section":"무역결제","num":22,"stem":"22. 다음 각 상황에서 결제리스크를 줄이기 위한 장치로서 연결이 가장 적절한 것은?","choices":["COD 조건의 수입거래 ⇨ 선적 전 검사","신용장결제, D/P조건, CAD조건의 수입거래 ⇨ 선급금 환수용 보증서","외환사정이 악화된 국가로의 수출거래 ⇨ 무역보험","계약금액 일부에 대한 선지급을 거절하는 수입자와의 수출거래 ⇨ 회전신용장"],"answer":3},{"section":"무역결제","num":23,"stem":"23. 다음 상황에 대한 해설로 가장 부적절한 것은? A. ㈜삼연상사는 조명기용 파워 서플라이를 국내기업(갑)으로부터 구매하였다. B. ㈜삼연상사는 조명기용 파워 서플라이를 중국기업에 원상태로 공급하여 현지에서 조명기를 생산했다. C. ㈜삼연상사는 독일기업과 조명기 수출계약을 체결하고, 물품은 중국에서 독일로 직접 공급하기로 했다.","choices":["삼연상사는 조명기용 파워 서플라이 구매대금 결제를 위해 내국신용장을 이용할 수 있다.","삼연상사가 임가공용 부품(조명기용 파워 서플라이)을 원상태로 수출한 경우에도 관 세환급특례법상 관세환급을 받을 수 있다.","삼연상사가 독일기업으로부터 양도가능신용장을 받았다면, 신용장 자체를 양도할 수도 있다.","삼연상사가 국내기업(갑)에게 신용장 대금채권을 양도하기 위해서는 신용장에 반드 시 ‘transferable’이라는 표기가 있어야 한다."],"answer":4},{"section":"무역결제","num":24,"stem":"24. 내국신용장(Local L/C)과 구매확인서에 관한 설명으로 올바르지 않은 것은?","choices":["내국신용장은 은행이 지급을 확약하므로, 국내 공급업체가 안정적으로 대금을 회수할 수 있다.","내국신용장은 수출용 원자재 거래임을 증명하므로, 공급업체는 부가세 영세율(0%)의 혜택을 받을 수 있다.","구매확인서는 내국신용장과 마찬가지로 수출용 거래 증빙서류로 인정되지만, 은행의 지급확약이 없다는 한계가 있다.","내국신용장은 절차가 간단하고 은행수수료가 거의 없어, 구매확인서보다 더 많이 사용 되고 있다."],"answer":4},{"section":"무역결제","num":25,"stem":"25. 다음의 표는 현재의 환율과 A은행 및 B은행이 예측하는 6개월 후의 환율을 나타낸 것 이다. 이를 토대로 판단할 때 다음 중 가장 잘못된 설명은? (환율 표시에서 앞의 것이 기준통화) 6개월 후 환율 예측 구분 현재 환율 A은행 B은행 USD/KRW 1,400 1,500 1,300 USD/YEN 150 150 150 EUR/USD 1.2 1.0 2.0","choices":["A은행은 6개월 후 USD의 가치가 전반적으로 상승할 것으로 예측한다.","A은행은 6개월 후 YEN/KRW 환율이 지금보다 상승할 것으로 예측한다.","B은행은 6개월 후 일본에 대한 우리나라의 수출경쟁력이 상승할 것으로 예측한다.","B은행은 6개월 후 EUR/KRW 환율이 2,600원으로 상승할 것으로 예측한다."],"answer":3},{"section":"무역결제","num":26,"stem":"26. (주)한국무역은 미 달러화의 환리스크를 관리하기 위하여 선물환을 검토하고 있다. 거 래은행에 문의하니 아래와 같은 선물환율을 제시받았다. 다음 중 가장 잘못된 설명은? (환율 표시에서 앞의 것이 기준통화, 은행의 수수료는 없다.) USD/KRW 구분 X은행 Y은행 Bid Offer Bid Offer 현물환율 1380.00 1382.00 1379.00 1385.00 스왑포인트 200 190 180 170 3개월 선물환율 1378.00 1380.10 1377.20 1383.30","choices":["현재 외환시장과 자금시장에서 달러의 금리가 원화의 금리보다 높다.","X은행의 스프레드가 Y은행의 스프레드에 비하여 적다.","3개월 후 수령할 달러 수출대금의 선물환거래는 X은행과 거래하는 것이 환율에서 유리 하다.","3개월 후 지급할 달러 수입대금의 선물환거래는 Y은행과 거래하는 것이 환율에서 유리 하다."],"answer":4},{"section":"무역결제","num":27,"stem":"27. 영국의 런던은행과 미국의 뉴욕은행이 USD/KRW 역외선물환(NDF) 시장에서 다음과 같은 거래를 하였다. 다음 중 가장 잘못된 설명은? (환율 표시에서 앞의 것이 기준통화) ∙ 6개월 전 런던은행은 NDF 시장에서 뉴욕은행으로부터 1백만 달러를 1,260원에 매 입하였다. ∙ 6개월 후 결제일에 정산환율은 1,400원으로 결정되었다.","choices":["계약환율에 비하여 정산환율이 상승하였으므로 달러를 매입한 런던은행은 이익을 얻 는다.","뉴욕은행은 달러 환율이 하락할 것으로 예측하였으나 오히려 환율이 상승하여 손해를 보게 되었다.","결제일에 뉴욕은행은 정산환율 1,400원보다 낮은 계약환율 1,260원으로 1백만 달러를 런던은행에게 송금하여야 한다.","NDF 시장에서는 투기 목적의 거래가 대부분을 차지한다."],"answer":3},{"section":"무역결제","num":28,"stem":"28. 향후 달러/원 환율이 상승할 때 이익이 발생하는 포지션의 형태는?","choices":["포워드 포지션","스퀘어 포지션","숏 포지션","롱 포지션"],"answer":4},{"section":"무역결제","num":29,"stem":"29. 수출입거래가 있는 기업이 통화별 및 만기별로 수입과 수출을 일치시켜 환리스크를 줄 이려는 내부적 관리기법은 무엇인가?","choices":["리딩","래깅","매칭","네팅"],"answer":3},{"section":"무역결제","num":30,"stem":"30. 다음 중 외환스왑에 대한 설명으로 옳지 않은 것은?","choices":["외환스왑은 자금거래의 일종이다.","외환스왑에서 두 통화 간 이자율 차이를 주기적으로 정산한다.","매우 짧은 만기의 외환스왑의 환리스크는 거의 없다.","외환스왑은 가까운 만기(Near Date)의 매매와 동시에, 이에 대응하여 반대 방향으로 동액의 먼 만기(Far Date)의 매매를 하는 것을 말한다."],"answer":2},{"section":"무역계약","num":1,"stem":"1. 다음 중 국제물품매매계약의 법적 성격으로 올바른 것을 모두 고른 것은? A . 매도인과 매수인은 거래 합의 이외에도 반드시 계약 목적물과 대금을 교환하여야 계약의 효력이 발생한다. B. 일 방 의 청 약 에 대 해 서 상 대 방 은 승 낙 의 사 의 통 지 방 식 으 로 만 계 약 이 성 립 된 다 . C . 매 도 인 은 O ffe r S h e e t 또 는 P ro fo rm a In v o ic e 라 는 서 류 로 청 약 하 고 , 매수인은 매도인의 서면 청약에 대해서 서면으로 승낙하여야 한다. D. 매 도 인 의 계 약 물 품 제 공 에 대 해 서 매 수 인 은 반 드 시 외 국 환 은 행 을 통 해 서 국 제 적 으 로 널 리 사 용 되 는 외 화 (U S D , E U R , JP Y 등 )로 만 결 제 하 여 야 한 다 .","choices":["A, C","C","B, D","없음"],"answer":4},{"section":"무역계약","num":2,"stem":"2. 무역계약의 정의 및 대상 등과 관련된 설명으로 잘못된 것은?","choices":["무역계약은 매도인이 대금을 받고 매수인에게 물품의 소유권을 이전하기로 약정하는 매매계약이다.","무역계약은 거래대상을 물품에 한정해야 하므로 기술, 용역 및 플랜트의 국제거래 등 은 넓은 의미로도 무역계약이 아니다.","무역계약은 매도인인 수출자와 매수인인 수입자 사이에 체결되는 국제계약이다.","무역계약의 국제성이란 당사자의 영업소가 서로 다른 국가에 소재한다는 것을 의미한 다."],"answer":2},{"section":"무역계약","num":3,"stem":"3. 무역계약 관련 법규범에 대한 설명으로 잘못된 것을 모두 고른 것은? A . 우 리 나 라 는 ‘V ie n n a C o n v e n tio n 1 9 8 0 ’의 체 약 국 이 므 로 계 약 상 대 방 의 국 가 가 체 약 국 인 경우에는 동 협약이 직접 적용된다. B . 정 형 거 래 조 건 에 는 국 제 상 업 회 의 소 에 서 제 정 한 ‘In c o te rm s 규 칙 ’과 미 국 의 ‘개 정 미 국 외 국 무 역 정 의 (R A F T D )’가 있 다 . 계 약 당 사 자 의 국 적 또 는 영 업 소 재 지 가 미 국 인 경 우 에 는 ‘R A F T D ’를 , 이 외 의 국 가 간 에 는 ‘In c o te rm s 규 칙 ’을 사 용 하 여 야 한 다 . C . ‘V ie n n a C o n v e n tio n 1 9 8 0 ’은 협 약 의 적 용 요 건 과 범 위 , 계 약 의 성 립 , 매 도 인 과 매 수 인 의 의무, 위험과 비용의 이전, 대금결제방식에 따른 소유권 이전 시기 등의 내용으로 구성되어 있다. D . ‘N e w Y o rk C o n v e n tio n 1 9 5 8 ’은 U N 회 원 국 중 하 나 의 국 가 에 서 내 려 진 중 재 판 정 에 대해서 다른 국가에서도 강제집행을 보장하는 국제협약이다. E . ‘In c o te rm s 규 칙 ’은 당 사 자 들 의 합 의 로 적 용 할 수 있 기 때 문 에 ‘In c o te rm s 2 0 0 0 ‘도 사 용이 가능하다.","choices":["B, C, D","A, B, D","A, B, E","B, D, E"],"answer":1},{"section":"무역계약","num":4,"stem":"4. 무역계약의 법적 성질에 대한 설명으로 잘못된 것은?","choices":["무역계약은 계약 당사자의 합의만으로 성립하고, 실제 이행은 뒤에 이루어지는 이행 미필 상태에서 계약이 성립된다.","무역계약이 성립되면 양 당사자는 물품 인도와 대금 지급의 대가적 채무를 부담한다.","민법상 전형계약의 하나인 증여에 의한 국제간 물품의 이동도 일반적인 무역계약이다.","계약체결에 아무런 방식도 요구되지 않는다. 따라서 일부는 구두로, 일부는 당사자의 묵시적 행위로도 계약이 체결된다."],"answer":3},{"section":"무역계약","num":5,"stem":"5. 인코텀즈 2020의 11가지 거래조건에 관한 설명으로 잘못된 것은?","choices":["DDP 조건에서 매도인은 목적지에서 물품의 양하와 수입통관을 포함한 의무를 부담한 다.","CIF 조건에서 매도인은 목적항까지 선적을 위하여 인도된 물품을 조달하여 인도할 수 도 있다.","CIP 조건에서 정기선운송의 경우 목적지에서의 양하비가 운임에 포함되어 매도인이 부담한다.","무역실무에서 인코텀즈 2020의 11가지 조건 외에 당사자의 합의에 따라 별도의 조건 을 사용할 수 있다."],"answer":1},{"section":"무역계약","num":6,"stem":"6. 인코텀즈 2020 조건들의 수출 및 수입통관에 대한 설명으로 잘못된 것은?","choices":["EXW 조건에서 매수인은 수출국, 통과국 및 수입국에 의해서 부과되는 통관절차를 수 행하고 그 비용을 부담하여야 한다.","FCA 조건에서 매도인은 수출국 및 통과국에 의해서 부과되는 통관절차를 수행하고 그 비용을 부담하여야 한다.","CIP 조건에서 매수인은 통과국 및 수입국에 의해서 부과되는 통관절차를 수행하고 그 비용을 부담하여야 한다.","DDP 조건에서 매도인은 수출국, 통과국 및 수입국에 의해서 부과되는 통관절차를 수 행하고 그 비용을 부담하여야 한다."],"answer":2},{"section":"무역계약","num":7,"stem":"7. 인코텀즈 2020과 CISG의 규정 내용에 관한 설명으로 올바른 것은?","choices":["인코텀즈 2020과 CISG는 물품의 인도에 관하여 규정하고 있다.","두 규범 모두 운송계약 및 보험계약에 관하여 규정하고 있다.","두 규범 모두 계약의 성립에 관하여 규정하고 있다.","두 규범 모두 계약위반에 대한 구제에 관하여 규정하고 있다."],"answer":1},{"section":"무역계약","num":8,"stem":"8. CISG를 기준으로 무역계약의 일방 당사자가 계약이행기 전에 계약을 해제할 수 있는 경우는?","choices":["일방 당사자가 계약위반을 한 경우","일방 당사자가 본질적인 계약위반을 한 경우","일방 당사자가 본질적인 계약위반을 할 것이 예견되는 경우","일방 당사자가 본질적인 계약위반을 할 것이 명백한 경우"],"answer":4},{"section":"무역계약","num":9,"stem":"9. 일방 당사자의 불이행에 대한 권리구제로서 CISG와 UNIDROIT에서 공통적으로 규정하 고 있는 권리구제 수단이 아닌 것은?","choices":["이행청구권","계약해제권","손해배상청구권","추가기간지정권"],"answer":4},{"section":"무역계약","num":10,"stem":"10. UNIDROIT 국제상사계약원칙에 따른 계약의 성립에 관한 설명으로 올바른 것은?","choices":["계약은 청약에 대한 승낙에 의해서만 성립되며, 어떠한 형태의 당사자 행위로도 체결 될 수 없다.","청약은 제안내용이 충분히 확정적이기만 하면 상대방의 승낙에 구속된다는 의사가 없 어도 청약이 된다.","청약은 피청약자에 도달한 때에 효력이 발생하고, 계약이 체결되기까지는 절대로 철회 될 수 없다.","청약에 대한 피청약자의 침묵 또는 부작위는 그 자체만으로는 승낙이 되지 아니한다."],"answer":4},{"section":"무역계약","num":11,"stem":"11. Vienna Convention(1980)의 청약에 관한 설명으로 올바른 것을 모두 고른 것은? A. 다 수 의 특 정 인 에 대 한 확 정 적 인 계 약 체 결 의 제 안 은 청 약 이 아 니 다 . B. 제 안 이 충 분 히 확 정 적 이 고 , 승 낙 시 그 에 구 속 된 다 는 청 약 자 의 의 사 표 시 가 되 어 있 는 경우에는 청약이 된다. C. 명 시 적 또 는 묵 시 적 으 로 수 량 과 대 금 을 지 정 하 거 나 그 결 정 을 위 한 조 항 을 두 고 있 는 경우에는 충분히 확정적인 것으로 본다. D. 불 특 정 다 수 인 에 대 한 제 안 은 제 안 자 가 청 약 의 유 인 이 아 님 을 밝 히 는 반 대 의 사 를 표시하더라도 청약의 유인으로 본다.","choices":["A, B","A, D","B, C","C, D"],"answer":3},{"section":"무역계약","num":12,"stem":"12. Vienna Convention(1980)의 청약과 승낙에 관한 설명으로 잘못된 것은?","choices":["청약에 대한 상대방의 침묵 또는 부작위는 승낙이 되지 않는다.","구두의 청약은 특별 사정이 없는 한 즉시 승낙되어야 한다.","청약은 철회될 수 없는 것이라면 거절의 의사표시가 청약자에게 도달하더라도 효력 이 상실되지 않는다.","상대방이 청약자에 대한 통지 없이 물품의 발송이나 대금을 지급함으로써 동의를 표시하는 경우 승낙은 그 행위가 이루어진 때에 효력이 발생한다."],"answer":3},{"section":"무역계약","num":13,"stem":"13. 다음은 무역계약 체결과정을 순서대로 나열한 것이다. 괄호 안에 들어갈 무역실무에서 일반적으로 사용되는 용어로 적합한 것은? 1 해외시장조사 ∙ 시장, 이익, 판매 가능성 등 조사 2 ( A ) ∙ 주로 Buyer가 Seller에게 거래 희망 품목 등 관심 내용 문의 3 신용조사 ∙ Bank, Trade partner, 해외지사 등을 활용하여 조사 4 거래제의서 ∙ 거 래 제 의 L etter ＋ Catalog, Price list, Sample 등 제공 5 ( B ) ∙ 상대방의 청약 또는 주문을 유도 6 청약과 주문 ∙ 상대방이 승낙 또는 주문 수락으로 계약성립 7 계약서 작성 ∙ 개별계약서, 포괄계약서","choices":["A: Circular letter B: Firm Offer","A: Buyer/Seller List B: Free Order","A: Inquiry B: Invitation to Offer","A: Business Proposal B: Firm Order"],"answer":3},{"section":"무역계약","num":14,"stem":"14. 다음 ( )안에 들어갈 특수거래 형태로 올바르게 짝지어진 것은? - ( A )은 물 품 등 을 무 환 으 로 수 출 하 여 해 당 물 품 이 판 매 된 범 위 안 에 서 대 금 을 결 제 하는 계약에 의한 수출이다. - ( B )은 계 약 에 의 하 여 물 품 등 을 수 출 하 여 일 정 기 간 후 다 시 수 입 하 거 나 그 기 간 의 만료 전 또는 만료 후 해당 물품 등의 소유권을 이전하는 수출이다. - ( C )은 수 출 자 가 자 신 의 책 임 하 에 수 입 국 내 관 리 인 을 지 정 하 고 물 품 을 무 환 으 로 반출하여 수입국 현지 창고에 반입 후 판매하는 수출이다.","choices":["A : BWT수출 B : 임대수출 C : 위탁판매수출","A : BWT수출 B : 위탁판매수출 C : 임대수출","A : 위탁판매수출 B : BWT수출 C : 임대수출","A : 위탁판매수출 B : 임대수출 C : BWT수출"],"answer":4},{"section":"무역계약","num":15,"stem":"15. 다음의 조항의 내용과 가장 관련이 깊은 품질 결정방법은? The Specification of the Goods shall be prescribed and specified in specification attached hereto","choices":["명세서 매매","규격 매매","상표 매매","표준품 매매"],"answer":1},{"section":"무역계약","num":16,"stem":"16. 무역계약에서 가격조건(Terms of Price)에 관한 설명으로 잘못된 것은?","choices":["가격은 통화, 단가, 수량 단위, 정형거래조건, 비용 분기점, Incoterms version 순으로 표시된다. 예를 들어「Price: USD 125.20/set FCA Seoul Coex, Incoterms 2020」식이다.","가격을 산출하는 일반적인 공식은 「Price＝원가＋이윤＋요소비용」이다.","가격 계산식의 요소비용 중에서 일반적이라면 물류비가 가장 많이 차지한다.","표시통화를 Seller 국가 통화로 결정했다면 Seller가 환리스크를 부담하는 것이다."],"answer":4},{"section":"무역계약","num":17,"stem":"17. 무역계약의 보험조건(Terms of Insurance)에 관한 설명으로 잘못된 것은?","choices":["보험조건에 포함될 내용은 보험계약 체결자, 보험료 부담자, 피보험자, 담보조건, 부보 비율, 담보위험 및 기간, 손해배상범위 등이다.","보험계약자와 피보험자가 다른 경우는 CIF와 CIP 조건인데, CIF는 최저 담보조건, CIP 는 최대 담보조건으로 매도인이 매수인을 위해서 대신해서 보험에 가입한다.","Incoterms에 따라 보험금액은 당사자가 별도로 정한 바가 없으면 보험가액의 전액을 담보하는 100%의 비율로 보험에 가입해야 한다.","ICC(A/R) 조건이더라도 전쟁과 파업 등을 대비하기 위해서는 ICC(WAR), ICC(SRCC) 등 부가 조건에 가입해야 한다."],"answer":3},{"section":"무역계약","num":18,"stem":"18. 무역계약을 정식으로 체결하는 방식으로서 개별계약방식과 포괄계약방식에 대한 설명 으로 올바른 것은?","choices":["포괄계약방식은 당사자 사이에서 기본계약을 먼저 체결하고, 뒤따르는 개별 거래는 청 약서나 주문서로 처리하는 방식이다.","포괄계약방식은 주로 단기적이고 일회성 거래에 사용되는 계약 형태이다.","개별계약방식은 일반거래약정서(Agreement on General Terms and Conditions of Business) 형태로 체결된다.","개별계약방식은 거래 효율성이 높고 장기거래에 적합한 방식이다."],"answer":1},{"section":"무역계약","num":19,"stem":"19. 무역거래에서 발생하는 각종 무역클레임에 대한 설명 중에서 잘못된 것은?","choices":["품질클레임을 제기하려면 객관적 증거자료로서 시험성적서나 검사증명서를 제시하는 것이 좋다.","마켓클레임은 주로 상업적 손실을 이유로 제기되며, 매도인의 의무 불이행과는 직접 관련이 없으므로 예방을 위해서 수출보험을 활용해야 한다.","서류클레임은 선적서류의 기재 불일치, 서명 누락, 원본 서류 통수 부족, 발행일자 오 류 등이 주요 원인이다.","수량클레임은 처음부터 적재 수량의 과부족이 있거나, 운송 중 멸실이나 손상이 원인 이 된다."],"answer":2},{"section":"무역계약","num":20,"stem":"20. 다음 중 제3자의 개입으로 분쟁을 해결하는 방법과 그 설명이 잘못된 것은?","choices":["클레임 포기는 피해자가 상대방에게 청구권을 행사하지 않는 것으로, 대체로 상대방이 사전 또는 즉각적인 손해배상을 제의하고 해결된 경우 이루어진다.","화해는 당사자 간 자주적인 교섭과 제3자의 의견을 수렴하여 합의점을 발견함으로써 분쟁을 원만하게 해결하는 방법이다.","조정은 쌍방의 조정 합의에 따라 별도의 조정인을 선임하고, 클레임 제기자가 제시하는 조정안에 상대방이 동의함으로써 클레임을 해결하는 방법이다.","알선은 공정한 제3자가 당사자의 일방 또는 쌍방의 의뢰로 분쟁 사건에 개입하여 조언 하며 형식적인 절차를 요구하지 않는다."],"answer":3},{"section":"무역계약","num":21,"stem":"21. 다음 중 무역계약에 관한 내용 중 틀린 것은?","choices":["개별계약방법은 통상 거래상대방과 최초 거래나 건별 거래에 활용하는 방법이다.","일반약정에는 개별약정사항을 해석하는 기준이나 계약불이행과 관련한 조항 등 수 출입거래 시 일반적으로 적용되는 공통사항이 포함된다.","‘Offer subject to confirmation’은 청약자에 대한 구속력이 없다고 하더라도 상대 방이 승낙하면 계약은 성립된다.","Proforma Invoice도 당사자가 이를 확정적 청약으로 표시한 경우, 상대방의 승낙으 로 계약이 성립될 수 있다."],"answer":3},{"section":"무역계약","num":22,"stem":"22. 다음 중 무역계약과 관련된 내용 중 올바른 것은?","choices":["무역계약의 이행을 위해서는 제3자가 개입되기 때문에 운송계약, 지급계약, 보험계 약 등과 같은 종속계약이 수반되어야 한다.","무역계약 시 컨테이너를 통한 해상운송을 사용한다면, Incoterms 2020의 해상운송 방식인 FOB, CFR, CIP 중 하나를 사용하는 것이 가장 합리적이다.","계약조건으로 FCA Busan CY, Incoterms 2020과 결제조건으로 L/C를 사용하기로 했 다면, 개설은행은 수익자에게 상업송장, 선하증권, 보험증권을 요구할 수 있다.","경험이 많지 않은 수입업자의 경우 자신의 업무량과 리스크를 줄이기 위해서 EXW 조건을 사용하는 것이 합리적이다."],"answer":1},{"section":"무역계약","num":23,"stem":"23. 다음 중 운송서류의 부지약관(unknown clause)에 관한 설명으로 올바른 것은?","choices":["송하인이 적입하여 운송인에게 인도하는 FCL 화물에서 컨테이너에 적입된 화물의 수량이나 상태에 대해 운송인이 책임을 면하기 위해 명시하는 조항이다.","선하증권상 선적화물의 이상 유무를 기재한 조항이다.","수취 선하증권이 발행된 경우 화물의 본선 적재 후 선적일을 명기한 것이다.","운송인이 특정한 상황에서 화물을 갑판 상에 적재하여 운송할 수 있도록 허용하는 조항이다."],"answer":1},{"section":"무역계약","num":24,"stem":"24. 국제해상운송에서 사용되는 정기선(liner service)과 부정기선(tramp service)의 특성에 대 한 설명으로 올바른 것은?","choices":["정기선 운항은 일정한 항로와 운항 일정에 따라 규칙적으로 운항하며, 주로 벌크화물 의 대량 수송에 적합하다.","부정기선 운항은 선적 일정과 항로가 고정되어 있어 화주의 화물을 안정적으로 운송 할 수 있다.","정기선 운항은 운임이 공표되어 비교적 안정적이고, 부정기선 운항은 화물의 종류·수 량·항로에 따라 운임을 개별적으로 협상한다.","부정기선 운항은 주로 컨테이너 화물에 적합하며, 정기선 운항은 석탄, 곡물, 철광석과 같은 대량의 살물(bulk cargo)에 적합하다."],"answer":3},{"section":"무역계약","num":25,"stem":"25. 선하증권의 종류를 설명한 내용 중 잘못된 것은?","choices":["On board B/L은 화주로부터 수령한 화물을 선적한 후에 발행하는 선적선하증권이다.","Foul B/L은 화물의 손상이나 불량 포장 사실이 기재된 선하증권으로, 신용장 거래에서 clean B/L 조건을 충족하지 못하여 은행이 매입을 거절하는 사고 선하증권이다.","Master B/L 혹은 Marine B/L은 선사가 발행하는 선하증권을 말하며, 선사 외에 다른 운송인이 발행하는 서류는 선사 B/L에 해당되지 않는다.","Ocean B/L은 해상운송, 복합운송, 육상운송 상관없이 선사와 포워더가 함께 발행하는 광범위한 형태의 선하증권을 의미한다."],"answer":4},{"section":"무역계약","num":26,"stem":"26. 다음 중 항공운송 물류비에 관한 내용으로 올바른 것은?","choices":["항공화물 운임은 각국의 개별 항공사가 결정하여 화주는 그에 따른다.","항공화물 운임은 Chargeable Weight 계산에 따라 「1 CBM ＝ 1 TON」공식으로 높은 쪽으로 적용되며, Min, -45kg, +45kg, 100kg, 300kg, 500kg, 1000kg 등으로 구분된다.","단위탑재용기 운임은 항공사가 송하인 또는 대리점에 컨테이너 또는 팔레트 단위로 판매 시 적용되는 운임을 말한다.","품목분류 요율은 일반화물 요율이나 특정품목 할인요율보다 우선하여 적용한다."],"answer":3},{"section":"무역계약","num":27,"stem":"27. 해상보험의 개요 관련 내용 중 잘못된 것은?","choices":["“해상보험계약이란 보험자가 피보험자에 대하여 그 계약에 의하여 합의한 방법과 범 위 내에서 해상손해 즉, 해상사업에 수반되는 손해를 보상할 것을 인수하는 계약이 다”라고 영국해상보험법에 정의하고 있다.","우리나라의 적하보험은 협회보험약관의 수송약관 규정에 따라 기간보험과 항해보험을 혼합한 혼합보험으로 이용된다.","Insured Amount는 보험금을 말하는 것으로, 보험사고로 피보험자가 입은 재산상의 손 해에 대해 보험자가 지급하는 보상금을 말한다.","피보험자의 고지의무 중에 위험을 감소시키는 사항은 고지가 필요 없는 사항이다."],"answer":3},{"section":"무역계약","num":28,"stem":"28. 피보험자 등의 의무와 관련한 내용 중 올바른 것은?","choices":["보험계약자는 보험계약 체결의 교섭 중이나 보험계약의 성립 전까지 고지의무를 해야 한다.","고지의무는 보험인수 여부에 관한 내용만을 대상으로 한다.","보험자의 책임은 당사자 간에 따른 다른 약정이 없으면 보험증권을 발급한 시점부터 개시한다.","피보험자는 손해방지와 경감을 위하여 노력해야 한다. 다만 이에 따른 발생 비용은 보 험금액 한도 내에서만 정산된다."],"answer":1},{"section":"무역계약","num":29,"stem":"29. 다음 보기와 같은 조건에서 해상보험계약에 관한 설명으로 올바른 것은? ∙ FOB조건의 계약으로 매수인이 매도인의 선적통지를 받고 해상보험계약을 체결하였 다. ∙ 매도인이 매수인에게 물품을 인도하기 전 즉, 선적 전에 손해가 발생한 것으로 확 인되었다. ∙ 매수인이 체결한 해상보험계약은 구증권 ICC(A)(1982) 조건으로 소급약관이 포함되어 있다.","choices":["선적 전에 발생한 손해에 대해서는 매수인은 피보험이익을 가지지 않기 때문에 보 험자에게 손해 보상을 청구할 수 없다.","소급약관은 2009년 신증권 협회적하약관(ICC)에서 피보험이익 약관으로 대체되었다.","매수인이 체결한 해상보험계약상 위험은 선적한 때로부터 개시한다.","매수인은 보험계약 체결 시 손해 발생 사실을 알았더라도 소급약관에 의해 보험자 로부터 손해를 보상받을 수 있다."],"answer":2},{"section":"무역계약","num":30,"stem":"30. 해상보험에서 위험의 변동(change of risk)에 관한 설명으로 잘못된 것은?","choices":["이로(Deviation)는 위험률이 변경되는 위험사정의 변동으로, 적법한 사유 없이 이로 가 발생한 때로부터 보험자의 보상책임이 해제된다.","항해의 변경은 보험계약 체결 시의 위험사정이 소멸하고 새로운 위험사정으로 대체 되는 위험의 변종으로, 항해변경 의사가 명백하였을 때로부터 보험자의 보상책임이 해제된다.","이로가 이루어지고 손해가 발생하기 전에 보험계약에 정해진 항로로 복귀하면 보험 의 효력이 계속된다.","신증권 항해변경약관에 따라 항해를 변경한 경우, 피보험자가 그 사실을 보험자에 게 지체 없이 통지하고, 추후 협정되는 보험료와 보험조건에 따라 계속담보가 가능 하다."],"answer":3},{"section":"무역영어","num":1,"stem":"1. 주어진 서신에 대한 설명으로 옳지 않은 것은?\n\n[지문]\nHANKOOK COMPANY\n                   Room 925, Seoul B/D, Samsung-Dong, Gangnam-gu, Seoul, Korea\n                               Phone: 82-2-123-4567, Fax: 82-2-123-4568\n\n                                           Offer Sheet\n\n    Messrs: McDonald’s Co.\n\n     We are pleased to offer the under-mentioned article(s) as per the conditions and\n    details described as follows:\n\n     Commodity           : OLED TV(Model no. XYZ-10056)\n     Quantity            : 1,000set\n     Unit Price          : USD 5,000 CFR           (A)\n     Shipment            : Within 30 days after receipt of Letter of Credit\n     Shipping Port       : Any Korean port\n     Destination         : LA port, USA\n     Packing             : Export standard packing\n                         : By an Irrevocable L/C in favor of          (B)        and draft\n     Payment\n                          at 60 days after sight\n     Validity            : End of September, 2025.\n\n     Looking forward to your valued order for the above offer.\n\n     Yours faithfully,","choices":["A usance bill will be drawn on the issuing bank for payment under the L/C","This proposal is a firm offer which will bind the offeror","An order of McDonald’s Co. dated on October 3, 2025 may be regarded as a constitution of contract to Hankook Company","The seller has no obligation to obtain insurance cover for the buyer"],"answer":3},{"section":"무역영어","num":2,"stem":"2. 서신의 빈칸에 들어갈 단어의 연결이 올바른 것은? (A) (B)\n\n[지문]\nHANKOOK COMPANY\n                   Room 925, Seoul B/D, Samsung-Dong, Gangnam-gu, Seoul, Korea\n                               Phone: 82-2-123-4567, Fax: 82-2-123-4568\n\n                                           Offer Sheet\n\n
