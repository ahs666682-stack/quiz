 tubing on the\n term of CPT basis, weighing approximately 16 tons and varying in length from 2 to 6\n meters. The consignment is destined for Dortner Industries in Hamburg. (A) Could you\n pick it up at our works in Sheffield and deliver it to Hamburg by the end of April?\n   (B) If you can handle this consignment by the given date, please provide us with\n details of your sailings and freight charges. (C) We would like to receive a copy of\n insurance policy covering all risks based on door-to-door responsibility. (D) We can\n promise you regular shipments if you quote a competitive rate.\n   Your prompt reply would be greatly appreciated.\n Sincerely yours,","choices":["(A)","(B)","(C)","(D)"],"answer":3},{"section":"무역영어","num":28,"stem":"28. 위 서신의 내용으로 올바른 것은?\n\n[지문]\nDe  ar Mr. Pike,\n   We are a large steel company seeking to export a consignment of steel tubing on the\n term of CPT basis, weighing approximately 16 tons and varying in length from 2 to 6\n meters. The consignment is destined for Dortner Industries in Hamburg. (A) Could you\n pick it up at our works in Sheffield and deliver it to Hamburg by the end of April?\n   (B) If you can handle this consignment by the given date, please provide us with\n details of your sailings and freight charges. (C) We would like to receive a copy of\n insurance policy covering all risks based on door-to-door responsibility. (D) We can\n promise you regular shipments if you quote a competitive rate.\n   Your prompt reply would be greatly appreciated.\n Sincerely yours,","choices":["The writer is asking for the competitive price of the goods","The purpose of this letter is to request a ship’s April departure schedule","Mr. Pike is requested to render a quotation for marine insurance","The writer wants door-to-door delivery from their works to Dortner Industries in Hamburg"],"answer":4},{"section":"무역영어","num":29,"stem":"29. 다음 중 주어진 문장의 영작이 틀린 것은?","choices":["추가적으로 할인이 어렵다면 6개월 분할지급을 하고 싶습니다. ⇒ If you could agree to let us pay in six-month installments, we would be ready to place a large order additionally","당사는 주로 30일 후 지불조건의 환어음에 의한 D/A 방식으로 거래해 왔습니다. ⇒ We'd like to point out that we usually settle our accounts on a D/A basis with a 30-day bill of exchange","당사는 주로 신용장에 의하여 거래하지만, 귀사가 원하시면 D/P 방식도 가능합니 다. ⇒ We usually do business on L/C basis, but we are willing to accept D/P if you insist","가격은 부산 출발 FOB 미화로 견적되지만, 원하시면 귀국의 항구에 도착하는 CIF 가격도 제시할 수 있습니다. ⇒ The prices are quoted based on FOB Busan in US dollars, but we can make up CIF prices up to any port of your country, if you desire"],"answer":1},{"section":"무역영어","num":30,"stem":"30. 서신의 문맥상 빈칸 (A)에 들어가기에 가장 적절한 문장은? Dear Sir/Madam: We have recently received your name as a reference from the following firms that are interested in opening an account with our institution. We would greatly appreciate it if you could provide us with detailed information regarding their financial standing, business conduct, general reputation, and any other relevant details. Additionally, we value your candid opinion on the mentioned firms. (A) . d a Export \u0026 Import Co. 1. In i n 33, DARYA GANF, DELHI INDIA 2. American Trading Co., Inc. 140 Water Street, Vancouver, B.C. Yours very truly,","choices":["For any information you may desire as to the stability and character of our firm, you may please refer to our bankers","You are assured that anything thus communicated to us will be kept strictly confidential","Since this transaction is very important to both of us, we would like you to give it your best attention to satisfy us in every respect","We hope that you will correct the matter at once and let us know by mail"],"answer":2}];
var _D57=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하고 있는 “외국인수수입”에 관한 설명으로 올바른 것은?","choices":["수입실적 인정 금액은 수입통관액의 FOB 가격 기준으로 한다.","수입실적 확인 및 증명 발급기관은 세관장 또는 한국무역협회장이다.","수입대금은 외국에서 지급되지만 수입물품 등은 국내에서 인수하거나 제공받는 수입이다.","수입대금은 국내에서 지급되지만 수입물품 등은 국내에서 인수하지 않고 외국에 서 인수하거나 제공받는 수입이다."],"answer":4},{"section":"무역규범","num":2,"stem":"2. 대외무역법에 따른 용역 및 전자적 형태의 무체물 수출에 관한 설명으로 잘못 된 것은?","choices":["용역 및 전자적 형태의 무체물 수출은 대외무역법에 의해 규제된다.","전자적 형태의 무체물 수출은 물리적인 물품의 이동 없이도 대금결제가 이루 어질 수 있다.","용역 및 전자적 형태의 무체물 수출에는 컨설팅, 소프트웨어 개발, 온라인 교 육 등이 포함될 수 있다.","대외무역법에 의해 용역 및 전자적 형태의 무체물 수출은 물품의 수출과 동일 한 절차 및 통관을 거쳐야 한다."],"answer":4},{"section":"무역규범","num":3,"stem":"3. 대외무역법령상 국내에서 물품 등을 매도하는 경우 외화획득으로 인정되는 것은?","choices":["외국인으로부터 외화를 받고 국내 제조업체에 원자재를 공급하는 경우","내국인으로부터 원화를 받고 공장 건설에 필요한 물품 등을 국내에서 공급하는 경우","국내 소재 외국항공사 대리점으로부터 원화를 받고 국제무역기에 항공기 용품을 공급하는 경우","외국인으로부터 외화를 받고 외화획득용 시설·기재를 외국인과 임대차계약을 맺은 국내업체에 인도하는 경우"],"answer":4},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에 규정한 전문무역상사에 관한 설명으로 올바른 것은?","choices":["전문무역상사 지정은 산업통상자원부 장관이 결정하면 영구히 그 지위가 유지 된다.","전문무역상사는 대외무역법에 따라 특정 품목의 수출입에 대한 독점권을 부여 받는다.","전년도의 수출실적 또는 최근 3년간의 평균 수출실적이 미화 100만 달러 이상 인 자는 전문무역상사로 지정받을 수 있다.","전문무역상사의 지정 기준 중 하나는 전년도 수출실적에서 중소기업이나 중견 기업이 생산한 물품의 수출 비중이 30% 이상이어야 한다."],"answer":3},{"section":"무역규범","num":5,"stem":"5. 대외무역법령에서 규정하고 있는 전략물자의 수출입에 관한 설명 중 잘못된 것은?","choices":["특허 출원에 필요한 최소한의 기술은 수출허가 등의 제한이 필요한 기술이다.","국제수출통제체제에서 정하는 물품의 제조·개발 또는 사용 등에 관한 기술을 지시, 교육, 훈련, 실연 등 구두나 행위를 통한 방법으로 이전하는 경우는 수출허 가 대상이다.","국제수출통제체제에서 정하는 물품의 제조·개발 또는 사용 등에 관한 기술을 국내 또는 국외에서 대한민국 국민으로부터 외국인에게로 이전하는 경우는 수출 허가를 받아야 한다.","선박 또는 항공기의 안전 운항을 위하여 긴급 수리용으로 사용되는 기계, 기구 또는 부분품 등을 수출하는 경우에는 전략물자의 수출허가 등이 면제되나, 수출 자는 수출 후 7일 이내에 수출거래에 관한 보고서를 제출하여야 한다."],"answer":1},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 원산지 판정 등에 관한 설명 중 올바른 것은?","choices":["해당국 제조, 가공 공정 중에 발생한 잔여물은 완전생산물품으로 본다.","실질적 변형이란 해당국에서의 제조‧가공 과정을 통하여 원재료의 세번과 상이한 세번(HS 4단위 기준)의 제품을 생산하는 것을 말한다.","부가가치의 비율은 해당 물품의 제조․생산에 사용된 원료 및 구성품의 원산지별 가격누계가 해당 물품의 수입가격(CIF 가격 기준)에서 점하는 비율로 한다.","주요 부품에 대해서는 해당 주요 부품의 원료 및 구성품의 부가가치 생산에 최 대로 기여한 국가가 해당 완제품의 부가가치 비율 기준 상위 2개국 중 어느 하 나에 속하지 않는 경우, 그 주요 부품을 최종적으로 제조한 국가를 원산지로 본 다."],"answer":1},{"section":"무역규범","num":7,"stem":"7. 대외무역법령상 다음 괄호 안에 들어갈 용어로 올바른 것은? HS 0103호 돼지는 출생국을 원산지로 한다. 다만, 출생국과 사육국이 다른 경우에는 다음 기준에 따른다. 해당 국가에서 ( ) 이상 사육된 경우에는 해당 사육국을 원산 지로 하고, ( ) 미만 사육된 경우에는 출생국을 원산지로 한다.","choices":["1개월","2개월","3개월","6개월"],"answer":2},{"section":"무역규범","num":8,"stem":"8. 내국신용장과 구매확인서에 관한 설명으로 올바른 것은?","choices":["구매확인서는 발급은행 또는 발급기관이 물품대금의 지급을 보증한다.","내국신용장 및 구매확인서는 공급 실적에 의한 무역금융 수혜가 가능하다.","구매확인서는 수출용 원자재와 수출용 완제품을, 내국신용장은 수출용 원자재만 을 거래 대상 물품으로 지정하고 있다.","구매확인서에 의한 외화획득용 원료를 구매하는 경우 부가가치세 면세이며, 외화 획득 이행에 대한 사후관리 대상이다."],"answer":2},{"section":"무역규범","num":9,"stem":"9. 관세법상 품목분류 사전심사의 반려 사유로 올바른 것을 모두 기재한 것은? A. 보정기간 내에 보정하지 아니한 경우 B. 이의신청 등 불복 또는 소송이 진행 중인 경우 C. 사전심사 신청한 물품이 물리적ㆍ화학적 분석을 필요로 하는 경우 D. 냉장ㆍ냉동 물품과 같이 운송수단 및 저장방법 등에 따라 상태가 달라질 수 있는 경우","choices":["A, C","A, B, D","B, C","B, C, D"],"answer":2},{"section":"무역규범","num":10,"stem":"10. 관세법상 외국물품에 해당하는 것은?","choices":["관세법령에 따라 입항 전 수입신고가 수리된 물품","우리나라 선박이 공해에서 채집하거나 포획한 수산물","관세법령에 따라 수입신고 수리 전 반출승인을 받아 반출된 물품","해외지사 현지공장에서 생산된 물품으로 우리나라에 도착하여 수입신고가 수리 되기 전의 물품"],"answer":4},{"section":"무역규범","num":11,"stem":"11. 신속한 통관을 위해 입항 전 수입신고를 한 경우 해당 물품에 적용되는 관세의 확정시기로 올바른 것은?","choices":["해당 물품이 우리나라에 도착한 때","납세의무자가 입항 전 수입신고를 한 때","세관장이 해당 입항 전 수입신고를 수리한 때","도착지 세관에 해당 물품에 대한 적하목록 제출을 완료한 때"],"answer":2},{"section":"무역규범","num":12,"stem":"12. 외국에서 Incoterms 2020에 따른 DDP 조건으로 수입신고한 경우 관세법상 관세 의 납세의무자로 올바른 것은?","choices":["수입화주","외국의 수출자","한국의 운송대리점","외국물품을 보관하는 국내 보세창고업자"],"answer":1},{"section":"무역규범","num":13,"stem":"13. 관세법상 다음 사례에 관한 설명으로 올바른 것은? ∙ 2017년 12월 15일: 수입신고 수리 ∙ 2018년 1월 2일: 납부기한(해당 일자에 세액 납부) ∙ 2024년 2월 2일: 품목분류 오류에 따른 부족세액 50,000,000원 확인","choices":["해당 물품의 수입자는 수정신고를 해야 한다.","해당 물품의 수입자는 세액보정을 해야 한다.","해당 물품의 수입자는 세액정정을 해야 한다.","관세징수권이 소멸되어 부족세액을 징수할 수 없다."],"answer":4},{"section":"무역규범","num":14,"stem":"14. 관세법령에서 규정하고 있는 잠정가격신고에 관한 설명으로 잘못된 것은?","choices":["잠정가격으로 가격신고를 한 자는 2년의 범위 안에서 세관장이 지정하는 기간 내에 확정된 가격을 신고하여야 한다.","원유ㆍ곡물 등 1차산품으로서 수입신고일 현재 그 가격이 정해지지 않은 물품은 잠정가격신고를 할 수 있다.","세관장은 잠정가격 신고납부한 세액과 확정신고 가격에 따른 세액의 차액을 환 급하는 경우 관세환급 가산금을 지급한다.","세관장은 잠정가격을 기초로 신고납부한 세액과 확정된 가격에 따른 세액 간에 차액이 발생할 경우 그 차액을 징수하거나 환급하여야 한다."],"answer":3},{"section":"무역규범","num":15,"stem":"15. 다음 사례에서 관세법상 과세가격 결정원칙에 따라 산출한 관세로 올바른 것은? ∙ 송품장(Invoice) 가격: CIF 30,000,000원 ∙ 송품장 가격에는 다음의 비용을 포함하고 있으며 구분 표시되어 있다. - 우리나라에 도착한 후 발생하는 설치비용: 3,000,000원 - 연불이자: 1,500,000원 ∙ 수입자가 별도 지급한 중개수수료: 2,000,000원 ∙ 적용 관세율: 5%","choices":["1,375,000원","1,450,000원","1,545,000원","1,625,000원"],"answer":1},{"section":"무역규범","num":16,"stem":"16. 관세법상 다음 사례에 대하여 수입자가 할 수 있는 조치로 올바른 것은? ∙ 2023년 2월 7일: 수입신고 ∙ 2023년 2월 8일: 세액납부 ∙ 2023년 2월 14일: 세액환급(사후 협정관세 적용 신청 승인) ∙ 2024년 1월 26일: 원산지 조사 결과 협정관세 배제에 따른 추가납부세액 발생","choices":["수정신고","경정청구","세액정정","보정신청"],"answer":1},{"section":"무역규범","num":17,"stem":"17. 관세법령에서 규정하고 있는 덤핑방지관세에 관한 설명 중 올바른 것은?","choices":["수입물품의 기본관세율 8%, 덤핑방지관세율 10%인 경우 실제적용 관세율은 10% 이다.","덤핑 사실과 실질적 피해 사실에 관한 조사는 한국무역협회에서 담당한다.","덤핑방지관세의 부과는 시행일 6개월 이전에 수입된 물품에 대하여도 적용된다.","덤핑방지관세는 국제협력관세보다 우선 적용된다."],"answer":4},{"section":"무역규범","num":18,"stem":"18. 다음 사례에서 관세법상 세관에 납부하여야 할 주세 교육세로 올바른 것은? (FTA 원산지증명서 제출) 세율 품명(HSK) 원산지 과세가격 주세 기본관세율 FTA세율 주세율 교육세율 포도주 프랑스 10,000원 30% 0% 30% 10% (2204.21-1000)","choices":["300원","1,000원","3,000원","4,630원"],"answer":1},{"section":"무역규범","num":19,"stem":"19. 관세법상 소액물품의 면세와 통관절차에 관한 설명으로 잘못된 것은? (FTA 원산 지 요건은 충족한다)","choices":["갑돌이는 미국 전자상거래 사이트를 통하여 미화 1,000달러 모형 자동차를 구입 하였다. 며칠 후 갑돌이는 세금 납부 통지를 받았다.","갑순이는 미국 전자상거래 사이트를 통하여 미화 200달러 신발을 국제특송을 통 하여 받았다. 별도의 수입신고 및 세금 납부 없이 물품을 받았다.","갑돌이는 영국 전자상거래 사이트를 통하여 건강기능식품 10병을 미화 200달러 에 구매하였다. 별도의 수입신고 및 세금 납부 없이 물품을 받았다.","갑순이는 일본 전자상거래 사이트를 통하여 자신이 사용하기 위해 미화 150달러 의 주방용품 1개를 구입하였다. 별도의 수입신고 및 세금 납부 없이 물품을 받았 다."],"answer":3},{"section":"무역규범","num":20,"stem":"20. 관세법상 환급에 관한 설명 중에서 관세환급 대상이 아닌 것은?","choices":["수입신고를 위해 지정 보세구역에 계속 장치되어 있는 중에 재해로 멸실되거나 변질 또는 손상되어 그 가치가 떨어졌을 경우","보세공장에서 생산된 물품으로 계약 내용과 다르고 수입신고 당시의 성질이나 형태가 변경되지 아니한 상태로 수입신고 수리일부터 1년 이내에 보세공장에 해 당 물품을 다시 반입하는 경우","계약 내용과 다른 수입물품으로 수출에 갈음하여 폐기하는 것이 부득이하다고 인정되어 수입신고 수리일부터 1년 이내에 보세구역에 반입하여 미리 세관장의 승인을 받아 폐기하는 경우","외국에서 수입되어 수입신고가 수리된 물품이 계약 내용과 다르고 수입신고 당 시의 성질이나 형태가 변경되지 아니한 상태로 수입신고 수리일부터 1년 이내에 보세구역에 반입하였다가 다시 수출한 경우"],"answer":1},{"section":"무역규범","num":21,"stem":"21. 관세법상 개인이 수입한 상태 그대로 수출되는 자가사용 물품의 관세환급에 대한 설명으로 잘못된 것은?","choices":["여행자가 보세판매장에서 구입한 물품을 환불하는 경우에는 자진신고 할 때 납 부한 관세를 환급한다.","수출신고가 생략되는 탁송품 또는 우편물로서 관세환급의 대상이 되는 물품의 가격 기준은 수출신고가격(FOB 가격) 200만 원 이하의 물품이다.","개인이 수입한 상태 그대로 수출되는 자가사용 물품으로 수입신고 수리일부터 1 년 이내에 보세구역에 반입하였다가 다시 수출하는 경우 관세를 환급한다.","개인이 수입한 상태 그대로 수출되는 자가사용 물품이란 해당 물품이 수입신고 당시의 성질 또는 형태가 변경되지 아니하고, 해당 물품이 국내에서 사용된 사실 이 없다고 세관장이 인정한 물품을 말한다."],"answer":3},{"section":"무역규범","num":22,"stem":"22. 관세법상 보세창고 내에서 할 수 있는 작업으로 잘못된 것은?","choices":["부패하거나 변질된 식품의 폐기 작업","현품 확인이 필요한 경우 견본품의 반출","외국물품을 수입될 물품의 보수작업 재료로 사용하는 행위","원산지 표시를 위하여 수입 의류에 원산지 표시 라벨을 부착하는 행위"],"answer":3},{"section":"무역규범","num":23,"stem":"23. 관세법상 지식재산권 보호에 관한 설명으로 잘못된 것은?","choices":["세관장은 위조상표를 붙여 수입한 물품을 압류한 경우 일정기간이 지나면 공고 한 후 매각할 수 있다.","지식재산권을 보호받으려는 자는 세관장에게 담보를 제공하고 해당 물품의 통관 보류나 유치를 요청할 수 있다.","세관장은 수출입 신고된 물품이 지식재산권을 침해하였다고 인정될 때에는 지식 재산권을 신고한 자에게 수출입 신고 사실을 통보하여야 한다.","관세법상 보호되는 지식재산권인 상표권, 저작권과 저작인접권, 품종보호권, 지리 적 표시권 등 특허권, 디자인권을 침해하는 물품은 수출입할 수 없다."],"answer":1},{"section":"무역규범","num":24,"stem":"24. 관세법상 다음 괄호 안에 들어갈 내용이 순서대로 올바른 것은? 이의신청은 해당 처분의 권한이 있는 세관장에게 불복사유를 갖추어 해당 처분이 내려진 것을 안 날로부터 ( ) 이내에 제기하여야 한다. 세관장은 이의신청을 받은 날로부터 ( ) 이내에 결정을 하여야 한다.","choices":["30일, 30일","60일, 60일","90일, 30일","120일, 60일"],"answer":3},{"section":"무역규범","num":25,"stem":"25. 관세환급특례법령상 다음 설명에 해당하는 용어는? Ÿ 특수공정물품 중에서 원재료를 같은 생산공정으로 가공했을 때 주종(主從) 관계 를 구별할 수 없는 종류가 다른 두 가지 이상의 개별적 기능과 경제적 가치를 가진 제품들이 생산되는 경우에 이 제품들의 총칭이다. Ÿ 예로는 원유를 상압증류하여 생산한 나프타, 등유, 경유, 중유, 아스 이 제품의 팔트, 윤활유, LPG 등을 들 수 있다. Ÿ 해당 소요량은 일정기간별 단위소요량 산정방법 또는 1회계연도 단위소요량 산 정방법으로 산정하여야 한다.","choices":["손모량","부산물","연산품","소요량"],"answer":3},{"section":"무역규범","num":26,"stem":"26. 다음 사례에서 관세환급특례법령상 간이정액환급제도에 관한 설명으로 잘못된 것 은? (수출자는 간이정액환급 적용대상 충족업체이다) 품명(HSK) 수출 금액(FOB) 간이정액환급액 2023년 2024년 수출 수리일 환급 신청일 진단시 약 100,000,000원 20원 10원 2023. 2024. (3822.19-1000) 3. 30. 2. 1.","choices":["관세환급액은 200,000원이다.","수출자가 적자수출을 한 경우에도 관세환급을 받을 수 있다.","수출자가 정상적으로 유상수출하였으나 수출대금을 회수하지 못한 경우에는 관 세환급을 받을 수 없다.","간이정액환급 적용 대상업체는 중소기업기본법 제2조에 의한 중소기업자로서 환 급신청일이 속하는 연도의 직전 2년간 매년도 환급실적이 6억 원 이하인 제조업 체이다. ‘"],"answer":3},{"section":"무역규범","num":27,"stem":"27. 관세환급특례법령상 시제품 생산단계로 손모율이 불안정한 수출물품’에 적용할 수 없는 소요 량 산정방법만으로 나열한 것은?","choices":["수출건별 등 총소요량 산정방법, 위탁건별 총소요량 산정방법","위탁건별 총소요량 산정방법, 1회계연도 단위소요량 산정방법","수출건별 등 총소요량 산정방법, 일정기간별 단위소요량 산정방법","일정기간별 단위소요량 산정방법, 1회계연도 단위소요량 산정방법"],"answer":4},{"section":"무역규범","num":28,"stem":"28. 자유무역협정(FTA)관세법상 직접운송원칙에 관한 설명으로 잘못된 것은?","choices":["자유무역협정(FTA)관세법과 협정에서 직접 운송의 요건 등에 관하여 다르게 규 정한 경우에는 협정에서 정하는 바에 따른다.","물품이 원산지가 아닌 국가를 경유하면서 해당 국가의 관세당국의 통제 또는 감 독하에 있지 않았던 경우, 최초 원산지 국가를 원산지로 인정하지 않는다.","물품이 원산지가 아닌 국가를 경유하면서 수입항까지의 국제운송에 필요한 하역 ㆍ선적ㆍ포장 작업이나 물품을 양호한 상태로 보존하는 데 필요한 작업이 추가 된 경우, 최초 원산지 국가를 원산지로 인정하지 않는다.","물품이 생산ㆍ가공 또는 제조된 이후에 원산지가 아닌 국가를 경유해 운송되거 나 원산지가 아닌 국가에서 선적된 경우, 최초 원산지 국가를 원산지로 인정하지 않는다. 다만, 해당 물품이 원산지가 아닌 국가의 보세구역에서 운송 목적으로 환적되었거나 일시적으로 보관되었다고 인정되는 경우에는 그렇지 않다."],"answer":3},{"section":"무역규범","num":29,"stem":"29. 자유무역협정(FTA)관세법령에서 규정한 원산지 인증수출자제도에 관한 설명으로 잘 못된 것은?","choices":["원산지 인증수출자의 종류에는 업체별 원산지 인증수출자와 품목별 원산지 인증 수출자가 있다.","원산지 인증수출자의 인증유효기간은 업체별 원산지 인증수출자는 5년, 품목별 원산지 인증수출자는 3년이다.","한국-EU FTA의 경우 6,000유로 초과 물품을 수출할 경우 원산지 인증수출자에 한하여 원산지증명서 발급이 가능하다,","원산지 인증수출자제도란 원산지증명 능력이 있다고 관세당국이 인증한 수출자 에게 원산지증명서 발급절차 또는 첨부서류 간소화 혜택을 부여하는 것을 말한 다. 황"],"answer":2},{"section":"무역규범","num":30,"stem":"30. 다음 제시된 상 에서 관세법령과 자유무역협정(FTA)관세법령상 수입물품에 적용 할 세율로 올바른 것은? (관세율 적용에 필요한 물품의 요건은 충족함) • (주)KITA는 캄보디아로부터 인스턴트 카레(2103.90-9020)를 수입한다. • 캄보디아는 역내포괄적경제동반자협정(RCEP) 적용국가이다. • 캄보디아는 최빈개발도상국에 대한 특혜관세 적용국가이다. • 캄보디아 수출자는 인스턴트 카레에 대해 필요한 원산지증명서를 발급받을 수 없다.","choices":["기본관세: 8%","조정관세: 45%","역내포괄적경제동반자협정(RCEP)관세: 6.4%","최빈개발도상국에 대한 특혜관세: 0%"],"answer":2},{"section":"무역결제","num":1,"stem":"1. 송 결제 방식에 관한 설명으로 잘못된 것은?","choices":["보석, 귀금속 등 고가품 거래 시 직접 물품검사를 하기 전에는 정확히 파악하기 어려운 경우의 거래에 COD 거래가 활용될 수 있다.","CAD 거래에서 수입자가 서류 인수를 거절하거나 수입자가 수출국에 있는 자신 의 대리인에게 지시해 서류 인수를 거절할 경우, 수출자는 대금회수가 어려워 계 약 전에 상대방의 신용상태를 철저하게 확인해야 한다.","CAD 거래에서 수입자는 수출자에게 요청해 PSI를 하는 것이 수입자의 위험관리 방안이 될 수 있다.","CAD, COD, BWT는 선적 이후에 대금이 지급된다는 측면에서 사후송금 방식에 해당한다. 금"],"answer":3},{"section":"무역결제","num":2,"stem":"2. 송 결제 방식에 관한 올바른 설명을 모두 기재한 것은? 금 U A. 송 결제 방식에도 신용장결제 방식의 CP 600, 추심결제 방식의 UR C 522와 같은 국제무역규칙이 사용된다. 금 금 B. 송 결제 방식에서 대 결제 시에는 통상 전신환 대신에 수입자가 수출자를 지 약 yN 급인으로 하는 속어음(Promissor 금 ote)을 발행한 후, 대 을 결제하게 된다. O 금 C. C D 방식에서는 대 결제를 위해 환어음을 발행하지 않 는다. D. CAD 방식에서는 수출자가 물품을 선 적한 후 수입자에게 직접 혹 은 수출국에 소재하는 수입자의 지사나 대리인 등에게 선 적서류를 제시하고 서류와 상환 금 하여 대 을 결제받는다.","choices":["A, B","A, B, C, D","B, C","C, D"],"answer":4},{"section":"무역결제","num":3,"stem":"3. 다음은 수입자인 KITA Tr ading Corporation이 수입하는 물품에 관한 계약서의 대금 결제조건이다. 이 조건에 대한 설명으로 잘못된 것은? P ayment Terms: KITA Trading Corporation shall remit the proceeds by T/T within 60 days after shipment.","choices":["다른 결제 방식에 비해 수입자에게 유리하다.","다른 결제 방식에 비해 수입자에게 상업위험(mercantile risk)의 부담이 크다.","이 결제 방식은 일반적으로 신용장 방식에 비해 은행수수료가 저렴하다.","이 결제 방식은 일반적으로 구매자 우위 시장(buyer’s market)에서 발생한다. 금"],"answer":2},{"section":"무역결제","num":4,"stem":"4. 송 결제 방식의 내용으로 잘못된 것은?","choices":["O/A 방식에서 수출자는 선적 완료 후 즉시 당해 외상수출채권을 거래은행에 매각 함으로써 조기에 수출대금을 현금화할 수도 있는데 실무에서는 ‘O/A nego’라고 부른다.","‘O/A nego’는 수출자가 선하증권 등 선적서류 원본을 거래은행에 매각한다.","송금결제 방식에서 사전지급, 동시지급, 사후지급 중 2가지 이상을 혼합하여 결제 할 수도 있다.","CWO 거래에서 A/P Bond 발행을 요구할 수 있는데, 이는 수입자의 위험관리 방안 이다."],"answer":2},{"section":"무역결제","num":5,"stem":"5. 추심결제 방식에 관한 올바른 설명을 모두 기재한 것은? 뢰 A. 추심의 인으로부터 추심의 취 급을 의 받은 은행, 수출자의 뢰 은행을 즉 거래 ‘추심은행(co ectinll g ba k ’ n ) 이라고 한다. B. 추심은행은 일치하는 제시에 대해 대 을 결제할 금 이 있다. 책임 래 C. 추심이 장 의 확정일 출급조건의 환어음을 포함하는 경우, 추심지시서에는 / 상업서류가 지급인에게 인수인도(D A) 또는 지급인도(D P) 중 어 조건으로 / 느 인도되어야 하는지를 명시해야 한다. D. 추심지시서에서 상업서류가 지급인에게 D A 또는 D P 중 어 / 조건으로 인도 / 느 되어야 하는지를 명시하지 않은 경우, D/P로 간주하여 처리한다.","choices":["A, B","B, C","B, C, D","C, D"],"answer":4},{"section":"무역결제","num":6,"stem":"6. 추심결제 방식에 관한 설명으로 잘못된 것은?","choices":["D/P 방식 거래 시 환어음상의 “drawee”는 은행이 아닌 수출자로 표시되어야 한다.","D/A 방식에서는 기한부 환어음이 발행된다.","D/A 방식으로 거래하는 수출자의 경우 일반적으로 신용장 방식의 수출자보다 대 금회수의 안정성이 떨어진다.","“D/P at 60 days after shipment date”와 같은 ‘기한부 D/P’방식에서는 해당 기간이 경과한 후에 서류가 인도되어야 한다."],"answer":1},{"section":"무역결제","num":7,"stem":"7. 다음은 D A/ 거래 순서 중 일부 내용이다. 거래 순서가 올바른 것은? A. 수입자의 물품 통관 B. 수입자의 서류 인수 C. 추심은행의 인수 통보 D. 수입자의 대 결제금 E. 추심의뢰은행의 추심 지시 F. 추심은행이 추심의뢰은행으로 대금 지급","choices":["A – E – C – D – B - F","B – A – E – C – F - D","C – A – B – F – D - E","E – B – C – A – D – F"],"answer":4},{"section":"무역결제","num":8,"stem":"8. 화환신용장 결제 방식에 관한 설명으로 잘못된 것은?","choices":["수입자가 상품을 반드시 수취할 수 있다는 보장이 없으므로 선적 전 검사증명 서를 요구하여 관련 위험을 감소시켜야 한다.","Injunction은 수입자를 보호하려는 것이지만 신용장의 본질을 훼손하는 것으로 볼 수 있다.","화환신용장은 신용장 조항에 기재된 조건에 일치하는 서류가 제시되면 개설은 행이 지급하는 개설은행의 조건부 지급보증서이다.","화환신용장은 신용장상에 “Documentary Credit”라고 기재되며 약칭하여 ‘D/C’로 부른다."],"answer":3},{"section":"무역결제","num":9,"stem":"9. 다음 신용장 문구와 관계가 없는 것은? ISSUING BANK : KOEXKRSE :42C Drafts at : 120DAYS AFTER SIGHT :42D Drawee : KOEXUS33BRO + USANCE DRAFTS SHALL BE NEGOTIATED AT SIGHT BASIS REGARDLESS OF THE TENOR OF DRAFT ACCEPTANCE COMMISSIONS AND DISCOUNT CHARGES ARE FOR BUYER'S ACCOUNT :53A Reimbursing Bank : KOEXUS33BRO","choices":["신용장 개설은행의 신용공여","A/C, D/C는 수입자의 부담","Banker’s usance L/C","수익자는 일람지급으로 매입(nego)"],"answer":1},{"section":"무역결제","num":10,"stem":"10. 화환신용장 관 련 용어의 정의 및 사용 용도에 관한 설명이 잘못된 것은?","choices":["Packing Credit: 집화신용장이라고 부르며 수익자가 자금을 선지급받는 신용장이 다.","Confirming: 확인은행은 개설은행의 조건 변경에 대하여 확인 요청을 거절할 권 리가 있다.","Trust Receipt: 개설은행이 수입화물에 대한 담보권과 소유권을 유지하면서 수입 자가 수입대금을 결제하기 전에 수입화물을 처분할 수 있도록 하는 제도이다.","Surrendered B/L: 화환신용장 거래에서 선하증권 원본 없이 화물을 인수할 수 있 도록 발행하는 서식이다."],"answer":4},{"section":"무역결제","num":11,"stem":"11. 다음은 화환신용장의 일부 내용이다. 46A의 선하증권 관련 문구에 따라 작성 한 선하증권에서 서류상의 불일치가 발생할 수 있는 것은? 46A Document Required + FULL SET ORIGINAL CLEAN ON BOARD MARINE BILLS OF LADING MADE OUT TO ORDER, ENDORSED IN BLANK MARKED ‘FREIGHT PREPAID’, NOTIFY APPLICANT WITH FULL ADDRESS AND MENTIONING THIS DC NO.","choices":["본선적재 부기가 기재되지 않는 Shipped B/L을 제시하였다.","선하증권 뒷면에 아무런 배서를 하지 않았다.","“Freight Prepaid”라는 문구가 기재되었다.","화환신용장 번호가 기재되었다."],"answer":2},{"section":"무역결제","num":12,"stem":"12. 다음 화환신용장 조항 중 수출자의 대 금회수에 지장을 초래할 수 있는 독소조항 을 모두 기재한 것은? l f Lading showing shipper’s load and count is not acceptable. A. Bi o B. L/C wil be operative when the applicant obtain I/L from the authorities. C. Sample must be approved prior to shipment by SGS. D. Claims for reimbursement wil be made on the L/C applicant. E. Documents with discrepancies must not be negotiated without our prior approval.","choices":["A, B, C, D, E","A, B, D","B, C","D, E"],"answer":2},{"section":"무역결제","num":13,"stem":"13. UCP 600에 규정된 개설은행의 요청에 대한 지정은행의 의무에 관한 설명으로 올 바른 것은?","choices":["양도를 요청받았다면, 은행은 양도 진행 여부에 대해 5영업일 이내에 제1수익자에 게 알려주어야 한다.","통지를 요청받았으나 은행이 화환신용장의 통지를 하지 않기로 결정하였다면, 지 체없이 개설은행에 SWIFT를 통해 알려주어야 한다.","상환은행으로 요청받았다면, 은행은 화환신용장의 유효기일 이내에는 상환을 진행 하여야 한다.","확인은행이 아닌 매입은행으로만 지정받았다면, 지정은행은 선적서류를 매입 없이 전달하여도 된다."],"answer":4},{"section":"무역결제","num":14,"stem":"14. 화환신용장의 요구서류 중 상업송장에 관한 설명으로 잘못된 것은?","choices":["“For account \u0026 risks of Messrs”에는 개설은행의 명칭을 기재한다.","신용장상에 선지급에 대한 조건이 없더라도, 송장에 이를 표시할 수 있다.","신용장에서 단가의 표시가 없다면 송장에는 단가가 표시되지 않아도 된다.","신용장에서 “Suede Shoes”의 선적을 요구하고 있는데 송장에서는 “Imitation Suede Shoes”라고 표시하면 이는 물품의 성질, 분류, 종류가 달라진 것을 나타내 므로 수리되지 않는다. 험"],"answer":1},{"section":"무역결제","num":15,"stem":"15. ISBP 745에서 규정한 보 서류에 관한 설명으로 올바른 것은?","choices":["신용장에서 CIF(Incoterms 2020) 조건으로 표시되었다면, 도착항까지만 부보되어야 한다.","원본 보험서류에 서명이 있어야 하는 것은 아니다.","보험서류에 보험금 청구기간을 제한하는 보험금 지급 청구의 만료일이 표시되어 서는 안 된다.","보험회사의 대리인이 서명하는 경우에 보험회사 상호가 반드시 기재될 필요는 없다. 었"],"answer":3},{"section":"무역결제","num":16,"stem":"16. 다음 문구가 운송서류상에 기재되 을 경우, ISBP 745에 근거하여 개설은행이 수 리 거절할 수 있는 것이 모두 기재된 것은? a g wil be loaded on deck at shipper’s risk A. c r o B. destination THC on consignee A/C C. freight to be payable at the destination D. packing may not be sufficient for the sea journey E. cargo demurrage after 7 days wil be count for consignee","choices":["A","A, D","B, C, D, E","B, D"],"answer":1},{"section":"무역결제","num":17,"stem":"17. 일반적으로 계 약금액 대비 가장 적은 보증금액으로 발급되는 보증서는?","choices":["Warranty Bond","Bid Bond","Performance Bond","Retention Bond"],"answer":2},{"section":"무역결제","num":18,"stem":"18. 다음 내용과 가장 관계가 깊은 것은? 계약이행이 완료된 후 하자 등을 담보하기 위하여 일정 금액의 유보금을 예치하여 야 한다. 동 유보금을 선지급하는 대신 하자 발생 등 계약위반 사실이 발생하면 유 보금의 환급을 보증하는 것이 목적이다.","choices":["Bid Bond","Warranty Bond","Retention Bond","Payment Bond 팩터링에 관한 설명으로 잘못된 것은?"],"answer":3},{"section":"무역결제","num":19,"stem":"19. 국제팩터링에 관한 설명으로 잘못된 것은?","choices":["클레임으로 인하여 수입자가 대금지급을 거절하는 경우에도 수입팩터가 물품 대금을 대신 지급하므로 수출자에게 안전한 금융기법이다.","팩터링을 제공하는 팩터는 국제팩터링기구에 가입된 회원이어야 한다.","수출자가 부담하는 팩터링 수수료에는 수출팩터 수수료뿐만 아니라 수입팩터 수수료도 포함된다.","수입자는 별도의 담보 없이 본인 신용만으로 기한의 이익을 향유하여 외상수 입이 가능하다. 페 팅"],"answer":1},{"section":"무역결제","num":20,"stem":"20. 포 이 에 관한 설명으로 잘못된 것은?","choices":["포페이터는 상환청구권이 없는 조건으로 채권을 매입하므로 화환신용장 매입보 다 환가료가 높다.","포페이팅에는 기한부신용장뿐 아니라 Aval D/A도 대상이 된다.","포페이팅 거래에서는 환어음과 약속어음만을 그 할인대상으로 하며 기타의 증권 또는 채권을 취급하지 않는다.","포페이팅 거래의 할인대상은 중장기어음이며, 고정금리부로 할인이 이루어지기 때문에 수출자는 계약 전에 미리 그 할인비용을 확정할 수 있다. 험 험 험"],"answer":1},{"section":"무역결제","num":21,"stem":"21. 한국무역보 공사가 보상하는 수출보 의 위 을 모두 기재한 것은? A. 수입자의 고의적인 지급 지연 B. 수입자의 일방적인 계 약 파기로 인한 수출 불능 C. 수입국에서의 수입제한 조치로 인한 수출 불능 D. 제조업체의 파업으로 인한 수출상사의 수출 불능 E. 선적서류 불일치로 인수가 거절된 포페이팅 거래","choices":["A, B, C","B, C","B, C, D, E","C, D 성 험"],"answer":1},{"section":"무역결제","num":22,"stem":"22. 결제방식별 안전 과 위 관리 방안에 관한 설명으로 잘못된 것은?","choices":["O/A를 요구하는 수입자에게 수출자는 일람지급 신용장으로 합의하였고 신용장을 접수 한 수출자는 선적 후 즉시 거래은행에 선적서류 매입을 통하여 위험을 관리한다.","신용장결제 방식으로 계약한 수입자는 검사 전문회사를 통하여 PSI를 실시하고 검사를 한 회사가 발행한 검사증명서를 신용장 주요서류 항목에 추가하여 위험을 관리한다.","COD로 계약한 수입자는 수입물품을 통관 완료한 후 물품에 하자가 없음을 확인하고 대금을 지급한다.","O/A로 계약한 수출자는 무역보험공사의 수출보험에 가입하여 위험을 관리한다."],"answer":1},{"section":"무역결제","num":23,"stem":"23. 현재 외환시장에서 USD/KRW, EUR/USD의 매입률과 매도율이 각각 다음과 같을 때 EUR/KRW 재정환율의 매도율은 얼마인가? 통화 매입 률(bid) 매도율(o er) ff USD/KRW 1,000 1,200 EUR/USD 1.25 1.50","choices":["800","1,250","1,500","1,800"],"answer":4},{"section":"무역결제","num":24,"stem":"24. ㈜한국무역은 독일에서 전자제품을 수입하면서 자사의 외화예금 계좌에 보유한 달러화를 유로화로 환전하여 수입대금으로 결제하려고 한다. 은행들이 제시하는 환율이 다음과 같을 때, ㈜한국무역은 어느 은행과 거래하는 것이 가장 유리한 가? EUR/USD 구분 bid ff o er A은행 1.0865 1.0900 B은행 1.0875 1.0910 C은행 1.0885 1.0920 D은행 1.0895 1.0930","choices":["A은행","B은행","C은행","D은행"],"answer":1},{"section":"무역결제","num":25,"stem":"25. ㈜한국무역은 미국에 농산물을 수출하고 3개월 후에 달러화를 수취할 예정인 데, 환율 변동을 헤지하기 위해 은행에 선물환율을 문의하였다. 은행이 다음과 같은 two-way 방식으로 환율을 고시했다면 이 회사는 어떤 환율로 거래할 수 있는가? 단, swap rate의 단위는 pip이다. 구분 bid ff o er p a s ot r te 1,350.00 1,370.00 3개월 s wap rate 15 30","choices":["1,335.00원","1,349.85원","1,350.15원","1,365.00원"],"answer":3},{"section":"무역결제","num":26,"stem":"26. 선물환거래와 통화선물거래의 차이에 관한 설명으로 올바른 것은?","choices":["선물환거래는 신용도를 불문하고 모든 계약에 대해 증거금을 적립하지만, 통화 선물거래는 원칙적으로 없다.","선물환거래는 상대방과 서로 합의하면 결제일을 어떤 날이라도 정할 수 있지 만, 통화선물거래는 사전에 규정된 결제일만 가능하다.","선물환거래는 손익을 일일정산하지만, 통화선물거래는 손익을 일일정산하지 않 는다.","선물환거래는 장내거래이지만, 통화선물거래는 장외거래이다."],"answer":2},{"section":"무역결제","num":27,"stem":"27. ㈜한국무역은 달러 통화옵션 시장에서 만기가 1개월로 같은 달러 콜옵션과 달 러 풋옵션을 아래 조건으로 각각 매입하였다. 만기에 USD/KRW 현물환율이 1,340원으로 결정되었을 경우 이 회사의 옵션 매입전략과 옵션 프리미엄까지 고려한 전체 손익은 얼마인가? 구분 액면 금액 행사가격 옵션 프리미엄 달러 콜옵션 100,000달러 1,330원 1달러당 7원 달러 풋옵션 100,000달러 1,335원 1달러당 5원","choices":["스트랭글(strangle), 200,000원 손실","스트래들(straddle), 200,000원 이익","스트랭글(strangle), 300,000원 손실","스트래들(straddle), 300,000원 이익 황"],"answer":1},{"section":"무역결제","num":28,"stem":"28. 다음 상 에 관한 설명 중 잘못된 것은? ㈜한국무역은 제품 생산에 필요한 원자재 중 일부는 국내에서 원화로 구매하며, 일부는 일본에서 수입하고 엔화로 대금을 지불한다. 생산된 제품은 미국으로 수출 하여 달러로 대금을 수취한다.","choices":["엔은 short 포지션, 달러는 long 포지션이다.","USD/KRW 환율이 상승하면 ㈜한국무역은 이익을 얻는다.","JPY/KRW 환율이 상승하면 ㈜한국무역은 이익을 얻는다.","USD/JPY 환율이 상승하면 ㈜한국무역은 이익을 얻는다."],"answer":3},{"section":"무역결제","num":29,"stem":"29. 미 달 화가 러 향후 지속적인 강세를 보일 것으로 전망되자 미국에서 상품을 수입 하는 ㈜한국무역은 이제까지 90일 usance 방식으로 신용장을 개설했던 것을 sight 방식으로 전환하였다. 이는 내부적 환위험 관리기법 중 어떤 것에 해당되는 가?","choices":["매칭(matching)","리딩(leading)","래깅(lagging)","네팅(netting)"],"answer":2},{"section":"무역결제","num":30,"stem":"30. 한국무역보 험공사에서 취급하는 환변동보험에 관한 설명으로 올바른 것은?","choices":["수출계약이 변경되거나 수출대금이 조기 입금되는 등 외화자금 흐름이 바뀔 경우, 만기일 이전에도 조기결제가 가능하다.","기업은 은행과 선물환 계약을 체결하고 한국무역보험공사가 보증하는 제도이 다.","외화자금의 실제 인도가 필요한 거래이다.","증거금 및 담보를 제공하여야 환변동보험에 가입할 수 있다."],"answer":1},{"section":"무역계약","num":1,"stem":"1. 무역계 의 준 법과 관 하여 올바른 것은?","choices":["모든 무역계약의 준거법은 수입자의 영업 소재지 국가의 법을 채택해야 한다.","무역계약은 당사자가 합의하더라도 제3국의 법률을 준거법으로 선택할 수 없다.","무역계약에서 준거법은 계약의 성립과 유효성, 해석, 이행 및 분쟁 해결에 적용 된다.","무역계약에서 준거법을 지정하지 않은 경우, 자동으로 국제상업회의소(ICC) 규칙 이 적용된다. 약"],"answer":3},{"section":"무역계약","num":2,"stem":"2. 무역 계 에서 Incoterms의 역할에 관한 설명으로 잘못된 것은?","choices":["Incoterms는 국제 무역에서 상품 인도 조건을 명확히 하였다.","Incoterms 2020은 최근의 국제 무역 관행을 반영하여 2020년에 개정되었다.","모든 무역 계약에서 Incoterms의 사용이 법적으로 필수적이다.","Incoterms는 위험 부담과 비용 부담의 지점을 정의하는 데 유용하다."],"answer":3},{"section":"무역계약","num":3,"stem":"3. Incoterms 2020의 EXW 조건에서 인도가 종료되는 시점은?","choices":["물품이 공장이나 창고 등 지정장소에서 매수인의 처분하에 놓인 때","물품이 매수인의 집화용 차량에 적재되는 시점","물품이 매수인이 지정한 운송인에게 인도되는 시점","물품이 본선에 적재되는 시점 O"],"answer":1},{"section":"무역계약","num":4,"stem":"4. Incoterms 2020의 F B 조건에서 물품의 본 선 적재 시점에 발생하는 비용과 위험 에 관한 설명 중 올바른 것은?","choices":["비용과 위험은 판매자에서 구매자로 전환된다.","비용은 판매자가, 위험은 구매자가 부담한다.","비용과 위험은 판매자가 계속 부담한다.","비용은 구매자가, 위험은 판매자가 부담한다."],"answer":1},{"section":"무역계약","num":5,"stem":"5. Incoterms 2020의 조건에 관한 설명으로 올바른 것은?","choices":["Incoterms 2020으로 개정됨으로써 종전의 Incoterms 2010의 사용은 금지된다.","FCA BUSAN CY 조건에서 매도인의 공장에서 BUSAN CY까지 육상운송 중에 사 고로 화물이 파손된 경우, 화물이 운송인에게 인도된 이후의 사고이므로 매수인 이 그 위험을 부담하여야 한다.","CPT INLAND WAREHOUSE OF DALLAS, USA 조건에서 수입국 내륙운송 중에 사고로 화물이 파손된 경우, 매도인이 운송인과 운송계약을 체결하였으므로 매도 인이 그에 대한 책임을 져야 한다.","DDP DAEGU WAREHOUSE, KOREA 조건에서 화물이 트럭에 적재되어 동 장소에 도착했을 때 당사자 간에 별도 합의가 없다면 매도인은 수입통관 수수료, 관세 및 부가가치세를 부담하여야 한다."],"answer":4},{"section":"무역계약","num":6,"stem":"6. 의사 실현(performing an act)에 의하여 계약이 성립되는 것을 모두 기재한 것은? A. 독일의 매도인이 발행한 청약에 대해 한국의 매수인이 청약서 유효기일 이내에 물품대금을 송금하고 그 사실을 매도인에게 즉시 통보하였다. B. 한국의 매도인이 발행한 청약에 대해 일본의 매수인이 원산지가 한국산인 제품의 발송을 요청하는 내용을 담은 승낙서를 송부하였다. C. 프랑스의 매도인이 발행한 화환신용장을 요구하는 청약에 대해 한국의 매수인이 해당 조건과 일치하는 수입신용장 개설 사실을 통보하였다. D. 영국의 매수인이 발행한 청약에 대하여 한국의 매도인이 수출물품의 환적 허용을 추가한 매매계약서 초안을 송부하였다.","choices":["A, B","A, C","B, C","C, D"],"answer":2},{"section":"무역계약","num":7,"stem":"7. Vienna Convention(1980)에서 규정한 청약과 승낙에 관한 설명으로 올바른 것은?","choices":["청약은 매매조건을 제시하면서 그러한 조건으로 물품을 판매하겠다는 의사표시 이며 국제 무역거래에서는 매도인만이 할 수 있다.","청약은 1인 이상의 불특정인을 대상으로 하는 계약 체결의 의사표시이다.","청약의 내용 가운데 일부만 승낙하는 경우에 계약은 승낙한 그 일부만 성립된다.","가격, 결제, 물품의 품질 및 수량, 인도 장소와 시기 등의 변경은 청약 조건을 실 질적으로 변경하는 것으로 간주된다."],"answer":4},{"section":"무역계약","num":8,"stem":"8. 무역계 약 성립에 관한 설명으로 올바른 것은?","choices":["무역계약의 의사표시는 구두, 행동으로도 가능하나 동의나 합의는 반드시 서면으 로 진행해야 한다.","매수인이 매도인에게 Purchase Order를 송부하였고 매도인이 승낙하였다 하더라 도 계약은 성립되지 않는다.","불확정 청약은 상대방의 승낙이 명확하거나 확고하다면 유효기간에 상관없이 상 대방의 승낙만으로도 무역계약은 성립된다.","무역계약 성립을 위해 청약 조건에 새로운 조건을 변경하여 승낙하는 것은 새로 운 청약으로 취급한다. W"],"answer":4},{"section":"무역계약","num":9,"stem":"9. B T 방식에 대한 설명으로 잘못된 것은?","choices":["BWT 방식은 수출업자 책임 아래 수입국 내 보세창고에 물품을 반입시키고 수입 국 현지에서 매매계약을 체결해 물품을 거래하는 방식이다.","BWT 물품으로 반입이 인정되는 경우에는 장치기간에 상관없이 매매계약을 통해 물품 판매가 완료되는 시점까지 보세창고 보관이 가능하다.","BWT 방식은 사전에 체결한 물품매매계약을 준수하며 지정된 수입업자가 관리하 는 보세창고에 물품을 보관하여 안전하게 거래할 수 있다.","BWT 방식은 수입하고자 하는 물품을 실제로 확인하고 수입할 수 있다."],"answer":3},{"section":"무역계약","num":10,"stem":"10. 러시아와 우크라이나 간 전쟁에 따라 냉동 어류의 수입국 전환을 고려하고 있다. 냉동 어류의 품질조건으로 적절한 조건은?","choices":["FAQ term","Sales by sample term","USQ term","GMQ term 약"],"answer":4},{"section":"무역계약","num":11,"stem":"11. 무역계 의 가격조건, 품질조건, 결제조건, 계 약 성립 등에 관한 다음 설명 중 잘 못된 것은?","choices":["곡물, 유연탄 등 살화물(bulk cargo)을 신용장결제 방식으로 거래하는 경우, 계약 물품의 수량 앞에 “more or less clause” 등 과부족 허용 조항의 표현이 없더 라도 신용장상에 특별히 과부족을 금지하지 않는 한 5% 범위 내의 과부족은 허 용된다.","Vienna Convention(1980)에 의하면 피청약자의 승낙과 동시에 그 철회 의사가 청 약자에게 도달한 경우에는 해당 승낙은 철회된다.","D/P, D/A 등 추심결제 방식은 은행이 추심에 관여하기 때문에 당사자 간 거래인 CAD, COD, O/A와 같은 송금결제 방식보다 수출자에게 유리하지만, 은행의 지급 확약이 있는 거래는 아니다.","UCP 600에 따르면 선적일, 선적기간과 관련하여 “on or about December 1st, 2023”이라고 표현되었다면 2023년 12월 1일을 기준으로 전 3일부터 후 3일까지 의 기간(총 7일간)에 선적되어야 한다."],"answer":4},{"section":"무역계약","num":12,"stem":"12. 일반적인 무역계 과 약 선적조건에 관한 내용 중 올바른 것을 모두 기재한 것은? 엔 약 낙 약 마찬가지로 도달주의이다. A. 비 나협 에 의하면 승 은 청 과 B. 신용장 선적기일 마지막 날이 휴무일(국경일/일요일 등)인 경우, 선적기일은 자 동으로 연장된다. C. 신용장에서 일정 기간 내에 할부청구 또는 할부 적이 행해지도 선 록 규정된 경 우, 이 할부거래를 위해 정해진 기간 내에 할부청구나 할부선적이 되지 않으면 해당 할부 부분과 향후 할부 부분에 대해서는 신용장을 사용할 수 없다. D. 선적선하증권(Shipped B/L)은 선하증권 발행일을 선적일로 취급하며, 수취선하 증권(Received B/L)은 본선 적재 부기일을 선적일로 취급한다. E. 항공화물운송장(Air Waybil )은 별도 비행일자 부기일이 있어도 발행일을 선적일 로 취급한다.","choices":["A, B, C","A, C, D","B, C, E","C, D, E 약"],"answer":2},{"section":"무역계약","num":13,"stem":"13. 다음은 무역계 에 사용되는 기본 조건이다. 영어 약자나 설명이 잘못된 것을 모 두 기재한 것은? A. RT: Rye-Terms, 선적품질조건 B. FAQ: First Average Quality, 평균중등품질조건 C. Tale Quale: 판매적격품질조건 D. CBM: Cubic Meter, 부피의 단위 E. MOQ: Minimum Order Quantity, 최소주문량","choices":["A, B, C","A, C, D","B, C, D","C, D, E"],"answer":1},{"section":"무역계약","num":14,"stem":"14. 다음 내용은 무역계 서의 어 약 느 조항에 해당되는가? h uy hall be liable for and hold the Sel er harmless from and against all T e B er s losses and damages incurred and suits and claims brought by third party due to possible infringement of trademark, patent, copyright or other proprietary rights of the third party in connection with the Sel er's manufacture and sale of the Goods according to the Specification attached.","choices":["유통대리점 계약","Shipping mark","지식재산권 거래계약","기술 수출입 계약 약"],"answer":3},{"section":"무역계약","num":15,"stem":"15. 다음 무역계 서 조항에 해당하는 것은? If during performance of this contract there should arise economic, political or technical circumstances which were unforeseen by the parties and are beyond their control and which make the performance of the contract so onerous, though not impossible, for one of the parties that the burden would exceed all the anticipatory provisions made by the parties at the time the contract was signed, such affected party shall be entitled to equitable relief and may request the revision of the contract.","choices":["사정변경조항","불가항력조항","피해보상조항","분리가능조항"],"answer":1},{"section":"무역계약","num":16,"stem":"16. 다음 무역계 약 조건 중 잘못된 것은?","choices":["손해배상액예정조항(liquidated damages clause): 계약체결 시에 청구할 수 있는 손해배상액을 미리 약정하는 조항","완전합의조항(entire agreement clause): 수출자와 수입자가 완전한 합의에 도달했 다면 설사 계약서에 포함하지 않아도 계약의 내용이 될 수 있다는 취지의 조항","보증조항(warranty clause): 계약과 일치하는 물품의 인도 의무와 하자 있는 물품 을 인도하였을 경우의 조치에 관한 조항","분리가능조항(severability clause): 계약서 내용 중 일부분이 법원의 판결 등에 의 해 무효가 되는 경우, 해당 부분만 실효하고 나머지로 계약이 유지된다는 내용의 조항"],"answer":2},{"section":"무역계약","num":17,"stem":"17. 국제 거래에서 발생되는 분쟁의 해결에 관한 설명 중 잘못된 것은?","choices":["당사자 중 일방이나 쌍방의 의뢰에 따라 제3의 기관이 해결방안을 제시하거나 조언함으로써 분쟁을 해결하는 방법을 알선(intercession)이라 한다.","조정(mediation)에 따른 조정안을 당사자 쌍방이 수락하게 되면 중재판정과 동일 한 효력이 인정되어 당사자는 반드시 조정안에 따라 분쟁을 마무리 지어야 한다.","제3자를 중재인으로 선정하여 중재판정부를 구성하고, 그 중재판정부의 판정에 복종함으로써 분쟁을 해결하는 방법을 중재라 하며 중재 절차를 규정한 국제규 칙은 Vienna Convention(1980)이다.","외국 중재판정의 승인과 집행에 관한 관련 국제협약에 의해 중재판정은 법원의 확정판결과 동일하게 외국에서의 강제집행 역시 보장되고 있다."],"answer":3},{"section":"무역계약","num":18,"stem":"18. Vienna Convention(1980)에서 규정한 구제수단에 관한 설명으로 잘못된 것은?","choices":["물품이 계약에 일치하지 않는 경우, 매수인이 대금을 지급하지 않았다면 대금의 감액을 청구할 수 없다.","물품의 부적합이 본질적인 계약위반이 되는 때는, 매수인은 대체품의 인도를 청 구할 수 있다.","물품명세의 지정은 매수인의 계약위반에 대한 매도인의 구제수단이다.","계약해제는 매도인의 계약위반에 대하여 매수인이 취할 수 있는 권리 구제수단 일 뿐만 아니라, 매수인의 계약위반에 대하여 매도인이 단행할 수도 있다. 징"],"answer":1},{"section":"무역계약","num":19,"stem":"19. 다음 중 상사중재의 특 이 모두 올바 게 기재된 것은? 르 A. 자발적 분 해결방법쟁 B. 중재인의 전문 성 합 C. 사후 중재 의도 가능 D. 적은 비용 E. 판정내용 공개를 통한 투명한 결정","choices":["A, B","A, B, C, D","B, C, D, E","C, D, E"],"answer":2},{"section":"무역계약","num":20,"stem":"20. 중재에 관한 설명으로 잘못된 것을 모두 기재한 것은? 합 약 합 므 A. 중재 의서는 계 서에 의한 서면 의를 의미하 로 중재조항은 계 서의 필수 약 조항이다. 메 합 합 B. 당사자 간에 이 일로 교환된 중재 의는 서면 중재 의로 인정받지 못한다. C. 중재로 분쟁을 해결하기로 합의하였더라도 중재 개시 전에 당사자의 합의에 따라 조정을 진행할 수 있다. D. 국제중재는 모 든 UN 회원국에서 중재판정을 강제집행할 수 있다. E. 중재 심리절차에 당사자가 출석하는 것은 권리이자 의무이지만, 당사자가 출석 하지 않고 서면으로 진술 내용을 제출하거나 증거를 제출하는 것도 가능하다.","choices":["A, C, D","A, B, D","A, C, E","B, C, E"],"answer":2},{"section":"무역계약","num":21,"stem":"21. 다음 서식에 관한 설명으로 올바른 것은? f a Pro orm Invoice l Se er : ABC uy XYZ B er : We are pleased to make the proforma invoice of the under mentioned commodities as per conditions and details described as follows; Quality : Refer to the attached the product specification Commodity \u0026 Descriptions : Industrial machine tool Quantity : 1(one) set Price : FOB New York port, USA Amount : USD 10,000 Shipment : Within 60 days after the date of Sale Contract Payment : T/T remittance within 60 days after the date of shipment Packing : Export standard packing Validity : By the end of Feb., 2024 Feb. 1, 2024 (ABC Corp.의 공식 서명)","choices":["위 서식은 구매자가 판매자에게 발송하는 청약서이다.","Proforma Invoice는 특정 수입국에서는 신용장을 개설하거나 송금할 때 은행에 제시하는 서류이므로 청약서라고 볼 수 없다.","ABC가 소재하는 국가는 미국이다.","이 청약은 확정청약이므로 철회될 수 없다. 거래에 관한 설명으로 올바른 것은?"],"answer":3},{"section":"무역계약","num":22,"stem":"22. 다음 국제 무역 • 한국의 A와 미국 B는 어린이 장난감 100개를 개당 10달러, 결제조건은 L/C at 60 days after sight로 계약을 체결하고자 한다. • 한국의 A는 이 제품을 제조·판매 중인 중국의 C와 개당 8달러, 사후송금 30일 조건으로 계약을 체결하고자 한다. • 완성된 제품은 중국에서 미국으로 바로 운송된다. • 한국의 A 입장에서 미국 B와 중국 C의 정보가 서로에게 노출되어서는 안 되므로 선하증권을 포함한 모든 서류의 consignee는 A로 기재하도록 C에게 요구한다.","choices":["A는 B, C와 위 조건으로 각각 매매계약을 체결할 수 있다. 두 계약의 결제조건이 다르지만 A는 C로부터 관련 서류를 받아 정해진 날짜 안에 송금하고, 그 서류를 신용장 조건과 일치하도록 대체해 기일 안에 관련 은행에 제시하여 대금을 받으 면 된다.","A는 B, C와 위 조건으로 각각 매매계약을 맺고 거래할 수 있다. 단 B와 신용장 결제를 진행해야 하므로 A는 B에게 신용장 조건과 일치하는 서류를 제공토록 계 약서에 명시해 서류 하자로 인한 문제를 C가 책임지도록 해야 한다.","A는 B, C와 각각 매매계약을 체결할 수 있지만 두 계약의 대금결제 조건이 달라 외화의 영수 및 지급 시점이 일치하지 않아서 외환규정을 위반하게 된다. 따라서 두 계약의 대금결제 조건을 일치시켜 각각 계약을 체결하도록 한다.","물품이 국내 보세구역을 거치지 않고 외국에서 외국으로 직접 운송되므로 중계 무역이 아니다. 따라서 A는 미국 B, 중국 C와 직접 매매계약을 맺을 수 없고, B 와 C가 계약을 체결할 수 있도록 소개하고 양쪽 또는 일방으로부터 수수료를 받 는 중개무역 계약을 맺어야 한다."],"answer":1},{"section":"무역계약","num":23,"stem":"23. 무역운송 서류에 관한 설명으로 잘못된 것은?","choices":["항공운송 서류는 전 운송이 하나의 동일한 항공운송 서류에 의하여 포괄된다면 물품이 환적될 것과 환적될 수 있음을 표시할 수 있다.","Surrendered B/L은 수하인이 양하지에서 원본 선하증권 없이 화물을 찾을 수 있 게 하는 것이며 주로 신용장 방식에서 사용한다.","Sea Waybill도 Surrendered B/L과 마찬가지로 원본 선하증권 없이 물품을 찾을 수 있다.","KIFFA MT B/L, FIATA MT B/L은 실무에서 포워더가 발행하는 선하증권 형식의 복합운송증권이다."],"answer":2},{"section":"무역계약","num":24,"stem":"24. 선하증권에 관한 설명 중 잘못된 것은?","choices":["선하증권 원본의 발행은 1통으로도 가능하나 분실 등에 대비해 그 이상을 한 세 트로 하여 발행할 수 있다.","Notify Party란에는 대개 신용장 개설의뢰인 혹은 실제 바이어 회사명 및 개인명, 수입자가 지정하는 대리인이 기재된다. 그리고 수입지의 관세사나 포워더 명칭이 표기되기도 한다.","Freight and Charge란에는 화물 운송에 따른 제반 비용의 명세로 운송인이 기재 하나 실무상으로는 기재하지 않는 경우가 대부분이다. 다만, 도착지 국가에서 운 임이 표기된 선하증권에 대해서만 수입통관이 가능한 경우에는 의무적으로 표기 한다.","선하증권상 Place of Delivery와 Final Destination란에는 화주가 요구하는 지역을 의무적으로 동일하게 표기하여야 한다. 금"],"answer":4},{"section":"무역계약","num":25,"stem":"25. 수출입 물류요 에 관한 내용 중 올바른 것은?","choices":["컨테이너 육상운송료는 전국을 150개 행정구역별로 나누어 컨테이너 물동량이 많은 8개 지역을 기점으로 요금을 정하고 있다. 20 FT 요금은 통상 40 FT 요금 의 50%를 적용하고 있으며, 운송의 빈도가 높은 지역은 편도운임을 만들어 적용 중이다.","Wharfage는 해양수산부가 징수하는 요금이며, 무역항의 항만시설 사용 및 사용 료에 관한 규정에 따라 수출화물에만 징수하는 물류요금이다. 선사가 화주로부터 받아 해양수산부에 납부한다.","항공화물 운임은 운임산출 중량에 따라 큰 쪽으로 적용되며 minimum, -45kg, +45kg, 100kg, 300kg, 500kg, 1000kg 등으로 구분된다.","항만하역료는 항만운송사업법 제10조에 의해 국토교통부 인가요금으로 되어 있 고 계약당사자 모두 준수할 책임이 있다."],"answer":3},{"section":"무역계약","num":26,"stem":"26. 운송 클레임에 관한 설명 중 잘못된 것은?","choices":["클레임의 제기 주체는 반드시 해당 화물의 소유자이어야 한다. 따라서 수입지에 서 선하증권을 가지고 화물을 인수하는 수하인만이 클레임을 제기할 수 있다.","운송 claim이란 운송인이 운송계약에 따라 운송을 이행하면서 계약의 일부 또는 전부를 불이행함으로써 일어나는 운송화물에 대한 손상, 멸실, 지연 등에 관해 하주가 운송인에게 배상 청구하는 것을 말한다.","항공운송보다는 주로 해상운송 구간에서 많이 발생한다.","운송 클레임 해결을 위해 필요한 서류는 손해배상청구서, 송장, Survey Report, 운송서류 사본 등이다. 험"],"answer":1},{"section":"무역계약","num":27,"stem":"27. 해상보 에 관한 설명으로 잘못된 것은?","choices":["해상보험계약이란 보험자가 피보험자에 대하여 계약 때문에 합의한 방법과 범위 내에서 해상손해를 보상할 것을 인수하는 계약이다.","해상보험은 해상에서의 손해만 담보하고 있다.","적하보험에서 특정한 선적 물품 한 단위를 위한 보험계약을 개별보험계약이라 하고, 정해진 동안 선적하는 피보험자의 모든 화물을 위한 보험계약을 포괄보험 계약이라 한다.","보험계약의 목적은 화물에 대해서 피보험자가 갖는 이해관계이며 이를 ‘피보험 이익’이라고도 한다. 험"],"answer":2},{"section":"무역계약","num":28,"stem":"28. 해상보 증권 양식과 보험증권에 기재되는 사항에 관하여 잘못된 것은?","choices":["“Claims, if any, payable at”란에는 수출의 경우 보험자를 대신하여 보험금을 지급하는 회사명이 기록되며, 수입의 경우 당해 보험자명이 기재된다.","“Survey should be approved by”란은 손해가 발생했을 때 피보험자가 사고사실 통지하고 보험자가 사고를 조사할 손해사정인을 지정하는 난이다. 보험자가 표기 되거나 손해사정 회사명과 주소 등이 명시된다.","“Thence to”란에는 화물의 최종목적지가 반드시 명시되며 보험계약자는 보험 자에게 의무적으로 통지하여야 한다.","“Reference No.”란에는 신용장 번호 혹은 상업송장 번호 등을 기입한다. 동일 제품을 반복적으로 수출입하는 경우에는 Reference No. 관리가 필수적이다."],"answer":3},{"section":"무역계약","num":29,"stem":"29. 화물별 대표적인 사고 유형에 관한 설명 중 잘못된 것은?","choices":["섬유류의 경우 운송 중 컨테이너 내부에 발생한 한습으로 손해가 발생하기도 한 다. 특별한 사고 없이 운송 도중 다양한 기후대를 거치면서 화물이나 포장재 자 체의 수분 때문에 한습이 발생했다면 sweat에 대한 특약이 없는 한 보상받지 못 한다.","냉장 혹은 냉동 화물은 주로 reefer container를 이용해 운송한다. 온도와 관련된 화물의 손상은 냉장시설을 이용해 운송되는 화물에만 해당된다. 따라서 이런 화 물에는 Refrigerated cargo clause를 첨부해 보험계약을 체결해야 한다.","유리와 요업제품이 가입되는 All risks 조건과 A 조건은 파손 위험을 포함하지 않 는다. 따라서 파손 위험을 보상받으려면 이를 추가로 가입하여야 한다. 다만, 보 험자가 파손 위험에 대해 특약을 거부하면 관련 보상은 받지 못한다. “All risks excluding breakage”로 표기되는 것이 대표적인 경우다.","개방형 컨테이너 화물은 갑판에 적재된 경우에도 보험계약 체결 당시 청약한 보 험조건이 그대로 유지되며 갑판적이나 선창 내 적재와 관계없이 운송사고에 대 해 보상받을 수 있다. 험 약 험"],"answer":4},{"section":"무역계약","num":30,"stem":"30. 보 청 과 보 구상에 관한 내용으로 잘못된 것은?","choices":["보험자에게는 구상권 청구라는 권리의 영역이 있다. 이를 보전하려면 피보험자는 반드시 보험자가 구상권을 행사할 수 있는 청구권 대위를 해놓아야 한다. 이 의 무는 약관상 선택사항이다.","해상보험은 적재 선박명이 미확정된 상태에서도 보험 가입이 가능한다. 이 경우 보험증권상에 통상 “TO BE NOTICED OR TO BE DECLARED”로 표기된다.","보험자는 화물의 종류나 해당 국가의 전쟁 등 위험요소가 매우 높아 보험자에게 불리하게 작용할 때는 인수를 승낙하지 않을 수 있다.","보험계약 취소의 이유는 다양하나 수출입 계약의 해제, 무역거래 조건의 변경으 로 인한 것일 경우 보험계약자가 요구하면 낸 보험료는 반환된다."],"answer":1},{"section":"무역영어","num":1,"stem":"1. 다음 서신의 밑줄 친 부분(A∼B)에 들어갈 청약서 형태가 올바르게 짝지어진 것 은? a De r Sirs: Thank you for sending your (A) for 1,000 doz. of Men’s cotton socks. Although your samples have impressed us very favorably, we regret that the business cannot be completed at your present prices as they are very high compared with those from your competitors. Please note, however, that it is our intention to entrust you with the bulk of our business, and we ask for an additional 10% reduction off the price you offered. If you accept this (B) , we would like to place an order with you soon. We look forward to your positive response. Yours sincerely, (A) (B)","choices":["conditional offer free offer","offer counter offer","counter offer free offer","purchase order counter offer 련"],"answer":2},{"section":"무역영어","num":2,"stem":"2. 다음 서식과 관 해 잘못된 내용으로만 짝지어진 것은? Purchase Order We are pleased to order the fol owing goods on the terms and conditions stated below. d y Ladies 100 pct Polyester Knit Jacket (Style No. 152839M) Commo it : Price: USD 103,700 Trade Term: DPU New York on-dock CY Quantity: 2,500 PCS Packing: Hanging container Shipment: Before May 31, 2024 Payment: Under an irrevocable sight L/C Unless otherwise specified this contract is subject to the General Agreement previously exchanged. h h p date includes May 31, 2024. (A) T e s i ment (B) Procuring an insurance up to New York is not the seller’s obligation. (C) The seller should extend his/her responsibility and risk into the import country, up until the goods are unloaded. (D) The seller should issue 90 days usance draft for payment. (E) The seller pays for unloading costs including all charged incurred after unloading such as demurrage charges at New York CY.","choices":["(A), (B), (C)","(A), (D), (E)","(B), (C), (D)","(C), (D), (E)"],"answer":2},{"section":"무역영어","num":3,"stem":"3. 위 서신에 대한 설명으로 잘못된 것은?\n\n[지문]\nWe are pleased to make you an offer as below subject to your reply received on\n August 30, 2023.\n\n (A)       Men’s cotton socks\n        Item:\n (B) Price: US$ 4.50/dozen CIF LA\n (C) Quantity: One TEU\n (D) Payment: by an irrevocable negotiation L/C at sight in our favor\n Packing: export standard carton packing\n Shipment: until October 15, 2023\n\n We are sure that you will find the price quoted to be very reasonable. We look\n forward to your positive response.\n Yours sincerely,\n Gildong Hong","choices":["This offer is an irrevocable and firm offer","For payment, a letter of credit should be issued and a draft under the L/C should be drawn on Mr. Mcklin","In order for a contract to be concluded with these terms, an unconditional acceptance should reach the offeror by August 30, 2023","According to UCP 600, the shipment date includes October 15, 2023"],"answer":2},{"section":"무역영어","num":4,"stem":"4. 위 서신의밑줄 친 부분(A∼D) 중 CISG(1980)에서 “거래제의가 충분히 확정적이어 야 유효한 청약이 된다”는 규정에서 충분히 확정적이기 위한 조건에 해당하지 않 는 것은?\n\n[지문]\nWe are pleased to make you an offer as below subject to your reply received on\n August 30, 2023.\n\n (A)       Men’s cotton socks\n        Item:\n (B) Price: US$ 4.50/dozen CIF LA\n (C) Quantity: One TEU\n (D) Payment: by an irrevocable negotiation L/C at sight in our favor\n Packing: export standard carton packing\n Shipment: until October 15, 2023\n\n We are sure that you will find the price quoted to be very reasonable. We look\n forward to your positive response.\n Yours sincerely,\n Gildong Hong","choices":["(A) Item","(B) Price","(C) Quantity","(D) Payment"],"answer":4},{"section":"무역영어","num":5,"stem":"5. 다음은 Incoterms 2020의 지정장소에 관한 설명이다. 빈칸(A∼C)에 들어갈 그룹이 올바 게르 짝지어진 것은? Inall Incoterms® rules except the ( A ) rules, the named place indicates where the goods are “delivered”, i. e. where risk transfers from seller to buyer; h In t e ( B ul h a d place is the place of delivery and also the ) r es, t e n me place of destination and seller must organize carriage to that point; h In t e ( C ul h a d place indicates the destination to which the ) r es, t e n me sel er must organize and pay for the carriage of the goods, which is not, however, the place or port of delivery. A B C","choices":["C group D group D group","D group F group C group","C group D group C group","D group C group F group G"],"answer":3},{"section":"무역영어","num":6,"stem":
