oices":["To provide a notice about the issuance of the Letter of Credit","To inquire about the price of travel bags","To propose a business relationship for exporting travel bags","To report a problem with a previous order"],"answer":3},{"section":"무역영어","num":21,"stem":"21. 위 서신에 대한 회신의 내용으로 적절하지 않은 것은?\n\n[지문]\nThe Greater New York Chamber of Commerce recommended your firm as a\nreputable importer of travel bags. We are writing to express our interest in\nestablishing a business relationship with you.\nAs shown in our enclosed catalog, we have been exporting travel bags from\nKorea for over three decades. Our direct connections with top-tier manufacturers in\nKorea allow us to offer the lowest market prices and the best possible terms.\nWe prefer to conduct business using letters of credit. Prices are quoted FOB\nBusan in U.S. dollars, but we can also provide CIF or delivery prices to any port\nin your country if needed.\nIf you are interested in our travel bags, please let us know the terms under which\nyou would be willing to do business.\nWe look forward to receiving a trial order from you.\n\nSincerely,","choices":["We are pleased to consider your offer to import travel bags to Korea","We have reviewed your company's information and are impressed by your extensive experience in the travel bag industry and your strong connections with Korean manufacturers","In addition to letters of credit, would you consider other payment terms such as open account or documentary collection?","Please let us know your FOB Busan prices for various quantities and product lines"],"answer":1},{"section":"무역영어","num":22,"stem":"22. 위 서신의 내용으로 올바르지 않은 것은?\n\n[지문]\nThank you for your letter dated June 15, offering us 500 dozen cotton goods.\n We are pleased to accept your offer as outlined in the attached Purchase Order.\n  We are delighted to have entered into this first contract so quickly. As previously\n discussed, we require the shipment to arrive at our warehouse no later than the\n end of March. Given our current inventory levels, timely delivery is of the utmost\n importance.\n  Also, please ensure that the goods are carefully packed to prevent any damage\n during transit. We recommend using sturdy cartons and appropriate cushioning\n materials.\n                              (A)\n Please notify us by email once the shipment is complete.\n\n Sincerely,","choices":["The primary purpose of this letter is to place an order for cotton goods","The buyer will pay for the goods by wire transfer(T/T) after the shipment","The buyer requests appropriate packaging for the shipment","The buyer needs the goods to be delivered by the end of March"],"answer":2},{"section":"무역영어","num":23,"stem":"23. 위 서신의 밑줄 친 부분(A)에 들어가기에 가장 적절한 문장은?\n\n[지문]\nThank you for your letter dated June 15, offering us 500 dozen cotton goods.\n We are pleased to accept your offer as outlined in the attached Purchase Order.\n  We are delighted to have entered into this first contract so quickly. As previously\n discussed, we require the shipment to arrive at our warehouse no later than the\n end of March. Given our current inventory levels, timely delivery is of the utmost\n importance.\n  Also, please ensure that the goods are carefully packed to prevent any damage\n during transit. We recommend using sturdy cartons and appropriate cushioning\n materials.\n                              (A)\n Please notify us by email once the shipment is complete.\n\n Sincerely,","choices":["Considering these circumstances, we propose accepting the offer with a 20% price reduction","We ask you to amend the L/C immediately so that we can execute your order","We are unable to fulfill the order by the requested delivery date","We have already instructed Bank of America in New York to establish an irrevocable letter of credit in your favor to cover this purchase"],"answer":4},{"section":"무역영어","num":24,"stem":"24. 다음 서신의 내용을 논리 전개에 따라 가장 잘 나열한 것은? Dear Mr. Lee, Thank you for your order number 4567-9, dated September 20, for 5,000 pairs of golf shoes. (A) However, we are prioritizing your order and expect to complete all models by November 29. (B) We are confident that you will be completely satisfied with the quality of the shoes you ordered. (C) As discussed during our meeting with your representative and outlined in the contract's shipping timeline, custom-made models require at least 60 days for delivery. (D) To ensure a smooth shipping process, please provide us with your shipping instructions so we can arrange for immediate delivery. Sincerely,","choices":["(A) － (C) － (D) － (B)","(B) － (A) － (C) － (D)","(C) － (A) － (D) － (B)","(D) － (A) － (C) － (B)"],"answer":3},{"section":"무역영어","num":25,"stem":"25. 다음 서신에서 밑줄 친 (A)∼(D) 중 문맥상 가장 어색한 것은? Dear Richard, I was surprised to receive your letter dated November 20 stating that you hadn't received payment for invoice number H931. (A) On November 2, I instructed my bank, Welsh Co-operative Bank in Swansea, to transfer $919.63 to your account at Barnley's Bank in Cardiff. (B) Since my bank statement confirmed that the funds were withdrawn from my account, I assumed they were successfully credited to your account. (C) It's possible that your bank has not notified you yet. (D) Please check with Welsh Co-operative Bank in Swansea to see if there is any issue with the transfer. If you encounter any problems, please let me know so I can investigate further with our bank. Sincerely,","choices":["(A)","(B)","(C)","(D)"],"answer":4},{"section":"무역영어","num":26,"stem":"26. 다음 중 문장의 순서가 가장 논리적으로 나열된 것은?. Dear Sirs, (A) We expect this business to be feasible and we are willing to proceed if they can meet our requirements. (B) Kyle Textile is interested in establishing a joint venture with us to manufacture fashionable clothes in Kazakhstan. (C) Any information you provide will, of course, be treated with the utmost confidentiality, and we would be pleased to offer a service in return should an opportunity arise in the future. (D) They would like to procure raw and sub-materials from Korea and to take advantage of high-skilled labor here. (E) We are particularly interested in learning about their primary areas of business and, if possible, would appreciate your honest assessment of their activities. Please let us know any expenses associated with our request so that we can arrange prompt payment. Thank you for your kind cooperation. Faithfully yours,","choices":["(A) － (B) － (D) － (E) － (C)","(B) － (E) － (C) － (A) － (D)","(B) － (D) － (A) － (E) － (C)","(E) － (D) － (A) － (B) － (C)"],"answer":3},{"section":"무역영어","num":27,"stem":"27. 다음 중 주어진 문장의 영작이 올바르지 않은 것은?","choices":["당사가 생산하는 셔츠는 한 색상당 12개 묶음으로 판매합니다. 낱개로는 판매할 수 없음 을 유감스럽게 생각합니다. ⇒ The shirts we manufacture are sold by the dozen in single colors. We regret to inform you that we do not sell individual garments","선적지연이 불가피하기에 L/C(No. 7)의 선적기일을 5월 15일로 연장해주시기 바랍니다. ⇒ Due to the unavoidable delay in shipment, please extend the validity of the letter of credit(No. 7) to May 15th","“운임 선불”이라는 문구를 “운임 착불”로 대체해 신용장을 수정하도록 은행에 요청 바랍니다. ⇒ Please have your banker amend the L/C by replacing the term “freight prepaid” with “freight collect”","조만간 상품들을 선적할 것이므로 신용장을 빠른 시일 안에 개설해주실 것을 요청합니 다. ⇒ We will soon be ready to ship the goods and, therefore, request that you open a letter of credit as soon as possible to ensure timely shipment"],"answer":2},{"section":"무역영어","num":28,"stem":"28. 다음 서신에 대한 답신 내용으로 적절하지 않은 것은? Dear Mr. Richard, We have received your shipment for order No.516 of 100 units of Infinity laptops, model A246. Unfortunately, we have found that thirty cases out of the 100 have been badly damaged. Among the damaged units, twenty are broken beyond repair. It seems that the damage was due to inadequate packaging and a lack of shock-absorbing material within the packing crates. As you indicated in our survey report, twenty units of Infinity laptops, model A246, are now unsaleable due to the damage that sustained during shipping. This is the first time such an issue has occurred in our business relationship. We hope that you will give your immediate attention to this matter. We look forward to continuing our positive working relationship. Sincerely,","choices":["Therefore, we request that you ship replacements for the damaged products as soon as possible","We are sorry for the inconvenience we have caused and kindly ask you to let us know which of the above two solutions is preferable to you","Regarding this matter, we will try to resolve it as best as we can","We would like to inform you that all necessary measures have been taken to prevent a recurrence of similar issues"],"answer":1},{"section":"무역영어","num":29,"stem":"29. 위 서신에서 밑줄 친 부분(A)에 들어가기에 적절하지 않은 문장은?\n\n[지문]\n(A)                               . We are therefore,\n writing to you with a keen desire of opening an account with you.\n  In introducing ourselves, we are pleased to share that for over thirty years we\n have been established here as an exporter of electric machinery, and maintaining\n extensive and close connections with leading manufacturers in this country. We\n have exported various kinds of electric machine to many countries, gaining a\n strong reputation for the high quality, prompt delivery and competitive pricing.\n  As to our standing, please refer to KEB Hana Bank, Seoul. We will be happy to\n provide any other information you may require upon request.\n We look forward to your favorable reply.\n\n Yours very truly,\n\n Gil-Dong Hong\n Export Manager","choices":["From the Chamber of Commerce of your city we understand that you are one of the most reliable importers of electric machinery","We understand from the World Business Directory that your firm is one of the leading dealers in your market","Through the courtesy of the Consul, we have learned that you are one of the largest firms in your city","Your name has been recently given to us as a reference by ABC Traders Co., who wants to open an account with us"],"answer":4},{"section":"무역영어","num":30,"stem":"30. 위 비 즈니스 메일의 제목으로 적절한 것은?\n\n[지문]\n(A)                               . We are therefore,\n writing to you with a keen desire of opening an account with you.\n  In introducing ourselves, we are pleased to share that for over thirty years we\n have been established here as an exporter of electric machinery, and maintaining\n extensive and close connections with leading manufacturers in this country. We\n have exported various kinds of electric machine to many countries, gaining a\n strong reputation for the high quality, prompt delivery and competitive pricing.\n  As to our standing, please refer to KEB Hana Bank, Seoul. We will be happy to\n provide any other information you may require upon request.\n We look forward to your favorable reply.\n\n Yours very truly,\n\n Gil-Dong Hong\n Export Manager","choices":["Credit inquiry","Re: Circular Letter","Business proposal","Re: New business partners"],"answer":3}];
var _D61=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하고 있는 용어에 관한 설명으로 잘못된 것은?","choices":["수출실적이란 산업통상자원부장관이 정하여 고시하는 기준에 해당하는 수출통관액 ㆍ입금액, 가득액(稼得額)과 수출에 제공되는 외화획득용 원료ㆍ기재의 국내공급액 을 말한다.","무역에는 대통령령으로 정하는 용역의 수출과 수입이 포함되며, 「부가가치세법 시 행령」 제3조에 따른 용역(출판업과 영상ㆍ오디오 기록물 제작 및 배급업을 포함)이 해당한다.","보세판매장에서 외국인에게 국내에서 생산(재생ㆍ개조하는 것 포함)된 물품을 매도 하는 것은 수출에 해당한다.","임대수출이란 임대(사용대차를 제외)계약에 의하여 물품 등을 수출하여 일정기간 후 다시 수입하거나 그 기간의 만료 전 또는 만료 후 해당 물품 등의 소유권을 이전하 는 수출을 말한다."],"answer":4},{"section":"무역규범","num":2,"stem":"2. 대외무역법에서 규정한 통상의 진흥에 관한 설명으로 올바른 것은?","choices":["산업통상자원부장관은 무역과 통상을 진흥하기 위하여 국제통상 여건의 분석과 전 망 및 기업의 해외 진출 지원 방안 등을 포함하여 반기별로 다음 반기의 통상진흥 시책을 세워야 한다.","전년도 수출실적 또는 직전 3개 연도의 연평균 수출실적이 미화 100만달러 이상인 자는 전문무역상사로 지정받을 수 있다.","산업통상자원부장관은 기업의 해외 진출과 관련된 상담ㆍ안내ㆍ홍보ㆍ조사 및 지원 업무를 종합적으로 수행하기 위하여 시군구에 해외진출지원센터를 둔다.","산업통상자원부장관은 종합무역상사를 통한 신시장의 개척, 신제품의 발굴 및 중소 기업의 수출 확대 등을 위하여 필요하다고 인정되는 경우에는 종합무역상사의 국내 외 홍보, 우수제품의 발굴, 해외 판로개척 등에 필요한 사항을 지원할 수 있다."],"answer":2},{"section":"무역규범","num":3,"stem":"3. 대외무역법에 따른 수출입 승인에 관한 설명으로 잘못된 것은?","choices":["수출입 승인의 유효기간은 통상 1년이다.","수출입 승인을 받은 자가 물품 등의 수량이나 가격을 변경하려면 변경 승인을 받아 야 한다.","수출입 승인의 변경 신고는 당초 승인한 기관의 장에게 변경 신고를 해야 한다.","하나의 수출입에 대해서는 둘 이상의 승인을 받아야 하는 경우더라도 하나의 승인 만 받으면 된다."],"answer":4},{"section":"무역규범","num":4,"stem":"4. 대외무역법에서 규정하는 수출실적의 인정 금액에 관한 설명으로 올바른 것은?","choices":["중계무역에 의한 수출의 경우에는 수출금액(CIF가격)에서 수입금액(FOB가격)을 공제 한 가득액으로 한다.","위탁가공된 물품을 외국에 판매하는 경우는 외국환은행의 입금액으로 한다.","전자적 형태 무체물의 수출은 한국무역협회장 등이 외국환은행을 통해 입금을 확인 한 금액으로 한다.","원양 어로에 의한 수출 중 현지 경비사용분은 수출실적으로 인정되지 않는다."],"answer":3},{"section":"무역규범","num":5,"stem":"5. 대외무역법에서 규정하는 외화획득용 원료ㆍ기재의 수입 승인에 관한 설명으로 잘 못된 것은?","choices":["외화획득용 원료의 기준 소요량을 정하는 경우는 생산 공정에서 생기는 평균 손실 량은 제외해야 한다.","무역거래자가 외국의 수입업자로부터 수수료를 받고 행한 수출 알선은 외화획득 행 위에 준하는 것으로 본다.","외화획득용 원료를 수입한 자가 직접 외화획득의 이행을 하는 경우의 이행 기간은 통상 수입통관일 또는 공급일로부터 2년으로 한다.","품목별 외화획득 이행 의무의 미이행률이 10퍼센트 이하인 경우, 사후 관리를 하지 않을 수 있다."],"answer":1},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 전략물자의 수출입에 관한 설명으로 잘못된 것은?","choices":["산업통상자원부장관은 수출허가, 상황허가, 경유 또는 환적허가 및 중개허가 신청을 받으면 허가기준에 따라 심사하여 해당 허가를 할 수 있으며, 조건을 붙여 해당 허 가를 할 수 있다.","전략물자에는 해당되지 아니하나 대량파괴무기 등의 제조ㆍ개발ㆍ사용 또는 보관 등의 용도로 이용 또는 전용될 가능성이 높은 물품 등을 수출하려는 자 또는 수출 신고하려는 자는 수입자나 최종사용자 등이 이를 대량파괴무기 등의 제조ㆍ개발ㆍ 사용 또는 보관 등의 용도로 이용 또는 전용할 의도가 있음을 알았거나 그러한 의 도가 있다고 의심되면 상황허가를 받아야 한다.","물품 등을 수출, 수출신고, 경유, 환적 또는 중개하려는 자로서 산업통상자원부장관 이 고시하는 교육을 이수한 자는 해당 물품 등이 전략물자인지 또는 상황허가 대상 물품 등인지를 스스로 확인하기 위하여 자가판정을 할 수 있다.","산업통상자원부장관은 자율준수무역거래자에게 대통령령으로 정하는 바에 따라 전 략물자에 대한 수출입관리 업무의 전부를 자율적으로 관리하게 할 수 있다."],"answer":4},{"section":"무역규범","num":7,"stem":"7. 대외무역법령에서 규정하고 있는 전략물자의 수출허가에 관한 설명으로 올바른 것 은?","choices":["무역거래자는 전략물자 등을 수출, 수출신고한 자의 경우 수출허가에 관한 서류를 1년간 보관하여야 한다.","산업통상자원부장관 또는 관계 행정기관의 장은 수출허가를 받지 아니하고 전략물 자를 수출하거나 수출신고한 자에게 1년 이내의 범위에서 일정 기간 동안 전략물자 등의 전부 또는 일부의 수출을 제한할 수 있다.","전략물자 수출허가의 유효기간은 5년이며, 전략기술의 수출 등의 경우에는 유효기 간을 달리 정할 수 있다.","선박 또는 항공기의 안전운항을 위하여 긴급 수리용으로 사용되는 기계, 기구 또는 부분품 등을 수출하는 경우 수출허가 또는 상황허가를 면제한다."],"answer":4},{"section":"무역규범","num":8,"stem":"8. 우리나라의 대외무역법령에서 규정하고 있는 원산지의 표시 등에 관한 설명 중 올 바르지 않은 것은?","choices":["산업통상자원부장관 또는 시·도지사는 원산지의 표시 위반에 대한 시정명령에 따 라 과징금을 부과하려면 그 위반행위의 종류와 과징금의 금액을 명시하여 과징금을 낼 것을 서면으로 알려야 한다.","산업통상자원부장관 또는 시·도지사는 과징금의 금액이 1천만원 이상이거나 중소 기업인 경우에는 과징금의 납부기한을 연기하거나 분할 납부하게 할 수 있다. 분할 납부를 하게 하는 경우 각 분할된 납부기한 간의 간격은 3개월을 초과할 수 없으 며, 분할 횟수는 3회를 초과할 수 없다.","산업통상자원부장관 또는 시·도지사는 무역거래자 등의 수출입 규모, 중소기업 여 부, 위반 정도 및 위반 횟수 등을 고려하여 과징금 금액의 2분의 1의 범위에서 가 중하거나 경감할 수 있다.","산업통상자원부장관 또는 시·도지사는 원산지의 표시 위반에 대한 시정명령 등을 위반한 자에게 3억원 이하의 과징금을 부과할 수 있다."],"answer":2},{"section":"무역규범","num":9,"stem":"9. 대외무역법령에서 규정하고 있는 수입수량제한조치에 관한 설명으로 올바른 것은?","choices":["산업통상자원부장관이 수입수량을 제한하는 경우 그 제한수량은 기준수량 이상으로 하여야 하며, 해당 산업의 심각한 피해를 방지하거나 구제하기 어렵다고 명백하게 인정되는 경우에도 기준수량 미만으로 수입수량을 제한할 수 없다.","무역위원회의 건의가 있고 필요하다고 인정하면 수입수량제한조치의 내용을 변경할 수 있으며, 해당 산업의 피해 구제를 위해 필요한 경우에 변경 조치 내용은 최초 조치 내용보다 강화될 수 있다.","수입수량제한조치는 조치 시행일 이후 수입되는 물품에만 적용하며, 적용 기간은 2 년을 넘어서는 아니 된다.","산업통상자원부장관은 수입수량제한조치의 대상이었던 물품에 대하여는 그 수입수 량제한조치의 적용기간이 끝난 날부터 그 적용 기간에 해당하는 기간(적용기간이 2 년 미만인 경우에는 2년)이 지나기 전까지는 다시 수입수량제한조치를 시행할 수 없다."],"answer":4},{"section":"무역규범","num":10,"stem":"10. 다음 중 대외무역법령에 따라 산업통상자원부장관이 수출입 질서유지와 관련하여 취할 수 있는 조치로 잘못된 것은?","choices":["선적 전 검사기관은 선적 전 검사가 기업의 수출에 대한 무역장벽으로 작용하도록 해서는 안되며, 산업통상자원부장관은 선적 전 검사와 관련하여 수출자와 선적전 검사기관 간에 분쟁이 발생하였을 경우에는 그 해결을 위하여 필요한 조정(調整)을 할 수 있다.","산업통상자원부장관은 조정신청을 받은 때에는 15일 이내에 조정 사건의 표시, 조 정의 일시 및 장소, 당사자의 성명 또는 명칭, 조정안의 주요 내용을 포함한 조정안 을 작성하여 당사자에게 제시하여야 한다.","산업통상자원부장관은 조정안이 작성된 경우에는 당사자에게 알려야 하며, 조정안 을 통지받은 분쟁 당사자는 7일 이내에 조정안에 대한 수락 여부를 서면으로 산업 통상자원부장관에게 알려야 한다.","산업통상자원부장관은 당사자 간에 합의가 이루어지거나 조정안이 수락된 경우, 조 정신청인이나 당사자가 조정신청을 철회한 경우, 당사자가 조정안을 거부하는 경우 에는 해당 조정 사건을 끝낼 수 있다."],"answer":2},{"section":"무역규범","num":11,"stem":"11. 대외무역법령에서 산업통상자원부장관이 무역거래자에게 수출하는 물품 등의 가격, 수량, 품질, 그 밖에 거래조건 또는 그 대상지역 등에 관하여 필요한 조정을 명할 수 있는 경우에 해당하는 것을 모두 기재한 것은? A. 우리나라 또는 교역상대국의 관련 법령에 위반되는 경우 B. 물품 등의 수출과 관련하여 부당하게 다른 무역거래자의 상대방에 대하여 다른 무역 거래자와 거래하지 아니하도록 유인하거나 강제하는 경우 C. 물품 등의 수출과 관련하여 부당하게 다른 무역거래자의 해외에서의 사업활동을 방 해하는 경우 D. 헌법에 따라 체결ㆍ공포된 조약과 일반적으로 승인된 국제법규에 따른 의무 이행을 위하여 필요한 경우 E. 국제평화와 안전유지를 위한 국제공조에 따른 교역여건의 급변으로 교역상대국과의 무역에 관한 중대한 차질이 생기거나 생길 우려가 있는 경우","choices":["A, B, C, D","A, C, D, E","A, B, D, E","B, C, D, E"],"answer":1},{"section":"무역규범","num":12,"stem":"12. 대외무역법령상 구매확인서와 내국신용장에 관한 설명으로 올바른 것은?","choices":["구매확인서를 받고 수출자에게 수출용 물품을 공급하면 부가가치세법상 면세 적용 이 가능하다.","내국신용장이란 한국은행총재가 정하는 바에 따라 외국환은행의 장이 발급하여 국 내 및 외국에서 통용되는 신용장을 말한다.","구매확인서를 발급한 후 신청 첨부서류의 외화획득용 원료ㆍ기재의 내용 변경 등으 로 이미 발급받은 구매확인서와 내용이 상이하여 재발급을 요청하는 경우에는 새로 운 구매확인서를 발급할 수 있다.","구매확인서를 받고 수출자에게 수출용 물품을 공급한 공급자는 한국무역협회장으로 부터 수출실적을 인정받을 수 있으며 증명서를 발급받을 수 있다."],"answer":3},{"section":"무역규범","num":13,"stem":"13. 우리나라의 관세법령에서 규정하고 있는 품목분류 사전심사에 관한 설명 중 잘못 된 것은?","choices":["물품을 수출입하려는 자는 수출입신고를 하기 전에 관세청장에게 품목분류를 미리 심사하여 줄 것을 신청할 수 있다.","관세청장은 사전심사를 신청한 품목과 관련하여 소송이 진행 중인 경우에는 해당 신청을 반려할 수 있다.","관세청장은 사전심사를 위하여 해당 물품에 대한 구성재료의 물리적ㆍ화학적 분석 이 필요한 경우에는 해당 심사를 신청한 자에게 수수료를 납부하게 할 수 있다.","관세청장은 사전심사 신청을 받은 경우 해당 물품에 적용될 품목분류를 심사하여 신청을 받은 날부터 7일 이내에 그 결과를 신청인에게 통지하여야 한다."],"answer":4},{"section":"무역규범","num":14,"stem":"14. 우리나라의 관세법령에서 규정하고 있는 외국물품과 내국물품에 관한 설명 중 올 바른 것은?","choices":["우리나라의 선박이 외국의 영해에서 포획한 수산물은 내국물품에 해당한다.","수출신고가 된 물품은 외국물품에 해당한다.","입항전수입신고가 수리된 물품은 내국물품에 해당한다.","외국으로부터 우리나라에 도착한 물품으로서 수입신고가 된 물품은 내국물품에 해 당한다."],"answer":3},{"section":"무역규범","num":15,"stem":"15. 관세법상 내국세 등의 부과ㆍ징수에 관한 설명으로 잘못된 것은?","choices":["수입물품에 대하여 세관장이 부과ㆍ징수하는 내국세 등(가산세 및 강제징수비 제외) 의 부과ㆍ징수ㆍ환급 등에 관하여 개별 내국세 규정과 관세법의 규정이 상충되는 경우에는 관세법의 규정을 우선하여 적용한다.","수입물품에 대하여 세관장이 부과ㆍ징수하는 내국세 등에 대한 담보제공 요구, 담 보금액 등에 관하여는 관세법 중 관세에 대한 담보 관련 규정을 적용한다.","수입물품에 대하여 세관장이 부과ㆍ징수하는 내국세 등의 체납이 발생하였을 때에 는 징수의 효율성 등을 고려하여 필요하다고 인정되는 경우에는 관할지 세무서장이 체납세액을 징수할 수 있다.","관세법에 따른 이의신청·심사청구·심판청구 또는 행정소송이 계류 중인 경우에는 체납된 내국세 등을 세무서장이 징수하게 할 수 없다."],"answer":1},{"section":"무역규범","num":16,"stem":"16. 관세법상 관세를 부과하는 기준인 과세요건에 대한 설명으로 올바른 것은?","choices":["관세의 4대 과세요건은 과세물건, 납세의무자, 과세표준, 과세환율이다.","관세는 수입신고(입항전수입신고 제외)를 하는 때의 물품의 성질과 그 수량에 따라 부과한다.","수입신고 전 즉시반출신고를 하고 반출한 물품은 수입신고 전 즉시반출신고를 한 때의 물품의 성질과 그 수량에 따라 관세를 부과한다.","관세의 과세표준은 수입물품의 가격이며, 수입물품의 가격을 표준으로 하여 세액을 결정하는 것을 종량세라고 한다."],"answer":3},{"section":"무역규범","num":17,"stem":"17. 우리나라의 관세법령에서 규정하고 있는 납세의무의 소멸 등에 관한 내용으로 잘 못된 것은?","choices":["관세를 납부하거나 관세부과가 취소된 때에는 관세를 납부해야 하는 의무가 소멸한 다.","5억원 이상의 관세(내국세 포함)에 대한 관세 징수권은 이를 행사할 수 있는 날부터 10년 동안 행사하지 아니하면 소멸시효가 완성된다.","관세징수권의 소멸시효는 관세의 분할납부기간 중에는 진행하지 않는다.","납세자의 관세 환급청구권에 대해서는 소멸시효가 규정되어 있지 않다."],"answer":4},{"section":"무역규범","num":18,"stem":"18. 관세법령에서 규정하고 있는 잠정가격신고 및 확정가격신고에 관한 설명으로 잘못 된 것은?","choices":["거래관행상 거래가 성립된 때부터 일정기간이 지난 후 가격이 정하여지는 것으로, 수입신고일 현재 그 가격이 정하여지지 아니한 모든 물품은 잠정가격신고를 할 수 있다.","잠정가격으로 가격신고를 한 자는 2년의 범위 안에서 구매자와 판매자 간의 거래계 약의 내용 등을 고려하여 세관장이 지정하는 기간 내에 확정된 가격을 신고하여야 한다.","세관장은 확정가격신고를 받은 경우 잠정가격을 기초로 신고납부한 세액과 확정된 가격에 따른 세액의 차액을 징수하거나 환급하여야 한다.","잠정가격을 기초로 신고납부한 세액과 확정가격에 의한 세액과의 차액을 환급하는 때에는 관세환급 가산금을 지급하지 않는다."],"answer":1},{"section":"무역규범","num":19,"stem":"19. 우리나라 관세법령상 구매자가 지급하였거나 지급하여야 할 금액에서 다음에 해당 하는 금액을 명백히 구분할 수 있을 때에는 그 금액을 뺀 금액이 실제 지급가격이 된다. 공제요소에 대한 설명으로 잘못된 것은?","choices":["연불조건(延拂條件)의 수입인 경우에는 해당 수입물품에 대한 연불이자","수입항에 도착하기 전 해당 수입 물품을 운송하는 데에 필요한 보험료","수입 후 해당 수입 물품의 정비, 유지에 필요한 비용","우리나라에서 해당 수입 물품에 부과된 관세"],"answer":2},{"section":"무역규범","num":20,"stem":"20. 다음 상황에서 납세의무자가 관세를 납부해야 하는 기한으로 올바른 것은? 납세의무자 A는 세관장으로부터 24년 12월 17일에 신고납부한 세액이 부족하므로 보정기간 내 보정 신청을 할 것을 25년 1월 10일자로 통지받았다. 이에 따라 납세 의무자 A는 25년 1월 15일에 부족한 세액에 대한 세액의 보정을 세관장에게 신청 하였다. 금 토 일 월 화 수 목 25-01-10 25-01-11 25-01-12 25-01-13 25-01-14 25-01-15 25-01-16","choices":["2025년 1월 16일","2025년 1월 15일","2025년 1월 13일","2025년 1월 14일"],"answer":1},{"section":"무역규범","num":21,"stem":"21. 우리나라의 관세법령에서 규정하고 있는 관세율의 종류에 대한 설명으로 잘못된 것은?","choices":["교역상대국이 우리나라의 수출물품 등에 대하여 관세 또는 무역에 관한 국제협정이 나 양자 간의 협정 등에 규정된 우리나라의 권익을 부인하거나 제한하는 경우 보복 관세를 부과할 수 있다.","상계관세의 부과대상과 관련하여 보조금 등이란 정부·공공기관 등의 재정지원 등 에 의한 혜택 중 특정성이 있는 것을 말한다.","긴급관세는 해당 국내산업의 보호 필요성, 국제통상관계, 긴급관세 부과에 따른 보 상 수준 및 국민경제 전반에 미치는 영향 등을 검토하여 부과 여부와 그 내용을 결 정한다.","산업구조의 변동 등으로 물품 간의 세율 불균형이 심하여 이를 시정할 필요가 있는 경우, 공중도덕 보호, 인간·동물·식물의 생명 및 건강 보호, 환경보전, 한정된 천 연자원 보존 및 국제평화와 안전보장 등을 위하여 필요한 경우에는 할당관세를 부 과할 수 있다."],"answer":4},{"section":"무역규범","num":22,"stem":"22. 다음 상황에서 납부해야 하는 관세로 올바른 것은? (단, 모든 가격은 객관적이고 수량화할 수 있는 자료에 근거하는 것으로 가정한다.) - 수입물품 가격 : 10,000,000원 - 수입물품 가격에 포함된 한국에 도착한 후 발생한 설치비용 : 1,000,000원 - 수입물품 가격에 포함된 연불이자 : 500,000원 - 수입물품 가격에 포함되지 않은 한국에 도착할 때까지 발생한 보험료 : 50,000원 - 기본관세율 : 10%","choices":["1,000,000원","905,000원","855,000원","850,000원"],"answer":3},{"section":"무역규범","num":23,"stem":"23. 다음의 물품을 수입할 때 적용할 수 있는 감면제도로 올바르게 짝지어진 것은? A. 수입 물품의 포장 용품으로 수입 후 1년 내에 다시 수출하는 물품 B. 정보처리기술을 응용한 공장 자동화 기계로 국내에서 제작하기 곤란한 물품 C. 수출 물품의 용기로서 다시 수입하는 물품","choices":["A : 재수입면세 B : 세율불균형물품의면세 C : 재수출면세","A : 재수출면세 B : 환경오염방지물품등에대한감면 C : 재수입면세","A : 재수출면세 B : 특정물품의면세 C : 재수입면세","A : 재수입면세 B : 학술연구용품의감면 C : 재수출면세"],"answer":2},{"section":"무역규범","num":24,"stem":"24. ( ) 안에 들어갈 용어로 올바르게 짝지어진 것은? - 보세구역은 지정보세구역·특허보세구역 및 ( A )으로 구분하고, - 지정보세구역은 지정장치장 및 ( B )으로 구분하며, - 특허보세구역은 보세창고 · ( C ) · 보세전시장 · 보세공장 및 보세판매장으로 구분된다.","choices":["A : 자유무역지역 B : 세관검사장 C : 보세건설장","A : 종합보세구역 B : 자율장치장 C : 보세반송장","A : 종합보세구역 B : 세관검사장 C : 보세건설장","A : 자유무역지역 B : 자율장치장 C : 보세반송장"],"answer":3},{"section":"무역규범","num":25,"stem":"25. 다음 기사와 같이 원산지 위반 사례가 급증하고 있다. 다음 중 대한민국을 원산지 로 볼 수 있는 것은? “중국산을 한국산으로…관세청, ‘라벨갈이’ 5년간 ‘1조원’ 적발” - 지난해 일명 ‘라벨갈이’로 원산지를 바꿔치기하는 등 원산지표시 위반으로 적발된 물 품이 5년 새 최대치를 기록했다. - 출처 : 세정일보(24.10.22)","choices":["중국산 자동차와 함께 수입된 여분의 타이어","일본 국적의 선박에 의해서 대한민국 영해에서 채집 또는 포획한 어획물","대한민국 보세구역에 장치 중인 물품 중에 보존을 위하여 필요한 작업을 한 물품","대한민국 공장에서 당해 물품의 생산과정에 사용된 물품의 품목분류 상 6단위 품목 번호와 다른 6단위 품목번호로 분류되는 물품으로 최종적으로 생산된 물품"],"answer":4},{"section":"무역규범","num":26,"stem":"26. 다음 설명하는 거래에서 해당 기업의 관세환급 방법에 대해 올바르게 짝지어진 것 은? A. ㈜알파는 베트남에서 수입한 물품을 추가 가공하지 않고 그대로 일본에 수출하고 있 다. B. 중소기업 ㈜베타는 국내에서 구매한 원재료를 이용하여 마스크팩을 만들어 중국으로 수출하고 있다. (직전 2년간 매년도 환급실적은 7억원) C. 대기업 ㈜감마는 중국산 원재료 및 국산 원재료로 TV모니터를 생산한 후 베트남에 수출하고 있다.","choices":["A : 위약환급 B : 개별환급 C : 간이정액환급","A : 위약환급 B : 간이정액환급 C : 개별환급","A : 원상태환급 B : 간이정액환급 C : 개별환급","A : 원상태환급 B : 개별환급 C : 간이정액환급"],"answer":3},{"section":"무역규범","num":27,"stem":"27. 다음 ( ) 안에 들어갈 숫자 및 용어로 올바르게 짝지어진 것은? 가. 관세 등을 환급받으려는 자는 물품이 수출 등에 제공된 날부터 ( A )년 이내에 관세청장이 지정한 세관에 환급신청을 해야 한다. 나. 세관장은 물품이 수출 등에 제공된 경우에는 수출신고를 수리한 날이 속하는 달의 ( B )부터 소급하여 ( C )년 이내에 수입된 해당 물품의 수출용 원재료에 대한 관세 등을 환급한다. 다. 환급신청일이 속하는 연도의 직전 2년간 매년도 환급실적(기초원재료납세증명서상 의 발급금액을 포함)이 ( D )억원 이하인 중소기업은 간이정액환급을 신청할 수 있다.","choices":["A : 5 B : 말일 C : 2 D : ８","A : 3 B : 말일 C : 1 D : ５","A : 5 B : 첫날 C : 2 D : ８","A : 3 B : 첫날 C : 1 D : ５"],"answer":1},{"section":"무역규범","num":28,"stem":"28. 자유무역협정(FTA) 관세법상 원산지증명서류에 관한 설명으로 잘못된 것은?","choices":["원산지포괄증명이란 장기간에 걸쳐 반복적으로 선적되거나 수입신고 되는 동종 동 질의 물품에 대하여 각 협정에서 정하는 기간 동안 최초의 원산지증명서를 반복하 여 사용하는 것을 말한다.","원산지증명서 발급을 신청하려는 자는 수출물품의 수출통관이 완료되기 전까지 원 산지증명서 발급신청서에 서류를 첨부하여 증명서 발급기관에 제출해야 한다.","수출물품의 생산에 사용되는 재료 또는 최종물품 생산자 등은 생산자 또는 수출자 의 요청이 있는 경우 원산지확인서를 생산자 또는 수출자에게 제공할 수 있다.","수입자·수출자 및 생산자는 협정 및 FTA 관세법에 따른 원산지의 확인, 협정관세 의 적용 등에 필요한 것으로서 원산지증빙서류 등을 5년의 범위에서 대통령령으로 정하는 기간(협정에서 정한 기간이 5년을 초과하는 경우에는 그 기간) 동안 보관하 여야 한다."],"answer":2},{"section":"무역규범","num":29,"stem":"29. 자유무역협정(FTA) 관세법상 원산지인증수출자에 관한 설명으로 잘못된 것은?","choices":["원산지인증수출자는 품목별 인증수출자와 업체별 인증수출자가 있으며, 해당 물품 에 대하여 자율적으로 원산지를 증명할 수 있으며, 원산지증명에 관해 간소한 절차 를 적용받을 수 있다.","품목별 원산지인증수출자로 인증받으려는 자는 원산지인증 신청 품목(HS 4단위 기 준)별 원산지소명서 등을 제출하여야 한다.","관세청장 또는 세관장은 원산지인증수출자가 원산지 증명능력 등 요건을 충족하지 못하게 된 경우에는 그 인증을 취소할 수 있다.","품목별 원산지인증수출자의 인증 유효기간은 인증을 받은 날부터 5년으로 한다."],"answer":2},{"section":"무역규범","num":30,"stem":"30. 관세환급특례법상 수출물품 생산에 투입되어 소요량을 객관적으로 계산할 수 있는 원재료 중 관세를 환급받을 수 없는 것은?","choices":["해당 수출물품의 포장용품","해당 수출물품 생산용 기계ㆍ기구 등의 작동 및 유지를 위한 물품 등 수출물품의 생산에 간접적으로 투입되어 소모되는 물품","해당 수출물품에 물리적으로 결합되는 물품","해당 수출물품에 화학적으로 결합되는 물품"],"answer":2},{"section":"무역결제","num":1,"stem":"1. ㈜KITA는 중국의 수출기업과 다음과 같은 대금결제 조건으로 가전제품의 수입 계약 을 체결하였다. 이 수입 계약과 관련된 설명으로 가장 잘못된 것은? Payment Terms : by T/T in advance.","choices":["㈜KITA는 신용장방식에 비해 상업위험이 높은 대금결제 조건을 선택했다.","㈜KITA는 신용장방식에 비해 은행수수료를 절감할 수 있는 대금결제 조건을 선택 했다.","㈜KITA는 중국 수출기업의 선적서류를 은행을 통해 송부받는 것이 원칙이다.","이 수입계약의 결제방식은 일반적으로 판매자 우위 시장(seller’s market)에서 발생 한다."],"answer":3},{"section":"무역결제","num":2,"stem":"2. O/A 결제방식에 대한 설명으로 올바른 것을 모두 고른 것은? A. 다른 조건이 동일하다면, 수입자는 CWO방식 보다는 O/A방식을 선호한다. B. 국내 수출자는 O/A Nego를 통해 수출대금을 조기에 현금화할 수 있다. C. O/A 결제방식은 수출자가 상업위험을 부담하게 된다. D. 수입자가 물품을 인수하는 시점에 수출자의 채권이 발생한다.","choices":["A, B","B, C","C, D","A, B, C, D"],"answer":1},{"section":"무역결제","num":3,"stem":"3. 우리나라 은행의 거래 관행을 고려할 때 가장 합리적으로 배열된 O/A 거래 절차는? A. 수출자와 수입자가 결제조건으로 O/A 결제가 포함된 매매계약을 체결한다. B. 수출자가 수입자에게 선적서류를 송부하고, 거래은행에 선적 사실을 통지한다. C. 수출자가 거래은행과 수출채권 양수도 계약을 체결한다. D. 물품을 선적하고, 수입자에게 선적 사실을 통보하여 채권을 발생시킨다. E. 수입자 거래은행이 수출자 거래은행에 송금한다.","choices":["A → D → C → B → E","D → E → A → B → C","C → A → D → B → E","D → A → C → E → B"],"answer":3},{"section":"무역결제","num":4,"stem":"4. 추심결제방식에 대한 설명 중에서 가장 합당한 것은?","choices":["추심지시서에 D/P인지 D/A인지 명시가 없는 경우 은행은 D/A로 간주한다.","D/P방식에서 수입자는 물품이 아닌 서류와 교환해서 대금을 결제해야 하는 위험이 있다. 수입자는 추심의뢰서에 선적전 검사증명서(Pre-shipment Inspection Certificate)를 요구함으로써 그 위험을 어느 정도는 줄일 수 있다.","D/A 방식에서 환어음에 대해 인수(acceptance)하는 주체는 수입자의 거래은행이다.","추심거래에서 추심의뢰은행은 대금지급을 확약한다."],"answer":2},{"section":"무역결제","num":5,"stem":"5. 추심결제방식에 대한 설명으로 잘못된 것은?","choices":["추심에 관한 통일규칙에서 규정하는 상업서류(commercial documents)는 환어음과 송장, 운송서류가 포함된다.","D/P거래에서 환어음의 발행인(drawer)은 수출자가 된다.","추심의뢰인으로부터 추심의 취급을 의뢰받은 은행을 추심의뢰은행(collecting bank) 이라고 한다.","화환추심의 경우 분할지급은 추심지시서에 특별히 수권된 경우에만 인정된다."],"answer":1},{"section":"무역결제","num":6,"stem":"6. D/P 또는 D/A거래에 사용되는 추심의뢰서의 기재사항에 대한 설명으로 잘못된 것 은?","choices":["Tenor는 환어음의 만기를 말하는 것으로, D/P는 at sight, D/A는 at 60 days after sight 등으로 표기된다.","Proceeds to be remitted to you는 추심서류의 처리 방법을 말하는 것으로, 전신으 로 보낼지 우편으로 보낼지를 표기한다.","Case of needs는 환어음에 대한 지급이 거절된 경우, 추심은행이 접촉해야 하는 예 비지급인의 명칭과 주소를 기재한다.","Protest는 거절증서를 말하는 것으로, 추심의뢰인이 거절증서의 작성을 원하는지 여 부를 표기한다."],"answer":2},{"section":"무역결제","num":7,"stem":"7. 지급수단으로서의 어음에 대한 설명으로 올바르지 못한 것은?","choices":["어음에는 환어음과 약속어음이 있으며, 수표와 함께 현금을 대신하는 지급수단이다.","약속어음에서 발행인(drawer)은 채무자로서 지급인(drawee)이 되고, 상대방이 수취 인(payee)이다.","환어음에서 지급인(drawee)은 채무자로서 제3자인 수입자 또는 은행이며, 수취인 (payee)은 채권자로서 발행인(drawer)만 될 수 있다.","어음의 인수(acceptance)제도는 약속어음에는 없고, 환어음에는 있다."],"answer":3},{"section":"무역결제","num":8,"stem":"8. 화환신용장의 특성과 효용에 관한 설명으로 잘못된 것은?","choices":["신용장거래에서 관계 당사자들은 서류로 거래하는 것이며 물품, 용역, 기타 의무이 행으로 거래하는 것이 아니라는 추상성의 원칙이 있다.","신용장은 그 본질상 근거가 될 수 있는 매매계약 또는 기타 계약과는 별개라는 독 립성의 원칙이 있다.","신용장을 이용하면 수입자는 수출자에 대한 신용위험을 해소할 수 있으며, 무역조 건 협상에서 유리한 입장에 서게 된다.","은행은 다른 결제방식에 비해서 수수료 및 이자 등의 수익을 기대할 수 있기 때문 에 신용장거래를 선호한다."],"answer":3},{"section":"무역결제","num":9,"stem":"9. 다음 중 신용장거래의 기본원칙과 관련한 설명으로 적절한 것은?","choices":["개설은행이 파산한 수입자로부터 자금을 보상받지 못하면 매입은행에 지급한 매입 대금의 반환을 요청할 수 있다.","개설은행이 매입대금을 상환했더라도 수입자가 법원으로부터 Injunction을 발급받았 다면 수입자는 개설은행에 대한 보상을 거절할 수 있다.","원산지증명서를 요구서류로 추가하는 조건변경서를 받은 수익자가 거절의 통지를 하지 않았더라도 원산지증명서를 포함하여 제시할 의무는 없다.","선급금환수용 보증신용장(AP standby L/C)은 개설의뢰인에게 선급금의 반환을 요구 한 후에 보증신용장 대금을 청구하므로 보증(bond)과 동일하게 2차 채무에 속한다."],"answer":3},{"section":"무역결제","num":10,"stem":"10. 신용장통일규칙에 따라서 신용장에는 반드시 이용가능성을 명시해야 한다. 다음 중 신용장을 사용방법(available with… by…)에 따라서 분류한 것은 어느 것인가?","choices":["At sight L/C, Usance L/C, Installment L/C","Straight L/C, Freely L/C, Restricted L/C","Transferable L/C, Confirmed L/C, Revocable L/C","Payment L/C, Deferred Payment L/C, Acceptance L/C, Negotiation L/C"],"answer":4},{"section":"무역결제","num":11,"stem":"11. 다음 중 화환신용장에 관한 설명으로 가장 옳은 것은?","choices":["연지급신용장(DEF payment)의 수익자는 신용장이 환어음을 요구하지 않더라도 일 람후정기출급 환어음(usance draft)을 포함하여 제시해야 한다.","중계무역을 하는 국내 수출자는 최종 수입국에서 개설되는 신용장에 ‘stale documents acceptable’의 문구를 포함할 것을 요청해야 한다.","Commercial invoice countersigned by applicant 같은 독소조항은 본질적으로 무효이 므로 수익자는 신용장에 포함된 해당 조건의 삭제를 요청할 필요가 없다.","수입화물 선취 보상장(Letter of Guarantee)을 발급받아 화물을 수령한 수입자는 이 후 개설은행이 하자 서류를 제시하며 자금 보상을 요구하더라도 거절할 수 없다."],"answer":4},{"section":"무역결제","num":12,"stem":"12. 다음 중 신용장 관련 수수료의 내용과 청구인 및 일반적인 수수료 부담자의 연결 로 잘못된 것은? 수수료 내용 청구인 부담자 은행이 수출환어음 매입 후 현금화할 때","choices":["환가료 매입은행 수출자 까지 이자 보전 명목의 기간 수수료 외국환거래에서 원화의 매매가 수반되지","대체료 외국환은행 은행 고객 않고, 동종의 외국환으로 거래 시 수수료","L/G보증료 기한부 L/C의 환어음 인수할 때 수수료 매입은행 수출자","통지수수료 신용장을 수익자에게 통지할 때 수수료 통지은행 수출자"],"answer":3},{"section":"무역결제","num":13,"stem":"13. 다음 중 신용장 요구서류의 수리 요건에 관한 설명으로 가장 적절한 것은?","choices":["신용장 물품명세란(45A description of goods)에 인코텀즈 버전이 기재되지 않았더라 도 상업송장에 최신의 버전(Incoterms 2020)을 반드시 기재해야 한다.","살물(bulk cargo)의 수출입대금 결제를 위해 개설되는 신용장에 용선운송 가능성을 고려하여 charterparty B/L acceptable 문구를 포함시키는 것이 적절하다.","신용장이 선적전 검사증명서(preshipment inspection certificate)를 요구하는 경우, 선적전 검사증명서의 발행일이 선적일보다 늦으면 수리 거절된다.","신용장이 원본 선화증권 중 일부만 제시하도록 요구하는 경우에 모두 원본으로 제 시하면 수리 거절된다."],"answer":2},{"section":"무역결제","num":14,"stem":"14. SWIFT 신용장의 조항별 해석에 대한 설명으로 잘못된 것은?","choices":["39B maximum credit amount： Up to, maximum, not exceeding 등을 사용하여 신용 장 최대 금액을 표시한다.","44B for transportation to：최종 목적지를 표시한다.","48 period for presentation：선적서류가 지정된 은행에 제시되어야 하는 기한을 표 시한다.","71B charges：수수료가 개설의뢰인의 부담인 경우를 표시한다. 명시가 없는 경우에 개설수수료와 확인수수료를 제외한 모든 수수료는 수익자의 부담으로 간주한다."],"answer":4},{"section":"무역결제","num":15,"stem":"15. 다음 중 SWIFT 신용장의 각 항목(field)에 대한 해설로 가장 옳은 것은?","choices":["[59 Beneficiary： 한밭상사, 대전, KOREA]로 기재된 경우, 상업송장의 수익자 주소 가 창원이라면 수리가 거절된다.","[47 Additional Conditions： Stale B/L acceptable]로 기재된 경우, 신용장에 기재된 서류 제시기간과 유효기간을 모두 충족시켜야 한다.","[46 Docs Required： Signed Commercial Invoice in 4 copies]로 기재된 경우, 반드시 수기로 서명된 원본 송장 4장을 제시해야 한다.","[46 Docs Required： AWB consigned to the order of 개설은행]으로 기재된 경우, 개설은행 기명식 AWB를 제시할 수 있다."],"answer":4},{"section":"무역결제","num":16,"stem":"16. 무역결제 관련 국제규칙에 대한 설명으로 잘못된 것은?","choices":["UCP 600은 화환신용장의 관습 및 서류에 관한 통일규칙으로 보증신용장에는 적용 되지 않는다. 마지막 개정은 2007년이다.","URC 522는 환어음 등의 추심에 관한 내용의 Collection 거래에 적용되는 규칙이다. 마지막 개정은 1995년이다.","ISBP 821은 신용장 서류심사에 관한 국제표준은행관습으로 종전 ISBP 745에서 일부 조항이 추가된 2023년 개정판이다.","URBPO 750은 신용장 또는 O/A가 아닌 새로운 국제무역 결제 시스템에 관한 국제 규칙으로 2013년부터 사용되고 있다."],"answer":1},{"section":"무역결제","num":17,"stem":"17. UCP 600과 ISBP 745에서 규정한 날짜에 관한 내용으로 잘못된 것은?","choices":["은행은 유효기간 이내라 하더라도 영업시간 외에 제시된 서류를 수리할 의무는 없 다.","본선 선적일이 다른 두 개의 선하증권이 제시되었다면, 만기 산정을 위한 선적일자 는 가장 늦은 선적일자가 된다.","대금 지급을 위한 만기일이 은행 국가(대한민국)의 대체 공휴일이라면 대금은 그 다 음 첫 은행 영업일에 지급될 수 있다.","분할선적이 허용되는 화환신용장에서 선적일자가 다른 운송서류가 한 번에 제시되 었다면 가장 늦은 선적일자를 사용하여 제시기간을 심사한다."],"answer":4},{"section":"무역결제","num":18,"stem":"18. 지급조건이 “at 90 days sight”로 발행된 환어음이 적격한 서류와 함께 제시되었을 경우, 만기일에 대한 설명으로 올바른 것은?","choices":["매입은행이 지정은행으로 서류를 발송한 날로부터 90일이 되는 일자","지급인인 은행이 환어음을 제시받은 다음 날로부터 90일이 되는 일자","확인은행이 개설은행으로 환어음과 서류를 발송한 날로부터 90일이 되는 일자","개설은행에 서류가 제시된 날로부터 90일이 되는 일자"],"answer":2},{"section":"무역결제","num":19,"stem":"19. ISBP 745가 적용되는 화환신용장에 대한 설명으로 올바른 것을 모두 고른 것은? A. 원산지증명서는 제조자 국가가 아닌 판매자 국가의 상공회의소에서 발행하여도 된다. B. 상업송장의 하인은 선하증권의 하인에 추가적인 내용이 함께 표기되어도 된다. C. 동일 선적에 대해 두 개의 보험서류가 제시되었다면, 둘 중 어느 서류의 보험금이 먼 저 지급되어야 하는지 각각에 표시되어야 한다. D. 중량명세서상의 수량이 상업송장과 운송서류에 나타난 수량을 초과한다면 서로 상이 하여도 허용된다.","choices":["A, B, C","B, C, D","A, B","모두"],"answer":3},{"section":"무역결제","num":20,"stem":"20. 화환신용장과 보증신용장을 비교한 것으로 올바르지 못한 것은?","choices":["지급구조에서 보증신용장은 개설의뢰인이 수익자에 대한 의무를 이행하면 약정된 금액이 지급되는 구조이다.","채무의 발생시점에서 화환신용장은 수익자가 정당한 서류를 제시하고 지급을 요청 함으로써 은행의 채무가 발생한다.","제출서류에서 보증신용장은 기본적으로 수익자의 진술서만 있으면 되기 때문에 부 당청구(unfair calling)의 위험성이 있다.","거래형태에서 화환신용장은 같은 거래가 같은 서류에 의해서 몇 회라도 반복하여 행해질 수도 있다."],"answer":1},{"section":"무역결제","num":21,"stem":"21. 국제거래에서 전통적인 결제방식이 아닌 국제금융방식을 이용할 수도 있다. 다음이 설명하고 있는 국제금융방식은 무엇인가? A. 2개국 이상의 국가 간 이루어지는 국제거래이다. B. 물품을 소유하지 않고도 이용할 수 있으며, 절세가 가능하고, 국제금융을 이용할 수 있다. C. 이용 목적에 따라서 금융( )와 운용( )으로 구분된다. D. 특정거래형태로서 임대차방식의 수출입거래에 해당한다.","choices":["International Leasing","International Forfaiting","International Factoring","International Demand Guarantee"],"answer":1},{"section":"무역결제","num":22,"stem":"22. 수출보험과 수출보증에 대한 설명으로 잘못된 것은?","choices":["수출보험은 채권자(수출자)가 자신의 채권에 대한 손실을 방지하기 위해 자기 자신 을 위해 보험에 가입하는 것이다.","수출보증은 채무자가 채권자에게 자신의 신용을 보강하기 위해서 보증인(예를 들어 은행)에게 보증을 요청하는 타인을 위한 계약이다.","수출보험과 수출보증에서 지급 사유가 발생하는 것은 채무자의 채무불이행이라는 점에서 동일하다.","한국무역보험공사는 정책금융기관으로서 수출보험 상품은 제공하지만, 수출보증 상 품은 제공하지 않는다."],"answer":4},{"section":"무역결제","num":23,"stem":"23. 한국무역통계를 기준으로 최근에 우리나라 기업이 가장 많이 사용하는 결제방식은 무엇인가?","choices":["일람출급 및 기한부 신용장방식(At sight L/C \u0026 Usance L/C)","단순 송금방식(T/T, M/T)","추심방식(D/P, D/A)","임가공료 지급방식의 위탁 또는 수탁 가공무역방식"],"answer":2},{"section":"무역결제","num":24,"stem":"24. 다음 중 환율의 중요성에 대한 설명으로 올바르지 못한 것은?","choices":["환율이 상승하면 수출물품의 가격이 상승하고, 수입물품의 가격은 하락하므로 수출 은 감소하고 수입은 증가하여 경상수지가 악화된다.","환율이 상승하면 외국에서 한국산 물품의 구매비용은 줄어들고, 한국에서 외국 물 품을 구매하는 가격은 오르기 때문에 한국의 물가가 상승한다.","환율이 상승하면 외화에 대비한 원화의 가치가 하락하여 기업의 외화부채 상환 부 담이 증가한다.","환율이 상승하면 외국인 관광객은 유리하지만, 내국인의 해외여행 부담은 증가한다."],"answer":1},{"section":"무역결제","num":25,"stem":"25. ㈜한국무역은 영국에서 수입한 원재료를 가공하여 미국에 완제품을 수출한다. 수입 대금은 영국 파운드로 지급하고, 수출대금은 미 달러로 수령한다. 이 회사의 담당자 는 수입대금을 송금하기 위해 달러를 파운드로 환전하려고 은행에 문의했다. 아래와 같이 GBP/USD 환율을 각각 제시받았다면 이 회사는 어느 은행에서 어떤 환율로 환 전하는 것이 가장 유리한가? (환율표시에서 앞의 통화가 기준통화. 은행의 수수료는 없다.) GBP/USD 은행명 매입률(Bid) 매도율(Offer) A은행 1.2210 1.2230 B은행 1.2220 1.2240","choices":["A은행과 1.2210으로 거래","B은행과 1.2220으로 거래","A은행과 1.2230으로 거래","B은행과 1.2240으로 거래"],"answer":3},{"section":"무역결제","num":26,"stem":"26. 다음 중 우리나라의 환율제도에 대한 설명으로 가장 올바르지 못한 것은?","choices":["우리나라에서 환율은 외환의 수요와 공급에 따라 자율적으로 결정되고, 은행이 환 율을 자율적으로 고시하는 자유변동환율제도를 택하고 있다.","매입률(bid rate)과 매도율(offer rate)은 고객입장에서 기준통화를 매매하는 환율을 말하므로 매도율은 고객이 은행에 기준통화를 매도하는 환율이다.","외국환은행이 매일 첫 번째로 고시하는 환율은 전일 은행 간 외환시장의 환율을 거 래량 가중 평균한 시장평균환율이다.","우리나라의 외환시장은 대고객시장과 은행간시장으로 구분된다. 은행 간 외환시장 에서 거래되는 통화는 달러/원(USD/KRW)과 위안/원(CNH/KRW) 두 시장만 있다."],"answer":2},{"section":"무역결제","num":27,"stem":"27. 역외 선물환(NDF) 거래에 대한 설명으로 잘못된 것은?","choices":["환위험 헤지 목적의 거래보다는 환차익을 노리는 투기 목적의 거래가 훨씬 많다.","결제일에는 원금을 인도하지 않고, 계약한 선물환율과 정산환율 사이의 차액을 달 러로 정산한다.","외국환거래법의 규정에 따르면 역외선물환을 거래하려는 국내․외 금융기관 등은 사 전에 반드시 한국은행의 허가를 받아야 한다.","뉴욕 역외선물환시장의 USD/KRW 마감가는 다음 날 아침 우리나라 외환시장 개장 가에 영향을 미친다."],"answer":3},{"section":"무역결제","num":28,"stem":"28. 현재 외환시장의 상황은 다음과 같다. 이럴 때 다음과 같은 유럽식 통화옵션 중에 서 프리미엄이 가장 적은 것은? (환율표시에서 앞의 통화가 기준통화) EUR/USD 현물환율 1.0820 만기 3개월 선물환율 1.0810 만기 6개월 선물환율 1.0800","choices":["만기 3개월 유로콜/달러풋 옵션, 행사가 1.0900","만기 3개월 유로풋/달러콜 옵션, 행사가 1.0900","만기 6개월 유로콜/달러풋 옵션, 행사가 1.0800","만기 6개월 유로풋/달러콜 옵션, 행사가 1.0800"],"answer":1},{"section":"무역결제","num":29,"stem":"29. 다음 사례에서 사용하는 내부적 환리 스크 관리기법은 무엇인가? ㈜선진무역 대표는 USD/KRW 환율이 향후 지속적으로 상승할 것으로 예측하고, 미국 에서 수입한 물품에 적용했던 Usance 60 days 신용장방식을 at sight 방식으로 전환하 였다. (환율표시에서 앞의 통화가 기준통화)","choices":["매칭(matching)","네팅(netting)","리딩(leading)","래깅(lagging)"],"answer":3},{"section":"무역결제","num":30,"stem":"30. 다음의언론기사 제목 중에서, 그 뉴스가 외환시장에 알려질 경우 USD/KRW 환율 의 상승요인으로 작용하지 않는 것은? (환율표시에서 앞의 통화가 기준통화)","choices":["“한국 경상수지, 반도체 수출부진으로 예상외의 큰 폭 적자 기록”","“미국 중앙은행, 시장기대보다 더 큰 폭으로 달러 기준금리 인상 단행”","“일본 중앙은행, 엔화 기준금리 기습인상으로 엔화 급격한 평가절상”","“한국은행, 시장의 금리인상 기대와 정반대로 원화 기준금리 대폭 인하”"],"answer":3},{"section":"무역계약","num":1,"stem":"1. 무역계약의 기본원칙인 계약자유의 원칙에 관한 설명으로 잘못된 것은?","choices":["무역계약의 당사자는 자유로이 계약을 체결하고 그 내용을 정할 수 있다.","당사자자치는 국가적 또는 국제적 기원의 강행규정에 상관없이 적용되는 원칙이다.","무역계약의 체결은 방식(form)에 관하여 아무런 제한이 없는 것이 원칙이다.","유효하게 체결된 계약은 양 당사자를 구속한다."],"answer":2},{"section":"무역계약","num":2,"stem":"2. 계약자유의 원칙을 근 간으로 하는 무역계약의 법률적 특성 중 옳지 않은 것은?","choices":["불요식 계약성(informal contract): 무역계약은 특별한 형식 없이 구두나 행위 또는 서명에 의하여도 성립될 수 있다.","낙성 계약성(consensual contract): 무역계약이 성립될 시점에 거래 대상 물품이 존 재하여야 한다.","유상 계약성(compensatory contract): 매도인의 물품 인도에 대해 상대방인 매수인은 그 반대급부로서 경제적 대가의 지급을 수반한다.","유인 계약성(causal contract): 채권계약의 기초가 되는 법률행위가 효력을 상실하면 무역계약도 효력이 상실된다."],"answer":2},{"section":"무역계약","num":3,"stem":"3. 무역계약 관련 법원(s ource of law)의 「명칭－내용－제정기관」이 잘못된 것은? 명칭(약칭) 내용 제정기관","choices":["CISG 국제물품매매계약에 적용되는 통일법 UNCITRAL","Incoterms 정형거래조건에 관한 국제 해석규칙 ICC","New York Convention 국제물품 및 서비스거래에 관한 통일법 UNCITRAL","PICC 국제상사계약을 위한 일반원칙 UNIDROIT"],"answer":3},{"section":"무역계약","num":4,"stem":"4. 다음 Incoterms 2020에 대한 설명으로 올바른 것을 모두 고른 것은? A. EXW는 매도인의 최소 의무 조건으로 국내 공장도가격과 가장 유사하다. B. FCA에서 지정 장소가 매도인 영업 구내인 경우는 물품이 매수인이 제공한 운송 수 단에 적재되는 때에 인도된다. C. CFR, CIF, CPT, CIP는 위험분기점과 비용분기점이 다른 규칙이다. D. FOB, CFR, CIF의 위험분기점은 모두 선적항에서 본선에 적재하거나, 그렇게 인도된 물품을 조달할 때이다. E. DDP에서 매도인은 매수인에게 보험계약 체결 의무를 부담한다. F. DAP는 지정 목적지에서 도착 운송수단에서 양하한 상태로 매수인의 처분하에 두거 나, 그렇게 인도된 물품을 조달함으로써 인도된다.","choices":["A, B, C, D","A, B, D, E","A, C, E, F","B, C, E, F"],"answer":1},{"section":"무역계약","num":5,"stem":"5. I ncoterms 2020의 무역조건을 기준에 따라 구분한 것으로 잘못된 것은? (해당 무역조건은 전체 또는 일부임) 구분기준 해당 무역조건","choices":["위험이 본선 적재 시 이전되는 해상운송 전용 조건 FOB, FAS, CFR, CIF","물품이 지정 목적지에서 도착 운송수단에 실린 채 인도되는 조건 DAP, DDP","수출통관 의무를 매도인이 부담하는 조건 DAP, DDP","해상보험을 매도인이 가입해야 하는 조건 CIF, CIP"],"answer":1},{"section":"무역계약","num":6,"stem":"6. Vienna Convention(1980)에서 규정하고 있는 매도인의 의무에 관한 설명으로 잘못된 것은?","choices":["매수인의 물품 검사는 계약에 물품의 운송이 포함되는 경우라면 물품이 목적지에 도착한 후까지 연기될 수 있다.","매도인은 위험이 매수인에게 이전하는 때 있었던 물품의 부적합에 대하여, 그 부적 합이 위험 이전 후에 판명된 경우라면 책임을 지지 않는다.","매수인이 물품의 부적합을 발견한 때부터 합리적인 기간 내에 매도인에게 통지하지 않은 경우에는 매수인은 물품의 부적합을 주장할 권리를 상실한다.","매도인은 공업소유권 등을 제외하고 매수인이 제3자의 권리 대상이 된 물품의 수령 에 동의한 경우에는 해당 물품을 인도할 수 있다."],"answer":2},{"section":"무역계약","num":7,"stem":"7. Vienna Convention(1980) 규정에서 매수인의 권리구제에 관한 설명으로 올바른 것은?","choices":["매수인이 계약위반에 대한 구제를 구하는 경우 법원 또는 중재판정부는 매도인에게 유예기간을 부여한다.","대체품의 인도청구는 본질적인 위반이 아닌 경우에도 청구할 수 있다.","매수인이 추가기간을 지정한 경우에 매도인으로부터 지정된 추가기간 내에 이행할 의사가 없다는 통지를 받는 경우를 제외하고, 매수인은 그 기간 중 계약위반에 대 한 구제를 구할 수 없다.","매도인이 계약에서 정한 것보다 초과해서 물품을 인도한 경우에 매수인은 이를 거 절해야 한다."],"answer":3},{"section":"무역계약","num":8,"stem":"8. Vienna Convention(UN협약)의 적용 가능성에 관한 기본원칙으로 옳은 것은?","choices":["국적이 서로 다른 국가에 소재하는 체약국 사이의 물품 및 서비스의 매매계약","주소가 서로 다른 국가에 소재하는 당사자 사이의 물품 및 서비스의 매매계약","물품이 서로 다른 국가에 소재하는 당사자 사이의 물품매매계약","영업소가 서로 다른 국가에 소재하는 당사자 사이의 물품매매계약"],"answer":4},{"section":"무역계약","num":9,"stem":"9. 무역계약의 일반적 특성에 관한 설명으로 잘못된 것은?","choices":["거래 당사자 사이의 상이한 언어, 법률, 정형화된 상관습이 존재한다.","주계약은 운송계약, 보험계약 등 다수의 종속계약을 수반한다.","서류에 의한 상징적 인도로 이루어지는 경우가 많으므로 서류가 중요하다.","무역계약에서 특정물 거래와 현물거래가 큰 비중을 차지한다."],"answer":4},{"section":"무역계약","num":10,"stem":"10. Vienna Convention에 따를 때 청약이 충분하게 확정적이기 위해서 반드시 지정되어 야 하는 조건은?","choices":["수량의 지정, 가격의 지정, 인도기일의 지정","수량의 지정, 인도기일의 지정, 결제기일의 지정","물품의 지정, 수량의 지정, 가격의 지정","물품의 지정, 수량의 지정, 인도장소의 지정, 결제방식의 지정"],"answer":3},{"section":"무역계약","num":11,"stem":"11. 무역계약에서 당사자의 진 술 또는 기타행위에 대한 해석순서로서 옳은 것은?","choices":["주관적 의도 → 객관적 의도 → 모든 관련 상황","주관적 의도 → 모든 관련 상황 → 객관적 의도","객관적 의도 → 주관적 의도 → 모든 관련 상황","객관적 의도 → 모든 관련 상황 → 주관적 의도"],"answer":1},{"section":"무역계약","num":12,"stem":"12. 선적지연(Delayed Shipment)에 대한 설명으로 잘못된 것은?","choices":["약정한 물품을 선적 기간 내에 선적하지 못하는 경우 선적지연이 발생한다.","수출업자의 고의, 과실, 태만으로 인한 선적지연은 수출업자가 책임을 져야 한다.","전쟁과 같은 불가항력(Force Majeure)으로 인한 선적지연의 경우 매매계약서에 불 가항력 조항과 선적지연 조항을 설정하면 책임을 면할 수 있다.","불가항력에 대한 입증책임은 수출자에게 있으며 공식적인 회사의 공문을 발행하여 수입자에게 발송함으로써 불가항력 존재 사실을 입증하고 면책한다."],"answer":4},{"section":"무역계약","num":13,"stem":"13. 국제상사계약원칙상 계약의 성 립에 관한 설명 중에서 가장 잘못된 것은?","choices":["계약은 승낙에 의하거나, 합의를 보여주기에 충분한 당사자의 행위에 의하여 체결 될 수 있다.","계약체결의 제안은 충분히 확정적이고 승낙 시 그에 구속된다는 청약자의 의사가 표시가 있는 경우에 청약이 된다.","신속한 계약의 성립을 위하여 청약은 피청약자에게 발신된 때에 효력이 발생한다.","침묵 또는 부작위는 그 자체만으로 승낙이 되지 아니한다."],"answer":3},{"section":"무역계약","num":14,"stem":"14. 다음이 설명하는 특정거래 형태의 수출입을 무엇이라 하는가? A. 수수료 지급을 조건으로 외국에서 제조(조립, 재생, 개조를 포함)할 원료 전부(일부) 를 국내에서 보내거나, 외국에서 조달하여 제조 등을 수행한 물품을 국내로 들여오 거나 외국으로 판매하는 계약이다. B. 수수료를 통상 CMT charge라 하며, CMT는 Cutting, Making, Trimming을 말한다. C. 기본계약에서 원자재 및 물품의 수량, 인도방법, 수수료 지급방법, 계약기간 등을 명시한 Consignment Processing Contract를 약정한다.","choices":["외국인도수출","수탁가공무역","위탁가공무역","임대차수출입"],"answer":3},{"section":"무역계약","num":15,"stem":"15. 무역계약의 선적조건 중 환적(transshipment)에 대한 설명으로 올바른 것을 모두 고 른 것은? A. 환적은 운송 중 다른 선박 또는 다른 운송수단에 적재하는 것을 의미한다. B. 환적은 해상운송과 내수로운송에만 적용될 수 있다. C. 환적 중 파손에 취약한 물품(도자기, 유리제품 등)은 환적을 금지한다. D. 환적 허용 여부에 대한 약정이 없다면 컨테이너운송의 경우에는 허용된다.","choices":["A, B","B, C","C, D","A, D"],"answer":4},{"section":"무역계약","num":16,"stem":"16. 살물(bulk cargo)에 대한 설명으로 잘못된 것은?","choices":["살물은 곡물, 광물, 모래, 자갈 등과 같이 비포장상태로 거래되는 불가산물품 (uncountable goods)을 의미한다.","살물은 화물의 특성상 인도 과정에 감량이 필연적이므로 정확한 수량을 인도하는 것은 불가능하다.","과부족용인조항은 기재된 범위 내에서 과부족에 대한 클레임을 제기할 수 없으므로 클레임 예방 효과가 있다.","신용장이 아닌 다른 결제방식을 사용하는 경우 10%의 과부족이 관행적으로 허용된 다."],"answer":4},{"section":"무역계약","num":17,"stem":"17. 개별무역계약서 이면사항에 포함되는 일반조항(general terms \u0026 conditions)에 대한 설명 중 잘못된 것은?","choices":["Severability Clause는 계약서 내용 중 일부가 법원의 판정 등으로 무효가 되더라도 해당 조항만이 무효로 될 뿐 나머지 조항의 효력 또는 계약 자체는 문제없도록 약 정하는 조항이다.","Claims Clause는 클레임이 발생할 경우 클레임의 통지 방법, 제기 기한, 증빙자료 등을 규정하는 조항이다.","Arbitration Clause는 기본계약서에서 분쟁의 해결을 중재로 할 것을 합의하는 조항 이다. 중재조항이 유효하기 위해서는 중재지, 중재기관, 중재비용 3가지를 반드시 합의해야 한다.","계약체결의 당사자 자격을 분명히 하기 위해서 Privity Clause 또는 Principal to Principal 등을 규정한다."],"answer":3},{"section":"무역계약","num":18,"stem":"18. 다음 중 CIS G 1980의 계약해제의 효력에 대한 설명으로 잘못된 것은?","choices":["무역계약을 해제하면 양 당사자들은 물품인도의무, 대금지급의무 등 이행하지 않은 의무에 대해서는 해방되지만, 손해배상의무, 계약해제 후의 권리․의무에 관한 합의 조항, 중재조항 등은 여전히 남는다.","계약해제 시 매수인은 물품을 수령한 상태와 실질적으로 동일한 상태로 매도인에게 그 물품을 반환하지 못하면 계약해제권을 상실하게 된다.","매수인이 물품을 수령한 상태와 실질적으로 동일한 상태로 반환을 할 수 없음에도 계약을 해제하고자 하는 경우에 매수인은 지출 비용, 발생 이익, 발생될 수 있는 모 든 이익을 반환하여야 한다.","계약해제 시 매도인은 이미 영수한 물품 대금에 이자를 포함하여 매수인에게 반환 하여야 한다. 이때 이자는 대금이 지급된 날로부터 완전히 반환되는 날까지 발생하 는 이자이다."],"answer":3},{"section":"무역계약","num":19,"stem":"19. 다음 중 중재에 대한 설명으로 올바른 것은?","choices":["중재합의는 사전 합의보다는 주로 분쟁이 발생한 후에 당사자들이 중재합의를 하는 방식으로 이루어지며, 합의가 이루어지면 당사자의 재판청구권은 제한된다.","중재합의는 서면주의를 원칙으로 하므로 중재신청 시 중재합의문 원본을 중재기관 에 제시하도록 규정되어 있다. 이메일, 모사전송과 같은 통신수단에 의해 교환된 중 재합의문은 서면 중재합의문으로 인정받지 못한다.","중재판정에 의해 확정된 손해배상금액은 법원의 집행판결 절차에서 다시 다툴 수 없고 중재판정의 패소자는 그에 관해 항변할 수 없다. 중재판정은 중재판정 취소의 사유가 없는 한 중재판정에 대한 집행판결은 법원에서 그대로 인용된다.","외국 중재판정의 승인 및 집행에 관한 유엔협약에서는 중재판정의 원활한 국제집행 을 보장하기 위해서 동 협약의 체약국 여부를 불문하고 유엔 회원국에는 모두 적용 될 수 있도록 규정하고 있다."],"answer":3},{"section":"무역계약","num":20,"stem":"20. Vienna Convention 1980이 적용되는 청약과 승낙에 대한 설명으로 잘못된 것은?","choices":["청약이 취소 불능이라도 청약의 의사표시가 도달하기 전 또는 그와 동시에 철회 (withdrawal)의 의사가 상대방에게 도달하면 철회가 가능하다.","청약자가 USD10,000로 시장가격 연동조건(offer subject to market fluctuation)으로 청약하였고, 피청약자는 유효기간 내에 이를 승낙하였다. 이후 제품 가격이 USD15,000로 인상되었다면 피청약자가 USD10,000로 승낙했더라도 USD15,000로 계 약이 성립된 것으로 해석될 수 있다.","취소 불능 취지의 청약이더라도 승낙기간이 정해지지 않았다면 불확정 청약이므로, 상대방이 합리적으로 신속한 기간 내 승낙을 했더라도 계약은 성립되지 않는다.","전화로 하는 구두청약은 특별한 사정이 없는 한 즉시 승낙되어야 한다. 만약 즉시 승낙하지 않으면 청약의 거절이 된다. ncoterms 2020의 개별 조건 다음에 표기되는 장소의 표기가 올바른 것을"],"answer":3},{"section":"무역계약","num":21,"stem":"21. 다음 중 I 모두 고르시오. A. CFR SHANGHAI CFS B. EXW BUSAN CFS C. CIF INCHEON AIRPORT D. DPU DAEGU WAREHOUSE E. FOB BUSAN CY F. FCA SELLER'S DAEJEON FACTORY G. CIP UIWANG DEPOT, GYEONGGI-DO","choices":["A, B, F, G","A, B, D, E","B, C, D, F","B, D, F, G"],"answer":4},{"section":"무역계약","num":22,"stem":"22. 항공화물대리 점(air cargo agent)과 항공운송주선업자(air freight forwarder)의 업무를 비교한 내용 중 가장 옳은 것은? 구분 항공화물대리점 항공운송주선업자","choices":["항공화물운송장 House Air Waybill 사용 항공사 Master Air Waybill 사용","화주에 대한 책임 항공사 책임 항공운송주선업자 책임","자체 Tariff 있음 있음","자체 운송약관 있음 없음(항공사 약관에 준함) urrendered B/L 관련 내용을 표현한 것 중 잘못된 것은?"],"answer":2},{"section":"무역계약","num":23,"stem":"23. Surrendered B/L에 관한 설명으로 잘못된 것은?","choices":["수하인이 양하지에서 Original B/L 없이 화물을 찾을 수 있게 하는 B/L이다.","대금결제조건이 신용장방식보다는 주로 T/T 방식에서 사용된다.","Surrendered의 의미는 선하증권의 권리증권 기능을 포기하는 것이다.","Surrendered B/L 발급은 수출자가 운송인에게 요청하는 것만으로 이루어지며, 수입 자의 동의 여부와는 관계없이 자동으로 발행된다."],"answer":4},{"section":"무역계약","num":24,"stem":"24. 부정기 선과 정기선운송에 대한 설명으로 잘못된 것은?","choices":["부정기선 운송은 항로가 일정치 않고, 수백 종류의 화물을 실어 나르는 개품운송계 약을 특징으로 한다.","정기선운송은 공중 일반운송인이 합법적인 화물에 대해서 차별 없이 운송하고, 운 임은 운임률표(tariff)로 공시된다.","부정기선은 여객 운송이 금지되며, 주로 벌크화물을 전 세계에 운송할 수 있도록 정기선에 비해서 단순하게 설계되어 있다.","정기선사는 화주에게 통일된 선하증권(B/L)을 발급하며, 일반적으로 부정기선 화물 보다 고가이기 때문에 상대적으로 운임이 높다."],"answer":1},{"section":"무역계약","num":25,"stem":"25. 다음은 항공화물 운임에 관련한 내용이다. 내용 중 올바른 것은?","choices":["항공사 및 포워더의 항공화물 운임은 일반적으로 항공사의 요율표에 의거하여 결정 되며, 항공사마다 고유의 tariff인 요율표를 갖고 있다.","항공화물 운임은 반드시 출발지에서 수출 항공화물을 핸들링하는 포워더가 항공사 에 무조건 먼저 지불해야 한다.","항공운임의 지불 기준인 운임산출 중량인 chargeable weight는 실제 중량에 의한 방법, 용적 중량에 의한 방법, 높은 중량단계에서의 낮은 운임 적용 규정에 의한 방법으로 먼저 결정한다.","단위탑재용기 운임은 ULD 작업을 통하여 단위탑재용기 사이즈에 따라 적용되는 운 임으로 ULD 작업 자체가 항공사의 책임하에 이루어진다."],"answer":3},{"section":"무역계약","num":26,"stem":"26. 추정전손이 인정되기 위한 위부에 관한 설명으로 잘못된 것은?","choices":["피보험자가 보험의 목적을 위부할 것을 결정하였으면 위부의 통지를 보험자에게 해 야 한다.","위부의 통지는 서면이나 구두로 할 수 있으나, 일부는 서면으로 하고 일부는 구두 로 하는 것은 허용되지 않는다.","위부의 통지는 손해에 관한 신뢰할 만한 정보를 수취한 후에 부당한 지체 없이 행 해야 한다. 단, 그 정보가 의심스러운 경우에는 피보험자는 이를 조사하기 위하여 합리적인 시간적 여유를 가질 권리가 있다.","위부의 통지가 수락되었다면 손해에 대한 정보가 미흡하거나 사정의 변경이 있어도 피보험자는 위부를 철회할 수 없다."],"answer":2},{"section":"무역계약","num":27,"stem":"27. 적하보험증 권 관련 내용 중 잘못된 것은?","choices":["claims, if any, payable at : 보험금 지급지를 의미하며 수출의 경우 최종 목적항에 서 보험자를 대신하여 보험금을 지급하는 회사명이 표기되며, 수입의 경우 당해 보 험자명이 통상 기입된다.","at and from : 선적항 혹은 출발 공항으로 통상 화물의 선적항과 공항의 도시명 혹 은 공항명이 표기된다.","thence to : 화물의 최종 도착지로 인코텀즈 조건에 관계 없이 모두 표기되어야 한 다.","place and date signed in : 보험증권 발행 장소와 발행일이 표기된다."],"answer":3},{"section":"무역계약","num":28,"stem":"28. 담보위험약관인 ICC(W/A)에 대한 설명으로 가장 잘못된 것은?","choices":["S.G.Policy 상의 담보위험인 침몰, 좌초, 악천후, 충돌, 행방불명, 화재, 투하, 강도 등에 기인된 전손과 분손을 보상해 준다.","WAIOP 조건은 담보위험에 기인한 단독해손이 발생한 경우 손해율과 상관없이 보상 하여 주는 조건이다.","선적, 환적, 양하 시의 포장당 전손과 조난항에서 양하작업에 기인한 전손과 분손의 비용손해를 보상하여 준다.","WA 3% 조건은 담보위험인 전손, 단독해손, 공동해손이 발생한 경우에 손해율이 3% 미만인 경우에는 손해율을 산정하여 공제하고 나머지를 보상한다."],"answer":4},{"section":"무역계약","num":29,"stem":"29. 보험 클레임 처리 관련한 내용 중 올바르지 않는 것은?","choices":["일반 손해가 발행한 경우에는 피보험자는 손해통지 의무, 손해방지의무, 손해배상청 구권 보전의무를 다해야 한다.","수입자는 선주의 공동해손 선포를 통해 자신의 화물이 공동해손에 포함되었음을 알 게 된다.","해상적하보험은 화물이 선창에 실려 운송되는 것을 전제로, 운송 중 발생할 수 있 는 위험을 반영하여 보험료율을 산정한다.","피보험자는 보험자에게 모든 손해의 통지를 반드시 서면으로 하여 증거보전을 우선 하여야 한다."],"answer":4},{"section":"무역계약","num":30,"stem":"30. 다음의 보험사고 사례에서 피보험자가 받을 수 있는 보험금은 얼마인가? ㅇ 커피머신 100대를 수출하면서 보험금액 USD55,000(USD50,000×110%)로 적하보험 에 부보하였다. ㅇ 해상운송 중 보험사고로 100대 모두 심한 훼손을 입고 중간항에서 양하되었다. ㅇ 피보험자는 보험자의 승인을 얻어 중간항에서 커피머신을 USD10,000에 매각하고, 매각 수수료로 USD500를 지급하였다. ㅇ 만약 화물이 정상적으로 목적지에 도착하였다면 USD80,000에 매각될 수 있었다.","choices":["USD70,000","USD70,500","USD45,000","USD45,500"],"answer":4},{"section":"무역영어","num":1,"stem":"1. 다음 서신의 내용에 대한 설명으로 올바른 것은? We are pleased to offer you the articles mentioned below as per the conditions and details described as follows. - Articles: Automobile Tube - Price: USD5.50/unit CIP Auckland (Trade terms are subject to Incoterms 2020) - Quantity: 50,000 units - Payment: 90 days after sight under an irrevocable and confirmed L/C in our favor - Validity: April 10, 2024","choices":["The seller is required to obtain a cargo insurance complying with the cover provided by Clauses (C) of the Institute Cargo Clauses","The seller must contract for carriage to Auckland where the risk passes to the buyer","Two separate banks will guarantee the payment to the seller independently","The buyer should issue an L/C by April 10, 2024 to conclude a contract"],"answer":3},{"section":"무역영어","num":2,"stem":"2. 다음은 국제물품매매계약에 관한 U 협약(CIS N G 1980)의 일부이다. 공란 (A)와 (B)에 들어가기에 가장 적절한 내용으로 짝지어진 것은? If the goods do not conform with the contract, the buyer may require ( (A) ) only if the lack of conformity constitutes a fundamental breach of contract. Also, the buyer may ( (B) ) if the failure by the seller to perform any of his obligations under the contract or this Convention amounts to a fundamental breach of contract. (A) (B)","choices":["repair of the goods require exchange of the goods ask to extend the contractual","claim for damages period for performance","delivery of substitute goods declare the contract avoided","additional period for delivery require guarantee"],"answer":3},{"section":"무역영어","num":3,"stem":"3. 다음은 I ncoterms 2020의 어떤 조건에 대한 설명인가? The seller fulfills his delivery obligation and transfers the risk to the buyer by handing the goods over to the carrier contracted by the seller. Once the goods have been delivered to the buyer in this way, the seller does not guarantee that the goods will reach the place of destination in sound condition, in the stated quantity or indeed at all. This is because the risk transfers from the seller to the buyer when the goods are delivered to the buyer by handing them over to the carrier; the seller must nonetheless contract for the carriage of the goods from delivery to the agreed destination.","choices":["FCA","CIF","CPT","DAP"],"answer":3},{"section":"무역영어","num":4,"stem":"4. 아래 빈 공란 (A)에 들어가기에 가장 적합한 정형거래조건은? Where the goods are sold under ( (A) ) rule, it would be rather uncommon to expect a bill of lading with an on-board notation to be issued by the carrier because delivery is completed before the goods are actually on board the vessel. So, the seller who is required to present an on-board bill of lading under L/C transaction will be in trouble. To cater for this situation, ( (A) ) rule under Incoterms 2020 has provided for an additional option. If the parties have so agreed in the contract, the buyer must instruct its carrier to issue a bill of lading with an on-board notation to the seller. The carrier may or may not, of course, accede to the buyer’s request, given that the carrier is only bound and entitled to issue such a bill of lading once the goods are on board.","choices":["FCA","FOB","CPT","DAP"],"answer":1},{"section":"무역영어","num":5,"stem":"5. 이 서신 내용으로 볼 때 매매계약서에서 당사자 사이에 합의된 정 형거래조건으로 가장 적합한 것은? Dear Sir/Madam ; Thank you very much for your order No.4567-9 on September 20 for 5,000 pairs of golf shoes. As we explained in the meeting with your representative and as stipulated in the contract under the article regarding the time of shipment, the delivery for models made to your specifications cannot be made in less than 60 days. However, we are prioritizing your order. Please be assured that all models will be completed by November 29. If you could send us your shipping instructions, we would be able to arrange the shipment without delay. We are confident that you will be satisfied with the goods in every respect. Very truly yours,","choices":["FOB","CIF","CFR","DAP"],"answer":1},{"section":"무역영어","num":6,"stem":"6. 다음 계약조항의 공 란 (A)에 들어갈 용어는? All disputes, controversies, or differences which may arise between the parties, out of or in relation to or in connection with this contract or for the breach thereof, shall be finally settled by arbitration in Seoul, Korea in accordance with the Commercial Arbitration Rules of The Korean Commercial Arbitration Board. The ( (A) ) rendered by the arbitrator(s) shall be final and binding upon both parties concerned.","choices":["Mediation","Award","Appeal","Reconciliation"],"answer":2},{"section":"무역영어","num":7,"stem":"7. 다음 계약서의 내용으로 올바른 것은? Article 2. Characteristics of the goods 2.1 It is agreed that any information relating to the goods and their use, such as weight, dimension, capacities, prices, colors and other date contained in catalogs shall not take effect as terms of the Contract unless expressly referred to in the Contract. 2.2 Unless otherwise agreed, the Buyer does not acquire any property rights in software, drawings, etc. which may have been made available to him. 2.3 It is agreed that the goods are suitable for the purpose for which they are intended by their very nature or which is evident from the contract of sale. 2.4 If express reference is made in the contract of sale to technical, safety, quality or other regulations and documents clearly designated in the agreement, even if not attached to the contract, the Seller shall be deemed to have knowledge of these.","choices":["Any information regarding the items included in the seller’s catalog and their use shall be effective as terms of this contract, unless otherwise specified in the contract","The buyer is deemed to obtain ownership rights for the drawings available to him/her under this contract","The goods must be suitable for their intended purpose based on their nature or clarified in the sales contract","If a document related to technology is explicitly referenced in the sales contract, the seller will be considered to recognize this only when it is included in the contract"],"answer":3},{"section":"무역영어","num":8,"stem":"8. 다음은 일반거래조건협정서의 일부이다. 그 내용으로 올바른 것은? Article 3. Shipment 3.1 The date of issuance of the bill of lading will be deemed to be the date of shipment unless the bill of lading contains an on-board notation indicating the date of shipment, in which case the date stated in the on-board notation will be deemed to be the date of shipment. 3.2 Partial shipment and/or transshipment shall not be permitted unless otherwise stated in this Sales Contract. 3.3 The Seller shall not be responsible for any delay in shipment due to the Buyer’s failure to provide timely a documentary credit. The Seller shall not be responsible for any damages incurred by the Buyer due to either delay in the arrival of the ship designated by the Buyer beyond the prearranged date of shipment. 3.4 If the parties agreed upon a cancellation date for late shipment in the Specific Conditions, the Buyer may avoid the Sales Contract by notification to the Seller in case the shipment has not occurred by the cancellation date.","choices":["For the seller’s convenience, the goods may be dispatched by two different vessels","The buyer should nominate the ship and provide the seller with all necessary information about arrangement of shipment at the seller’s request","The seller shall not be responsible for non-conformity of the goods if the buyer delays arrangement of shipment","If the date stated in the on-board notation is different from the date of issuance of the bill of lading, the latter shall be regarded as the date of shipment"],"answer":2},{"section":"무역영어","num":9,"stem":"9. 다음 환어음에 기재된 내용으로 올바른 것은? BILL OF EXCHANGE NO. 220204PU Date. 2024.12.20. FOR USD58,780 Seoul, Korea AT XXXXXXX SIGHT OF THE FIRST BILL OF EXCHANGE (SECOND OF THE SAME TENOR AND DATE BEING UNPAID) PAY TO KOREA NATIONAL BANK OR ORDER THE SUM OF US DOLLARS FIFTY EIGHT THOUSAND SEVEN HUNDRED EIGHTY ONLY VALUE RECEIVED AND CHARGE THE SAME TO ACCOUNT OF PUERUCO. CO., LTD. DRAWN UNDER TKJP BANK, TOKYO, JAPAN L/C NO: LC-815462-001 DATED 2024.10.16 TO: TKJP BANK, JAPAN KITA CO., LTD","choices":["The Korea National Bank is a payer","The beneficiary of L/C-815462-001 is PUERUCO. CO., LTD","The payment will be made after the issuing bank accepts this draft","The drawee of this draft is TKJP BANK, TOKYO, JAPAN"],"answer":4},{"section":"무역영어","num":10,"stem":"10. 아래 신용장을 제3자에게 양도할 경우 밑줄 친 (A)～(D) 중에서 감축 또는 감액만 될 수 있는 것을 모두 고른 것은? 40A/ FORM OF DOCUMENTARY CREDIT: IRREVOCABLE, TRANSFERABLE 31D/ DATE AND PLACE OF EXPIRY: (A) 04/20/2023, SEOUL, KOREA 32B/ CURRENCY CODE AMOUNT: (B) USD12,000.00 41D/ AVAILABLE WITH..BY..: KITA BANK BY NEGOTIATION 44C/ LATEST DATE OF SHIPMENT: (C) 03/25/2023 46A/ DOCUMENTS REQUIRED: + SIGNED COMMERCIAL INVOICE IN QUINTUPLICATE + PACKING LIST IN TRIPLICATE + FULL SET OF CLEAN ON BOARD OCEAN BILL OF LADING MADE OUT TO THE ORDER OF WOORI BANK MARKED FREIGHT COLLECT AND NOTIFY APPLICANT + INSURANCE POLICY (D) COVERING INVOICE VALUE PLUS TEN PERCENT WITH INSTITUTE CARGO CLAUSE (A) IN DUPLICATE * This credit is subject to the Uniform Customs and Practice for Documentary Credits(Publication No.600)","choices":["(A)","(A), (B)","(A), (B), (C)","(A), (B), (C), (D)"],"answer":3},{"section":"무역영어","num":11,"stem":"11. 다음 밑줄 친 신용장의 명칭으로 부적합한 것은? This credit is intended to assist the exporter in the production or procurement of the goods contracted. This credit is payable at a time prior to the shipment of the goods and against a document other than a transport document.","choices":["Standby L/C","Packing L/C","Advance payment L/C","Red Clause L/C"],"answer":1},{"section":"무역영어","num":12,"stem":"12. 다음 서신의 내용상 밑줄 친 부분(A)가 의미하는 것은? Dear Mr. Smith, Upon receiving your letter dated September 18, which enclosed Invoice No. W. 562, I was surprised to find that you had included a draft for USD23,600, requesting my acceptance to clear my account with you. In all our previous transactions, I have consistently settled my accounts promptly via banker’s draft, and at no point have you raised any objections to this payment method. Therefore, I see no reason to change a system that has worked well for both of us. Unless there are specific reasons for this change, I regret to inform you that I cannot accept your draft. Accordingly, I am returning it with this letter. Unless I hear otherwise from you, I will assume that you agree to continue with (A) our previous arrangement, and I will settle the outstanding amount punctually by banker’s draft when payment is due at the end of next month. Sincerely,","choices":["payment by bank usance bill","payment by document against payment","payment by usance bill drawn on the buyer","payment by open account"],"answer":1},{"section":"무역영어","num":13,"stem":"13. 아래 공 란(A)에 공통으로 들어가기에 가장 적절한 무역결제방식은 무엇인가? ( (A) ) occurs when goods are available to the buyer before payment is due, depending on how the products are shipped and the length of the payment option. So, ( (A) ) is a very low-risk option for the buyer and is typically used between established and trusted traders who have a long-established trading relationship with a good track record. ( (A) ) can be used to avoid high banking fees, but the seller may be exposed to the risk where payment is blocked due to political events in the buyer’s country.","choices":["demand guarantee","documentary collection","open account","forfaiting"],"answer":3},{"section":"무역영어","num":14,"stem":"14. 다음 서류에 대한 설명으로 잘못된 것은? Shipper/Exporter B/L NO. WSLI010200300521 ABC KOREA CO., LTD. WS LINE 334 GASAN-RO, YEONGDEUNGPO-GU, BILL OF LADING SEOUL, KOREA Consignee WOSUNG LINE CO.,LTD WEIHAI TRADE CO, LTD. TECH \u0026 DEVELOPMENT ZONE, Received by the Carrier from the WEIHAI, SHANDONG, CHINA Shipper in apparent good order and Notify Party condition unless otherwise indicated SAME AS ABOVE herein, the Goods, or package(s) said Ocean Vessel Place of loading to contain- WOSUNG 2584W INCHEON, KOREA Port of discharge Place of delivery SHANGHAI, WEIHAI, CHINA CHINA LADEN ON BOARD : JAN. 10. 2024","choices":["This document is a negotiable bill of lading which can be a security under L/C transaction","This document is a multimodal transport bill of lading","This document confirms that the goods are on board in apparent good condition","This document is issued after the goods have actually been shipped on the vessel"],"answer":1},{"section":"무역영어","num":15,"stem":"15. 다음 공 란 (A)에 들어가기에 가장 적절한 서류는? ( (A) ) is a document commonly used in international trade to allow a carrier to release goods to the consignee who is not yet in possession of the bill of lading. ( (A) ) assures the carrier that he will not suffer from any financial loss by having released the goods to a consignee in the absence of a bill of lading.","choices":["seaway bill","letter of guarantee","letter of credit","letter of indemnity"],"answer":2},{"section":"무역영어","num":16,"stem":"16. 다음은 해상적하보험증 권의 일부이다. 증권 내용의 설명으로 올바른 것은? Assured(s) Charlie’s TRADING Certificate No. Ref. No. 002A9965SD Invoice No. DS-17220 L/C No. IOMP207 Claim, if any, payable at: Amount Insured GELLATLY MARINE SERVICE USD65,120.00- 845 Seventh Avenue New York (USD59,200×110%) 10018 Survey should be approved by: Conditions THE SAME AS ABOVE INSTITUTE CARGO CLAUSE (A) 1982","choices":["Charlie’s Trading is the insurer who covers risks","When there is a claim, GELLATLY MARINE SERVICE will inspect the case","The insurable value of the subject matter insured is USD65,120.00","This insurance contract is concluded with the minimum coverage of the Institute Cargo Clause"],"answer":2},{"section":"무역영어","num":17,"stem":"17. 다음은 영국해상보험법(MIA)에 규정된 해상손해에 대한 설명이다. 아래 공란(A)에 들어갈 용어는? ( (A) ) means that the cost of repair of a damaged ship/vessel is more than the value of the ship/vessel. Where there is ( (A) ) the assured may either treat the loss as a partial loss, or abandon the subject-matter insured to the insurer and treat the loss as if it were an actual total loss.","choices":["a constructive total loss","an actual total loss","a general average loss","a particular average loss"],"answer":1},{"section":"무역영어","num":18,"stem":"18. 서신의 흐름상 공란 (A)에 들어가기에 가장 적절한 문장은?\n\n[지문]\nWe are pleased to make an offer, subject to your acceptance reaching us by July\n 20, of Tablet PC, as specified below:\n\n     - Article: Tablet PC Model No. 8909\n     - Quantity: 1,000 sets\n     - Price: USD2,000.00 per set, CIF New York, USA.\n     - Shipment: During October 2025\n     - Shipping Port: Incheon\n     - Payment: Draft at sight under an Irrevocable L/C\n     - Packing: Import Standard Packing of United States of America\n\n (                    (A)                  )                     .\n We look forward to your favorable reply by e-mail.\n\n Yours sincerely,","choices":["In view of the recent rush of orders from Europe for this article, we would advise you to make a purchase soon","You can be assured that anything thus communicated to us will be kept strictly confidential","We trust that this our first order will lead to a pleasant business relationship and more orders in the near future","We hope that you will promptly acknowledge our order and make your usual and careful execution"],"answer":1},{"section":"무역영어","num":19,"stem":"19. 상기 제시된 거래조건으로 계약이 체결 될 경우 물품의 멸실 또는 손상의 위험이 매수인에게 이전되는 시 점은?\n\n[지문]\nWe are pleased to make an offer, subject to your acceptance reaching us by July\n 20, of Tablet PC, as specified below:\n\n     - Article: Tablet PC Model No. 8909\n     - Quantity: 1,000 sets\n     - Price: USD2,000.00 per set, CIF New York, USA.\n     - Shipment: During October 2025\n     - Shipping Port: Incheon\n     - Payment: Draft at sight under an Irrevocable L/C\n     - Packing: Import Standard Packing of United States of America\n\n (                    (A)                  )                     .\n We look forward to your favorable reply by e-mail.\n\n Yours sincerely,","choices":["When the goods are unloaded at the port of destination in New York","When the goods are delivered to the carrier at the Inland Container Depot (ICD) in Korea","When the goods are loaded on board at the shipping port in Incheon","When the goods arrive at the buyer's place of business"],"answer":3},{"section":"무역영어","num":20,"stem":"20. 이 서신의 주된 목적은 무엇인가?\n\n[지문]\nWe have instructed (A) our bank, Woori Bank, Seoul, to open an irrevocable letter\n of credit for USD22,000.00 (twenty two thousand dollars) in your favor to cover the\n consignment, shipment (CIF Incheon), and bank charges. The credit is valid until\n August 10, 2024.\n You will receive confirmation from (B) our bank's agents, Citi Bank Ltd, Denver,\n and you can draw a draft on them at 60 (sixty) days for the full amount of the\n invoice. When submitting your draft, please enclose the following documents as the\n L/C is required; commercial invoice, packing list, bill of lading, and insurance\n policy.\n\n We hope that you will prepare the goods properly and ship them in time.\n\n Sincerely yours,","choices":["To inform the issuance of L/C","To request timely shipment","To ask for a confirmed L/C","To provide a list of the required documents"],"answer":1},{"section":"무역영어","num":21,"stem":"21. 이 서신의 밑줄 친 (A)와 (B)은행을 순서대로 올바르게 나열한 것은?\n\n[지문]\nWe have instructed (A) our bank, Woori Bank, Seoul, to open an irrevocable letter\n of credit for USD22,000.00 (twenty two thousand dollars) in your favor to cover the\n consignment, shipment (CIF Incheon), and bank charges. The credit is valid until\n August 10, 2024.\n You will receive confirmation from (B) our bank's agents, Citi Bank Ltd, Denver,\n and you can draw a draft on them at 60 (sixty) days for the full amount of the\n invoice. When submitting your draft, please enclose the following documents as the\n L/C is required; commercial invoice, packing list, bill of lading, and insurance\n policy.\n\n We hope that you will prepare the goods properly and ship them in time.\n\n Sincerely yours,","choices":["advising bank － confirming bank","issuing bank － advising bank","issuing bank － accepting bank","confirming bank － accepting bank"],"answer":3},{"section":"무역영어","num":22,"stem":"22. 다음 서신의 내용에 대한 설명으로 올바른 것은? Dear Mr. Cunnings, We received three hundred (300) bales of wool goods per M/S Arirang. However, we regret to inform you that their quality is inferior to the samples, even though the packaging shows no signs of damage. Before writing to you, we filed a claim with the President Lines, Ltd., Busan Agent, as we initially believed the deterioration was caused by rough handling during transit. However, an investigation conducted by a licensed INTECO surveyor has confirmed that the deterioration resulted from the use of coarse raw wool. For further details, please refer to the enclosed surveyor’s report. In light of this, we must formally request compensation for the deterioration, amounting to USD4,800 as specified in the report. We would appreciate your prompt settlement of this claim. Sincerely Yours, Mr. Connell","choices":["Mr. Connell realized that the bales were badly damaged when they arrived","Mr. Connell is sending the investigation report issued by a surveyor with this letter","Mr. Connell is planning to make a claim against the carrier","Mr. Connell will receive claim amount of USD4,800 from the insurer"],"answer":2},{"section":"무역영어","num":23,"stem":"23. 이 서신의 내용을 논리 전개에 따라 가장 잘 나열한 것은?\n\n[지문]\nWe are writing to clarify the payment terms of the Letter of Credit (L/C). (A) The\n goods will be shipped as soon as possible once it is settled. (B) However, as\n agreed between us and as clearly stated in your order sheet, payment should be\n made at sight. (C) Therefore, we kindly request you to amend the L/C to reflect\n the agreed-upon payment terms of at sight. (D) According to the L/C we received,\n the payment was to be made at 120 days.\n\n We would appreciate your prompt attention to this matter and the immediate\n amendment of the L/C as requested.\n\n Sincerely,","choices":["(D) － (A) － (C) － (B)","(A) － (B) － (D) － (C)","(D) － (B) － (C) － (A)","(A) － (D) － (C) － (B)"],"answer":3},{"section":"무역영어","num":24,"stem":"24. 이 서신에서 고객사가 결제와 관련하여 제기한 문제는 무엇인가?\n\n[지문]\nWe are writing to clarify the payment terms of the Letter of Credit (L/C). (A) The\n goods will be shipped as soon as possible once it is settled. (B) However, as\n agreed between us and as clearly stated in your order sheet, payment should be\n made at sight. (C) Therefore, we kindly request you to amend the L/C to reflect\n the agreed-upon payment terms of at sight. (D) According to the L/C we received,\n the payment was to be made at 120 days.\n\n We would appreciate your prompt attention to this matter and the immediate\n amendment of the L/C as requested.\n\n Sincerely,","choices":["Payment method","Expiry date of L/C","Shipment date","Tenor of draft"],"answer":4},{"section":"무역영어","num":25,"stem":"25. 이 서신의 목적으로 가장 적절한 것은?\n\n[지문]\nThank you for your enquiry dated May 12th regarding the Rowing Machines\n advertised in this month's issue of 'Lectron.'\n I can confirm that these are high-quality rowing machines suitable for home use.\n They are Kolby products, a well-known brand. The reason we can offer them at\n such competitive prices is that they are from a consignment of bankrupt stock we\n recently acquired.\n Due to the low price and small profit margin, we are unable to offer trade\n discounts on this particular consignment. However, we do sell a wide range of\n electronic and fitness equipment and have enclosed a price list detailing our trade,\n quantity, and cash discounts.\n We have also sent you brochures and specifications of the advertised Rowing\n Machines, as well as other fitness equipment we stock, by separate post. We\n encourage you to place your order as soon as possible, as we have received a\n very strong response thanks to our advertisement.\n Thank you for your interest.\n\n Sincerely,","choices":["To offer trade discounts on a consignment of rowing machines","To apologize for a delay in the delivery of rowing machines","To respond to an inquiry about the advertised rowing machines","To request immediate payment for an order previously placed for rowing"],"answer":3},{"section":"무역영어","num":26,"stem":"26. 이 서신에 대해서 회신하는 내용으로 적절하지 않은 것은?\n\n[지문]\nThank you for your enquiry dated May 12th regarding the Rowing Machines\n advertised in this month's issue of 'Lectron.'\n I can confirm that these are high-quality rowing machines suitable for home use.\n They are Kolby products, a well-known brand. The reason we can offer them at\n such competitive prices is that they are from a consignment of bankrupt stock we\n recently acquired.\n Due to the low price and small profit margin, we are unable to offer trade\n discounts on this particular consignment. However, we do sell a wide range of\n electronic and fitness equipment and have enclosed a price list detailing our trade,\n quantity, and cash discounts.\n We have also sent you brochures and specifications of the advertised Rowing\n Machines, as well as other fitness equipment we stock, by separate post. We\n encourage you to place your order as soon as possible, as we have received a\n very strong response thanks to our advertisement.\n Thank you for your interest.\n\n Sincerely,","choices":["Since we have the rowing machine in stock, we can ship it immediately after you place your order","Thank you for the information. We are considering placing an order and will contact you again shortly","We received the brochures and would like to know more about the warranty provided with the rowing machines","We would like to know if these rowing machines are suitable for commercial gym use"],"answer":1},{"section":"무역영어","num":27,"stem":"27. 이 서신에 대한 설명으로 옳지 않은 것은?\n\n[지문]\nThis letter concerns your order, No. 890, which was shipped on April 17, 2024,\n aboard the SS America. The vessel is scheduled to arrive in Liverpool on April\n 27, 2024.\n We have notified your agent, Eddis Jones, who will arrange for the consignment\n to be forwarded to you, as requested.\n Our bank's agents, Westmorland Bank Ltd., High Street, Nottingham, will release\n the shipping documents to you upon your acceptance of our bill. These documents\n include a clean shipped bill of lading (No. 517302), invoice (No. EH3314), and\n insurance certificate (AR 118 4531).\n (                          (A)                     )\n We have enclosed a catalog of our new models and believe you will be\n particularly interested in the machinery illustrated on pages 103-110.\n We look forward to hearing from you soon.\n\n Sincerely,","choices":["The shipping documents will be sent directly to Mr. Golugh by the sender","The seller has included information about new models","The letter confirms that the goods have been insured","The SS America is expected to arrive in Liverpool on April 27, 2024"],"answer":1},{"section":"무역영어","num":28,"stem":"28. 이 서신의 공 란 (A)에 들어가기에 가장 적절한 문장은?\n\n[지문]\nThis letter concerns your order, No. 890, which was shipped on April 17, 2024,\n aboard the SS America. The vessel is scheduled to arrive in Liverpool on April\n 27, 2024.\n We have notified your agent, Eddis Jones, who will arrange for the consignment\n to be forwarded to you, as requested.\n Our bank's agents, Westmorland Bank Ltd., High Street, Nottingham, will release\n the shipping documents to you upon your acceptance of our bill. These documents\n include a clean shipped bill of lading (No. 517302), invoice (No. EH3314), and\n insurance certificate (AR 118 4531).\n (                          (A)                     )\n We have enclosed a catalog of our new models and believe you will be\n particularly interested in the machinery illustrated on pages 103-110.\n We look forward to hearing from you soon.\n\n Sincerely,","choices":["You should note that we will not present these documents if you delay the issuance of L/C","We are confident that you will be pleased with the consignment and that it will be successful in your market","Unfortunately, that price is beyond our budget, so we are unable to match your offer","We deeply apologize for the inconvenience you are experiencing"],"answer":2},{"section":"무역영어","num":29,"stem":"29. 다음 서신의 내용을 논리 전개에 따라 가장 잘 나열한 것은? Dear Jennifer, Thank you for your recent offer for the Laptop Computer Mercury II. (A) We are prepared to order at least 10,000 units once we make a purchasing decision. (B) While we appreciate the quality of your product, we find that your price is rather high for the US market, where competition for this type of device is very strong. (C) However, if you could offer a 10% discount, we would be very interested in placing an order with you, as we value the quality of your product. (D) We have found similar models available from other Asian and European manufacturers at prices 15% to 20% lower than your quote. To allow us to finalize our decision by the end of the month, we would appreciate a response by October 26th. We hope to receive a favorable reply. Best wishes,","choices":["(B) － (C) － (D) － (A)","(B) － (D) － (C) － (A)","(D) － (A) － (C) － (B)","(D) － (B) － (A) － (C)"],"answer":2},{"section":"무역영어","num":30,"stem":"30. 다음 중 주어진 문장을 영작한 것 중 적절하지 않은 것은?","choices":["저희는 한국에서 1979년부터 농산물 수입업에 종사해 오고 있는 회사이며, 귀사의 밀가루를 구입하고자 합니다. ⇒ We are a Korean import business specializing in agricultural products operating since 1979, and we would like to purchase your wheat flour","귀사의 웹사이트에 새로 광고하신 구강청정 시스템에 대한 구체적 정보를 보내주시 면 감사하겠습니다. ⇒ I would appreciate more details about the newly advertised dental cleaning system in your website","FOB가격을 견적해 주시고 다른 거래조건들에 대해서도 알려주십시오. ⇒ Please quote us your FOB price and let us know other terms and conditions","당사는 주로 계약서 서명 30일 후 사전 송금하는 방식으로 거래해왔습니다. ⇒ We'd like to point out that we usually settle our accounts on a D/A basis with payment by 30-day bill of exchange"],"answer":4}];
var _D62=[{"section":"무역규범","num":1,"stem":"1. 대외무역법령에서 규정하고 있는 전자적 형태 무체물의 수출에 관한 설명 중 잘못된 것 은?","choices":["소프트웨어 진흥법에 따른 소프트웨어는 전자적 형태의 무체물에 포함된다.","캐릭터를 제외한 영상물은 전자적 형태의 무체물에 포함된다.","컴퓨터와 같은 정보처리 능력을 갖춘 장치에 저장한 상태로 반출한 후 인도하는 것을 포함한다.","거주자가 비거주자에게 정보통신망을 통해 전송하는 것을 포함한다."],"answer":2},{"section":"무역규범","num":2,"stem":"2. 대외무역법령에서 규정하고 있는 수출입 승인의 변경 승인 대상에 해당하는 것은?","choices":["물품 등의 수량ㆍ가격","원산지","규격","수출입 물품 등의 용도(다만, 수출입 승인 용도가 지정된 경우에만 해당)"],"answer":1},{"section":"무역규범","num":3,"stem":"3. 대외무역법령에서 규정하는 수출입실적에 대한 설명 중 올바른 것은?","choices":["외국인으로부터 외화를 영수하고 외화획득용 시설 기재를 외국인과 임대차계약을 맺 은 국내업체에 인도하는 경우에 수출실적으로 인정된다.","외화를 받고 외항 선박에 선박용품 등 관리에 관한 고시에 따른 내국선박용품을 공급 하는 경우의 수출실적 인정금액은 적재허가서에 기재된 금액이다.","수출의 정의에 해당하는 수출 중 유상으로 거래되는 수출(대북한 유무상 반출실적 포 함)은 수출실적으로 인정된다.","수입실적의 인정 범위는 유상으로 거래되는 수입이고, 인정금액은 수입통관액(FOB가 격 기준)으로 한다. 다만 외국인수수입과 용역 또는 전자적 형태 무체물의 수입은 외 국환은행의 지급액으로 한다."],"answer":2},{"section":"무역규범","num":4,"stem":"4. 대외무역법령에서 규정하는 외화획득의 범위 등에 대한 설명 중 잘못된 것은?","choices":["외화획득의 범위에는 관광, 용역 및 건설의 해외 진출에 따라 외화를 획득하는 것도 포함된다.","외화획득용 원료란 외화획득에 제공되는 물품 등을 생산하는 데에 필요한 원자재ㆍ부 자재ㆍ부품 및 구성품을 말한다.","무역거래자가 외국의 수입업자로부터 수수료를 받고 행한 수출 알선은 외화획득행위 에 준하는 행위로 본다.","외화획득용 제품이란 수입 후 생산과정을 거치지 않은 상태로 외화획득에 제공되는 물품 등을 말하며, 국내 구매 후 생산과정을 거치지 않은 상태로 외화획득에 제공되는 것은 해당하지 않는다."],"answer":4},{"section":"무역규범","num":5,"stem":"5. 우리나라의 대외무역법령에서 규정하고 있는 전략물자의 수출입에 관한 설명 중 올바른 것은?","choices":["전략물자의 판정을 신청받은 산업통상자원부장관이나 관계 행정기관의 장은 30일 이내에 신청한 물품 등이 전략물자인지 또는 상황허가 대상 물품 등인지를 판정하 여 신청인에게 알려야 한다.","전략물자 판정의 유효기간은 1년으로 한다.","산업통상자원부장관이나 관계 행정기관의 장은 10일 이내에 전략물자 수입목적확인 서를 발급해야 한다.","전략물자 허가 의무 위반자에 대한 교육 시간은 8시간 이내로 한다."],"answer":4},{"section":"무역규범","num":6,"stem":"6. 대외무역법령에서 규정하고 있는 전략물자의 수출허가 및 상황허가 기준에 해당하지 않 는 것은?","choices":["해당 전략물자 등이 평화적 목적에 사용될 것","해당 전략물자 등의 거래가 국제평화 및 안전유지와 국가안보에 영향을 미치지 아니 할 것","해당 전략물자 등이 인간의 생명ㆍ건강 및 안전을 위하여 필요할 것","해당 전략물자 등의 최종사용자 등이 거래에 적합한 자격을 가지고 있고 사용 용도를 신뢰할 수 있을 것"],"answer":3},{"section":"무역규범","num":7,"stem":"7. 대외무역법령에서 규정하고 있는 원산지 표시방법에 관한 설명으로 잘못된 것은?","choices":["원산지표시 대상 물품을 수입하려는 자는 해당 물품에 한글ㆍ한문 또는 영문으로 원 산지를 표시하여야 한다.","원산지를 특정하기 곤란한 단순 혼합물품은 “Imported from 국명”으로 원산지를 표 시할 수 있다.","개인이 자가소비용으로 수입하는 물품으로서 세관장이 타당하다고 인정하는 물품은 원산지를 표시하지 아니할 수 있다.","해당 세트를 구성하는 개별 물품들의 원산지가 2개국 이상이고, 세트 물품으로 최종구 매자에게 판매될 때는 개별 물품별로 각각 원산지를 표시하여야 하며, 용기에 모든 개 별 물품들의 원산지를 표시하여야 한다."],"answer":2},{"section":"무역규범","num":8,"stem":"8. 대외무역법령에서 규정하고 있는 조정의 종료 사유에 해당하지 않는 것은?","choices":["당사자가 조정안을 거부한 경우","당사자 간에 합의가 이루어진 경우","당사자가 조정신청을 철회한 경우","일방의 당사자가 다른 당사자가 지급하여야 할 조정비용을 지급한 경우"],"answer":4},{"section":"무역규범","num":9,"stem":"9. HS협정 및 관세법령에서 규정하고 있는 HS 품목분류표에 대한 설명으로 올바른 것은?","choices":["HS 품목분류의 법적 구속력이 있는 것은 통칙, 주의 규정과 호의 용어이며, 소호의 용 어는 권고사항이다.","수출입 물품의 품목분류 사전심사를 신청할 수 있는 자는 물품을 수출입 하려는 자, 수출할 물품의 제조자, 관세사 등이다.","HS 품목분류표의 분류체계는 부, 류, 호, 소호로 세분되며, 10단위 코드는 WCO 회원 국에서 모두 동일하게 사용한다.","HS 품목분류표는 물품의 가공도가 낮은 것에서부터 높아지는 순서로 분류되어 있으 며, 모든 물품은 하나의 호에 분류되지만, 필요시 두 개의 호에 분류될 수도 있다."],"answer":2},{"section":"무역규범","num":10,"stem":"10. 다음 중 수출입통관에서 사용되는 관세법령상 용어 설명이 가장 올바른 것은?","choices":["“반송”이란 국내에 도착한 외국물품이 수입통관절차를 거치지 아니하고 다시 외국 으로 반출되는 것을 말한다.","“통관”이란 관세법에 따른 절차를 이행하여 물품을 수출ㆍ수입 또는 반송ㆍ환적하 는 것을 말한다.","“외국물품”이란 우리나라의 선박 등이 공해에서 채집하거나 포획한 수산물 등을 포 함한다.","“수출”이란 보세판매장에서 외국인에게 국내에서 생산(제조ㆍ가공ㆍ조립ㆍ수리ㆍ재 생 또는 개조하는 것)된 물품을 매도하는 것을 말한다."],"answer":1},{"section":"무역규범","num":11,"stem":"11. 우리나라의 관세법령에서 규정하고 있는 관세의 납부기한에 관한 설명 중 잘못된 것 은?","choices":["세관장이 납세의무자에게 납부고지를 한 경우 납부고지를 받은 날부터 15일 이내에 관세를 납부하여야 한다.","납세의무자는 수입신고가 수리되기 전에 관세를 미리 납부할 수 없다.","세관장은 관세청장이 정하는 요건을 갖춘 성실납세자가 월별납부 신청을 한 경우, 납 부기한이 같은 달의 세액에 대하여 그달의 말일까지 한꺼번에 납부하게 할 수 있다.","납세의무자가 월별납부를 유지하기 어렵다고 인정될 경우 세관장은 월별납부 승인을 취소할 수 있다."],"answer":2},{"section":"무역규범","num":12,"stem":"12. 관세법상 과세물건 확정시기 및 적용 법령에 관한 설명으로 올바른 것은?","choices":["관세는 수입신고 당시의 법령에 따라 부과하나, 입항전 수입신고를 한 경우에는 세관 장이 입항전 수입신고를 수리한 때의 법령이 적용된다.","수입신고가 수리되기 전에 소비하거나 사용하는 물품(제239조에 따라 소비 또는 사용 을 수입으로 보지 아니하는 물품 제외)은 해당 물품을 소비하거나 사용한 때의 물품 의 성질과 수량에 따라 관세를 부과한다.","관세는 수입신고를 하는 때의 물품의 가격 또는 수량에 따라 부과된다.","사용 전 수입신고를 하고 보세건설장에 반입된 물품은 그 수입신고일을 기준으로 시 행되는 법령에 따라 관세를 부과한다."],"answer":2},{"section":"무역규범","num":13,"stem":"13. 우리나라의 관세법령에서 규정하고 있는 관세징수권 등의 소멸시효에 관한 설명 중 잘 못된 것은?","choices":["관세징수권은 5억원 미만의 관세(내국세 포함)에 대해 이를 행사할 수 있는 날부터 5 년 이내에 행사하지 않으면 소멸된다.","월별납부의 경우 관세징수권을 행사할 수 있는 날은 월별납부에 따른 납부기한이 경 과한 날의 다음 날이다.","부과고지하는 관세의 경우 관세징수권을 행사할 수 있는 날은 납부고지를 받은 날부 터 15일이 경과한 날의 다음 날이다.","관세징수권의 소멸시효는 관세의 분할납부 기간에도 진행된다."],"answer":4},{"section":"무역규범","num":14,"stem":"14. 우리나라의 관세법령에서 규정하고 있는 과세가격의 결정에 관한 설명 중 잘못된 것 은? (모든 금액은 객관적이고 수량화할 수 있는 자료에 근거)","choices":["수입항에 도착한 후 발생한 내륙운송비가 구매자가 지급하였거나 지급하여야 할 총금 액에 포함된 경우, 해당 비용은 수입물품 과세가격 산정 시 공제된다.","구매자가 부담하는 중개료는 수입물품 과세가격 산정 시 가산된다.","관세의 과세표준은 수입물품의 가격으로만 한다.","거래가격이 금액으로 계산할 수 없는 조건이거나, 사정에 따라 영향을 받으면 1방법으 로 과세가격 산정은 불가하며, 2방법 이하의 방법에 따라 결정한다."],"answer":3},{"section":"무역규범","num":15,"stem":"15. 우리나라의 관세법령에서 규정하고 있는 신고납부에 관한 설명으로 잘못된 것은?","choices":["물품을 수입하려는 자는 수입신고를 할 때에 세관장에게 납세신고를 하여야 한다.","세관장은 수입신고 수리 전에 세액심사를 하는 것이 적당하지 아니하다고 인정되는 경우를 제외하고는 수입신고 수리 전 세액심사를 하여야 한다.","세관장은 납세신고 내용에 대한 심사 시 제출된 신고서나 그 밖의 서류에 미비한 점 이나 오류가 있는 경우에는 보완을 요구할 수 있다.","납세의무자는 납세신고한 세액을 납부하기 전에, 그 세액이 과부족하다는 것을 알게 되었을 때는 납세신고한 세액을 정정할 수 있다."],"answer":2},{"section":"무역규범","num":16,"stem":"16. 관세법상 할당관세를 부과할 수 있는 경우로 올바른 것을 모두 고른 것은? A. 원활한 물자수급 또는 산업의 경쟁력 강화를 위하여 특정물품의 수입을 촉진할 필요가 있는 경우 B. 수입가격이 급등한 물품 또는 이를 원재료로 한 제품의 국내가격을 안정시키기 위하여 필요한 경우 C. 산업구조의 변동 등으로 물품 간의 세율 불균형이 심하여 이를 시정할 필요가 있 는 경우 D. 관세 또는 무역에 관한 국제협정이나 양자 간의 협정 등에 규정된 우리나라의 권 익을 부인하거나 제한하는 경우 E. 국내에서 개발된 물품을 일정 기간 보호할 필요가 있는 경우","choices":["A, B","A, E","C, D","B, E"],"answer":1},{"section":"무역규범","num":17,"stem":"17. 다음 상황에서 납부해야 하는 관세로 올바른 것은? (모든 가격은 객관적이고 수량화할 수 있는 자료에 근거) - 수입물품 가격 : 15,000,000원 - 수입물품 가격에 포함된 우리나라에 도착한 후 발생한 내륙운송비 : 2,400,000원 - 수입물품 가격에 포함되지 않은 구매자가 부담하는 중개료 : 400,000원 - 수입물품 가격에 포함되지 않은 수입 이후 발생하는 수입물품 유지비용 : 1,500,000원 - 기본관세율 : 6.5%","choices":["845,000원","812,500원","780,000원","747,500원"],"answer":1},{"section":"무역규범","num":18,"stem":"18. 다음 신문 기사와 관련된 관세 감면 제도는 무엇인가
